<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Stadsspel Rotterdam V20 - Jorik's Bachelor Party</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Inter+Tight:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      /* V13: warmer near-black base with a subtle blue tint so accent colors pop */
      --bg:#0a0b10;
      --bg-elev:#0f1016;
      --surface:rgba(255,255,255,0.045);
      --surface-hover:rgba(255,255,255,0.075);
      --surface-active:rgba(255,255,255,0.11);
      --border:rgba(255,255,255,0.08);
      --border-strong:rgba(255,255,255,0.14);
      --text-primary:rgba(255,255,255,0.96);
      --text-secondary:rgba(255,255,255,0.72);
      --text-tertiary:rgba(255,255,255,0.55);
      /* V13: richer accent — warmer gold + complementary hues */
      --accent:#e4b25c;
      --accent-2:#f0c373;
      --accent-deep:#b8863a;
      --accent-glow:rgba(228,178,92,0.16);
      --foto:#6ea3ff;
      --foto-2:#8bb9ff;
      --quiz:#b29bff;
      --quiz-2:#c9b8ff;
      --creatief:#5fd8a5;
      --creatief-2:#7ee4b7;
      --video:#ff7b7b;
      --video-2:#ff9a9a;
      --success:#5fd8a5;
      --danger:#ff6b6b;
      /* V15: spacing scale — 4px base grid, used everywhere */
      --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;--sp-7:32px;--sp-8:40px;--sp-9:56px;--sp-10:72px;
      /* V15: type scale — tight hierarchy, only these sizes allowed */
      --fs-10:10px;--fs-11:11px;--fs-12:12px;--fs-13:13px;--fs-14:14px;--fs-15:15px;--fs-17:17px;--fs-20:20px;--fs-24:24px;--fs-30:30px;--fs-36:36px;--fs-48:48px;
      /* V15: font weight — semantic */
      --fw-regular:500;--fw-medium:600;--fw-semi:700;--fw-bold:800;--fw-black:900;
      /* V15: letter-spacing — semantic */
      --ls-tight:-0.035em;--ls-snug:-0.02em;--ls-normal:-0.01em;--ls-wide:0.04em;--ls-wider:0.08em;--ls-widest:0.14em;
      /* V15: line height */
      --lh-tight:1.1;--lh-snug:1.25;--lh-normal:1.5;--lh-relaxed:1.65;

      /* V41.14 — decorative emoji icon scale. Use these for all "icon"-style
         emoji so vertical rhythm stays consistent. Body emoji (inside sentence)
         stays at inherited fs-N; these are for emoji-as-affordance. */
      --icon-xs:20px;--icon-sm:28px;--icon-md:40px;--icon-lg:56px;--icon-hero:96px;

      /* V13: radius scale */
      --r-xs:8px;--r-sm:12px;--r-md:16px;--r-lg:22px;--r-xl:28px;--r-2xl:36px;--r-pill:999px;
      /* V13: shadow scale */
      --sh-sm:0 1px 2px rgba(0,0,0,0.25);
      --sh-md:0 6px 18px rgba(0,0,0,0.35),0 2px 6px rgba(0,0,0,0.25);
      --sh-lg:0 18px 40px rgba(0,0,0,0.5),0 6px 14px rgba(0,0,0,0.3);
      --sh-glow-gold:0 8px 32px rgba(228,178,92,0.35),0 2px 8px rgba(228,178,92,0.2);
      --sh-glow-blue:0 8px 32px rgba(110,163,255,0.32);
      --sh-ring:inset 0 1px 0 rgba(255,255,255,0.08);
      /* V13: spring timings */
      --spring:cubic-bezier(0.34,1.56,0.64,1);
      --spring-soft:cubic-bezier(0.25,0.46,0.45,0.94);
      --ease-out:cubic-bezier(0.22,1,0.36,1);
      /* V13: type */
      --font-display:'Inter Tight','Inter',system-ui,-apple-system,sans-serif;
      --font-body:'Inter','Inter Tight',system-ui,-apple-system,sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body,#root{width:100%;height:100%;overflow:hidden}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text-primary);-webkit-font-smoothing:antialiased;letter-spacing:-0.01em}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(circle at 20% 15%,rgba(228,178,92,0.05),transparent 45%),radial-gradient(circle at 85% 85%,rgba(110,163,255,0.045),transparent 50%)}
    /* V13: desktop frame */
    @media (min-width:560px){#root{max-width:520px;margin:0 auto;box-shadow:0 0 120px rgba(0,0,0,0.55),inset 0 0 0 1px rgba(255,255,255,0.03);background:var(--bg)}}
    h1,h2,h3{font-family:var(--font-display);letter-spacing:var(--ls-tight)}

    /* V15: utility system — strict typography tokens */
    .t-display{font-family:var(--font-display);font-weight:var(--fw-black);letter-spacing:var(--ls-tight);line-height:var(--lh-tight)}
    .t-hero{font-family:var(--font-display);font-size:var(--fs-48);font-weight:var(--fw-black);letter-spacing:var(--ls-tight);line-height:var(--lh-tight)}
    .t-title{font-family:var(--font-display);font-size:var(--fs-30);font-weight:var(--fw-black);letter-spacing:var(--ls-tight);line-height:var(--lh-tight)}
    .t-section{font-family:var(--font-display);font-size:var(--fs-20);font-weight:var(--fw-bold);letter-spacing:var(--ls-snug);line-height:var(--lh-snug)}
    .t-card-title{font-family:var(--font-display);font-size:var(--fs-17);font-weight:var(--fw-bold);letter-spacing:var(--ls-snug);line-height:var(--lh-snug)}
    .t-card-label{font-family:var(--font-display);font-size:var(--fs-15);font-weight:var(--fw-semi);letter-spacing:var(--ls-snug);line-height:var(--lh-snug)}
    .t-body{font-family:var(--font-body);font-size:var(--fs-14);font-weight:var(--fw-regular);letter-spacing:var(--ls-normal);line-height:var(--lh-normal);color:var(--text-secondary)}
    .t-body-emph{font-family:var(--font-body);font-size:var(--fs-14);font-weight:var(--fw-semi);letter-spacing:var(--ls-normal);line-height:var(--lh-normal);color:var(--text-primary)}
    .t-caption{font-family:var(--font-body);font-size:var(--fs-12);font-weight:var(--fw-regular);letter-spacing:var(--ls-normal);line-height:var(--lh-snug);color:var(--text-tertiary)}
    .t-label{font-family:var(--font-display);font-size:var(--fs-11);font-weight:var(--fw-bold);letter-spacing:var(--ls-wider);text-transform:uppercase;color:var(--text-secondary)}
    /* V36 P1 fix (Sandra/Bart personas): HUD font-sizes were below readable for older
       players (bifocal-Sandra) + drunk eyes (Bart at 17:30). Bumped t-label-sm
       from 10px → 11px (Apple HIG minimum for body-adjacent labels). 1px change
       lifts readability significantly without disturbing layout. */
    .t-label-sm{font-family:var(--font-display);font-size:var(--fs-11);font-weight:var(--fw-bold);letter-spacing:var(--ls-widest);text-transform:uppercase;color:var(--text-tertiary)}
    .t-num{font-family:var(--font-display);font-variant-numeric:tabular-nums;font-weight:var(--fw-black);letter-spacing:var(--ls-tight);line-height:1}

    .t-accent{color:var(--accent)!important}
    .t-accent-2{color:var(--accent-2)!important}
    .t-muted{color:var(--text-secondary)!important}
    .t-dim{color:var(--text-tertiary)!important}
    .t-danger{color:var(--danger)!important}
    .t-success{color:var(--success)!important}

    /* V15: layout utilities — consistent spacing using the scale */
    .stack-1>*+*{margin-top:var(--sp-1)}
    .stack-2>*+*{margin-top:var(--sp-2)}
    .stack-3>*+*{margin-top:var(--sp-3)}
    .stack-4>*+*{margin-top:var(--sp-4)}
    .stack-5>*+*{margin-top:var(--sp-5)}
    .stack-6>*+*{margin-top:var(--sp-6)}
    .stack-7>*+*{margin-top:var(--sp-7)}
    .row{display:flex;align-items:center}
    .row-2{display:flex;align-items:center;gap:var(--sp-2)}
    .row-3{display:flex;align-items:center;gap:var(--sp-3)}
    .row-4{display:flex;align-items:center;gap:var(--sp-4)}
    .row-between{display:flex;align-items:center;justify-content:space-between}
    .flex-1{flex:1;min-width:0}
    .text-center{text-align:center}
    .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* V15: canonical panel — replaces ad-hoc padding on 20+ places */
    .panel{padding:var(--sp-5);border-radius:var(--r-lg);background:linear-gradient(155deg,rgba(255,255,255,0.045),rgba(255,255,255,0.015));border:1px solid var(--border);box-shadow:var(--sh-ring)}
    .panel-sm{padding:var(--sp-4);border-radius:var(--r-md)}
    .panel-lg{padding:var(--sp-6);border-radius:var(--r-xl)}

    /* V15: screen wrapper — consistent outer padding on every screen */
    .screen{height:100%;overflow-y:auto;padding:var(--sp-6);padding-top:var(--sp-7);padding-bottom:var(--sp-9);position:relative;z-index:1}
    .screen-hero{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--sp-6);position:relative;z-index:1}
    .leaflet-div-icon{background:none!important;border:none!important}

    /* V13: Glass morphism — richer, layered */
    .glass{backdrop-filter:blur(18px) saturate(1.2);-webkit-backdrop-filter:blur(18px) saturate(1.2);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-ring)}
    .glass-strong{backdrop-filter:blur(28px) saturate(1.3);-webkit-backdrop-filter:blur(28px) saturate(1.3);background:rgba(10,11,16,0.82);border:1px solid var(--border-strong);border-radius:var(--r-lg);box-shadow:var(--sh-md),var(--sh-ring)}
    .glass-card{position:relative;backdrop-filter:blur(22px) saturate(1.2);-webkit-backdrop-filter:blur(22px) saturate(1.2);background:linear-gradient(155deg,rgba(255,255,255,0.055),rgba(255,255,255,0.025));border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-md),var(--sh-ring)}

    /* V15: Buttons — consistent size scale */
    .btn{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:var(--sp-2);padding:var(--sp-4) var(--sp-6);min-height:52px;border:none;border-radius:var(--r-pill);font-family:var(--font-display);font-weight:var(--fw-semi);cursor:pointer;transition:transform .18s var(--spring),box-shadow .25s var(--ease-out),opacity .2s;font-size:var(--fs-15);letter-spacing:var(--ls-snug);color:#fff;white-space:nowrap;-webkit-tap-highlight-color:transparent}
    .btn::after{content:'';position:absolute;inset:0;border-radius:inherit;box-shadow:inset 0 1px 0 rgba(255,255,255,0.22),inset 0 -1px 0 rgba(0,0,0,0.15);pointer-events:none}
    .btn:active{transform:scale(0.96) translateY(1px)}
    .btn:hover{transform:translateY(-1px)}
    .btn-cyan{background:linear-gradient(135deg,#7ab2ff,#4a7bd4);box-shadow:0 10px 28px rgba(110,163,255,0.35),0 2px 6px rgba(0,0,0,0.25)}
    .btn-cyan:hover{box-shadow:0 14px 34px rgba(110,163,255,0.42),0 2px 8px rgba(0,0,0,0.28)}
    /* V37 P1 — success state for photo upload (Sandra audit). Stays visible
       for ~6s after submit so low-tech users don't misread the morph as failure. */
    .btn-success{background:linear-gradient(135deg,#5fd8a5,#3eaa7d);box-shadow:0 10px 28px rgba(95,216,165,0.35),0 2px 6px rgba(0,0,0,0.25);color:#0a0b10}
    .btn-success:hover{box-shadow:0 14px 34px rgba(95,216,165,0.42),0 2px 8px rgba(0,0,0,0.28)}
    .btn-gold{background:linear-gradient(135deg,var(--accent-2),var(--accent-deep));box-shadow:var(--sh-glow-gold)}
    .btn-gold:hover{box-shadow:0 14px 38px rgba(228,178,92,0.42),0 2px 8px rgba(228,178,92,0.25)}
    .btn-ghost{background:var(--surface);color:var(--text-primary);border:1px solid var(--border);box-shadow:var(--sh-ring);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    .btn-ghost:hover{background:var(--surface-hover);border-color:var(--border-strong)}
    .btn-danger{background:linear-gradient(135deg,#ff8787,#c94d4d);box-shadow:0 10px 28px rgba(255,107,107,0.3)}
    .btn-danger:hover{box-shadow:0 14px 34px rgba(255,107,107,0.38)}
    .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;pointer-events:none}
    /* V18 (§2.7): 44px min tap target (WCAG 2.5.5 AAA baseline) */
    .btn-sm{padding:var(--sp-2) var(--sp-4);min-height:44px;font-size:var(--fs-13)}
    .btn-lg{padding:var(--sp-4) var(--sp-5);min-height:60px;font-size:var(--fs-17);font-weight:var(--fw-bold);white-space:normal;line-height:1.25;text-align:center}
    /* V18 (§2.7): keyboard focus ring — visible on Tab but not on mouse click */
    .btn:focus-visible,.chip:focus-visible,button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent-2);outline-offset:2px;box-shadow:0 0 0 4px rgba(228,178,92,0.18)}

    /* V13: Chip — compact pill used for tags, meta, filters */
    .chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r-pill);background:var(--surface);border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-secondary);letter-spacing:0.01em;transition:background .2s}
    .chip:hover{background:var(--surface-hover)}
    .chip-gold{background:var(--accent-glow);border-color:rgba(228,178,92,0.3);color:var(--accent)}
    .chip-blue{background:rgba(110,163,255,0.12);border-color:rgba(110,163,255,0.3);color:var(--foto)}
    /* V29 — richer chip variants for premium gamification feel */
    .chip-achievement{background:linear-gradient(135deg,rgba(228,178,92,0.2),rgba(255,107,107,0.1));border:1px solid rgba(228,178,92,0.55);color:#ffe1a8;box-shadow:0 0 12px rgba(228,178,92,0.25),inset 0 0 0 1px rgba(255,225,168,0.15);font-weight:800}
    .chip-status{background:rgba(95,216,165,0.15);border:1px solid rgba(95,216,165,0.45);color:var(--success);position:relative;padding-left:18px}
    .chip-status::before{content:'';position:absolute;left:8px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--success);box-shadow:0 0 0 0 rgba(95,216,165,0.6);animation:chipPulse 1.6s ease-out infinite}
    @keyframes chipPulse{0%{box-shadow:0 0 0 0 rgba(95,216,165,0.55)}70%{box-shadow:0 0 0 8px rgba(95,216,165,0)}100%{box-shadow:0 0 0 0 rgba(95,216,165,0)}}
    .chip-role{background:linear-gradient(135deg,rgba(155,123,234,0.18),rgba(110,163,255,0.08));border:1px solid rgba(155,123,234,0.4);color:#cdb6ff;font-weight:700}
    .chip-count{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-primary);font-variant-numeric:tabular-nums;font-weight:800;padding:5px 10px}
    /* V41.14 — micro-chip for inline labels (SYSTEEM / JIJ / team member names).
       Replaces five near-identical inline padding recipes (2px 7-8px) across the app. */
    .chip-xs{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--r-pill);background:var(--surface);border:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text-secondary);letter-spacing:0.02em;line-height:1.5}
    /* V41.14 — canonical danger badge for queue depths (Beoordeel review count etc.).
       Replaces four near-identical recipes (#ff4444 vs rgba(255,68,68,0.95) etc.).
       Pure red, tabular-nums, fixed 9px radius matching the existing in-the-wild pattern. */
    .badge-count{background:#ff4444;color:#fff;font-size:10px;font-weight:800;padding:2px 6px;border-radius:9px;line-height:1.4;font-variant-numeric:tabular-nums;display:inline-flex;align-items:center;justify-content:center;min-width:18px}
    /* V41.14 — canonical modal close button. 44×44 WCAG, circular, high-contrast.
       Replaces 3 different recipes in ChallengeSheet/AdminMenu/AdminLogin/PhotoLightbox. */
    .btn-close{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);color:#fff;font-size:20px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s ease,transform .12s ease}
    .btn-close:hover{background:rgba(255,255,255,0.14)}
    .btn-close:active{transform:scale(0.94)}
    /* V41.14 — canonical Game Master entry-point button. Used on splash/setup/lobby/game
       (when user is NOT yet admin). Replaces 4 inline-styled variants. */
    .btn-gm{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:var(--r-md);background:rgba(228,178,92,0.10);border:1px solid rgba(228,178,92,0.35);color:var(--accent-2);cursor:pointer;font-size:var(--fs-11);font-weight:var(--fw-bold);letter-spacing:0.02em;transition:background .15s ease}
    .btn-gm:hover{background:rgba(228,178,92,0.16)}
    .btn-gm:active{transform:scale(0.97)}
    /* V30 — accessibility: respect prefers-reduced-motion. Keeps state correctness;
       only kills decorative motion (pulses, confetti, shimmer) so users with
       motion-sickness settings aren't punished. WCAG 2.1 SC 2.3.3. */
    @media (prefers-reduced-motion: reduce){
      .chip-status::before{animation:none}
      .confetti-piece{animation:none;opacity:0}
      .skeleton-row{animation:none;background:rgba(255,255,255,0.04)}
      *{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important}
    }

    /* V13: Animations — spring-heavy */
    @keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeInPop{from{opacity:0;transform:scale(0.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes slideDown{from{transform:translateY(-24px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(228,178,92,0.5)}50%{box-shadow:0 0 0 14px rgba(228,178,92,0)}}
    @keyframes reviewPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,68,68,0.8)}50%{transform:scale(1.3);box-shadow:0 0 0 8px rgba(255,68,68,0)}}
    @keyframes glow{0%,100%{filter:drop-shadow(0 0 8px rgba(228,178,92,0.8))}50%{filter:drop-shadow(0 0 22px rgba(228,178,92,0.4))}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
    @keyframes scoreFloat{0%{opacity:1;transform:translate(-50%,0) scale(1)}100%{opacity:0;transform:translate(-50%,-80px) scale(1.35)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    /* V24 — admin broadcast banner entry animation */
    @keyframes broadcastIn{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
    /* V33 — admin menu drawer slide-in from the right */
    @keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
    /* V28 — premium ui polish: confetti burst + skeleton-loading rows */
    @keyframes confettiFall{0%{transform:translate(var(--cx,0),0) rotate(0);opacity:1}100%{transform:translate(calc(var(--cx,0) + var(--dx,40px)),100vh) rotate(720deg);opacity:0}}
    .confetti-burst{position:fixed;inset:0;pointer-events:none;z-index:10005;overflow:hidden}
    .confetti-piece{position:absolute;top:38%;left:50%;width:10px;height:14px;border-radius:2px;animation:confettiFall 1.6s cubic-bezier(.42,0,.58,1) forwards}
    .skeleton-row{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3);border-radius:var(--r-md);border:1px solid var(--border);background:linear-gradient(90deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 100%);background-size:200% 100%;animation:shimmer 1.6s linear infinite;margin-bottom:var(--sp-2)}
    .skeleton-emoji{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.06);flex-shrink:0}
    .skeleton-body{flex:1;display:flex;flex-direction:column}
    .skeleton-line{height:10px;border-radius:5px;background:rgba(255,255,255,0.06)}
    .skeleton-line.long{width:62%}
    .skeleton-line.short{width:38%;margin-top:6px}
    @keyframes breathing{0%,100%{opacity:0.6}50%{opacity:1}}
    /* V41.13 — bar break map marker. Beer emoji in a gold disc with a
       continuously expanding pulse ring so it draws eyes from across the map.
       Active for the 30min window before each break + during the 30min break. */
    .bar-break-marker{position:relative;width:48px;height:48px;pointer-events:auto;cursor:pointer}
    .bar-break-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#e4b25c,#d4a054);border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 14px rgba(228,178,92,0.6);z-index:5}
    .bar-break-pulse{position:absolute;top:50%;left:50%;width:48px;height:48px;border-radius:50%;border:3px solid rgba(228,178,92,0.85);transform:translate(-50%,-50%);animation:barBreakPulse 1.8s ease-out infinite}
    .bar-break-pulse-2{position:absolute;top:50%;left:50%;width:48px;height:48px;border-radius:50%;border:3px solid rgba(228,178,92,0.55);transform:translate(-50%,-50%);animation:barBreakPulse 1.8s ease-out infinite;animation-delay:.9s}
    @keyframes barBreakPulse{0%{transform:translate(-50%,-50%) scale(0.6);opacity:1}100%{transform:translate(-50%,-50%) scale(2.4);opacity:0}}
    /* V14: celebration animations */
    @keyframes confettiFall{0%{transform:translateY(-20vh) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
    @keyframes celebPop{0%{opacity:0;transform:translate(-50%,-50%) scale(0.4)}40%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
    @keyframes celebFade{0%{opacity:1}85%{opacity:1}100%{opacity:0}}
    @keyframes levelRay{0%{transform:translate(-50%,-50%) scale(0.8) rotate(0);opacity:0}25%{opacity:0.9}100%{transform:translate(-50%,-50%) scale(3) rotate(60deg);opacity:0}}
    @keyframes streakFire{0%,100%{transform:scale(1) rotate(-2deg)}50%{transform:scale(1.1) rotate(2deg)}}

    /* V20 a11y P2: prefers-reduced-motion — disable non-essential motion */
    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important;scroll-behavior:auto!important}
      .celeb-overlay,.levelRay,.confetti,[class*="pulse"]{animation:none!important}
    }

    /* V14: celebration overlay */
    .celeb-overlay{position:fixed;inset:0;z-index:10006;pointer-events:none;animation:celebFade 2.2s ease forwards}
    .celeb-burst{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);animation:celebPop 0.6s var(--spring) both;display:flex;flex-direction:column;align-items:center;gap:8px}
    .celeb-emoji{font-size:96px;filter:drop-shadow(0 12px 40px rgba(228,178,92,0.6))}
    .celeb-title{font-family:var(--font-display);font-size:34px;font-weight:900;color:#fff;letter-spacing:-0.03em;text-shadow:0 4px 24px rgba(0,0,0,0.6);text-align:center}
    .celeb-sub{font-size:14px;font-weight:700;color:var(--accent-2);letter-spacing:0.06em;text-transform:uppercase;text-shadow:0 2px 10px rgba(0,0,0,0.5)}
    .celeb-breakdown{margin-top:10px;padding:10px 18px;border-radius:var(--r-pill);background:rgba(14,15,22,0.92);border:1px solid var(--border-strong);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);font-size:12px;font-weight:700;color:var(--text-secondary);display:flex;gap:10px;align-items:center}
    .celeb-breakdown span{color:var(--accent-2)}
    .confetti-piece{position:absolute;top:-20vh;width:8px;height:14px;border-radius:2px;animation:confettiFall 2.2s linear forwards}
    /* V14: level ring */
    .level-ray{position:absolute;top:50%;left:50%;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(228,178,92,0.9) 0%,rgba(228,178,92,0) 65%);animation:levelRay 1.4s ease forwards;pointer-events:none;z-index:-1}
    /* V14: streak chip */
    .streak-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--r-pill);background:linear-gradient(135deg,rgba(255,123,123,0.22),rgba(228,178,92,0.22));border:1px solid rgba(255,123,123,0.4);color:#ffe4b8;font-size:11px;font-weight:800;letter-spacing:0.04em;animation:streakFire 1.4s ease-in-out infinite}
    /* V14: XP progress bar in HUD */
    .xp-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:var(--r-pill);margin-top:6px;overflow:hidden;position:relative}
    .xp-fill{height:100%;background:linear-gradient(90deg,var(--foto),var(--accent));border-radius:var(--r-pill);transition:width .5s var(--ease-out);box-shadow:0 0 10px rgba(228,178,92,0.45)}
    .xp-marker{position:absolute;top:-2px;font-size:9px;color:var(--text-tertiary);font-weight:700}
    /* V14: countdown clock */
    .game-clock{position:fixed;top:max(8px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:101;padding:5px 12px;border-radius:var(--r-pill);background:rgba(14,15,22,0.95);border:1px solid var(--border-strong);backdrop-filter:blur(16px) saturate(1.3);-webkit-backdrop-filter:blur(16px) saturate(1.3);font-family:var(--font-display);font-size:11px;font-weight:800;color:var(--text-secondary);letter-spacing:0.04em;display:flex;align-items:center;gap:6px;box-shadow:var(--sh-md)}
    .game-clock.urgent{color:var(--video-2);border-color:rgba(255,123,123,0.4);animation:breathing 1.5s ease-in-out infinite}
    .animate-in{animation:fadeInPop .45s var(--spring) both}
    .animate-in-1{animation-delay:.04s}.animate-in-2{animation-delay:.09s}.animate-in-3{animation-delay:.14s}.animate-in-4{animation-delay:.19s}.animate-in-5{animation-delay:.24s}.animate-in-6{animation-delay:.29s}

    /* V13: Toast — floating pill */
    .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10002;animation:slideDown .35s var(--spring)}
    .toast-inner{padding:12px 22px;border-radius:var(--r-pill);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);background:rgba(228,178,92,0.14);border:1px solid rgba(228,178,92,0.28);font-weight:700;font-size:13px;white-space:nowrap;text-align:center;color:#fff;box-shadow:0 10px 30px rgba(0,0,0,0.45),var(--sh-ring)}

    /* V13: Score popup */
    .score-popup{position:fixed;top:38%;left:50%;transform:translateX(-50%);z-index:10003;font-family:var(--font-display);font-size:48px;font-weight:900;color:var(--accent-2);animation:scoreFloat 1.3s var(--ease-out) forwards;pointer-events:none;text-shadow:0 4px 28px rgba(228,178,92,0.55);letter-spacing:-0.04em}

    /* V13: Offline banner */
    .offline-banner{position:fixed;top:0;left:0;right:0;padding:7px;text-align:center;font-size:10px;font-weight:700;color:var(--danger);background:rgba(255,107,107,0.1);border-bottom:1px solid rgba(255,107,107,0.22);z-index:10001;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);letter-spacing:0.05em;text-transform:uppercase}
    .finale-pulse-banner{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 14px;background:linear-gradient(90deg,rgba(228,178,92,0.22),rgba(255,107,107,0.22),rgba(228,178,92,0.22));border-top:1px solid rgba(228,178,92,0.35);border-bottom:1px solid rgba(228,178,92,0.35);color:#fff;animation:finalePulse 1.6s ease-in-out infinite;text-align:center;flex-wrap:wrap}
    @keyframes finalePulse{0%,100%{box-shadow:inset 0 0 24px rgba(228,178,92,0.1);filter:brightness(1)}50%{box-shadow:inset 0 0 36px rgba(228,178,92,0.22);filter:brightness(1.15)}}

    /* V13: Bottom tab bar — floating pill */
    .tab-bar{position:fixed;bottom:max(10px,env(safe-area-inset-bottom));left:10px;right:10px;z-index:10000;backdrop-filter:blur(24px) saturate(1.5);-webkit-backdrop-filter:blur(24px) saturate(1.5);background:rgba(14,15,22,0.78);border:1px solid var(--border-strong);border-radius:var(--r-pill);display:flex;padding:6px;box-shadow:0 18px 40px rgba(0,0,0,0.5),var(--sh-ring)}
    @media (min-width:560px){.tab-bar{left:calc(50% - 200px);right:auto;width:400px}}
    /* V36 P1 fix (Sandra/Bart personas): WCAG 2.5.5 says 44x44 minimum touch target.
       padding:10px + 2 lines × ~14px combined = ~38-41px. Bumped to 12px padding + 11px font
       so the visible/hit-tappable surface is comfortably ≥44px even on small phones. */
    .tab-btn{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:12px 4px;background:none;border:none;color:var(--text-tertiary);font-size:11px;font-weight:600;cursor:pointer;transition:color .25s var(--ease-out),transform .3s var(--spring);letter-spacing:0.03em;text-transform:uppercase;position:relative;border-radius:var(--r-pill);-webkit-tap-highlight-color:transparent;min-height:44px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tab-btn .tab-icon{font-size:20px;transition:transform .35s var(--spring),filter .25s}
    .tab-btn.active{color:var(--accent)}
    .tab-btn.active::before{content:'';position:absolute;inset:4px;background:var(--accent-glow);border-radius:var(--r-pill);z-index:-1;animation:fadeInPop .3s var(--spring) both}
    .tab-btn.active .tab-icon{transform:scale(1.12) translateY(-1px);filter:drop-shadow(0 0 8px rgba(228,178,92,0.5))}
    .tab-btn:active{transform:scale(0.95)}
    .tab-badge{position:absolute;top:4px;right:22%;background:linear-gradient(135deg,#ff8787,#c94d4d);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:var(--r-pill);min-width:18px;text-align:center;box-shadow:0 2px 8px rgba(255,107,107,0.45)}

    /* V13: Bottom sheet — premium with grabber */
    .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:10000;animation:fadeInUp .25s var(--ease-out)}
    .sheet{position:fixed;bottom:0;left:0;right:0;max-height:88vh;overflow-y:auto;z-index:10001;background:linear-gradient(180deg,var(--bg-elev) 0%,var(--bg) 100%);border-top:1px solid var(--border-strong);border-radius:var(--r-2xl) var(--r-2xl) 0 0;padding:14px 20px 120px;animation:slideUp .4s var(--spring);box-shadow:0 -20px 60px rgba(0,0,0,0.5)}
    @media (min-width:560px){.sheet{max-width:520px;margin:0 auto;left:0;right:0}}
    .sheet-handle{width:44px;height:5px;background:rgba(255,255,255,0.18);border-radius:var(--r-pill);margin:0 auto 18px;transition:background .2s}
    .sheet-handle:hover{background:rgba(255,255,255,0.28)}

    /* V13: Challenge card */
    .ch-card{padding:18px;margin-bottom:12px;border-radius:var(--r-lg);background:linear-gradient(155deg,rgba(255,255,255,0.045),rgba(255,255,255,0.02));border:1px solid var(--border);transition:transform .25s var(--spring),border-color .2s,background .2s;box-shadow:var(--sh-ring)}
    .ch-card:not(.locked):not(.completed):not(.wrong-done):hover{transform:translateY(-2px);border-color:var(--border-strong)}
    .ch-card.completed{border-color:rgba(95,216,165,0.35);background:linear-gradient(155deg,rgba(95,216,165,0.08),rgba(95,216,165,0.02))}
    .ch-card.wrong-done{border-color:rgba(255,107,107,0.3);background:linear-gradient(155deg,rgba(255,107,107,0.06),rgba(255,107,107,0.015))}
    .ch-card.locked{opacity:0.45;filter:blur(0.5px) saturate(0.5);pointer-events:none;position:relative}
    .ch-type{display:inline-flex;align-items:center;padding:4px 10px;border-radius:var(--r-pill);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em}
    .ch-type-photo{background:rgba(110,163,255,0.15);color:var(--foto-2)}
    .ch-type-video{background:rgba(255,123,123,0.15);color:var(--video-2)}
    .ch-type-creative{background:rgba(95,216,165,0.15);color:var(--creatief-2)}
    .ch-type-quiz{background:rgba(178,155,255,0.15);color:var(--quiz-2)}
    .difficulty{color:var(--text-tertiary);font-size:11px;font-weight:600;letter-spacing:0.02em}.difficulty .star{color:var(--accent)}
    .points-badge{font-family:var(--font-display);font-size:14px;font-weight:800;color:var(--accent);letter-spacing:-0.02em}

    /* V13: Quiz options — big, confident */
    .quiz-option{display:flex;align-items:center;width:100%;padding:16px 18px;margin-bottom:8px;border-radius:var(--r-md);background:rgba(255,255,255,0.04);border:1.5px solid var(--border);color:var(--text-primary);font-size:15px;font-weight:500;cursor:pointer;text-align:left;transition:transform .2s var(--spring),background .2s,border-color .2s;font-family:var(--font-body);-webkit-tap-highlight-color:transparent;letter-spacing:-0.01em}
    .quiz-option:hover{background:var(--surface-hover);border-color:rgba(178,155,255,0.4);transform:translateY(-1px)}
    .quiz-option:active{transform:scale(0.98)}
    .quiz-option.correct{background:linear-gradient(135deg,rgba(95,216,165,0.18),rgba(95,216,165,0.08));border-color:var(--success);color:#fff;box-shadow:0 6px 20px rgba(95,216,165,0.25)}
    .quiz-option.wrong{background:linear-gradient(135deg,rgba(255,107,107,0.18),rgba(255,107,107,0.08));border-color:var(--danger);color:#fff;box-shadow:0 6px 20px rgba(255,107,107,0.25)}
    .quiz-option:disabled{pointer-events:none;cursor:not-allowed}

    /* V13: Leaderboard */
    .lb-card{padding:16px 18px;margin-bottom:10px;border-radius:var(--r-lg);display:flex;align-items:center;gap:14px;transition:transform .25s var(--spring),background .25s;position:relative;overflow:hidden;background:linear-gradient(155deg,rgba(255,255,255,0.045),rgba(255,255,255,0.02));border:1px solid var(--border);box-shadow:var(--sh-ring);min-height:64px}
    .lb-card:hover{transform:translateY(-2px);background:linear-gradient(155deg,rgba(255,255,255,0.07),rgba(255,255,255,0.03))}
    .lb-rank{font-family:var(--font-display);font-size:22px;font-weight:900;min-width:36px;text-align:center;letter-spacing:-0.05em}
    .lb-rank-1{color:var(--accent-2);text-shadow:0 0 20px rgba(228,178,92,0.4)}
    .lb-rank-2{color:#c4c4c4}
    .lb-rank-3{color:#cd9d77}
    .lb-rank-other{color:var(--text-tertiary)}
    .lb-emoji{font-size:32px;filter:drop-shadow(0 4px 10px rgba(0,0,0,0.35))}
    .lb-info{flex:1;min-width:0}
    .lb-name{font-family:var(--font-display);font-weight:700;font-size:15px;margin-bottom:3px;letter-spacing:-0.02em}
    .lb-stats{font-size:11px;color:var(--text-secondary);font-weight:500}
    .lb-score{font-family:var(--font-display);font-size:26px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-0.04em}
    .lb-first{background:linear-gradient(155deg,rgba(228,178,92,0.13),rgba(228,178,92,0.03));border-color:rgba(228,178,92,0.28);box-shadow:var(--sh-glow-gold),var(--sh-ring)}
    .lb-second{background:linear-gradient(155deg,rgba(196,196,196,0.09),rgba(196,196,196,0.02));border-color:rgba(196,196,196,0.22)}
    .lb-third{background:linear-gradient(155deg,rgba(205,157,119,0.09),rgba(205,157,119,0.02));border-color:rgba(205,157,119,0.22)}
    .lb-medal{font-size:18px;margin-right:4px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4))}

    /* V13: Nearby panel — floating premium cards */
    .nearby-panel{position:absolute;bottom:92px;left:12px;right:12px;z-index:1000;display:flex;flex-direction:column;gap:8px}
    .nearby-card{padding:14px 16px;border-radius:var(--r-lg);display:flex;align-items:center;gap:12px;cursor:pointer;backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);background:rgba(14,15,22,0.82);border:1px solid var(--border-strong);transition:transform .25s var(--spring),background .2s;box-shadow:var(--sh-md),var(--sh-ring);-webkit-tap-highlight-color:transparent}
    .nearby-card:hover{transform:translateY(-2px) scale(1.01)}
    .nearby-card:active{transform:scale(0.98)}
    .nearby-card:first-child{border-color:rgba(228,178,92,0.35);background:linear-gradient(155deg,rgba(228,178,92,0.14),rgba(14,15,22,0.82));box-shadow:var(--sh-glow-gold)}
    .nearby-indicator{width:4px;height:36px;border-radius:var(--r-pill);flex-shrink:0}
    .nearby-indicator.foto{background:var(--foto)}.nearby-indicator.quiz{background:var(--quiz)}.nearby-indicator.creatief{background:var(--creatief)}.nearby-indicator.video{background:var(--video)}
    .nearby-info{flex:1;min-width:0}
    .nearby-name{font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:-0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .nearby-tags{display:flex;gap:5px;margin-top:4px}
    .nearby-tag{font-size:9px;font-weight:700;padding:3px 8px;border-radius:var(--r-pill);letter-spacing:0.04em;text-transform:uppercase}
    .nearby-tag.t-foto{background:rgba(110,163,255,0.14);color:var(--foto-2)}.nearby-tag.t-quiz{background:rgba(178,155,255,0.14);color:var(--quiz-2)}.nearby-tag.t-creatief{background:rgba(95,216,165,0.14);color:var(--creatief-2)}.nearby-tag.t-video{background:rgba(255,123,123,0.14);color:var(--video-2)}
    .nearby-end{text-align:right;flex-shrink:0}
    .nearby-dist{font-family:var(--font-display);font-size:14px;font-weight:800;color:var(--text-primary);letter-spacing:-0.02em}
    .nearby-pts{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:0.04em;margin-top:2px}
    .nearby-chevron{font-size:20px;color:var(--text-tertiary);flex-shrink:0;margin-left:4px;transition:transform .25s var(--spring)}
    .nearby-card:hover .nearby-chevron{transform:translateX(3px);color:var(--text-primary)}

    /* V13: Secret mission banner */
    .secret-banner{margin:12px 0;padding:18px;border-radius:var(--r-lg);background:linear-gradient(135deg,rgba(178,155,255,0.12),rgba(255,123,123,0.07));border:1px solid rgba(178,155,255,0.25);cursor:pointer;transition:transform .25s var(--spring),box-shadow .25s;position:relative;overflow:hidden;box-shadow:var(--sh-ring)}
    .secret-banner:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(178,155,255,0.18),var(--sh-ring)}
    .secret-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 30%,rgba(178,155,255,0.15),transparent 50%);pointer-events:none}
    .secret-badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:var(--r-pill);font-size:10px;font-weight:800;background:rgba(178,155,255,0.25);color:var(--quiz-2);margin-bottom:10px;letter-spacing:0.08em;position:relative}

    /* V13: Bar break overlay */
    .barbreak-overlay{position:fixed;inset:0;z-index:10005;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(24px) saturate(1.3);-webkit-backdrop-filter:blur(24px) saturate(1.3);background:linear-gradient(135deg,rgba(10,11,16,0.94),rgba(228,178,92,0.08),rgba(10,11,16,0.94));animation:fadeInUp .3s var(--ease-out);padding:20px}
    .barbreak-card{max-width:420px;width:100%;padding:32px 28px;text-align:center;border-radius:var(--r-2xl);background:linear-gradient(155deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));border:1px solid var(--border-strong);box-shadow:var(--sh-lg),var(--sh-ring);animation:fadeInPop .5s var(--spring)}

    /* V13: Team setup */
    .emoji-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}
    .emoji-btn{padding:12px;font-size:28px;border-radius:var(--r-md);background:rgba(255,255,255,0.05);border:2px solid transparent;cursor:pointer;transition:transform .25s var(--spring),background .2s,border-color .2s;-webkit-tap-highlight-color:transparent}
    .emoji-btn:hover{background:rgba(110,163,255,0.12);transform:translateY(-2px)}
    .emoji-btn.selected{border-color:var(--foto);background:rgba(110,163,255,0.18);box-shadow:var(--sh-glow-blue);transform:scale(1.05)}
    .emoji-btn.taken{opacity:0.25;cursor:not-allowed;filter:grayscale(1)}
    .color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}
    .color-btn{width:100%;aspect-ratio:1;border-radius:var(--r-md);border:3px solid transparent;cursor:pointer;transition:transform .25s var(--spring),box-shadow .2s;-webkit-tap-highlight-color:transparent}
    .color-btn:hover{transform:translateY(-2px)}
    .color-btn.selected{border-color:#fff;transform:scale(1.1);box-shadow:0 8px 24px rgba(255,255,255,0.2)}

    /* V13: Phase indicator */
    .phase-bar{display:flex;gap:6px;margin:10px 0 4px}
    .phase-dot{flex:1;height:4px;border-radius:var(--r-pill);background:rgba(255,255,255,0.06);transition:background .4s var(--ease-out)}
    .phase-dot.active{background:linear-gradient(90deg,var(--accent),var(--accent-2));box-shadow:0 0 12px rgba(228,178,92,0.4)}
    .phase-dot.done{background:var(--success)}

    /* V13: Photo preview */
    .photo-preview{width:100%;max-height:200px;object-fit:cover;border-radius:var(--r-md);margin-top:12px;box-shadow:var(--sh-md)}

    /* === V5 ADDITIONS === */

    /* V13: Narrative modal */
    /* V30: .story-overlay / .story-card / .story-chapter / .story-title / .story-text removed with chapter-modal system */

    /* V13: Photo grid */
    .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
    .photo-grid-item{aspect-ratio:1;border-radius:var(--r-md);overflow:hidden;position:relative;cursor:pointer;background:rgba(255,255,255,0.04);transition:transform .25s var(--spring);box-shadow:var(--sh-ring)}
    .photo-grid-item:hover{transform:scale(1.03);z-index:1}
    .photo-grid-item img,.photo-grid-item video{width:100%;height:100%;object-fit:cover}
    .photo-grid-overlay{position:absolute;bottom:0;left:0;right:0;padding:6px 8px;background:linear-gradient(to top,rgba(0,0,0,0.88),transparent);font-size:10px;font-weight:700;color:#fff;display:flex;justify-content:space-between;align-items:end}
    .photo-lightbox{position:fixed;inset:0;z-index:10020;background:rgba(0,0,0,0.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;animation:fadeInUp .25s var(--ease-out)}
    .photo-lightbox img,.photo-lightbox video{max-width:100%;max-height:75vh;border-radius:var(--r-lg);box-shadow:var(--sh-lg)}
    .photo-lightbox-close{position:absolute;top:24px;right:24px;background:rgba(255,255,255,0.12);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border-strong);color:#fff;width:44px;height:44px;border-radius:var(--r-pill);font-size:22px;cursor:pointer;transition:transform .25s var(--spring),background .2s}
    .photo-lightbox-close:hover{background:rgba(255,255,255,0.2);transform:scale(1.08)}

    /* V13: Starter packs — premium card */
    .starter-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
    .starter-card{padding:20px 16px;border-radius:var(--r-lg);background:linear-gradient(155deg,rgba(255,255,255,0.045),rgba(255,255,255,0.015));border:2px solid var(--border);cursor:pointer;transition:transform .3s var(--spring),border-color .25s,box-shadow .25s,background .25s;text-align:center;box-shadow:var(--sh-ring);position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
    .starter-card:hover{transform:translateY(-3px);background:linear-gradient(155deg,rgba(255,255,255,0.075),rgba(255,255,255,0.025));box-shadow:var(--sh-md),var(--sh-ring)}
    .starter-card:active{transform:scale(0.97)}
    /* V41 P0 fix (Mike's iPhone real-device test): the V34 P0 comment in the JSX says
       "Bezet card now triggers joinExistingTeam" — but this CSS rule's pointer-events:none
       made BOTH 'taken' (joinable, another team already grabbed it) AND 'locked' (4/4 cap)
       cards unclickable. Mike couldn't join an existing team on iPhone for the upload test.
       Now: .taken stays visually grayed but tappable so onClick fires joinExistingTeam.
       Only truly-blocked .locked cards get pointer-events:none. */
    .starter-card.taken{opacity:0.45;filter:grayscale(0.3)}
    .starter-card.locked{opacity:0.3;pointer-events:none;filter:grayscale(0.4);cursor:default}
    .starter-card:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
    .starter-edit-btn{position:absolute;top:6px;right:6px;width:28px;height:28px;min-width:28px;min-height:28px;padding:0;border-radius:var(--r-pill);border:1px solid var(--border);background:rgba(20,22,32,0.65);color:#fff;font-size:12px;line-height:1;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);opacity:0.55;transition:opacity .2s,transform .2s var(--spring);-webkit-tap-highlight-color:transparent;z-index:2}
    .starter-edit-btn:hover{opacity:1;transform:scale(1.08)}
    .starter-edit-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;opacity:1}
    .starter-emoji{font-size:40px;margin-bottom:10px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.3));transition:transform .3s var(--spring)}
    .starter-card:hover .starter-emoji{transform:scale(1.08)}
    .starter-name{font-family:var(--font-display);font-size:14px;font-weight:800;color:var(--text-primary);letter-spacing:-0.02em}
    .starter-color{width:40px;height:4px;border-radius:var(--r-pill);margin:10px auto 0}

    /* V13: GPS status pill */
    .gps-pill{position:absolute;top:14px;left:14px;z-index:1000;padding:8px 14px;border-radius:var(--r-pill);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);background:rgba(14,15,22,0.78);border:1px solid var(--border-strong);font-size:11px;font-weight:700;color:var(--text-secondary);display:flex;align-items:center;gap:8px;letter-spacing:0.03em;box-shadow:var(--sh-md);-webkit-tap-highlight-color:transparent;transition:transform .25s var(--spring)}
    .gps-pill:active{transform:scale(0.95)}
    .gps-dot{width:8px;height:8px;border-radius:var(--r-pill)}
    .gps-dot.good{background:var(--success);animation:pulse 2.2s infinite;box-shadow:0 0 10px rgba(95,216,165,0.6)}
    .gps-dot.weak{background:var(--accent);animation:breathing 1.8s infinite}
    .gps-dot.sleep{background:var(--text-tertiary)}
    .gps-pill .snap-btn{margin-left:4px;padding:4px 10px;border-radius:var(--r-pill);background:rgba(110,163,255,0.18);border:1px solid rgba(110,163,255,0.35);color:var(--foto-2);font-size:10px;font-weight:700;cursor:pointer}

    /* V13: Story ticker */
    /* V30: .story-ticker removed with chapter-modal system */

    /* V13: Activity row */
    .activity-row{padding:14px 16px;margin-bottom:10px;border-radius:var(--r-lg);background:linear-gradient(155deg,rgba(255,255,255,0.04),rgba(255,255,255,0.015));border:1px solid var(--border);transition:background .2s;box-shadow:var(--sh-ring)}
    .activity-row:hover{background:linear-gradient(155deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02))}
    .activity-photo{width:100%;max-height:260px;object-fit:cover;border-radius:var(--r-md);margin-top:12px;cursor:pointer;box-shadow:var(--sh-md);transition:transform .25s var(--spring)}
    .activity-photo:hover{transform:scale(1.01)}

    /* === V6 ADDITIONS === */

    /* V13: Photo gate */
    .gate-blocked{margin-top:14px;padding:16px;border-radius:var(--r-md);background:linear-gradient(155deg,rgba(255,107,107,0.1),rgba(255,107,107,0.03));border:1px solid rgba(255,107,107,0.25);display:flex;align-items:center;gap:12px;box-shadow:var(--sh-ring)}
    .gate-icon{font-size:26px;filter:drop-shadow(0 2px 8px rgba(255,107,107,0.4))}
    .gate-text{flex:1;font-size:13px;color:var(--danger);font-weight:700}
    .gate-distance{font-family:var(--font-display);font-size:20px;font-weight:900;color:var(--danger);font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
    .gate-hint{font-size:11px;color:var(--text-secondary);font-weight:500;margin-top:3px}

    /* V13: Admin review queue */
    .review-card{padding:16px;margin-bottom:12px;border-radius:var(--r-lg);background:linear-gradient(155deg,rgba(255,255,255,0.045),rgba(255,255,255,0.015));border:1px solid rgba(228,178,92,0.18);box-shadow:var(--sh-ring);transition:transform .25s var(--spring)}
    .review-card:hover{transform:translateY(-1px)}
    .review-photo{width:100%;max-height:280px;object-fit:cover;border-radius:var(--r-md);margin:10px 0;box-shadow:var(--sh-md)}
    .review-meta{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:12px;color:var(--text-secondary);font-weight:500}
    .review-actions{display:flex;gap:8px;margin-top:12px}
    .review-actions .btn{flex:1;min-height:44px;font-size:13px}
    .review-dist-good{color:var(--success);font-weight:800}
    .review-dist-warn{color:var(--accent);font-weight:800}
    .review-dist-bad{color:var(--danger);font-weight:800}
    .review-badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:var(--r-pill);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em}
    .review-badge-pending{background:rgba(228,178,92,0.18);color:var(--accent)}
    .review-badge-approved{background:rgba(95,216,165,0.18);color:var(--success)}
    .review-badge-rejected{background:rgba(255,107,107,0.18);color:var(--danger)}

    /* V13: Provisional score badge */
    .provisional-badge{display:inline-flex;align-items:center;margin-left:8px;padding:3px 9px;border-radius:var(--r-pill);font-size:10px;font-weight:800;background:rgba(228,178,92,0.2);color:var(--accent-2);letter-spacing:0.03em}

    /* V13: Tier badge + unlock popup */
    /* V18 audit-fix: drop margin-left — parent `.lb-name` now uses `gap:var(--sp-2)` so margin would double-space */
    .tier-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:var(--r-pill);background:var(--surface);border:1px solid var(--border);font-size:10px;font-weight:800;letter-spacing:0.04em;text-transform:uppercase}
    .tier-badge .tier-emoji{font-size:14px}
    .tier-unlock-popup{position:fixed;top:28%;left:50%;transform:translateX(-50%);z-index:10004;padding:30px 40px;border-radius:var(--r-2xl);backdrop-filter:blur(28px) saturate(1.4);-webkit-backdrop-filter:blur(28px) saturate(1.4);background:rgba(14,15,22,0.95);border:1px solid var(--border-strong);text-align:center;animation:fadeInPop .5s var(--spring);box-shadow:0 20px 60px rgba(228,178,92,0.3),var(--sh-ring)}
    .tier-unlock-emoji{font-size:72px;margin-bottom:16px;animation:float 2.2s ease-in-out infinite;filter:drop-shadow(0 6px 20px rgba(228,178,92,0.5))}
    .tier-unlock-title{font-size:11px;color:var(--accent);font-weight:900;letter-spacing:0.2em;margin-bottom:8px}
    .tier-unlock-name{font-family:var(--font-display);font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--accent-2),var(--video-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.03em}

    /* V13: Next-reward banner */
    .reward-card{margin:10px 0 14px;padding:14px 16px;border-radius:var(--r-lg);background:linear-gradient(135deg,rgba(110,163,255,0.08),rgba(178,155,255,0.06));border:1px solid rgba(110,163,255,0.2);display:flex;align-items:center;gap:14px;box-shadow:var(--sh-ring)}
    .reward-icon{font-size:28px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.25))}
    .reward-info{flex:1;min-width:0}
    .reward-label{font-size:10px;color:var(--text-tertiary);font-weight:800;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:3px}
    .reward-target{font-family:var(--font-display);font-size:14px;color:var(--text-primary);font-weight:700;letter-spacing:-0.01em}
    .reward-progress{width:100%;height:5px;background:rgba(255,255,255,0.05);border-radius:var(--r-pill);margin-top:8px;overflow:hidden}
    .reward-progress-fill{height:100%;background:linear-gradient(90deg,var(--foto),var(--quiz));border-radius:var(--r-pill);transition:width .5s var(--ease-out);box-shadow:0 0 10px rgba(110,163,255,0.5)}

    /* V13: Reactions */
    .reactions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
    .reaction-btn{padding:5px 12px;border-radius:var(--r-pill);background:var(--surface);border:1px solid var(--border);color:var(--text-secondary);font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:transform .2s var(--spring),background .2s,border-color .2s;font-family:inherit;-webkit-tap-highlight-color:transparent}
    .reaction-btn:hover{background:var(--surface-hover);border-color:var(--border-strong);transform:translateY(-1px)}
    .reaction-btn:active{transform:scale(0.92)}
    .reaction-btn.my{background:var(--accent-glow);border-color:rgba(228,178,92,0.35);color:var(--accent-2)}
    .reaction-count{font-size:11px;color:var(--text-tertiary);font-weight:800}

    /* V13: Filter pills */
    .filter-pills{display:flex;gap:8px;overflow-x:auto;padding:4px 0 14px;scrollbar-width:none}
    .filter-pills::-webkit-scrollbar{display:none}
    .filter-pill{padding:8px 14px;border-radius:var(--r-pill);background:var(--surface);border:1px solid var(--border);color:var(--text-secondary);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;transition:transform .2s var(--spring),background .2s,border-color .2s;-webkit-tap-highlight-color:transparent}
    .filter-pill:hover{background:var(--surface-hover);border-color:var(--border-strong)}
    .filter-pill:active{transform:scale(0.95)}
    .filter-pill.active{background:var(--accent-glow);border-color:rgba(228,178,92,0.35);color:var(--accent-2)}

    /* V13: Section labels */
    .section-label{font-size:10px;color:var(--text-secondary);font-weight:800;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:10px}

    /* V25 (#71): two-radius task discovery — band pill, two-ring mini-map, task rows */
    .band-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:var(--r-pill);font-size:11px;font-weight:800;letter-spacing:0.05em;text-transform:uppercase;white-space:nowrap}
    .band-pill.unlock{background:rgba(95,216,165,0.18);color:var(--creatief-2);border:1px solid rgba(95,216,165,0.4)}
    .band-pill.preview{background:rgba(228,178,92,0.16);color:var(--accent-2);border:1px solid rgba(228,178,92,0.4);animation:bandWarm 2s ease-in-out infinite}
    .band-pill.far{background:rgba(255,255,255,0.04);color:var(--text-tertiary);border:1px solid var(--border)}
    @keyframes bandWarm{0%,100%{box-shadow:0 0 0 0 rgba(228,178,92,0.55)}50%{box-shadow:0 0 0 6px rgba(228,178,92,0)}}
    .two-ring{flex-shrink:0;width:100px;height:100px}
    .two-ring svg{display:block}
    .two-ring .ring-preview{fill:none;stroke:rgba(228,178,92,0.35);stroke-width:1.5;stroke-dasharray:4 3}
    .two-ring .ring-unlock{fill:rgba(95,216,165,0.08);stroke:rgba(95,216,165,0.6);stroke-width:1.5}
    .two-ring .ring-target{fill:#e4b25c}
    .two-ring .ring-me{fill:#6ea3ff;stroke:#fff;stroke-width:1.5}
    .task-row{display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:6px;border-radius:var(--r-md);background:linear-gradient(155deg,rgba(255,255,255,0.045),rgba(255,255,255,0.015));border:1px solid var(--border);cursor:pointer;transition:transform .2s var(--spring),border-color .2s,background .2s;-webkit-tap-highlight-color:transparent}
    .task-row:hover{transform:translateY(-1px);border-color:var(--border-strong)}
    .task-row:focus-visible{outline:2px solid var(--accent-2);outline-offset:2px}
    .task-row.unlock{border-color:rgba(95,216,165,0.45);background:linear-gradient(155deg,rgba(95,216,165,0.1),rgba(95,216,165,0.02))}
    .task-row.preview{border-color:rgba(228,178,92,0.35)}
    .task-row.far{opacity:0.82}
    .task-row.completed{opacity:0.55;filter:grayscale(0.4)}
    .task-row-emoji{font-size:22px;flex-shrink:0;width:28px;text-align:center}
    .task-row-body{flex:1;min-width:0;display:flex;flex-direction:column}
    .task-row-name{font-size:13px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .task-row-meta{font-size:10px;color:var(--text-tertiary);margin-top:1px;letter-spacing:0.02em}
    .task-row-chevron{color:var(--text-tertiary);font-size:18px;flex-shrink:0;padding-right:2px}
    .task-group-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-tertiary);margin:14px 0 8px;padding-left:2px}
    .task-group-label.unlock{color:var(--creatief-2)}
    .task-group-label.preview{color:var(--accent-2)}
    /* ═══ V38: FLIPPERCOIN · V39 polish: extruded 3D gold token (40 stacked slices) on casino felt ═══ */
    .flipcoin-stage{text-align:center;padding:var(--sp-7) var(--sp-4) var(--sp-6);border-radius:var(--r-lg);background:
      /* casino felt — emerald + subtle radial spotlight */
      radial-gradient(ellipse at 50% 35%,rgba(255,235,170,0.10),transparent 55%),
      radial-gradient(ellipse at 50% 100%,rgba(0,0,0,0.30),transparent 60%),
      repeating-radial-gradient(circle at 12% 18%,rgba(255,255,255,0.012) 0,rgba(255,255,255,0.012) 1px,transparent 1px,transparent 3px),
      linear-gradient(170deg,#0e2f23 0%,#0a2018 100%);
      border:1px solid rgba(228,178,92,0.18);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.04),inset 0 -40px 80px rgba(0,0,0,0.45);
      margin-bottom:var(--sp-5);overflow:hidden;position:relative}
    .flipcoin-mystery{display:flex;gap:var(--sp-3);margin:var(--sp-5) 0}
    .flipcoin-mystery-card{flex:1;padding:var(--sp-5) var(--sp-3);border-radius:var(--r-md);background:rgba(255,255,255,0.03);border:1px solid var(--border);text-align:center;position:relative;overflow:hidden}
    .flipcoin-mystery-card::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(255,255,255,0.015) 8px,rgba(255,255,255,0.015) 16px)}
    .flipcoin-mystery-icon{font-size:var(--fs-30);margin-bottom:var(--sp-2);filter:blur(4px);opacity:0.5}
    .flipcoin-mystery-label{font-size:var(--fs-11);color:var(--text-tertiary);font-weight:var(--fw-semi);letter-spacing:var(--ls-wide)}
    .flipcoin-btn{display:inline-flex;align-items:center;gap:var(--sp-2);padding:var(--sp-4) var(--sp-7);border:none;border-radius:var(--r-pill);background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;font-family:var(--font-display);font-size:var(--fs-15);font-weight:var(--fw-bold);cursor:pointer;transition:all .2s var(--spring);box-shadow:var(--sh-glow-gold);letter-spacing:var(--ls-snug)}
    .flipcoin-btn:active{transform:scale(0.95)}
    .flipcoin-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    /* ─── V39 premium: extruded coin in deep perspective ─── */
    .flipcoin-anim{width:200px;height:200px;margin:var(--sp-4) auto var(--sp-7);perspective:1600px;position:relative}
    /* Ground shadow — scales inversely with toss height for fake depth */
    .flipcoin-shadow{position:absolute;left:50%;bottom:-30px;width:160px;height:24px;margin-left:-80px;border-radius:50%;background:radial-gradient(ellipse,rgba(0,0,0,0.65),rgba(0,0,0,0.22) 55%,transparent 75%);filter:blur(3px);transform-origin:center;animation:coinShadow 2.5s var(--ease-out) forwards;will-change:transform,opacity}
    .flipcoin-coin{width:100%;height:100%;position:relative;transform-style:preserve-3d;will-change:transform}
    .flipcoin-coin.flipping{animation:coinFlip 2.5s cubic-bezier(0.22,0.61,0.36,1) forwards}
    .flipcoin-coin.landed-video{animation:coinFlipVideo 2.5s cubic-bezier(0.22,0.61,0.36,1) forwards}
    /* V39+: settled state — coin sits showing the result, with glow pulse + tiny breathing scale */
    .flipcoin-coin.settled{animation:coinSettled 1.5s ease-in-out infinite alternate}
    .flipcoin-coin.settled.photo{filter:drop-shadow(0 12px 28px rgba(0,0,0,0.6)) drop-shadow(0 0 22px rgba(110,163,255,0.45))}
    .flipcoin-coin.settled.video{filter:drop-shadow(0 12px 28px rgba(0,0,0,0.6)) drop-shadow(0 0 22px rgba(255,123,123,0.45))}
    /* V39 premium — extruded edge: 40 thin slices stacked along Z to form a physical rim band.
       Even slices use a brighter gold (peak of the milled "reed"), odd slices a darker recess. */
    .flipcoin-slice{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 50%,#f0c373 0%,#d4a341 60%,#a07820 100%);box-shadow:inset 0 0 0 2px #6d5212;will-change:transform}
    .flipcoin-slice.dark{background:radial-gradient(circle at 50% 50%,#a07820 0%,#7a5a18 60%,#4d3a10 100%);box-shadow:inset 0 0 0 2px #2e2208}
    /* Coin face cap — gold metallic with rim, scallop notches, sheen, embossed icon slot.
       Pushed forward/back along Z so the slices form the cylinder between them. */
    .flipcoin-face{position:absolute;inset:0;border-radius:50%;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;background:
      /* sheen highlight top-left */
      radial-gradient(circle at 30% 28%,rgba(255,255,255,0.55) 0%,rgba(255,255,255,0) 28%),
      /* rim color band */
      radial-gradient(circle at 50% 50%,#fbe27a 0%,#f0c373 38%,#d4a341 56%,#a07820 78%,#6d5212 100%);
      box-shadow:
        /* outer crisp rim */
        inset 0 0 0 4px #8c6a1f,
        inset 0 0 0 5px rgba(255,234,160,0.55),
        /* inner relief */
        inset 0 6px 14px rgba(255,255,255,0.30),
        inset 0 -8px 16px rgba(80,55,10,0.55),
        /* outside cast shadow + golden glow */
        0 8px 22px rgba(0,0,0,0.55),
        0 0 30px rgba(255,200,80,0.30)}
    .flipcoin-face-front{transform:translateZ(30px)}
    .flipcoin-face-back{transform:translateZ(-30px) rotateY(180deg)}
    /* V39+: specular sheen sweep removed — it tracked independently of the coin's rotation
       and read as a separate light bar swirling around the coin, breaking the 3D illusion. */
    /* ─── V39+ celebration layer ─── */
    /* CoinBurst — sparks emitted FROM the coin face at landing. Each spark uses its own
       --angle (deg) and --dist (px) to fan outward in a 360° pattern with gravity pull. */
    .flipcoin-burst{position:absolute;inset:50% 0 0 50%;width:0;height:0;pointer-events:none;z-index:2}
    .flipcoin-spark{position:absolute;left:0;top:0;width:8px;height:8px;margin-left:-4px;margin-top:-4px;border-radius:50%;opacity:0;will-change:transform,opacity;animation:coinSpark 1100ms cubic-bezier(0.16,0.84,0.44,1) forwards}

      0%{opacity:0;transform:translate(0,0) scale(0.4)}
      8%{opacity:1;transform:translate(calc(cos(var(--angle)) * 14px),calc(sin(var(--angle)) * 14px)) scale(1.1)}

  // V41.6 (F-2 fix, deep-audit 2026-05-16): register a service worker so a hard
  // reload while offline doesn't produce a blank page. The SW caches index.html
  // network-first and serves offline.html when both fail. iOS Safari has supported
  // service workers since 11.3 (2018). Skip on http: scheme (local dev without TLS).
  if('serviceWorker' in navigator && location.protocol === 'https:') {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch((e) => {
        // Non-fatal — the app still works without the SW, just no offline fallback.
        console.warn('SW registration failed:', e.message);
      });
    });
  }
</script>

// mission monopoly. Live gameday risk: medium — Mike is admin, he's reliable,
// but power-bank dies / phone reset would hit this hole.
// Fix: a SOFT auto-rotate fallback that fires only when ALL of these hold:
//   1. game is running (phase >= 1, not ended)
//   2. NO bar break currently active (so we don't double-trigger with V19's

// (~60-90 min real time, ~5-10 min compressed) so normal play never sees it
// fire. It only kicks in when the admin lifecycle has stalled.

// V14: Team level system (B2) — 6 levels during a 4-hour game
// Thresholds are SCORE-based, not challenges. Balance: first level reachable in ~10 min.
const TEAM_LEVELS=[
  {level:1, min:0,   name:'Rekruut',    emoji:'🥚', unlock:null},
  {level:2, min:25,  name:'Zoeker',     emoji:'🔍', unlock:'👁 Peek — zie 1 letter van volgende quiz-antwoord'},
  {level:3, min:75,  name:'Ontdekker',  emoji:'🧭', unlock:'👻 Extra Ghost charge ontgrendeld'},
  {level:4, min:150, name:'Jager',      emoji:'🏹', unlock:'⚡ Double Down — volgende opdracht telt dubbel'},
  {level:5, min:250, name:'Veteraan',   emoji:'🛡️', unlock:'🎨 Eigen teamkleur-banner'},
  {level:6, min:400, name:'Legende',    emoji:'👑', unlock:'🎯 Nominatie — kies een rival-team\'s shot-straf'},
];
function levelFor(score){
  let cur=TEAM_LEVELS[0];
  for(const l of TEAM_LEVELS){if(score>=l.min)cur=l;}
  return cur;
}
function nextLevel(score){
  return TEAM_LEVELS.find(l=>l.min>score)||null;
}

// Tier badges based on completed challenges
// V20 balance tuning: Legende threshold raised 20 → 25. 20 was too easily
// reachable by a bonus-quiz grinder; 25 requires genuine location coverage.
const TIER_BADGES=[
  {min:25, badge:'🏆', name:'Legende', color:'var(--accent)'},
  {min:15, badge:'🥇', name:'Goud',    color:'var(--accent)'},
  {min:10, badge:'🥈', name:'Zilver',  color:'#c0c0c0'},
  {min:5,  badge:'🥉', name:'Brons',   color:'#cd7f32'},
];
function tierFor(challengeCount){
  return TIER_BADGES.find(t => challengeCount >= t.min) || null;
}
function nextTier(challengeCount){
  // Highest tier whose min is greater than current count
  const upcoming=[...TIER_BADGES].reverse().find(t => t.min > challengeCount);
  return upcoming || null;
}

// V5.1 HOTFIX: iOS detection — DeviceMotion requires explicit permission on iOS 13+
// Without that permission, accelerometer events never fire and GPS sleep never wakes.
// On iOS we skip the sleep logic entirely (GPS stays always-on, same as V4).
const IS_IOS=/iPhone|iPad|iPod/i.test(navigator.userAgent)||
  (navigator.userAgent.includes('Mac')&&'ontouchend' in document);
// Motion-based sleep only works when DeviceMotion fires without a permission prompt.
// iOS 13+ exposes DeviceMotionEvent.requestPermission — treat that as "not available".
const MOTION_AVAILABLE=typeof DeviceMotionEvent!=='undefined'&&
  typeof DeviceMotionEvent.requestPermission!=='function'&&!IS_IOS;

{id:22,n:"Marten Toonder",la:51.919729,lo:4.488082,e:"🐻",c:"art",r:15,ch:[{t:"photo",ti:"Bankje bij Bommel",d:"Team gaat samen op het bankje bij het standbeeld van Marten Toonder aan de Oude Haven zitten. Iedereen kijkt in exact dezelfde richting — hoofden gelijkvormig, relaxte houding. Standbeeld op de achtergrond. Eén cool groepsmoment.",p:20,df:"easy"}]},
{id:23,n:"Kabouter Buttplug",la:51.917066,lo:4.473353,e:"🎅",c:"art",r:15,ch:[
  {t:"photo",ti:"Uitnodiging voor de Kabouter",d:"Één teamlid buigt voorover met hoofd volledig naar de grond, kont omhoog, en probeert beide enkels vast te pakken — een uitnodigende pose richting Santa Claus. Team staat eromheen als enthousiast publiek. Kunstwerk op de achtergrond. Iedereen in beeld.",p:25,df:"medium"},
  {t:"quiz",ti:"Buttplug Quiz",d:"Hoe heet dit Paul McCarthy-kunstwerk officieel?",a:"Santa Claus",o:["Santa Claus","Sinterklaas","Christmas Gnome","Christmas Tree"],p:20,df:"easy"}]},
{id:24,n:"Fikkie de Hond",la:51.9162,lo:4.4771,e:"🐕",c:"art",r:10,ch:[{t:"photo",ti:"Fikkie's Gezinsfoto",d:"Team knielt in een kring rondom Fikkie de Hond — als een blije gezinsfoto. Iedereen dicht bij Fikkie, brede lach, armen om elkaars schouders. Fikkie centraal in beeld.",p:20,df:"easy"}]},
{id:25,n:"L'Homme qui Marche",la:51.917633,lo:4.472299,e:"🚶",c:"art",r:15,ch:[{t:"video",ti:"Tijd Staat Stil",d:"Loop met minimaal 2 teamleden synchroon — zelfde stapgrootte, zelfde tempo — links en rechts naast L'Homme qui Marche aan de Westersingel. Op het moment dat jullie het beeld bereiken: bevries in exact dezelfde pose als het beeld, stalen gezicht, minimaal 5 seconden. Film de aanloop én het bevroren moment. Iedereen in beeld.",p:30,df:"medium"}]},
{id:26,n:"Sylvette (Picasso)",la:51.9149,lo:4.4735,e:"🎨",c:"art",r:10,ch:[{t:"quiz",ti:"Sylvette Quiz",d:"Welke kunstenaar ontwierp het Sylvette-beeld aan de Westersingel?",a:"Pablo Picasso",o:["Pablo Picasso","Henri Matisse","Salvador Dali","Carl Nesjar"],p:20,df:"medium"}]},
{id:27,n:"Cascade (Van Lieshout)",la:51.9178,lo:4.4800,e:"🎪",c:"art",r:20,ch:[{t:"photo",ti:"Cascade Klimmer",d:"Klim in of op de Cascade van Atelier Van Lieshout aan de Westersingel — de stapel vaten en vormen is groot genoeg. Eén teamlid neemt positie in tussen de sculptuur, leunt er tegenaan of klimt erin, en poseert alsof het de normaalste zaak ter wereld is. Rest van het team staat op de grond en kijkt toe. Kunstwerk én teamlid duidelijk in beeld.",p:25,df:"medium"}]},
{id:28,n:"Make It Happen Mural",la:51.9149,lo:4.4789,e:"🎨",c:"art",r:10,ch:[{t:"photo",ti:"Make It Happen",d:"De groene Make It Happen-mural van Daan Botlek heeft ijzeren treden die uit de muur steken — gebruik ze. Minstens één teamlid klimt op de treden en matcht de pose van één van de geschilderde figuren zo nauwkeurig mogelijk. Foto van recht vooruit zodat het teamlid opgaat in de mural. Rest van het team fotografeert of kijkt toe.",p:30,df:"medium"}]},
{id:29,n:"ZOHO Letters",la:51.9290,lo:4.4765,e:"🔤",c:"art",r:20,ch:[{t:"photo",ti:"Rondje bij Reijngoud",d:"Brewpub Reijngoud staat pal tegenover het ZOHO-bord. Loop naar binnen en bestel als team een rondje bier. Foto met heel team met de glazen omhoog — proost op Jorik. Brewpub-interieur of -gevel op de achtergrond.",p:25,df:"easy"}]},
{id:30,n:"Maritiem Museum",la:51.917627,lo:4.481887,e:"⚓",c:"culture",r:15,ch:[
  {t:"video",ti:"Zoek het Paard",d:"Zoek het paard in de buurt van het Maritiem Museum. Sta er met minstens één teamlid naast en neem een video op: geef Jorik één huwelijksadvies in de vorm van een Nederlands spreekwoord met een paard erin — bijv. 'Zet de kar niet voor het paard' of 'Een gegeven paard kijk je niet in de bek.' Hoe dramatischer de levering, hoe beter. Paard zichtbaar in beeld.",p:30,df:"medium"},
  {t:"quiz",ti:"Maritiem Kennis",d:"Rotterdam is de grootste haven van Europa. Welke plek wereldwijd?",a:"Top 10",o:["Top 10","Top 3","Nummer 1","Top 20"],p:25,df:"medium"}]},
{id:31,n:"Kunsthal",la:51.910803,lo:4.473427,e:"🖼️",c:"culture",r:20,ch:[{t:"quiz",ti:"Kunsthal Quiz",d:"Wie ontwierp de Kunsthal Rotterdam?",a:"Rem Koolhaas",o:["Rem Koolhaas","Renzo Piano","Norman Foster","Piet Blom"],p:20,df:"medium"}]},
{id:32,n:"Depot Boijmans",la:51.913803,lo:4.471221,e:"🪞",c:"culture",r:15,ch:[
  {t:"photo",ti:"Boyband Depot",d:"Epische boyband-foto voor de spiegelende gevel van het Depot Boijmans. Heel team staat in een rij, armen over elkaar, stalen blik in de lens. Niemand lacht. De reflectie in de gevel telt mee als extra lid. Allemaal in beeld.",p:25,df:"easy"},
  {t:"quiz",ti:"Depot Feit",d:"In welk jaar opende het Depot Boijmans Van Beuningen?",a:"2021",o:["2021","2018","2015","2023"],p:20,df:"medium"}]},
{id:33,n:"Wereldmuseum",la:51.9079,lo:4.4804,e:"🌍",c:"culture",r:15,ch:[{t:"video",ti:"Wensen voor Jorik & Katinka",d:"Verzamel 3 huwelijks- of liefdewensen voor Jorik en Katinka van toeristen of locals bij het Wereldmuseum. Vraag altijd eerst toestemming. Film elke wens apart — in de eigen taal van de wenser. Alle drie de clips inleveren.",p:35,df:"hard"}]},
{id:34,n:"Nieuwe Instituut",la:51.914708,lo:4.471158,e:"📐",c:"culture",r:15,ch:[{t:"quiz",ti:"Nieuwe Instituut Quiz",d:"Wat is de functie van het Nieuwe Instituut in Rotterdam?",a:"Nationaal museum voor architectuur en design",o:["Nationaal museum voor architectuur en design","Gemeentearchief Rotterdam","Museum voor moderne kunst","Filmmuseum"],p:15,df:"easy"}]},
{id:36,n:"Mariniersmuseum",la:51.918716,lo:4.491564,e:"🎖️",c:"culture",r:15,ch:[{t:"video",ti:"Marinier Selectie",d:"Bewijs dat jullie sterk genoeg zijn voor het Korps Mariniers: twee teamleden doen elk 20 push-ups voor het Mariniersmuseum aan de Wijnhaven. Het team telt luidop mee. Alleen de sterksten worden geselecteerd. Film de hele uitdaging van begin tot finish. Iedereen in beeld.",p:30,df:"medium"}]},
{id:37,n:"Witte de Withstraat",la:51.915524,lo:4.476784,e:"🎨",c:"street",r:20,ch:[
  {t:"video",ti:"Aanzoek bij de Ekster",d:"Vind de ekster met de trouwring op de Witte de Withstraat. Reconstrueer het huwelijksaanzoek van Jorik: één teamlid gaat op één knie voor een ander teamlid die Katinka speelt, en doet het aanzoek zo oprecht mogelijk na. De ekster is de stille getuige. Film van aanloop tot antwoord. Iedereen in beeld.",p:35,df:"medium"},
  {t:"video",ti:"Getrouwd man gezocht",d:"Zoek een getrouwde man op een van de terrassen van de Witte de Withstraat. Vraag toestemming om te filmen. Stel hem één vraag: 'Wat is jouw beste advies voor een bruidegom?' Film zijn volledige antwoord. Teamleden hoeven niet in beeld — maar mag uiteraard wel.",p:35,df:"hard"}]},
{id:40,n:"West-Kruiskade",la:51.9215,lo:4.4694,e:"🌍",c:"landmark",r:15,ch:[{t:"quiz",ti:"Rotterdam Smeltpot",d:"Rotterdam is een van de meest diverse steden ter wereld. Hoeveel verschillende nationaliteiten telt de stad anno 2025 (circa)?",a:"174",o:["174","92","210","138"],p:20,df:"medium"}]},
{id:41,n:"Schouwburgplein",la:51.921601,lo:4.473352,e:"🎭",c:"square",r:25,ch:[
  {t:"video",ti:"Koprol op het Kunstgras",d:"Het Schouwburgplein heeft kunstgras — gebruik het. Minstens één teamlid doet een volledige koprol op het gras en wordt gefilmd. Hoe dramatischer de aanloop en landing, hoe beter. Rest van het team kijkt toe of filmt.",p:25,df:"medium"},

{id:42,n:"Westersingel",la:51.919900,lo:4.471450,e:"🦆",c:"park",r:35,ch:[{t:"photo",ti:"Verrassings-vagijn",d:"Aan de Westersingel-kant van het water (de overkant van de Pauluskerk) zit een verborgen keramieken kunstwerkje in de kademuur — vlak boven het water. Hints: 'Als het water te hoog komt sluiten de kleppen. Het water staat tot aan mijn lippen.' Loop langs de westelijke kade en zoek goed. Maak een foto als bewijs dat jullie pussy-radar nog werkt. Het kunstwerk moet duidelijk herkenbaar in beeld zijn.",p:40,df:"hard"}]},
{id:43,n:"Noordereiland",la:51.913124,lo:4.494546,e:"🏘️",c:"neighborhood",r:20,ch:[{t:"photo",ti:"Zwaan in Zicht",d:"Maak een epische teamfoto op het Noordereiland met de Erasmusbrug — De Zwaan — op de achtergrond. Team in sterke formatie, brug groot en herkenbaar in beeld. Maak er iets moois van: dit is ver reizen waard. Allemaal in beeld.",p:45,df:"medium"}]},
{id:44,n:"Wilhelminapier",la:51.905742,lo:4.487774,e:"🏙️",c:"landmark",r:20,ch:[{t:"photo",ti:"De Rotterdam van Onder",d:"Ga voor De Rotterdam op de Wilhelminapier staan — het kolossale gebouw van Rem Koolhaas. Maak een selfie van recht onder naar boven: telefoon omlaag, camera omhoog, heel team in beeld. De gevel rijst massief boven jullie uit. Zorg dat iedereen erop staat.",p:25,df:"medium"}]},
{id:45,n:"KPN Toren",la:51.907179,lo:4.489141,e:"📡",c:"architecture",r:20,ch:[{t:"quiz",ti:"KPN Toren Quiz",d:"Wie ontwierp de KPN Toren op de Kop van Zuid?",a:"Renzo Piano",o:["Renzo Piano","Rem Koolhaas","Norman Foster","Piet Blom"],p:15,df:"easy"}]},
{id:46,n:"Spido Kade",la:51.9098,lo:4.4818,e:"🚤",c:"landmark",r:15,ch:[{t:"quiz",ti:"Snelste op het Water",d:"Spido of Watertaxi Rotterdam: wie heeft de hoogste maximumsnelheid op de Maas — en wie wint de race?",a:"Watertaxi Rotterdam",o:["Watertaxi Rotterdam","Spido","Ze zijn even snel","Hangt van de route af"],p:15,df:"easy"}]},
{id:47,n:"Boompjes",la:51.912273,lo:4.484558,e:"🏃",c:"landmark",r:10,ch:[{t:"video",ti:"Sprintwedstrijd de Boompjes",d:"Op de Boompjes langs de Maas zijn 100 meter sprintmarkeringen op de grond aangebracht. Zoek de startlijn. Twee teamleden gaan naast elkaar staan. De videomaker telt af: 3... 2... 1... GO! Beiden rennen zo hard mogelijk de 100 meter uit. Film de complete sprint van start tot finish. Wie wint?",p:25,df:"medium"}]},
{id:49,n:"Fenix Food Factory",la:51.902061,lo:4.486841,e:"🍔",c:"food",r:15,ch:[
  {t:"photo",ti:"Proost bij 21 Pinchos",d:"Ga naar het terras van 21 Pinchos bij de Fenix Food Factory op Katendrecht. Bestel een biertje voor het hele team. Foto met iedereen met het glas omhoog — proost op Jorik en Katinka. Terras of Fenix-omgeving zichtbaar op de achtergrond.",p:25,df:"easy"},

  {t:"video",ti:"Een Toast aan het Stel",d:"Op het Fenix-terras: drie teamleden geven elk on-camera een korte toast, direct in de lens. Captain begint: 'Aan Jorik en Katinka — Rotterdam houdt van jullie.' Tweede teamlid: een persoonlijke wens (één zin). Derde teamlid: een goed advies of een grap. Spreek tot de camera alsof je het tegen het bruidspaar zegt. Min. 30 sec totaal, Fenix-haven op de achtergrond.",p:40,df:"medium",wp:1,wpInstruction:"📹 Voor de bruiloftsedit — film discreet, ergens uit de buurt van Jorik."}

{id:50,n:"Rijnhaven Drijvend Bos",la:51.9030,lo:4.4900,e:"🌳",c:"landmark",r:15,ch:[{t:"quiz",ti:"Drijvend Bos Quiz",d:"Wat maakt het Drijvend Bos in de Rijnhaven uniek in de wereld?",a:"'s Werelds eerste drijvende stadspark",o:["'s Werelds eerste drijvende stadspark","Grootste park van Rotterdam","Ontworpen door Rem Koolhaas","Geplant op een scheepswrak"],p:20,df:"easy"}]},
