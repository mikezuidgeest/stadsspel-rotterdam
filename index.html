<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Stadsspel Rotterdam V13 - Jorik's Bachelor Party</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Inter+Tight:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      /* V13: warmer near-black base with a subtle blue tint so accent colors pop */
      --bg:#0a0b10;
      --bg-elev:#0f1016;
      --surface:rgba(255,255,255,0.045);
      --surface-hover:rgba(255,255,255,0.075);
      --surface-active:rgba(255,255,255,0.11);
      --border:rgba(255,255,255,0.08);
      --border-strong:rgba(255,255,255,0.14);
      --text-primary:rgba(255,255,255,0.96);
      --text-secondary:rgba(255,255,255,0.62);
      --text-tertiary:rgba(255,255,255,0.34);
      /* V13: richer accent — warmer gold + complementary hues */
      --accent:#e4b25c;
      --accent-2:#f0c373;
      --accent-deep:#b8863a;
      --accent-glow:rgba(228,178,92,0.16);
      --foto:#6ea3ff;
      --foto-2:#8bb9ff;
      --quiz:#b29bff;
      --quiz-2:#c9b8ff;
      --creatief:#5fd8a5;
      --creatief-2:#7ee4b7;
      --video:#ff7b7b;
      --video-2:#ff9a9a;
      --success:#5fd8a5;
      --danger:#ff6b6b;
      /* V13: radius scale */
      --r-xs:8px;--r-sm:12px;--r-md:16px;--r-lg:22px;--r-xl:28px;--r-2xl:36px;--r-pill:999px;
      /* V13: shadow scale */
      --sh-sm:0 1px 2px rgba(0,0,0,0.25);
      --sh-md:0 6px 18px rgba(0,0,0,0.35),0 2px 6px rgba(0,0,0,0.25);
      --sh-lg:0 18px 40px rgba(0,0,0,0.5),0 6px 14px rgba(0,0,0,0.3);
      --sh-glow-gold:0 8px 32px rgba(228,178,92,0.35),0 2px 8px rgba(228,178,92,0.2);
      --sh-glow-blue:0 8px 32px rgba(110,163,255,0.32);
      --sh-ring:inset 0 1px 0 rgba(255,255,255,0.08);
      /* V13: spring timings */
      --spring:cubic-bezier(0.34,1.56,0.64,1);
      --spring-soft:cubic-bezier(0.25,0.46,0.45,0.94);
      --ease-out:cubic-bezier(0.22,1,0.36,1);
      /* V13: type */
      --font-display:'Inter Tight','Inter',system-ui,-apple-system,sans-serif;
      --font-body:'Inter','Inter Tight',system-ui,-apple-system,sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body,#root{width:100%;height:100%;overflow:hidden}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text-primary);-webkit-font-smoothing:antialiased;letter-spacing:-0.01em}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(circle at 20% 15%,rgba(228,178,92,0.05),transparent 45%),radial-gradient(circle at 85% 85%,rgba(110,163,255,0.045),transparent 50%)}
    /* V13: desktop frame */
    @media (min-width:560px){#root{max-width:420px;margin:0 auto;box-shadow:0 0 120px rgba(0,0,0,0.55),inset 0 0 0 1px rgba(255,255,255,0.03);background:var(--bg)}}
    h1,h2,h3{font-family:var(--font-display);letter-spacing:-0.025em}
    .leaflet-div-icon{background:none!important;border:none!important}

    /* V13: Glass morphism — richer, layered */
    .glass{backdrop-filter:blur(18px) saturate(1.2);-webkit-backdrop-filter:blur(18px) saturate(1.2);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-ring)}
    .glass-strong{backdrop-filter:blur(28px) saturate(1.3);-webkit-backdrop-filter:blur(28px) saturate(1.3);background:rgba(10,11,16,0.82);border:1px solid var(--border-strong);border-radius:var(--r-lg);box-shadow:var(--sh-md),var(--sh-ring)}
    .glass-card{position:relative;backdrop-filter:blur(22px) saturate(1.2);-webkit-backdrop-filter:blur(22px) saturate(1.2);background:linear-gradient(155deg,rgba(255,255,255,0.055),rgba(255,255,255,0.025));border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-md),var(--sh-ring)}

    /* V13: Buttons — premium pill, 56px default, spring press */
    .btn{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 24px;min-height:52px;border:none;border-radius:var(--r-pill);font-family:var(--font-display);font-weight:700;cursor:pointer;transition:transform .18s var(--spring),box-shadow .25s var(--ease-out),opacity .2s;font-size:15px;letter-spacing:-0.015em;color:#fff;white-space:nowrap;-webkit-tap-highlight-color:transparent}
    .btn::after{content:'';position:absolute;inset:0;border-radius:inherit;box-shadow:inset 0 1px 0 rgba(255,255,255,0.22),inset 0 -1px 0 rgba(0,0,0,0.15);pointer-events:none}
    .btn:active{transform:scale(0.96) translateY(1px)}
    .btn:hover{transform:translateY(-1px)}
    .btn-cyan{background:linear-gradient(135deg,#7ab2ff,#4a7bd4);box-shadow:0 10px 28px rgba(110,163,255,0.35),0 2px 6px rgba(0,0,0,0.25)}
    .btn-cyan:hover{box-shadow:0 14px 34px rgba(110,163,255,0.42),0 2px 8px rgba(0,0,0,0.28)}
    .btn-gold{background:linear-gradient(135deg,var(--accent-2),var(--accent-deep));box-shadow:var(--sh-glow-gold)}
    .btn-gold:hover{box-shadow:0 14px 38px rgba(228,178,92,0.42),0 2px 8px rgba(228,178,92,0.25)}
    .btn-ghost{background:var(--surface);color:var(--text-primary);border:1px solid var(--border);box-shadow:var(--sh-ring);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    .btn-ghost:hover{background:var(--surface-hover);border-color:var(--border-strong)}
    .btn-danger{background:linear-gradient(135deg,#ff8787,#c94d4d);box-shadow:0 10px 28px rgba(255,107,107,0.3)}
    .btn-danger:hover{box-shadow:0 14px 34px rgba(255,107,107,0.38)}
    .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;pointer-events:none}
    .btn-sm{padding:10px 16px;min-height:40px;font-size:13px;border-radius:var(--r-pill)}
    .btn-lg{padding:20px 32px;min-height:60px;font-size:17px;font-weight:800}

    /* V13: Chip — compact pill used for tags, meta, filters */
    .chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r-pill);background:var(--surface);border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-secondary);letter-spacing:0.01em;transition:background .2s}
    .chip:hover{background:var(--surface-hover)}
    .chip-gold{background:var(--accent-glow);border-color:rgba(228,178,92,0.3);color:var(--accent)}
    .chip-blue{background:rgba(110,163,255,0.12);border-color:rgba(110,163,255,0.3);color:var(--foto)}

    /* V13: Animations — spring-heavy */
    @keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeInPop{from{opacity:0;transform:scale(0.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes slideDown{from{transform:translateY(-24px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(228,178,92,0.5)}50%{box-shadow:0 0 0 14px rgba(228,178,92,0)}}
    @keyframes glow{0%,100%{filter:drop-shadow(0 0 8px rgba(228,178,92,0.8))}50%{filter:drop-shadow(0 0 22px rgba(228,178,92,0.4))}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
    @keyframes scoreFloat{0%{opacity:1;transform:translate(-50%,0) scale(1)}100%{opacity:0;transform:translate(-50%,-80px) scale(1.35)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes breathing{0%,100%{opacity:0.6}50%{opacity:1}}
    .animate-in{animation:fadeInPop .45s var(--spring) both}
    .animate-in-1{animation-delay:.04s}.animate-in-2{animation-delay:.09s}.animate-in-3{animation-delay:.14s}.animate-in-4{animation-delay:.19s}.animate-in-5{animation-delay:.24s}.animate-in-6{animation-delay:.29s}

    /* V13: Toast — floating pill */
    .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10002;animation:slideDown .35s var(--spring)}
    .toast-inner{padding:12px 22px;border-radius:var(--r-pill);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);background:rgba(228,178,92,0.14);border:1px solid rgba(228,178,92,0.28);font-weight:700;font-size:13px;white-space:nowrap;text-align:center;color:#fff;box-shadow:0 10px 30px rgba(0,0,0,0.45),var(--sh-ring)}

    /* V13: Score popup */
    .score-popup{position:fixed;top:38%;left:50%;transform:translateX(-50%);z-index:10003;font-family:var(--font-display);font-size:48px;font-weight:900;color:var(--accent-2);animation:scoreFloat 1.3s var(--ease-out) forwards;pointer-events:none;text-shadow:0 4px 28px rgba(228,178,92,0.55);letter-spacing:-0.04em}

    /* V13: Offline banner */
    .offline-banner{position:fixed;top:0;left:0;right:0;padding:7px;text-align:center;font-size:10px;font-weight:700;color:var(--danger);background:rgba(255,107,107,0.1);border-bottom:1px solid rgba(255,107,107,0.22);z-index:10001;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);letter-spacing:0.05em;text-transform:uppercase}

    /* V13: Bottom tab bar — floating pill */
    .tab-bar{position:fixed;bottom:max(10px,env(safe-area-inset-bottom));left:10px;right:10px;z-index:10000;backdrop-filter:blur(24px) saturate(1.5);-webkit-backdrop-filter:blur(24px) saturate(1.5);background:rgba(14,15,22,0.78);border:1px solid var(--border-strong);border-radius:var(--r-pill);display:flex;padding:6px;box-shadow:0 18px 40px rgba(0,0,0,0.5),var(--sh-ring)}
    @media (min-width:560px){.tab-bar{left:calc(50% - 200px);right:auto;width:400px}}
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:10px 0;background:none;border:none;color:var(--text-tertiary);font-size:9px;font-weight:600;cursor:pointer;transition:color .25s var(--ease-out),transform .3s var(--spring);letter-spacing:0.03em;text-transform:uppercase;position:relative;border-radius:var(--r-pill);-webkit-tap-highlight-color:transparent}
    .tab-btn .tab-icon{font-size:20px;transition:transform .35s var(--spring),filter .25s}
    .tab-btn.active{color:var(--accent)}
    .tab-btn.active::before{content:'';position:absolute;inset:4px;background:var(--accent-glow);border-radius:var(--r-pill);z-index:-1;animation:fadeInPop .3s var(--spring) both}
    .tab-btn.active .tab-icon{transform:scale(1.12) translateY(-1px);filter:drop-shadow(0 0 8px rgba(228,178,92,0.5))}
    .tab-btn:active{transform:scale(0.95)}
    .tab-badge{position:absolute;top:4px;right:22%;background:linear-gradient(135deg,#ff8787,#c94d4d);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:var(--r-pill);min-width:18px;text-align:center;box-shadow:0 2px 8px rgba(255,107,107,0.45)}

    /* V13: Bottom sheet — premium with grabber */
    .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:10000;animation:fadeInUp .25s var(--ease-out)}
    .sheet{position:fixed;bottom:0;left:0;right:0;max-height:88vh;overflow-y:auto;z-index:10001;background:linear-gradient(180deg,var(--bg-elev) 0%,var(--bg) 100%);border-top:1px solid var(--border-strong);border-radius:var(--r-2xl) var(--r-2xl) 0 0;padding:14px 20px 120px;animation:slideUp .4s var(--spring);box-shadow:0 -20px 60px rgba(0,0,0,0.5)}
    @media (min-width:560px){.sheet{max-width:420px;margin:0 auto;left:0;right:0}}
    .sheet-handle{width:44px;height:5px;background:rgba(255,255,255,0.18);border-radius:var(--r-pill);margin:0 auto 18px;transition:background .2s}
    .sheet-handle:hover{background:rgba(255,255,255,0.28)}

    /* V13: Challenge card */
    .ch-card{padding:18px;margin-bottom:12px;border-radius:var(--r-lg);background:linear-gradient(155deg,rgba(255,255,255,0.045),rgba(255,255,255,0.02));border:1px solid var(--border);transition:transform .25s var(--spring),border-color .2s,background .2s;box-shadow:var(--sh-ring)}
    .ch-card:not(.locked):not(.completed):not(.wrong-done):hover{transform:translateY(-2px);border-color:var(--border-strong)}
    .ch-card.completed{border-color:rgba(95,216,165,0.35);background:linear-gradient(155deg,rgba(95,216,165,0.08),rgba(95,216,165,0.02))}
    .ch-card.wrong-done{border-color:rgba(255,107,107,0.3);background:linear-gradient(155deg,rgba(255,107,107,0.06),rgba(255,107,107,0.015))}
    .ch-card.locked{opacity:0.45;filter:blur(0.5px) saturate(0.5);pointer-events:none;position:relative}
    .ch-type{display:inline-flex;align-items:center;padding:4px 10px;border-radius:var(--r-pill);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em}
    .ch-type-photo{background:rgba(110,163,255,0.15);color:var(--foto-2)}
    .ch-type-video{background:rgba(255,123,123,0.15);color:var(--video-2)}
    .ch-type-creative{background:rgba(95,216,165,0.15);color:var(--creatief-2)}
    .ch-type-quiz{background:rgba(178,155,255,0.15);color:var(--quiz-2)}
    .difficulty{color:var(--text-tertiary);font-size:11px;font-weight:600;letter-spacing:0.02em}.difficulty .star{color:var(--accent)}
    .points-badge{font-family:var(--font-display);font-size:14px;font-weight:800;color:var(--accent);letter-spacing:-0.02em}

    /* V13: Quiz options — big, confident */
    .quiz-option{display:flex;align-items:center;width:100%;padding:16px 18px;margin-bottom:8px;border-radius:var(--r-md);background:rgba(255,255,255,0.04);border:1.5px solid var(--border);color:var(--text-primary);font-size:15px;font-weight:500;cursor:pointer;text-align:left;transition:transform .2s var(--spring),background .2s,border-color .2s;font-family:var(--font-body);-webkit-tap-highlight-color:transparent;letter-spacing:-0.01em}
    .quiz-option:hover{background:var(--surface-hover);border-color:rgba(178,155,255,0.4);transform:translateY(-1px)}
    .quiz-option:active{transform:scale(0.98)}
    .quiz-option.correct{background:linear-gradient(135deg,rgba(95,216,165,0.18),rgba(95,216,165,0.08));border-color:var(--success);color:#fff;box-shadow:0 6px 20px rgba(95,216,165,0.25)}
    .quiz-option.wrong{background:linear-gradient(135deg,rgba(255,107,107,0.18),rgba(255,107,107,0.08));border-color:var(--danger);color:#fff;box-shadow:0 6px 20px rgba(255,107,107,0.25)}
    .quiz-option:disabled{pointer-events:none;cursor:not-allowed}

    /* V13: Leaderboard */
    .lb-card{padding:16px 18px;margin-bottom:10px;border-radius:var(--r-lg);display:flex;align-items:center;gap:14px;transition:transform .25s var(--spring),background .25s;position:relative;overflow:hidden;background:linear-gradient(155deg,rgba(255,255,255,0.045),rgba(255,255,255,0.02));border:1px solid var(--border);box-shadow:var(--sh-ring)}
    .lb-card:hover{transform:translateY(-2px);background:linear-gradient(155deg,rgba(255,255,255,0.07),rgba(255,255,255,0.03))}
    .lb-rank{font-family:var(--font-display);font-size:22px;font-weight:900;min-width:36px;text-align:center;letter-spacing:-0.05em}
    .lb-rank-1{color:var(--accent-2);text-shadow:0 0 20px rgba(228,178,92,0.4)}
    .lb-rank-2{color:#c4c4c4}
    .lb-rank-3{color:#cd9d77}
    .lb-rank-other{color:var(--text-tertiary)}
    .lb-emoji{font-size:32px;filter:drop-shadow(0 4px 10px rgba(0,0,0,0.35))}
    .lb-info{flex:1;min-width:0}
    .lb-name{font-family:var(--font-display);font-weight:700;font-size:15px;margin-bottom:3px;letter-spacing:-0.02em}
    .lb-stats{font-size:11px;color:var(--text-secondary);font-weight:500}
    .lb-score{font-family:var(--font-display);font-size:26px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-0.04em}
    .lb-first{background:linear-gradient(155deg,rgba(228,178,92,0.13),rgba(228,178,92,0.03));border-color:rgba(228,178,92,0.28);box-shadow:var(--sh-glow-gold),var(--sh-ring)}

    /* V13: Nearby panel — floating premium cards */
    .nearby-panel{position:absolute;bottom:92px;left:12px;right:12px;z-index:1000;display:flex;flex-direction:column;gap:8px}
    .nearby-card{padding:14px 16px;border-radius:var(--r-lg);display:flex;align-items:center;gap:12px;cursor:pointer;backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);background:rgba(14,15,22,0.82);border:1px solid var(--border-strong);transition:transform .25s var(--spring),background .2s;box-shadow:var(--sh-md),var(--sh-ring);-webkit-tap-highlight-color:transparent}
    .nearby-card:hover{transform:translateY(-2px) scale(1.01)}
    .nearby-card:active{transform:scale(0.98)}
    .nearby-card:first-child{border-color:rgba(228,178,92,0.35);background:linear-gradient(155deg,rgba(228,178,92,0.14),rgba(14,15,22,0.82));box-shadow:var(--sh-glow-gold)}
    .nearby-indicator{width:4px;height:36px;border-radius:var(--r-pill);flex-shrink:0}
    .nearby-indicator.foto{background:var(--foto)}.nearby-indicator.quiz{background:var(--quiz)}.nearby-indicator.creatief{background:var(--creatief)}.nearby-indicator.video{background:var(--video)}
    .nearby-info{flex:1;min-width:0}
    .nearby-name{font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:-0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .nearby-tags{display:flex;gap:5px;margin-top:4px}
    .nearby-tag{font-size:9px;font-weight:700;padding:3px 8px;border-radius:var(--r-pill);letter-spacing:0.04em;text-transform:uppercase}
    .nearby-tag.t-foto{background:rgba(110,163,255,0.14);color:var(--foto-2)}.nearby-tag.t-quiz{background:rgba(178,155,255,0.14);color:var(--quiz-2)}.nearby-tag.t-creatief{background:rgba(95,216,165,0.14);color:var(--creatief-2)}.nearby-tag.t-video{background:rgba(255,123,123,0.14);color:var(--video-2)}
    .nearby-end{text-align:right;flex-shrink:0}
    .nearby-dist{font-family:var(--font-display);font-size:14px;font-weight:800;color:var(--text-primary);letter-spacing:-0.02em}
    .nearby-pts{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:0.04em;margin-top:2px}
    .nearby-chevron{font-size:20px;color:var(--text-tertiary);flex-shrink:0;margin-left:4px;transition:transform .25s var(--spring)}
    .nearby-card:hover .nearby-chevron{transform:translateX(3px);color:var(--text-primary)}

    /* V13: Secret mission banner */
    .secret-banner{margin:12px 0;padding:18px;border-radius:var(--r-lg);background:linear-gradient(135deg,rgba(178,155,255,0.12),rgba(255,123,123,0.07));border:1px solid rgba(178,155,255,0.25);cursor:pointer;transition:transform .25s var(--spring),box-shadow .25s;position:relative;overflow:hidden;box-shadow:var(--sh-ring)}
    .secret-banner:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(178,155,255,0.18),var(--sh-ring)}
    .secret-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 30%,rgba(178,155,255,0.15),transparent 50%);pointer-events:none}
    .secret-badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:var(--r-pill);font-size:10px;font-weight:800;background:rgba(178,155,255,0.25);color:var(--quiz-2);margin-bottom:10px;letter-spacing:0.08em;position:relative}

    /* V13: Bar break overlay */
    .barbreak-overlay{position:fixed;inset:0;z-index:10005;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(24px) saturate(1.3);-webkit-backdrop-filter:blur(24px) saturate(1.3);background:linear-gradient(135deg,rgba(10,11,16,0.94),rgba(228,178,92,0.08),rgba(10,11,16,0.94));animation:fadeInUp .3s var(--ease-out);padding:20px}
    .barbreak-card{max-width:420px;width:100%;padding:32px 28px;text-align:center;border-radius:var(--r-2xl);background:linear-gradient(155deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));border:1px solid var(--border-strong);box-shadow:var(--sh-lg),var(--sh-ring);animation:fadeInPop .5s var(--spring)}

    /* V13: Team setup */
    .emoji-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}
    .emoji-btn{padding:12px;font-size:28px;border-radius:var(--r-md);background:rgba(255,255,255,0.05);border:2px solid transparent;cursor:pointer;transition:transform .25s var(--spring),background .2s,border-color .2s;-webkit-tap-highlight-color:transparent}

// Tier badges based on completed challenges
const TIER_BADGES=[
  {min:20, badge:'🏆', name:'Legende', color:'var(--accent)'},
  {min:15, badge:'🥇', name:'Goud',    color:'var(--accent)'},
  {min:10, badge:'🥈', name:'Zilver',  color:'#c0c0c0'},
  {min:5,  badge:'🥉', name:'Brons',   color:'#cd7f32'},
];
function tierFor(challengeCount){
  return TIER_BADGES.find(t => challengeCount >= t.min) || null;
}
function nextTier(challengeCount){
  // Highest tier whose min is greater than current count
  const upcoming=[...TIER_BADGES].reverse().find(t => t.min > challengeCount);
  return upcoming || null;
}

// V5.1 HOTFIX: iOS detection — DeviceMotion requires explicit permission on iOS 13+
// Without that permission, accelerometer events never fire and GPS sleep never wakes.
// On iOS we skip the sleep logic entirely (GPS stays always-on, same as V4).
const IS_IOS=/iPhone|iPad|iPod/i.test(navigator.userAgent)||
  (navigator.userAgent.includes('Mac')&&'ontouchend' in document);
// Motion-based sleep only works when DeviceMotion fires without a permission prompt.
// iOS 13+ exposes DeviceMotionEvent.requestPermission — treat that as "not available".
const MOTION_AVAILABLE=typeof DeviceMotionEvent!=='undefined'&&
  typeof DeviceMotionEvent.requestPermission!=='function'&&!IS_IOS;

// UTILITY FUNCTIONS
// ═══════════════════════════════════════════
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000,p=Math.PI/180;
  const a=Math.sin((lat2-lat1)*p/2)**2+Math.cos(lat1*p)*Math.cos(lat2*p)*Math.sin((lon2-lon1)*p/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

function fmtDist(m){return m<1000?`${Math.round(m)}m`:`${(m/1000).toFixed(1)}km`}
function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`}
function fmtHM(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?`${h}u ${m}m`:`${m}m`}
function stars(df){return df==='easy'?'★':df==='medium'?'★★':'★★★'}

// V12: relative time (for activity feed)
function fmtRelTime(iso){
  if(!iso)return'';
  const d=new Date(iso).getTime(),now=Date.now(),diff=Math.max(0,(now-d)/1000);
  if(diff<60)return'zojuist';
  if(diff<3600)return`${Math.floor(diff/60)}m`;
  if(diff<86400)return new Date(iso).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
  return new Date(iso).toLocaleDateString('nl-NL');
}

// V12: phase label map used in HUD
const PHASE_LABELS={1:'Fase 1 · Zoektocht',2:'Fase 2 · Geruchten',3:'Fase 3 · Cirkel',4:'Fase 4 · Finale',5:'Finale · Uitslag'};

function getNearby(pos,completed,n=3,maxR=NEARBY_RADIUS){
  if(!pos)return[];
  // V12: smart ranking — within NEARBY_RADIUS prefer highest points/meter ratio (weighted by difficulty).
  // Outside the radius fall back to pure distance ordering so the panel always shows something.
  const diffMult={easy:1.0,medium:1.15,hard:1.3};
  const locs=L_DATA.filter(l=>!completed[l.id]).map(l=>{
    const dist=haversine(pos.lat,pos.lng,l.la,l.lo);
    const totalPts=l.ch.reduce((s,c)=>s+c.p*(diffMult[c.df]||1),0);
    // ROI: points per 100m (guarded against divide-by-zero)
    const roi=totalPts/Math.max(dist,30)*100;
    return{...l,dist,roi,totalPts};
  });
  const within=locs.filter(l=>l.dist<=maxR).sort((a,b)=>b.roi-a.roi);
  if(within.length>=n)return within.slice(0,n);
  const expanded=locs.filter(l=>l.dist<=maxR*2).sort((a,b)=>a.dist-b.dist);
  if(expanded.length>=n)return expanded.slice(0,n);
  return[...locs].sort((a,b)=>a.dist-b.dist).slice(0,n);
}

// ═══════════════════════════════════════════
// V5 FEATURE 5: GPS DRIFT MITIGATION
// ═══════════════════════════════════════════
function smoothPosition(samples){
  if(!samples||!samples.length)return null;
  // Weighted average — newer samples weigh more
  let sumLat=0,sumLng=0,sumW=0,sumAcc=0;
  samples.forEach((s,i)=>{
    const w=i+1; // newer = higher weight
    sumLat+=s.lat*w; sumLng+=s.lng*w; sumW+=w;
    sumAcc+=(s.acc||0);
  });
  return{lat:sumLat/sumW,lng:sumLng/sumW,acc:sumAcc/samples.length};
}

function snapToPOI(pos,maxDist=GPS_SNAP_RADIUS){
  if(!pos)return pos;
  let best=null,bestDist=Infinity;
  for(const loc of L_DATA){
    const d=haversine(pos.lat,pos.lng,loc.la,loc.lo);
    if(d<bestDist&&d<=maxDist){bestDist=d;best=loc}
  }
  return best?{lat:best.la,lng:best.lo,acc:pos.acc,snapped:best.n}:pos;
}

function pickQuiz(loc,seen){
  // Return an unseen quiz for this location, or a fallback from pool
  const locQuizzes=loc.ch.filter(c=>c.t==='quiz');
  const unseen=locQuizzes.filter((_,i)=>!seen.has(`${loc.id}_q_${i}`));
  if(unseen.length)return unseen[Math.floor(Math.random()*unseen.length)];
  // Use a Rotterdam pool filler, marked with type 'quiz'
  const unseenPool=ROTTERDAM_QUIZ_POOL.filter(q=>!seen.has(`pool_${q.ti}`));
  if(unseenPool.length){
    const q=unseenPool[Math.floor(Math.random()*unseenPool.length)];
    return{...q,t:'quiz',_pool:true};
  }
  return null;
}

// Compress a dataURL to a small thumbnail for storage + live feed
function compressPhoto(dataURL,maxWidth=480,quality=0.55){
  return new Promise((resolve)=>{
    try{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const ratio=Math.min(1,maxWidth/img.width);
        canvas.width=Math.round(img.width*ratio);
        canvas.height=Math.round(img.height*ratio);
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror=()=>resolve(dataURL); // fallback
      img.src=dataURL;
    }catch(e){resolve(dataURL)}
  });
}

// V12: localStorage key for session persistence — single source of truth
const LS_KEY='stadsspel_v12_session';
function loadSession(){
  try{const raw=localStorage.getItem(LS_KEY);return raw?JSON.parse(raw):null;}catch(e){return null;}
}
function saveSession(patch){
  try{
    const cur=loadSession()||{};
    const next={...cur,...patch,updated:Date.now()};
    localStorage.setItem(LS_KEY,JSON.stringify(next));
  }catch(e){}
}
function clearSession(){try{localStorage.removeItem(LS_KEY);}catch(e){}}

function App(){
  // V12: re-hydrate session if available (same-day only — expire after 12h)
  const hydrated=(()=>{
    const s=loadSession();
    if(!s)return null;
    if(Date.now()-(s.updated||0)>12*3600*1000)return null;
    return s;
  })();
  const[screen,setScreen]=useState(hydrated?.screen||'splash'); // splash, setup, lobby, game
  const[myTeam,setMyTeam]=useState(hydrated?.myTeam||null);
  const[teams,setTeams]=useState([]);
  const[scores,setScores]=useState({});
  const[completed,setCompleted]=useState({}); // {locationId: {challengeIdx: true}}
  const[completedPts,setCompletedPts]=useState({}); // V10: {locationId: {challengeIdx: ptsAwarded}} — lets UI distinguish wrong (0) from correct
  const[visitedLocs,setVisitedLocs]=useState(new Set());
  const[pos,setPos]=useState(null);
  const[tab,setTab]=useState('leaderboard');
  const[selLoc,setSelLoc]=useState(null);
  const[toast,setToast]=useState(null);
  const[scorePopup,setScorePopup]=useState(null);
  const[ghost,setGhost]=useState({active:false,timeLeft:0,used:0});
  // V9: dynamic max charges (starts at GHOST_MAX_USES, grows via score milestones)
  const[ghostMax,setGhostMax]=useState(GHOST_MAX_USES);
  const[unlockedMilestones,setUnlockedMilestones]=useState(new Set());
  const[unlockPopup,setUnlockPopup]=useState(null); // {emoji, label, name}
  const[lastTier,setLastTier]=useState(null); // for tier-unlock popup
  const[gameStart,setGameStart]=useState(null);
  const[elapsed,setElapsed]=useState(0);
  const[phase,setPhase]=useState(0); // 0=waiting,1-4=phases
  const[barBreak,setBarBreak]=useState(null); // {name,time}
  const[jorikInTeam,setJorikInTeam]=useState(false);
  // V10: admin tracks which team currently has Jorik (by team id, null = between teams)
  const[jorikTeamId,setJorikTeamId]=useState(null);
  const[weddingDone,setWeddingDone]=useState(false);
  const[showWedding,setShowWedding]=useState(false);
  const[activityFeed,setActivityFeed]=useState([]);
  // V10: admin unlock via ?admin=true (legacy) OR ?admin=vriendvanjorik (hardened token)
  const[isAdmin]=useState(()=>{
    const v=new URLSearchParams(window.location.search).get('admin');
    return v==='true' || v==='vriendvanjorik';
  });
  // V5 FEATURE 1: narrative state
  const[storyShown,setStoryShown]=useState(null); // key of the currently-open story modal
  const[storySeen,setStorySeen]=useState(new Set()); // phases whose story has been shown
  const[nextStory,setNextStory]=useState(null); // V10: queue for sequential story modals
  // V5 FEATURE 3: seen quiz tracking
  const[seenQuizzes,setSeenQuizzes]=useState(new Set());
  // V5 FEATURE 5: GPS smoothing buffer
  const[gpsSamples,setGpsSamples]=useState([]);
  const[gpsStatus,setGpsStatus]=useState('weak'); // good / weak / sleep
  const[gpsSnap,setGpsSnap]=useState(null); // snapped-to POI name
  // V5 FEATURE 6: motion tracking
  const motionRef=useRef({lastMotion:Date.now(),still:false});
  // V5.1 HOTFIX: expose GPS controls so the status pill can force-wake on tap
  const gpsCtrlRef=useRef({start:null,stop:null});
  const[photoLightbox,setPhotoLightbox]=useState(null); // enlarged photo url
  const[feedFilter,setFeedFilter]=useState('all'); // 'all' | 'photos' | 'mine'
  // V6: admin review queue
  const[reviewQueue,setReviewQueue]=useState([]); // pending photo_reviews for admin
  const[pendingMine,setPendingMine]=useState(0); // count of my team's pending reviews

  // Timer
  useEffect(()=>{
    if(!gameStart)return;
    const i=setInterval(()=>setElapsed(Math.floor((Date.now()-gameStart)/1000)),1000);
    return()=>clearInterval(i);
  },[gameStart]);

  // V5 FEATURE 5 + 6: GPS with smoothing, snap-to-POI, battery-aware polling
  // V5.1 HOTFIX: skip sleep logic on iOS / no-motion; expose wake via ref for tap-to-wake pill
  useEffect(()=>{
    let watchId=null;
    let active=true;

    const onPos=(p)=>{
      const sample={lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy||999,ts:Date.now()};
      setGpsSamples(prev=>{
        const next=[...prev,sample].slice(-GPS_SMOOTH_SAMPLES);
        const smoothed=smoothPosition(next);
        if(smoothed){
          // Snap to POI if very close
          const snapped=snapToPOI(smoothed);
          if(snapped.snapped){
            setPos({lat:snapped.lat,lng:snapped.lng});
            setGpsSnap(snapped.snapped);
          }else{
            setPos({lat:smoothed.lat,lng:smoothed.lng});
            setGpsSnap(null);
          }
          // Update signal status
          const avgAcc=smoothed.acc;
          setGpsStatus(avgAcc<GPS_ACCURACY_GOOD?'good':avgAcc<GPS_ACCURACY_WEAK?'weak':'weak');
        }
        return next;
      });
    };

    const startWatch=()=>{
      if(watchId!=null||!active)return;
      watchId=navigator.geolocation.watchPosition(onPos,()=>{},
        {enableHighAccuracy:true,maximumAge:3000,timeout:10000});
      motionRef.current.still=false;
      motionRef.current.lastMotion=Date.now();
      // Reset visual state immediately so the pill returns to 'weak' until first fix
      setGpsStatus('weak');
    };
    const stopWatch=()=>{
      if(watchId!=null){navigator.geolocation.clearWatch(watchId);watchId=null}
    };

    gpsCtrlRef.current={start:startWatch,stop:stopWatch};

    let motionCheck=null,onMotion=null;
    if(MOTION_AVAILABLE){
      motionCheck=setInterval(()=>{
        if(!active)return;
        const stillFor=Date.now()-motionRef.current.lastMotion;
        if(stillFor>STILL_TIMEOUT_MS&&watchId!=null){
          stopWatch();
          motionRef.current.still=true;
          setGpsStatus('sleep');
        }
      },10000);

      onMotion=(ev)=>{
        const a=ev.accelerationIncludingGravity||ev.acceleration;
        if(!a)return;
        const mag=Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2);
        if(Math.abs(mag-9.8)>MOTION_THRESHOLD){
          motionRef.current.lastMotion=Date.now();
          if(motionRef.current.still){
            motionRef.current.still=false;
            startWatch();
          }
        }
      };
      try{window.addEventListener('devicemotion',onMotion,{passive:true})}catch(e){}
    }
    // On iOS or browsers without motion: GPS stays always-on (same as V4)

    return()=>{
      active=false;
      stopWatch();
      if(motionCheck)clearInterval(motionCheck);
      if(onMotion){try{window.removeEventListener('devicemotion',onMotion)}catch(e){}}

        <h1 className="animate-in animate-in-1" style={{fontSize:48,fontWeight:900,background:'linear-gradient(135deg,#ffffff 0%,var(--accent-2) 50%,var(--foto-2) 100%)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',letterSpacing:'-0.04em',lineHeight:1,marginBottom:4}}>Stadsspel</h1>
        <div className="animate-in animate-in-2" style={{fontFamily:'var(--font-display)',fontSize:13,fontWeight:600,color:'var(--text-secondary)',marginBottom:8,letterSpacing:'0.4em',textTransform:'uppercase'}}>Rotterdam</div>
        <div className="animate-in animate-in-3" style={{fontFamily:'var(--font-display)',fontSize:12,color:'var(--text-tertiary)',marginBottom:6,fontWeight:600}}>Jorik's Bachelor Party · 6 Juni 2026</div>
        <div className="animate-in animate-in-4" style={{fontSize:13,color:'var(--quiz-2)',marginBottom:40,fontWeight:600,fontStyle:'italic',textAlign:'center'}}>"Acht dagen voor de bruiloft — de ring is zoek."</div>
        <button className="btn btn-gold btn-lg animate-in animate-in-5" onClick={()=>setScreen('setup')} style={{minWidth:220}}>
          {isAdmin?'Start als Game Master':'Speel mee'} <span style={{fontSize:18}}>→</span>
        </button>
        <div className="animate-in animate-in-6" style={{marginTop:28,fontSize:12,color:'var(--text-tertiary)',textAlign:'center',lineHeight:1.7,maxWidth:320,fontWeight:500}}>
          {teams.length>0?<><span style={{color:'var(--accent-2)',fontWeight:800}}>{teams.length} team{teams.length===1?'':'s'}</span> in de lobby · </>:''}≈4 uur buiten spelen<br/><span style={{opacity:0.7}}>Neem een power bank mee</span>
        </div>
      </div>
    );
  }

  // ═══════════ TEAM SETUP ═══════════
  if(screen==='setup'){
    return <TeamSetup teams={teams} setTeams={setTeams} onJoin={(team)=>{setMyTeam(team);setScreen('lobby')}} isAdmin={isAdmin}/>;
  }

  // ═══════════ LOBBY ═══════════
  if(screen==='lobby'){
    const teamCount=teams.length;
    return(
      <div style={{height:'100%',display:'flex',flexDirection:'column',padding:24,paddingTop:48,overflowY:'auto',position:'relative',zIndex:1}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div className="chip chip-blue animate-in" style={{margin:'0 auto',fontSize:10,letterSpacing:'0.18em'}}>LOBBY</div>
          <h1 className="animate-in animate-in-1" style={{fontSize:32,fontWeight:900,marginTop:14,lineHeight:1.1}}>{isAdmin?'Klaar om te starten?':'Verzamelen in Rotterdam'}</h1>
          <p className="animate-in animate-in-2" style={{fontSize:13,color:'var(--text-tertiary)',marginTop:10,fontWeight:500}}>📍 Startlocatie: Maritiem Museum, Leuvehaven</p>
        </div>

        {/* V13: live team roster */}
        <div style={{marginBottom:24}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div className="section-label" style={{margin:0}}>Teams in de lobby</div>
            <div className="chip chip-gold" style={{fontSize:11,padding:'4px 10px'}}>{teamCount} {teamCount===1?'team':'teams'}</div>
          </div>
          {teamCount===0?(
            <div style={{textAlign:'center',padding:32,color:'var(--text-tertiary)',fontSize:13,borderRadius:'var(--r-lg)',border:'1.5px dashed var(--border-strong)',fontWeight:500}}>
              <div style={{fontSize:32,marginBottom:8,opacity:0.5}}>👥</div>
              Nog geen teams — wacht tot iedereen joint
            </div>
          ):(
            <div style={{display:'grid',gridTemplateColumns:teamCount>=3?'1fr 1fr':'1fr',gap:12}}>
              {teams.map((t,i)=>(
                <div key={t.id||i} className="glass-card animate-in" style={{padding:18,textAlign:'center',animationDelay:`${i*0.08}s`,borderTop:`4px solid ${t.color}`,background:t.id===myTeam?.id?`linear-gradient(155deg,${t.color}22,${t.color}08)`:'linear-gradient(155deg,rgba(255,255,255,0.04),rgba(255,255,255,0.015))'}}>
                  <div style={{fontSize:38,marginBottom:8,filter:'drop-shadow(0 4px 12px rgba(0,0,0,0.35))'}}>{t.emoji}</div>
                  <div style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:15,letterSpacing:'-0.02em'}}>{t.name}</div>
                  {t.id===myTeam?.id&&<div className="chip chip-gold" style={{fontSize:9,marginTop:8,padding:'3px 9px',letterSpacing:'0.14em'}}>★ JIJ</div>}
                </div>
              ))}
            </div>
          )}
        </div>

        {isAdmin?(
          <>
            <button className="btn btn-gold btn-lg" onClick={()=>{
              if(teamCount<2){if(!confirm(`Slechts ${teamCount} team${teamCount===1?'':'s'} in de lobby. Toch starten?`))return;}
              startGame();
            }} style={{width:'100%'}}>🎮 Start het spel{teamCount>0?` (${teamCount})`:''}</button>
            <div style={{textAlign:'center',marginTop:12,fontSize:12,color:'var(--text-tertiary)',fontWeight:500}}>Jij bent de Game Master — druk zodra iedereen er is</div>
          </>
        ):(
          <div className="glass-card" style={{textAlign:'center',padding:20,background:'linear-gradient(155deg,rgba(110,163,255,0.08),rgba(110,163,255,0.02))',borderColor:'rgba(110,163,255,0.25)'}}>
            <div style={{fontSize:32,marginBottom:10}}>⏳</div>
            <div style={{fontFamily:'var(--font-display)',fontSize:15,color:'var(--foto-2)',fontWeight:800,letterSpacing:'-0.01em'}}>Wachten op de Game Master</div>
            <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:8,lineHeight:1.55,fontWeight:500}}>Pak vast een drankje bij het Maritiem Museum.<br/>Het spel start automatisch.</div>
          </div>
        )}
        {OFFLINE&&<div style={{textAlign:'center',marginTop:14}}><button className="btn btn-ghost btn-sm" onClick={startGame}>Demo: start zelf</button></div>}
      </div>
    );
  }

  // ═══════════ MAIN GAME ═══════════
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      {OFFLINE&&<div className="offline-banner">⚡ Offline Mode — Multiplayer uitgeschakeld</div>}
      {toast&&<div className="toast"><div className="toast-inner">{toast}</div></div>}
      {scorePopup&&<div className="score-popup">{scorePopup}</div>}
      {/* V9: unlock popup */}
      {unlockPopup&&(
        <div className="tier-unlock-popup">
          <div className="tier-unlock-emoji">{unlockPopup.emoji}</div>
          <div className="tier-unlock-title">{unlockPopup.label}</div>
          <div className="tier-unlock-name">{unlockPopup.name}</div>
        </div>
      )}

      {/* V13: Premium HUD */}
      <div style={{padding:'14px 18px',paddingTop:OFFLINE?32:14,background:'linear-gradient(180deg,rgba(10,11,16,0.92) 0%,rgba(10,11,16,0.85) 100%)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',zIndex:100,backdropFilter:'blur(20px) saturate(1.4)',WebkitBackdropFilter:'blur(20px) saturate(1.4)',position:'relative'}}>
        <div onClick={leaveTeam} style={{cursor:'pointer',display:'flex',alignItems:'center',gap:10}} title="Tik om team te verlaten">
          <div style={{fontSize:24,filter:'drop-shadow(0 2px 6px rgba(0,0,0,0.4))'}}>{myTeam?.emoji}</div>
          <div>
            <div style={{fontFamily:'var(--font-display)',fontSize:14,fontWeight:800,letterSpacing:'-0.02em'}}>{myTeam?.name}</div>
            <div style={{fontSize:10,color:'var(--text-tertiary)',fontWeight:600,marginTop:1}}>{PHASE_LABELS[phase]||`Fase ${phase}/4`} · {fmtHM(elapsed)}</div>
          </div>
        </div>
        <div style={{textAlign:'center'}}>
          <div style={{fontFamily:'var(--font-display)',fontSize:24,fontWeight:900,color:'var(--accent-2)',letterSpacing:'-0.04em',lineHeight:1,textShadow:'0 0 20px rgba(228,178,92,0.35)'}}>{myScore}</div>
          <div style={{fontSize:9,color:'var(--text-tertiary)',fontWeight:700,marginTop:3,letterSpacing:'0.06em',textTransform:'uppercase'}}>{myChallenges} · {visitedLocs.size} loc</div>
        </div>
        <div style={{textAlign:'right'}}>
          {ghost.active?(
            <div className="chip" style={{fontSize:11,color:'var(--quiz-2)',background:'rgba(178,155,255,0.18)',borderColor:'rgba(178,155,255,0.4)',fontWeight:800}}>👻 {fmtTime(ghost.timeLeft)}</div>
          ):(
            <div className="chip" style={{fontSize:10,fontWeight:700,padding:'4px 10px'}}>👻 {ghostMax-ghost.used}/{ghostMax}</div>
          )}
          <div style={{fontSize:9,color:'var(--text-tertiary)',marginTop:4,fontWeight:600}}>{visitedLocs.size}/102</div>
        </div>
      </div>

      {/* V13: Phase progress with labels */}
      <div style={{padding:'6px 18px 10px'}}>
        <div className="phase-bar">
          {[1,2,3,4].map(p=><div key={p} className={`phase-dot ${phase>p?'done':phase===p?'active':''}`}/>)}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--text-tertiary)',marginTop:6,letterSpacing:'0.1em',textTransform:'uppercase',fontWeight:700,fontFamily:'var(--font-display)'}}>
          <span style={{color:phase>=1?'var(--accent-2)':'var(--text-tertiary)',transition:'color .4s'}}>Zoektocht</span>
          <span style={{color:phase>=2?'var(--accent-2)':'var(--text-tertiary)',transition:'color .4s'}}>Geruchten</span>
          <span style={{color:phase>=3?'var(--accent-2)':'var(--text-tertiary)',transition:'color .4s'}}>Cirkel</span>
          <span style={{color:phase>=4?'var(--accent-2)':'var(--text-tertiary)',transition:'color .4s'}}>Finale</span>
        </div>
      </div>

      {/* Tab content */}
      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {tab==='leaderboard'&&<LeaderboardView teams={teams} scores={scores} myTeam={myTeam} phase={phase} elapsed={elapsed} barBreak={barBreak} jorikInTeam={jorikInTeam} weddingDone={weddingDone} onShowWedding={()=>setShowWedding(true)} onShowStory={(k)=>setStoryShown(k)} pendingMine={pendingMine} completed={completed} ghostMax={ghostMax}/>}
        {tab==='map'&&<MapView pos={pos} completed={completed} visitedLocs={visitedLocs} onSelect={setSelLoc} ghost={ghost} onGhost={activateGhost} ghostMax={ghostMax} phase={phase} gpsStatus={gpsStatus} gpsSnap={gpsSnap} onWakeGps={wakeGps}/>}
        {tab==='activity'&&<ActivityView feed={activityFeed} myTeamId={myTeam?.id} onPhoto={setPhotoLightbox} filter={feedFilter} setFilter={setFeedFilter}/>}
        {tab==='review'&&isAdmin&&<AdminReviewView queue={reviewQueue} onApprove={approveReview} onReject={rejectReview} onPhoto={setPhotoLightbox} teams={teams} jorikTeamId={jorikTeamId} onMoveJorik={moveJorik} onTriggerBarBreak={triggerBarBreak} onEndBarBreak={endBarBreak} barBreakActive={barBreakActive} onStartFinale={startFinale} phase={phase} scores={scores} onAdjustScore={adjustScore} onRemoveTeam={removeTeam} reviewUndo={reviewUndo} onUndoReview={undoReview}/>}
      </div>

      {/* V5: Narrative story modal */}
      {storyShown&&NARRATIVE[storyShown]&&(
        <StoryModal story={NARRATIVE[storyShown]} onClose={()=>setStoryShown(null)}/>
      )}

      {/* V5: Photo lightbox */}
      {photoLightbox&&<PhotoLightbox media={photoLightbox} onClose={()=>setPhotoLightbox(null)}/>}

      {/* V10: Bar-break overlay */}
      {barBreakActive&&<BarBreakOverlay info={barBreakActive} onClose={()=>setBarBreakActive(null)} onComplete={(mini,pts)=>{
        setScores(prev=>({...prev,[myTeam?.id]:(prev[myTeam?.id]||0)+pts}));
        setScorePopup(`+${pts}`);
        addActivity(`haalde "${mini.title}" bij ${barBreakActive.name} · +${pts} pts`,pts);
        if(!OFFLINE&&sb&&myTeam){
          sb.from('teams').update({score:(scores[myTeam.id]||0)+pts}).eq('id',myTeam.id);
        }
      }}/>}

      {/* V10: Finale ceremony (phase 5) */}
      {phase===5&&<FinaleScreen teams={teams} scores={scores} myTeam={myTeam} elapsed={elapsed} activityFeed={activityFeed} jorikTeamId={jorikTeamId}/>}

      {/* Bottom sheet for challenges */}
      {selLoc!=null&&<ChallengeSheet loc={L_DATA.find(l=>l.id===selLoc)} pos={pos} completed={completed[selLoc]||{}} completedPts={completedPts[selLoc]||{}} onComplete={completeChallenge} onClose={()=>setSelLoc(null)} jorikInTeam={jorikInTeam} seenQuizzes={seenQuizzes} isAdmin={isAdmin} myTeam={myTeam}/>}

      {/* Wedding video modal */}
      {showWedding&&<WeddingMission onClose={()=>setShowWedding(false)} onComplete={()=>{setWeddingDone(true);setShowWedding(false);completeChallenge(-1,0,WEDDING_VIDEO_BONUS);addActivity('Geheime bruiloftsvideo opgenomen! 🎬',WEDDING_VIDEO_BONUS)}} done={weddingDone}/>}

      {/* Tab bar */}
      <div className="tab-bar">
        {[
          {id:'leaderboard',icon:'🏆',label:'Ranking'},
          {id:'map',icon:'🗺️',label:'Kaart'},
          {id:'activity',icon:'📢',label:'Feed'},
          ...(isAdmin?[{id:'review',icon:'✅',label:'Beoordeel',badge:reviewQueue.length}]:[]),
        ].map(t=>(
          <button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)} style={{position:'relative'}}>
            <span className="tab-icon">{t.icon}</span>{t.label}
            {t.badge>0&&<span style={{position:'absolute',top:2,right:'25%',background:'#ff4444',color:'#fff',fontSize:9,fontWeight:800,padding:'2px 5px',borderRadius:9,minWidth:14,textAlign:'center'}}>{t.badge}</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// TEAM SETUP — V5: starter packs + custom
// ═══════════════════════════════════════════
function TeamSetup({teams,setTeams,onJoin,isAdmin}){
  const[mode,setMode]=useState('quick'); // 'quick' | 'custom'
  const[name,setName]=useState('');
  const[emoji,setEmoji]=useState('');
  const[color,setColor]=useState('');
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);
  // V12: editable name on a starter pack
  const[packNameOverride,setPackNameOverride]=useState({});
  const usedEmojis=teams.map(t=>t.emoji);
  const usedNames=teams.map(t=>t.name.toLowerCase());

  // V12: fresh name check against live Supabase right before insert — belt-and-braces vs stale local state
  const nameConflict=async(finalName)=>{
    if(!finalName)return false;
    if(usedNames.includes(finalName.toLowerCase()))return true;
    if(OFFLINE||!sb)return false;
    try{
      const res=await sb.from('teams').select('id').ilike('name',finalName).limit(1);
      return !!(res.data&&res.data.length);
    }catch(e){return false;}
  };

  const createFromPack=async(pack)=>{
    if(busy)return;
    const finalName=(packNameOverride[pack.name]||pack.name).trim();
    if(!finalName){setErr('Geef je team een naam');return;}
    if(usedEmojis.includes(pack.emoji)){setErr(`${pack.emoji} is al gekozen door een ander team`);return;}
    setBusy(true);
    if(await nameConflict(finalName)){setErr(`"${finalName}" is al in gebruik door een ander team`);setBusy(false);return;}
    if(!OFFLINE&&sb){
      const res=await sb.from('teams').insert({name:finalName,emoji:pack.emoji,color:pack.color}).select().single();
      if(res.error){
        setErr('Team aanmaken mislukt — probeer een andere naam');setBusy(false);return;
      }
      const team={...res.data};
      setTeams(prev=>prev.some(t=>t.id===team.id)?prev:[...prev,team]);
      onJoin(team);
    }else{
      const team={id:Date.now(),name:finalName,emoji:pack.emoji,color:pack.color,score:0};
      setTeams(prev=>[...prev,team]);
      onJoin(team);
    }
    setBusy(false);
  };

  const createCustom=async()=>{
    if(busy)return;
    if(!name||!emoji||!color){setErr('Kies naam, icoon én kleur');return;}
    const finalName=name.trim();
    if(usedEmojis.includes(emoji)){setErr(`${emoji} is al gekozen door een ander team`);return;}
    setBusy(true);
    if(await nameConflict(finalName)){setErr(`"${finalName}" is al in gebruik door een ander team`);setBusy(false);return;}
    if(!OFFLINE&&sb){
      const res=await sb.from('teams').insert({name:finalName,emoji,color}).select().single();
      if(res.error){setErr('Team aanmaken mislukt — probeer een andere naam');setBusy(false);return;}
      const team={...res.data};
      setTeams(prev=>prev.some(t=>t.id===team.id)?prev:[...prev,team]);
      onJoin(team);
    }else{
      const team={id:Date.now(),name:finalName,emoji,color,score:0};
      setTeams(prev=>[...prev,team]);
      onJoin(team);
    }
    setBusy(false);
  };

  return(
    <div style={{height:'100%',overflow:'auto',padding:24,paddingTop:48,paddingBottom:40,position:'relative',zIndex:1}}>
      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{fontSize:56,marginBottom:14,filter:'drop-shadow(0 6px 16px rgba(110,163,255,0.35))'}}>🎮</div>
        <h1 className="animate-in" style={{fontSize:30,fontWeight:900,letterSpacing:'-0.03em'}}>Kies je team</h1>
        <p className="animate-in animate-in-1" style={{fontSize:13,color:'var(--text-secondary)',marginTop:8,fontWeight:500}}>Tik op een starter pack of maak je eigen</p>
      </div>

      {/* V13: Mode toggle — segment */}
      <div style={{display:'flex',gap:6,marginBottom:18,padding:5,background:'rgba(255,255,255,0.04)',borderRadius:'var(--r-pill)',border:'1px solid var(--border)'}}>
        <button onClick={()=>setMode('quick')} style={{flex:1,padding:12,borderRadius:'var(--r-pill)',border:'none',background:mode==='quick'?'linear-gradient(135deg,rgba(110,163,255,0.22),rgba(110,163,255,0.1))':'transparent',color:mode==='quick'?'var(--foto-2)':'var(--text-secondary)',fontWeight:800,fontSize:13,cursor:'pointer',transition:'all .25s var(--spring)',fontFamily:'var(--font-display)',letterSpacing:'0.02em',boxShadow:mode==='quick'?'inset 0 0 0 1px rgba(110,163,255,0.35)':'none'}}>⚡ Snel</button>
        <button onClick={()=>setMode('custom')} style={{flex:1,padding:12,borderRadius:'var(--r-pill)',border:'none',background:mode==='custom'?'linear-gradient(135deg,rgba(110,163,255,0.22),rgba(110,163,255,0.1))':'transparent',color:mode==='custom'?'var(--foto-2)':'var(--text-secondary)',fontWeight:800,fontSize:13,cursor:'pointer',transition:'all .25s var(--spring)',fontFamily:'var(--font-display)',letterSpacing:'0.02em',boxShadow:mode==='custom'?'inset 0 0 0 1px rgba(110,163,255,0.35)':'none'}}>✏️ Eigen</button>
      </div>

      {mode==='quick'&&(
        <div>
          <div className="section-label">Starter packs</div>
          <div className="starter-grid">
            {STARTER_PACKS.map((p,i)=>{
              const taken=usedEmojis.includes(p.emoji)||usedNames.includes(p.name.toLowerCase());
              return(
                <button key={i} className={`starter-card animate-in animate-in-${(i%4)+1} ${taken?'taken':''}`}
                  onClick={()=>createFromPack(p)} disabled={taken||busy}
                  style={{borderColor:taken?'var(--border)':p.color,boxShadow:taken?'none':`0 8px 24px ${p.color}28,${p.color}12 0px 0px 0px 1px inset,var(--sh-ring)`}}>
                  <div className="starter-emoji">{p.emoji}</div>
                  <div className="starter-name">{p.name}</div>
                  <div className="starter-color" style={{background:p.color}}/>
                  {taken&&<div style={{fontSize:10,color:'var(--text-tertiary)',marginTop:6,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase'}}>bezet</div>}
                </button>
              );
            })}
          </div>
          {err&&<div style={{marginTop:12,padding:'10px 14px',borderRadius:'var(--r-md)',background:'rgba(255,107,107,0.12)',border:'1px solid rgba(255,107,107,0.35)',color:'var(--danger)',fontSize:12,fontWeight:700,textAlign:'center'}}>⚠ {err}</div>}
          {busy&&<div style={{marginTop:12,textAlign:'center',fontSize:12,color:'var(--text-secondary)',fontWeight:600}}>⏳ Team aanmaken…</div>}
          <div style={{textAlign:'center',marginTop:18,fontSize:12,color:'var(--text-tertiary)',fontWeight:500}}>Liever zelf een naam verzinnen? <a onClick={()=>setMode('custom')} style={{color:'var(--foto-2)',cursor:'pointer',fontWeight:700}}>Eigen team maken</a></div>
        </div>
      )}

      {mode==='custom'&&(
        <>
          <div className="glass" style={{padding:16,marginBottom:12}}>
            <label style={{fontSize:12,color:'var(--text-secondary)',fontWeight:600,display:'block',marginBottom:8}}>TEAMNAAM</label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Bijv. De Maffiosi"
              style={{width:'100%',padding:12,borderRadius:10,border:'1px solid rgba(255,255,255,0.15)',background:'rgba(255,255,255,0.05)',color:'#fff',fontSize:16,outline:'none'}}/>
          </div>

          <div className="glass" style={{padding:16,marginBottom:12}}>
            <label style={{fontSize:12,color:'var(--text-secondary)',fontWeight:600,display:'block',marginBottom:8}}>TEAM ICOON</label>
            <div className="emoji-grid">
              {TEAM_EMOJIS.map(e=>(
                <button key={e} className={`emoji-btn ${emoji===e?'selected':''} ${usedEmojis.includes(e)&&emoji!==e?'taken':''}`}
                  onClick={()=>!usedEmojis.includes(e)&&setEmoji(e)} disabled={usedEmojis.includes(e)&&emoji!==e}>{e}</button>
              ))}
            </div>
          </div>

          <div className="glass" style={{padding:16,marginBottom:16}}>
            <label style={{fontSize:12,color:'var(--text-secondary)',fontWeight:600,display:'block',marginBottom:8}}>TEAM KLEUR</label>
            <div className="color-grid">
              {TEAM_COLORS.map(c=>(
                <button key={c.hex} className={`color-btn ${color===c.hex?'selected':''}`}
                  style={{background:c.hex}} onClick={()=>setColor(c.hex)}/>
              ))}
            </div>
          </div>

          <button className="btn btn-cyan" onClick={createCustom} disabled={!name||!emoji||!color||busy}
            style={{width:'100%',padding:16,fontSize:16,borderRadius:14}}>
            {busy?'⏳ Aanmaken…':'Team Aanmaken & Joinen'}
          </button>
          {err&&<div style={{marginTop:10,padding:'8px 12px',borderRadius:10,background:'rgba(224,92,92,0.1)',border:'1px solid rgba(224,92,92,0.3)',color:'var(--danger)',fontSize:12,fontWeight:600,textAlign:'center'}}>⚠ {err}</div>}
        </>
      )}

      {/* V12: admin spectator path — no team needed */}
      {isAdmin&&(
        <div style={{marginTop:24,padding:14,borderRadius:12,background:'rgba(212,160,84,0.06)',border:'1px dashed rgba(212,160,84,0.3)',textAlign:'center'}}>
          <div style={{fontSize:11,color:'var(--accent)',fontWeight:700,letterSpacing:1,marginBottom:4}}>GAME MASTER</div>
          <div style={{fontSize:12,color:'var(--text-secondary)',marginBottom:10}}>Liever alleen observeren zonder mee te spelen?</div>
          <button className="btn btn-ghost" onClick={()=>onJoin({id:-1,name:'Game Master',emoji:'👑',color:'#d4a054',score:0,spectator:true})}
            style={{fontSize:12,padding:'8px 16px'}}>
            👑 Alleen als GM observeren
          </button>
        </div>
      )}
    </div>
  );
}

// LEADERBOARD VIEW (Primary tab)
// ═══════════════════════════════════════════
function LeaderboardView({teams,scores,myTeam,phase,elapsed,barBreak,jorikInTeam,weddingDone,onShowWedding,onShowStory,pendingMine,completed,ghostMax}){
  const sorted=[...teams].map(t=>({...t,score:scores[t.id]||0})).sort((a,b)=>b.score-a.score);
  // V9: own progress info — challenges done by my team (rough proxy for tier; we only have local 'completed' state)
  const myChallengesDone=completed?Object.values(completed).reduce((s,o)=>s+Object.keys(o).length,0):0;
  const myTier=tierFor(myChallengesDone);
  const myNextTier=nextTier(myChallengesDone);
  const myScore=scores[myTeam?.id]||0;
  // Next ghost-charge milestone we haven't passed yet
  const nextGhost=GHOST_BONUS_THRESHOLDS.find(t=>myScore<t.score);
  // V5: map current phase to the relevant narrative entry
  const phaseKey=phase>=1&&phase<=4?`phase${phase}`:null;
  const phaseStory=phaseKey?NARRATIVE[phaseKey]:null;

  return(
    <div style={{height:'100%',overflowY:'auto',padding:16,paddingBottom:90}}>
      {/* V5: narrative ticker */}
      {phaseStory&&(
        <div className="story-ticker" onClick={()=>onShowStory&&onShowStory(phaseKey)} style={{cursor:'pointer'}}>
          <div style={{fontSize:10,fontWeight:800,color:'var(--quiz)',letterSpacing:1,marginBottom:4}}>{phaseStory.chapter}</div>
          <div style={{fontWeight:700,color:'#fff',marginBottom:3,fontStyle:'normal'}}>{phaseStory.title}</div>
          <div style={{fontSize:11,color:'var(--text-secondary)',fontStyle:'italic'}}>Tik voor verhaal →</div>
        </div>
      )}
      {/* V9: next reward banner — shows whichever milestone is closest */}
      {(myNextTier||nextGhost)&&(
        <div className="reward-card">
          <div className="reward-icon">{myNextTier?myNextTier.badge:'👻'}</div>
          <div className="reward-info">
            <div className="reward-label">VOLGENDE BELONING</div>
            <div className="reward-target">
              {myNextTier?
                `${myNextTier.name} bij ${myNextTier.min} challenges (${myChallengesDone}/${myNextTier.min})`
                :
                `${nextGhost.label} (${myScore}/${nextGhost.score} pts)`
              }
            </div>
            <div className="reward-progress">
              <div className="reward-progress-fill" style={{
                width: myNextTier?
                  `${Math.min(100, (myChallengesDone/myNextTier.min)*100)}%`
                  :
                  `${Math.min(100, (myScore/nextGhost.score)*100)}%`
              }}/>
            </div>
          </div>
        </div>
      )}

      {/* V9: own current tier banner (if you have one) */}
      {myTier&&!myNextTier&&(
        <div className="reward-card" style={{borderColor:'rgba(255,215,0,0.4)'}}>
          <div className="reward-icon">{myTier.badge}</div>
          <div className="reward-info">
            <div className="reward-label">MAX TIER BEHAALD</div>
            <div className="reward-target">{myTier.name} · jullie zijn legendes</div>
          </div>
        </div>
      )}

      {/* V6: pending review badge for own team */}
      {pendingMine>0&&(
        <div className="glass" style={{padding:10,marginBottom:10,borderColor:'rgba(255,215,0,0.3)',display:'flex',alignItems:'center',gap:10}}>
          <div style={{fontSize:18}}>⏳</div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:'var(--accent)',fontWeight:700}}>{pendingMine} foto{pendingMine===1?'':"'s"} in beoordeling</div>
            <div style={{fontSize:10,color:'var(--text-secondary)',marginTop:2}}>Punten zijn voorlopig toegekend · game master kan ze afkeuren</div>
          </div>
        </div>
      )}

      {/* Bar break countdown */}
      {barBreak&&(
        <div className="glass" style={{padding:14,marginBottom:14,textAlign:'center',borderColor:'rgba(255,215,0,0.3)'}}>
          <div style={{fontSize:11,color:'var(--accent)',fontWeight:700}}>🍺 VOLGENDE BAR BREAK</div>
          <div style={{fontSize:16,fontWeight:700,marginTop:4}}>{barBreak.name}</div>
        </div>
      )}

      {/* Wedding video mission - only when Jorik is NOT in team */}
      {!jorikInTeam&&!weddingDone&&(
        <div className="secret-banner" onClick={onShowWedding}>
          <div className="secret-badge">🤫 GEHEIME MISSIE</div>
          <div style={{fontWeight:700,fontSize:14}}>Bruiloftsvideo opnemen</div>
          <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:4}}>Tik hier voor instructies · +{WEDDING_VIDEO_BONUS} pts</div>
        </div>
      )}
      {weddingDone&&(
        <div className="glass" style={{padding:14,marginBottom:14,borderColor:'rgba(0,255,136,0.3)'}}>
          <div style={{fontSize:12,color:'var(--success)',fontWeight:700}}>✅ Geheime missie voltooid!</div>
        </div>
      )}

      {/* Leaderboard cards */}
      {sorted.map((t,i)=>{
        // V9: only my team has accurate local 'completed' data; show tier on own card.
        // Other teams' tier could be sourced from Supabase 'challenges_completed' field if present.
        const isMine=t.id===myTeam?.id;
        const teamChallenges=isMine?myChallengesDone:(t.challenges_completed||0);
        const teamTier=tierFor(teamChallenges);
        return(
          <div key={t.id} className={`lb-card glass animate-in animate-in-${i+1} ${i===0?'lb-first':''}`}
            style={{borderLeft:`4px solid ${t.color}`}}>
            <div className={`lb-rank ${i===0?'lb-rank-1':i===1?'lb-rank-2':i===2?'lb-rank-3':'lb-rank-other'}`}>#{i+1}</div>
            <div className="lb-emoji">{t.emoji}</div>
            <div className="lb-info">
              <div className="lb-name" style={{display:'flex',alignItems:'center',flexWrap:'wrap'}}>
                {t.name} {isMine?'(jij)':''}
                {teamTier&&(
                  <span className="tier-badge" style={{color:teamTier.color,borderColor:teamTier.color+'66'}}>
                    <span className="tier-emoji">{teamTier.badge}</span>{teamTier.name}
                  </span>
                )}
              </div>
              <div className="lb-stats">{teamChallenges} challenges · {t.locations_visited||0} locaties{isMine&&ghostMax>GHOST_MAX_USES?` · 👻×${ghostMax}`:''}</div>
            </div>
            <div className="lb-score" style={{color:t.color}}>{t.score}</div>
          </div>
        );
      })}

      {sorted.length===0&&(
        <div style={{textAlign:'center',padding:40,color:'var(--text-tertiary)'}}>
          <div style={{fontSize:48,marginBottom:16}}>🏆</div>
          <div>Nog geen scores</div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════
// MAP VIEW
// ═══════════════════════════════════════════
function MapView({pos,completed,visitedLocs,onSelect,ghost,onGhost,ghostMax=GHOST_MAX_USES,phase,gpsStatus,gpsSnap,onWakeGps}){
  const mapRef=useRef(null);
  const mapInst=useRef(null);
  const markersRef=useRef([]);
  const userMarkerRef=useRef(null);
  const dinnerCircleRef=useRef(null); // V12: phase-gated dinner zone circle

  // Init map
  useEffect(()=>{
    if(!mapRef.current||mapInst.current)return;
    const m=L.map(mapRef.current).setView([START_POS.lat,START_POS.lng],15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'',maxZoom:19}).addTo(m);

    // V11: Add color-dot markers (category-colored, not emojis)
    const catColor=(loc)=>{
      const types=loc.ch.map(c=>c.t);
      if(types.includes('photo'))return 'var(--foto)';
      if(types.includes('video'))return 'var(--video)';
      if(types.includes('creative'))return 'var(--creatief)';
      if(types.includes('quiz'))return 'var(--quiz)';
      return 'var(--accent)';
    };
    const catColorHex=(loc)=>{
      const types=loc.ch.map(c=>c.t);
      if(types.includes('photo'))return '#5b8dee';
      if(types.includes('video'))return '#e05c5c';
      if(types.includes('creative'))return '#4bbe8a';
      if(types.includes('quiz'))return '#9b7bea';
      return '#d4a054';
    };
    L_DATA.forEach(loc=>{
      const col=catColorHex(loc);
      const mk=L.marker([loc.la,loc.lo],{
        icon:L.divIcon({className:'',iconAnchor:[8,8],interactive:true,
          // V12: bigger dot (16px) + 8px invisible padding → 32×32 hit target
          html:`<div style="padding:8px;margin:-8px"><div style="width:16px;height:16px;border-radius:50%;background:${col};border:2px solid rgba(255,255,255,0.35);cursor:pointer;box-shadow:0 0 8px ${col}66;transition:all .2s"></div></div>`
        })
      }).addTo(m);
      mk.on('click',()=>onSelect(loc.id));
      mk._locId=loc.id;
      mk._color=col;
      markersRef.current.push(mk);
    });

    // V12: Dinner zone circle — only rendered once phase unlocks it
    // (stored on the ref so the phase-watch effect can show/hide it)
    dinnerCircleRef.current=L.circle([DINNER_ZONE.lat,DINNER_ZONE.lng],{radius:DINNER_ZONE.r,color:'#d4a054',fillColor:'#d4a054',fillOpacity:0.05,weight:2,dashArray:'6 4'});

    mapInst.current=m;
  },[]);

  // Update user position
  useEffect(()=>{
    if(!mapInst.current||!pos)return;
    if(userMarkerRef.current)mapInst.current.removeLayer(userMarkerRef.current);
    userMarkerRef.current=L.marker([pos.lat,pos.lng],{
      icon:L.divIcon({className:'',iconAnchor:[6,6],
        html:'<div style="position:relative"><div style="width:12px;height:12px;border-radius:50%;background:#d4a054;border:2px solid rgba(255,255,255,0.9);box-shadow:0 0 12px rgba(212,160,84,0.5);z-index:5;position:relative"></div><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:32px;height:32px;border-radius:50%;border:1px solid rgba(212,160,84,0.15);animation:pulse 3s ease-in-out infinite"></div></div>'
      })
    }).addTo(mapInst.current);
  },[pos]);

  // V12: fade visited POIs on the map
  useEffect(()=>{
    if(!markersRef.current)return;
    markersRef.current.forEach(mk=>{
      const visited=visitedLocs&&visitedLocs.has(mk._locId);
      const el=mk.getElement&&mk.getElement();
      if(el){
        const inner=el.querySelector('div>div');
        if(inner){
          inner.style.opacity=visited?'0.25':'1';
          inner.style.filter=visited?'grayscale(1)':'none';
        }
      }
    });
  },[visitedLocs]);

  // V12: show dinner zone only from phase 3 onward; pulse in phase 4+
  useEffect(()=>{
    if(!mapInst.current||!dinnerCircleRef.current)return;
    const has=mapInst.current.hasLayer(dinnerCircleRef.current);
    if(phase>=3&&!has)dinnerCircleRef.current.addTo(mapInst.current);
    if(phase<3&&has)mapInst.current.removeLayer(dinnerCircleRef.current);
    if(phase>=4&&dinnerCircleRef.current){
      dinnerCircleRef.current.setStyle({weight:3,fillOpacity:0.1,dashArray:null});
    }
  },[phase]);

  // V12: center-on-me control
  const centerOnMe=()=>{
    if(mapInst.current&&pos)mapInst.current.setView([pos.lat,pos.lng],16,{animate:true});
  };

  // Get nearby challenges
  const nearby=getNearby(pos,completed);

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',position:'relative'}}>
      <div ref={mapRef} style={{flex:1}}/>

      {/* V5.1/V12: GPS status pill — softer copy, tap to force-wake when paused */}
      <div className="gps-pill" onClick={()=>onWakeGps&&onWakeGps()} style={{cursor:'pointer'}} title="Tik om GPS te activeren">
        <span className={`gps-dot ${gpsStatus||'weak'}`}/>
        {gpsStatus==='good'?'GPS actief':gpsStatus==='sleep'?'GPS paust':'GPS zoekt…'}
        {gpsSnap&&<span style={{color:'var(--foto)'}}>· op {gpsSnap}</span>}
        {gpsStatus==='sleep'&&<span className="snap-btn">tik om te activeren</span>}
      </div>

      {/* V12: legend — bottom-left, stacked */}
      <div style={{position:'absolute',bottom:180,left:10,zIndex:1000,padding:'6px 8px',borderRadius:10,backdropFilter:'blur(12px)',background:'rgba(8,9,13,0.7)',border:'1px solid var(--border)',display:'flex',flexDirection:'column',gap:3,fontSize:9,color:'var(--text-secondary)'}}>
        <div style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:4,background:'var(--foto)'}}/>Foto</div>
        <div style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:4,background:'var(--video)'}}/>Video</div>
        <div style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:4,background:'var(--creatief)'}}/>Creatief</div>
        <div style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:4,background:'var(--quiz)'}}/>Quiz</div>
      </div>

      {/* V12: center-on-me */}
      {pos&&(
        <button onClick={centerOnMe} style={{position:'absolute',bottom:180,right:12,zIndex:1000,width:38,height:38,borderRadius:19,background:'rgba(8,9,13,0.85)',border:'1px solid var(--border)',backdropFilter:'blur(12px)',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}} title="Centreer op mij">📍</button>
      )}

      {/* Ghost mode button */}
      <div style={{position:'absolute',top:12,right:12,zIndex:1000}}>
        <button className={`btn ${ghost.active?'btn-danger':'btn-ghost'}`} onClick={onGhost} disabled={ghost.used>=ghostMax&&!ghost.active}
          style={{fontSize:10,padding:'6px 12px',borderRadius:8,backdropFilter:'blur(8px)'}}>
          {ghost.active?`👻 ${fmtTime(ghost.timeLeft)}`:`👻 Ghost ${ghostMax-ghost.used}/${ghostMax}`}
        </button>
      </div>

      {/* V11: Compact nearby panel — max 3 cards */}
      <div className="nearby-panel">
        {nearby.slice(0,3).map(loc=>{
          const primaryType=loc.ch[0]?.t||'photo';
          const typeClass=primaryType==='photo'?'foto':primaryType==='creative'?'creatief':primaryType;
          const types=[...new Set(loc.ch.map(c=>c.t))];
          return(
            <div key={loc.id} className="nearby-card" onClick={()=>onSelect(loc.id)}>
              <div className={`nearby-indicator ${typeClass}`}/>
              <div className="nearby-info">
                <div className="nearby-name">{loc.n}</div>
                <div className="nearby-tags">
                  {types.map(t=>{
                    const tc=t==='photo'?'t-foto':t==='creative'?'t-creatief':t==='quiz'?'t-quiz':'t-video';
                    const label=t==='photo'?'Foto':t==='creative'?'Creatief':t==='quiz'?'Quiz':'Video';
                    return <span key={t} className={`nearby-tag ${tc}`}>{label}</span>;
                  })}
                </div>
              </div>
              <div className="nearby-end">
                <div className="nearby-dist">{fmtDist(loc.dist)}</div>
                <div className="nearby-pts">+{loc.ch.reduce((s,c)=>s+c.p,0)}</div>
              </div>
              <div className="nearby-chevron">›</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// ACTIVITY FEED — V5: photo grid + filters
// ═══════════════════════════════════════════
function ActivityView({feed,myTeamId,onPhoto,filter,setFilter}){
  // V10: local-only emoji reactions (not persisted; just social texture in-session)
  const REACTIONS=['🔥','👏','💀','😂','🍻'];
  const[reactions,setReactions]=useState({}); // {entryKey: {emoji: count}}
  const[myReactions,setMyReactions]=useState({}); // {entryKey: Set<emoji>}
  const entryKey=(item,i)=>`${item.created_at||i}_${item.team_id||'sys'}`;
  const toggleReaction=(key,emoji)=>{
    setMyReactions(prev=>{
      const cur=new Set(prev[key]||[]);
      if(cur.has(emoji))cur.delete(emoji); else cur.add(emoji);
      return{...prev,[key]:cur};
    });
    setReactions(prev=>{
      const cur=prev[key]||{};
      const mine=(myReactions[key]||new Set()).has(emoji);
      return{...prev,[key]:{...cur,[emoji]:(cur[emoji]||0)+(mine?-1:1)}};
    });
  };
  // Apply filter
  const filtered=feed.filter(item=>{
    if(filter==='photos')return !!item.photo;
    if(filter==='mine')return item.team_id===myTeamId;
    return true;
  });
  const photos=feed.filter(i=>!!i.photo);

  return(
    <div style={{height:'100%',overflowY:'auto',padding:16,paddingBottom:90}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:11,color:'var(--text-secondary)',fontWeight:600,letterSpacing:1}}>LIVE FEED</div>
        <div style={{fontSize:10,color:'var(--text-tertiary)'}}>{feed.length} berichten · {photos.length} foto's</div>
      </div>

      {/* V5: filter pills */}
      <div className="filter-pills">
        <button className={`filter-pill ${filter==='all'?'active':''}`} onClick={()=>setFilter('all')}>Alles</button>
        <button className={`filter-pill ${filter==='photos'?'active':''}`} onClick={()=>setFilter('photos')}>📸 Foto's</button>
        <button className={`filter-pill ${filter==='mine'?'active':''}`} onClick={()=>setFilter('mine')}>Mijn team</button>
      </div>

      {/* V5: photo grid preview (top 9 most recent photos) */}
      {filter==='all'&&photos.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:'var(--text-tertiary)',fontWeight:600,marginBottom:6,letterSpacing:1}}>RECENTE FOTO'S</div>
          <div className="photo-grid">
            {photos.slice(0,9).map((item,i)=>(
              <div key={i} className="photo-grid-item animate-in" onClick={()=>onPhoto&&onPhoto(item.photo)}>
                {isVideoData(item.photo)
                  ?<video src={item.photo} muted/>
                  :<img src={item.photo} alt="submission"/>}
                <div className="photo-grid-overlay">
                  <span>{item.team_emoji||'🎮'}</span>
                  {item.points>0&&<span style={{color:'var(--accent)'}}>+{item.points}</span>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {filtered.length===0&&(
        <div style={{textAlign:'center',padding:40,color:'var(--text-tertiary)'}}>
          <div style={{fontSize:40,marginBottom:12}}>📢</div>
          <div>Nog geen activiteit</div>
          {filter!=='all'&&<button className="btn btn-ghost" onClick={()=>setFilter('all')} style={{marginTop:14,fontSize:12}}>Laat alles zien</button>}
        </div>
      )}

      {filtered.map((item,i)=>{
        const isMe=item.team_id===myTeamId;
        const key=entryKey(item,i);
        const rx=reactions[key]||{};
        const mine=myReactions[key]||new Set();
        // V12: style system (Game Master / automated) messages differently
        const isSystem=!item.team_id||item.team_name==='Game Master'||item.team_name==='Systeem';
        return(
          <div key={i} className="activity-row animate-in" style={{
            borderLeft:item.team_color?`3px solid ${item.team_color}`:undefined,
            background:isSystem?'rgba(212,160,84,0.04)':undefined,
            borderStyle:isSystem?'solid dashed dashed dashed':'solid'
          }}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{fontSize:20}}>{item.team_emoji||(isSystem?'👑':'🎮')}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600}}>
                  {item.team_name||'Systeem'}
                  {isSystem&&<span style={{fontSize:9,color:'var(--accent)',marginLeft:6,background:'rgba(212,160,84,0.15)',padding:'2px 6px',borderRadius:8,letterSpacing:0.5}}>SYSTEEM</span>}
                  {isMe&&!isSystem&&<span style={{fontSize:9,color:'var(--foto)',marginLeft:6,background:'rgba(0,212,255,0.15)',padding:'2px 6px',borderRadius:8}}>JIJ</span>}
                </div>
                <div style={{fontSize:12,color:'var(--text-secondary)'}}>{item.message}</div>
              </div>
              {item.points>0&&<div style={{fontSize:13,fontWeight:800,color:'var(--accent)'}}>+{item.points}</div>}
              {item.points<0&&<div style={{fontSize:13,fontWeight:800,color:'#ff6b6b'}}>{item.points}</div>}
            </div>
            {item.photo&&(
              isVideoData(item.photo)
                ?<video src={item.photo} className="activity-photo" controls muted onClick={()=>onPhoto&&onPhoto(item.photo)}/>
                :<img src={item.photo} className="activity-photo" alt="submission" onClick={()=>onPhoto&&onPhoto(item.photo)}/>
            )}
            {/* V10/V12: reactions — rendered only when the row is team-generated (systeem rows don't need reactions) */}
            {!isSystem&&(
              <div className="reactions" title="Alleen jij ziet jouw reacties">
                {REACTIONS.map(e=>{
                  const n=rx[e]||0;
                  return(
                    <button key={e} className={`reaction-btn ${mine.has(e)?'my':''}`} onClick={()=>toggleReaction(key,e)}>
                      <span>{e}</span>{n>0&&<span className="reaction-count">{n}</span>}
                    </button>
                  );
                })}
                <div style={{flex:1}}/>
                <div style={{fontSize:10,color:'var(--text-tertiary)',marginTop:3}}>{fmtRelTime(item.created_at)}</div>
              </div>
            )}
            {isSystem&&(
              <div style={{display:'flex',justifyContent:'flex-end',marginTop:4}}>
                <div style={{fontSize:10,color:'var(--text-tertiary)'}}>{fmtRelTime(item.created_at)}</div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// V5: NARRATIVE STORY MODAL
// ═══════════════════════════════════════════
function StoryModal({story,onClose}){
  return(
    <div className="story-overlay" onClick={onClose}>
      <div className="story-card" onClick={e=>e.stopPropagation()}>
        <div className="story-chapter">{story.chapter}</div>
        <div className="story-title">{story.title}</div>
        <div className="story-text">{story.text.split('\n\n').map((p,i)=>(
          <p key={i} style={{marginBottom:10}}>{p}</p>
        ))}</div>
        <button className="btn btn-cyan" onClick={onClose} style={{width:'100%',padding:14}}>
          Verder →
        </button>
      </div>
    </div>

}
