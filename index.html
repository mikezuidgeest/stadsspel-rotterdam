    return(
      <div className="screen">
        {/* V33: floating ⚙ admin button — Mike-only; opens AdminMenu drawer */}
        {isAdmin&&(
          <button onClick={()=>setAdminMenuOpen(true)} aria-label="Open admin menu"
            style={{position:'fixed',top:'calc(env(safe-area-inset-top, 0px) + var(--sp-3))',right:'var(--sp-3)',zIndex:10500,padding:'var(--sp-2) var(--sp-3)',borderRadius:'var(--r-pill)',background:'linear-gradient(135deg,rgba(228,178,92,0.95),rgba(212,160,84,0.95))',color:'#0a0b10',border:'1px solid rgba(255,255,255,0.4)',boxShadow:'0 4px 14px rgba(228,178,92,0.45)',cursor:'pointer',fontSize:'var(--fs-13)',fontWeight:'var(--fw-bold)',display:'flex',alignItems:'center',gap:'var(--sp-2)'}}>
            <span style={{fontSize:16}}>⚙</span><span>Admin</span>
          </button>
        )}
        {isAdmin&&<AdminMenu open={adminMenuOpen} onClose={()=>setAdminMenuOpen(false)} phase={phase} queueCount={reviewQueue.length} teamCount={teams.filter(t=>t.id>0).length} jorikTeamId={jorikTeamId} teams={teams} barBreakActive={barBreakActive} onPause={()=>{broadcastMessage('⏸️ PAUZE — iedereen stopt even met scores');setAdminMenuOpen(false);}} onResume={()=>{broadcastMessage('▶️ GO — verder spelen!');setAdminMenuOpen(false);}} onResetToLobby={()=>{resetGame();setAdminMenuOpen(false);}} onWipeAndRestart={wipeAndRestart} onStartFinalePhase={()=>{startFinalePhase();setAdminMenuOpen(false);}} onStartFinale={()=>{startFinale();setAdminMenuOpen(false);}} onGoReview={()=>{setScreen('game');setTab('review');}} confirmAsync={confirmAsync} promptAsync={promptAsync} jorikDeviceId={jorikDeviceId} isJorikDevice={isJorikDevice} onMarkJorikDevice={markJorikDevice} onLogout={logoutAdmin} testModeRuntime={testModeRuntime} buildTestMode={TEST_MODE} onSetTestMode={setTestModeFromAdmin}/>}
        {/* V41.7 — 🔐 GM trigger for non-admins on lobby, same top-right slot
            as the ⚙ admin pill (mutually exclusive). */}
        {!isAdmin&&(
          <button onClick={()=>setLoginOpen(true)} type="button"
            aria-label="Inloggen als Game Master" className="btn-gm"
            style={{position:'fixed',top:'calc(env(safe-area-inset-top, 0px) + var(--sp-3))',right:'var(--sp-3)',zIndex:10500}}>
            🔐 <span>Game Master</span>
          </button>
        )}
        {loginOpen&&<AdminLogin onClose={()=>setLoginOpen(false)} onSuccess={()=>{loginAsAdmin();setLoginOpen(false);}}/>}
        {/* V33: lobby needs the confirm-dialog mount point too — without this,
            confirmAsync() sets `dialog` state but no DialogSheet renders to show
            it, so admin menu confirmations silently no-op from the lobby. */}
        {dialog&&<DialogSheet {...dialog} onClose={closeDialog}/>}
        {toast&&<div className="toast" role="status" aria-live="polite" aria-atomic="true"><div className="toast-inner">{toast}</div></div>}
        <div className="text-center">
          <div className="chip chip-blue animate-in" style={{margin:'0 auto'}}>Lobby</div>
          <h1 className="t-title animate-in animate-in-1" style={{marginTop:'var(--sp-4)'}}>{isAdmin?'Klaar om te starten?':'Verzamelen in Rotterdam'}</h1>
          <p className="t-body animate-in animate-in-2" style={{marginTop:'var(--sp-2)'}}>📍 Maritiem Museum · Leuvehaven</p>
        </div>
        <div style={{height:'var(--sp-7)'}}/>

        {/* Teams roster */}
        <div className="row-between" style={{marginBottom:'var(--sp-3)'}}>
          <div className="t-label">Teams in de lobby</div>
          <div className="chip chip-gold">{teamCount} {teamCount===1?'team':'teams'}</div>
        </div>
        {teamCount===0?(
          <div className="panel text-center" style={{borderStyle:'dashed'}}>
            <div style={{fontSize:'var(--icon-sm)',opacity:0.5}}>👥</div>
            <div className="t-body" style={{marginTop:'var(--sp-2)'}}>Nog geen teams — wacht tot iedereen joint</div>
          </div>
        ):(
          <div style={{display:'grid',gridTemplateColumns:teamCount>=3?'1fr 1fr':'1fr',gap:'var(--sp-3)'}}>
            {teams.map((t,i)=>(
              <div key={t.id||i} className="panel animate-in text-center" style={{animationDelay:`${i*0.08}s`,borderTop:`4px solid ${t.color}`,background:t.id===myTeam?.id?`linear-gradient(155deg,${t.color}22,${t.color}08)`:undefined,minHeight:148,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-start'}}>
                <div style={{fontSize:'var(--icon-md)',filter:'drop-shadow(0 4px 12px rgba(0,0,0,0.35))'}}>{t.emoji}</div>
                <div className="t-card-title" style={{marginTop:'var(--sp-2)'}}>{t.name}</div>
                {Array.isArray(t.members)&&t.members.length>0&&(
                  <div style={{display:'flex',flexWrap:'wrap',gap:'var(--sp-1)',justifyContent:'center',marginTop:'var(--sp-2)'}}>
                    {t.members.slice(0,4).map((m,idx)=>(
                      <span key={idx} className="chip-xs">{m}</span>
                    ))}
                    {t.members.length>4&&<span className="t-caption" style={{padding:'2px 4px'}}>+{t.members.length-4}</span>}
                  </div>
                )}
                {t.id===myTeam?.id&&<div className="chip chip-gold" style={{marginTop:'auto',letterSpacing:'0.14em'}}>★ Jij</div>}
              </div>
            ))}
          </div>
        )}

        {/* V18 (§1.2.6): accidental join escape hatch — switch team before start */}
        {myTeam&&!myTeam.spectator&&(
          <div className="text-center" style={{marginTop:'var(--sp-3)'}}>
            <button className="btn btn-ghost btn-sm" onClick={async()=>{
              const ok=await confirmAsync(`Je zit nu in ${myTeam.emoji} ${myTeam.name}. Wil je van team wisselen?`,{confirmLabel:'Wissel team'});
              if(!ok)return;
              // V19: leave the team locally — do NOT delete the Supabase row,
              // because teammates may still be in it. Only the admin can prune
              // teams via the dedicated 🗑 button.
              setMyTeam(null);
              clearSession();
              setScreen('setup');
            }}>↩ Verkeerd team? Wissel</button>
          </div>
        )}
        <div style={{height:'var(--sp-7)'}}/>

        {/* V23: when LOBBY_OPEN_TO_ALL (TEST_MODE), every phone gets the start
            button — no waiting on the Game Master. Admin still sees the
            "Game Master" framing; non-admin sees the "testmodus" framing so
            it's obvious this is the loosened build. Live behavior restored
            when TEST_MODE flips to false (LOBBY_OPEN_TO_ALL becomes false). */}
        {(effectiveLobbyOpen||isAdmin)?(
          <div className="stack-3">
            {/* V28: stripped the teamCount<2 confirmAsync gate. Admin = Mike; no
                friction, no dialog that could get obscured by stacked overlays
                (GPS-denied sheet, bar-break, private-browsing banner). Button
                now fires startGame() synchronously on click — if Mike really
                wants to start with 0 or 1 teams, that's his call. Teams can
                still register mid-lobby via realtime after phase flips. */}
            <button className="btn btn-gold btn-lg" onClick={()=>startGame()} style={{width:'100%'}}>{isAdmin?'🎮 Start het spel':'🎮 Start spel (testmodus)'}{teamCount>0?` (${teamCount})`:''}</button>
            <div className="t-caption text-center">{isAdmin?'Jij bent de Game Master — druk zodra iedereen er is':'🧪 Testmodus — iedereen kan het spel starten · GPS-checks staan uit'}</div>
          </div>
        ):(
          <div className="panel text-center" style={{background:'linear-gradient(155deg,rgba(110,163,255,0.08),rgba(110,163,255,0.02))',borderColor:'rgba(110,163,255,0.25)'}}>
            <div style={{fontSize:36}}>⏳</div>
            <div className="t-card-label" style={{color:'var(--foto-2)',marginTop:'var(--sp-2)'}}>Wachten op de Game Master</div>
            <div className="t-body" style={{marginTop:'var(--sp-2)'}}>Verzamel bij het terras op de Leuvehaven-kade.<br/>Mike start zodra iedereen er is.</div>
          </div>
        )}
        {OFFLINE&&<div className="text-center" style={{marginTop:'var(--sp-4)'}}><button className="btn btn-ghost btn-sm" onClick={startGame}>Demo: start zelf</button></div>}
      </div>
    );
  }

  // ═══════════ MAIN GAME ═══════════
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      {OFFLINE&&<div className="offline-banner">⚡ Offline Mode — Multiplayer uitgeschakeld</div>}
      {/* V22 audit fix: private-browsing warning. localStorage is unavailable (iOS Private
          mode / locked-down browsers) so progress cannot survive a force-quit. One-shot banner. */}
      {!OFFLINE&&!localStorageWorks()&&<div className="offline-banner" style={{top:OFFLINE?26:0,color:'#e4b25c',background:'rgba(228,178,92,0.12)',borderBottomColor:'rgba(228,178,92,0.25)'}}>⚠︎ Private browsing actief — voortgang wordt niet bewaard bij tab sluiten</div>}
      {toast&&<div className="toast" role="status" aria-live="polite" aria-atomic="true"><div className="toast-inner">{toast}</div></div>}
      {/* V24: cross-device admin broadcast banner. Renders above everything
          else (z-index above toast/modal/sheet). Tap to dismiss; auto-clears
          after BROADCAST_BANNER_MS via the timer in showBroadcast(). */}
      {broadcastBanner&&(
        <div role="alertdialog" aria-live="assertive" aria-label="Bericht van de Game Master"
          onClick={()=>setBroadcastBanner(null)}
          style={{position:'fixed',top:'env(safe-area-inset-top, 0px)',left:0,right:0,zIndex:11000,
            padding:'var(--sp-3) var(--sp-5)',
            background:'linear-gradient(180deg,rgba(228,178,92,0.95) 0%,rgba(212,160,84,0.92) 100%)',
            color:'#0a0b10',cursor:'pointer',
            boxShadow:'0 8px 24px rgba(0,0,0,0.45)',
            borderBottom:'2px solid rgba(255,255,255,0.35)',
            animation:'broadcastIn 0.35s ease-out'}}>
          <div style={{display:'flex',alignItems:'flex-start',gap:'var(--sp-3)',maxWidth:520,margin:'0 auto'}}>
            <div style={{fontSize:24,flexShrink:0,lineHeight:1}}>📢</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="t-label-sm" style={{letterSpacing:'0.14em',opacity:0.7,marginBottom:2}}>GAME MASTER</div>
              <div className="t-body-emph" style={{lineHeight:'var(--lh-relaxed)',whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{broadcastBanner.message}</div>
            </div>
            <div style={{fontSize:18,flexShrink:0,opacity:0.6,marginLeft:'var(--sp-2)'}} aria-hidden="true">×</div>
          </div>
        </div>
      )}
      {scorePopup&&<div className="score-popup">{scorePopup}</div>}
      {/* V28 — confetti burst on score milestones (>= 30 pts in one drop) */}
      <ConfettiBurst seed={confettiSeed} intensity={confettiIntensity}/>
      {/* V33: floating ⚙ admin button — only Mike sees it (token-gated isAdmin).
          Position is fixed top-right just under the safe-area inset so it never
          clashes with the HUD avatar block. Tap opens the AdminMenu drawer.
          V41.9: hidden while a ChallengeSheet is open (selLoc!=null) — both
          buttons live in the same top-right corner and would otherwise overlap
          the sheet's ✕ close pill. The drawer is reachable again the moment
          the sheet closes; nothing important is gated to mission-open. */}
      {isAdmin&&selLoc==null&&(
        <button onClick={()=>setAdminMenuOpen(true)} aria-label="Open admin menu"
          style={{position:'fixed',top:'calc(env(safe-area-inset-top, 0px) + var(--sp-3))',right:'var(--sp-3)',zIndex:10500,padding:'var(--sp-2) var(--sp-3)',borderRadius:'var(--r-pill)',background:'linear-gradient(135deg,rgba(228,178,92,0.95),rgba(212,160,84,0.95))',color:'#0a0b10',border:'1px solid rgba(255,255,255,0.4)',boxShadow:'0 4px 14px rgba(228,178,92,0.45)',cursor:'pointer',fontSize:'var(--fs-13)',fontWeight:'var(--fw-bold)',display:'flex',alignItems:'center',gap:'var(--sp-2)'}}>
          <span style={{fontSize:16}}>⚙</span><span>Admin</span>
          {reviewQueue.length>0&&<span className="badge-count">{reviewQueue.length}</span>}
        </button>
      )}
      {isAdmin&&<AdminMenu open={adminMenuOpen} onClose={()=>setAdminMenuOpen(false)} phase={phase} queueCount={reviewQueue.length} teamCount={teams.filter(t=>t.id>0).length} jorikTeamId={jorikTeamId} teams={teams} barBreakActive={barBreakActive} onPause={()=>{broadcastMessage('⏸️ PAUZE — iedereen stopt even met scores');setAdminMenuOpen(false);}} onResume={()=>{broadcastMessage('▶️ GO — verder spelen!');setAdminMenuOpen(false);}} onResetToLobby={()=>{resetGame();setAdminMenuOpen(false);}} onWipeAndRestart={wipeAndRestart} onStartFinalePhase={()=>{startFinalePhase();setAdminMenuOpen(false);}} onStartFinale={()=>{startFinale();setAdminMenuOpen(false);}} onGoReview={()=>setTab('review')} confirmAsync={confirmAsync} promptAsync={promptAsync} jorikDeviceId={jorikDeviceId} isJorikDevice={isJorikDevice} onMarkJorikDevice={markJorikDevice} onLogout={logoutAdmin} testModeRuntime={testModeRuntime} buildTestMode={TEST_MODE} onSetTestMode={setTestModeFromAdmin}/>}
      {/* V41.7 — 🔐 GM trigger for non-admins in game view, same top-right slot
          as the ⚙ admin pill (mutually exclusive). V41.9: also hidden while a
          ChallengeSheet is open, same reason — would overlap the sheet's ✕. */}
      {!isAdmin&&selLoc==null&&(
        <button onClick={()=>setLoginOpen(true)} type="button"
          aria-label="Inloggen als Game Master" className="btn-gm"
          style={{position:'fixed',top:'calc(env(safe-area-inset-top, 0px) + var(--sp-3))',right:'var(--sp-3)',zIndex:10500}}>
          🔐 <span>GM</span>
        </button>
      )}
      {loginOpen&&<AdminLogin onClose={()=>setLoginOpen(false)} onSuccess={()=>{loginAsAdmin();setLoginOpen(false);}}/>}
      {/* V20 P0: GPS denied / unavailable — was silent before; now a full-screen actionable modal.
          V34 (Hassan): updated iOS path to iOS 17/18 (in-Safari aA → Website-instellingen);
          added "what still works without GPS" so the modal doesn't oversell failure;
          the "Doorgaan zonder GPS" button now sets gpsOptOut+stops watchPosition so the
          modal doesn't re-fire in a flicker loop; renamed "Probeer opnieuw" to be honest
          about what the user must do first on iOS (re-prompt only fires after Settings change).
          V41.14: skipped entirely when effectiveTestMode is on — in test mode GPS gates
          are bypassed so blocking the whole screen for OS-level GPS denial is just noise. */}
      {(gpsStatus==='denied'||gpsStatus==='unavailable')&&!gpsOptOut&&!effectiveTestMode&&(
        <div className="sheet-overlay" style={{zIndex:10000}}>
          <div className="sheet" style={{background:'linear-gradient(180deg,#3a0e0e 0%,var(--bg) 100%)',position:'fixed',left:'50%',top:'50%',transform:'translate(-50%,-50%)',maxWidth:440,width:'92%',maxHeight:'88vh',overflowY:'auto'}} role="alertdialog" aria-live="assertive" aria-labelledby="gps-error-title">
            <div style={{textAlign:'center',marginBottom:'var(--sp-4)'}}>
              <div style={{fontSize:'var(--icon-lg)'}}>📍🚫</div>
              <h2 id="gps-error-title" className="t-title" style={{marginTop:'var(--sp-3)',color:'var(--video-2)'}}>
                {gpsStatus==='denied'?'Locatie-toegang geweigerd':'GPS niet beschikbaar'}
              </h2>
              <div className="t-body" style={{marginTop:'var(--sp-2)'}}>
                {gpsStatus==='denied'
                  ?'Het spel gebruikt je locatie om opdrachten in de buurt vrij te geven en foto-uploads te valideren. Géén tracking, géén opslag — alleen tijdens het spel.'
                  :'Je toestel kan op dit moment geen GPS-signaal vinden. Probeer naar buiten te lopen, weg van hoge gebouwen.'}
              </div>
            </div>

            <div className="panel" style={{marginBottom:'var(--sp-3)',background:'rgba(95,216,165,0.08)',borderColor:'rgba(95,216,165,0.25)'}}>
              <div className="t-label-sm" style={{color:'var(--success)',marginBottom:'var(--sp-2)'}}>WAT WERKT NU NOG WEL</div>
              <div className="t-caption" style={{lineHeight:'var(--lh-relaxed)'}}>
                ✅ Quizvragen beantwoorden<br/>
                ✅ Activity feed lezen — zien wat andere teams doen<br/>
                ✅ Leaderboard volgen<br/>
                ✅ Bar break-overlay deelnemen<br/>
                ❌ Foto-opdrachten (kunnen niet gevalideerd worden)<br/>
                ❌ POI's vrijspelen op de kaart
              </div>
            </div>

            {gpsStatus==='denied'&&(
              <div className="panel" style={{marginBottom:'var(--sp-3)'}}>
                <div className="t-label" style={{marginBottom:'var(--sp-2)'}}>Zo zet je het weer aan:</div>
                <div className="stack-2 t-body">
                  <div>📱 <b>iPhone (Safari, iOS 17+):</b> tik op de <b>aA</b>-knop links in de adresbalk → <i>Website-instellingen</i> → <i>Locatie</i> → <i>Sta toe</i>. Daarna deze pagina verversen.</div>
                  <div className="t-caption t-muted" style={{marginLeft:'var(--sp-3)'}}>Lukt het niet via aA? Ga naar <i>Instellingen → Apps → Safari → Locatie</i> en zet 'm op Sta toe.</div>
                  <div>🤖 <b>Android (Chrome):</b> tik op het 🔒-slotje in de adresbalk → <i>Machtigingen → Locatie → Toestaan</i>. Daarna verversen.</div>
                  <div className="t-caption t-muted" style={{marginTop:'var(--sp-2)'}}>
                    Browsers onthouden een weigering — Safari/Chrome vragen je niet opnieuw. Je moet het handmatig omkeren via bovenstaande stap.
                  </div>
                </div>
              </div>
            )}

            {gpsErrorSeen?.message&&(
              <div className="t-caption t-muted" style={{marginBottom:'var(--sp-3)',textAlign:'center',opacity:0.7}}>
                Debug: code {gpsErrorSeen.code}{gpsErrorSeen.message?` — ${gpsErrorSeen.message}`:''}
              </div>
            )}

            {/* V41.14 — shortened button labels (the original descriptive copy
                overflowed the button on iPhone 13 width). Caption explains the
                "probeer opnieuw na Instellingen-aanpassing" requirement above. */}
            <div className="t-caption t-muted" style={{textAlign:'center',marginBottom:'var(--sp-3)',lineHeight:'var(--lh-relaxed)'}}>
              Pas eerst de instellingen aan (zie hierboven) — dan opnieuw proberen.
            </div>
            <div className="stack-2">
              <button className="btn btn-cyan btn-lg" onClick={()=>{setGpsStatus('weak');setGpsErrorSeen(null);setGpsOptOut(false);wakeGps()}} style={{width:'100%'}}>
                🔁 Opnieuw proberen
              </button>
              <button className="btn btn-ghost" onClick={()=>{
                // V34 P0 fix: stop the geolocation watcher AND set opt-out so the
                // modal doesn't re-fire on the next errback. Player can re-engage
                // by tapping the GPS pill (which calls wakeGps and resets opt-out).
                try{gpsCtrlRef.current.stop&&gpsCtrlRef.current.stop();}catch(e){}
                setGpsOptOut(true);
                setGpsStatus('weak');
                setGpsErrorSeen(null);
              }} style={{width:'100%'}}>
                Doorgaan zonder GPS
              </button>
            </div>
          </div>
        </div>
      )}
      {/* V9: unlock popup */}
      {unlockPopup&&(
        <div className="tier-unlock-popup">
          <div className="tier-unlock-emoji">{unlockPopup.emoji}</div>
          <div className="tier-unlock-title">{unlockPopup.label}</div>
          <div className="tier-unlock-name">{unlockPopup.name}</div>
        </div>
      )}

      {/* V14 (A6): full-screen celebration with confetti */}
      {celebration&&(
        <div className="celeb-overlay">
          {/* confetti */}
          {celebration.big&&[...Array(36)].map((_,i)=>{
            const left=Math.random()*100;
            const delay=Math.random()*0.5;
            const dur=1.6+Math.random()*0.8;
            const colors=['#e4b25c','#6ea3ff','#b29bff','#5fd8a5','#ff7b7b','#f0c373'];
            const c=colors[i%colors.length];
            return <div key={i} className="confetti-piece" style={{left:`${left}%`,background:c,animationDelay:`${delay}s`,animationDuration:`${dur}s`,transform:`rotate(${Math.random()*360}deg)`}}/>;
          })}
          {celebration.levelUp&&<div className="level-ray"/>}
          <div className="celeb-burst">
            <div className="celeb-emoji">{celebration.emoji}</div>
            <div className="celeb-title">{celebration.title}</div>
            {celebration.sub&&<div className="celeb-sub">{celebration.sub}</div>}
            {celebration.breakdown&&celebration.breakdown.length>1&&(
              <div className="celeb-breakdown">
                {celebration.breakdown.map((b,i)=><span key={i}>{b}</span>)}
              </div>
            )}
          </div>
        </div>
      )}

      {/* V30: hot-target countdown removed with the timed-target system. */}

      {/* V15: HUD — consistent padding + type.
          V35 P1 fix (Lisa persona): spectators were rendered with a fully-empty
          player HUD (score 0, level L1, "0 ch · 0 POI") which silently signalled
          "you're not playing" and gave no real information. Spectator branch now
          shows: time-of-day, current Jorik holder, total photos in the feed +
          team count. Active players keep their score/level/POI HUD unchanged. */}
      <div style={{padding:`var(--sp-4) var(--sp-5)`,paddingTop:OFFLINE?'var(--sp-7)':phase>=1&&phase<5?'var(--sp-9)':'var(--sp-4)',background:'linear-gradient(180deg,rgba(10,11,16,0.92) 0%,rgba(10,11,16,0.85) 100%)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'var(--sp-3)',zIndex:100,backdropFilter:'blur(20px) saturate(1.4)',WebkitBackdropFilter:'blur(20px) saturate(1.4)',position:'relative'}}>
        <div
          onMouseDown={avatarLP.start} onMouseUp={avatarLP.cancel} onMouseLeave={avatarLP.cancel}
          onTouchStart={avatarLP.start} onTouchEnd={avatarLP.cancel} onTouchMove={avatarLP.cancel} onTouchCancel={avatarLP.cancel}
          style={{cursor:'pointer',display:'flex',alignItems:'center',gap:'var(--sp-3)',flex:1,minWidth:0,userSelect:'none',WebkitUserSelect:'none'}} title="Houd ingedrukt om team te verlaten">
          <div style={{fontSize:'var(--icon-sm)',filter:'drop-shadow(0 2px 6px rgba(0,0,0,0.4))'}}>{myTeam?.emoji}</div>
          <div style={{minWidth:0}}>
            <div className="t-card-label truncate">{myTeam?.name}</div>
            <div className="row-2" style={{marginTop:2,flexWrap:'wrap'}}>
              {myTeam?.spectator?(
                <span className="t-label-sm" style={{color:'var(--foto-2)'}}>👁 Toeschouwer-modus</span>
              ):(()=>{const lv=levelFor(myScore);const nxt=nextLevel(myScore);return <>
                <span className="t-label-sm t-accent">{lv.emoji} L{lv.level}</span>
                {nxt?<span className="t-label-sm">{nxt.min-myScore} tot L{nxt.level}</span>:<span className="t-label-sm t-accent-2">Max</span>}
              </>;})()}
            </div>
          </div>
        </div>
        {myTeam?.spectator?(
          <>
            <div style={{textAlign:'center',minWidth:56}}>
              <div className="t-num" style={{fontSize:'var(--fs-20)',color:'var(--foto-2)',textShadow:'0 0 16px rgba(110,163,255,0.35)'}}>{(activityFeed||[]).filter(a=>a.photo).length}</div>
              <div className="t-label-sm" style={{marginTop:2}}>foto's</div>
            </div>
            <div style={{textAlign:'right',minWidth:88}}>
              <div className="t-label-sm" style={{lineHeight:'var(--lh-tight)'}}>{teams.filter(t=>t.id>0).length} teams</div>
              <div className="t-label-sm t-accent" style={{lineHeight:'var(--lh-tight)',marginTop:2}}>{(()=>{const h=teams.find(t=>t.id===jorikTeamId);return h?`💍 ${h.emoji}`:'💍 alleen';})()}</div>
            </div>
          </>
        ):(
          <>
            <div style={{textAlign:'center',minWidth:56}}>
              <div className="t-num" style={{fontSize:'var(--fs-24)',color:'var(--accent-2)',textShadow:'0 0 20px rgba(228,178,92,0.35)'}}>{myScore}</div>
              <div className="t-label-sm" style={{marginTop:2}}>pts</div>
            </div>
            <div style={{textAlign:'right',minWidth:64}}>
              {/* V30: Extra Tijd button removed with the timed-target system. */}
              <div className="t-label-sm">{myChallenges} ch · {visitedLocs.size} POI</div>
            </div>
          </>
        )}
      </div>

      {/* XP progress bar */}
      {(()=>{
        const lv=levelFor(myScore);const nxt=nextLevel(myScore);
        if(!nxt)return <div style={{height:4,background:'linear-gradient(90deg,var(--accent),var(--video))',boxShadow:'0 0 12px rgba(228,178,92,0.5)'}}/>;
        const pct=((myScore-lv.min)/(nxt.min-lv.min))*100;
        return(
          <div style={{height:4,background:'rgba(255,255,255,0.06)',overflow:'hidden'}}>
            <div style={{height:'100%',width:`${Math.max(2,Math.min(100,pct))}%`,background:'linear-gradient(90deg,var(--foto),var(--accent))',transition:'width .5s var(--ease-out)',boxShadow:'0 0 10px rgba(228,178,92,0.45)'}}/>
          </div>
        );
      })()}

      {/* Phase progress */}
      <div style={{padding:`var(--sp-2) var(--sp-5) var(--sp-3)`}}>
        <div className="phase-bar">
          {[1,2,3,4].map(p=><div key={p} className={`phase-dot ${phase>p?'done':phase===p?'active':''}`}/>)}
        </div>
        <div className="row-between" style={{marginTop:'var(--sp-2)'}}>

        {tab==='map'&&<MapView pos={pos} completed={completed} visitedLocs={visitedLocs} onSelect={setSelLoc} phase={phase} gpsStatus={gpsStatus} gpsSnap={gpsSnap} onWakeGps={wakeGps} nowTs={nowTs} jorikInTeam={jorikInTeam} jorikMissionsDone={jorikMissionsDone} onShowJorikMissions={()=>setShowJorikMissions(true)} gpsOptOut={gpsOptOut} gameStart={gameStart}/>}
        {tab==='activity'&&<ActivityView feed={activityFeed} myTeamId={myTeam?.id} onPhoto={setPhotoLightbox} filter={feedFilter} setFilter={setFeedFilter} jorikTeamId={jorikTeamId} jorikInTeam={jorikInTeam} isJorikDevice={isJorikDevice}/>}
        {tab==='review'&&isAdmin&&<AdminReviewView queue={reviewQueue} onApprove={approveReview} onReject={rejectReview} onPhoto={setPhotoLightbox} teams={teams} jorikTeamId={jorikTeamId} jorikMovedAt={jorikMovedAt} onMoveJorik={moveJorik} onTriggerBarBreak={triggerBarBreak} onEndBarBreak={endBarBreak} barBreakActive={barBreakActive} onStartFinalePhase={startFinalePhase} onStartFinale={startFinale} phase={phase} scores={scores} onAdjustScore={adjustScore} onRemoveTeam={removeTeam} onRenameTeam={renameTeam} reviewUndo={reviewUndo} onUndoReview={undoReview} onBroadcast={broadcastMessage} onResetGame={resetGame} confirmAsync={confirmAsync} jorikVisitedTeamIds={jorikVisitedTeamIds} teamMemberCounts={teamMemberCounts} nowTs={nowTs}/>}

      {dialog&&<DialogSheet {...dialog} onClose={closeDialog}/>}

      {/* V10/V16/V18: Bar-break overlay — minimizable, persistent chip when hidden */}
      {barBreakActive&&!barBreakHidden&&<BarBreakOverlay info={barBreakActive} onClose={()=>setBarBreakHidden(true)} onComplete={(mini,pts,photo)=>{
        // V21 P1-fix #21: idempotent bar-break mini completion.
        // A stable pseudo challenge_id lets the completed_challenges UNIQUE index (team_id, challenge_id)
        // block duplicate submissions after a reload or network retry. 23505 means "already counted" — no-op.
        const barKey=`bb_${barBreakActive.name||'bar'}_${(mini.title||'mini').replace(/\s+/g,'_')}_${barBreakActive.started||0}`;
        let awarded=false;
        const localAward=()=>{
          if(awarded)return;awarded=true;
          applyScoreDelta(myTeam?.id,pts);
          setScorePopup(`+${pts}`);
          triggerConfetti(pts);
          addActivity(`haalde "${mini.title}" bij ${barBreakActive.name} · +${pts} pts`,pts,photo);
        };
        if(!OFFLINE&&sb&&myTeam?.id){
          // Use sentinel location_id=-1 — completed_challenges.location_id is NOT NULL in v14 schema.
          // The rehydrate regex `/^(-?\d+)_(-?\d+)$/` will reject bar-mini challenge_ids (prefix "bb_")
          // so compMap/visited won't be polluted. -1 is also filtered from visitedLocs (locId>0 guard).
          sb.from('completed_challenges').insert({
            team_id:myTeam.id,
            challenge_id:barKey,
            location_id:-1,
            challenge_type:'bar-mini',
            points_earned:pts,
          }).then(({error})=>{
            if(error&&error.code==='23505'){
              // already counted — silent no-op
              return;
            }
            localAward();
          }).catch(()=>{
            // Network hiccup or DB offline — still apply locally so play continues
            localAward();
          });
        }else{
          localAward();
        }
      }}/>}
      {/* V18: persistent bar-break chip — shows at top-left while minimized */}
      {barBreakActive&&barBreakHidden&&(()=>{
        const endsAt=(barBreakActive.started||Date.now())+BAR_BREAK_DURATION_MS;

        const urgent=secLeft<=60;

        return(
          <div onClick={()=>setBarBreakHidden(false)}
            style={{position:'fixed',top:OFFLINE?'calc(var(--sp-3) + 28px)':'var(--sp-3)',left:'50%',transform:'translateX(-50%)',zIndex:9999,padding:`var(--sp-2) var(--sp-4)`,borderRadius:'var(--r-pill)',background:urgent?'rgba(255,107,107,0.95)':'rgba(228,178,92,0.95)',color:'#0a0b10',fontSize:'var(--fs-13)',fontWeight:'var(--fw-bold)',boxShadow:'0 6px 20px rgba(0,0,0,0.5)',cursor:'pointer',display:'flex',alignItems:'center',gap:'var(--sp-2)',animation:urgent?'breathing 1s ease-in-out infinite':'none',maxWidth:'92%'}}>
            🍻 Bar break · {barBreakActive.name} · ⏱ {label}

          </div>
        );
      })()}

      {/* V10: Finale ceremony (phase 5) */}
      {phase===5&&<FinaleScreen teams={teams} scores={scores} myTeam={myTeam} elapsed={elapsed} activityFeed={activityFeed} jorikTeamId={jorikTeamId}/>}

      {/* Bottom sheet for challenges */}
      {selLoc!=null&&<ChallengeSheet loc={L_DATA.find(l=>l.id===selLoc)} pos={pos} completed={completed[selLoc]||{}} completedPts={completedPts[selLoc]||{}} onComplete={completeChallenge} onClose={()=>setSelLoc(null)} jorikInTeam={jorikInTeam} seenQuizzes={seenQuizzes} isAdmin={isAdmin} myTeam={myTeam} isJorikDevice={isJorikDevice} confirmAsync={confirmAsync} gpsGateBypass={effectiveGpsBypass}/>
        /* V30: jorikInTeam already passed to ChallengeSheet — the new wp:1 secrecy lock reads it. No call-site change needed beyond the existing prop. */}

      {/* Wedding video modal — V16 hard-gates when Jorik is in team */}
      {showWedding&&(()=>{
        const roundsDone=[1,2,3,4].filter(n=>completed[-1]?.[n]);
        const bonusAwarded=!!completed[-1]?.[0];
        // V41.10 — shared per-round tick logic (used by both the bare
        // tick-only path AND the upload path, since uploading auto-ticks).
        const tickRoundOnce=(n,viaUpload=false)=>{
          if(completed[-1]?.[n])return false;
          setCompleted(prev=>({...prev,[-1]:{...prev[-1],[n]:true}}));
          setCompletedPts(prev=>({...prev,[-1]:{...prev[-1],[n]:0}}));
          if(!OFFLINE&&sb&&myTeam){
            sb.from('completed_challenges').insert({team_id:myTeam.id,challenge_id:`-1_${n}`,location_id:-1,challenge_type:'wedding-tick',points_earned:0}).then(({error})=>{
              if(error&&error.code!=='23505')console.warn('wedding round tick insert failed',error);
            });
          }
          addActivity(`[WP1] ${viaUpload?'📹':'📝'} Bruiloftsmissie ronde ${n} ${viaUpload?'video geüpload':'afgevinkt'}`,0,null,-1);
          return true;
        };
        return <WeddingMission onClose={()=>setShowWedding(false)} jorikInTeam={jorikInTeam} confirmAsync={confirmAsync} isJorikDevice={isJorikDevice} roundsDone={roundsDone} bonusAwarded={bonusAwarded}
          onTickRound={(n)=>tickRoundOnce(n,false)}
          onUploadTake={async(n,file)=>{
            // V41.10 — upload-take handler. Reuses the standard photo_reviews
            // insert pattern from ChallengeAction (line 7407) so wedding videos
            // land in the same table Mike already queries for the editing pool.
            // Differences from regular mission upload:
            //  - location_id=-1 (sentinel; never matches real POI)
            //  - challenge_idx=round number (1..4)
            //  - status='approved' (no admin review queue — straight in)
            //  - gps_distance=null (no GPS gate)
            // Multiple takes per round are allowed (no UNIQUE on photo_reviews
            // by team+location+challenge_idx). After successful upload, also
            // auto-tick the round so the 4/4 bonus counter advances.
            if(!myTeam)throw new Error('Geen team gevonden');
            if(typeof navigator!=='undefined'&&navigator.onLine===false)throw new Error('Geen verbinding — wacht tot je weer online bent.');
            // V41.11 — try Storage bucket first (avoids multi-MB inline base64
            // bloat in Postgres). On any Storage failure, fall back to inline.
            // We try Storage with the raw File blob first (cheaper than data URL
            // round-trip), and only read as data URL if Storage failed.
            const tryStorageUrl=await uploadMediaToStorage(sb,file,`t${myTeam.id}_wed${n}`,file.type||'video/mp4');
            const buildRow=(photo_url)=>({
              team_id:myTeam.id,team_name:myTeam.name,team_emoji:myTeam.emoji,team_color:myTeam.color,
              location_id:-1,location_name:`Bruiloftsmissie · Ronde ${n}`,
              challenge_idx:n,challenge_title:`Wedding take ronde ${n}`,
              challenge_type:'video',gps_distance:null,points_awarded:0,
              photo_url,status:'approved'
            });
            const doInsert=async(row)=>{
              if(OFFLINE||!sb)return;
              const{error}=await sb.from('photo_reviews').insert(row);
              if(error){
                const friendly=/fetch|network|failed/i.test(String(error.message||''))
                  ?'Geen verbinding — video niet opgeslagen. Probeer opnieuw.'
                  :('Upload mislukt: '+(error.message||'onbekende fout'));
                throw new Error(friendly);
              }
            };
            if(tryStorageUrl){
              try{await doInsert(buildRow(tryStorageUrl));}
              catch(err){throw err;}
              tickRoundOnce(n,true);
              return;
            }
            // Storage failed — fall back to inline base64 via FileReader.
            return new Promise((resolve,reject)=>{
              const reader=new FileReader();
              reader.onload=async(ev)=>{
                const dataUrl=ev.target.result;
                if(!dataUrl){reject(new Error('Bestand kon niet gelezen worden.'));return;}
                try{await doInsert(buildRow(dataUrl));}
                catch(err){reject(err);return;}
                tickRoundOnce(n,true);
                resolve();
              };
              reader.onerror=()=>reject(new Error('Bestand kon niet gelezen worden.'));
              reader.readAsDataURL(file);
            });
          }}/>;
      })()}

      {/* V19+: Jorik-specific missions — mirror of wedding, visible only when Jorik IS in team */}
      {/* V21: pos + barBreakActive passed so the panel can curate by context (loc-tagged + bar-only missions).
          Note: barBreakActive (truthy ONLY during the live overlay window) is used here,
          NOT the sticky barBreak state. Bar set-pieces should only light up while the break is actually running. */}
      {showJorikMissions&&<JorikMissions onClose={()=>setShowJorikMissions(false)} onComplete={completeJorikMission} done={jorikMissionsDone} runningCounts={jorikRunningCounts} jorikInTeam={jorikInTeam} pos={pos} barBreak={barBreakActive} holdCount={jorikMissionsThisHold} holdCap={JORIK_HOLD_CAP} isJorikDevice={isJorikDevice}/>}

      {/* Tab bar */}
      <div className="tab-bar">
        {[
          {id:'leaderboard',icon:'🏆',label:'Ranking'},
          {id:'map',icon:'🗺️',label:'Kaart'},
          {id:'activity',icon:'📢',label:'Feed'},
          ...(isAdmin?[{id:'review',icon:'✅',label:'Review',badge:reviewQueue.length}]:[]),
        ].map(t=>(
          <button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)} style={{position:'relative'}}>
            <span className="tab-icon">{t.icon}</span>{t.label}
            {t.badge>0&&<span className="badge-count" style={{position:'absolute',top:4,right:6,
              // V23 (#50): pulse the Beoordeel badge for 3 s after a new photo_review INSERT.
              animation:(t.id==='review'&&(nowTs-reviewFlashTs)<3000&&reviewFlashTs>0)?'reviewPulse 0.8s ease-out 3':'none'
            }}>{t.badge}</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

// TEAM SETUP — V5: starter packs + custom

// V36 P1 fix (Erik/Bart personas): late-joiners + offline-recovery players had
// no way to see what happened during their absence. Expandable summary inside
// the existing late-join warning shows top team, current Jorik holder, last bar
// break, and the 3 most recent activity entries. Strips [WP1] markers so wedding
// pipeline shots stay secret. One-tap-to-expand; default collapsed so it doesn't
// dominate the team-pick screen.
function CatchupSummary({teams=[],scores={},jorikTeamId=null,activityFeed=[],barBreakActive=null}){
  const[open,setOpen]=React.useState(false);
  const ranked=React.useMemo(()=>{
    return teams.filter(t=>t.id>0).map(t=>({t,score:scores[t.id]||t.score||0})).sort((a,b)=>b.score-a.score);
  },[teams,scores]);
  const top=ranked[0];
  const holder=jorikTeamId!=null?teams.find(t=>t.id===jorikTeamId):null;
  const recent=React.useMemo(()=>{
    // Strip [WP1] markers + system rows; keep last 3
    return (activityFeed||[]).filter(a=>{
      const m=String(a.message||'');
      if(m.startsWith('[JORIK] team='))return false;
      return true;
    }).slice(0,3).map(a=>({...a,message:String(a.message||'').replace(/^\[WP1\] /,'')}));
  },[activityFeed]);
  return(
    <div style={{marginTop:'var(--sp-2)',width:'100%'}}>
      <button type="button" onClick={()=>setOpen(o=>!o)}
        style={{padding:'2px 8px',borderRadius:'var(--r-sm)',background:'transparent',border:'1px dashed rgba(228,178,92,0.45)',color:'var(--accent-2)',cursor:'pointer',fontSize:'var(--fs-12)'}}>
        {open?'▼ Verberg samenvatting':'📊 Wat heb je gemist?'}
      </button>
      {open&&(
        <div style={{marginTop:'var(--sp-2)',padding:'var(--sp-2) var(--sp-3)',borderRadius:'var(--r-sm)',background:'rgba(0,0,0,0.25)',border:'1px solid rgba(255,255,255,0.06)',color:'var(--text-secondary)'}}>
          {top&&<div className="t-caption" style={{lineHeight:'var(--lh-relaxed)'}}><b style={{color:top.t.color}}>{top.t.emoji} {top.t.name}</b> staat op kop met <b>{top.score} pts</b></div>}
          {holder?(
            <div className="t-caption" style={{lineHeight:'var(--lh-relaxed)',marginTop:2}}>💍 Jorik is bij <b style={{color:holder.color}}>{holder.emoji} {holder.name}</b></div>
          ):(
            <div className="t-caption" style={{lineHeight:'var(--lh-relaxed)',marginTop:2}}>💍 Jorik loopt nog alleen</div>
          )}
          {barBreakActive&&barBreakActive.name&&<div className="t-caption" style={{lineHeight:'var(--lh-relaxed)',marginTop:2}}>🍻 Bar break loopt nu bij <b>{barBreakActive.name}</b></div>}
          {recent.length>0&&(
            <div style={{marginTop:'var(--sp-2)',paddingTop:'var(--sp-2)',borderTop:'1px solid rgba(255,255,255,0.06)'}}>
              <div className="t-label-sm" style={{color:'var(--text-tertiary)',marginBottom:2}}>LAATSTE 3</div>
              {recent.map((a,i)=>(
                <div key={i} className="t-caption" style={{lineHeight:'var(--lh-relaxed)',opacity:0.85}}>
                  {a.team_emoji||'📢'} {a.team_name||'Game Master'}: {a.message.slice(0,80)}{a.message.length>80?'…':''}
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function TeamSetup({teams,setTeams,onJoin,isAdmin,promptAsync,confirmAsync,teamMemberCounts={},phase=0,scores={},jorikTeamId=null,activityFeed=[],barBreakActive=null}){
  const[mode,setMode]=useState('quick'); // 'quick' | 'custom'
  const[name,setName]=useState('');
  const[emoji,setEmoji]=useState('');
  const[color,setColor]=useState('');
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);
  // V14 (A3): team members — a single textarea, one name per line
  const[membersText,setMembersText]=useState('');
  const parseMembers=()=>membersText.split(/[,\n]/).map(s=>s.trim()).filter(Boolean).slice(0,10);
  // V12/V18: editable name on a starter pack — wired to UI via ✏️ chip on each pack card
  const[packNameOverride,setPackNameOverride]=useState({});
  const renamePack=async(p,e)=>{
    if(e){e.stopPropagation();e.preventDefault();}
    const current=packNameOverride[p.name]||p.name;
    const ask=promptAsync||((msg,def)=>Promise.resolve(window.prompt(msg,def)));
    const input=await ask(`Nieuwe naam voor "${p.name}":`,current);
    if(input===null)return;
    const trimmed=input.trim();
    if(!trimmed){setPackNameOverride(prev=>{const n={...prev};delete n[p.name];return n;});return;}
    // V21 P1-fix #26: re-run the conflict check at rename time so the user sees the
    // "already in use" feedback immediately (case-insensitive via nameConflict) instead of
    // only when they tap the starter-pack card to create.
    if(await nameConflict(trimmed)){
      setErr(`"${trimmed}" is al in gebruik door een ander team`);
      return;
    }
    setErr(''); // clear any stale error
    setPackNameOverride(prev=>({...prev,[p.name]:trimmed}));
  };
  const usedEmojis=teams.map(t=>t.emoji);
  const usedNames=teams.map(t=>t.name.toLowerCase());

  // V23: hard 4-team cap. Counts non-spectator teams only — the GM "👑 Observeren"
  // path inserts a synthetic id=-1 spectator that should never count against the
  // playable cap. Mirrored server-side by the `enforce_team_cap` trigger in
  // SUPABASE-V23-RESET.sql so a second tab racing past the client check still gets
  // rejected by Postgres (23514 check_violation).
  const activeTeamCount=teams.filter(t=>!t.spectator&&t.id!==-1).length;
  const teamSlotsFull=activeTeamCount>=MAX_TEAMS;
  const capMsg=`Het spel zit vol — er zijn al ${MAX_TEAMS} teams. Wacht tot er een team plek maakt.`;

  // V12: fresh name check against live Supabase right before insert — belt-and-braces vs stale local state
  const nameConflict=async(finalName)=>{
    if(!finalName)return false;
    if(usedNames.includes(finalName.toLowerCase()))return true;
    if(OFFLINE||!sb)return false;
    try{
      const res=await sb.from('teams').select('id').ilike('name',finalName).limit(1);
      return !!(res.data&&res.data.length);
    }catch(e){return false;}
  };

  // V14: insert a team with graceful fallback if the members column doesn't exist yet
  const insertTeam=async(row,members)=>{
    // Try with members first
    let res=await sb.from('teams').insert({...row,members}).select().single();
    if(res.error&&String(res.error.message||'').includes('members')){
      // Column missing — DB schema not migrated. Retry without it.
      res=await sb.from('teams').insert(row).select().single();
    }
    return res;
  };

  // V34 P0 fix (Erik/Tom/Sandra personas): late-joiners + non-captain teammates
  // had no way to join an existing team — only createFromPack/createCustom existed,
  // both blocked by the 4-team cap. Now tapping a Bezet starter card triggers a
  // confirm-dialog "Sluit aan bij {team}?". On confirm, we add the user's parsed
  // member names to the existing team's `members` array and route them into the
  // lobby with that team as their myTeam. No new team row is created — the cap is
  // unaffected. Captain doesn't get a notification yet (P1 follow-up: captain
  // approval); for V34 the social contract is "Mike's the GM, all-comers welcome".
  const joinExistingTeam=async(team)=>{
    if(busy)return;
    const myMembers=parseMembers();
    // V37 P1 fix (Erik audit): old copy promised "Je komt in de lobby terecht"
    // but post-V36-hot-fix the auto-flip lands joiners directly in the game when
    // phase>=1. New copy is honest about both flows.
    const phaseRunning=phase>=1;
    const ok=await (confirmAsync?confirmAsync(`Sluit je aan bij ${team.emoji} ${team.name}?\n\n${myMembers.length>0?`Spelers die je toevoegt: ${myMembers.join(', ')}`:'Je joint zonder namen toe te voegen — dat kan ook later via de captain.'}\n\n${phaseRunning?'Je sluit direct aan in het lopende spel — je begint met 0 punten maar speelt voor het team-totaal.':'Je komt in de lobby terecht. Het spel start zodra de Game Master op start drukt.'}`,{confirmLabel:'Ja, sluit aan'}):window.confirm(`Sluit je aan bij ${team.emoji} ${team.name}?`));
    if(!ok)return;
    setBusy(true);
    if(!OFFLINE&&sb&&myMembers.length>0){
      // Append my names to the team's members array. PostgREST doesn't expose
      // array_append in standard updates, so we read-modify-write — small race
      // window if two phones append at once, but acceptable for a 16-player game.
      try{
        const cur=await sb.from('teams').select('members').eq('id',team.id).single();
        const existing=Array.isArray(cur?.data?.members)?cur.data.members:[];
        const merged=[...existing];
        myMembers.forEach(n=>{if(!merged.includes(n))merged.push(n);});
        await sb.from('teams').update({members:merged}).eq('id',team.id);
        team={...team,members:merged};
      }catch(e){/* members column missing on older schema — proceed without */}
    }
    setBusy(false);
    onJoin(team);
  };

  const createFromPack=async(pack)=>{
    if(busy)return;
    // V23: hard 4-team cap. Server-side trigger is the source of truth, but
    // surfacing the friendly Dutch message client-side avoids a confusing
    // generic "Team aanmaken mislukt" toast when the limit is reached.
    if(teamSlotsFull){setErr(capMsg);return;}
    const finalName=(packNameOverride[pack.name]||pack.name).trim();
    if(!finalName){setErr('Geef je team een naam');return;}
    if(usedEmojis.includes(pack.emoji)){setErr(`${pack.emoji} is al gekozen door een ander team`);return;}
    setBusy(true);
    if(await nameConflict(finalName)){setErr(`"${finalName}" is al in gebruik door een ander team`);setBusy(false);return;}
    const members=parseMembers();
    if(!OFFLINE&&sb){
      const res=await insertTeam({name:finalName,emoji:pack.emoji,color:pack.color},members);
      if(res.error){
        // V20 (Audit item #5): server-side UNIQUE index (V32 patch) → 23505.
        // Specialise the message so two phones racing to the same pack show the
        // right reason instead of the generic "probeer een andere naam".
        if(res.error.code==='23505'||String(res.error.message||'').toLowerCase().includes('unique')){
          const msg=String(res.error.message||'').toLowerCase();
          if(msg.includes('emoji'))setErr(`${pack.emoji} is al gekozen door een ander team`);
          else setErr(`"${finalName}" is al in gebruik door een ander team`);
        }else{
          setErr('Team aanmaken mislukt — probeer een andere naam');
        }
        setBusy(false);return;
      }
      const team={...res.data};
      if(!team.members||team.members.length===0)team.members=members; // client-side fallback for chip rendering
      setTeams(prev=>prev.some(t=>t.id===team.id)?prev:[...prev,team]);
      onJoin(team);
    }else{
      const team={id:Date.now(),name:finalName,emoji:pack.emoji,color:pack.color,score:0,members};
      setTeams(prev=>[...prev,team]);
      onJoin(team);
    }
    setBusy(false);
  };

  const createCustom=async()=>{
    if(busy)return;
    // V23: same hard cap branch as createFromPack — see SUPABASE-V23-RESET.sql.
    if(teamSlotsFull){setErr(capMsg);return;}
    if(!name||!emoji||!color){setErr('Kies naam, icoon én kleur');return;}
    const finalName=name.trim();
    if(usedEmojis.includes(emoji)){setErr(`${emoji} is al gekozen door een ander team`);return;}
    setBusy(true);
    if(await nameConflict(finalName)){setErr(`"${finalName}" is al in gebruik door een ander team`);setBusy(false);return;}
    const members=parseMembers();
    if(!OFFLINE&&sb){
      const res=await insertTeam({name:finalName,emoji,color},members);
      if(res.error){
        // V20 (Audit item #5): same 23505 branching as createFromPack above.
        if(res.error.code==='23505'||String(res.error.message||'').toLowerCase().includes('unique')){
          const msg=String(res.error.message||'').toLowerCase();
          if(msg.includes('emoji'))setErr(`${emoji} is al gekozen door een ander team`);
          else setErr(`"${finalName}" is al in gebruik door een ander team`);
        }else{
          setErr('Team aanmaken mislukt — probeer een andere naam');
        }
        setBusy(false);return;
      }
      const team={...res.data};
      if(!team.members||team.members.length===0)team.members=members;
      setTeams(prev=>prev.some(t=>t.id===team.id)?prev:[...prev,team]);
      onJoin(team);
    }else{
      const team={id:Date.now(),name:finalName,emoji,color,score:0,members};
      setTeams(prev=>[...prev,team]);
      onJoin(team);
    }
    setBusy(false);
  };

  // V20 (Audit item #2): late-join warning. Mike's explicit decision was
  // "Allow with warning" (audit §3.5) — so we never block, we just surface
  // that the game is already live. A dismissible banner is less jarring than
  // a modal dialog on mount and leaves the team-picker fully interactive.
  // Fires whenever phase >= 1 (search → geruchten → cirkel → finale).

  const showLateJoin=phase>=1&&!lateJoinDismissed;

      {/* V35 P1 fix (Erik persona): when game is running AND cap-full, two
          banners stacked in 200px of vertical space contradicted each other —
          amber "je kunt nog steeds meedoen" directly above what was previously
          a red "het spel zit vol" panel. Now we merge: if both conditions are
          true, render ONE combined banner with both facts. The standalone cap-
          full banner (below) stays for the rare case of "lobby full but spel
          nog niet gestart". */}

          <div style={{flex:1,minWidth:200}}>
            <div className="t-body-emph" style={{marginBottom:2}}>De wedstrijd is al gestart</div>
            <div className="t-caption" style={{color:'var(--text-secondary)',lineHeight:'var(--lh-relaxed)'}}>
              Fase: <b>{phaseLabel||`Fase ${phase}`}</b> · je kunt nog steeds meedoen, maar een deel van de punten is al vergeven.
            </div>

          </div>
          <button type="button" onClick={()=>setLateJoinDismissed(true)}
            aria-label="Sluit waarschuwing"
            style={{flexShrink:0,padding:'2px 8px',borderRadius:'var(--r-sm)',background:'transparent',border:'1px solid rgba(228,178,92,0.4)',color:'var(--accent-2)',cursor:'pointer',fontSize:'var(--fs-12)'}}>
            Begrepen

      {showLateJoin&&teamSlotsFull&&(
        <div role="alert" aria-live="polite"
          style={{marginBottom:'var(--sp-4)',padding:'var(--sp-3) var(--sp-4)',borderRadius:'var(--r-md)',background:'rgba(228,178,92,0.10)',border:'1px solid rgba(228,178,92,0.45)',color:'#fff',display:'flex',alignItems:'flex-start',gap:'var(--sp-3)',flexWrap:'wrap'}}>
          <div style={{fontSize:20,flexShrink:0}}>🔴</div>
          <div style={{flex:1,minWidth:200}}>

            <div className="color-grid" style={{margin:0}}>

                <button key={c.hex} className={`color-btn ${color===c.hex?'selected':''}`}

          {err&&<div className="panel-sm t-body-emph t-danger text-center" style={{background:'rgba(255,107,107,0.12)',borderColor:'rgba(255,107,107,0.35)'}}>⚠ {err}</div>}
        </div>
      )}

      {/* V34 P0 fix (Lisa/Erik personas): spectator door used to be admin-only —
          which forced Mike to share the admin URL with Lisa just so she could

      <div className="panel text-center" style={{marginTop:'var(--sp-6)',borderStyle:'dashed',borderColor:isAdmin?'rgba(228,178,92,0.3)':'rgba(110,163,255,0.3)',background:isAdmin?'rgba(228,178,92,0.04)':'rgba(110,163,255,0.04)'}}>
        <div className="t-label" style={{color:isAdmin?'var(--accent-2)':'var(--foto-2)'}}>{isAdmin?'Game Master':'Niet meespelen?'}</div>
        <div className="t-body" style={{marginTop:'var(--sp-2)',marginBottom:'var(--sp-3)'}}>{isAdmin?'Liever alleen observeren zonder mee te spelen?':'Geen probleem — kijk mee zonder team. Je ziet de leaderboard, de feed en alles wat de teams doen.'}</div>
        <button className="btn btn-ghost btn-sm" onClick={()=>onJoin(isAdmin
          ?{id:-1,name:'Game Master',emoji:'👑',color:'#d4a054',score:0,spectator:true}

  );

// V25 (#71): TwoRingIndicator — mini SVG showing preview (300m) outer ring,
// unlock (100m) inner ring, target dot at POI center, and the user's own dot
// positioned along the bearing with a scale capped at the preview radius.
function TwoRingIndicator({dist,pos,loc}){
  // Radii in svg px: preview=40 (outer), unlock=14 (inner)
  const cx=50,cy=50,PREV_PX=40,UNLOCK_PX=14;
  // User-dot position: project the real meters distance onto the svg radius.
  // Beyond preview: pin to the outer edge + add a subtle arrow hint.
  let ux=cx,uy=cy,off=false;
  if(pos&&loc&&dist!=null){
    // Bearing from user → target as a planar vector (lon scaled by cos(lat)) — good enough at city scale.
    // pos uses Leaflet naming (lat/lng); L_DATA uses compact (la/lo).
    const dLat=loc.la-pos.lat;                                       // +ve = target north of user
    const dLon=(loc.lo-pos.lng)*Math.cos(pos.lat*Math.PI/180);       // +ve = target east of user
    const mag=Math.hypot(dLat,dLon)||1;
    // Target sits at (cx,cy). User dot sits on the opposite bearing from target.
    // SVG: east = +x (same as +lon), north = -y (so we ADD lat-delta to y to move south).
    const pxDist=Math.min(dist,PREVIEW_RADIUS)/PREVIEW_RADIUS*PREV_PX;
    ux=cx-(dLon/mag)*pxDist; // target east of user ⇒ draw user west of cx
    uy=cy+(dLat/mag)*pxDist; // target north of user ⇒ draw user south (larger y)
    off=dist>PREVIEW_RADIUS;
  }
  return(
    <div className="two-ring">
      <svg width="100" height="100" viewBox="0 0 100 100" aria-hidden="true">
        {/* Outer preview ring (dashed amber) */}
        <circle cx={cx} cy={cy} r={PREV_PX} className="ring-preview" fill="none" strokeWidth="1.5" strokeDasharray="3 3"/>
        {/* Inner unlock ring (solid green) */}
        <circle cx={cx} cy={cy} r={UNLOCK_PX} className="ring-unlock" fill="none" strokeWidth="2"/>
        {/* Target dot */}
        <circle cx={cx} cy={cy} r="3" className="ring-target"/>
        {/* User dot */}
        {pos&&<circle cx={ux} cy={uy} r="4" className="ring-me"/>}
        {off&&pos&&<circle cx={ux} cy={uy} r="7" fill="none" stroke="rgba(139,185,255,0.4)" strokeWidth="1" strokeDasharray="2 2"/>}
      </svg>
    </div>
  );
}

// V25 (#71): TaskList — grouped, always-visible list of every main-deck task.
// Sort: by band (unlock → preview → far → unknown), distance within band,
// completed pushed to a trailing "Al gedaan" group. Filters out bars (separate mechanic).
// V28 — ConfettiBurst: short particle effect for score milestones (>=30 pts in one drop).
// Mounted via a numeric `seed` from App; React re-mounts on seed change so each trigger
// plays the animation fresh. Pure CSS animation, no library. Auto-cleans (component
// unmounts itself after the animation duration via App-level setTimeout — see triggerConfetti).
function ConfettiBurst({seed,intensity}){
  if(!seed)return null;
  const colors=['#e4b25c','#5b8dee','#e05c5c','#4bbe8a','#9b7bea','#ec4899'];
  // V30 — tiered: piece count + spread scale with intensity.
  // small (easy POI 15-20pt) → still feels celebratory but doesn't over-cover the screen
  // medium (25-35pt) → standard burst
  // large (40+pt + Jorik missions) → loud, wide, multi-color
  const cfg=intensity==='large'?{n:38,cxRange:240,dxRange:340}:intensity==='medium'?{n:22,cxRange:180,dxRange:280}:{n:12,cxRange:120,dxRange:200};
  const pieces=[];
  for(let i=0;i<cfg.n;i++){
    const cx=(Math.random()-0.5)*cfg.cxRange;
    const dx=(Math.random()-0.5)*cfg.dxRange;
    const color=colors[i%colors.length];
    const delay=Math.random()*0.15;
    const w=8+Math.random()*6;
    pieces.push(React.createElement('div',{
      key:i,className:'confetti-piece',
      style:{background:color,'--cx':cx+'px','--dx':dx+'px',animationDelay:delay+'s',width:w+'px',height:(w*1.4)+'px'}
    }));
  }
  return <div key={seed} className="confetti-burst" aria-hidden="true">{pieces}</div>;
}

// V28 — SkeletonRow: shimmer placeholder for "loading…" rows. Used in TaskList when
// pos === null (waiting for first GPS fix) so the panel doesn't render an empty void
// or the cold-start fallback POIs that may not match the user's actual location.
function SkeletonRow(){
  return(
    <div className="skeleton-row" aria-hidden="true">
      <div className="skeleton-emoji"/>
      <div className="skeleton-body">
        <div className="skeleton-line long"/>
        <div className="skeleton-line short"/>
      </div>
    </div>
  );
}

function TaskList({pos,onSelect,completed,visitedLocs,gpsStatus,gpsOptOut=false}){
  // V23: when TASKLIST_NEARBY_ONLY (default true), the list under the map is
  // capped to TASKLIST_NEARBY_N nearest non-completed missions. The map itself
  // still shows all 102 markers — this only affects the scrollable mission
  // list. Reuses getNearby() (smart ROI ranking within NEARBY_RADIUS=500m,
  // graceful distance fallback). When pos is null, falls back to the first N
  // POIs of L_DATA so the list isn't empty.
  // Set TASKLIST_NEARBY_ONLY=false (constants block) to restore the original
  // 4-group inventory view.
  const completedMap=completed||{};
  const buildRow=(loc)=>{
    const{band,dist}=locBand(pos,loc);
    const locCompleted=completedMap[loc.id]?Object.keys(completedMap[loc.id]).length:0;
    const total=(loc.ch&&loc.ch.length)||0;
    const allDone=total>0&&locCompleted>=total;
    return{loc,band,dist,locCompleted,total,allDone};
  };

  if(TASKLIST_NEARBY_ONLY){
    // V28: while pos is null we don't actually know what's nearby — the V25
    // cold-start fallback (first 3 POIs of L_DATA) was a UX lie. Replace with
    // SkeletonRow shimmer so the panel reads as "loading…" instead of "here
    // are your 3 nearest" (which they aren't yet).
    // V30: distinguish pos-null INTO three states for honest copy:
    //   - GPS denied/unavailable → static placeholder + actionable instruction (no shimmer — nothing is loading)
    //   - GPS weak/searching → shimmer skeleton (active loading)
    //   - first-fix-not-yet → shimmer skeleton (active loading)
    // V37.1 hot-fix (Hassan audit P2): TaskList didn't receive `gpsOptOut`, so the
    // shimmer/loading copy ("zoekt nu je locatie") rendered below the red "GPS uit"
    // pill — directly contradicting it. Now treat opt-out as the same intent as
    // denied: show the no-GPS placeholder + suggest re-engaging via the pill.
    const denied=gpsStatus==='denied'||gpsStatus==='unavailable'||gpsOptOut;
    const loadingGps=!pos&&!denied;
    let rows=[];
    if(pos){
      rows=getNearby(pos,completedMap,TASKLIST_NEARBY_N).map(buildRow);
    }
    const headerSuffix=denied?'GPS uit':loadingGps?'…':rows.length;
    return(
      <section style={{marginTop:'var(--sp-5)'}}>
        <h3 className="t-card-label" style={{margin:'0 0 var(--sp-3) 0'}}>🎯 Dichtstbij je nu ({headerSuffix})</h3>
        {denied&&<div style={{padding:'var(--sp-3)',border:'1px dashed rgba(255,107,107,0.4)',borderRadius:'var(--r-md)',fontSize:13,color:'var(--video-2)',marginBottom:'var(--sp-3)'}}>{gpsOptOut?'📍 GPS staat uit (jij koos zonder GPS te spelen). Tik op de rode GPS-pil hierboven om opnieuw te proberen.':'📍🚫 Locatie geweigerd — schakel GPS in via je telefooninstellingen om de dichtstbijzijnde missies te zien.'}</div>}
        {loadingGps&&<div style={{padding:'var(--sp-3)',border:'1px dashed rgba(255,255,255,0.15)',borderRadius:'var(--r-md)',fontSize:13,opacity:0.7,marginBottom:'var(--sp-3)'}}>Nog geen GPS-fix — zoekt nu je locatie. Een paar seconden geduld.</div>}
        {loadingGps&&[0,1,2].map(i=><SkeletonRow key={i}/>)}
        {!loadingGps&&rows.length===0&&<div style={{padding:'var(--sp-3)',border:'1px dashed rgba(255,255,255,0.15)',borderRadius:'var(--r-md)',fontSize:13,opacity:0.7,marginBottom:'var(--sp-3)'}}>Geen openstaande missies in de buurt — alles in deze radius is al gedaan.</div>}
        {!loadingGps&&rows.map(r=>(
          <button key={r.loc.id} className={`task-row ${r.allDone?'completed':r.band||'far'}`} onClick={()=>onSelect(r.loc.id)} style={{marginBottom:'var(--sp-2)'}}>
            <div className="task-row-emoji">{r.loc.e||'📍'}</div>
            <div className="task-row-body">
              <div className="task-row-name">{r.loc.n}</div>
              <div className="task-row-meta">
                {r.total>0?`${r.total} challenge${r.total===1?'':'s'} · ${r.locCompleted}/${r.total} klaar`:'Geen challenges'}
                {r.dist!=null&&<span style={{opacity:0.7,marginLeft:6}}>· {fmtDist(r.dist)}</span>}
              </div>
            </div>
            <div className="task-row-chevron">›</div>
          </button>
        ))}
        <div className="t-caption" style={{marginTop:'var(--sp-3)',opacity:0.65,textAlign:'center'}}>🗺️ Andere locaties zie je op de kaart hierboven.</div>
      </section>
    );
  }

  // Legacy full-inventory view (TASKLIST_NEARBY_ONLY=false). Kept intact so
  // flipping the constant restores V22 behavior without code surgery.
  const rows=L_DATA.filter(l=>l.c!=='bar').map(buildRow);
  const groups={unlock:[],preview:[],far:[],done:[]};
  rows.forEach(r=>{
    if(r.allDone)groups.done.push(r);
    else if(r.band==='unlock')groups.unlock.push(r);
    else if(r.band==='preview')groups.preview.push(r);
    else groups.far.push(r);
  });
  const sortByDist=(a,b)=>{
    if(a.dist==null&&b.dist==null)return 0;
    if(a.dist==null)return 1;
    if(b.dist==null)return -1;
    return a.dist-b.dist;
  };
  groups.unlock.sort(sortByDist);
  groups.preview.sort(sortByDist);
  groups.far.sort(sortByDist);
  groups.done.sort(sortByDist);
  const renderGroup=(label,list,cls)=>{
    if(!list.length)return null;
    return(
      <div style={{marginBottom:'var(--sp-3)'}}>
        <div className={`task-group-label ${cls}`}>{label} · {list.length}</div>
        {list.map(r=>(
          <button key={r.loc.id} className={`task-row ${r.allDone?'completed':r.band}`} onClick={()=>onSelect(r.loc.id)}>
            <div className="task-row-emoji">{r.loc.e||'📍'}</div>
            <div className="task-row-body">
              <div className="task-row-name">{r.loc.n}</div>
              <div className="task-row-meta">
                {r.total>0?`${r.total} challenge${r.total===1?'':'s'} · ${r.locCompleted}/${r.total} klaar`:'Geen challenges'}
                {r.dist!=null&&<span style={{opacity:0.7,marginLeft:6}}>· {fmtDist(r.dist)}</span>}
              </div>
            </div>
            <div className="task-row-chevron">›</div>
          </button>
        ))}
      </div>
    );
  };
  return(
    <section style={{marginTop:'var(--sp-5)'}}>
      <h3 className="t-card-label" style={{margin:'0 0 var(--sp-3) 0'}}>🎯 Alle missies</h3>
      {!pos&&<div style={{padding:'var(--sp-3)',border:'1px dashed rgba(255,255,255,0.15)',borderRadius:'var(--r-md)',fontSize:13,opacity:0.7,marginBottom:'var(--sp-3)'}}>Nog geen GPS — zet locatie aan om afstanden te zien. Je kunt wel alvast door de lijst scrollen.</div>}
      {renderGroup('🎯 Nu te doen',groups.unlock,'unlock')}
      {renderGroup('🔥 In de buurt',groups.preview,'preview')}
      {renderGroup('🧭 Verder weg',groups.far,'')}
      {renderGroup('✓ Al gedaan',groups.done,'')}
    </section>
  );
}
