// V25 (#71): TwoRingIndicator — mini SVG showing preview (300m) outer ring,
// unlock (100m) inner ring, target dot at POI center, and the user's own dot
// positioned along the bearing with a scale capped at the preview radius.
function TwoRingIndicator({dist,pos,loc}){
  // Radii in svg px: preview=40 (outer), unlock=14 (inner)
  const cx=50,cy=50,PREV_PX=40,UNLOCK_PX=14;
  // User-dot position: project the real meters distance onto the svg radius.
  // Beyond preview: pin to the outer edge + add a subtle arrow hint.
  let ux=cx,uy=cy,off=false;
  if(pos&&loc&&dist!=null){
    // Bearing from user → target as a planar vector (lon scaled by cos(lat)) — good enough at city scale.
    // pos uses Leaflet naming (lat/lng); L_DATA uses compact (la/lo).
    const dLat=loc.la-pos.lat;                                       // +ve = target north of user
    const dLon=(loc.lo-pos.lng)*Math.cos(pos.lat*Math.PI/180);       // +ve = target east of user
    const mag=Math.hypot(dLat,dLon)||1;
    // Target sits at (cx,cy). User dot sits on the opposite bearing from target.
    // SVG: east = +x (same as +lon), north = -y (so we ADD lat-delta to y to move south).
    const pxDist=Math.min(dist,PREVIEW_RADIUS)/PREVIEW_RADIUS*PREV_PX;
    ux=cx-(dLon/mag)*pxDist; // target east of user ⇒ draw user west of cx
    uy=cy+(dLat/mag)*pxDist; // target north of user ⇒ draw user south (larger y)
    off=dist>PREVIEW_RADIUS;
  }
  return(
    <div className="two-ring">
      <svg width="100" height="100" viewBox="0 0 100 100" aria-hidden="true">
        {/* Outer preview ring (dashed amber) */}
        <circle cx={cx} cy={cy} r={PREV_PX} className="ring-preview" fill="none" strokeWidth="1.5" strokeDasharray="3 3"/>
        {/* Inner unlock ring (solid green) */}
        <circle cx={cx} cy={cy} r={UNLOCK_PX} className="ring-unlock" fill="none" strokeWidth="2"/>
        {/* Target dot */}
        <circle cx={cx} cy={cy} r="3" className="ring-target"/>
        {/* User dot */}
        {pos&&<circle cx={ux} cy={uy} r="4" className="ring-me"/>}
        {off&&pos&&<circle cx={ux} cy={uy} r="7" fill="none" stroke="rgba(139,185,255,0.4)" strokeWidth="1" strokeDasharray="2 2"/>}
      </svg>
    </div>
  );
}

// V25 (#71): TaskList — grouped, always-visible list of every main-deck task.
// Sort: by band (unlock → preview → far → unknown), distance within band,
// completed pushed to a trailing "Al gedaan" group. Filters out bars (separate mechanic).
function TaskList({pos,onSelect,completed,visitedLocs}){
  // Build rows once; treat each L_DATA POI as a row.
  const rows=L_DATA
    .filter(l=>l.c!=='bar')
    .map(loc=>{
      const{band,dist}=locBand(pos,loc);
      const locCompleted=completed&&completed[loc.id]?Object.keys(completed[loc.id]).length:0;
      const total=(loc.ch&&loc.ch.length)||0;
      const allDone=total>0&&locCompleted>=total;
      return{loc,band,dist,locCompleted,total,allDone};
    });
  // Partition by group
  const groups={unlock:[],preview:[],far:[],done:[]};
  rows.forEach(r=>{
    if(r.allDone)groups.done.push(r);
    else if(r.band==='unlock')groups.unlock.push(r);
    else if(r.band==='preview')groups.preview.push(r);
    else groups.far.push(r); // far + unknown
  });
  // Within each group, sort by distance (null last)
  const sortByDist=(a,b)=>{
    if(a.dist==null&&b.dist==null)return 0;
    if(a.dist==null)return 1;
    if(b.dist==null)return -1;
    return a.dist-b.dist;
  };
  groups.unlock.sort(sortByDist);
  groups.preview.sort(sortByDist);
  groups.far.sort(sortByDist);
  groups.done.sort(sortByDist);
  const renderGroup=(label,list,cls)=>{
    if(!list.length)return null;
    return(
      <div style={{marginBottom:'var(--sp-3)'}}>
        <div className={`task-group-label ${cls}`}>{label} · {list.length}</div>
        {list.map(r=>(
          <button key={r.loc.id} className={`task-row ${r.allDone?'completed':r.band}`} onClick={()=>onSelect(r.loc.id)}>
            <div className="task-row-emoji">{r.loc.e||'📍'}</div>
            <div className="task-row-body">
              <div className="task-row-name">{r.loc.n}</div>
              <div className="task-row-meta">
                {r.total>0?`${r.total} challenge${r.total===1?'':'s'} · ${r.locCompleted}/${r.total} klaar`:'Geen challenges'}
                {r.dist!=null&&<span style={{opacity:0.7,marginLeft:6}}>· {fmtDist(r.dist)}</span>}
              </div>
            </div>
            <div className="task-row-chevron">›</div>
          </button>
        ))}
      </div>
    );
  };
  return(
    <section style={{marginTop:'var(--sp-5)'}}>
      <h3 style={{margin:'0 0 var(--sp-3) 0',fontSize:15,letterSpacing:0.3,opacity:0.9}}>🎯 Alle missies</h3>
      {!pos&&<div style={{padding:'var(--sp-3)',border:'1px dashed rgba(255,255,255,0.15)',borderRadius:'var(--r-md)',fontSize:13,opacity:0.7,marginBottom:'var(--sp-3)'}}>Nog geen GPS — zet locatie aan om afstanden te zien. Je kunt wel alvast door de lijst scrollen.</div>}
      {renderGroup('🎯 Nu te doen',groups.unlock,'unlock')}
      {renderGroup('🔥 In de buurt',groups.preview,'preview')}
      {renderGroup('🧭 Verder weg',groups.far,'')}
      {renderGroup('✓ Al gedaan',groups.done,'')}
    </section>
  );
}

// MAP VIEW
// ═══════════════════════════════════════════
function MapView({pos,completed,visitedLocs,onSelect,phase,gpsStatus,gpsSnap,onWakeGps,hotTarget,nowTs}){
  const mapRef=useRef(null);
  const mapInst=useRef(null);
  const markersRef=useRef([]);
  const userMarkerRef=useRef(null);
  const dinnerCircleRef=useRef(null); // V12: phase-gated dinner zone circle

  // Init map
  useEffect(()=>{
    if(!mapRef.current||mapInst.current)return;
    const m=L.map(mapRef.current).setView([START_POS.lat,START_POS.lng],15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'',maxZoom:19}).addTo(m);

    // V11: Add color-dot markers (category-colored, not emojis)
    const catColor=(loc)=>{
      const types=loc.ch.map(c=>c.t);
      if(types.includes('photo'))return 'var(--foto)';
      if(types.includes('video'))return 'var(--video)';
      if(types.includes('creative'))return 'var(--creatief)';
      if(types.includes('quiz'))return 'var(--quiz)';
      return 'var(--accent)';
    };
    const catColorHex=(loc)=>{
      const types=loc.ch.map(c=>c.t);
      if(types.includes('photo'))return '#5b8dee';
      if(types.includes('video'))return '#e05c5c';
      if(types.includes('creative'))return '#4bbe8a';
      if(types.includes('quiz'))return '#9b7bea';
      return '#d4a054';
    };
    // V18: cluster group — collapses overlapping POIs at low zoom, spiderfies at high zoom
    const cluster=(typeof L.markerClusterGroup==='function')?L.markerClusterGroup({
      maxClusterRadius:45,
      showCoverageOnHover:false,
      spiderfyOnMaxZoom:true,
      disableClusteringAtZoom:17,
      iconCreateFunction:(c)=>{
        const n=c.getChildCount();
        const size=n>=20?44:n>=10?38:32;
        return L.divIcon({html:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:rgba(228,178,92,0.85);border:2px solid rgba(255,255,255,0.85);color:#0a0b10;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:${n>=20?16:14}px;box-shadow:0 4px 14px rgba(0,0,0,0.5)">${n}</div>`,className:'',iconSize:[size,size]});
      }
    }):null;
    L_DATA.forEach(loc=>{
      const col=catColorHex(loc);
      const mk=L.marker([loc.la,loc.lo],{
        icon:L.divIcon({className:'',iconAnchor:[8,8],interactive:true,
          // V12: bigger dot (16px) + 8px invisible padding → 32×32 hit target
          html:`<div style="padding:8px;margin:-8px"><div style="width:16px;height:16px;border-radius:50%;background:${col};border:2px solid rgba(255,255,255,0.35);cursor:pointer;box-shadow:0 0 8px ${col}66;transition:all .2s"></div></div>`
        })
      });
      mk.on('click',()=>onSelect(loc.id));
      mk._locId=loc.id;
      mk._color=col;
      markersRef.current.push(mk);
      if(cluster)cluster.addLayer(mk);else mk.addTo(m);
    });
    if(cluster)cluster.addTo(m);

    // V12: Dinner zone circle — only rendered once phase unlocks it
    // (stored on the ref so the phase-watch effect can show/hide it)
    dinnerCircleRef.current=L.circle([DINNER_ZONE.lat,DINNER_ZONE.lng],{radius:DINNER_ZONE.r,color:'#d4a054',fillColor:'#d4a054',fillOpacity:0.05,weight:2,dashArray:'6 4'});

    mapInst.current=m;
  },[]);

  // Update user position
  useEffect(()=>{
    if(!mapInst.current||!pos)return;
    if(userMarkerRef.current)mapInst.current.removeLayer(userMarkerRef.current);
    userMarkerRef.current=L.marker([pos.lat,pos.lng],{
      icon:L.divIcon({className:'',iconAnchor:[6,6],
        html:'<div style="position:relative"><div style="width:12px;height:12px;border-radius:50%;background:#d4a054;border:2px solid rgba(255,255,255,0.9);box-shadow:0 0 12px rgba(212,160,84,0.5);z-index:5;position:relative"></div><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:32px;height:32px;border-radius:50%;border:1px solid rgba(212,160,84,0.15);animation:pulse 3s ease-in-out infinite"></div></div>'
      })
    }).addTo(mapInst.current);
  },[pos]);

  // V12 + V25 (#71): Combined restyler for visited fade AND proximity-band state.
  // Runs on visitedLocs OR pos changes. Priority: visited wins (muted grayscale),
  // otherwise band (unlock → enlarge + green glow; preview → amber ring; far → slightly muted).
  useEffect(()=>{
    if(!markersRef.current)return;
    markersRef.current.forEach(mk=>{
      const visited=visitedLocs&&visitedLocs.has(mk._locId);
      const el=mk.getElement&&mk.getElement();
      if(!el)return;
      const inner=el.querySelector('div>div');
      if(!inner)return;
      // Reset to defaults first
      inner.style.transform='scale(1)';
      inner.style.filter='none';
      inner.style.opacity='1';
      inner.style.boxShadow=`0 0 8px ${mk._color}66`;
      inner.style.border='2px solid rgba(255,255,255,0.35)';
      if(visited){
        inner.style.opacity='0.25';
        inner.style.filter='grayscale(1)';
        return;
      }
      // Determine band for this POI
      const loc=L_DATA.find(l=>l.id===mk._locId);
      if(!loc||!pos){
        // No GPS yet: leave default styling.
        return;
      }
      const{band}=locBand(pos,loc);
      if(band==='unlock'){
        inner.style.transform='scale(1.25)';
        inner.style.border='2px solid #7ee4b7';
        inner.style.boxShadow=`0 0 14px #7ee4b7cc, 0 0 6px ${mk._color}`;
      }else if(band==='preview'){
        inner.style.border='2px solid #f0c373';
        inner.style.boxShadow=`0 0 10px #f0c37388`;
      }else{
        inner.style.opacity='0.7';
      }
    });
  },[visitedLocs,pos]);

  // V12: show dinner zone only from phase 3 onward; pulse in phase 4+
  useEffect(()=>{
    if(!mapInst.current||!dinnerCircleRef.current)return;
    const has=mapInst.current.hasLayer(dinnerCircleRef.current);
    if(phase>=3&&!has)dinnerCircleRef.current.addTo(mapInst.current);
    if(phase<3&&has)mapInst.current.removeLayer(dinnerCircleRef.current);
    if(phase>=4&&dinnerCircleRef.current){
      dinnerCircleRef.current.setStyle({weight:3,fillOpacity:0.1,dashArray:null});
    }
  },[phase]);

  // V12: center-on-me control
  const centerOnMe=()=>{
    if(mapInst.current&&pos)mapInst.current.setView([pos.lat,pos.lng],16,{animate:true});
  };

  // V17: nearby legacy computation kept for fallback if hotTarget is missing — mostly unused now

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',position:'relative'}}>
      <div ref={mapRef} style={{flex:1}}/>

      {/* V5.1/V12: GPS status pill — softer copy, tap to force-wake when paused */}
      <div className="gps-pill" onClick={()=>onWakeGps&&onWakeGps()} style={{cursor:'pointer'}} title="Tik om GPS te activeren">
        <span className={`gps-dot ${gpsStatus||'weak'}`}/>
        {gpsStatus==='good'?'GPS actief':gpsStatus==='sleep'?'GPS paust':'GPS zoekt…'}
        {gpsSnap&&<span style={{color:'var(--foto)'}}>· op {gpsSnap}</span>}
        {gpsStatus==='sleep'&&<span className="snap-btn">tik om te activeren</span>}
      </div>

      {/* V12: legend — bottom-left, stacked */}
      <div style={{position:'absolute',bottom:180,left:10,zIndex:1000,padding:'6px 8px',borderRadius:10,backdropFilter:'blur(12px)',background:'rgba(8,9,13,0.7)',border:'1px solid var(--border)',display:'flex',flexDirection:'column',gap:3,fontSize:9,color:'var(--text-secondary)'}}>
        <div style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:4,background:'var(--foto)'}}/>Foto</div>
        <div style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:4,background:'var(--video)'}}/>Video</div>
        <div style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:4,background:'var(--creatief)'}}/>Creatief</div>
        <div style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:4,background:'var(--quiz)'}}/>Quiz</div>
      </div>

      {/* V12: center-on-me */}
      {pos&&(
        <button onClick={centerOnMe} style={{position:'absolute',bottom:180,right:12,zIndex:1000,width:38,height:38,borderRadius:19,background:'rgba(8,9,13,0.85)',border:'1px solid var(--border)',backdropFilter:'blur(12px)',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}} title="Centreer op mij">📍</button>
      )}

      {/* V17: single hot-target card replaces the 3-card nearby stack */}
      {hotTarget&&(()=>{
        const loc=L_DATA.find(l=>l.id===hotTarget.locId);if(!loc)return null;
        const ch=loc.ch[hotTarget.chIdx];if(!ch)return null;
        const primaryType=ch.t;
        const typeClass=primaryType==='photo'?'foto':primaryType==='creative'?'creatief':primaryType;
        const label=primaryType==='photo'?'Foto':primaryType==='creative'?'Creatief':primaryType==='quiz'?'Quiz':'Video';
        const secs=Math.max(0,Math.floor((hotTarget.deadline-nowTs)/1000));
        const urgent=secs<=120;
        const distM=pos?haversine(pos.lat,pos.lng,loc.la,loc.lo):null;
        return(
          <div className="nearby-panel">
            <div className="nearby-card" onClick={()=>onSelect(loc.id)} style={{border:`2px solid ${urgent?'var(--danger)':'var(--accent)'}`,boxShadow:urgent?'0 8px 28px rgba(255,107,107,0.25)':'var(--sh-glow-gold)',animation:urgent?'breathing 1s ease-in-out infinite':'none'}}>
              <div className={`nearby-indicator ${typeClass}`}/>
              <div className="nearby-info">
                <div className="t-label-sm t-accent" style={{marginBottom:2}}>⏱ Hot target {secs>=60?`${Math.floor(secs/60)}m ${secs%60}s`:`${secs}s`}</div>
                <div className="nearby-name">{loc.e} {loc.n}</div>
                <div className="nearby-tags">
                  <span className={`nearby-tag t-${typeClass==='foto'?'foto':typeClass}`}>{label}</span>
                  <span className="nearby-tag" style={{background:'rgba(255,255,255,0.06)',color:'var(--text-secondary)'}}>{ch.ti}</span>
                </div>
              </div>
              <div className="nearby-end">
                {distM!=null&&<div className="nearby-dist">{fmtDist(distM)}</div>}
                <div className="nearby-pts">+{ch.p}</div>
              </div>
              <div className="nearby-chevron">›</div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ACTIVITY FEED — V5: photo grid + filters
// ═══════════════════════════════════════════
function ActivityView({feed,myTeamId,onPhoto,filter,setFilter}){
  // V10: local-only emoji reactions (not persisted; just social texture in-session)
  const REACTIONS=['🔥','👏','💀','😂','🍻'];
  const[reactions,setReactions]=useState({}); // {entryKey: {emoji: count}}
  const[myReactions,setMyReactions]=useState({}); // {entryKey: Set<emoji>}
  const entryKey=(item,i)=>`${item.created_at||i}_${item.team_id||'sys'}`;
  const toggleReaction=(key,emoji)=>{
    setMyReactions(prev=>{
      const cur=new Set(prev[key]||[]);
      if(cur.has(emoji))cur.delete(emoji); else cur.add(emoji);
      return{...prev,[key]:cur};
    });
    setReactions(prev=>{
      const cur=prev[key]||{};
      const mine=(myReactions[key]||new Set()).has(emoji);
      return{...prev,[key]:{...cur,[emoji]:(cur[emoji]||0)+(mine?-1:1)}};
    });
  };
  // Apply filter — V18 (§1.8.3): also support 'others' = alleen andere teams
  const filtered=feed.filter(item=>{
    if(filter==='photos')return !!item.photo;
    if(filter==='mine')return item.team_id===myTeamId;
    if(filter==='others')return item.team_id&&item.team_id!==myTeamId&&item.team_id!==-1;
    return true;
  });
  const photos=feed.filter(i=>!!i.photo);

  return(
    <div style={{height:'100%',overflowY:'auto',padding:'var(--sp-5)',paddingBottom:'var(--sp-10)'}}>
      <div className="row-between" style={{marginBottom:'var(--sp-3)'}}>
        <div className="t-label">Live feed</div>
        <div className="t-caption">{feed.length} berichten · {photos.length} foto's</div>
      </div>

      {/* Filter pills — V18: added 'Andere teams' to scout the competition */}
      <div className="filter-pills">
        <button className={`filter-pill ${filter==='all'?'active':''}`} onClick={()=>setFilter('all')}>Alles</button>
        <button className={`filter-pill ${filter==='photos'?'active':''}`} onClick={()=>setFilter('photos')}>📸 Foto's</button>
        <button className={`filter-pill ${filter==='mine'?'active':''}`} onClick={()=>setFilter('mine')}>Mijn team</button>
        <button className={`filter-pill ${filter==='others'?'active':''}`} onClick={()=>setFilter('others')}>👀 Andere teams</button>
      </div>

      {/* Photo grid preview */}
      {filter==='all'&&photos.length>0&&(
        <div style={{marginBottom:'var(--sp-5)'}}>
          <div className="t-label-sm" style={{marginBottom:'var(--sp-2)'}}>Recente foto's</div>
          <div className="photo-grid">
            {photos.slice(0,9).map((item,i)=>(
              <div key={i} className="photo-grid-item animate-in" onClick={()=>onPhoto&&onPhoto(item.photo)}>
                {isVideoData(item.photo)
                  ?<video src={item.photo} muted/>
                  :<img src={item.photo} alt="submission"/>}
                <div className="photo-grid-overlay">
                  <span>{item.team_emoji||'🎮'}</span>
                  {item.points>0&&<span className="t-accent">+{item.points}</span>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {filtered.length===0&&(
        <div className="panel text-center" style={{padding:'var(--sp-7)'}}>
          <div style={{fontSize:40}}>📢</div>
          <div className="t-card-label" style={{marginTop:'var(--sp-3)'}}>Nog geen activiteit</div>
          {filter!=='all'&&<button className="btn btn-ghost btn-sm" onClick={()=>setFilter('all')} style={{marginTop:'var(--sp-4)'}}>Laat alles zien</button>}
        </div>
      )}

      {filtered.map((item,i)=>{
        const isMe=item.team_id===myTeamId;
        const key=entryKey(item,i);
        const rx=reactions[key]||{};
        const mine=myReactions[key]||new Set();
        const isSystem=!item.team_id||item.team_name==='Game Master'||item.team_name==='Systeem';
        return(
          <div key={i} className="activity-row animate-in" style={{
            borderLeft:item.team_color?`3px solid ${item.team_color}`:undefined,
            background:isSystem?'rgba(228,178,92,0.04)':undefined,
            borderStyle:isSystem?'solid dashed dashed dashed':'solid'
          }}>
            <div className="row-3">
              <div style={{fontSize:22}}>{item.team_emoji||(isSystem?'👑':'🎮')}</div>
              <div className="flex-1">
                <div className="t-body-emph row-2" style={{flexWrap:'wrap'}}>
                  {item.team_name||'Systeem'}
                  {isSystem&&<span className="chip chip-gold" style={{padding:'2px 8px',fontSize:'var(--fs-10)'}}>SYSTEEM</span>}
                  {isMe&&!isSystem&&<span className="chip chip-blue" style={{padding:'2px 8px',fontSize:'var(--fs-10)'}}>JIJ</span>}
                </div>
                <div className="t-body" style={{marginTop:2}}>{item.message}</div>
              </div>
              {item.points>0&&<div className="t-num t-accent" style={{fontSize:'var(--fs-14)'}}>+{item.points}</div>}
              {item.points<0&&<div className="t-num t-danger" style={{fontSize:'var(--fs-14)'}}>{item.points}</div>}
            </div>
            {item.photo&&(
              isVideoData(item.photo)
                ?<video src={item.photo} className="activity-photo" controls muted onClick={()=>onPhoto&&onPhoto(item.photo)}/>
                :<img src={item.photo} className="activity-photo" alt="submission" onClick={()=>onPhoto&&onPhoto(item.photo)}/>
            )}
            {/* V10/V12: reactions — rendered only when the row is team-generated (systeem rows don't need reactions) */}
            {!isSystem&&(
              <div className="reactions" title="Alleen jij ziet jouw reacties">
                {REACTIONS.map(e=>{
                  const n=rx[e]||0;
                  return(
                    <button key={e} className={`reaction-btn ${mine.has(e)?'my':''}`} onClick={()=>toggleReaction(key,e)}>
                      <span>{e}</span>{n>0&&<span className="reaction-count">{n}</span>}
                    </button>
                  );
                })}
                <div className="flex-1"/>
                <div className="t-label-sm">{fmtRelTime(item.created_at)}</div>
              </div>
            )}
            {isSystem&&(
              <div className="row" style={{justifyContent:'flex-end',marginTop:'var(--sp-1)'}}>
                <div className="t-label-sm">{fmtRelTime(item.created_at)}</div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// V20 UX P1: promise-based dialog sheet
// ═══════════════════════════════════════════
// Replaces native confirm()/prompt(). Resolves `true`/`input` on OK, `false`/null on cancel.
function DialogSheet({type,msg,defaultVal,confirmLabel,cancelLabel,danger,onClose}){
  const[val,setVal]=React.useState(defaultVal||'');
  const inputRef=React.useRef(null);
  React.useEffect(()=>{
    if(type==='prompt'){
      const t=setTimeout(()=>inputRef.current?.focus(),30);
      return()=>clearTimeout(t);
    }
  },[type]);
  const onOk=()=>{
    if(type==='prompt')onClose(val);
    else onClose(true);
  };
  const onCancel=()=>{
    if(type==='prompt')onClose(null);
    else onClose(false);
  };
  const onKey=(e)=>{
    if(e.key==='Enter'&&(type==='confirm'||(type==='prompt'&&val.trim()))){
      e.preventDefault();onOk();
    }else if(e.key==='Escape'){
      e.preventDefault();onCancel();
    }
  };
  return(
    <>
      <div className="sheet-overlay" onClick={onCancel} role="presentation"/>
      <div role="alertdialog" aria-modal="true" aria-labelledby="dialog-msg"
        style={{position:'fixed',left:'50%',top:'50%',transform:'translate(-50%,-50%)',zIndex:10050,maxWidth:420,width:'92%',padding:'var(--sp-6) var(--sp-6) var(--sp-5)',borderRadius:'var(--r-lg)',background:'var(--bg-elevated,#17181f)',border:'1px solid var(--border)',boxShadow:'0 20px 60px rgba(0,0,0,0.6)',color:'#fff'}}
        onKeyDown={onKey}>
        <div id="dialog-msg" className="t-body" style={{marginBottom:'var(--sp-5)',lineHeight:'var(--lh-relaxed)',whiteSpace:'pre-wrap'}}>{msg}</div>
        {type==='prompt'&&(
          <input ref={inputRef} value={val} onChange={e=>setVal(e.target.value)} autoFocus
            style={{width:'100%',padding:'12px 14px',borderRadius:'var(--r-md)',border:'1px solid var(--border)',background:'rgba(255,255,255,0.04)',color:'#fff',fontFamily:'inherit',fontSize:'var(--fs-15)',marginBottom:'var(--sp-5)'}}/>
        )}
        <div style={{display:'flex',gap:'var(--sp-2)',justifyContent:'flex-end'}}>
          <button type="button" onClick={onCancel}
            className="btn btn-sm"
            style={{background:'rgba(255,255,255,0.06)',color:'#fff',border:'1px solid var(--border)'}}>{cancelLabel||'Annuleer'}</button>
          <button type="button" onClick={onOk}
            className={`btn btn-sm ${danger?'btn-danger':'btn-gold'}`}
            disabled={type==='prompt'&&!val.trim()}>{confirmLabel||'OK'}</button>
        </div>
      </div>
    </>
  );
}

                  {barOptions.map(b=><option key={b.id} value={b.name}>{b.emoji} {b.name}</option>)}

                </select>
                <button disabled={!barChoice||(barChoice==='__custom'&&!barCustom.trim())} onClick={()=>{const n=barChoice==='__custom'?barCustom.trim():barChoice;if(n){onTriggerBarBreak&&onTriggerBarBreak(n);setBarChoice('');setBarCustom('')}}}

            <button disabled={!broadcastMsg.trim()} onClick={()=>{if(onBroadcast){onBroadcast(broadcastMsg.trim());setBroadcastMsg('')}}}

                  <button onClick={()=>onAdjustScore&&onAdjustScore(t.id,5)} className="t-body-emph" style={{padding:`var(--sp-1) var(--sp-2)`,borderRadius:'var(--r-sm)',background:'rgba(95,216,165,0.15)',border:'1px solid rgba(95,216,165,0.3)',color:'var(--success)',cursor:'pointer',fontSize:'var(--fs-12)'}} title="+5 pts">+5</button>

                  <button onClick={()=>onRemoveTeam&&onRemoveTeam(t.id)} style={{padding:`var(--sp-1) var(--sp-2)`,borderRadius:'var(--r-sm)',background:'transparent',border:'1px dashed rgba(255,255,255,0.2)',color:'var(--text-tertiary)',cursor:'pointer'}} title="Team verwijderen">🗑</button>
                </div>
              ))}
              {teams.filter(t=>t.id>0).length===0&&<div className="t-caption text-center" style={{padding:'var(--sp-3)'}}>Nog geen teams</div>}
            </div>

        <div>
          <div className="t-label-sm" style={{marginBottom:'var(--sp-2)'}}>Pauze</div>
          <div className="row-2">
            <button onClick={()=>onBroadcast&&onBroadcast('⏸️ PAUZE — iedereen stopt even met scores')} className="btn btn-ghost btn-sm flex-1">⏸ Pauze</button>
            <button onClick={()=>onBroadcast&&onBroadcast('▶️ GO — verder spelen!')} className="btn btn-ghost btn-sm flex-1">▶ Hervat</button>
          </div>

        {/* Finale */}
        <div>
          <div className="t-label-sm" style={{marginBottom:'var(--sp-2)'}}>Finale & uitslag</div>
          {/* V21 P0-fix: two-step finale — first activate phase 4 (×1.5 multiplier), then the ceremony */}
          <button onClick={async()=>{if(await ask('Start de finale-fase? Alle scoring krijgt ×1.5 voor de laatste 20 minuten.',{confirmLabel:'Start finale-fase'}))onStartFinalePhase&&onStartFinalePhase()}}
            className="btn btn-cyan" disabled={phase>=4} style={{width:'100%',marginBottom:'var(--sp-2)'}}>
            🏁 {phase===4?'Finale-fase loopt · ×1.5':phase>=5?'Spel beëindigd':'Start finale-fase (×1.5)'}

          <button onClick={async()=>{if(await ask('Spel beëindigen en naar de eindceremonie? Dit kan niet ongedaan worden gemaakt.',{danger:true,confirmLabel:'Start finale'}))onStartFinale&&onStartFinale()}}
            className="btn btn-gold" disabled={phase>=5} style={{width:'100%'}}>
            🏆 {phase>=5?'Finale loopt':'Start finale & ceremonie'}
          </button>

      </div>

      {/* Review queue header */}
      <div className="row-between" style={{marginBottom:'var(--sp-4)'}}>
        <div>
          <div className="t-label">Beoordelen</div>
          <div className="t-section" style={{marginTop:'var(--sp-1)'}}>Wachtrij ({queue.length})</div>
        </div>
        <div className="t-caption" style={{textAlign:'right',lineHeight:'var(--lh-snug)'}}>Goedkeuren = punten blijven<br/>Afkeuren = punten worden ingetrokken</div>
      </div>

      {/* V18 (§1.9.10): filter chips — focus on suspicious first */}
      {queue.length>0&&(
        <div className="row-2" style={{marginBottom:'var(--sp-4)',flexWrap:'wrap'}}>
          {[
            {k:'all',l:`Alles · ${queue.length}`,c:'rgba(255,255,255,0.08)',b:'var(--border)'},
            {k:'green',l:`🟢 Nabij · ${queueCounts.green}`,c:'rgba(95,216,165,0.15)',b:'rgba(95,216,165,0.35)'},
            {k:'yellow',l:`🟡 Rand · ${queueCounts.yellow}`,c:'rgba(228,178,92,0.15)',b:'rgba(228,178,92,0.35)'},
            {k:'red',l:`🔴 Ver · ${queueCounts.red}`,c:'rgba(255,107,107,0.15)',b:'rgba(255,107,107,0.35)'},
          ].map(o=>(
            <button key={o.k} onClick={()=>setReviewFilter(o.k)} className="t-body-emph"
              style={{padding:`var(--sp-2) var(--sp-3)`,borderRadius:'var(--r-pill)',border:`1px solid ${o.b}`,background:reviewFilter===o.k?o.c:'rgba(255,255,255,0.02)',color:'#fff',cursor:'pointer',fontSize:'var(--fs-12)',opacity:reviewFilter===o.k?1:0.7}}>
              {o.l}
            </button>
          ))}
        </div>
      )}

      {queue.length===0&&(
        <div className="panel text-center" style={{padding:'var(--sp-7)'}}>
          <div style={{fontSize:48}}>✅</div>
          <div className="t-card-label" style={{marginTop:'var(--sp-3)'}}>Niets te beoordelen</div>
          <div className="t-body" style={{marginTop:'var(--sp-2)'}}>Foto's verschijnen hier zodra teams ze indienen</div>
        </div>
      )}

      {queue.length>0&&filteredQueue.length===0&&(
        <div className="panel text-center" style={{padding:'var(--sp-5)'}}>
          <div className="t-body">Geen items in dit filter</div>
        </div>
      )}

      {filteredQueue.map(r=>{
        const dist=r.gps_distance;
        const distClass=dist==null?'':dist<=PHOTO_GATE_RADIUS?'review-dist-good':dist<=PHOTO_GATE_RADIUS+PHOTO_GATE_GRACE?'review-dist-warn':'review-dist-bad';
        return(
          <div key={r.id} className="review-card" style={{borderLeft:r.team_color?`3px solid ${r.team_color}`:undefined}}>
            <div className="row-between" style={{alignItems:'flex-start'}}>
              <div className="flex-1">
                <div className="t-card-label">{r.team_emoji||'🎮'} {r.team_name}</div>
                <div className="t-body" style={{marginTop:'var(--sp-1)'}}>📍 {r.location_name}</div>
                <div className="t-body-emph" style={{marginTop:'var(--sp-2)'}}>{r.challenge_title}</div>
                <div className="t-caption" style={{marginTop:'var(--sp-1)'}}>{r.challenge_type} · +{r.points_awarded} pts</div>
              </div>
              <span className="review-badge review-badge-pending">pending</span>
            </div>

            {r.photo_url
              ?(isVideoData(r.photo_url)
                ?<video src={r.photo_url} className="review-photo" controls muted onClick={()=>onPhoto&&onPhoto(r.photo_url)}/>
                :<img src={r.photo_url} className="review-photo" alt="submission" onClick={()=>onPhoto&&onPhoto(r.photo_url)}/>)
              :<div className="panel-sm text-center t-caption" style={{marginTop:'var(--sp-2)',background:'rgba(255,255,255,0.03)'}}>
                  📷 Foto te groot voor cloud-sync · alleen bij team beschikbaar
                </div>}

            <div className="review-meta">
              <span>📡 GPS afstand: <span className={distClass}>{dist!=null?`${dist}m`:'onbekend'}</span></span>
              <span>{new Date(r.created_at).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}</span>
            </div>

            <div className="review-actions">
              <button className="btn btn-danger btn-sm" onClick={async()=>{if(await ask(`Foto van ${r.team_name} afkeuren? -${r.points_awarded} pts.`,{danger:true,confirmLabel:'Afkeuren'}))onReject(r)}}>✗ Afkeuren</button>
              {/* V18 (§1.9.4): confirm approve only when submission is suspicious (no photo OR >100m off) */}
              <button className="btn btn-cyan btn-sm" onClick={async()=>{
                const suspicious=!r.photo_url||(typeof r.gps_distance==='number'&&r.gps_distance>100);
                if(suspicious){
                  const reason=!r.photo_url?'er is geen foto bijgevoegd':`de afstand was ${r.gps_distance}m (>100m)`;
                  if(!await ask(`Weet je zeker dat je deze goedkeurt? ${reason}.`,{confirmLabel:'Toch goedkeuren'}))return;
                }
                onApprove(r);
              }}>✓ Goedkeuren</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════
// CHALLENGE BOTTOM SHEET — V5: dynamic quiz rotation + photo feed
// ═══════════════════════════════════════════
function ChallengeSheet({loc,pos,completed,completedPts={},onComplete,onClose,seenQuizzes,isAdmin,myTeam}){
  if(!loc)return null;
  const dist=pos?haversine(pos.lat,pos.lng,loc.la,loc.lo):null;
  // V25 (#71): two-radius band classification for this POI
  const{band}=locBand(pos,loc);
  // V7.1 hotfix: only lock quizzes when the location actually HAS a photo challenge to unlock against.
  // Otherwise quiz-only locations (Spido Kade, BlueCity, Willemswerf) would be permanently unreachable.
  const hasAnyPhoto=loc.ch.some(ch=>ch.t==='photo'||ch.t==='video'||ch.t==='creative');
  const hasPhotoCompleted=loc.ch.some((ch,i)=>(ch.t==='photo'||ch.t==='video'||ch.t==='creative')&&completed[i]);

  // V5: compute the quiz to show for this visit (rotate through unseen)
  // We render one rotating-quiz slot that replaces all the location's built-in quizzes.
  // Built-in quiz indexes and a virtual index 'rotatedQuiz' for the dynamic slot.
  const locQuizIndexes=loc.ch.map((c,i)=>c.t==='quiz'?i:-1).filter(i=>i>=0);
  const allLocQuizzesDone=locQuizIndexes.length>0&&locQuizIndexes.every(i=>completed[i]);
  // The rotated quiz is only relevant once all built-in quizzes are done; then we draw from the pool
  const rotatedQuiz=allLocQuizzesDone?pickQuiz(loc,seenQuizzes||new Set()):null;

  return(
    <>
      <div className="sheet-overlay" onClick={onClose}/>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div className="row-between" style={{alignItems:'flex-start',marginBottom:'var(--sp-3)'}}>
          <div>
            <div style={{fontSize:32,marginBottom:'var(--sp-2)',filter:'drop-shadow(0 4px 12px rgba(0,0,0,0.35))'}}>{loc.e}</div>
            <h2 className="t-section">{loc.n}</h2>
            <div className="row-2" style={{marginTop:'var(--sp-2)',flexWrap:'wrap'}}>
              <span className="chip chip-blue">{loc.c}</span>
              <a href={`https://www.google.com/maps/dir/?api=1&destination=${loc.la},${loc.lo}&travelmode=walking`} target="_blank" rel="noopener noreferrer"
                className="chip" style={{background:'rgba(95,216,165,0.14)',borderColor:'rgba(95,216,165,0.3)',color:'var(--creatief-2)',textDecoration:'none'}}>🧭 Route</a>
            </div>
          </div>
          <button onClick={onClose} aria-label="Sluiten" style={{background:'none',border:'none',color:'var(--text-tertiary)',fontSize:26,cursor:'pointer',padding:'var(--sp-1)',lineHeight:1}}>✕</button>
        </div>
        {/* V25 (#71): band-aware proximity panel — mini two-ring map + pill + copy */}
        <div style={{display:'flex',alignItems:'center',gap:'var(--sp-3)',padding:'var(--sp-3)',borderRadius:'var(--r-md)',background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',marginBottom:'var(--sp-5)'}}>
          <TwoRingIndicator dist={dist} pos={pos} loc={loc}/>
          <div style={{flex:1,minWidth:0}}>
            <span className={`band-pill ${band==='unknown'?'far':band}`}>
              {band==='unlock'?'🎯 Nu te doen':band==='preview'?'🔥 In de buurt':band==='far'?'🧭 Verder weg':'📍 GPS onbekend'}
            </span>
            <div style={{marginTop:6,fontSize:13,lineHeight:1.4,color:'var(--text-secondary)'}}>
              {band==='unlock'?'Je bent er — maak je foto of video hier.':
               band==='preview'?`Bijna daar · ${fmtDist(dist)} — blijf lopen richting ${loc.n}.`:
               band==='far'?`Nog ver weg · ${fmtDist(dist)} — loop richting ${loc.n} om te openen.`:
               'Nog geen GPS-fix. Je kunt wel alvast de challenges lezen.'}
            </div>
          </div>
        </div>

        {loc.ch.map((ch,idx)=>{
          const done=completed[idx];
          const isQuiz=ch.t==='quiz';
          const locked=isQuiz&&hasAnyPhoto&&!hasPhotoCompleted;
          // V10: distinguish wrong-gegokt (pts=0) from correct completion
          const ptsEarned=completedPts[idx];
          const wasWrong=done && ptsEarned===0;

          // V18 (V14 A5): show the full unlock chain when the quiz is locked
          const photoGate=PHOTO_GATE_RADIUS+PHOTO_GATE_GRACE;
          const farFromPoi=locked&&!isAdmin&&dist!=null&&dist>photoGate;
          const lockMsg=farFromPoi
            ?`🔒 Loop naar ${loc.n} · foto maken · dan opent de quiz`
            :'🔒 Eerst een foto-opdracht — dan opent de quiz';
          return(
            <div key={idx} className={`ch-card ${done&&!wasWrong?'completed':''} ${wasWrong?'wrong-done':''} ${locked?'locked':''}`} style={{position:'relative'}}>
              {locked&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:1,padding:'var(--sp-3)',textAlign:'center'}} className="t-card-label t-accent" title="Unlock volgorde: locatie bereiken → foto maken → quiz wordt open">{lockMsg}</div>}
              <div className="row-between" style={{alignItems:'flex-start',marginBottom:'var(--sp-2)'}}>
                <div className="flex-1">
                  <span className={`ch-type ch-type-${ch.t}`}>{ch.t}</span>
                  <h3 className="t-card-label" style={{marginTop:'var(--sp-2)'}}>{ch.ti}</h3>
                </div>
                <div className="points-badge">+{ch.p}</div>
              </div>
              <p className="t-body" style={{marginBottom:'var(--sp-3)'}}>{ch.d}</p>
              <div className="row-between">
                <div className="difficulty"><span className="star">{stars(ch.df)}</span> {ch.df}</div>
                {done&&!wasWrong&&<div className="t-body-emph t-success">✓ Voltooid {ptsEarned>0&&`(+${ptsEarned} pts)`}</div>}
                {wasWrong&&<div className="t-body-emph t-danger">✗ Fout gegokt · 0 pts{isQuiz&&ch.a?` · antwoord: ${ch.a}`:''}</div>}
              </div>
              {!done&&!locked&&<ChallengeAction ch={ch} locId={loc.id} chIdx={idx} onComplete={onComplete} dist={dist} isAdmin={isAdmin} loc={loc} myTeam={myTeam}/>}
            </div>
          );
        })}

        {/* V5: dynamic rotating-quiz slot once built-in quizzes are exhausted */}
        {rotatedQuiz&&hasPhotoCompleted&&(
          <div className="ch-card" style={{borderColor:'rgba(255,215,0,0.3)',background:'rgba(255,215,0,0.04)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:8}}>
              <div style={{flex:1}}>
                <span className="ch-type ch-type-quiz">🎲 BONUS QUIZ</span>
                <h3 style={{fontSize:15,fontWeight:700,marginTop:6}}>{rotatedQuiz.ti}</h3>
              </div>
              <div className="points-badge">+{rotatedQuiz.p}</div>
            </div>
            <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:10,lineHeight:1.4}}>{rotatedQuiz.d}</p>
            <div style={{fontSize:11,color:'var(--text-secondary)',marginBottom:8,fontStyle:'italic'}}>
              {rotatedQuiz._pool?'🎯 Bonus Rotterdam-vraag':'⭐ Extra vraag voor deze plek'}
            </div>
            <ChallengeAction ch={rotatedQuiz} locId={loc.id} chIdx={`dyn_${loc.id}_${Date.now()}`} dist={dist} isAdmin={isAdmin} loc={loc} myTeam={myTeam} onComplete={(lid,cidx,pts,photo)=>{
              // Dynamic-quiz rewards: award points, log activity, but do NOT mark built-in challenge
              onComplete(lid,-99,pts,photo);
            }}/>
          </div>
        )}
      </div>
    </>
  );
}

function ChallengeAction({ch,locId,chIdx,onComplete,dist,isAdmin,loc,myTeam}){
  const fileRef=useRef(null);
  const[preview,setPreview]=useState(null);
  const[quizAnswer,setQuizAnswer]=useState(null);
  const[quizFeedback,setQuizFeedback]=useState(null);
  const[processing,setProcessing]=useState(false);
  const quizLockRef=useRef(false);

  // V16: spectator admin (myTeam.id === -1) can't be credited scoring
  const isSpectator=myTeam?.spectator||myTeam?.id===-1;
  const isMedia=ch.t==='photo'||ch.t==='video'||ch.t==='creative';
  const gateRadius=PHOTO_GATE_RADIUS+PHOTO_GATE_GRACE;
  const tooFar=isMedia&&!isAdmin&&dist!=null&&dist>gateRadius;

  // V16: spectator guard — disable challenge completion since the score wouldn't persist
  if(isSpectator){
    return(
      <div className="gate-blocked" style={{background:'rgba(228,178,92,0.08)',borderColor:'rgba(228,178,92,0.25)'}}>
        <div className="gate-icon">👑</div>
        <div className="flex-1">
          <div className="gate-text t-accent">Game Master kan geen punten scoren</div>
          <div className="gate-hint">Join een team om mee te spelen</div>
        </div>
      </div>
    );
  }

  const handleFile=async(e)=>{
    const f=e.target.files[0];
    if(!f)return;
    setProcessing(true);
    const r=new FileReader();
    r.onload=async(ev)=>{
      const raw=ev.target.result;
      let shareable=raw;
      if(!isVideoData(raw)){
        // V20: adaptive tiered compression (falls back to null only if 3 tiers still fail)
        shareable=await compressPhotoAdaptive(raw);
      }else if(raw.length>700000){
        shareable=null;
      }
      setPreview(raw);
      setProcessing(false);

      // V6: Insert a photo_review row into Supabase for the admin queue
      if(!OFFLINE&&sb&&myTeam&&isMedia){
        const reviewRow={
          team_id:myTeam.id,
          team_name:myTeam.name,
          team_emoji:myTeam.emoji,
          team_color:myTeam.color,
          location_id:locId,
          location_name:loc?.n||'',
          challenge_idx:typeof chIdx==='number'?chIdx:-99,
          challenge_title:ch.ti,
          challenge_type:ch.t,
          gps_distance:dist!=null?Math.round(dist):null,
          points_awarded:ch.p,
          photo_url:shareable&&shareable.length<800000?shareable:null,
          status:'pending',
        };
        sb.from('photo_reviews').insert(reviewRow).then(()=>{},()=>{/* table may not exist yet — silent */});
      }

      onComplete(locId,chIdx,ch.p,shareable);
    };
    r.onerror=()=>{setProcessing(false);onComplete(locId,chIdx,ch.p,null)};
    r.readAsDataURL(f);
  };

  // V7: one shot. Correct → full points. Wrong → 0 pts, challenge marked done.
  // V7.1: ref-based lock — state is async, so two fast taps could both pass the
  // `if(quizAnswer)` check before React re-renders the disabled buttons.
  const handleQuiz=opt=>{
    if(quizLockRef.current)return;
    quizLockRef.current=true;
    setQuizAnswer(opt);
    if(opt===ch.a){
      setQuizFeedback('correct');
      setTimeout(()=>onComplete(locId,chIdx,ch.p,null),700);
    }else{
      setQuizFeedback('wrong');
      // Reveal the correct answer during feedback, then mark done with 0 pts
      setTimeout(()=>onComplete(locId,chIdx,0,null),QUIZ_WRONG_FEEDBACK_MS);
    }
  };

  if(ch.t==='quiz'){
    // V12: advertise stakes clearly before the tap
    const stakes=ch.df==='hard'?'⚡ Eén kans · hard — 4 opties, weinig ruimte voor geluk':ch.df==='medium'?'⚡ Eén kans · medium — denk goed na':'⚡ Eén kans · easy — fout = 0 pts, geen herkansing';
    return(
      <div style={{marginTop:'var(--sp-3)'}}>
        <div className="t-body-emph t-danger" style={{padding:`var(--sp-2) var(--sp-3)`,borderRadius:'var(--r-sm)',background:'rgba(255,107,107,0.1)',border:'1px solid rgba(255,107,107,0.25)',marginBottom:'var(--sp-3)'}}>
          {stakes}
        </div>
        {ch.o.map((opt,i)=>{
          const isChosen=quizAnswer===opt;
          const isRightAnswer=opt===ch.a;
          // During wrong-feedback, highlight the correct answer in green too
          const revealRight=quizFeedback==='wrong'&&isRightAnswer;
          const letter=String.fromCharCode(65+i); // A / B / C / D
          return(
            <button key={i}
              className={`quiz-option ${isChosen?(quizFeedback==='correct'?'correct':'wrong'):''} ${revealRight?'correct':''}`}
              onClick={()=>handleQuiz(opt)}
              aria-label={`Antwoord ${letter}: ${opt}`}
              disabled={!!quizAnswer}>
              <span aria-hidden="true" style={{display:'inline-block',width:22,height:22,lineHeight:'22px',borderRadius:11,background:'rgba(255,255,255,0.06)',textAlign:'center',fontWeight:800,fontSize:11,marginRight:10,color:'var(--text-secondary)'}}>{letter}</span>
              {opt}{revealRight&&<span style={{marginLeft:8,fontSize:11,fontWeight:700}}>← juist</span>}
            </button>
          );
        })}
        {quizFeedback==='wrong'&&(
          <div style={{marginTop:'var(--sp-3)'}}>
            <div className="t-body-emph t-danger">❌ Helaas. Het juiste antwoord was: {ch.a} · 0 pts</div>
            {/* V18 (§1.7.5): "Waarom?" — open a search on the correct answer + context so players can learn it */}
            <a href={`https://www.google.com/search?q=${encodeURIComponent(`${ch.a} ${loc?.n||''} ${ch.ti} Rotterdam`)}`}
              target="_blank" rel="noopener noreferrer"
              className="t-caption" style={{display:'inline-block',marginTop:'var(--sp-2)',color:'var(--foto-2)',textDecoration:'underline',cursor:'pointer'}}>
              ⓘ Waarom? Zoek uitleg op
            </a>
          </div>
        )}
        {quizFeedback==='correct'&&<div className="t-body-emph t-success" style={{marginTop:'var(--sp-3)'}}>✅ Correct! +{ch.p} pts</div>}
      </div>
    );
  }

  // V6/V16: GPS gate UI — single-line distance, no duplication
  if(tooFar){
    const need=Math.round(dist-gateRadius);
    return(
      <div className="gate-blocked">
        <div className="gate-icon">📍</div>
        <div className="flex-1">
          <div className="gate-text">Loop dichterbij om de foto te maken</div>
          <div className="gate-hint">Nog {need}m tot binnen range</div>
        </div>
        <div className="gate-distance">-{need}m</div>
      </div>
    );
  }

  const accept=ch.t==='video'?'video/*':ch.t==='creative'?'image/*,video/*':'image/*';
  return(
    <div style={{marginTop:12}}>
      {/* V19+: drop capture="environment" so iOS/Android show the native
          take-photo-or-pick-from-library sheet. Desktop keeps the regular picker. */}
      <input ref={fileRef} type="file" accept={accept} style={{display:'none'}} onChange={handleFile}/>
      <button className="btn btn-cyan" onClick={()=>fileRef.current?.click()} disabled={processing} style={{width:'100%'}}>
        {processing?'⏳ Verwerken...':preview?(ch.t==='video'?'🎬 Opnieuw opnemen':'📸 Opnieuw proberen'):(ch.t==='video'?'🎬 Video opnemen of kiezen':ch.t==='creative'?'📸 Foto/video opnemen of kiezen':'📸 Foto opnemen of kiezen')}
      </button>
      {/* V21 P1-fix #29: hint text explaining the native picker has both camera & library options */}
      {!preview&&!processing&&(
        <div className="t-caption t-muted" style={{marginTop:6,textAlign:'center',opacity:0.75}}>
          Tik om te kiezen: direct opnemen via camera óf uit fotogalerij
        </div>
      )}
      {!isAdmin&&isMedia&&dist!=null&&dist<=gateRadius&&(
        <div style={{fontSize:11,color:'var(--success)',marginTop:6,textAlign:'center'}}>✓ Je bent op locatie ({Math.round(dist)}m)</div>
      )}
      {preview&&(isVideoData(preview)
        ?<video src={preview} className="photo-preview" controls muted/>
        :<img src={preview} className="photo-preview" alt="preview"/>)}
      {isAdmin&&dist!=null&&dist>gateRadius&&(
        <div style={{fontSize:11,color:'var(--video)',marginTop:6,textAlign:'center'}}>⚠️ Admin override · normaal {Math.round(dist)}m te ver</div>
      )}
    </div>
  );
}

// V10: BAR BREAK OVERLAY
// ═══════════════════════════════════════════
function BarBreakOverlay({info,onClose,onComplete}){
  const[done,setDone]=useState(new Set());
  const[nowTs,setNowTs]=useState(Date.now());
  const fileRefs=useRef({}); // V16: per-mini file input refs for photo upload
  useEffect(()=>{const i=setInterval(()=>setNowTs(Date.now()),1000);return()=>clearInterval(i);},[]);
  // V21 a11y: escape closes overlay (minimizes) + dialog role
  React.useEffect(()=>{
    const onKey=(e)=>{if(e.key==='Escape'){e.stopPropagation();onClose&&onClose();}};
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[onClose]);
  const endsAt=(info.started||Date.now())+BAR_BREAK_DURATION_MS;
  const msLeft=Math.max(0,endsAt-nowTs);
  const secLeft=Math.floor(msLeft/1000);
  const urgent=secLeft<=60;

  // V16: bar-break minis now require a photo/video upload, not honor-system "Klaar"
  const handleUpload=(m,i,file)=>{
    if(done.has(i)||!file)return;
    const r=new FileReader();
    r.onload=async(ev)=>{
      const raw=ev.target.result;
      let shareable=raw;
      // V20: adaptive tiered compression for photos
      if(!isVideoData(raw))shareable=await compressPhotoAdaptive(raw);
      else if(raw.length>700000)shareable=null;
      setDone(prev=>new Set([...prev,i]));
      onComplete&&onComplete(m,m.pts,shareable);
    };
    r.readAsDataURL(file);
  };

  return(
    <div className="barbreak-overlay" onClick={onClose} role="dialog" aria-modal="true" aria-labelledby="barbreak-title">
      <div className="barbreak-card" style={{maxWidth:460,width:'92%'}} onClick={e=>e.stopPropagation()}>
        <div className="t-label t-accent" style={{textAlign:'center'}}>🍻 Bar break</div>
        <div id="barbreak-title" className="t-title" style={{marginTop:'var(--sp-2)',background:'linear-gradient(135deg,var(--accent-2),var(--video-2))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>{info.name}</div>
        <div className="chip" style={{margin:`var(--sp-4) auto var(--sp-5)`,color:urgent?'var(--danger)':'var(--accent-2)',borderColor:urgent?'rgba(255,107,107,0.4)':'rgba(228,178,92,0.35)',background:urgent?'rgba(255,107,107,0.12)':'var(--accent-glow)',animation:urgent?'breathing 1s ease-in-out infinite':'none'}}>⏱ {secLeft>=60?`${Math.floor(secLeft/60)}m ${secLeft%60}s`:`${secLeft}s`} over</div>
        <div className="t-body" style={{textAlign:'center',fontStyle:'italic',marginBottom:'var(--sp-5)'}}>Drie bonus-opdrachten · doe er zoveel als je wilt · elke telt apart</div>
        <div className="stack-3" style={{textAlign:'left'}}>
          {info.mini.map((m,i)=>{
            const isDone=done.has(i);
            const accept=m.title.toLowerCase().includes('karaoke')||m.title.toLowerCase().includes('roulette')?'video/*':'image/*,video/*';
            return(
              <div key={i} className="panel" style={{background:isDone?'linear-gradient(155deg,rgba(95,216,165,0.1),rgba(95,216,165,0.02))':undefined,borderColor:isDone?'rgba(95,216,165,0.3)':undefined}}>
                <div className="row-3" style={{marginBottom:'var(--sp-3)'}}>
                  <div style={{fontSize:28}}>{m.emoji}</div>
                  <div className="flex-1">
                    <div className="t-card-label">{m.title}</div>
                    <div className="t-body" style={{marginTop:'var(--sp-1)'}}>{m.desc}</div>
                  </div>
                  <div className="t-num t-accent" style={{fontSize:'var(--fs-17)'}}>+{m.pts}</div>
                </div>
                {!isDone&&<>
                  {/* V19+: no capture attribute — library uploads allowed */}
                  <input ref={el=>{fileRefs.current[i]=el}} type="file" accept={accept} style={{display:'none'}} onChange={e=>handleUpload(m,i,e.target.files[0])}/>
                  <button className="btn btn-cyan btn-sm" style={{width:'100%'}} onClick={()=>fileRefs.current[i]?.click()}>
                    📸 Foto of video — +{m.pts} pts
                  </button>
                </>}
                {isDone&&<div className="t-body-emph t-success text-center" style={{padding:'var(--sp-2)'}}>✓ Voltooid</div>}
              </div>
            );
          })}
        </div>
        <button className="btn btn-ghost" onClick={onClose} style={{width:'100%',marginTop:'var(--sp-5)'}}>Door met spelen</button>
      </div>
    </div>
  );
}

// V10: FINALE CEREMONY SCREEN
// ═══════════════════════════════════════════
function FinaleScreen({teams,scores,myTeam,elapsed,activityFeed,jorikTeamId}){
  // V23 (#48): use rankTeams() so ties break deterministically (earlier finisher wins,
  // then by challenge count, then by creation order). Single source of truth for winner.
  const sorted=React.useMemo(()=>rankTeams(teams,scores,activityFeed),[teams,scores,activityFeed]);
  const winner=sorted[0];
  // V18: full carousel — top-scoring photos first, expand/collapse
  const allPhotos=(activityFeed||[]).filter(a=>a.photo).slice().sort((a,b)=>(b.points||0)-(a.points||0));
  const[photosExpanded,setPhotosExpanded]=useState(false);
  const initialPhotoCount=12;
  const photos=photosExpanded?allPhotos:allPhotos.slice(0,initialPhotoCount);
  const totalChallenges=(activityFeed||[]).filter(a=>a.points>0).length;

  // V18 (§1.11.4): MVP sub-awards — fun side-prizes from the activity feed
  const awards=React.useMemo(()=>{
    const byTeam={}; // teamId -> {teamRef, photos, videos, locations:Set, bestSingle, quizStreak, totalPoints}
    teams.forEach(t=>{byTeam[t.id]={team:t,photos:0,videos:0,locs:new Set(),best:0,totalPts:0};});
    (activityFeed||[]).forEach(a=>{
      if(!a||a.team_id==null)return;
      const rec=byTeam[a.team_id];if(!rec)return;
      if(a.photo){if(isVideoData(a.photo))rec.videos++;else rec.photos++;}
      if(a.points>0){rec.totalPts+=a.points;if(a.points>rec.best)rec.best=a.points;}
      if(a.loc_id!=null)rec.locs.add(a.loc_id);
    });
    const arr=Object.values(byTeam);
    const pickMax=(fn,label,icon,desc)=>{const r=arr.reduce((m,x)=>fn(x)>fn(m)?x:m,arr[0]);return fn(r)>0?{team:r.team,value:fn(r),label,icon,desc}:null;};
    return[
      pickMax(r=>r.photos,'Foto-koning 📸','📸','meeste foto\'s geüpload'),
      pickMax(r=>r.videos,'Video-regisseur 🎥','🎥','meeste videos geüpload'),
      pickMax(r=>r.locs.size,'Ontdekkingsreiziger 🗺️','🗺️','meeste unieke locaties bezocht'),
      pickMax(r=>r.best,'Grootste schot 💥','💥','hoogste score in één opdracht'),
    ].filter(Boolean);
  },[teams,activityFeed]);

  // V18 (§1.11.3): lightweight share-text helper
  const onShare=async()=>{
    const lines=[`🏆 Jorik's Stadsspel — Eindstand`];
    sorted.slice(0,3).forEach((t,i)=>lines.push(`${['🥇','🥈','🥉'][i]} ${t.emoji} ${t.name} · ${t.score} pts`));
    lines.push(`${fmtHM(elapsed)} gespeeld · ${totalChallenges} uitdagingen voltooid`);
    const text=lines.join('\n');
    try{
      if(navigator.share){await navigator.share({title:'Stadsspel Rotterdam',text});}
      else{await navigator.clipboard.writeText(text);alert('Gekopieerd naar klembord');}
    }catch(e){/* user cancelled or not supported */}
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:10010,overflow:'auto',background:'radial-gradient(circle at 50% 20%,rgba(228,178,92,0.15),transparent 60%),radial-gradient(circle at 30% 80%,rgba(178,155,255,0.12),transparent 50%),var(--bg)'}}>
      <div style={{padding:`var(--sp-8) var(--sp-6) var(--sp-10)`,textAlign:'center',maxWidth:640,margin:'0 auto'}}>
        <div className="t-label t-accent" style={{letterSpacing:'var(--ls-widest)'}}>━━━  De uitslag  ━━━</div>
        <h1 className="t-hero" style={{marginTop:'var(--sp-2)',background:'linear-gradient(135deg,var(--accent-2),var(--video-2),var(--quiz-2))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Eindstand</h1>
        <div className="t-body" style={{marginTop:'var(--sp-3)',marginBottom:'var(--sp-7)'}}>{fmtHM(elapsed)} gespeeld · {teams.length} teams · {totalChallenges} voltooide uitdagingen</div>

        {winner&&(
          <div className="glass-strong animate-in" style={{position:'relative',padding:'var(--sp-7)',marginBottom:'var(--sp-6)',borderColor:winner.color+'88',background:`linear-gradient(135deg,${winner.color}20,rgba(10,14,39,0.9)),rgba(0,0,0,0.45)`,overflow:'hidden'}}>
            {/* V18: dark readability overlay so winner name stays legible on any team color */}
            <div aria-hidden="true" style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at center,rgba(0,0,0,0.35),rgba(0,0,0,0.55))',pointerEvents:'none'}}/>
            <div style={{position:'relative'}}>
              <div className="t-label t-accent">🏆 Winnaar</div>
              <div style={{fontSize:64,marginTop:'var(--sp-2)',animation:'float 3s ease-in-out infinite',filter:'drop-shadow(0 4px 10px rgba(0,0,0,0.6))'}}>{winner.emoji}</div>
              <div className="t-title" style={{color:winner.color,marginTop:'var(--sp-2)',textShadow:'0 2px 8px rgba(0,0,0,0.9),0 0 2px rgba(0,0,0,0.8)'}}>{winner.name}</div>
              <div className="t-body" style={{marginTop:'var(--sp-2)',marginBottom:'var(--sp-3)',textShadow:'0 1px 6px rgba(0,0,0,0.8)'}}>Vriend van de Bruidegom · Eeuwige Roem</div>
              <div className="t-num t-accent" style={{fontSize:'var(--fs-48)',textShadow:'0 2px 10px rgba(0,0,0,0.8)'}}>{winner.score}<span className="t-body" style={{marginLeft:6}}>pts</span></div>
            </div>
          </div>
        )}

        <div className="t-label" style={{marginBottom:'var(--sp-3)'}}>Volledige rangschikking</div>
        {sorted.map((t,i)=>(
          <div key={t.id} className="panel animate-in row-3" style={{marginBottom:'var(--sp-2)',borderLeft:`4px solid ${t.color}`,animationDelay:`${i*0.1}s`,opacity:i>0?0.95:1}}>
            <div className="t-num" style={{minWidth:36,color:i===0?'var(--accent-2)':i===1?'#c0c0c0':i===2?'#cd7f32':'var(--text-tertiary)'}}>#{i+1}</div>
            <div style={{fontSize:28}}>{t.emoji}</div>
            <div className="flex-1" style={{textAlign:'left'}}>
              <div className="t-card-label">{t.name}{t.id===jorikTeamId&&<span className="t-label-sm t-accent" style={{marginLeft:'var(--sp-2)'}}>· met Jorik</span>}</div>
              <div className="t-caption">{t.id===myTeam?.id?'Jouw team':'Team'}</div>
            </div>
            <div className="t-num" style={{fontSize:'var(--fs-20)',color:t.color}}>{t.score}</div>
          </div>
        ))}

        {/* V18 (§1.11.4): MVP sub-awards — highlight side-achievements */}
        {awards.length>0&&(
          <div style={{marginTop:'var(--sp-7)'}}>
            <div className="t-label" style={{marginBottom:'var(--sp-3)'}}>🎖 MVP-prijzen</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:'var(--sp-3)'}}>
              {awards.map((a,i)=>(
                <div key={i} className="panel animate-in" style={{textAlign:'center',padding:'var(--sp-4)',borderColor:a.team.color+'66',background:`linear-gradient(155deg,${a.team.color}18,rgba(255,255,255,0.02))`,animationDelay:`${i*0.08}s`}}>
                  <div style={{fontSize:32}}>{a.icon}</div>
                  <div className="t-card-label" style={{marginTop:'var(--sp-2)'}}>{a.label}</div>
                  <div className="t-caption t-muted" style={{marginTop:2}}>{a.desc}</div>
                  <div className="t-body-emph" style={{marginTop:'var(--sp-2)',color:a.team.color}}>{a.team.emoji} {a.team.name}</div>
                  <div className="t-label-sm t-accent">{a.value}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* V18 (§1.11.3): share results — uses Web Share API or falls back to clipboard */}
        <div className="row-2" style={{marginTop:'var(--sp-5)',justifyContent:'center'}}>
          <button onClick={onShare} className="btn btn-ghost btn-sm">📤 Deel eindstand</button>
        </div>

        {photos.length>0&&(
          <div style={{marginTop:'var(--sp-7)'}}>
            <div className="row-between" style={{marginBottom:'var(--sp-3)'}}>
              <div className="t-label">📸 Momenten van de dag</div>
              <div className="t-label-sm t-muted">{photosExpanded?allPhotos.length:Math.min(initialPhotoCount,allPhotos.length)} / {allPhotos.length}</div>
            </div>
            <div className="photo-grid">
              {photos.map((p,i)=>(
                <div key={i} className="photo-grid-item" style={{animationDelay:`${Math.min(i,20)*0.05}s`}}>
                  {isVideoData(p.photo)?<video src={p.photo} muted preload="metadata"/>:<img src={p.photo} alt="" loading="lazy" decoding="async"/>}
                  <div className="photo-grid-overlay"><span>{p.team_emoji||'🎮'}</span>{p.points>0&&<span className="t-accent">+{p.points}</span>}</div>
                </div>
              ))}
            </div>
            {allPhotos.length>initialPhotoCount&&(
              <button onClick={()=>setPhotosExpanded(v=>!v)} className="btn btn-ghost" style={{width:'100%',marginTop:'var(--sp-3)'}}>
                {photosExpanded?'Minder tonen ▲':`Toon alle ${allPhotos.length} foto's ▼`}
              </button>
            )}
          </div>
        )}

        <div className="panel" style={{marginTop:'var(--sp-8)',background:'linear-gradient(135deg,rgba(178,155,255,0.1),rgba(255,123,123,0.08))',borderColor:'rgba(178,155,255,0.3)'}}>
          <div className="t-card-title">🥂 Proost op Jorik</div>
          <div className="t-body" style={{marginTop:'var(--sp-2)'}}>De ring is terug. De bruiloft kan door. Al jullie foto's, video's en roasts zijn vastgelegd en worden samengevoegd tot een verrassingsvideo die Jorik pas op 14 juni te zien krijgt. Bedankt voor jullie energie vandaag.</div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
