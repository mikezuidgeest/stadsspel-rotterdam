      // V40.1 (UX-review P1): reword. Dropped "Andere teams een kans" (designer voice).
      // Switched vocab from "ronde" (used nowhere else) to "beurt" (rotation-aligned).
      // Reframed cap as "missie blijft tellen voor de bruiloftsedit" — gives players a
      // reason to keep doing missions even though points pause.
      try{const setToast=window.__ssrSetToast;if(setToast)setToast(`🌟 Top — ${JORIK_HOLD_CAP} Jorik-missies in deze beurt. Extra missies blijven mooi voor de bruiloftsedit, maar punten pauzeren tot de volgende rotatie.`);}catch(_){}
    }
  };

  const completeChallenge=(locId,chIdx,pts,photoData=null)=>{
    // chIdx === -99 is the V5 dynamic bonus quiz — award points + log, skip challenge bookkeeping
    const isDynamicBonus=chIdx===-99;
    const key=`${locId}_${chIdx}`;
    if(!isDynamicBonus&&completed[locId]?.[chIdx])return;

    // V7: wrong-quiz → pts=0 path. Mark challenge done, no score change, no first-to-complete bonus.
    const isWrongZero=pts===0;
    const loc=L_DATA.find(l=>l.id===locId);
    const isQuiz=loc&&loc.ch[chIdx]?.t==='quiz';

    // V40.1 (security review P0): client-side wp:1 race gate. The UI already hides wp:1 from
    // Jorik-holder team (V37 secrecy lock), and the V40 Postgres trigger rejects the row, BUT
    // the optimistic flow below COMMITS the score RPC + activity_feed + photo_reviews BEFORE
    // the trigger fires. If Jorik rotates onto this team mid-submission (FileReader async +
    // bar break race), the points + photo + activity row land permanently while only the
    // audit row is rejected. Gate at the entry to block the entire flow when wp:1 + Jorik
    // is present. Belt-and-braces; the trigger is still the final defense if this somehow
    // doesn't catch (e.g. stale React state of jorikInTeam).
    if(loc&&loc.ch[chIdx]?.wp===1&&(jorikInTeam||isJorikDevice)){
      try{const setToast=window.__ssrSetToast;if(setToast)setToast('🤫 Deze missie is nu geheim — bewaar \'m voor later.');}catch(_){}
      return;
    }

    // V30: streak bonuses + Extra-Tijd unlock removed in the Less-is-More pass.
    // Scoring stays simple: base points × phase multiplier, plus first-finder bonus.
    // V20: FINALE multiplier — all scoring ×1.5 during phase 4 (last 20 min).
    const phaseMult=phase===4?FINALE_MULTIPLIER:1;
    const basePts=Math.round(pts*phaseMult);
    // V20: FIRST_BONUS is now resolved honestly server-side via challenge_first_finder
    // (see block further down). We no longer award it optimistically — it's a late
    // add-on that fires via a second delta + toast once the race is resolved.
    // OFFLINE mode keeps the old eager behaviour so solo testing still feels complete.
    const isFirstEligible=(!isDynamicBonus&&!isWrongZero);
    const firstBonus=(OFFLINE&&isFirstEligible)?Math.round(FIRST_BONUS*phaseMult):0;
    let totalPts=basePts+firstBonus;

    if(!isDynamicBonus){
      setCompleted(prev=>({...prev,[locId]:{...prev[locId],[chIdx]:true}}));
      setCompletedPts(prev=>({...prev,[locId]:{...prev[locId],[chIdx]:totalPts}}));
    }
    if(locId>0)setVisitedLocs(prev=>new Set([...prev,locId]));
    if(totalPts>0){
      // V20: atomic delta — no more lost updates when two teammates race
      applyScoreDelta(myTeam?.id,totalPts);
      setScorePopup(`+${totalPts}`);
      triggerConfetti(totalPts);
    }
    if(loc){
      if(isWrongZero){
        setToast(`${loc.e} ❌ Fout · 0 pts`);
      }else{
        setToast(`${loc.e} +${totalPts} pts!`);
      }
    }

    // V14/V30: simple celebration on correct answer (streak/time-unlock branches removed)
    if(!isWrongZero&&loc){
      const breakdownBits=[`+${basePts} basis`];
      if(firstBonus>0)breakdownBits.push(`+${firstBonus} eerste`);
      if(phaseMult!==1)breakdownBits.push(`🏁 FINALE ×${phaseMult}`);
      celebrate({
        emoji:loc.e,
        title:'Goed zo!',
        sub:`+${totalPts} pts`,
        breakdown:breakdownBits,
        big:false,
      });
    }

    if(loc){
      let label;
      if(isWrongZero){
        label=`zat ernaast bij "${loc.ch[chIdx]?.ti}" (${loc.n}) · 0 pts`;
      }else if(isDynamicBonus){
        label=`🎲 Bonus quiz bij ${loc.n} gehaald!`;
      }else{
        label=`${loc.ch[chIdx]?.ti} bij ${loc.n} voltooid!`;
      }
      // V34 P0 fix (Tom/Jorik personas): wp:1 entries used to land in the public
      // activity feed and the FinaleScreen photo grid, leaking the wedding-edit
      // surprise to anyone (including Jorik) glancing at a teammate's screen.
      // We tag the message with a hidden [WP1] prefix so ActivityView and the
      // FinaleScreen photo grid can filter Jorik-side viewers without needing
      // a Supabase schema migration. Admin and the executing team's non-Jorik
      // tabs still see the entry, but the marker is stripped on render.
      const isWp1=loc.ch[chIdx]?.wp===1;
      const taggedLabel=isWp1?`[WP1] ${label}`:label;
      addActivity(taggedLabel,isWrongZero?0:totalPts,photoData,locId);
    }

    if(!isDynamicBonus&&loc&&loc.ch[chIdx]?.t==='quiz'){
      setSeenQuizzes(prev=>new Set([...prev,`${locId}_q_${chIdx}`]));
    }

    // Update Supabase
    // V20: score writes are now handled atomically by applyScoreDelta above.
    // Here we only need the completed_challenges insert — which also benefits
    // from the v20 unique constraint on (team_id, challenge_id): a duplicate
    // insert (two teammates racing) now fails with 23505 and we treat it as
    // "already done, no-op" rather than double-counting.
    if(!OFFLINE&&sb&&myTeam&&loc&&!isDynamicBonus){
      // V40.1 (code-review P0 fix): Supabase-js v2 RESOLVES with {data,error} — it does NOT
      // reject. The pre-V40 .then(success, error) pattern was dead code on Postgres errors,
      // which meant the duplicate-submit toast (existing since V20) AND the new wp:1 secrecy
      // toast NEVER fired. Now we destructure {data, error} from the resolved value and
      // branch in the same .then. Real errors are now handled; previously they were silently
      // swallowed by the unused second callback.
      sb.from('completed_challenges').insert({team_id:myTeam.id,challenge_id:key,location_id:locId,challenge_type:loc.ch[chIdx]?.t,points_earned:totalPts}).then(({data:_data,error:e})=>{
        if(!e)return;
        // 23505 = unique_violation. The teammate-race OR re-submit-after-refresh case.
        if(e.code==='23505'||String(e.message||'').includes('duplicate')){
          try{const setToast=window.__ssrSetToast;if(setToast)setToast('✅ Deze missie heb je al gedaan — punten staan al genoteerd');}catch(_){}
          return;
        }
        // 23514 = check_violation, surfaced by the V40 wp:1 secrecy trigger.
        // Wording softened (no "wp:1" literal in user-facing text) and operational tail
        // ("wacht op de volgende bar break") removed per UX review — that tail tells the
        // Jorik-holder that there IS a wedding pipeline, which is itself a spoiler.
        if(e.code==='23514'||String(e.message||'').toLowerCase().includes('secrecy')){
          try{const setToast=window.__ssrSetToast;if(setToast)setToast('🤫 Deze missie is nu geheim — bewaar \'m voor later.');}catch(_){}
          return;
        }
        console.warn('completed_challenges insert failed',e);
      });

      // V20: FIRST_BONUS honest race. One winner per challenge, period. If the
      // insert into challenge_first_finder succeeds, this team was first and
      // gets +FIRST_BONUS. If it conflicts (409), another team beat us — no-op.
      // Graceful fallback: if the table doesn't exist yet (migration not run),
      // fall back to the eager-everyone-gets-it legacy behaviour so nothing breaks.
      if(isFirstEligible&&FIRST_BONUS>0){
        // V20: FINALE multiplier also applies to FIRST_BONUS winners
        const firstBonusPts=Math.round(FIRST_BONUS*phaseMult);
        // V23 (#51): network-hiccup retry. Conflicts (23505) and missing-table
        // (42P01) are deterministic verdicts — never retry those. Any other
        // error (fetch failure, 5xx, timeout) gets exactly one retry after
        // 600 ms before we concede. Without this a brief GPRS blip during
        // a close race would silently strip the +FIRST_BONUS from the
        // rightful winner (they'd be "not first" on the retry that never ran).
        const awardIfWon=()=>{
          applyScoreDelta(myTeam.id,firstBonusPts);
          setToast(`🏆 Eerste bij ${loc.n}! +${firstBonusPts} pts bonus`);
          addActivity(`was als eerste bij "${loc.ch[chIdx]?.ti}" (${loc.n}) · +${firstBonusPts} pts bonus`,firstBonusPts,null,locId);
          // V35 P1 fix (Tom persona): the eerste-team bonus used to land as a
          // muted toast + score-popup — same visual weight as a regular finish.
          // The bonus is the PRIDE moment of the day. Now we fire a dedicated
          // gold celebrate-burst so the team feels the win, plus haptic so phones
          // in pockets register it through the trousers.
          try{celebrate({emoji:'🥇',title:'Eerste team!',sub:`+${firstBonusPts} pts bonus`,breakdown:[`+${firstBonusPts} eerste-team`,`bij ${loc.n}`],big:true,levelUp:false});}catch(e){}
          try{if(navigator.vibrate)navigator.vibrate([100,50,100,50,200]);}catch(e){}
          try{const c=window.__ssrPlayCue;if(c)c('first');}catch(e){}
        };
        const isConflict=(err)=>err&&(err.code==='23505'||String(err.message||'').toLowerCase().includes('duplicate')||String(err.code||'').startsWith('23'));
        const isMissing=(err)=>{
          if(!err)return false;
          const m=String(err.message||'').toLowerCase();
          return m.includes('does not exist')||m.includes('relation')||err.code==='42P01';
        };
        const scheduleRetry=(triesLeft)=>{
          let id;
          id=setTimeout(()=>{pendingRetryTimersRef.current.delete(id);attempt(triesLeft);},600);
          pendingRetryTimersRef.current.add(id);
        };
        const attempt=(triesLeft)=>{
          sb.from('challenge_first_finder').insert({challenge_id:key,team_id:myTeam.id})
            .then(
              ({error})=>{
                if(!error){awardIfWon();return;}
                if(isConflict(error))return; // lost the race, canonical outcome
                if(isMissing(error)){
                  console.warn('challenge_first_finder missing — legacy fallback: awarding FIRST_BONUS anyway',error.message);
                  applyScoreDelta(myTeam.id,firstBonusPts);
                  return;
                }
                // Transient error — retry once
                if(triesLeft>0){scheduleRetry(triesLeft-1);return;}
                console.warn('challenge_first_finder insert failed after retry',error);
              }
            )
            .catch(e=>{
              // Thrown (network down, fetch rejected) — retry once
              if(triesLeft>0){scheduleRetry(triesLeft-1);return;}
              console.warn('challenge_first_finder threw after retry',e);
            });
        };
        attempt(1);
      }
    }

    // V30: hot-target clear-on-completion removed with the timed-target system.
  };

  // V14: level-up watcher — V29 useRef latch for dedup; V30 simplified to inline toast (was full-screen modal)
  useEffect(()=>{
    const myScoreNow=scores[myTeam?.id]||0;
    const lv=levelFor(myScoreNow);
    // V29: synchronous ref read/write kills the stale-closure race that
    // caused 3× level-up toasts on rapid score echoes.
    if(lastLevelSeenRef.current==null){
      lastLevelSeenRef.current=lv.level;
      setLastLevelSeen(lv.level); // keep state in sync for any renders that read it
      return;
    }
    if(lv.level>lastLevelSeenRef.current){
      lastLevelSeenRef.current=lv.level; // latch BEFORE any side-effect fires
      setLastLevelSeen(lv.level);
      // V30 (Less-is-More): replaced the full-screen levelUp celebration modal with a
      // lightweight toast — tier badge already lives on the leaderboard card, players
      // don't need a cinematic reveal every time they cross a score line.
      setToast(`${lv.emoji} Level ${lv.level} · ${lv.name}`);
      addActivity(`is level ${lv.level} · ${lv.name} geworden!`,0);
    }
  },[scores,myTeam]);

  // V30 (Less-is-More): hot-target + Extra Tijd system removed entirely.
  // assignHotTarget, the auto-assign effect, the expiry watchdog (with BroadcastChannel
  // dedup and expiredHotRef latch), and activateExtraTime were all cut. No "urgent next
  // thing" clock, no missed-deadline penalty, no +5-min charges — players just pick
  // challenges from the Kaart tab at their own pace.
  const assignHotTarget=useCallback(()=>{},[]);
  const activateExtraTime=useCallback(()=>{},[]);

  // V10: derive jorikInTeam from jorikTeamId (real cross-team sync via Supabase broadcast)
  useEffect(()=>{
    setJorikInTeam(myTeam?.id!=null && jorikTeamId===myTeam.id);
  },[myTeam,jorikTeamId]);

  // V19: Jorik-arrival toast + haptic. Fires on the rising edge of jorikInTeam
  // (false→true). Makes the mechanic legible so players can't "not notice" that
  // Jorik just landed on their team. Skip the very first render (ref starts
  // undefined) so a player who joins mid-game while already holding Jorik sees
  // the banner — but doesn't get a false "just arrived" toast.
  const prevJorikInTeamRef=React.useRef(undefined);
  useEffect(()=>{
    const prev=prevJorikInTeamRef.current;
    prevJorikInTeamRef.current=jorikInTeam;
    if(prev===undefined)return; // initial mount — banner alone is enough
    if(prev===false && jorikInTeam===true){
      setToast(`💍 Jorik komt bij jullie team — ${JORIK_MISSIONS.length} extra missies beschikbaar!`);
      try{if(navigator.vibrate)navigator.vibrate([120,60,120,60,240]);}catch(e){}
    }
  },[jorikInTeam]);

  // V20: derive jorikVisitedTeamIds from activity_feed [JORIK] team=X markers.
  // Re-runs on mount + whenever jorikTeamId changes (i.e. every time Jorik moves,
  // the feed gains a new marker row we need to fold into the set). Admin-only
  // consumer (the "✅ al bezocht" chip badges in AdminReviewView), so we can
  // afford to query on-demand rather than maintain a second realtime sub.
  useEffect(()=>{
    if(OFFLINE||!sb||!isAdmin)return;
    let cancelled=false;
    sb.from('activity_feed').select('message').like('message','[JORIK] team=%').order('created_at',{ascending:true}).limit(200).then(res=>{
      if(cancelled)return;
      const rows=Array.isArray(res?.data)?res.data:[];
      const next=new Set();
      for(const row of rows){
        const m=/\[JORIK\] team=(\d+)/.exec(row?.message||'');
        if(m)next.add(parseInt(m[1],10));
      }
      setJorikVisitedTeamIds(next);
    },()=>{});
    return()=>{cancelled=true;};
  },[jorikTeamId,isAdmin]);

  // V20 (Audit item #1): refresh + subscribe to team_members so every phone sees
  // live per-team headcount. We do a full re-SELECT on every INSERT/DELETE rather
  // than merge deltas client-side — the table is tiny (≤20 rows) and refetching
  // dodges the deduplication headache we had with activity_feed in V16.
  // Gracefully no-ops if the V32 migration hasn't been applied yet (res.error
  // returns "relation ... does not exist") — no hard failure for a pre-migrate
  // phone, just 0-counts everywhere.
  useEffect(()=>{
    if(OFFLINE||!sb)return;
    let cancelled=false;
    const refresh=()=>{
      sb.from('team_members').select('team_id').then(res=>{
        if(cancelled)return;
        if(res&&res.error){
          // Table missing (V32 not applied) — leave counts empty, don't crash.
          if(!/does not exist/i.test(String(res.error.message||''))){
            console.warn('[team_members] refresh failed:',res.error.message);
          }
          return;
        }
        const counts={};
        for(const row of (res?.data||[])){
          if(row&&row.team_id!=null){
            counts[row.team_id]=(counts[row.team_id]||0)+1;
          }
        }
        setTeamMemberCounts(counts);
      },()=>{});
    };
    refresh();
    const ch=sb.channel('team-members')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'team_members'},refresh)
      .on('postgres_changes',{event:'DELETE',schema:'public',table:'team_members'},refresh)
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'team_members'},refresh)
      .subscribe();
    return()=>{cancelled=true;try{sb.removeChannel(ch);}catch(e){}};
  },[]);

  // V20 (Audit item #1): write-through — the authoritative "this phone is on
  // team X" row. Fires whenever myTeam changes, including initial hydrate from
  // localStorage. Spectators (myTeam.id<0 or .spectator) are deliberately
  // excluded: a Game Master observing shouldn't inflate any team's count.
  // On myTeam=null (logout / kicked / phantom-guard), the row is DELETEd.
  // The UNIQUE(session_id) constraint in V32 means an upsert-by-session_id
  // semantic is safe even if two quick team switches race.
  const prevSessionTeamRef=React.useRef(null);
  useEffect(()=>{
    if(OFFLINE||!sb)return;
    const sid=sessionIdRef.current;
    if(!sid)return;
    const teamId=(myTeam&&myTeam.id>0&&!myTeam.spectator)?myTeam.id:null;
    const prev=prevSessionTeamRef.current;
    if(teamId===prev)return; // no change — avoid redundant writes
    prevSessionTeamRef.current=teamId;
    if(teamId==null){
      // Leaving a team — delete my membership row. Ignore "table missing" errors
      // for phones running against a pre-V32 backend.
      sb.from('team_members').delete().eq('session_id',sid).then(()=>{},()=>{});
      return;
    }
    // Joining / switching. Delete any prior row for this session first (belt-and-
    // braces — the UNIQUE constraint would do it, but an explicit delete lets us
    // keep the logic simple without relying on ON CONFLICT DO UPDATE semantics).
    const captainName=(myTeam?.members&&myTeam.members.length)?myTeam.members[0]:null;
    sb.from('team_members').delete().eq('session_id',sid).then(()=>{
      sb.from('team_members').insert({team_id:teamId,session_id:sid,display_name:captainName}).then(
        (res)=>{if(res&&res.error&&!/does not exist/i.test(String(res.error.message||''))){console.warn('[team_members] insert failed:',res.error.message);}},
        ()=>{}
      );
    },()=>{});
  },[myTeam]);

  // V10: admin moves Jorik to a specific team (or nowhere)
  // V12: also persist on game_state so late-joining phones know who has Jorik
  // V22 audit fix (concurrency agent): client-side rate-limit — two admin tabs / a
  // double-tap / the auto-rotate effect firing in the same beat would write two
  // UPDATEs and potentially swap jorik_moved_at backwards. Reject if we already
  // moved Jorik within the last 5 s. Mike is sole admin so this is defensive.
  const lastJorikMoveRef=React.useRef(0);
  // V20: moveJorik now accepts an `origin` tag so the human-readable activity_feed
  // line can distinguish bar-break auto-swap vs admin manual swap.
  //   origin='admin' (default) → "👑 Admin: Jorik gaat mee met …"
  //   origin='bar'              → "🍻 Bar break: Jorik gaat mee met …"
  //   origin='start'            → no prefix (startGame writes its own "💍 Jorik begint bij …" line elsewhere)
  // The "[JORIK] team={id}" marker line (history source of truth read by the
  // never-twice filter at v20:2358 via /\[JORIK\] team=(\d+)/) is UNCHANGED.
  // V37 P0: Mike opens this on Jorik's actual phone (the one Jorik will hold all
  // day). Captures the local deviceId and writes it to game_state.jorik_device_id.
  // Every other client picks it up via the realtime subscription and starts
  // filtering wp:1 wedding-pipeline content for the device that matches.
  // `clear=true` unmarks (writes null), useful if Mike taps the wrong phone.
  // V41.13 — admin toggle for runtime test mode. Writes a boolean to
  // game_state.test_mode_active; all clients pick it up via realtime within
  // ~1s and re-derive lobby + GPS gates accordingly. Pass null to revert to
  // the build-time TEST_MODE const (useful for back-to-default).
  const setTestModeFromAdmin=useCallback((newValue)=>{
    if(!isAdmin)return;
    setTestModeRuntime(newValue);
    if(!OFFLINE&&sb){
      sb.from('game_state').update({test_mode_active:newValue}).eq('id',1).then(({error})=>{
        if(error){
          const msg=String(error.message||'').toLowerCase();
          if(msg.includes('test_mode_active')||error.code==='42703'){
            setToast('⚠️ Database mist test_mode_active kolom — voer SUPABASE-V41.13-TESTMODE-RUNTIME.sql uit');
            // Revert local optimistic flip so UI matches DB
            setTestModeRuntime(null);
          }else{
            setToast('⚠️ Test-mode flip mislukt — probeer opnieuw');
          }
          return;
        }
        setToast(newValue===true?'🧪 Test mode AAN — drempels uit':newValue===false?'🚦 Test mode UIT — productie-drempels actief':'↩️ Test mode standaard hersteld');
      });
    }else{
      setToast('🧪 Test mode lokaal aangepast (offline)');
    }
  },[isAdmin]);

  const markJorikDevice=useCallback((clear=false)=>{
    if(!isAdmin)return;
    const id=clear?null:myDeviceIdRef.current;
    setJorikDeviceId(id);
    if(!OFFLINE&&sb){
      sb.from('game_state').update({jorik_device_id:id}).eq('id',1).then(()=>{
        setToast(clear?'🧹 Jorik-telefoon gewist':'📱 Jorik-telefoon gemarkeerd · wp:1 inhoud wordt nu voor dit toestel verborgen');
      },(err)=>{
        // Pre-V37 DB without the column → friendly fallback.
        const msg=String(err?.message||'').toLowerCase();
        if(msg.includes('jorik_device_id')||err?.code==='42703'){
          setToast('⚠️ Database mist jorik_device_id kolom — voer SUPABASE-V37-JORIK-DEVICE.sql uit');
        }else{
          setToast('⚠️ Markeren mislukt — probeer opnieuw');
        }
      });
    }else{
      setToast(clear?'🧹 Jorik-telefoon gewist (lokaal)':'📱 Jorik-telefoon gemarkeerd (lokaal)');
    }
  },[isAdmin]);

  const moveJorik=useCallback((targetTeamId,origin)=>{
    if(!isAdmin)return;
    const movedAtTs=Date.now();
    if(movedAtTs-lastJorikMoveRef.current<5000)return; // guard against double-fire
    lastJorikMoveRef.current=movedAtTs;
    setJorikTeamId(targetTeamId);
    setJorikMovedAt(movedAtTs); // V20: reset auto-rotate clock (local optimistic)
    if(!OFFLINE&&sb){
      const team=teams.find(t=>t.id===targetTeamId);
      // V12: canonical source of truth
      // V21 P0: also persist jorik_moved_at so the 30-min rotate clock is
      // authoritative on the server — admin refresh + cross-device reads stay in sync.
      // Graceful fallback if the column doesn't exist yet (pre-v21 migration).
      sb.from('game_state').update({jorik_team_id:targetTeamId,jorik_moved_at:new Date(movedAtTs).toISOString()}).eq('id',1).then(
        ()=>{},
        (err)=>{
          const msg=String(err?.message||'').toLowerCase();
          if(msg.includes('jorik_moved_at')||err?.code==='42703'){
            sb.from('game_state').update({jorik_team_id:targetTeamId}).eq('id',1).then(()=>{},()=>{});
          }
        }
      );
      // Activity feed as fallback + announcement
      sb.from('activity_feed').insert({
        team_id:null, team_name:'Game Master', team_emoji:'👑', team_color:'#d4a054',
        message:`[JORIK] team=${targetTeamId==null?'null':targetTeamId}`,
        points:0, created_at:new Date().toISOString(),
      });
      // V20: human-readable announcement with origin prefix
      // V27: 'fallback' origin = the resilience auto-rotate fired (admin lifecycle stalled)
      const prefix=origin==='bar'?'🍻 Bar break: ':origin==='start'?'':origin==='fallback'?'⏰ Auto-rotate: ':'👑 Admin: ';
      if(team){
        sb.from('activity_feed').insert({
          team_id:null, team_name:'Game Master', team_emoji:'👑', team_color:'#d4a054',
          message:`${prefix}Jorik gaat mee met ${team.emoji} ${team.name}!`,
          points:0, created_at:new Date().toISOString(),
        });
      }else{
        sb.from('activity_feed').insert({
          team_id:null, team_name:'Game Master', team_emoji:'👑', team_color:'#d4a054',
          message:`${prefix}Jorik loopt nu alleen tussen de teams door...`,
          points:0, created_at:new Date().toISOString(),
        });
      }
    }
  },[isAdmin,teams]);

  // V19: 30-min auto-rotate watcher REMOVED. Jorik now only swaps at bar breaks
  // (see triggerBarBreak) or via admin manual move (moveJorik).

  // V19: stable ref to moveJorik so triggerBarBreak can call it without listing
  // moveJorik in its useCallback deps (which would re-create triggerBarBreak
  // every time teams/isAdmin change — we want it stable for the AdminReviewView
  // onClick handler).
  const moveJorikRef=React.useRef(moveJorik);
  useEffect(()=>{moveJorikRef.current=moveJorik;},[moveJorik]);

  // V27: Jorik resilience fallback. Admin-only watcher. Polls every 60 sec.
  // Fires moveJorikRef('fallback') when ALL of these are true:
  //   - phase >= 1 (game started) and game_ended === false
  //   - barBreakActive is null (no bar break currently — V19 handles those)
  //   - jorikMovedAt is older than JORIK_FALLBACK_ROTATE_MS (25 min)
  // Picks a random non-current-holder, non-spectator team. The V19 never-twice
  // history filter is NOT applied here — fallback prefers re-visit over freeze.
  // Multi-tab safety: lastJorikMoveRef inside moveJorik enforces a 5-sec
  // double-fire guard, so multiple admin tabs collapse to one effective move.
  // Snapshot-ref pattern: a single object captures all live state so the timer
  // doesn't have to be re-created on every state change (which would reset the
  // 60-sec interval and the threshold could never elapse).
  const jorikFallbackSnapRef=React.useRef({phase:0,gameEnded:false,barBreakActive:null,jorikMovedAt:null,jorikTeamId:null,teams:[]});
  useEffect(()=>{
    jorikFallbackSnapRef.current={phase,gameEnded:false,barBreakActive,jorikMovedAt,jorikTeamId,teams};
  },[phase,barBreakActive,jorikMovedAt,jorikTeamId,teams]);
  useEffect(()=>{
    if(!isAdmin)return;
    if(OFFLINE||!sb)return;
    const tick=()=>{
      const snap=jorikFallbackSnapRef.current;
      if(!snap.phase||snap.phase<1)return;
      if(snap.gameEnded)return;
      if(snap.barBreakActive)return;
      if(!snap.jorikMovedAt)return;
      if(Date.now()-snap.jorikMovedAt<JORIK_FALLBACK_ROTATE_MS)return;
      const eligible=(snap.teams||[]).filter(t=>!t.spectator&&t.id>0&&t.id!==snap.jorikTeamId);
      if(eligible.length===0)return;
      const next=eligible[Math.floor(Math.random()*eligible.length)];
      const fn=moveJorikRef.current;
      if(fn)fn(next.id,'fallback');
    };
    const i=setInterval(tick,60000);
    return()=>clearInterval(i);
  },[isAdmin]);

  // V10/V12: bar-break trigger — admin signals a break at specific bar name
  // V12: persisted on game_state so all phones open the overlay at the same moment
  const[barBreakActive,setBarBreakActive]=useState(null); // {name, mini, started}
  const[barBreakHidden,setBarBreakHidden]=useState(false); // V18: minimize overlay, show chip
  useEffect(()=>{setBarBreakHidden(false);},[barBreakActive?.name,barBreakActive?.started]);

  // V21 P0-fix #8: client-side watchdog — if an admin's "end bar break" RPC fails to replicate,
  // phones would be stuck on the bar-break overlay forever. Auto-clear locally after
  // BAR_BREAK_DURATION_MS + 120 s grace (admin network/DB hiccup buffer). Server state still wins
  // when realtime catches up. Non-admins also write back to game_state as a best-effort recovery
  // so the next device to load doesn't reopen the overlay.
  useEffect(()=>{
    if(!barBreakActive?.started)return;
    const hardDeadline=barBreakActive.started+BAR_BREAK_DURATION_MS+120000;
    const now=Date.now();
    if(now>=hardDeadline){
      setBarBreakActive(null);
      if(isAdmin&&!OFFLINE&&sb){
        sb.from('game_state').update({bar_break_active:null,bar_break_started_at:null}).eq('id',1).then(()=>{},()=>{});
      }
      return;
    }
    const t=setTimeout(()=>{
      setBarBreakActive(prev=>{
        // only clear if still this same break
        if(!prev||prev.started!==barBreakActive.started)return prev;
        return null;
      });
      if(isAdmin&&!OFFLINE&&sb){
        sb.from('game_state').update({bar_break_active:null,bar_break_started_at:null}).eq('id',1).then(()=>{},()=>{});
      }
    },hardDeadline-now);
    return()=>clearTimeout(t);
  },[barBreakActive?.started,isAdmin]);
  const triggerBarBreak=useCallback(async(barName)=>{
    if(!isAdmin||!barName)return;
    // V21 audit P0 Race-6: two admin tabs could both press "triggerBarBreak"
    // simultaneously — both would insert activity feed entries AND both would
    // award an underdog bonus (breakKey differs per tab because startedAt
    // is per-tab). Guard with a compare-and-set pre-read: if the DB already
    // has a recent bar_break_started_at (within 45 s) we abort quietly.
    if(!OFFLINE&&sb){
      try{
        const{data:gs}=await sb.from('game_state').select('bar_break_active,bar_break_started_at').eq('id',1).maybeSingle();
        if(gs?.bar_break_started_at){
          const existingMs=new Date(gs.bar_break_started_at).getTime();
          if(!isNaN(existingMs)&&Date.now()-existingMs<45000){
            // Another admin tab already fired this break — reflect their state locally and bail.
            const minisExisting=defaultBarMinis(gs.bar_break_active||barName,existingMs);
            setBarBreakActive({name:gs.bar_break_active||barName,mini:minisExisting,started:existingMs});
            setBarBreak({name:gs.bar_break_active||barName,time:existingMs});
            return;
          }
        }
      }catch(e){/* fall through — worst case we do the original behaviour */}
    }
    const startedAt=Date.now();
    // V20: seeded 3-of-6 mini pick
    const minis=defaultBarMinis(barName,startedAt);
    setBarBreakActive({name:barName,mini:minis,started:startedAt});
    setBarBreak({name:barName,time:startedAt});
    if(!OFFLINE&&sb){
      sb.from('game_state').update({bar_break_active:barName,bar_break_started_at:new Date(startedAt).toISOString()}).eq('id',1).then(()=>{},()=>{});
      // V41.12 — append address to the broadcast so teams know WHERE to walk.
      // Lookup is name-based (the dropdown sends the bar's name string). Falls
      // back gracefully for the "✏️ Eigen naam typen…" custom path (no match
      // in BAR_BREAKS → empty addr suffix, original message preserved).
      const barMeta=BAR_BREAKS.find(b=>b.n===barName);
      const addr=barMeta&&barMeta.address?` (${barMeta.address})`:'';
      sb.from('activity_feed').insert({
        team_id:null, team_name:'Game Master', team_emoji:'🍻', team_color:'#d4a054',
        message:`🍺 BAR BREAK → ${barName}${addr}! Alle teams naar deze locatie.`,
        points:0, created_at:new Date().toISOString(),
      });

      // V19: BAR-BREAK JORIK ROTATION + NEVER-TWICE GUARANTEE.
      // Every bar break, Jorik hops to a random non-current, non-spectator team
      // that hasn't held him yet this game. Admin-only (already behind the isAdmin
      // guard at the top of triggerBarBreak).
      //
      // Visited-history source of truth: `activity_feed` rows whose message starts
      // with "[JORIK] team=". These markers are written by `moveJorik` (v19:2202)
      // AND by `startGame`'s seeding block (v19:2669). So the feed already holds
      // a chronological record of every team Jorik has been assigned to this game —
      // no new DB column needed. Manual admin moveJorik calls also append, which
      // means admin-forced re-visits are logged and the auto-rotate will avoid
      // them going forward.
      //
      // Overtime safety: Mike's plan is 4 teams × 3 bar breaks + 1 start = every
      // team gets Jorik exactly once. If somehow a 4th bar break fires (overtime,
      // admin re-trigger, extra break), the filtered pool would be empty; we fall
      // back to the weaker "exclude only current holder" rule so the game doesn't
      // get stuck with Jorik glued to one team.
      //
      // Concurrency: moveJorik has its own 5-sec rate-limit, the bar-break CAS
      // guards against double-fire at 45 sec, and Mike is the sole admin — so
      // a double swap within the same bar break is not plausible in practice.
      try{
        // Use allSettled so one failing query (most commonly activity_feed, if an
        // admin is on a flaky network) doesn't kill the whole rotation — we just
        // lose the never-twice guarantee for this single break and fall back to
        // "any non-current-holder" semantics.
        const[gsRes,teamsRes,feedRes]=await Promise.allSettled([
          sb.from('game_state').select('jorik_team_id').eq('id',1).maybeSingle(),
          sb.from('teams').select('id,name,spectator'),
          sb.from('activity_feed').select('message').like('message','[JORIK] team=%').order('created_at',{ascending:true}).limit(200),
        ]);
        const currentHolder=(gsRes.status==='fulfilled'?gsRes.value.data?.jorik_team_id:null)??null;
        const teamRows=(teamsRes.status==='fulfilled'?teamsRes.value.data:null)||[];
        const feedRows=(feedRes.status==='fulfilled'?feedRes.value.data:null)||[];
        // Build visited-set from [JORIK] markers. Admin "clear" logs team=null —
        // the /(\d+)/ capture won't match, so null clears don't pollute history.
        const history=new Set();
        for(const row of feedRows){
          const m=/\[JORIK\] team=(\d+)/.exec(row?.message||'');
          if(m)history.add(parseInt(m[1],10));
        }
        let pool=teamRows.filter(t=>!t.spectator&&t.id!==currentHolder&&!history.has(t.id));
        // Overtime fallback: every non-spectator team has already held Jorik.
        // With Mike's plan (4 teams × 3 breaks + start) this branch is unreachable;
        // it's here so a surprise 4th+ bar break doesn't freeze Jorik on one team.
        // Relaxes to the V19 base rule (any non-current-holder).
        if(!pool.length){
          pool=teamRows.filter(t=>!t.spectator&&t.id!==currentHolder);
        }
        if(pool.length){
          const pick=pool[Math.floor(Math.random()*pool.length)];
          // moveJorik writes game_state.jorik_team_id + jorik_moved_at AND inserts
          // a fresh "[JORIK] team={id}" marker → visited-history auto-updates for
          // the next bar break.
          // V20: pass origin='bar' so the feed line reads "🍻 Bar break: …" instead
          // of the default "👑 Admin: …".
          const mj=moveJorikRef.current;
          if(typeof mj==='function')mj(pick.id,'bar');
        }
      }catch(e){/* if the Jorik rotate fails we still want the bar break to proceed */}

      // V20 balance: UNDERDOG BONUS — the current last-place team gets a silent
      // +UNDERDOG_BONUS so they stay psychologically in the race. Guarded against
      // double-awarding via teams.underdog_bonus_last_break (set to startedAt's
      // unix seconds, a unique-per-break integer).
      const breakKey=Math.floor(startedAt/1000);
      sb.from('teams').select('id,name,score,underdog_bonus_last_break,spectator').then(({data:allTeams,error})=>{
        if(error||!allTeams?.length)return;
        const eligible=allTeams.filter(t=>!t.spectator);
        if(eligible.length<2)return; // need at least 2 teams to have a "last place"
        eligible.sort((a,b)=>(a.score||0)-(b.score||0));
        const last=eligible[0];
        // Column might not exist yet (migration pending) — in that case underdog_bonus_last_break is undefined; proceed.
        if(last.underdog_bonus_last_break===breakKey)return;
        sb.rpc('increment_team_score',{p_team_id:last.id,p_delta:UNDERDOG_BONUS})
          .then(({error:rpcErr})=>{
            if(rpcErr){console.warn('underdog bonus RPC failed',rpcErr.message||rpcErr);return;}
            // Mark this break as claimed so a re-trigger doesn't double-pay.
            sb.from('teams').update({underdog_bonus_last_break:breakKey}).eq('id',last.id).then(()=>{},()=>{});
            sb.from('activity_feed').insert({
              team_id:last.id,team_name:last.name,team_emoji:'💪',team_color:'#d4a054',
              message:`💪 UNDERDOG BONUS voor ${last.name}! +${UNDERDOG_BONUS} pts (still in it!)`,
              points:UNDERDOG_BONUS,created_at:new Date().toISOString(),
            });
          })
          .catch(e=>console.warn('underdog bonus threw',e));
      });
    }
  },[isAdmin]);

  // V12: admin can end a bar break early
  const endBarBreak=useCallback(()=>{
    if(!isAdmin)return;
    setBarBreakActive(null);
    if(!OFFLINE&&sb){
      sb.from('game_state').update({bar_break_active:null,bar_break_started_at:null}).eq('id',1).then(()=>{},()=>{});
    }
  },[isAdmin]);

  // V21 P0: phase-4 admin trigger. Previously setPhase jumped from 1 straight
  // to 5 (ceremony), meaning the advertised "laatste 20 min ×1.5" finale phase
  // was unreachable — phaseMult=phase===4?1.5:1 always evaluated to 1.
  // Admin taps this to enter the dramatic final-push sub-phase; the FINALE
  // multiplier now fires and the phase-4 pulse banner becomes visible.
  const startFinalePhase=useCallback(()=>{
    if(!isAdmin)return;
    setPhase(4);
    if(!OFFLINE&&sb){
      sb.from('game_state').update({phase:4,bar_break_active:null,bar_break_started_at:null}).eq('id',1).then(()=>{},()=>{});
      sb.from('activity_feed').insert({
        team_id:null, team_name:'Game Master', team_emoji:'🏁', team_color:'#d4a054',
        message:'🏁 FINALE! Laatste 20 minuten · alle scoring ×1.5',
        points:0, created_at:new Date().toISOString(),
      });
    }
    setToast('🏁 Finale-fase gestart · ×1.5 multiplier');
  },[isAdmin]);

  // V10/V12: finale — admin advances phase to 5 = ceremony, synced to every phone
  const startFinale=useCallback(()=>{
    if(!isAdmin)return;
    setPhase(5);
    if(!OFFLINE&&sb){
      // Award most-missions bonus: team with most completed challenges in activity feed
      const feed=activityFeedLatestRef.current||[];
      const allTeams=teamsLatestRef.current||[];
      const byTeam={};
      feed.forEach(a=>{if(a&&a.team_id>0&&a.points>0)byTeam[a.team_id]=(byTeam[a.team_id]||0)+1;});
      const teamIds=Object.keys(byTeam).map(Number).filter(id=>id>0);
      if(teamIds.length>0){
        const winnerId=teamIds.reduce((a,b)=>byTeam[a]>=byTeam[b]?a:b);
        const winnerTeam=allTeams.find(t=>t.id===winnerId);
        if(winnerTeam){
          sb.rpc('increment_team_score',{p_team_id:winnerId,p_delta:MOST_MISSIONS_BONUS}).then(()=>{},()=>{});
          sb.from('activity_feed').insert({team_id:winnerId,team_name:winnerTeam.name,team_emoji:winnerTeam.emoji||'🏆',team_color:winnerTeam.color||'#d4a054',message:`🏆 MEESTE OPDRACHTEN: ${byTeam[winnerId]} missies voltooid! +${MOST_MISSIONS_BONUS} bonuspunten!`,points:MOST_MISSIONS_BONUS,created_at:new Date().toISOString()}).then(()=>{},()=>{});
        }
      }
      sb.from('game_state').update({phase:5,game_ended:true,bar_break_active:null,bar_break_started_at:null}).eq('id',1).then(()=>{},()=>{});
      sb.from('activity_feed').insert({
        team_id:null, team_name:'Game Master', team_emoji:'🏆', team_color:'#d4a054',
        message:'🏆 EINDE VAN HET SPEL — naar Markthal/Bokaal voor de uitslag!',
        points:0, created_at:new Date().toISOString(),
      });
    }
  },[isAdmin]);

  // Side quest auto-award: fires when completed state changes
  useEffect(()=>{
    if(!myTeam?.id||!sb||OFFLINE||phase<1||phase>=5)return;
    SIDE_QUESTS.forEach(q=>{
      if(questsAwardedRef.current.has(q.id))return;
      // Already awarded in a previous session (marker row persists in completed_challenges)
      if(completed[q.locKey]&&Object.keys(completed[q.locKey]).length>0){
        questsAwardedRef.current.add(q.id);
        return;
      }
      const allDone=q.required.every(locId=>completed[locId]&&Object.keys(completed[locId]).length>0);
      if(!allDone)return;
      questsAwardedRef.current.add(q.id);
      applyScoreDelta(myTeam.id,q.bonus);
      sb.from('completed_challenges').insert({team_id:myTeam.id,challenge_id:`${q.locKey}_0`,location_id:q.locKey,challenge_type:'side_quest',points_earned:q.bonus}).then(()=>{},()=>{});
      sb.from('activity_feed').insert({team_id:myTeam.id,team_name:myTeam.name,team_emoji:myTeam.emoji||'🏅',team_color:myTeam.color||'#d4a054',message:`🏅 SIDE QUEST: ${q.label} voltooid! +${q.bonus} bonuspunten!`,points:q.bonus,created_at:new Date().toISOString()}).then(()=>{},()=>{});
    });
  },[completed,myTeam,phase]);

  // V28: admin override — reset the running game back to the lobby without
  // needing to run SQL. Flips phase→0, clears started_at / Jorik / bar-break,
  // and every connected phone snaps back to the lobby via the realtime
  // subscription on game_state. Teams, scores, and completed_challenges are
  // PRESERVED in the DB — this is "cancel current run", not "wipe". For a
  // full wipe use SUPABASE-GAMEDAY-RESET.sql Block A (soft) or Block B (full).
  const resetGame=useCallback(()=>{
    if(!isAdmin)return;
    setPhase(0);
    setGameStart(null);
    setJorikTeamId(null);
    setJorikMovedAt(null);
    setBarBreak(null);
    setScreen('lobby');
    if(!OFFLINE&&sb){
      sb.from('game_state').update({
        phase:0,
        started_at:null,
        game_ended:false,
        bar_break_active:null,
        bar_break_started_at:null,
        jorik_team_id:null,
        jorik_moved_at:null,
      }).eq('id',1).then(()=>{},(err)=>{
        // Pre-V21 DBs may lack jorik_moved_at — retry without it so the
        // reset still lands phase=0 on every phone.
        const msg=String(err?.message||'').toLowerCase();
        if(msg.includes('jorik_moved_at')||err?.code==='42703'){
          sb.from('game_state').update({
            phase:0,
            started_at:null,
            game_ended:false,
            bar_break_active:null,
            bar_break_started_at:null,
            jorik_team_id:null,
          }).eq('id',1).then(()=>{},()=>{});
        }
      });
      sb.from('activity_feed').insert({
        team_id:null, team_name:'Game Master', team_emoji:'↺', team_color:'#d4a054',
        message:'↺ Spel teruggezet naar de lobby door de Game Master',
        points:0, created_at:new Date().toISOString(),
      });
    }
    setToast('↺ Spel teruggezet naar de lobby');
  },[isAdmin]);

  // V33: full wipe + restart. Deletes every team, score, completion and feed entry,
  // then resets game_state to phase 0. The V32 WIPED-GAME guard on every connected
  // client picks up the empty teams + phase=0 and snaps each phone back to the
  // splash screen. Local admin device is also pushed back to splash and the local
  // session cache is cleared so the admin can run a fresh test from scratch.
  const wipeAndRestart=useCallback(async()=>{
    if(!isAdmin)return;
    if(!OFFLINE&&sb){
      // Order matters: child rows first to keep FK constraints happy on schemas
      // that don't cascade. Each delete is independent — a failure of one
      // (e.g. a missing optional table on an older DB) doesn't block the others.
      const tables=['photo_reviews','completed_challenges','feed_reactions','activity_feed','team_members','teams'];
      for(const t of tables){
        try{await sb.from(t).delete().not('id','is',null);}catch(e){/* tolerate missing tables */}
      }
      try{
        await sb.from('game_state').update({
          phase:0,started_at:null,game_ended:false,
          bar_break_active:null,bar_break_started_at:null,
          jorik_team_id:null,jorik_moved_at:null,
        }).eq('id',1);
      }catch(e){/* swallow — local reset still happens */}
    }
    // Local reset: drop everything cached so the splash render is identical to
    // a never-cached visit (matches the V32 wiped-game guard's clean state).
    clearSession();
    setMyTeam(null);
    setTeams([]);
    setScores({});
    setCompleted({});
    setCompletedPts({});
    setActivityFeed([]);
    setReviewQueue([]);
    setPhase(0);
    setGameStart(null);
    setJorikTeamId(null);
    setJorikMovedAt(null);
    setBarBreak(null);
    setBarBreakActive(null);
    setBarBreakHidden(false);
    setScreen('splash');
    setAdminMenuOpen(false);
    setToast('🏠 Spel volledig gewist — terug naar startscherm');
  },[isAdmin]);

  // V12: admin score override
  // V20 NOTE: this is kept as an absolute-set (not atomic delta) because it's
  // admin-only, low-frequency, and used for judgment calls where "I want team X
  // to have exactly N" is the mental model. If concurrency becomes an issue
  // (unlikely — single GM device), rewrite to use applyScoreDelta(teamId,delta).
  const adjustScore=useCallback((teamId,delta)=>{
    if(!isAdmin||!teamId)return;
    const cur=scores[teamId]||0;
    const next=Math.max(0,cur+delta);
    setScores(prev=>({...prev,[teamId]:next}));
    if(!OFFLINE&&sb){
      sb.from('teams').update({score:next}).eq('id',teamId).then(()=>{},()=>{});
      const team=teams.find(t=>t.id===teamId);
      sb.from('activity_feed').insert({
        team_id:teamId, team_name:team?.name||'Team', team_emoji:team?.emoji||'🎮', team_color:team?.color||'#d4a054',
        message:`Game Master ${delta>0?'toegekend':'afgetrokken'} ${Math.abs(delta)} pts · nu ${next}`,
        points:delta, created_at:new Date().toISOString(),
      });
    }
  },[isAdmin,scores,teams]);

  // V16: admin broadcasts a free-text message to all teams via activity_feed
  // V22 audit fix (security agent): strip RTL override + zero-width chars that could
  // spoof a system message; cap at 300 chars to match the feed's intended density.
  // V22 P0 fix: add optimistic local append (admin sees it immediately) + surface
  // insert errors to the console (were being swallowed, masking schema mismatches).
  const broadcastMessage=useCallback((msg)=>{
    if(!isAdmin||!msg)return;
    // U+202A..U+202E (RTL/LTR overrides), U+2066..U+2069 (isolates), U+200B..U+200D (zero-width)
    const clean=String(msg).replace(/[\u202A-\u202E\u2066-\u2069\u200B-\u200D\uFEFF]/g,'').trim().slice(0,300);
    if(!clean)return;
    const entry={
      team_id:null, team_name:'Game Master', team_emoji:'📢', team_color:'#d4a054',
      message:clean, points:0, created_at:new Date().toISOString(),
    };
    // Optimistic local append — the admin sees their own broadcast even if
    // Realtime roundtrip is slow or the insert quietly fails.
    setActivityFeed(prev=>[entry,...prev].slice(0,500));
    if(!OFFLINE&&sb){
      sb.from('activity_feed').insert(entry).then(
        (res)=>{if(res&&res.error){console.error('[broadcast] insert failed:',res.error)}},
        (err)=>{console.error('[broadcast] insert threw:',err)}
      );
    }
    setToast(`📢 Bericht verzonden`);
  },[isAdmin]);

  // V12: admin removes a duplicate / rogue team
  const removeTeam=useCallback(async(teamId)=>{
    if(!isAdmin||!teamId)return;
    const ok=await confirmAsync('Team verwijderen? Dit kan niet ongedaan worden gemaakt.',{confirmLabel:'Verwijder',danger:true});
    if(!ok)return;
    setTeams(prev=>prev.filter(t=>t.id!==teamId));
    setScores(prev=>{const n={...prev};delete n[teamId];return n;});
    if(!OFFLINE&&sb){
      sb.from('teams').delete().eq('id',teamId).then(()=>{},()=>{});
    }
  },[isAdmin,confirmAsync]);

  // V20 (Audit item #4): admin renames a team. Uniqueness is enforced locally
  // (case-insensitive) + server-side via the UNIQUE index that ships with
  // SUPABASE-CATCHUP-PATCH-V32.sql. If the server ever returns 23505 (unique
  // violation) we surface the same "al in gebruik" toast instead of leaving a
  // silent "nothing happened" state. The teams UPDATE realtime sub (~line 1543)
  // propagates the new name to every phone — no manual setTeams merge needed.
  const renameTeam=useCallback(async(teamId)=>{
    if(!isAdmin||!teamId)return;
    const current=teams.find(t=>t.id===teamId);
    if(!current)return;
    const input=await promptAsync(`Nieuwe naam voor ${current.emoji} ${current.name}:`,current.name);
    if(input===null||input===undefined)return;
    const trimmed=String(input).trim();
    if(!trimmed){setToast('Naam mag niet leeg zijn');return;}
    if(trimmed===current.name)return; // no-op
    // Local case-insensitive conflict check — instant feedback without a roundtrip.
    const conflict=teams.some(t=>t.id!==teamId && (t.name||'').toLowerCase()===trimmed.toLowerCase());
    if(conflict){setToast(`"${trimmed}" is al in gebruik — kies andere naam`);return;}
    if(OFFLINE||!sb){
      // Offline demo fallback — apply locally.
      setTeams(prev=>prev.map(t=>t.id===teamId?{...t,name:trimmed}:t));
      setToast(`✏️ Team hernoemd naar ${trimmed}`);
      return;
    }
    // V20: belt-and-braces server-side check (case-insensitive) before the UPDATE.
    try{
      const probe=await sb.from('teams').select('id').ilike('name',trimmed).neq('id',teamId).limit(1);
      if(probe&&probe.data&&probe.data.length){setToast(`"${trimmed}" is al in gebruik — kies andere naam`);return;}
    }catch(e){/* soft-fail to UPDATE; the server unique index is the real guard */}
    const res=await sb.from('teams').update({name:trimmed}).eq('id',teamId);
    if(res&&res.error){
      // PostgREST maps Postgres unique_violation (SQLSTATE 23505) onto res.error.code.
      if(res.error.code==='23505'||String(res.error.message||'').toLowerCase().includes('unique')){
        setToast(`"${trimmed}" is al in gebruik — kies andere naam`);
      }else{
        setToast('Hernoemen mislukt — probeer opnieuw');
        console.error('[renameTeam] update failed:',res.error);
      }
      return;
    }
    setToast(`✏️ Team hernoemd naar ${trimmed}`);
  },[isAdmin,teams,promptAsync]);

  // V30: Extra-Tijd milestone unlocks removed with the timed-target system.

  // V9: Tier badges based on completed challenges (5/10/15/20)
  useEffect(()=>{
    if(!myTeam)return;
    const totalChallenges=Object.values(completed).reduce((s,o)=>s+Object.keys(o).length,0);
    const tier=tierFor(totalChallenges);
    if(tier && (!lastTier || lastTier.min!==tier.min)){
      setLastTier(tier);
      // Only popup if this is a NEW tier (not the initial render)
      if(lastTier!==null){
        setUnlockPopup({
          emoji:tier.badge,
          label:'NIEUWE TIER',
          name:tier.name+' · '+tier.min+' challenges',
        });
        addActivity(`is gepromoveerd naar ${tier.badge} ${tier.name}!`,0);
      }
    }
  },[completed,myTeam]);

  // V9: auto-dismiss unlock popup after 3.5s
  useEffect(()=>{
    if(unlockPopup){
      const t=setTimeout(()=>setUnlockPopup(null),3500);
      return()=>clearTimeout(t);
    }
  },[unlockPopup]);

  // V19: if a Supabase teams refresh no longer contains myTeam.id (e.g. the row
  // was recreated after an accidental delete), try to re-attach by name+emoji.
  // Without this, a stale cached myTeam.id makes `isMine` false everywhere:
  // no ★ Jij, no score updates, no scoring writes.
  useEffect(()=>{
    if(!myTeam)return;
    if(myTeam.spectator)return;
    if(!teams||teams.length===0)return;
    if(teams.some(t=>t.id===myTeam.id))return; // still valid
    const relink=teams.find(t=>t.name===myTeam.name && t.emoji===myTeam.emoji);
    if(relink){

    }
  },[teams,myTeam]);

  // V12: persist key session fields so a refresh doesn't kick players out.
  // V35: also persist `tab` so Mike's Beoordelen tab + Sandra's Map default both
  // survive a reload — no more "I lost my place".
  useEffect(()=>{
    if(myTeam)saveSession({screen,myTeam,phase,gameStart,tab});
  },[screen,myTeam,phase,gameStart,tab]);

  // V36 hot-fix (Erik persona P0 SHIP-BLOCKER): the V36 spectator initial-mount
  // auto-flip at v36.html:1845 only fires inside the game_state initial-fetch
  // effect. A first-time mid-game joiner flow is:
  //   1. Page loads → realtime fetches phase=2 → initial-fetch flip is no-op
  //      because screen is still 'splash' at that moment.
  //   2. User taps "Speel mee" → setScreen('setup').
  //   3. User picks team or "👁 Bekijk als toeschouwer" → onJoin sets myTeam +
  //      setScreen('lobby').
  //   4. User stuck on lobby — no further game_state event arrives, so the
  //      realtime UPDATE flip at v36.html:1917 never fires. The "Start spel
  //      (testmodus)" button is also a silent no-op (startGame() early-returns
  //      when phase>0). Only escape: page reload.
  // This effect closes the gap: any time we have a team/spectator AND phase>=1
  // AND we're parked on lobby, flip to game. Also covers the post-reload case
  // where realtime arrives before the user has navigated past splash.
  useEffect(()=>{
    if(myTeam&&phase>=1&&phase<6&&screen==='lobby'){
      setScreen('game');
    }
  },[myTeam,phase,screen]);

  // V35 P1 fix (Erik/Sandra personas): silent phase transitions confused everyone
  // who was tabbed away or new to the day. Now fire a toast on every advance so
  // late-joiners + players in the middle of an upload see the world change. Skip
  // the very first render (ref starts undefined) so a mid-game cold-mount doesn't
  // toast a fake "transition just happened" on the value the page hydrated with.
  const prevPhaseRef=React.useRef(undefined);
  useEffect(()=>{
    const prev=prevPhaseRef.current;
    prevPhaseRef.current=phase;
    if(prev===undefined||phase===prev)return;
    const labels={1:'Fase 1 — Zoektocht',2:'Fase 2 — Geruchten',3:'Fase 3 — Cirkel',4:'🏁 Finale-fase · ×1.5 punten',5:'🏆 Eindceremonie',6:'🥂 Spel afgelopen'};
    const lbl=labels[phase];
    if(lbl){
      setToast(lbl);
      try{if(navigator.vibrate)navigator.vibrate([60,40,60]);}catch(e){}
    }
  },[phase]);

  // V30: storySeen persistence removed with the chapter-modal system.
  // V19+: persist Jorik-mission completion state
  useEffect(()=>{
    if(myTeam)saveSession({jorikMissionsDone:[...jorikMissionsDone],jorikRunningCounts});
  },[jorikMissionsDone,jorikRunningCounts,myTeam]);

  // V12: leaving a team (tap the HUD avatar)
  const leaveTeam=useCallback(async()=>{
    const ok=await confirmAsync('Team verlaten? Je komt terug op het splash scherm.',{confirmLabel:'Verlaat team',danger:true});
    if(!ok)return;
    clearSession();
    setMyTeam(null);setScreen('splash');setPhase(0);setGameStart(null);
    setCompleted({});setCompletedPts({});setVisitedLocs(new Set());
  },[confirmAsync]);

  // V20 UX P1: long-press (500ms) to leave team — prevents accidental taps on HUD avatar
  const avatarLPTimer=React.useRef(null);
  const avatarLP=React.useMemo(()=>({
    start:()=>{if(avatarLPTimer.current)clearTimeout(avatarLPTimer.current);avatarLPTimer.current=setTimeout(()=>{leaveTeam();avatarLPTimer.current=null;},500);},
    cancel:()=>{if(avatarLPTimer.current){clearTimeout(avatarLPTimer.current);avatarLPTimer.current=null;}},
  }),[leaveTeam]);

  // V20 UX P1: beforeunload warning while in active game — prevents accidental tab close
  // V21 P1-fix #20: also attach during phase 5 (finale ceremony) — closing the tab there
  // causes a freshly-opened tab to re-prompt the wedding video and risk replay of the
  // teammate's celebratory flow. Stop only once game_ended AND phase beyond ceremony (phase>=6).
  useEffect(()=>{
    if(!myTeam||phase<1||phase>=6)return;
    const handler=(e)=>{e.preventDefault();e.returnValue='';return '';};
    window.addEventListener('beforeunload',handler);
    return()=>window.removeEventListener('beforeunload',handler);
  },[myTeam,phase]);

  // V21 P1-fix #35: GM heartbeat.
  // Admin writes game_state.gm_heartbeat every 30 s so clients can detect if the
  // Game Master has disconnected. Non-admin clients read gm_heartbeat (via gmLastSeen
  // below) and surface a small warning chip when it goes stale (>2 min).
  const[gmLastSeen,setGmLastSeen]=useState(null); // epoch ms of last admin heartbeat we've seen
  useEffect(()=>{
    if(!isAdmin||OFFLINE||!sb||phase<1||phase>=6)return;
    let cancelled=false;
    const write=()=>{
      if(cancelled)return;
      const ts=new Date().toISOString();
      sb.from('game_state').update({gm_heartbeat:ts}).eq('id',1).then(()=>{},(err)=>{
        // Graceful fallback: column missing on pre-v21 DBs — silently skip
        const msg=String(err?.message||'').toLowerCase();
        if(!(msg.includes('gm_heartbeat')||err?.code==='42703'))console.warn('gm_heartbeat write failed',err);
      });
    };
    write();
    const i=setInterval(write,30000);
    return()=>{cancelled=true;clearInterval(i);};
  },[isAdmin,phase]);


  const startGame=()=>{
    // V29 (§1): guard against double-fire. The old startGame would run again
    // if the admin tapped Start twice, or if a BroadcastChannel tab-echo
    // bounced back to the initiating tab, giving the "Het spel is begonnen! 🎮"
    // ×2 bug in Mike's screenshot. If phase is already >0 we're mid-game;
    // the second call is a no-op.
    if(phase>0)return;
    const now=Date.now();
    setGameStart(now);
    setPhase(1);
    setScreen('game');
    addActivity('Het spel is begonnen! 🎮');
    // V30: intro story trigger removed with the chapter-modal system.
    // V12: broadcast start via game_state — every phone snaps out of lobby
    // V27 P0-A: ALSO seed jorik_team_id + jorik_moved_at. Pre-V27 startGame never
    // wrote these, so game_state.jorik_team_id stayed NULL, the auto-rotate watcher
    // early-returned on `if(!jorikTeamId||!jorikMovedAt)`, and the Jorik mechanic
    // was silently dead for every fresh game. Live forensic audit (18 Apr 2026)
    // confirmed all 4 teams had has_jorik=false after a phase=1 upsert.
    if(!OFFLINE&&sb){

      // rotation rule — fair, no predictability.
      const eligibleSeed=(Array.isArray(teams)?teams:[]).filter(t=>!t.spectator);

      const seedPayload={id:1,phase:1,started_at:new Date(now).toISOString(),game_ended:false,bar_break_active:null,bar_break_started_at:null};
      if(seedTeam){
        seedPayload.jorik_team_id=seedTeam.id;

        if(seedTeam){

          // realtime UPDATE echoes back.

          setJorikMovedAt(now);

            points:0, created_at:new Date().toISOString(),

            message:`[JORIK] team=${seedTeam.id}`,

          }).then(()=>{},()=>{});
        }
      },(err)=>{
        // Pre-V21 DBs don't have jorik_moved_at — retry without it so start
        // doesn't stall. Admin can manually seed Jorik via the chip row.
        const msg=String(err?.message||'').toLowerCase();
        if(msg.includes('jorik_moved_at')||err?.code==='42703'){
          const retryPayload=Object.assign({},seedPayload);
          delete retryPayload.jorik_moved_at;
          sb.from('game_state').upsert(retryPayload).then(()=>{
            if(seedTeam){setJorikTeamId(seedTeam.id);setJorikMovedAt(now);}
          },()=>{});
        }
      });
    }
  };

  // V30: phase-story queue + dispatcher effects removed with the chapter-modal system.

  // Completion counts
  const myScore=scores[myTeam?.id]||0;
  const myChallenges=Object.values(completed).reduce((sum,loc)=>sum+Object.keys(loc).length,0);

  // ═══════════ SPLASH ═══════════
  if(screen==='splash'){
    // V37 P1 fix (Sandra audit): WhatsApp / Instagram / Facebook in-app browsers

    const ua=typeof navigator!=='undefined'?(navigator.userAgent||''):'';
    const isInAppBrowser=/FBAN|FBAV|Instagram|WhatsApp|Line\//i.test(ua);
    // V37 splash chip stacking — TESTMODUS used to be a left-floating chip that
    // collided with the V35-extended mute toggle ("tik om uit te zetten") on
    // narrow viewports. Now it's a full-width thin banner stacked under the
    // optional in-app-browser warning. GM chip stays as a left-floating chip;
    // mute toggle stays in top-right. No more visual overlap.
    const stickyTopOffset=(isInAppBrowser?60:0)+(effectiveTestMode?32:0);
    return(
      <div className="screen-hero">
        {isInAppBrowser&&(
          <div role="alert" style={{position:'absolute',top:0,left:0,right:0,padding:'10px 14px',background:'rgba(228,178,92,0.18)',borderBottom:'1px solid rgba(228,178,92,0.4)',color:'#fff',fontSize:'var(--fs-12)',textAlign:'center',lineHeight:'var(--lh-relaxed)',zIndex:5}}>
            ⚠️ Open deze link in <b>Safari</b> (of Chrome) voor de beste ervaring — in-app browsers verliezen je voortgang. Tik rechtsboven op de drie puntjes (<b>⋮</b>) of het deel-icoon → kies <b>"Open in Safari"</b> (iPhone) of <b>"Open in Chrome"</b> (Android).
          </div>
        )}
        {/* V23: TESTMODUS banner — visible whenever TEST_MODE is on. V37: was a
            chip competing with mute toggle for top-row space; now a full-width
            thin banner that doesn't collide with anything. */}
        {effectiveTestMode&&<div role="status" style={{position:'absolute',top:isInAppBrowser?60:0,left:0,right:0,padding:'6px 14px',background:'rgba(110,163,255,0.16)',borderBottom:'1px solid rgba(110,163,255,0.35)',color:'var(--foto-2)',fontSize:'var(--fs-11)',fontWeight:'var(--fw-bold)',textAlign:'center',letterSpacing:'0.05em',zIndex:4}}>🧪 GENERALE REPETITIE · ALLE DREMPELS UIT</div>}
        {isAdmin&&<div className="chip chip-gold animate-in" style={{position:'absolute',top:`calc(var(--sp-6) + ${stickyTopOffset}px)`,left:'var(--sp-6)'}}>👑 Game Master</div>}
        {/* V29 — mute toggle. Persists in localStorage; defaults to UNMUTED so first-load

            V30: copy was "🔊 sound / 🔇 muted" — verb/state ambiguous. Tap on "sound"

        <button onClick={toggleMuted} aria-label={muted?'Geluid aanzetten':'Geluid uitzetten'}

          style={{position:'absolute',top:`calc(var(--sp-6) + ${stickyTopOffset}px)`,right:'var(--sp-6)',cursor:'pointer',background:muted?'rgba(255,107,107,0.12)':'rgba(95,216,165,0.12)',border:`1px solid ${muted?'rgba(255,107,107,0.4)':'rgba(95,216,165,0.4)'}`,color:muted?'var(--video-2)':'var(--success)'}}>
          {/* V37: shorter splash text (parenthetical was colliding with TESTMODUS

        </button>
        <div style={{fontSize:'var(--icon-hero)',animation:'float 3.2s ease-in-out infinite',filter:'drop-shadow(0 10px 30px rgba(228,178,92,0.4))'}}>💍</div>
        <div style={{height:'var(--sp-6)'}}/>
        <h1 className="t-hero animate-in animate-in-1 text-center" style={{background:'linear-gradient(135deg,#ffffff 0%,var(--accent-2) 50%,var(--foto-2) 100%)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Stadsspel</h1>
        <div className="t-label animate-in animate-in-2" style={{marginTop:'var(--sp-2)',letterSpacing:'0.5em'}}>Rotterdam</div>

        <div style={{height:'var(--sp-8)'}}/>
        <button className="btn btn-gold btn-lg animate-in animate-in-5" onClick={()=>{
          const now=Date.now();if(now-tapGuardRef.current<250)return;tapGuardRef.current=now;

        }} style={{minWidth:240}}>
          {isAdmin?'Start als Game Master':'Speel mee'} <span>→</span>
        </button>
        {/* V37 P1 fix (Hassan audit): GPS pre-prompt rationale. The OS prompt

            (and Sandra) reflex-deny anything they don't trust. Now we surface a

        <div className="t-caption animate-in animate-in-5 text-center" style={{marginTop:'var(--sp-3)',maxWidth:320,lineHeight:'var(--lh-relaxed)',color:'var(--text-secondary)',padding:'var(--sp-2) var(--sp-3)',borderRadius:'var(--r-md)',background:'rgba(110,163,255,0.06)',border:'1px solid rgba(110,163,255,0.18)'}}>
          📍 Straks vragen we om je locatie. <b>Géén tracking, géén opslag</b> — alleen om opdrachten in de buurt vrij te geven en foto's te valideren.
        </div>
        <div style={{height:'var(--sp-7)'}}/>
        {/* V23: dropped "≈4 uur buiten / Neem een power bank mee" tail per Mike's

            activity at a glance. Caption hidden entirely when there are no teams.
            V34 P0 fix (Erik): when phase>=1 the splash lied — said "X teams in

        {teams.length>0&&(
          <div className="t-caption animate-in animate-in-6 text-center" style={{maxWidth:340,lineHeight:'var(--lh-relaxed)'}}>
            {phase>=1&&phase<5?(
              <>
                <span style={{color:'var(--danger)',fontWeight:'var(--fw-bold)'}}>🔴 Spel loopt</span>
                {' — '}
                <span className="t-accent-2" style={{fontWeight:'var(--fw-bold)'}}>{teams.length} team{teams.length===1?'':'s'}</span>

        {!isAdmin&&(

      </div>

  }

  // ═══════════ TEAM SETUP ═══════════
  if(screen==='setup'){
    // V41.1 P0 fix (buddy review finding): without this DialogSheet mount, every
    // confirmAsync() call from TeamSetup (e.g. joinExistingTeam's "Sluit je aan
    // bij ...?" confirmation) sets `dialog` state but no modal renders — the

    return(

        <TeamSetup teams={teams} setTeams={setTeams} onJoin={(team)=>{setMyTeam(team);setScreen('lobby')}} isAdmin={isAdmin} promptAsync={promptAsync} confirmAsync={confirmAsync} teamMemberCounts={teamMemberCounts} phase={phase} scores={scores} jorikTeamId={jorikTeamId} activityFeed={activityFeed} barBreakActive={barBreakActive}/>
        {/* V41.7 — floating 🔐 GM trigger on setup. Lets Mike elevate mid-flow

        {!isAdmin&&(

            style={{position:'fixed',top:'calc(env(safe-area-inset-top, 0px) + var(--sp-3))',right:'var(--sp-3)',zIndex:10500}}>

  // ═══════════ LOBBY ═══════════
  if(screen==='lobby'){
