// ═══════════════════════════════════════════
// CHALLENGE BOTTOM SHEET — V5: dynamic quiz rotation + photo feed
// ═══════════════════════════════════════════
function ChallengeSheet({loc,pos,completed,completedPts={},onComplete,onClose,seenQuizzes,isAdmin,myTeam}){
  if(!loc)return null;
  const dist=pos?haversine(pos.lat,pos.lng,loc.la,loc.lo):null;
  // V7.1 hotfix: only lock quizzes when the location actually HAS a photo challenge to unlock against.
  // Otherwise quiz-only locations (Spido Kade, BlueCity, Willemswerf) would be permanently unreachable.
  const hasAnyPhoto=loc.ch.some(ch=>ch.t==='photo'||ch.t==='video'||ch.t==='creative');
  const hasPhotoCompleted=loc.ch.some((ch,i)=>(ch.t==='photo'||ch.t==='video'||ch.t==='creative')&&completed[i]);

  // V5: compute the quiz to show for this visit (rotate through unseen)
  // We render one rotating-quiz slot that replaces all the location's built-in quizzes.
  // Built-in quiz indexes and a virtual index 'rotatedQuiz' for the dynamic slot.
  const locQuizIndexes=loc.ch.map((c,i)=>c.t==='quiz'?i:-1).filter(i=>i>=0);
  const allLocQuizzesDone=locQuizIndexes.length>0&&locQuizIndexes.every(i=>completed[i]);
  // The rotated quiz is only relevant once all built-in quizzes are done; then we draw from the pool
  const rotatedQuiz=allLocQuizzesDone?pickQuiz(loc,seenQuizzes||new Set()):null;

  return(
    <>
      <div className="sheet-overlay" onClick={onClose}/>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:16}}>
          <div>
            <div style={{fontSize:28,marginBottom:4}}>{loc.e}</div>
            <h2 style={{fontSize:20,fontWeight:800}}>{loc.n}</h2>
            <div style={{display:'flex',gap:8,marginTop:6,alignItems:'center'}}>
              <span style={{fontSize:11,padding:'2px 8px',borderRadius:6,background:'rgba(0,212,255,0.15)',color:'var(--foto)'}}>{loc.c}</span>
              {dist!=null&&<span style={{fontSize:12,color:'var(--text-secondary)'}}>{fmtDist(dist)}</span>}
            </div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--text-tertiary)',fontSize:28,cursor:'pointer',padding:4}}>✕</button>
        </div>

        {loc.ch.map((ch,idx)=>{
          const done=completed[idx];
          const isQuiz=ch.t==='quiz';
          const locked=isQuiz&&hasAnyPhoto&&!hasPhotoCompleted;
          // V10: distinguish wrong-gegokt (pts=0) from correct completion
          const ptsEarned=completedPts[idx];
          const wasWrong=done && ptsEarned===0;

          return(
            <div key={idx} className={`ch-card ${done&&!wasWrong?'completed':''} ${wasWrong?'wrong-done':''} ${locked?'locked':''}`} style={{position:'relative'}}>
              {locked&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:1,fontSize:14,color:'var(--accent)',fontWeight:700}}>🔒 Eerst een foto-opdracht!</div>}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:8}}>
                <div style={{flex:1}}>
                  <span className={`ch-type ch-type-${ch.t}`}>{ch.t}</span>
                  <h3 style={{fontSize:15,fontWeight:700,marginTop:6}}>{ch.ti}</h3>
                </div>
                <div className="points-badge">+{ch.p}</div>
              </div>
              <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:10,lineHeight:1.4}}>{ch.d}</p>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div className="difficulty"><span className="star">{stars(ch.df)}</span> {ch.df}</div>
                {done&&!wasWrong&&<div style={{fontSize:13,color:'var(--success)',fontWeight:700}}>✓ Voltooid {ptsEarned>0&&`(+${ptsEarned} pts)`}</div>}
                {wasWrong&&<div style={{fontSize:13,color:'var(--danger)',fontWeight:700}}>✗ Fout gegokt · 0 pts{isQuiz&&ch.a?` · antwoord: ${ch.a}`:''}</div>}
              </div>
              {!done&&!locked&&<ChallengeAction ch={ch} locId={loc.id} chIdx={idx} onComplete={onComplete} dist={dist} isAdmin={isAdmin} loc={loc} myTeam={myTeam}/>}
            </div>
          );
        })}

        {/* V5: dynamic rotating-quiz slot once built-in quizzes are exhausted */}
        {rotatedQuiz&&hasPhotoCompleted&&(
          <div className="ch-card" style={{borderColor:'rgba(255,215,0,0.3)',background:'rgba(255,215,0,0.04)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:8}}>
              <div style={{flex:1}}>
                <span className="ch-type ch-type-quiz">🎲 BONUS QUIZ</span>
                <h3 style={{fontSize:15,fontWeight:700,marginTop:6}}>{rotatedQuiz.ti}</h3>
              </div>
              <div className="points-badge">+{rotatedQuiz.p}</div>
            </div>
            <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:10,lineHeight:1.4}}>{rotatedQuiz.d}</p>
            <div style={{fontSize:11,color:'var(--text-secondary)',marginBottom:8,fontStyle:'italic'}}>
              {rotatedQuiz._pool?'🎯 Bonus Rotterdam-vraag':'⭐ Extra vraag voor deze plek'}
            </div>
            <ChallengeAction ch={rotatedQuiz} locId={loc.id} chIdx={`dyn_${loc.id}_${Date.now()}`} dist={dist} isAdmin={isAdmin} loc={loc} myTeam={myTeam} onComplete={(lid,cidx,pts,photo)=>{
              // Dynamic-quiz rewards: award points, log activity, but do NOT mark built-in challenge
              onComplete(lid,-99,pts,photo);
            }}/>
          </div>
        )}
      </div>
    </>
  );
}

function ChallengeAction({ch,locId,chIdx,onComplete,dist,isAdmin,loc,myTeam}){
  const fileRef=useRef(null);
  const[preview,setPreview]=useState(null);
  const[quizAnswer,setQuizAnswer]=useState(null);
  const[quizFeedback,setQuizFeedback]=useState(null);
  const[processing,setProcessing]=useState(false);
  // V7.1: synchronous quiz lock (refs beat React's async state race on mobile)
  const quizLockRef=useRef(false);

  // V6: GPS gate — for media challenges only. Quizzes don't gate.
  const isMedia=ch.t==='photo'||ch.t==='video'||ch.t==='creative';
  const gateRadius=PHOTO_GATE_RADIUS+PHOTO_GATE_GRACE; // 50 + 20 = 70m total
  const tooFar=isMedia&&!isAdmin&&dist!=null&&dist>gateRadius;

  const handleFile=async(e)=>{
    const f=e.target.files[0];
    if(!f)return;
    setProcessing(true);
    const r=new FileReader();
    r.onload=async(ev)=>{
      const raw=ev.target.result;
      let shareable=raw;
      if(!isVideoData(raw)){
        shareable=await compressPhoto(raw,640,0.6);
      }else if(raw.length>700000){
        shareable=null;
      }
      setPreview(raw);
      setProcessing(false);

      // V6: Insert a photo_review row into Supabase for the admin queue
      if(!OFFLINE&&sb&&myTeam&&isMedia){
        const reviewRow={
          team_id:myTeam.id,
          team_name:myTeam.name,
          team_emoji:myTeam.emoji,
          team_color:myTeam.color,
          location_id:locId,
          location_name:loc?.n||'',
          challenge_idx:typeof chIdx==='number'?chIdx:-99,
          challenge_title:ch.ti,
          challenge_type:ch.t,
          gps_distance:dist!=null?Math.round(dist):null,
          points_awarded:ch.p,
          photo_url:shareable&&shareable.length<800000?shareable:null,
          status:'pending',
        };
        sb.from('photo_reviews').insert(reviewRow).then(()=>{},()=>{/* table may not exist yet — silent */});
      }

      onComplete(locId,chIdx,ch.p,shareable);
    };
    r.onerror=()=>{setProcessing(false);onComplete(locId,chIdx,ch.p,null)};
    r.readAsDataURL(f);
  };

  // V7: one shot. Correct → full points. Wrong → 0 pts, challenge marked done.
  // V7.1: ref-based lock — state is async, so two fast taps could both pass the
  // `if(quizAnswer)` check before React re-renders the disabled buttons.
  const handleQuiz=opt=>{
    if(quizLockRef.current)return;
    quizLockRef.current=true;
    setQuizAnswer(opt);
    if(opt===ch.a){
      setQuizFeedback('correct');
      setTimeout(()=>onComplete(locId,chIdx,ch.p,null),700);
    }else{
      setQuizFeedback('wrong');
      // Reveal the correct answer during feedback, then mark done with 0 pts
      setTimeout(()=>onComplete(locId,chIdx,0,null),QUIZ_WRONG_FEEDBACK_MS);
    }
  };

  if(ch.t==='quiz'){
    return(
      <div style={{marginTop:12}}>
        <div style={{fontSize:11,color:'var(--text-secondary)',marginBottom:8,fontStyle:'italic'}}>
          ⚡ Eén kans — fout gegokt = 0 pts
        </div>
        {ch.o.map((opt,i)=>{
          const isChosen=quizAnswer===opt;
          const isRightAnswer=opt===ch.a;
          // During wrong-feedback, highlight the correct answer in green too
          const revealRight=quizFeedback==='wrong'&&isRightAnswer;
          return(
            <button key={i}
              className={`quiz-option ${isChosen?(quizFeedback==='correct'?'correct':'wrong'):''} ${revealRight?'correct':''}`}
              onClick={()=>handleQuiz(opt)}
              disabled={!!quizAnswer}>
              {opt}{revealRight&&<span style={{marginLeft:8,fontSize:11,fontWeight:700}}>← juist</span>}
            </button>
          );
        })}
        {quizFeedback==='wrong'&&<div style={{fontSize:13,color:'var(--danger)',marginTop:8,fontWeight:600}}>❌ Helaas. Het juiste antwoord was: {ch.a} · 0 pts</div>}
        {quizFeedback==='correct'&&<div style={{fontSize:13,color:'var(--success)',marginTop:8,fontWeight:600}}>✅ Correct! +{ch.p} pts</div>}
      </div>
    );
  }

  // V6: GPS gate UI when too far
  if(tooFar){
    const need=Math.round(dist-gateRadius);
    return(
      <div className="gate-blocked">
        <div className="gate-icon">📍</div>
        <div style={{flex:1}}>
          <div className="gate-text">Loop dichterbij om de foto te maken</div>
          <div className="gate-hint">Je staat {Math.round(dist)}m weg · max {gateRadius}m toegestaan</div>
        </div>
        <div className="gate-distance">-{need}m</div>
      </div>
    );
  }

  const accept=ch.t==='video'?'video/*':ch.t==='creative'?'image/*,video/*':'image/*';
  return(
    <div style={{marginTop:12}}>
      <input ref={fileRef} type="file" accept={accept} capture="environment" style={{display:'none'}} onChange={handleFile}/>
      <button className="btn btn-cyan" onClick={()=>fileRef.current?.click()} disabled={processing} style={{width:'100%'}}>
        {processing?'⏳ Verwerken...':ch.t==='video'?'🎬 Video Opnemen':ch.t==='creative'?'📸 Foto/Video Maken':'📸 Foto Maken'}
      </button>
      {isAdmin&&dist!=null&&dist>gateRadius&&(
        <div style={{fontSize:11,color:'var(--video)',marginTop:6,textAlign:'center'}}>⚠️ Admin override · normaal {Math.round(dist)}m te ver</div>
      )}
      {!isAdmin&&isMedia&&dist!=null&&dist<=gateRadius&&(
        <div style={{fontSize:11,color:'var(--success)',marginTop:6,textAlign:'center'}}>✓ Je bent op locatie ({Math.round(dist)}m)</div>
      )}
      {preview&&(isVideoData(preview)
        ?<video src={preview} className="photo-preview" controls muted/>
        :<img src={preview} className="photo-preview" alt="preview"/>)}
    </div>
  );
}

          <div style={{fontSize:14,color:'var(--text-secondary)',marginTop:8}}>Bruiloftsvideo voor Jorik</div>
        </div>

          </p>
          <p style={{fontSize:13,color:'var(--video)',fontWeight:600,marginTop:12}}>
            ⚠️ Doe dit ALLEEN wanneer Jorik NIET bij jullie team is!
          </p>

          {!done&&!uploaded&&(

                onChange={e=>{if(e.target.files[0]){setUploaded(true);onComplete()}}}/>

// ═══════════════════════════════════════════
// V10: BAR BREAK OVERLAY
// ═══════════════════════════════════════════
function BarBreakOverlay({info,onClose,onComplete}){
  const[done,setDone]=useState(new Set());
  const[selected,setSelected]=useState(null);
  const complete=(m,i)=>{
    if(done.has(i))return;
    setDone(prev=>new Set([...prev,i]));
    onComplete&&onComplete(m,m.pts);
  };
  return(
    <div className="barbreak-overlay" onClick={()=>{}}>
      <div className="barbreak-card" style={{maxWidth:500,width:'92%'}}>
        <div style={{fontSize:11,color:'var(--accent)',fontWeight:800,letterSpacing:2,marginBottom:6}}>🍻 BAR BREAK</div>
        <div style={{fontSize:26,fontWeight:900,marginBottom:6,background:'linear-gradient(135deg,#ffd700,#ff6b35)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>{info.name}</div>
        <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:20,fontStyle:'italic'}}>Kies een mini-opdracht voor extra punten. Jullie kunnen ze alle drie doen.</div>
        <div style={{display:'grid',gap:10,marginBottom:18}}>
          {info.mini.map((m,i)=>{
            const isDone=done.has(i);
            return(
              <div key={i} style={{padding:14,borderRadius:12,background:isDone?'rgba(0,255,136,0.08)':'rgba(255,255,255,0.06)',border:`1px solid ${isDone?'rgba(0,255,136,0.3)':'rgba(255,255,255,0.12)'}`,textAlign:'left'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
                  <div style={{fontSize:24}}>{m.emoji}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14}}>{m.title}</div>
                    <div style={{fontSize:12,color:'var(--text-secondary)'}}>{m.desc}</div>
                  </div>
                  <div style={{fontSize:13,fontWeight:800,color:'var(--accent)'}}>+{m.pts}</div>
                </div>
                {!isDone&&<button className="btn btn-cyan" onClick={()=>complete(m,i)} style={{width:'100%',padding:10,fontSize:12}}>✓ Klaar — {m.pts} pts</button>}
                {isDone&&<div style={{fontSize:12,color:'var(--success)',fontWeight:700,textAlign:'center',padding:8}}>✓ Voltooid</div>}
              </div>
            );
          })}
        </div>
        <button className="btn btn-ghost" onClick={onClose} style={{width:'100%',padding:12}}>Door met spelen</button>
      </div>
    </div>
  );
}

// V10: FINALE CEREMONY SCREEN
// ═══════════════════════════════════════════
function FinaleScreen({teams,scores,myTeam,elapsed,activityFeed,jorikTeamId}){

  const photos=(activityFeed||[]).filter(a=>a.photo).slice(0,9);
  const totalChallenges=(activityFeed||[]).filter(a=>a.points>0).length;

  return(
    <div style={{position:'fixed',inset:0,zIndex:10010,overflow:'auto',background:'radial-gradient(circle at 50% 20%,rgba(255,215,0,0.15),transparent 60%),radial-gradient(circle at 30% 80%,rgba(168,85,247,0.12),transparent 50%),var(--bg)'}}>
      <div style={{padding:'40px 24px 80px',textAlign:'center',maxWidth:640,margin:'0 auto'}}>
        <div style={{fontSize:12,color:'var(--accent)',letterSpacing:4,fontWeight:800,marginBottom:8}}>━━━  DE UITSLAG  ━━━</div>
        <div style={{fontSize:42,fontWeight:900,marginBottom:6,background:'linear-gradient(135deg,#ffd700,#ff6b35,#a855f7)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>EINDSTAND</div>
        <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:32}}>{fmtHM(elapsed)} gespeeld · {teams.length} teams · {totalChallenges} voltooide uitdagingen</div>

        {winner&&(
          <div className="glass-strong" style={{padding:28,marginBottom:24,borderColor:winner.color+'88',background:`linear-gradient(135deg,${winner.color}15,rgba(10,14,39,0.9))`,animation:'fadeInUp .6s ease both'}}>
            <div style={{fontSize:11,color:'var(--accent)',fontWeight:800,letterSpacing:3,marginBottom:4}}>🏆 WINNAAR</div>
            <div style={{fontSize:64,marginBottom:4,animation:'float 3s ease-in-out infinite'}}>{winner.emoji}</div>
            <div style={{fontSize:30,fontWeight:900,marginBottom:6,color:winner.color}}>{winner.name}</div>
            <div style={{fontSize:14,color:'var(--text-secondary)',marginBottom:12}}>Vriend van de Bruidegom · Eeuwige Roem</div>
            <div style={{fontSize:48,fontWeight:900,color:'var(--accent)'}}>{winner.score}<span style={{fontSize:16,color:'var(--text-secondary)',fontWeight:600}}> pts</span></div>
          </div>
        )}

        <div style={{fontSize:11,color:'var(--text-secondary)',fontWeight:700,letterSpacing:2,marginBottom:10}}>VOLLEDIGE RANGSCHIKKING</div>
        {sorted.map((t,i)=>(
          <div key={t.id} className="glass" style={{padding:14,marginBottom:8,display:'flex',alignItems:'center',gap:12,borderLeft:`4px solid ${t.color}`,animation:`fadeInUp .5s ease ${i*0.1}s both`,opacity:i>0?0.95:1}}>
            <div style={{fontSize:22,fontWeight:900,minWidth:36,color:i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#555'}}>#{i+1}</div>
            <div style={{fontSize:28}}>{t.emoji}</div>
            <div style={{flex:1,textAlign:'left'}}>
              <div style={{fontWeight:700,fontSize:15}}>{t.name}{t.id===jorikTeamId&&<span style={{marginLeft:8,fontSize:11,color:'var(--accent)'}}>· met Jorik</span>}</div>
              <div style={{fontSize:11,color:'var(--text-secondary)'}}>{t.id===myTeam?.id?'Jouw team':'Team'}</div>
            </div>
            <div style={{fontSize:22,fontWeight:900,color:t.color}}>{t.score}</div>
          </div>
