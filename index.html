<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Stadsspel Rotterdam V7 - Jorik's Bachelor Party</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body,#root{width:100%;height:100%;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e27;color:#fff}
    .leaflet-div-icon{background:none!important;border:none!important}

    /* Glass morphism */
    .glass{backdrop-filter:blur(14px);background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:16px}
    .glass-strong{backdrop-filter:blur(20px);background:rgba(10,14,39,0.85);border:1px solid rgba(255,255,255,0.15);border-radius:16px}

    /* Buttons */
    .btn{padding:12px 24px;border:none;border-radius:12px;font-weight:700;cursor:pointer;transition:all .2s;font-size:14px}
    .btn:active{transform:scale(0.96)}
    .btn-cyan{background:linear-gradient(135deg,#00d4ff,#0099cc);color:#0a0e27}
    .btn-gold{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#0a0e27}
    .btn-ghost{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2)}
    .btn-danger{background:linear-gradient(135deg,#ff4444,#cc0000);color:#fff}
    .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

    /* Animations */
    @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,0.6)}50%{box-shadow:0 0 0 12px rgba(0,212,255,0)}}
    @keyframes glow{0%,100%{filter:drop-shadow(0 0 6px rgba(0,212,255,0.8))}50%{filter:drop-shadow(0 0 16px rgba(0,212,255,0.4))}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
    @keyframes scoreFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .animate-in{animation:fadeInUp .4s ease both}
    .animate-in-1{animation-delay:.05s}.animate-in-2{animation-delay:.1s}.animate-in-3{animation-delay:.15s}.animate-in-4{animation-delay:.2s}

    /* Toast */
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10002;animation:slideDown .3s ease}
    .toast-inner{padding:14px 24px;border-radius:14px;backdrop-filter:blur(20px);background:rgba(0,212,255,0.15);border:1px solid rgba(0,212,255,0.4);font-weight:600;font-size:14px;white-space:nowrap;text-align:center}

    /* Score popup */
    .score-popup{position:fixed;top:40%;left:50%;transform:translateX(-50%);z-index:10003;font-size:42px;font-weight:900;color:#ffd700;animation:scoreFloat 1.2s ease forwards;pointer-events:none;text-shadow:0 2px 20px rgba(255,215,0,0.6)}

    /* Offline banner */
    .offline-banner{position:fixed;top:0;left:0;right:0;padding:6px;text-align:center;font-size:11px;font-weight:600;color:#ff6b35;background:rgba(255,107,53,0.15);border-bottom:1px solid rgba(255,107,53,0.3);z-index:10001}

    /* Bottom tab bar */
    .tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:10000;backdrop-filter:blur(20px);background:rgba(10,14,39,0.9);border-top:1px solid rgba(255,255,255,0.1);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;background:none;border:none;color:#555;font-size:10px;font-weight:600;cursor:pointer;transition:color .2s}
    .tab-btn.active{color:#00d4ff}
    .tab-btn .tab-icon{font-size:22px;transition:transform .2s}
    .tab-btn.active .tab-icon{transform:scale(1.15)}

    /* Bottom sheet */
    .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:10000;animation:fadeInUp .2s ease}
    .sheet{position:fixed;bottom:0;left:0;right:0;max-height:85vh;overflow-y:auto;z-index:10001;background:#0f1335;border-top:1px solid rgba(255,255,255,0.15);border-radius:24px 24px 0 0;padding:20px 20px 100px;animation:slideUp .3s ease}
    .sheet-handle{width:40px;height:4px;background:rgba(255,255,255,0.3);border-radius:2px;margin:0 auto 16px}

    /* Challenge card */
    .ch-card{padding:16px;margin-bottom:12px;border-radius:14px;backdrop-filter:blur(10px);background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);transition:border-color .2s}
    .ch-card.completed{border-color:rgba(0,255,136,0.4);background:rgba(0,255,136,0.05)}
    .ch-card.locked{opacity:0.5;filter:blur(1px);pointer-events:none;position:relative}
    .ch-type{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .ch-type-photo{background:rgba(0,212,255,0.2);color:#00d4ff}
    .ch-type-video{background:rgba(255,107,53,0.2);color:#ff6b35}
    .ch-type-creative{background:rgba(168,85,247,0.2);color:#a855f7}
    .ch-type-quiz{background:rgba(255,215,0,0.2);color:#ffd700}
    .difficulty{color:#666;font-size:11px}.difficulty .star{color:#ffd700}
    .points-badge{font-size:13px;font-weight:800;color:#ffd700}

    /* Quiz */
    .quiz-option{display:block;width:100%;padding:12px;margin-bottom:8px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#fff;font-size:14px;cursor:pointer;text-align:left;transition:all .2s}
    .quiz-option:hover{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.3)}
    .quiz-option.correct{background:rgba(0,255,136,0.2);border-color:#00ff88;color:#00ff88}
    .quiz-option.wrong{background:rgba(255,68,68,0.2);border-color:#ff4444;color:#ff4444}

    /* Leaderboard */
    .lb-card{padding:16px;margin-bottom:12px;border-radius:16px;display:flex;align-items:center;gap:14px;transition:all .3s;position:relative;overflow:hidden}
    .lb-rank{font-size:22px;font-weight:900;min-width:36px;text-align:center}
    .lb-rank-1{color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,0.5)}.lb-rank-2{color:#c0c0c0}.lb-rank-3{color:#cd7f32}.lb-rank-other{color:#555}
    .lb-emoji{font-size:32px}
    .lb-info{flex:1}
    .lb-name{font-weight:700;font-size:15px;margin-bottom:2px}
    .lb-stats{font-size:11px;color:#888}
    .lb-score{font-size:26px;font-weight:900;font-variant-numeric:tabular-nums}
    .lb-first{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.25)}

    /* Nearby challenges */
    .nearby-panel{position:absolute;bottom:80px;left:10px;right:10px;z-index:1000}
    .nearby-card{padding:12px;margin-bottom:8px;border-radius:12px;display:flex;align-items:center;gap:12px;cursor:pointer;backdrop-filter:blur(12px);background:rgba(10,14,39,0.85);border:1px solid rgba(255,255,255,0.12)}
    .nearby-card:active{background:rgba(0,212,255,0.1)}
    .nearby-emoji{font-size:28px}.nearby-dist{font-size:12px;color:#00d4ff;font-weight:700}

    /* Secret mission */
    .secret-banner{margin:12px 0;padding:16px;border-radius:14px;background:linear-gradient(135deg,rgba(168,85,247,0.15),rgba(255,107,53,0.1));border:1px solid rgba(168,85,247,0.3);cursor:pointer}
    .secret-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(168,85,247,0.3);color:#a855f7;margin-bottom:8px}

    /* Bar break overlay */
    .barbreak-overlay{position:fixed;inset:0;z-index:10005;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);background:rgba(10,14,39,0.9)}
    .barbreak-card{max-width:360px;padding:32px;text-align:center;border-radius:24px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,215,0,0.3)}

    /* Team setup */
    .emoji-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
    .emoji-btn{padding:10px;font-size:24px;border-radius:12px;background:rgba(255,255,255,0.06);border:2px solid transparent;cursor:pointer;transition:all .15s}
    .emoji-btn:hover{background:rgba(0,212,255,0.1)}
    .emoji-btn.selected{border-color:#00d4ff;background:rgba(0,212,255,0.15)}
    .emoji-btn.taken{opacity:0.25;cursor:not-allowed}
    .color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
    .color-btn{width:100%;aspect-ratio:1;border-radius:12px;border:3px solid transparent;cursor:pointer;transition:all .15s}
    .color-btn.selected{border-color:#fff;transform:scale(1.1)}

    /* Phase indicator */
    .phase-bar{display:flex;gap:4px;margin:12px 0}
    .phase-dot{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.1)}
    .phase-dot.active{background:#00d4ff}
    .phase-dot.done{background:#00ff88}

    /* Photo preview */
    .photo-preview{width:100%;max-height:150px;object-fit:cover;border-radius:10px;margin-top:10px}

    /* === V5 ADDITIONS === */

    /* Narrative modal */
    .story-overlay{position:fixed;inset:0;z-index:10010;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px);background:rgba(10,14,39,0.95);animation:fadeInUp .3s ease;padding:20px}
    .story-card{max-width:420px;width:100%;padding:28px;border-radius:20px;background:linear-gradient(135deg,rgba(168,85,247,0.12),rgba(0,212,255,0.08));border:1px solid rgba(168,85,247,0.3);text-align:center}
    .story-chapter{display:inline-block;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:800;background:rgba(168,85,247,0.3);color:#d8b4fe;letter-spacing:1.5px;margin-bottom:16px}
    .story-title{font-size:22px;font-weight:900;margin-bottom:12px;background:linear-gradient(135deg,#00d4ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .story-text{font-size:14px;line-height:1.6;color:#d0d4e4;margin-bottom:20px;text-align:left}

    /* Photo grid for activity feed */
    .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
    .photo-grid-item{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;cursor:pointer;background:rgba(255,255,255,0.04)}
    .photo-grid-item img,.photo-grid-item video{width:100%;height:100%;object-fit:cover}
    .photo-grid-overlay{position:absolute;bottom:0;left:0;right:0;padding:4px 6px;background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);font-size:9px;font-weight:700;color:#fff;display:flex;justify-content:space-between;align-items:end}
    .photo-lightbox{position:fixed;inset:0;z-index:10020;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    .photo-lightbox img,.photo-lightbox video{max-width:100%;max-height:70vh;border-radius:12px}
    .photo-lightbox-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.15);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer}

    /* Starter packs */
    .starter-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
    .starter-card{padding:14px;border-radius:14px;background:rgba(255,255,255,0.06);border:2px solid transparent;cursor:pointer;transition:all .2s;text-align:center}
    .starter-card:hover{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.3)}
    .starter-card.taken{opacity:0.3;pointer-events:none}
    .starter-emoji{font-size:34px;margin-bottom:6px}
    .starter-name{font-size:13px;font-weight:700;color:#fff}
    .starter-color{width:20px;height:4px;border-radius:2px;margin:6px auto 0}

    /* GPS status pill */
    .gps-pill{position:absolute;top:10px;left:10px;z-index:1000;padding:6px 10px;border-radius:20px;backdrop-filter:blur(8px);background:rgba(10,14,39,0.75);border:1px solid rgba(255,255,255,0.15);font-size:10px;font-weight:600;color:#aaa;display:flex;align-items:center;gap:6px}
    .gps-dot{width:8px;height:8px;border-radius:50%}
    .gps-dot.good{background:#00ff88;box-shadow:0 0 8px rgba(0,255,136,0.8);animation:pulse 2s infinite}
    .gps-dot.weak{background:#ffd700;box-shadow:0 0 8px rgba(255,215,0,0.8)}
    .gps-dot.sleep{background:#666}
    .gps-pill .snap-btn{margin-left:4px;padding:2px 8px;border-radius:10px;background:rgba(0,212,255,0.2);border:1px solid rgba(0,212,255,0.4);color:#00d4ff;font-size:9px;font-weight:700;cursor:pointer}

    /* Story progression ticker */
    .story-ticker{padding:10px 14px;margin:0 0 14px 0;border-radius:12px;background:linear-gradient(135deg,rgba(168,85,247,0.1),rgba(0,212,255,0.08));border-left:3px solid #a855f7;font-size:12px;line-height:1.5;color:#d0d4e4;font-style:italic}

    /* Activity row with photo */
    .activity-row{padding:14px;margin-bottom:10px;border-radius:14px;backdrop-filter:blur(10px);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08)}
    .activity-photo{width:100%;max-height:220px;object-fit:cover;border-radius:10px;margin-top:10px;cursor:pointer}

    /* === V6 ADDITIONS === */

    /* Photo gate (when too far) */
    .gate-blocked{margin-top:12px;padding:14px;border-radius:12px;background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.3);display:flex;align-items:center;gap:12px}
    .gate-icon{font-size:24px}
    .gate-text{flex:1;font-size:13px;color:#ff6b35;font-weight:600}
    .gate-distance{font-size:18px;font-weight:900;color:#ff6b35;font-variant-numeric:tabular-nums}
    .gate-hint{font-size:11px;color:#888;font-weight:400;margin-top:2px}

    /* Admin review queue */
    .review-card{padding:14px;margin-bottom:12px;border-radius:14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,215,0,0.2)}
    .review-photo{width:100%;max-height:280px;object-fit:cover;border-radius:10px;margin:8px 0}
    .review-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:12px;color:#888}
    .review-actions{display:flex;gap:8px;margin-top:10px}
    .review-actions .btn{flex:1;padding:10px;font-size:13px}
    .review-dist-good{color:#00ff88;font-weight:700}
    .review-dist-warn{color:#ffd700;font-weight:700}
    .review-dist-bad{color:#ff4444;font-weight:700}
    .review-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .review-badge-pending{background:rgba(255,215,0,0.2);color:#ffd700}
    .review-badge-approved{background:rgba(0,255,136,0.2);color:#00ff88}
    .review-badge-rejected{background:rgba(255,68,68,0.2);color:#ff4444}

    /* Provisional score badge */
    .provisional-badge{display:inline-block;margin-left:6px;padding:2px 6px;border-radius:8px;font-size:9px;font-weight:700;background:rgba(255,215,0,0.2);color:#ffd700}

    /* === V7 ADDITIONS === */

    /* Quiz cooldown overlay */
    .quiz-cooldown{margin-top:10px;padding:14px;border-radius:12px;background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.3);text-align:center}
    .quiz-cooldown-title{font-size:13px;color:#ff4444;font-weight:700;margin-bottom:4px}
    .quiz-cooldown-timer{font-size:28px;font-weight:900;color:#ff4444;font-variant-numeric:tabular-nums;letter-spacing:2px}
    .quiz-cooldown-hint{font-size:11px;color:#888;margin-top:6px}

    /* Wrong-count badge on quiz card */
    .wrong-badge{display:inline-block;margin-left:6px;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:800;background:rgba(255,68,68,0.18);color:#ff7070}
    .quiz-option.cooldown{opacity:0.35;cursor:not-allowed;filter:grayscale(1)}

    /* Filter pills */
    .filter-pills{display:flex;gap:6px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none}
    .filter-pills::-webkit-scrollbar{display:none}
    .filter-pill{padding:6px 12px;border-radius:18px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#aaa;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
    .filter-pill.active{background:rgba(0,212,255,0.2);border-color:#00d4ff;color:#00d4ff}
  </style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ═══════════════════════════════════════════
// CONFIGURATION — Fill in your Supabase creds
// ═══════════════════════════════════════════
const SUPABASE_URL='https://kybcndicweuxjxkfzxud.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5YmNuZGljd2V1eGp4a2Z6eHVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDM3ODYsImV4cCI6MjA5MTY3OTc4Nn0.utTzURErYUiGgOpvlq1goKToUl8i4CavVicEFp-MrDk';

// ═══════════════════════════════════════════
// GAME CONFIG
// ═══════════════════════════════════════════
const START_POS={lat:51.9179,lng:4.4822}; // Maritiem Museum, Leuvehaven
const DINNER_ZONE={lat:51.9206,lng:4.4868,r:400}; // Markthal/Bokaal area
const GHOST_DURATION=300; // 5 min in seconds
const GHOST_MAX_USES=3;
const FIRST_BONUS=10;
const BAR_BREAK_BONUS=25;
const WEDDING_VIDEO_BONUS=50;
const NEARBY_RADIUS=500; // meters
const GPS_INTERVAL=10000; // 10s

const TEAM_EMOJIS=['🦁','🐋','🦊','🐊','🦅','🐺','🦈','🐙','🦄','🐉','🦇','🐧','🦉','🐬','🦀','🐯'];
const TEAM_COLORS=[
  {name:'Cyan',hex:'#00d4ff'},{name:'Gold',hex:'#ffd700'},{name:'Orange',hex:'#ff6b35'},{name:'Purple',hex:'#a855f7'},
  {name:'Pink',hex:'#ec4899'},{name:'Green',hex:'#00ff88'},{name:'Blue',hex:'#3b82f6'},{name:'Red',hex:'#ef4444'}
];

// ═══════════════════════════════════════════
// V5 FEATURE 4: STARTER PACKS (one-tap team creation)
// ═══════════════════════════════════════════
const STARTER_PACKS=[
  {name:'De Maffiosi',emoji:'🦁',color:'#ffd700'},
  {name:'Haven Helden',emoji:'🦈',color:'#00d4ff'},
  {name:'Rotterdam Rakkers',emoji:'🐉',color:'#ff6b35'},
  {name:'De Kubus Kids',emoji:'🦊',color:'#a855f7'},
  {name:'Erasmus Elite',emoji:'🦅',color:'#00ff88'},
  {name:'Markthal Monsters',emoji:'🐙',color:'#ec4899'},
];

// ═══════════════════════════════════════════
// V5 FEATURE 1: NARRATIVE — "Jorik's lost ring"
// ═══════════════════════════════════════════
const NARRATIVE={
  intro:{
    chapter:'PROLOOG',
    title:"Jorik's verloren trouwring",
    text:"Acht dagen voor de bruiloft. Jorik heeft vanmorgen zijn trouwring laten vallen — ergens in het hart van Rotterdam. Paniek. Hij weet alleen nog dat hij langs meerdere iconische plekken is gefietst.\n\nJullie missie: de stad uitkammen, bewijs verzamelen (foto's, video's, kennis), en de ring terugvinden voordat de ceremonie begint. Ieder team werkt op eigen houtje — maar slechts één team kan de held zijn.\n\nTijdens de jacht zijn er onderweg biertjes, bar breaks, en stiekem óók een geheime opdracht waar Jorik niets van mag weten...\n\n2 uur tot vertrek. De klok tikt. Veel geluk."
  },
  phase1:{
    chapter:'FASE 1 · DE ZOEKTOCHT BEGINT',
    title:"Langs de iconen",
    text:"Elk team begint bij het Maritiem Museum. Jorik's ring kan overal zijn — bij de Erasmusbrug, in de Markthal, op de Kubuswoningen. Hoe meer plekken jullie bezoeken, hoe groter de kans dat de ring opduikt.\n\nElke voltooide uitdaging brengt je dichter bij de waarheid. Let op elkaars activiteit — de eerste die iets ontdekt op een plek krijgt bonuspunten."
  },

// UTILITY FUNCTIONS
// ═══════════════════════════════════════════
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000,p=Math.PI/180;
  const a=Math.sin((lat2-lat1)*p/2)**2+Math.cos(lat1*p)*Math.cos(lat2*p)*Math.sin((lon2-lon1)*p/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

function fmtDist(m){return m<1000?`${Math.round(m)}m`:`${(m/1000).toFixed(1)}km`}
function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`}
function fmtHM(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?`${h}u ${m}m`:`${m}m`}
function stars(df){return df==='easy'?'★':df==='medium'?'★★':'★★★'}

function getNearby(pos,completed,n=3,maxR=NEARBY_RADIUS){
  if(!pos)return[];
  let locs=L_DATA.filter(l=>!completed[l.id]).map(l=>({...l,dist:haversine(pos.lat,pos.lng,l.la,l.lo)}));
  locs.sort((a,b)=>a.dist-b.dist);
  let result=locs.filter(l=>l.dist<=maxR).slice(0,n);
  if(result.length<n)result=locs.filter(l=>l.dist<=maxR*2).slice(0,n);
  if(result.length<n)result=locs.slice(0,n);
  return result;
}

// ═══════════════════════════════════════════
// V5 FEATURE 5: GPS DRIFT MITIGATION
// ═══════════════════════════════════════════
function smoothPosition(samples){
  if(!samples||!samples.length)return null;
  // Weighted average — newer samples weigh more
  let sumLat=0,sumLng=0,sumW=0,sumAcc=0;
  samples.forEach((s,i)=>{
    const w=i+1; // newer = higher weight
    sumLat+=s.lat*w; sumLng+=s.lng*w; sumW+=w;
    sumAcc+=(s.acc||0);
  });
  return{lat:sumLat/sumW,lng:sumLng/sumW,acc:sumAcc/samples.length};
}

function snapToPOI(pos,maxDist=GPS_SNAP_RADIUS){
  if(!pos)return pos;
  let best=null,bestDist=Infinity;
  for(const loc of L_DATA){
    const d=haversine(pos.lat,pos.lng,loc.la,loc.lo);
    if(d<bestDist&&d<=maxDist){bestDist=d;best=loc}
  }
  return best?{lat:best.la,lng:best.lo,acc:pos.acc,snapped:best.n}:pos;
}

function pickQuiz(loc,seen){
  // Return an unseen quiz for this location, or a fallback from pool
  const locQuizzes=loc.ch.filter(c=>c.t==='quiz');
  const unseen=locQuizzes.filter((_,i)=>!seen.has(`${loc.id}_q_${i}`));
  if(unseen.length)return unseen[Math.floor(Math.random()*unseen.length)];
  // Use a Rotterdam pool filler, marked with type 'quiz'
  const unseenPool=ROTTERDAM_QUIZ_POOL.filter(q=>!seen.has(`pool_${q.ti}`));
  if(unseenPool.length){
    const q=unseenPool[Math.floor(Math.random()*unseenPool.length)];
    return{...q,t:'quiz',_pool:true};
  }
  return null;
}

// V5 FEATURE 2: PHOTO COMPRESSION
// ═══════════════════════════════════════════
// Compress a dataURL to a small thumbnail for storage + live feed
function compressPhoto(dataURL,maxWidth=480,quality=0.55){
  return new Promise((resolve)=>{
    try{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const ratio=Math.min(1,maxWidth/img.width);
        canvas.width=Math.round(img.width*ratio);
        canvas.height=Math.round(img.height*ratio);
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror=()=>resolve(dataURL); // fallback
      img.src=dataURL;
    }catch(e){resolve(dataURL)}
  });
}

// Detect whether dataURL is a video (keep raw; don't try to compress)
function isVideoData(d){return typeof d==='string'&&d.startsWith('data:video')}

  const[pos,setPos]=useState(null);
  const[tab,setTab]=useState('leaderboard');
  const[selLoc,setSelLoc]=useState(null);
  const[toast,setToast]=useState(null);
  const[scorePopup,setScorePopup]=useState(null);
  const[ghost,setGhost]=useState({active:false,timeLeft:0,used:0});
  const[gameStart,setGameStart]=useState(null);
  const[elapsed,setElapsed]=useState(0);
  const[phase,setPhase]=useState(0); // 0=waiting,1-4=phases
  const[barBreak,setBarBreak]=useState(null); // {name,time}
  const[jorikInTeam,setJorikInTeam]=useState(false);
  const[weddingDone,setWeddingDone]=useState(false);
  const[showWedding,setShowWedding]=useState(false);
  const[activityFeed,setActivityFeed]=useState([]);
  const[isAdmin]=useState(new URLSearchParams(window.location.search).get('admin')==='true');
  // V5 FEATURE 1: narrative state
  const[storyShown,setStoryShown]=useState(null); // key of the currently-open story modal
  const[storySeen,setStorySeen]=useState(new Set()); // phases whose story has been shown
  // V5 FEATURE 3: seen quiz tracking
  const[seenQuizzes,setSeenQuizzes]=useState(new Set());
  // V5 FEATURE 5: GPS smoothing buffer
  const[gpsSamples,setGpsSamples]=useState([]);
  const[gpsStatus,setGpsStatus]=useState('weak'); // good / weak / sleep
  const[gpsSnap,setGpsSnap]=useState(null); // snapped-to POI name
  // V5 FEATURE 6: motion tracking
  const motionRef=useRef({lastMotion:Date.now(),still:false});
  // V5.1 HOTFIX: expose GPS controls so the status pill can force-wake on tap
  const gpsCtrlRef=useRef({start:null,stop:null});
  const[photoLightbox,setPhotoLightbox]=useState(null); // enlarged photo url
  const[feedFilter,setFeedFilter]=useState('all'); // 'all' | 'photos' | 'mine'
  // V6: admin review queue
  const[reviewQueue,setReviewQueue]=useState([]); // pending photo_reviews for admin
  const[pendingMine,setPendingMine]=useState(0); // count of my team's pending reviews

  // Timer
  useEffect(()=>{
    if(!gameStart)return;
    const i=setInterval(()=>setElapsed(Math.floor((Date.now()-gameStart)/1000)),1000);
    return()=>clearInterval(i);
  },[gameStart]);

  // V5 FEATURE 5 + 6: GPS with smoothing, snap-to-POI, battery-aware polling
  // V5.1 HOTFIX: skip sleep logic on iOS / no-motion; expose wake via ref for tap-to-wake pill
  useEffect(()=>{
    let watchId=null;
    let active=true;

    const onPos=(p)=>{
      const sample={lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy||999,ts:Date.now()};
      setGpsSamples(prev=>{
        const next=[...prev,sample].slice(-GPS_SMOOTH_SAMPLES);
        const smoothed=smoothPosition(next);
        if(smoothed){
          // Snap to POI if very close
          const snapped=snapToPOI(smoothed);
          if(snapped.snapped){
            setPos({lat:snapped.lat,lng:snapped.lng});
            setGpsSnap(snapped.snapped);
          }else{
            setPos({lat:smoothed.lat,lng:smoothed.lng});
            setGpsSnap(null);
          }
          // Update signal status
          const avgAcc=smoothed.acc;
          setGpsStatus(avgAcc<GPS_ACCURACY_GOOD?'good':avgAcc<GPS_ACCURACY_WEAK?'weak':'weak');
        }
        return next;
      });
    };

    const startWatch=()=>{
      if(watchId!=null||!active)return;
      watchId=navigator.geolocation.watchPosition(onPos,()=>{},
        {enableHighAccuracy:true,maximumAge:3000,timeout:10000});
      motionRef.current.still=false;
      motionRef.current.lastMotion=Date.now();
      // Reset visual state immediately so the pill returns to 'weak' until first fix
      setGpsStatus('weak');
    };
    const stopWatch=()=>{
      if(watchId!=null){navigator.geolocation.clearWatch(watchId);watchId=null}
    };

    // Expose controls so the status pill can force-wake on tap
    gpsCtrlRef.current={start:startWatch,stop:stopWatch};

    startWatch();

    // Motion-based sleep only runs where DeviceMotion fires without a permission prompt
    let motionCheck=null,onMotion=null;
    if(MOTION_AVAILABLE){
      motionCheck=setInterval(()=>{
        if(!active)return;
        const stillFor=Date.now()-motionRef.current.lastMotion;
        if(stillFor>STILL_TIMEOUT_MS&&watchId!=null){
          stopWatch();
          motionRef.current.still=true;
          setGpsStatus('sleep');
        }
      },10000);

      onMotion=(ev)=>{
        const a=ev.accelerationIncludingGravity||ev.acceleration;
        if(!a)return;
        const mag=Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2);
        if(Math.abs(mag-9.8)>MOTION_THRESHOLD){
          motionRef.current.lastMotion=Date.now();
          if(motionRef.current.still){
            motionRef.current.still=false;
            startWatch();
          }
        }
      };
      try{window.addEventListener('devicemotion',onMotion,{passive:true})}catch(e){}
    }
    // On iOS or browsers without motion: GPS stays always-on (same as V4)

    return()=>{
      active=false;
      stopWatch();
      if(motionCheck)clearInterval(motionCheck);
      if(onMotion){try{window.removeEventListener('devicemotion',onMotion)}catch(e){}}
      gpsCtrlRef.current={start:null,stop:null};
    };
  },[]);

  // V5.1 HOTFIX: force-wake callback for the GPS pill tap
  const wakeGps=useCallback(()=>{
    motionRef.current.lastMotion=Date.now();
    motionRef.current.still=false;
    // Stop first then start — ensures a fresh watchPosition even if stale
    gpsCtrlRef.current.stop&&gpsCtrlRef.current.stop();
    gpsCtrlRef.current.start&&gpsCtrlRef.current.start();
    setToast('📡 GPS wakker geschud');
  },[]);

  // Ghost timer
  useEffect(()=>{
    if(ghost.timeLeft<=0){if(ghost.active)setGhost(g=>({...g,active:false}));return;}
    const t=setTimeout(()=>setGhost(g=>({...g,timeLeft:g.timeLeft-1})),1000);
    return()=>clearTimeout(t);
  },[ghost.timeLeft,ghost.active]);

  // Toast auto-dismiss
  useEffect(()=>{if(toast){const t=setTimeout(()=>setToast(null),4000);return()=>clearTimeout(t)}},[toast]);
  useEffect(()=>{if(scorePopup){const t=setTimeout(()=>setScorePopup(null),1200);return()=>clearTimeout(t)}},[scorePopup]);

  // Supabase real-time subscriptions
  useEffect(()=>{
    if(OFFLINE||!sb)return;
    const teamSub=sb.channel('teams').on('postgres_changes',{event:'UPDATE',schema:'public',table:'teams'},payload=>{
      const t=payload.new;
      setTeams(prev=>prev.map(p=>p.id===t.id?{...p,...t}:p));
      if(t.id!==myTeam?.id){
        setToast(`${t.emoji} ${t.name}: ${t.score} pts`);
      }
    }).subscribe();
    const actSub=sb.channel('activity').on('postgres_changes',{event:'INSERT',schema:'public',table:'activity_feed'},payload=>{
      setActivityFeed(prev=>[payload.new,...prev].slice(0,50));
    }).subscribe();

    // V6: subscribe to photo_reviews — for admin queue + per-team rejection notices
    const reviewInsertSub=sb.channel('reviews_insert').on('postgres_changes',{event:'INSERT',schema:'public',table:'photo_reviews'},payload=>{
      const r=payload.new;
      if(isAdmin&&r.status==='pending'){
        setReviewQueue(prev=>[r,...prev]);
      }
      if(r.team_id===myTeam?.id&&r.status==='pending'){
        setPendingMine(c=>c+1);
      }
    }).subscribe();
    const reviewUpdateSub=sb.channel('reviews_update').on('postgres_changes',{event:'UPDATE',schema:'public',table:'photo_reviews'},payload=>{
      const r=payload.new;
      // Remove from admin queue once decided
      if(isAdmin)setReviewQueue(prev=>prev.filter(x=>x.id!==r.id));
      // Notify the affected team
      if(r.team_id===myTeam?.id){
        setPendingMine(c=>Math.max(0,c-1));
        if(r.status==='rejected'){
          setToast(`❌ Foto "${r.challenge_title}" afgekeurd · -${r.points_awarded} pts`);
          setScores(prev=>({...prev,[myTeam.id]:Math.max(0,(prev[myTeam.id]||0)-r.points_awarded)}));
        }else if(r.status==='approved'){
          setToast(`✅ Foto "${r.challenge_title}" goedgekeurd!`);
        }
      }
    }).subscribe();

    // Initial fetch for admin: pending reviews already in the table
    if(isAdmin){
      sb.from('photo_reviews').select('*').eq('status','pending').order('created_at',{ascending:false}).then(res=>{
        if(res.data)setReviewQueue(res.data);
      },()=>{/* table missing — silent */});
    }
    return()=>{
      teamSub.unsubscribe();actSub.unsubscribe();
      reviewInsertSub.unsubscribe();reviewUpdateSub.unsubscribe();
    };
  },[myTeam,isAdmin]);

  // V6: admin actions
  const approveReview=(r)=>{
    if(!sb)return;
    sb.from('photo_reviews').update({status:'approved',reviewed_at:new Date().toISOString()}).eq('id',r.id);
    setReviewQueue(prev=>prev.filter(x=>x.id!==r.id));
  };
  const rejectReview=(r)=>{
    if(!sb)return;
    sb.from('photo_reviews').update({status:'rejected',reviewed_at:new Date().toISOString()}).eq('id',r.id);
    // Also deduct points from the team in Supabase
    if(REVIEW_REJECT_PENALTY){
      sb.from('teams').select('score').eq('id',r.team_id).single().then(res=>{
        const newScore=Math.max(0,(res.data?.score||0)-r.points_awarded);
        sb.from('teams').update({score:newScore}).eq('id',r.team_id);
      });
    }
    setReviewQueue(prev=>prev.filter(x=>x.id!==r.id));
  };

  const addActivity=(msg,pts=0,photoData=null)=>{
    const entry={
      team_id:myTeam?.id,message:msg,points:pts,
      created_at:new Date().toISOString(),
      team_emoji:myTeam?.emoji,team_name:myTeam?.name,
      team_color:myTeam?.color,
      photo:photoData||null,
    };
    setActivityFeed(prev=>[entry,...prev].slice(0,50));
    // Only send to Supabase if the payload is manageable. Drop raw video blobs
    // (>500KB) to respect row limits; compressed photo thumbnails are fine.
    if(!OFFLINE&&sb){
      const shareable={...entry};
      if(shareable.photo&&shareable.photo.length>600000){delete shareable.photo}
      sb.from('activity_feed').insert(shareable);
    }
  };

  const completeChallenge=(locId,chIdx,pts,photoData=null)=>{
    // chIdx === -99 is the V5 dynamic bonus quiz — award points + log, skip challenge bookkeeping
    const isDynamicBonus=chIdx===-99;
    const key=`${locId}_${chIdx}`;
    if(!isDynamicBonus&&completed[locId]?.[chIdx])return;

    // V7: wrong-quiz → pts=0 path. Mark challenge done, no score change, no first-to-complete bonus.
    const isWrongZero=pts===0;

    let totalPts=pts;
    if(!isDynamicBonus&&!isWrongZero)totalPts+=FIRST_BONUS; // first-to-complete bonus skipped when wrong

    if(!isDynamicBonus){
      setCompleted(prev=>({...prev,[locId]:{...prev[locId],[chIdx]:true}}));
    }
    if(locId>0)setVisitedLocs(prev=>new Set([...prev,locId]));
    if(totalPts>0){
      setScores(prev=>({...prev,[myTeam?.id]:(prev[myTeam?.id]||0)+totalPts}));
      setScorePopup(`+${totalPts}`);
    }
    const loc=L_DATA.find(l=>l.id===locId);
    if(loc){
      if(isWrongZero){
        setToast(`${loc.e} ❌ Fout · 0 pts`);
      }else{
        setToast(`${loc.e} +${totalPts} pts!`);
      }
    }

    if(loc){
      let label;
      if(isWrongZero){
        label=`zat ernaast bij "${loc.ch[chIdx]?.ti}" (${loc.n}) · 0 pts`;
      }else if(isDynamicBonus){
        label=`🎲 Bonus quiz bij ${loc.n} gehaald!`;
      }else{
        label=`${loc.ch[chIdx]?.ti} bij ${loc.n} voltooid!`;
      }
      addActivity(label,isWrongZero?0:totalPts,photoData);
    }

    // V5: Mark this quiz as seen so the same one doesn't appear again
    // (applies whether they got it right or wrong — they've now seen it)
    if(!isDynamicBonus&&loc&&loc.ch[chIdx]?.t==='quiz'){
      setSeenQuizzes(prev=>new Set([...prev,`${locId}_q_${chIdx}`]));
    }

    // Update Supabase
    if(!OFFLINE&&sb&&myTeam&&loc&&!isDynamicBonus){
      sb.from('completed_challenges').insert({team_id:myTeam.id,challenge_id:key,location_id:locId,challenge_type:loc.ch[chIdx]?.t,points_earned:totalPts});
      if(totalPts>0){
        sb.from('teams').update({score:(scores[myTeam.id]||0)+totalPts}).eq('id',myTeam.id);
      }
    }else if(!OFFLINE&&sb&&myTeam&&isDynamicBonus&&totalPts>0){
      // Still persist the team score update, but don't create a completed_challenges row
      sb.from('teams').update({score:(scores[myTeam.id]||0)+totalPts}).eq('id',myTeam.id);
    }
  };

  const activateGhost=()=>{
    if(ghost.used>=GHOST_MAX_USES)return;
    setGhost({active:true,timeLeft:GHOST_DURATION,used:ghost.used+1});
    addActivity('is als een geest verdwenen! 👻');
  };


  const startGame=()=>{
    setGameStart(Date.now());
    setPhase(1);
    setScreen('game');
    addActivity('Het spel is begonnen! 🎮');
    // V5: show intro story on first game start
    if(!storySeen.has('intro')){
      setStoryShown('intro');
      setStorySeen(prev=>new Set([...prev,'intro']));
    }
  };

  // V5: auto-show narrative on phase changes (only once per phase)
  useEffect(()=>{
    if(phase<1||phase>4)return;
    const key='phase'+phase;
    if(storySeen.has(key))return;
    // Delay slightly so the user isn't interrupted mid-interaction
    const t=setTimeout(()=>{
      setStoryShown(key);
      setStorySeen(prev=>new Set([...prev,key]));
    },1200);
    return()=>clearTimeout(t);
  },[phase]);

  // Completion counts
  const myScore=scores[myTeam?.id]||0;
  const myChallenges=Object.values(completed).reduce((sum,loc)=>sum+Object.keys(loc).length,0);

  // ═══════════ SPLASH ═══════════
  if(screen==='splash'){
    return(
      <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,background:'radial-gradient(circle at 30% 40%,rgba(0,212,255,0.15),transparent 50%),radial-gradient(circle at 70% 60%,rgba(255,215,0,0.1),transparent 50%),#0a0e27'}}>
        <div style={{fontSize:64,marginBottom:16,animation:'float 3s ease-in-out infinite'}}>🏙️</div>
        <h1 style={{fontSize:32,fontWeight:900,background:'linear-gradient(135deg,#00d4ff,#ffd700)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:8}}>STADSSPEL</h1>
        <h2 style={{fontSize:20,fontWeight:300,color:'#888',marginBottom:4}}>ROTTERDAM</h2>
        <div style={{fontSize:14,color:'#555',marginBottom:8}}>Jorik's Bachelor Party · 6 Juni 2026</div>
        <div style={{fontSize:10,color:'#a855f7',letterSpacing:2,marginBottom:40,fontWeight:800}}>V7 · DE VERLOREN RING</div>
        <button className="btn btn-cyan" onClick={()=>setScreen('setup')} style={{padding:'16px 48px',fontSize:16,borderRadius:16}}>
          START
        </button>
        <div style={{marginTop:40,fontSize:12,color:'#333'}}>102 locaties · 4 teams · 1 held</div>
      </div>
    );
  }

  // ═══════════ TEAM SETUP ═══════════
  if(screen==='setup'){
    return <TeamSetup teams={teams} setTeams={setTeams} onJoin={(team)=>{setMyTeam(team);setScreen('lobby')}} isAdmin={isAdmin}/>;
  }

  // ═══════════ LOBBY ═══════════
  if(screen==='lobby'){
    return(
      <div style={{height:'100%',display:'flex',flexDirection:'column',padding:24,paddingTop:48}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:14,color:'#00d4ff',fontWeight:600,marginBottom:4}}>LOBBY</div>
          <h1 style={{fontSize:24,fontWeight:800}}>Wachten op Game Master...</h1>
          <p style={{fontSize:13,color:'#666',marginTop:8}}>Startlocatie: Maritiem Museum, Leuvehaven</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:32}}>
          {teams.map((t,i)=>(
            <div key={i} className="glass animate-in" style={{padding:20,textAlign:'center',animationDelay:`${i*0.1}s`,borderLeft:`3px solid ${t.color}`}}>
              <div style={{fontSize:36,marginBottom:8}}>{t.emoji}</div>
              <div style={{fontWeight:700,fontSize:14}}>{t.name}</div>
              {t.id===myTeam?.id&&<div style={{fontSize:10,color:'#00d4ff',marginTop:4}}>Jouw team</div>}
            </div>
          ))}
        </div>
        {isAdmin&&<button className="btn btn-gold" onClick={startGame} style={{padding:16,fontSize:16}}>🎮 START HET SPEL</button>}
        {!isAdmin&&<div style={{textAlign:'center',fontSize:13,color:'#555'}}>De game master start het spel...</div>}
        {OFFLINE&&<div style={{textAlign:'center',marginTop:12}}><button className="btn btn-ghost" onClick={startGame} style={{fontSize:12}}>Demo: start zelf</button></div>}
      </div>
    );
  }

  // ═══════════ MAIN GAME ═══════════
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      {OFFLINE&&<div className="offline-banner">⚡ Offline Mode — Multiplayer uitgeschakeld</div>}
      {toast&&<div className="toast"><div className="toast-inner">{toast}</div></div>}
      {scorePopup&&<div className="score-popup">{scorePopup}</div>}

      {/* Game HUD */}
      <div style={{padding:'12px 16px',paddingTop:OFFLINE?28:12,background:'rgba(10,14,39,0.95)',borderBottom:'1px solid rgba(255,255,255,0.08)',display:'flex',alignItems:'center',justifyContent:'space-between',zIndex:100}}>
        <div>
          <div style={{fontSize:13,fontWeight:700}}>{myTeam?.emoji} {myTeam?.name}</div>
          <div style={{fontSize:11,color:'#888'}}>Fase {phase}/4 · {fmtHM(elapsed)}</div>
        </div>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:22,fontWeight:900,color:'#ffd700'}}>{myScore}</div>
          <div style={{fontSize:10,color:'#888'}}>{myChallenges} challenges</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:11,color:'#888'}}>{visitedLocs.size}/102 locaties</div>
          {ghost.active&&<div style={{fontSize:10,color:'#a855f7'}}>👻 {fmtTime(ghost.timeLeft)}</div>}
        </div>
      </div>

      {/* Phase progress */}
      <div className="phase-bar" style={{padding:'0 16px'}}>
        {[1,2,3,4].map(p=><div key={p} className={`phase-dot ${phase>p?'done':phase===p?'active':''}`}/>)}
      </div>

      {/* Tab content */}
      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {tab==='leaderboard'&&<LeaderboardView teams={teams} scores={scores} myTeam={myTeam} phase={phase} elapsed={elapsed} barBreak={barBreak} jorikInTeam={jorikInTeam} weddingDone={weddingDone} onShowWedding={()=>setShowWedding(true)} onShowStory={(k)=>setStoryShown(k)} pendingMine={pendingMine}/>}
        {tab==='map'&&<MapView pos={pos} completed={completed} visitedLocs={visitedLocs} onSelect={setSelLoc} ghost={ghost} onGhost={activateGhost} phase={phase} gpsStatus={gpsStatus} gpsSnap={gpsSnap} onWakeGps={wakeGps}/>}
        {tab==='activity'&&<ActivityView feed={activityFeed} myTeamId={myTeam?.id} onPhoto={setPhotoLightbox} filter={feedFilter} setFilter={setFeedFilter}/>}
        {tab==='review'&&isAdmin&&<AdminReviewView queue={reviewQueue} onApprove={approveReview} onReject={rejectReview} onPhoto={setPhotoLightbox}/>}
      </div>

      {/* V5: Narrative story modal */}
      {storyShown&&NARRATIVE[storyShown]&&(
        <StoryModal story={NARRATIVE[storyShown]} onClose={()=>setStoryShown(null)}/>
      )}

      {/* V5: Photo lightbox */}
      {photoLightbox&&<PhotoLightbox media={photoLightbox} onClose={()=>setPhotoLightbox(null)}/>}

      {/* Bottom sheet for challenges */}
      {selLoc!=null&&<ChallengeSheet loc={L_DATA.find(l=>l.id===selLoc)} pos={pos} completed={completed[selLoc]||{}} onComplete={completeChallenge} onClose={()=>setSelLoc(null)} jorikInTeam={jorikInTeam} seenQuizzes={seenQuizzes} isAdmin={isAdmin} myTeam={myTeam}/>}

      {/* Wedding video modal */}
      {showWedding&&<WeddingMission onClose={()=>setShowWedding(false)} onComplete={()=>{setWeddingDone(true);setShowWedding(false);completeChallenge(-1,0,WEDDING_VIDEO_BONUS);addActivity('Geheime bruiloftsvideo opgenomen! 🎬',WEDDING_VIDEO_BONUS)}} done={weddingDone}/>}

      {/* Tab bar */}
      <div className="tab-bar">
        {[
          {id:'leaderboard',icon:'🏆',label:'Ranking'},
          {id:'map',icon:'🗺️',label:'Kaart'},
          {id:'activity',icon:'📢',label:'Feed'},
          ...(isAdmin?[{id:'review',icon:'✅',label:'Beoordeel',badge:reviewQueue.length}]:[]),
        ].map(t=>(
          <button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)} style={{position:'relative'}}>
            <span className="tab-icon">{t.icon}</span>{t.label}
            {t.badge>0&&<span style={{position:'absolute',top:2,right:'25%',background:'#ff4444',color:'#fff',fontSize:9,fontWeight:800,padding:'2px 5px',borderRadius:9,minWidth:14,textAlign:'center'}}>{t.badge}</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// TEAM SETUP — V5: starter packs + custom
// ═══════════════════════════════════════════
function TeamSetup({teams,setTeams,onJoin,isAdmin}){
  const[mode,setMode]=useState('quick'); // 'quick' | 'custom'
  const[name,setName]=useState('');
  const[emoji,setEmoji]=useState('');
  const[color,setColor]=useState('');
  const usedEmojis=teams.map(t=>t.emoji);
  const usedNames=teams.map(t=>t.name.toLowerCase());

  const createFromPack=(pack)=>{
    if(usedEmojis.includes(pack.emoji)||usedNames.includes(pack.name.toLowerCase()))return;
    const team={id:Date.now(),name:pack.name,emoji:pack.emoji,color:pack.color,score:0};
    setTeams(prev=>[...prev,team]);
    if(!OFFLINE&&sb)sb.from('teams').insert({name:pack.name,emoji:pack.emoji,color:pack.color});
    onJoin(team);
  };

  const createCustom=()=>{
    if(!name||!emoji||!color)return;
    const team={id:Date.now(),name,emoji,color,score:0};
    setTeams(prev=>[...prev,team]);
    if(!OFFLINE&&sb)sb.from('teams').insert({name,emoji,color});
    onJoin(team);
  };

  return(
    <div style={{height:'100%',overflow:'auto',padding:24,paddingTop:48,paddingBottom:40}}>
      <div style={{textAlign:'center',marginBottom:24}}>
        <div style={{fontSize:48,marginBottom:12}}>🎮</div>
        <h1 style={{fontSize:24,fontWeight:800}}>Kies je team</h1>
        <p style={{fontSize:13,color:'#666',marginTop:8}}>Tik op een starter pack of maak eigen team</p>
      </div>

      {/* Mode toggle */}
      <div style={{display:'flex',gap:8,marginBottom:16,padding:4,background:'rgba(255,255,255,0.05)',borderRadius:12}}>
        <button onClick={()=>setMode('quick')} style={{flex:1,padding:10,borderRadius:10,border:'none',background:mode==='quick'?'rgba(0,212,255,0.2)':'transparent',color:mode==='quick'?'#00d4ff':'#888',fontWeight:700,fontSize:13,cursor:'pointer'}}>⚡ Snel</button>
        <button onClick={()=>setMode('custom')} style={{flex:1,padding:10,borderRadius:10,border:'none',background:mode==='custom'?'rgba(0,212,255,0.2)':'transparent',color:mode==='custom'?'#00d4ff':'#888',fontWeight:700,fontSize:13,cursor:'pointer'}}>✏️ Eigen</button>
      </div>

      {mode==='quick'&&(
        <div>
          <div style={{fontSize:11,color:'#888',fontWeight:600,marginBottom:8,letterSpacing:1}}>STARTER PACKS</div>
          <div className="starter-grid">
            {STARTER_PACKS.map((p,i)=>{
              const taken=usedEmojis.includes(p.emoji)||usedNames.includes(p.name.toLowerCase());
              return(
                <button key={i} className={`starter-card animate-in animate-in-${(i%4)+1} ${taken?'taken':''}`}
                  onClick={()=>createFromPack(p)} disabled={taken}
                  style={{border:`2px solid ${taken?'transparent':'rgba(255,255,255,0.08)'}`}}>
                  <div className="starter-emoji">{p.emoji}</div>
                  <div className="starter-name">{p.name}</div>
                  <div className="starter-color" style={{background:p.color}}/>
                  {taken&&<div style={{fontSize:9,color:'#666',marginTop:4}}>bezet</div>}
                </button>
              );
            })}
          </div>
          <div style={{textAlign:'center',marginTop:8,fontSize:11,color:'#555'}}>of ga naar <a onClick={()=>setMode('custom')} style={{color:'#00d4ff',cursor:'pointer',textDecoration:'underline'}}>eigen team</a></div>
        </div>
      )}

      {mode==='custom'&&(
        <>
          <div className="glass" style={{padding:16,marginBottom:12}}>
            <label style={{fontSize:12,color:'#888',fontWeight:600,display:'block',marginBottom:8}}>TEAMNAAM</label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Bijv. De Maffiosi"
              style={{width:'100%',padding:12,borderRadius:10,border:'1px solid rgba(255,255,255,0.15)',background:'rgba(255,255,255,0.05)',color:'#fff',fontSize:16,outline:'none'}}/>
          </div>

          <div className="glass" style={{padding:16,marginBottom:12}}>
            <label style={{fontSize:12,color:'#888',fontWeight:600,display:'block',marginBottom:8}}>TEAM ICOON</label>
            <div className="emoji-grid">
              {TEAM_EMOJIS.map(e=>(
                <button key={e} className={`emoji-btn ${emoji===e?'selected':''} ${usedEmojis.includes(e)&&emoji!==e?'taken':''}`}
                  onClick={()=>!usedEmojis.includes(e)&&setEmoji(e)} disabled={usedEmojis.includes(e)&&emoji!==e}>{e}</button>
              ))}
            </div>
          </div>

          <div className="glass" style={{padding:16,marginBottom:16}}>
            <label style={{fontSize:12,color:'#888',fontWeight:600,display:'block',marginBottom:8}}>TEAM KLEUR</label>
            <div className="color-grid">
              {TEAM_COLORS.map(c=>(
                <button key={c.hex} className={`color-btn ${color===c.hex?'selected':''}`}
                  style={{background:c.hex}} onClick={()=>setColor(c.hex)}/>
              ))}
            </div>
          </div>

          <button className="btn btn-cyan" onClick={createCustom} disabled={!name||!emoji||!color}
            style={{width:'100%',padding:16,fontSize:16,borderRadius:14}}>
            Team Aanmaken & Joinen
          </button>
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════
// LEADERBOARD VIEW (Primary tab)
// ═══════════════════════════════════════════
function LeaderboardView({teams,scores,myTeam,phase,elapsed,barBreak,jorikInTeam,weddingDone,onShowWedding,onShowStory,pendingMine}){
  const sorted=[...teams].map(t=>({...t,score:scores[t.id]||0})).sort((a,b)=>b.score-a.score);
  // V5: map current phase to the relevant narrative entry
  const phaseKey=phase>=1&&phase<=4?`phase${phase}`:null;
  const phaseStory=phaseKey?NARRATIVE[phaseKey]:null;

  return(
    <div style={{height:'100%',overflowY:'auto',padding:16,paddingBottom:90}}>
      {/* V5: narrative ticker */}
      {phaseStory&&(
        <div className="story-ticker" onClick={()=>onShowStory&&onShowStory(phaseKey)} style={{cursor:'pointer'}}>
          <div style={{fontSize:10,fontWeight:800,color:'#a855f7',letterSpacing:1,marginBottom:4}}>{phaseStory.chapter}</div>
          <div style={{fontWeight:700,color:'#fff',marginBottom:3,fontStyle:'normal'}}>{phaseStory.title}</div>
          <div style={{fontSize:11,color:'#888',fontStyle:'italic'}}>Tik voor verhaal →</div>
        </div>
      )}
      {/* V6: pending review badge for own team */}
      {pendingMine>0&&(
        <div className="glass" style={{padding:10,marginBottom:10,borderColor:'rgba(255,215,0,0.3)',display:'flex',alignItems:'center',gap:10}}>
          <div style={{fontSize:18}}>⏳</div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:'#ffd700',fontWeight:700}}>{pendingMine} foto{pendingMine===1?'':"'s"} in beoordeling</div>
            <div style={{fontSize:10,color:'#888',marginTop:2}}>Punten zijn voorlopig toegekend · game master kan ze afkeuren</div>
          </div>
        </div>
      )}

      {/* Bar break countdown */}
      {barBreak&&(
        <div className="glass" style={{padding:14,marginBottom:14,textAlign:'center',borderColor:'rgba(255,215,0,0.3)'}}>
          <div style={{fontSize:11,color:'#ffd700',fontWeight:700}}>🍺 VOLGENDE BAR BREAK</div>
          <div style={{fontSize:16,fontWeight:700,marginTop:4}}>{barBreak.name}</div>
        </div>
      )}

      {/* Wedding video mission - only when Jorik is NOT in team */}
      {!jorikInTeam&&!weddingDone&&(
        <div className="secret-banner" onClick={onShowWedding}>
          <div className="secret-badge">🤫 GEHEIME MISSIE</div>
          <div style={{fontWeight:700,fontSize:14}}>Bruiloftsvideo opnemen</div>
          <div style={{fontSize:12,color:'#888',marginTop:4}}>Tik hier voor instructies · +{WEDDING_VIDEO_BONUS} pts</div>
        </div>
      )}
      {weddingDone&&(
        <div className="glass" style={{padding:14,marginBottom:14,borderColor:'rgba(0,255,136,0.3)'}}>

// ═══════════════════════════════════════════
// MAP VIEW
// ═══════════════════════════════════════════
function MapView({pos,completed,visitedLocs,onSelect,ghost,onGhost,phase,gpsStatus,gpsSnap,onWakeGps}){
  const mapRef=useRef(null);
  const mapInst=useRef(null);
  const markersRef=useRef([]);
  const userMarkerRef=useRef(null);

  // Init map
  useEffect(()=>{
    if(!mapRef.current||mapInst.current)return;
    const m=L.map(mapRef.current).setView([START_POS.lat,START_POS.lng],15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'',maxZoom:19}).addTo(m);

    // Add all location markers
    L_DATA.forEach(loc=>{
      const mk=L.marker([loc.la,loc.lo],{
        icon:L.divIcon({className:'',iconAnchor:[18,18],interactive:true,
          html:`<div style="font-size:28px;display:flex;align-items:center;justify-content:center;width:36px;height:36px;cursor:pointer;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))">${loc.e}</div>`
        })
      }).addTo(m);
      mk.on('click',()=>onSelect(loc.id));
      mk._locId=loc.id;
      markersRef.current.push(mk);
    });

    // Dinner zone circle (phase 4)
    L.circle([DINNER_ZONE.lat,DINNER_ZONE.lng],{radius:DINNER_ZONE.r,color:'#ffd700',fillColor:'#ffd700',fillOpacity:0.05,weight:2,dashArray:'8 4'}).addTo(m);

    mapInst.current=m;
  },[]);

  // Update user position
  useEffect(()=>{
    if(!mapInst.current||!pos)return;
    if(userMarkerRef.current)mapInst.current.removeLayer(userMarkerRef.current);
    userMarkerRef.current=L.marker([pos.lat,pos.lng],{
      icon:L.divIcon({className:'',iconAnchor:[12,12],
        html:'<div style="width:24px;height:24px;border-radius:50%;background:#00d4ff;border:3px solid white;box-shadow:0 0 15px rgba(0,212,255,0.8);animation:pulse 2s infinite"></div>'
      })
    }).addTo(mapInst.current);
  },[pos]);

  // Get nearby challenges
  const nearby=getNearby(pos,completed);

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',position:'relative'}}>
      <div ref={mapRef} style={{flex:1}}/>

      {/* V5.1: GPS status pill — tap to force-wake when sleeping */}
      <div className="gps-pill" onClick={()=>onWakeGps&&onWakeGps()} style={{cursor:'pointer'}} title="Tik om GPS te wekken">
        <span className={`gps-dot ${gpsStatus||'weak'}`}/>
        {gpsStatus==='good'?'GPS goed':gpsStatus==='sleep'?'GPS rust':'GPS zwak'}
        {gpsSnap&&<span style={{color:'#00d4ff'}}>· op {gpsSnap}</span>}
        {gpsStatus==='sleep'&&<span className="snap-btn">tik om te wekken</span>}
      </div>

      {/* Ghost mode button */}
      <div style={{position:'absolute',top:10,right:10,zIndex:1000}}>
        <button className={`btn ${ghost.active?'btn-danger':'btn-ghost'}`} onClick={onGhost} disabled={ghost.used>=GHOST_MAX_USES&&!ghost.active}
          style={{fontSize:12,padding:'8px 14px',borderRadius:10}}>
          {ghost.active?`👻 ${fmtTime(ghost.timeLeft)}`:`👻 Ghost (${GHOST_MAX_USES-ghost.used} over)`}
        </button>
      </div>

      {/* Nearby challenges panel */}
      <div className="nearby-panel">
        <div style={{fontSize:11,color:'#888',fontWeight:600,marginBottom:6,padding:'0 4px'}}>
          DICHTBIJ
        </div>
        {nearby.map(loc=>(
          <div key={loc.id} className="nearby-card" onClick={()=>onSelect(loc.id)}>
            <div className="nearby-emoji">{loc.e}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13}}>{loc.n}</div>
              <div style={{fontSize:11,color:'#888'}}>{loc.ch.length} challenges · {loc.ch.reduce((s,c)=>s+c.p,0)} pts</div>
            </div>
            <div className="nearby-dist">{fmtDist(loc.dist)}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// CHALLENGE BOTTOM SHEET — V5: dynamic quiz rotation + photo feed
// ═══════════════════════════════════════════
function ChallengeSheet({loc,pos,completed,onComplete,onClose,seenQuizzes,isAdmin,myTeam}){
  if(!loc)return null;
  const dist=pos?haversine(pos.lat,pos.lng,loc.la,loc.lo):null;
  const hasPhotoCompleted=loc.ch.some((ch,i)=>(ch.t==='photo'||ch.t==='video'||ch.t==='creative')&&completed[i]);

  // V5: compute the quiz to show for this visit (rotate through unseen)
  // We render one rotating-quiz slot that replaces all the location's built-in quizzes.
  // Built-in quiz indexes and a virtual index 'rotatedQuiz' for the dynamic slot.
  const locQuizIndexes=loc.ch.map((c,i)=>c.t==='quiz'?i:-1).filter(i=>i>=0);
  const allLocQuizzesDone=locQuizIndexes.length>0&&locQuizIndexes.every(i=>completed[i]);
  // The rotated quiz is only relevant once all built-in quizzes are done; then we draw from the pool
  const rotatedQuiz=allLocQuizzesDone?pickQuiz(loc,seenQuizzes||new Set()):null;

  return(
    <>
      <div className="sheet-overlay" onClick={onClose}/>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:16}}>
          <div>
            <div style={{fontSize:28,marginBottom:4}}>{loc.e}</div>
            <h2 style={{fontSize:20,fontWeight:800}}>{loc.n}</h2>
            <div style={{display:'flex',gap:8,marginTop:6,alignItems:'center'}}>
              <span style={{fontSize:11,padding:'2px 8px',borderRadius:6,background:'rgba(0,212,255,0.15)',color:'#00d4ff'}}>{loc.c}</span>
              {dist!=null&&<span style={{fontSize:12,color:'#888'}}>{fmtDist(dist)}</span>}
            </div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#666',fontSize:28,cursor:'pointer',padding:4}}>✕</button>
        </div>

        {loc.ch.map((ch,idx)=>{
          const done=completed[idx];
          const isQuiz=ch.t==='quiz';
          const locked=isQuiz&&!hasPhotoCompleted;

          return(
            <div key={idx} className={`ch-card ${done?'completed':''} ${locked?'locked':''}`} style={{position:'relative'}}>
              {locked&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:1,fontSize:14,color:'#ffd700',fontWeight:700}}>🔒 Eerst een foto-opdracht!</div>}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:8}}>
                <div style={{flex:1}}>
                  <span className={`ch-type ch-type-${ch.t}`}>{ch.t}</span>
                  <h3 style={{fontSize:15,fontWeight:700,marginTop:6}}>{ch.ti}</h3>
                </div>
                <div className="points-badge">+{ch.p}</div>
              </div>
              <p style={{fontSize:13,color:'#aaa',marginBottom:10,lineHeight:1.4}}>{ch.d}</p>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div className="difficulty"><span className="star">{stars(ch.df)}</span> {ch.df}</div>
                {done&&<div style={{fontSize:13,color:'#00ff88',fontWeight:700}}>✓ Voltooid</div>}
              </div>
              {!done&&!locked&&<ChallengeAction ch={ch} locId={loc.id} chIdx={idx} onComplete={onComplete} dist={dist} isAdmin={isAdmin} loc={loc} myTeam={myTeam}/>}
            </div>
          );
        })}

        {/* V5: dynamic rotating-quiz slot once built-in quizzes are exhausted */}
        {rotatedQuiz&&hasPhotoCompleted&&(
          <div className="ch-card" style={{borderColor:'rgba(255,215,0,0.3)',background:'rgba(255,215,0,0.04)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:8}}>
              <div style={{flex:1}}>
                <span className="ch-type ch-type-quiz">🎲 BONUS QUIZ</span>
                <h3 style={{fontSize:15,fontWeight:700,marginTop:6}}>{rotatedQuiz.ti}</h3>
              </div>
              <div className="points-badge">+{rotatedQuiz.p}</div>
            </div>
            <p style={{fontSize:13,color:'#aaa',marginBottom:10,lineHeight:1.4}}>{rotatedQuiz.d}</p>
            <div style={{fontSize:11,color:'#888',marginBottom:8,fontStyle:'italic'}}>
              {rotatedQuiz._pool?'🎯 Bonus Rotterdam-vraag':'⭐ Extra vraag voor deze plek'}
            </div>
            <ChallengeAction ch={rotatedQuiz} locId={loc.id} chIdx={`dyn_${loc.id}_${Date.now()}`} dist={dist} isAdmin={isAdmin} loc={loc} myTeam={myTeam} onComplete={(lid,cidx,pts,photo)=>{
              // Dynamic-quiz rewards: award points, log activity, but do NOT mark built-in challenge
              onComplete(lid,-99,pts,photo);
            }}/>
          </div>
        )}
      </div>
    </>
  );
}

function ChallengeAction({ch,locId,chIdx,onComplete,dist,isAdmin,loc,myTeam}){
  const fileRef=useRef(null);
  const[preview,setPreview]=useState(null);
  const[quizAnswer,setQuizAnswer]=useState(null);
  const[quizFeedback,setQuizFeedback]=useState(null);
  const[processing,setProcessing]=useState(false);

  // V6: GPS gate — for media challenges only. Quizzes don't gate.
  const isMedia=ch.t==='photo'||ch.t==='video'||ch.t==='creative';
  const gateRadius=PHOTO_GATE_RADIUS+PHOTO_GATE_GRACE; // 50 + 20 = 70m total
  const tooFar=isMedia&&!isAdmin&&dist!=null&&dist>gateRadius;

  const handleFile=async(e)=>{
    const f=e.target.files[0];
    if(!f)return;
    setProcessing(true);
    const r=new FileReader();
    r.onload=async(ev)=>{
      const raw=ev.target.result;
      let shareable=raw;
      if(!isVideoData(raw)){
        shareable=await compressPhoto(raw,640,0.6);
      }else if(raw.length>700000){
        shareable=null;
      }
      setPreview(raw);
      setProcessing(false);

      // V6: Insert a photo_review row into Supabase for the admin queue
      if(!OFFLINE&&sb&&myTeam&&isMedia){
        const reviewRow={
          team_id:myTeam.id,
          team_name:myTeam.name,
          team_emoji:myTeam.emoji,
          team_color:myTeam.color,
          location_id:locId,
          location_name:loc?.n||'',
          challenge_idx:typeof chIdx==='number'?chIdx:-99,
          challenge_title:ch.ti,
          challenge_type:ch.t,
          gps_distance:dist!=null?Math.round(dist):null,
          points_awarded:ch.p,
          photo_url:shareable&&shareable.length<800000?shareable:null,
          status:'pending',
        };
        sb.from('photo_reviews').insert(reviewRow).then(()=>{},()=>{/* table may not exist yet — silent */});
      }

      onComplete(locId,chIdx,ch.p,shareable);
    };
    r.onerror=()=>{setProcessing(false);onComplete(locId,chIdx,ch.p,null)};
    r.readAsDataURL(f);
  };

  // V7: one shot. Correct → full points. Wrong → 0 pts, challenge marked done.
  const handleQuiz=opt=>{
    if(quizAnswer)return;
    setQuizAnswer(opt);
    if(opt===ch.a){
      setQuizFeedback('correct');
      setTimeout(()=>onComplete(locId,chIdx,ch.p,null),700);
    }else{
      setQuizFeedback('wrong');
      // Reveal the correct answer during feedback, then mark done with 0 pts
      setTimeout(()=>onComplete(locId,chIdx,0,null),QUIZ_WRONG_FEEDBACK_MS);
    }
  };

  if(ch.t==='quiz'){
    return(
      <div style={{marginTop:12}}>
        <div style={{fontSize:11,color:'#888',marginBottom:8,fontStyle:'italic'}}>
          ⚡ Eén kans — fout gegokt = 0 pts
        </div>
        {ch.o.map((opt,i)=>{
          const isChosen=quizAnswer===opt;
          const isRightAnswer=opt===ch.a;
          // During wrong-feedback, highlight the correct answer in green too
          const revealRight=quizFeedback==='wrong'&&isRightAnswer;
          return(
            <button key={i}
              className={`quiz-option ${isChosen?(quizFeedback==='correct'?'correct':'wrong'):''} ${revealRight?'correct':''}`}
              onClick={()=>handleQuiz(opt)}
              disabled={!!quizAnswer}>
              {opt}{revealRight&&<span style={{marginLeft:8,fontSize:11,fontWeight:700}}>← juist</span>}
            </button>
          );
        })}
        {quizFeedback==='wrong'&&<div style={{fontSize:13,color:'#ff4444',marginTop:8,fontWeight:600}}>❌ Helaas. Het juiste antwoord was: {ch.a} · 0 pts</div>}
        {quizFeedback==='correct'&&<div style={{fontSize:13,color:'#00ff88',marginTop:8,fontWeight:600}}>✅ Correct! +{ch.p} pts</div>}
      </div>
    );
  }

  // V6: GPS gate UI when too far
  if(tooFar){
    const need=Math.round(dist-gateRadius);
    return(
      <div className="gate-blocked">
        <div className="gate-icon">📍</div>
        <div style={{flex:1}}>
          <div className="gate-text">Loop dichterbij om de foto te maken</div>
          <div className="gate-hint">Je staat {Math.round(dist)}m weg · max {gateRadius}m toegestaan</div>
        </div>
        <div className="gate-distance">-{need}m</div>
      </div>
    );
  }

  const accept=ch.t==='video'?'video/*':ch.t==='creative'?'image/*,video/*':'image/*';
  return(
    <div style={{marginTop:12}}>
      <input ref={fileRef} type="file" accept={accept} capture="environment" style={{display:'none'}} onChange={handleFile}/>
      <button className="btn btn-cyan" onClick={()=>fileRef.current?.click()} disabled={processing} style={{width:'100%'}}>
        {processing?'⏳ Verwerken...':ch.t==='video'?'🎬 Video Opnemen':ch.t==='creative'?'📸 Foto/Video Maken':'📸 Foto Maken'}
      </button>
      {isAdmin&&dist!=null&&dist>gateRadius&&(
        <div style={{fontSize:11,color:'#ff6b35',marginTop:6,textAlign:'center'}}>⚠️ Admin override · normaal {Math.round(dist)}m te ver</div>
      )}
      {!isAdmin&&isMedia&&dist!=null&&dist<=gateRadius&&(
        <div style={{fontSize:11,color:'#00ff88',marginTop:6,textAlign:'center'}}>✓ Je bent op locatie ({Math.round(dist)}m)</div>
      )}
      {preview&&(isVideoData(preview)
        ?<video src={preview} className="photo-preview" controls muted/>
        :<img src={preview} className="photo-preview" alt="preview"/>)}
    </div>
  );
}

// ═══════════════════════════════════════════

function WeddingMission({onClose,onComplete,done}){

          <div style={{fontSize:48,marginBottom:12}}>🤫🎬</div>
          <h2 style={{fontSize:22,fontWeight:800,background:'linear-gradient(135deg,#a855f7,#ff6b35)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>GEHEIME MISSIE</h2>
          <div style={{fontSize:14,color:'#888',marginTop:8}}>Bruiloftsvideo voor Jorik</div>
        </div>

        <div className="glass" style={{padding:16,marginBottom:16}}>

          <p style={{fontSize:13,color:'#ccc',lineHeight:1.6}}>
            Neem een video op met jullie team. Dit wordt onderdeel van een verrassingsvideo die op Jorik's bruiloft wordt vertoond.
          </p>
          <p style={{fontSize:13,color:'#ff6b35',fontWeight:600,marginTop:12}}>
            ⚠️ Doe dit ALLEEN wanneer Jorik NIET bij jullie team is!
          </p>
          <p style={{fontSize:13,color:'#888',marginTop:12,fontStyle:'italic'}}>
            Het script wordt later nog toegevoegd door de organisatie.
          </p>
        </div>

        <div style={{padding:16}}>
          {!done&&!uploaded&&(

              <button className="btn btn-cyan" onClick={()=>fileRef.current?.click()} style={{width:'100%',padding:16}}>

        <button className="btn btn-ghost" onClick={onClose} style={{width:'100%',marginTop:8}}>Sluiten</button>

}
