      setScores(prev=>({...prev,[t.id]:t.score||0}));
      if(t.id!==myTeam?.id){
        setToast(`${t.emoji} ${t.name}: ${t.score} pts`);
      }
    }).subscribe();

    // V19: teams DELETE — admin pruned a team. Propagate cleanly: drop it
    // from teams+scores on every phone, and if it was MY team, kick me back to
    // setup with a clear message instead of leaving a ghost myTeam behind.
    const teamDeleteSub=sb.channel('teams-delete').on('postgres_changes',{event:'DELETE',schema:'public',table:'teams'},payload=>{
      const t=payload.old||{};
      if(t.id==null)return;
      setTeams(prev=>prev.filter(p=>p.id!==t.id));
      setScores(prev=>{const n={...prev};delete n[t.id];return n;});
      if(myTeam?.id===t.id){
        setToast('Je team is verwijderd door de Game Master');
        setMyTeam(null);
        clearSession();
        setScreen('setup');
      }
    }).subscribe();

    // V12: game_state sync — admin's START/BAR BREAK/FINALE broadcast to every phone
    const gsSub=sb.channel('game-state').on('postgres_changes',{event:'UPDATE',schema:'public',table:'game_state'},payload=>{
      const gs=payload.new;
      if(gs.phase>=1){
        setPhase(gs.phase);
        if(!gameStart&&gs.started_at)setGameStart(new Date(gs.started_at).getTime());
        // V14 (A2): when a player transitions from lobby to game via admin broadcast,
        // they miss the PROLOOG (only admin's local startGame() triggers it).
        // Queue intro first so every phone gets the narrative setup.
        setScreen(s=>{
          if(s==='lobby'){
            setStorySeen(prev=>{
              if(!prev.has('intro')){
                setStoryShown('intro');
                return new Set([...prev,'intro']);
              }
              return prev;
            });
            return 'game';
          }
          return s;
        });
      }
      if(gs.jorik_team_id!==undefined){
        // V21: stamp the persisted server-side clock when the Jorik holder
        // changes. Every device reads the same `jorik_moved_at` so the
        // countdown no longer drifts per-device. Fallback to Date.now() only
        // if the column doesn't ship yet (pre-v21 migration).
        setJorikTeamId(prev=>{
          if(prev!==gs.jorik_team_id){
            const persisted=gs.jorik_moved_at?new Date(gs.jorik_moved_at).getTime():null;
            setJorikMovedAt(persisted&&!isNaN(persisted)?persisted:Date.now());
          }
          return gs.jorik_team_id;
        });
      }
      if(gs.bar_break_active){
        // Someone (admin) started a bar break — show the overlay
        // V20: seed 3-of-6 pick so every client sees the same minis
        const startedMs=gs.bar_break_started_at?new Date(gs.bar_break_started_at).getTime():Date.now();
        const minis=defaultBarMinis(gs.bar_break_active,startedMs);
        setBarBreakActive({name:gs.bar_break_active,mini:minis,started:startedMs});
        setBarBreak({name:gs.bar_break_active,time:Date.now()});
      }else{
        // Admin cleared the bar break
        setBarBreakActive(null);
      }
      // V21 P1-fix #35: pick up admin's heartbeat on every game_state UPDATE
      if(gs.gm_heartbeat){
        const hb=new Date(gs.gm_heartbeat).getTime();
        if(!isNaN(hb))setGmLastSeen(hb);
      }
    }).subscribe();
    const actSub=sb.channel('activity').on('postgres_changes',{event:'INSERT',schema:'public',table:'activity_feed'},payload=>{
      // V22 P0 fix: dedup optimistic-append vs realtime-echo.
      // addActivity() and broadcastMessage() both prepend a local entry BEFORE
      // the server INSERT so the author sees instant feedback. The same INSERT
      // then comes back via this subscription — without dedup the author's own
      // row appears twice. We compare by composite key since the client keeps
      // the exact created_at it sent to the server.
      setActivityFeed(prev=>{
        const n=payload.new;
        const key=`${n.created_at}|${n.team_id}|${n.message}`;
        if(prev.some(a=>`${a.created_at}|${a.team_id}|${a.message}`===key))return prev;
        // V21: cap at 500 (see addActivity for rationale)
        return[n,...prev].slice(0,500);
      });
      // V10: parse Jorik system broadcasts (fallback if game_state field not available)
      const msg=payload.new.message||'';
      const m=msg.match(/^\[JORIK\] team=(\d+|null)/);
      if(m){setJorikTeamId(m[1]==='null'?null:parseInt(m[1],10))}
    }).subscribe();

    // V21 P0: initial fetch of activity_feed. Without this, any late-joining
    // phone (or anyone who refreshed mid-game) sees an empty feed until new
    // events trickle in. FinaleScreen's MVP awards iterate the full feed, so
    // a missing early-game load made Foto-koning / Ontdekkingsreiziger /
    // Grootste schot incorrect on every reloaded client.
    sb.from('activity_feed').select('*').order('created_at',{ascending:false}).limit(500).then(res=>{
      if(res.data&&res.data.length){
        setActivityFeed(prev=>{
          // Merge: dedupe by created_at+team_id+message composite key (activity_feed has no PK on the client realtime payload)
          const seen=new Set(prev.map(a=>`${a.created_at}|${a.team_id}|${a.message}`));
          const merged=[...prev];
          res.data.forEach(a=>{
            const k=`${a.created_at}|${a.team_id}|${a.message}`;
            if(!seen.has(k)){merged.push(a);seen.add(k);}
          });
          // Sort desc by created_at and cap
          merged.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
          return merged.slice(0,500);
        });
      }
    },()=>{/* table missing / network error — silent */});

    // V6: subscribe to photo_reviews — for admin queue + per-team rejection notices
    const reviewInsertSub=sb.channel('reviews_insert').on('postgres_changes',{event:'INSERT',schema:'public',table:'photo_reviews'},payload=>{
      const r=payload.new;
      if(isAdmin&&r.status==='pending'){
        setReviewQueue(prev=>[r,...prev]);
        // V23 (#50): ping + pulse the Beoordeel badge — but ONLY if admin is
        // not already viewing the review queue (don't nag). Use tabRef so this
        // long-lived subscribe closure always sees the current tab.
        if(tabRef.current!=='review'){
          setReviewFlashTs(Date.now());
          playReviewPing();
        }
      }
      if(r.team_id===myTeam?.id&&r.status==='pending'){
        setPendingMine(c=>c+1);
      }
    }).subscribe();
    const reviewUpdateSub=sb.channel('reviews_update').on('postgres_changes',{event:'UPDATE',schema:'public',table:'photo_reviews'},payload=>{
      const r=payload.new;
      // Remove from admin queue once decided
      if(isAdmin)setReviewQueue(prev=>prev.filter(x=>x.id!==r.id));
      // Notify the affected team
      if(r.team_id===myTeam?.id){
        setPendingMine(c=>Math.max(0,c-1));
        if(r.status==='rejected'){
          setToast(`❌ Foto "${r.challenge_title}" afgekeurd · -${r.points_awarded} pts`);
          // V21 P0: DO NOT subtract locally here. The canonical score change is
          // already applied via the RPC inside rejectReview's `commit` (which calls
          // applyScoreDelta). That in turn triggers a teams UPDATE realtime event
          // which reconciles the score. Adding a local subtract here caused a
          // race-conditional double-penalty (2× the points_awarded) on the
          // target team because the teams UPDATE could arrive before OR after
          // this handler. Keep the toast; drop the write.
        }else if(r.status==='approved'){
          setToast(`✅ Foto "${r.challenge_title}" goedgekeurd!`);
        }
      }
    }).subscribe();

    // Initial fetch for admin: pending reviews already in the table
    if(isAdmin){
      sb.from('photo_reviews').select('*').eq('status','pending').order('created_at',{ascending:false}).then(res=>{
        if(res.data)setReviewQueue(res.data);
      },()=>{/* table missing — silent */});
    }

    // V21 P0: rehydrate completed_challenges for myTeam on mount. Without this,
    // a mid-game refresh wiped `completed`/`completedPts` locally → players could
    // re-open already-solved quizzes and get double-credit before the 23505
    // unique-constraint catch fired (the RPC had already dispatched the delta).
    // Also reseeds visitedLocs so the map shows visited POIs correctly.
    if(myTeam?.id&&!myTeam.spectator&&myTeam.id>0){
      sb.from('completed_challenges').select('challenge_id,location_id,points_earned').eq('team_id',myTeam.id).then(res=>{
        if(!res.data||!res.data.length)return;
        const compMap={};
        const ptsMap={};
        const visited=new Set();
        res.data.forEach(row=>{
          // challenge_id is "${locId}_${chIdx}" — parse both fields defensively
          const m=String(row.challenge_id||'').match(/^(-?\d+)_(-?\d+)$/);
          if(!m)return;
          const locId=parseInt(m[1],10);
          const chIdx=parseInt(m[2],10);
          if(!Number.isFinite(locId)||!Number.isFinite(chIdx))return;
          compMap[locId]={...(compMap[locId]||{}),[chIdx]:true};
          ptsMap[locId]={...(ptsMap[locId]||{}),[chIdx]:row.points_earned||0};
          if(locId>0)visited.add(locId);
        });
        // Merge (local state wins for anything it already has — the DB is authoritative for what's persisted)
        setCompleted(prev=>{
          const next={...compMap};
          Object.keys(prev).forEach(k=>{next[k]={...(next[k]||{}),...prev[k]};});
          return next;
        });
        setCompletedPts(prev=>{
          const next={...ptsMap};
          Object.keys(prev).forEach(k=>{next[k]={...(next[k]||{}),...prev[k]};});
          return next;
        });
        setVisitedLocs(prev=>{const s=new Set(prev);visited.forEach(v=>s.add(v));return s;});
      },()=>{/* table missing / network error — silent */});
    }
    return()=>{
      teamSub.unsubscribe();teamInsertSub.unsubscribe();teamDeleteSub.unsubscribe();gsSub.unsubscribe();actSub.unsubscribe();
      reviewInsertSub.unsubscribe();reviewUpdateSub.unsubscribe();
    };
  },[myTeam,isAdmin]);

  // V22 audit fix (cross-device sweep, iOS+Network agents): when the tab has been
  // backgrounded, Supabase realtime can miss events (iOS Safari discards WebSockets
  // aggressively; Android Chrome deprioritizes them). On visibilitychange→visible we
  // catch up by refetching the four canonical sources of truth. This is additive to the
  // realtime channels (which will ALSO auto-reconnect) — worst case we do one extra
  // round-trip, best case we prevent a stale leaderboard / missed bar-break / lost
  // photo approval.
  useEffect(()=>{
    if(OFFLINE||!sb||!myTeam?.id)return;
    const onVisible=()=>{
      if(document.hidden)return;
      // step 1 — game_state: phase, bar-break, jorik, heartbeat
      sb.from('game_state').select('*').eq('id',1).maybeSingle().then(({data:gs})=>{
        if(!gs)return;
        if(typeof gs.phase==='number')setPhase(gs.phase);
        if(gs.bar_break_active){
          const startedMs=gs.bar_break_started_at?new Date(gs.bar_break_started_at).getTime():Date.now();
          if(!barBreakActive||barBreakActive.name!==gs.bar_break_active||barBreakActive.started!==startedMs){
            setBarBreakActive({name:gs.bar_break_active,mini:defaultBarMinis(gs.bar_break_active,startedMs),started:startedMs});
          }
        }else if(barBreakActive){
          setBarBreakActive(null);
        }
        if(gs.jorik_team_id!==undefined)setJorikTeamId(gs.jorik_team_id);
        if(gs.jorik_moved_at){const t=new Date(gs.jorik_moved_at).getTime();if(!isNaN(t))setJorikMovedAt(t);}
        if(gs.gm_heartbeat){const t=new Date(gs.gm_heartbeat).getTime();if(!isNaN(t))setGmLastSeen(t);}
      },()=>{});
      // step 2 — teams: scores + spectator + underdog_bonus_last_break
      sb.from('teams').select('*').then(({data})=>{
        if(!data)return;
        setTeams(data);
        const sc={};data.forEach(t=>{sc[t.id]=t.score||0;});
        setScores(sc);
      },()=>{});
      // step 3 — activity_feed tail: catch up missed rows while backgrounded
      sb.from('activity_feed').select('*').order('created_at',{ascending:false}).limit(100).then(res=>{
        if(!res.data||!res.data.length)return;
        setActivityFeed(prev=>{
          const seen=new Set(prev.map(a=>`${a.created_at}|${a.team_id}|${a.message}`));
          const merged=[...prev];
          res.data.forEach(a=>{
            const k=`${a.created_at}|${a.team_id}|${a.message}`;
            if(!seen.has(k)){merged.push(a);seen.add(k);}
          });
          merged.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
          return merged.slice(0,500);
        });
      },()=>{});
      // step 4 — completed_challenges for myTeam: in case an approval fired while we were away
      if(myTeam.id>0&&!myTeam.spectator){
        sb.from('completed_challenges').select('challenge_id,location_id,points_earned').eq('team_id',myTeam.id).then(res=>{
          if(!res.data||!res.data.length)return;
          const compMap={};const ptsMap={};const visited=new Set();
          res.data.forEach(row=>{
            const m=String(row.challenge_id||'').match(/^(-?\d+)_(-?\d+)$/);
            if(!m)return;
            const locId=parseInt(m[1],10);const chIdx=parseInt(m[2],10);
            if(!Number.isFinite(locId)||!Number.isFinite(chIdx))return;
            compMap[locId]={...(compMap[locId]||{}),[chIdx]:true};
            ptsMap[locId]={...(ptsMap[locId]||{}),[chIdx]:row.points_earned||0};
            if(locId>0)visited.add(locId);
          });
          setCompleted(prev=>{const next={...compMap};Object.keys(prev).forEach(k=>{next[k]={...(next[k]||{}),...prev[k]};});return next;});
          setCompletedPts(prev=>{const next={...ptsMap};Object.keys(prev).forEach(k=>{next[k]={...(next[k]||{}),...prev[k]};});return next;});
          setVisitedLocs(prev=>{const s=new Set(prev);visited.forEach(v=>s.add(v));return s;});
        },()=>{});
      }
      // step 5 — admin-only: refresh pending review queue
      if(isAdmin){
        sb.from('photo_reviews').select('*').eq('status','pending').order('created_at',{ascending:false}).then(res=>{
          if(res.data)setReviewQueue(res.data);
        },()=>{});
      }
    };
    document.addEventListener('visibilitychange',onVisible);
    // Also fire on 'pageshow' — iOS Safari bfcache restore doesn't always trigger visibilitychange
    window.addEventListener('pageshow',onVisible);
    return()=>{
      document.removeEventListener('visibilitychange',onVisible);
      window.removeEventListener('pageshow',onVisible);
    };
  },[myTeam,isAdmin,barBreakActive]);

  // V6/V12: admin actions with undo window
  const[reviewUndo,setReviewUndo]=useState(null); // {row, action, deadline, timer, commit}
  // V18 audit-fix: if another review is pending-undo, immediately fire its commit
  // (we can't wait for a second undo slot — that would hide the first action forever)
  const flushPendingUndo=(prev)=>{
    if(!prev)return;
    clearTimeout(prev.timer);
    try{prev.commit&&prev.commit();}catch(e){/* swallow */}
  };
  // V23 (#49): commit a photo_reviews status update with single auto-retry on failure.
  // If the commit fails twice, re-queue the photo and surface a toast so the admin
  // can try again. `sideEffects` runs only on a successful commit (e.g. score delta,
  // activity feed insert for rejections) — this prevents the photo-rejection
  // double-penalty race from recurring when the update itself failed.
  const commitReview=(r,newStatus,sideEffects)=>{
    if(!sb)return;
    const doUpdate=()=>sb.from('photo_reviews')
      .update({status:newStatus,reviewed_at:new Date().toISOString()})
      .eq('id',r.id);
    const onFail=(err)=>{
      console.error('[photo_reviews]',newStatus,'commit failed:',err);
      // Put the photo back in the queue so the admin can retry.
      setReviewQueue(prev=>prev.some(x=>x.id===r.id)?prev:[r,...prev]);
      setToast(`⚠️ Kon foto niet ${newStatus==='approved'?'goedkeuren':'afkeuren'} — terug in wachtrij. Probeer opnieuw.`);
    };
    doUpdate().then(
      (res)=>{
        if(res&&res.error){
          // one retry with a 600ms delay
          setTimeout(()=>{
            doUpdate().then(
              (r2)=>{if(r2&&r2.error){onFail(r2.error)}else{try{sideEffects&&sideEffects()}catch(e){console.error('[review] side-effects threw:',e)}}},
              (err2)=>onFail(err2)
            );
          },600);
        }else{
          try{sideEffects&&sideEffects()}catch(e){console.error('[review] side-effects threw:',e)}
        }
      },
      (err)=>{
        // Network-level throw — same retry path
        setTimeout(()=>{
          doUpdate().then(
            (r2)=>{if(r2&&r2.error){onFail(r2.error)}else{try{sideEffects&&sideEffects()}catch(e){console.error('[review] side-effects threw:',e)}}},
            (err2)=>onFail(err2)
          );
        },600);
      }
    );
  };
  const approveReview=(r)=>{
    if(!sb)return;
    setReviewQueue(prev=>prev.filter(x=>x.id!==r.id));
    const commit=()=>commitReview(r,'approved',null);
    setReviewUndo(prev=>{flushPendingUndo(prev); const timer=setTimeout(()=>{commit();setReviewUndo(null);},10000); return{row:r,action:'approved',deadline:Date.now()+10000,timer,commit};});
  };
  const rejectReview=(r)=>{
    if(!sb)return;
    setReviewQueue(prev=>prev.filter(x=>x.id!==r.id));
    // V18 (§1.9.11): extended 5-min undo window for rejections — higher stakes than approvals
    const REJECT_UNDO_MS=300000;
    const commit=()=>commitReview(r,'rejected',()=>{
      if(REVIEW_REJECT_PENALTY){
        // V20: atomic negative delta. Also updates local scores immediately if this is my team.
        applyScoreDelta(r.team_id,-r.points_awarded);
      }
      // V21 P1-fix #19: post a visible reject-activity so the team sees WHY their score dropped.
      // addActivity() uses myTeam (the admin's team), so build the entry manually for the rejected team.
      if(!OFFLINE&&sb){
        const rejectedTeam=teams.find(t=>t.id===r.team_id);
        const penalty=REVIEW_REJECT_PENALTY?r.points_awarded:0;
        sb.from('activity_feed').insert({
          team_id:r.team_id,
          team_name:rejectedTeam?.name||r.team_name||'Team',
          team_emoji:rejectedTeam?.emoji||r.team_emoji||'❌',
          team_color:rejectedTeam?.color||'#ff6b6b',
          message:penalty>0
            ?`Foto afgekeurd — "${r.challenge_title||'uitdaging'}" · -${penalty} pts`
            :`Foto afgekeurd — "${r.challenge_title||'uitdaging'}"`,
          points:penalty>0?-penalty:0,
          created_at:new Date().toISOString(),
        }).then(()=>{},()=>{});
      }
    });
    setReviewUndo(prev=>{flushPendingUndo(prev); const timer=setTimeout(()=>{commit();setReviewUndo(null);},REJECT_UNDO_MS); return{row:r,action:'rejected',deadline:Date.now()+REJECT_UNDO_MS,timer,commit};});
  };
  const undoReview=()=>{
    if(!reviewUndo)return;
    clearTimeout(reviewUndo.timer);
    setReviewQueue(prev=>[reviewUndo.row,...prev]);
    setReviewUndo(null);
  };

  const addActivity=(msg,pts=0,photoData=null,locId=null)=>{
    // V22 audit fix (security agent): cap the message at 500 chars client-side so a
    // crafted broadcast or pack rename can't blow up the feed. Normal activity lines
    // are 40-120 chars — 500 is plenty of headroom for legitimate admin broadcasts.
    const safeMsg=String(msg||'').slice(0,500);
    const entry={
      team_id:myTeam?.id,message:safeMsg,points:pts,
      created_at:new Date().toISOString(),
      team_emoji:myTeam?.emoji,team_name:myTeam?.name,
      team_color:myTeam?.color,
      photo:photoData||null,
      loc_id:locId, // V18: tagged so finale MVP award can count unique locations
    };
    // V21: raise in-memory cap from 50 → 500 so FinaleScreen's MVP awards
    // (which iterate the whole feed) aren't truncated after a 6-hour game.
    setActivityFeed(prev=>[entry,...prev].slice(0,500));
    // Only send to Supabase if the payload is manageable. Drop raw video blobs
    // (>500KB) to respect row limits; compressed photo thumbnails are fine.
    if(!OFFLINE&&sb){
      const shareable={...entry};
      // V21: loc_id column is now part of the schema (supabase-v21-schema.sql) — keep it
      if(shareable.photo&&shareable.photo.length>600000){delete shareable.photo}
      sb.from('activity_feed').insert(shareable).then(()=>{},(err)=>{
        // Graceful fallback: if the column doesn't exist yet (pre-v21 DB), retry without loc_id
        const msg=String(err?.message||'').toLowerCase();
        if(msg.includes('loc_id')||err?.code==='42703'){
          const retry={...shareable};delete retry.loc_id;
          sb.from('activity_feed').insert(retry).then(()=>{},()=>{});
        }
      });
    }
  };

  // V20 P0: atomic score delta. Replaces 6 client-side R-M-W call sites that
  // lost updates under concurrent teammate completions (two phones same team
  // completing within the same realtime round would clobber each other).
  // - Sets local state optimistically so UI stays snappy
  // - Calls the atomic Postgres RPC (supabase-v20-schema.sql) for the canonical value
  // - Reconciles local state to server return on success
  // - Falls back to legacy direct-update if the RPC isn't deployed yet (graceful)
  const applyScoreDelta=(teamId,delta)=>{
    if(!teamId||!Number.isFinite(delta))return;
    // Optimistic local bump (covers OFFLINE mode too)
    setScores(prev=>({...prev,[teamId]:Math.max(0,(prev[teamId]||0)+delta)}));
    if(OFFLINE||!sb)return;
    sb.rpc('increment_team_score',{p_team_id:teamId,p_delta:delta})
      .then(({data,error})=>{
        if(error){
          // Fallback for Supabase projects that haven't run v20 migration yet
          console.warn('increment_team_score RPC missing — using legacy R-M-W',error.message||error);
          const fallback=(scores[teamId]||0)+delta;
          sb.from('teams').update({score:Math.max(0,fallback)}).eq('id',teamId).then(()=>{},()=>{});
          return;
        }
        if(typeof data==='number'){
          // Reconcile local state to the canonical server value
          setScores(prev=>({...prev,[teamId]:data}));
        }
      })
      .catch(e=>console.warn('score delta RPC threw',e));
  };

  // V19+ Jorik-specific missions (only team holding Jorik can do these)
  const completeJorikMission=(id,pts,photoData=null)=>{
    if(jorikMissionsDone.has(id))return;
    const m=JORIK_MISSIONS.find(x=>x.id===id);
    if(!m)return;
    setJorikMissionsDone(prev=>new Set([...prev,id]));
    setScorePopup(`+${pts}`);
    addActivity(`${m.emoji} Jorik-missie: ${m.title} · +${pts} pts`,pts,photoData);
    // V20: atomic delta — replaces manual setScores + sb.from('teams').update
    applyScoreDelta(myTeam?.id,pts);
  };

  const completeChallenge=(locId,chIdx,pts,photoData=null)=>{
    // chIdx === -99 is the V5 dynamic bonus quiz — award points + log, skip challenge bookkeeping
    const isDynamicBonus=chIdx===-99;
    const key=`${locId}_${chIdx}`;
    if(!isDynamicBonus&&completed[locId]?.[chIdx])return;

    // V7: wrong-quiz → pts=0 path. Mark challenge done, no score change, no first-to-complete bonus.
    const isWrongZero=pts===0;
    const loc=L_DATA.find(l=>l.id===locId);
    const isQuiz=loc&&loc.ch[chIdx]?.t==='quiz';

    // V14: hot-streak logic (quizzes only)
    let streakBonus=0;
    let streakLabel='';
    let timeUnlock=false;
    let newStreak=quizStreak;
    if(isQuiz){
      if(isWrongZero){
        newStreak=0;
      }else{
        newStreak=quizStreak+1;
        if(STREAK_REWARDS[newStreak]){
          streakBonus=STREAK_REWARDS[newStreak];
          streakLabel=`🔥 ${newStreak} op rij`;
        }
        if(newStreak===STREAK_TIME_UNLOCK){
          timeUnlock=true;
        }
      }
      setQuizStreak(newStreak);
    }

    // V20: FINALE multiplier — all scoring ×1.5 during phase 4 (last 20 min).
    // Applied to base + streak (not first-bonus — that races async and applies its own multiplier).
    const phaseMult=phase===4?FINALE_MULTIPLIER:1;
    const basePts=Math.round(pts*phaseMult);
    const appliedStreakBonus=Math.round(streakBonus*phaseMult);
    // V20: FIRST_BONUS is now resolved honestly server-side via challenge_first_finder
    // (see block further down). We no longer award it optimistically — it's a late
    // add-on that fires via a second delta + toast once the race is resolved.
    // OFFLINE mode keeps the old eager behaviour so solo testing still feels complete.
    const isFirstEligible=(!isDynamicBonus&&!isWrongZero);
    const firstBonus=(OFFLINE&&isFirstEligible)?Math.round(FIRST_BONUS*phaseMult):0;
    let totalPts=basePts+firstBonus+appliedStreakBonus;

    if(!isDynamicBonus){
      setCompleted(prev=>({...prev,[locId]:{...prev[locId],[chIdx]:true}}));
      setCompletedPts(prev=>({...prev,[locId]:{...prev[locId],[chIdx]:totalPts}}));
    }
    if(locId>0)setVisitedLocs(prev=>new Set([...prev,locId]));
    if(totalPts>0){
      // V20: atomic delta — no more lost updates when two teammates race
      applyScoreDelta(myTeam?.id,totalPts);
      setScorePopup(`+${totalPts}`);
    }
    if(timeUnlock){
      // V17: streak unlocks an Extra Tijd charge (max + current)
      setTimeChargeMax(m=>m+1);
      setTimeCharges(c=>c+1);
    }
    if(loc){
      if(isWrongZero){
        setToast(`${loc.e} ❌ Fout · 0 pts`);
      }else{
        setToast(`${loc.e} +${totalPts} pts!${streakLabel?' '+streakLabel:''}`);
      }
    }

    // V14/V17: celebration on correct answer
    if(!isWrongZero&&loc){
      const big=appliedStreakBonus>0||timeUnlock;
      const breakdownBits=[`+${basePts} basis`];
      if(firstBonus>0)breakdownBits.push(`+${firstBonus} eerste`);
      if(appliedStreakBonus>0)breakdownBits.push(`+${appliedStreakBonus} streak`);
      if(phaseMult!==1)breakdownBits.push(`🏁 FINALE ×${phaseMult}`);
      celebrate({
        emoji:timeUnlock?'⏳':big?'🔥':loc.e,
        title:timeUnlock?'Extra Tijd ontgrendeld!':big?`${newStreak} op rij!`:'Goed zo!',
        sub:`+${totalPts} pts`,
        breakdown:breakdownBits,
        big,
      });
    }

    if(loc){
      let label;
      if(isWrongZero){
        label=`zat ernaast bij "${loc.ch[chIdx]?.ti}" (${loc.n}) · 0 pts`;
      }else if(isDynamicBonus){
        label=`🎲 Bonus quiz bij ${loc.n} gehaald!`;
      }else if(appliedStreakBonus>0){
        label=`${loc.ch[chIdx]?.ti} bij ${loc.n} voltooid! 🔥 ${newStreak} op rij · +${appliedStreakBonus} bonus`;
      }else{
        label=`${loc.ch[chIdx]?.ti} bij ${loc.n} voltooid!`;
      }
      addActivity(label,isWrongZero?0:totalPts,photoData,locId);
    }

    if(!isDynamicBonus&&loc&&loc.ch[chIdx]?.t==='quiz'){
      setSeenQuizzes(prev=>new Set([...prev,`${locId}_q_${chIdx}`]));
    }

    // Update Supabase
    // V20: score writes are now handled atomically by applyScoreDelta above.
    // Here we only need the completed_challenges insert — which also benefits
    // from the v20 unique constraint on (team_id, challenge_id): a duplicate
    // insert (two teammates racing) now fails with 23505 and we treat it as
    // "already done, no-op" rather than double-counting.
    if(!OFFLINE&&sb&&myTeam&&loc&&!isDynamicBonus){
      sb.from('completed_challenges').insert({team_id:myTeam.id,challenge_id:key,location_id:locId,challenge_type:loc.ch[chIdx]?.t,points_earned:totalPts}).then(
        ()=>{},
        (e)=>{
          // Unique-constraint conflict (v20 migration) = the other teammate got there first. Silent ignore.
          if(e&&(e.code==='23505'||String(e.message||'').includes('duplicate'))){
            return;
          }
          console.warn('completed_challenges insert failed',e);
        }
      );

      // V20: FIRST_BONUS honest race. One winner per challenge, period. If the
      // insert into challenge_first_finder succeeds, this team was first and
      // gets +FIRST_BONUS. If it conflicts (409), another team beat us — no-op.
      // Graceful fallback: if the table doesn't exist yet (migration not run),
      // fall back to the eager-everyone-gets-it legacy behaviour so nothing breaks.
      if(isFirstEligible&&FIRST_BONUS>0){
        // V20: FINALE multiplier also applies to FIRST_BONUS winners
        const firstBonusPts=Math.round(FIRST_BONUS*phaseMult);
        // V23 (#51): network-hiccup retry. Conflicts (23505) and missing-table
        // (42P01) are deterministic verdicts — never retry those. Any other
        // error (fetch failure, 5xx, timeout) gets exactly one retry after
        // 600 ms before we concede. Without this a brief GPRS blip during
        // a close race would silently strip the +FIRST_BONUS from the
        // rightful winner (they'd be "not first" on the retry that never ran).
        const awardIfWon=()=>{
          applyScoreDelta(myTeam.id,firstBonusPts);
          setToast(`🏆 Eerste bij ${loc.n}! +${firstBonusPts} pts bonus`);
          addActivity(`was als eerste bij "${loc.ch[chIdx]?.ti}" (${loc.n}) · +${firstBonusPts} pts bonus`,firstBonusPts,null,locId);
        };
        const isConflict=(err)=>err&&(err.code==='23505'||String(err.message||'').toLowerCase().includes('duplicate')||String(err.code||'').startsWith('23'));
        const isMissing=(err)=>{
          if(!err)return false;
          const m=String(err.message||'').toLowerCase();
          return m.includes('does not exist')||m.includes('relation')||err.code==='42P01';
        };
        const scheduleRetry=(triesLeft)=>{
          let id;
          id=setTimeout(()=>{pendingRetryTimersRef.current.delete(id);attempt(triesLeft);},600);
          pendingRetryTimersRef.current.add(id);
        };
        const attempt=(triesLeft)=>{
          sb.from('challenge_first_finder').insert({challenge_id:key,team_id:myTeam.id})
            .then(
              ({error})=>{
                if(!error){awardIfWon();return;}
                if(isConflict(error))return; // lost the race, canonical outcome
                if(isMissing(error)){
                  console.warn('challenge_first_finder missing — legacy fallback: awarding FIRST_BONUS anyway',error.message);
                  applyScoreDelta(myTeam.id,firstBonusPts);
                  return;
                }
                // Transient error — retry once
                if(triesLeft>0){scheduleRetry(triesLeft-1);return;}
                console.warn('challenge_first_finder insert failed after retry',error);
              }
            )
            .catch(e=>{
              // Thrown (network down, fetch rejected) — retry once
              if(triesLeft>0){scheduleRetry(triesLeft-1);return;}
              console.warn('challenge_first_finder threw after retry',e);
            });
        };
        attempt(1);
      }
    }

    // V17: if this was the hot target, clear it so the effect picks a new one
    if(hotTarget&&hotTarget.locId===locId&&hotTarget.chIdx===chIdx){
      setHotTarget(null);
    }
  };

  // V14: level-up watcher (B2)
  useEffect(()=>{
    const myScoreNow=scores[myTeam?.id]||0;
    const lv=levelFor(myScoreNow);
    if(lastLevelSeen==null){setLastLevelSeen(lv.level);return;}
    if(lv.level>lastLevelSeen){
      setLastLevelSeen(lv.level);
      celebrate({
        emoji:lv.emoji,
        title:`Level ${lv.level} · ${lv.name}`,
        sub:lv.unlock||'Nieuwe rang',
        breakdown:null,
        big:true,
        levelUp:true,
      });
      addActivity(`is level ${lv.level} · ${lv.name} geworden!`,0);
    }
  },[scores,myTeam]);

  // V17: assign the next hot target — first uncompleted challenge with best ROI
  const assignHotTarget=useCallback((override)=>{
    const completedByLoc=completed;
    // Candidates: any location with at least one uncompleted challenge
    const candidates=[];
    L_DATA.forEach(loc=>{
      loc.ch.forEach((ch,chIdx)=>{
        if(completedByLoc[loc.id]?.[chIdx])return;
        const d=pos?haversine(pos.lat,pos.lng,loc.la,loc.lo):500;
        const diffMult=ch.df==='hard'?1.3:ch.df==='medium'?1.15:1;
        const roi=(ch.p*diffMult)/Math.max(d,30)*100;
        candidates.push({locId:loc.id,chIdx,score:roi,dist:d});
      });
    });
    if(!candidates.length){setHotTarget(null);return;}
    // Prefer the exact override if given (used when a team deliberately picks a non-hot)
    let pick;
    if(override){
      pick=candidates.find(c=>c.locId===override.locId&&c.chIdx===override.chIdx);
    }
    if(!pick){
      candidates.sort((a,b)=>b.score-a.score);
      pick=candidates[0];
    }
    setHotTarget({locId:pick.locId,chIdx:pick.chIdx,deadline:Date.now()+HOT_TARGET_MS,assignedAt:Date.now()});
  },[completed,pos]);

  // V17: first hot target when game starts
  useEffect(()=>{
    if(phase<1||phase>=5)return;
    if(hotTarget)return;
    if(myTeam?.spectator)return;
    assignHotTarget();
  },[phase,myTeam,hotTarget,assignHotTarget]);

  // V17: hot target expiry watcher — deduct 5 pts and assign next
  useEffect(()=>{
    if(!hotTarget)return;
    if(nowTs<hotTarget.deadline)return;
    // Expired
    const loc=L_DATA.find(l=>l.id===hotTarget.locId);
    setToast(`⏱ Te laat bij ${loc?.n||'target'} · −${HOT_EXPIRE_PENALTY} pts`);
    addActivity(`miste de deadline bij ${loc?.n||'target'} · −${HOT_EXPIRE_PENALTY} pts`,-HOT_EXPIRE_PENALTY);
    // V20: atomic negative delta — no more lost penalties under races
    applyScoreDelta(myTeam?.id,-HOT_EXPIRE_PENALTY);
    setHotTarget(null); // triggers the assign effect
  },[nowTs,hotTarget,myTeam]);

  // V17: Extra Tijd — add 5 min to the current hot target deadline
  const activateExtraTime=useCallback(async()=>{
    if(timeCharges<=0||!hotTarget)return;
    const ok=await confirmAsync('+5 min extra tijd gebruiken?',{confirmLabel:'Ja, gebruik'});
    if(!ok)return;
    setTimeCharges(c=>c-1);
    setHotTarget(h=>h?{...h,deadline:h.deadline+TIME_CHARGE_MS}:h);
    setToast('⏳ +5 min toegevoegd');
    addActivity('heeft Extra Tijd gebruikt · +5 min ⏳');
  },[timeCharges,hotTarget,confirmAsync]);

  // V10: derive jorikInTeam from jorikTeamId (real cross-team sync via Supabase broadcast)
  useEffect(()=>{
    setJorikInTeam(myTeam?.id!=null && jorikTeamId===myTeam.id);
  },[myTeam,jorikTeamId]);

  // V10: admin moves Jorik to a specific team (or nowhere)
  // V12: also persist on game_state so late-joining phones know who has Jorik
  // V22 audit fix (concurrency agent): client-side rate-limit — two admin tabs / a
  // double-tap / the auto-rotate effect firing in the same beat would write two
  // UPDATEs and potentially swap jorik_moved_at backwards. Reject if we already
  // moved Jorik within the last 5 s. Mike is sole admin so this is defensive.
  const lastJorikMoveRef=React.useRef(0);
  const moveJorik=useCallback((targetTeamId)=>{
    if(!isAdmin)return;
    const movedAtTs=Date.now();
    if(movedAtTs-lastJorikMoveRef.current<5000)return; // guard against double-fire
    lastJorikMoveRef.current=movedAtTs;
    setJorikTeamId(targetTeamId);
    setJorikMovedAt(movedAtTs); // V20: reset auto-rotate clock (local optimistic)
    if(!OFFLINE&&sb){
      const team=teams.find(t=>t.id===targetTeamId);
      // V12: canonical source of truth
      // V21 P0: also persist jorik_moved_at so the 30-min rotate clock is
      // authoritative on the server — admin refresh + cross-device reads stay in sync.
      // Graceful fallback if the column doesn't exist yet (pre-v21 migration).
      sb.from('game_state').update({jorik_team_id:targetTeamId,jorik_moved_at:new Date(movedAtTs).toISOString()}).eq('id',1).then(
        ()=>{},
        (err)=>{
          const msg=String(err?.message||'').toLowerCase();
          if(msg.includes('jorik_moved_at')||err?.code==='42703'){
            sb.from('game_state').update({jorik_team_id:targetTeamId}).eq('id',1).then(()=>{},()=>{});
          }
        }
      );
      // Activity feed as fallback + announcement
      sb.from('activity_feed').insert({
        team_id:null, team_name:'Game Master', team_emoji:'👑', team_color:'#d4a054',
        message:`[JORIK] team=${targetTeamId==null?'null':targetTeamId}`,
        points:0, created_at:new Date().toISOString(),
      });
      // Plus a human-readable announcement
      if(team){
        sb.from('activity_feed').insert({
          team_id:null, team_name:'Game Master', team_emoji:'👑', team_color:'#d4a054',
          message:`Jorik gaat mee met ${team.emoji} ${team.name}!`,
          points:0, created_at:new Date().toISOString(),
        });
      }else{
        sb.from('activity_feed').insert({
          team_id:null, team_name:'Game Master', team_emoji:'👑', team_color:'#d4a054',
          message:'Jorik loopt nu alleen tussen de teams door...',
          points:0, created_at:new Date().toISOString(),
        });
      }
    }
  },[isAdmin,teams]);

  // V20: JORIK auto-rotate watcher (admin only). If the current holder hasn't
  // been changed for JORIK_ROTATE_MS, pick the lowest-scoring non-holder team
  // and send Jorik there. Keeps Jorik moving and spreads the mission points.
  useEffect(()=>{
    if(!isAdmin)return;
    if(phase<1||phase>=5)return; // only during active play
    if(!jorikTeamId||!jorikMovedAt)return;
    if(nowTs-jorikMovedAt<JORIK_ROTATE_MS)return;
    const candidates=teams.filter(t=>!t.spectator&&t.id!==jorikTeamId);
    if(!candidates.length)return;
    candidates.sort((a,b)=>(scores[a.id]||0)-(scores[b.id]||0));
    const target=candidates[0];
    if(target)moveJorik(target.id);
  },[isAdmin,phase,jorikTeamId,jorikMovedAt,nowTs,teams,scores,moveJorik]);

  // V10/V12: bar-break trigger — admin signals a break at specific bar name
  // V12: persisted on game_state so all phones open the overlay at the same moment
  const[barBreakActive,setBarBreakActive]=useState(null); // {name, mini, started}
  const[barBreakHidden,setBarBreakHidden]=useState(false); // V18: minimize overlay, show chip
  useEffect(()=>{setBarBreakHidden(false);},[barBreakActive?.name,barBreakActive?.started]);

  // V21 P0-fix #8: client-side watchdog — if an admin's "end bar break" RPC fails to replicate,
  // phones would be stuck on the bar-break overlay forever. Auto-clear locally after
  // BAR_BREAK_DURATION_MS + 120 s grace (admin network/DB hiccup buffer). Server state still wins
  // when realtime catches up. Non-admins also write back to game_state as a best-effort recovery
  // so the next device to load doesn't reopen the overlay.
  useEffect(()=>{
    if(!barBreakActive?.started)return;
    const hardDeadline=barBreakActive.started+BAR_BREAK_DURATION_MS+120000;
    const now=Date.now();
    if(now>=hardDeadline){
      setBarBreakActive(null);
      if(isAdmin&&!OFFLINE&&sb){
        sb.from('game_state').update({bar_break_active:null,bar_break_started_at:null}).eq('id',1).then(()=>{},()=>{});
      }
      return;
    }
    const t=setTimeout(()=>{
      setBarBreakActive(prev=>{
        // only clear if still this same break
        if(!prev||prev.started!==barBreakActive.started)return prev;
        return null;
      });
      if(isAdmin&&!OFFLINE&&sb){
        sb.from('game_state').update({bar_break_active:null,bar_break_started_at:null}).eq('id',1).then(()=>{},()=>{});
      }
    },hardDeadline-now);
    return()=>clearTimeout(t);
  },[barBreakActive?.started,isAdmin]);
  const triggerBarBreak=useCallback(async(barName)=>{
    if(!isAdmin||!barName)return;
    // V21 audit P0 Race-6: two admin tabs could both press "triggerBarBreak"
    // simultaneously — both would insert activity feed entries AND both would
    // award an underdog bonus (breakKey differs per tab because startedAt
    // is per-tab). Guard with a compare-and-set pre-read: if the DB already
    // has a recent bar_break_started_at (within 45 s) we abort quietly.
    if(!OFFLINE&&sb){
      try{
        const{data:gs}=await sb.from('game_state').select('bar_break_active,bar_break_started_at').eq('id',1).maybeSingle();
        if(gs?.bar_break_started_at){
          const existingMs=new Date(gs.bar_break_started_at).getTime();
          if(!isNaN(existingMs)&&Date.now()-existingMs<45000){
            // Another admin tab already fired this break — reflect their state locally and bail.
            const minisExisting=defaultBarMinis(gs.bar_break_active||barName,existingMs);
            setBarBreakActive({name:gs.bar_break_active||barName,mini:minisExisting,started:existingMs});
            setBarBreak({name:gs.bar_break_active||barName,time:existingMs});
            return;
          }
        }
      }catch(e){/* fall through — worst case we do the original behaviour */}
    }
    const startedAt=Date.now();
    // V20: seeded 3-of-6 mini pick
    const minis=defaultBarMinis(barName,startedAt);
    setBarBreakActive({name:barName,mini:minis,started:startedAt});
    setBarBreak({name:barName,time:startedAt});
    if(!OFFLINE&&sb){
      sb.from('game_state').update({bar_break_active:barName,bar_break_started_at:new Date(startedAt).toISOString()}).eq('id',1).then(()=>{},()=>{});
      sb.from('activity_feed').insert({
        team_id:null, team_name:'Game Master', team_emoji:'🍻', team_color:'#d4a054',
        message:`🍺 BAR BREAK → ${barName}! Alle teams naar deze locatie.`,
        points:0, created_at:new Date().toISOString(),
      });

      // V20 balance: UNDERDOG BONUS — the current last-place team gets a silent
      // +UNDERDOG_BONUS so they stay psychologically in the race. Guarded against
      // double-awarding via teams.underdog_bonus_last_break (set to startedAt's
      // unix seconds, a unique-per-break integer).
      const breakKey=Math.floor(startedAt/1000);
      sb.from('teams').select('id,name,score,underdog_bonus_last_break,spectator').then(({data:allTeams,error})=>{
        if(error||!allTeams?.length)return;
        const eligible=allTeams.filter(t=>!t.spectator);
        if(eligible.length<2)return; // need at least 2 teams to have a "last place"
        eligible.sort((a,b)=>(a.score||0)-(b.score||0));
        const last=eligible[0];
        // Column might not exist yet (migration pending) — in that case underdog_bonus_last_break is undefined; proceed.
        if(last.underdog_bonus_last_break===breakKey)return;
        sb.rpc('increment_team_score',{p_team_id:last.id,p_delta:UNDERDOG_BONUS})
          .then(({error:rpcErr})=>{
            if(rpcErr){console.warn('underdog bonus RPC failed',rpcErr.message||rpcErr);return;}
            // Mark this break as claimed so a re-trigger doesn't double-pay.
            sb.from('teams').update({underdog_bonus_last_break:breakKey}).eq('id',last.id).then(()=>{},()=>{});
            sb.from('activity_feed').insert({
              team_id:last.id,team_name:last.name,team_emoji:'💪',team_color:'#d4a054',
              message:`💪 UNDERDOG BONUS voor ${last.name}! +${UNDERDOG_BONUS} pts (still in it!)`,
              points:UNDERDOG_BONUS,created_at:new Date().toISOString(),
            });
          })
          .catch(e=>console.warn('underdog bonus threw',e));
      });
    }
  },[isAdmin]);

  // V12: admin can end a bar break early
  const endBarBreak=useCallback(()=>{
    if(!isAdmin)return;
    setBarBreakActive(null);
    if(!OFFLINE&&sb){
      sb.from('game_state').update({bar_break_active:null,bar_break_started_at:null}).eq('id',1).then(()=>{},()=>{});
    }
  },[isAdmin]);

  // V21 P0: phase-4 admin trigger. Previously setPhase jumped from 1 straight
  // to 5 (ceremony), meaning the advertised "laatste 20 min ×1.5" finale phase
  // was unreachable — phaseMult=phase===4?1.5:1 always evaluated to 1.
  // Admin taps this to enter the dramatic final-push sub-phase; the FINALE
  // multiplier now fires and the phase-4 pulse banner becomes visible.
  const startFinalePhase=useCallback(()=>{
    if(!isAdmin)return;
    setPhase(4);
    if(!OFFLINE&&sb){
      sb.from('game_state').update({phase:4,bar_break_active:null,bar_break_started_at:null}).eq('id',1).then(()=>{},()=>{});
      sb.from('activity_feed').insert({
        team_id:null, team_name:'Game Master', team_emoji:'🏁', team_color:'#d4a054',
        message:'🏁 FINALE! Laatste 20 minuten · alle scoring ×1.5',
        points:0, created_at:new Date().toISOString(),
      });
    }
    setToast('🏁 Finale-fase gestart · ×1.5 multiplier');
  },[isAdmin]);

  // V10/V12: finale — admin advances phase to 5 = ceremony, synced to every phone
  const startFinale=useCallback(()=>{
    if(!isAdmin)return;
    setPhase(5);
    if(!OFFLINE&&sb){
      sb.from('game_state').update({phase:5,game_ended:true,bar_break_active:null,bar_break_started_at:null}).eq('id',1).then(()=>{},()=>{});
      sb.from('activity_feed').insert({
        team_id:null, team_name:'Game Master', team_emoji:'🏆', team_color:'#d4a054',
        message:'🏆 EINDE VAN HET SPEL — naar Markthal/Bokaal voor de uitslag!',
        points:0, created_at:new Date().toISOString(),
      });
    }
  },[isAdmin]);

  // V12: admin score override
  // V20 NOTE: this is kept as an absolute-set (not atomic delta) because it's
  // admin-only, low-frequency, and used for judgment calls where "I want team X
  // to have exactly N" is the mental model. If concurrency becomes an issue
  // (unlikely — single GM device), rewrite to use applyScoreDelta(teamId,delta).
  const adjustScore=useCallback((teamId,delta)=>{
    if(!isAdmin||!teamId)return;
    const cur=scores[teamId]||0;
    const next=Math.max(0,cur+delta);
    setScores(prev=>({...prev,[teamId]:next}));
    if(!OFFLINE&&sb){
      sb.from('teams').update({score:next}).eq('id',teamId).then(()=>{},()=>{});
      const team=teams.find(t=>t.id===teamId);
      sb.from('activity_feed').insert({
        team_id:teamId, team_name:team?.name||'Team', team_emoji:team?.emoji||'🎮', team_color:team?.color||'#d4a054',
        message:`Game Master ${delta>0?'toegekend':'afgetrokken'} ${Math.abs(delta)} pts · nu ${next}`,
        points:delta, created_at:new Date().toISOString(),
      });
    }
  },[isAdmin,scores,teams]);

  // V16: admin broadcasts a free-text message to all teams via activity_feed
  // V22 audit fix (security agent): strip RTL override + zero-width chars that could
  // spoof a system message; cap at 300 chars to match the feed's intended density.
  // V22 P0 fix: add optimistic local append (admin sees it immediately) + surface
  // insert errors to the console (were being swallowed, masking schema mismatches).
  const broadcastMessage=useCallback((msg)=>{
    if(!isAdmin||!msg)return;
    // U+202A..U+202E (RTL/LTR overrides), U+2066..U+2069 (isolates), U+200B..U+200D (zero-width)
    const clean=String(msg).replace(/[\u202A-\u202E\u2066-\u2069\u200B-\u200D\uFEFF]/g,'').trim().slice(0,300);
    if(!clean)return;
    const entry={
      team_id:null, team_name:'Game Master', team_emoji:'📢', team_color:'#d4a054',
      message:clean, points:0, created_at:new Date().toISOString(),
    };
    // Optimistic local append — the admin sees their own broadcast even if
    // Realtime roundtrip is slow or the insert quietly fails.
    setActivityFeed(prev=>[entry,...prev].slice(0,500));
    if(!OFFLINE&&sb){
      sb.from('activity_feed').insert(entry).then(
        (res)=>{if(res&&res.error){console.error('[broadcast] insert failed:',res.error)}},
        (err)=>{console.error('[broadcast] insert threw:',err)}
      );
    }

  // V9/V17: Unlock bonus Extra Tijd charges at score milestones
  useEffect(()=>{

  // V9: Tier badges based on completed challenges (5/10/15/20)
  useEffect(()=>{

    const tier=tierFor(totalChallenges);
    if(tier && (!lastTier || lastTier.min!==tier.min)){
      setLastTier(tier);

      if(lastTier!==null){
        setUnlockPopup({
          emoji:tier.badge,
          label:'NIEUWE TIER',
          name:tier.name+' · '+tier.min+' challenges',

        addActivity(`is gepromoveerd naar ${tier.badge} ${tier.name}!`,0);

  // V9: auto-dismiss unlock popup after 3.5s
  useEffect(()=>{

  // V19: if a Supabase teams refresh no longer contains myTeam.id (e.g. the row

  useEffect(()=>{
    if(!myTeam)return;
    if(myTeam.spectator)return;
    if(!teams||teams.length===0)return;
    if(teams.some(t=>t.id===myTeam.id))return; // still valid
    const relink=teams.find(t=>t.name===myTeam.name && t.emoji===myTeam.emoji);
    if(relink){
      setMyTeam(relink);

  // V12: persist key session fields so a refresh doesn't kick players out
  useEffect(()=>{

  useEffect(()=>{
    if(myTeam)saveSession({storySeen:[...storySeen]});
  },[storySeen,myTeam]);

  // V19+: persist Jorik-mission completion state
  useEffect(()=>{

  // V20 UX P1: long-press (500ms) to leave team — prevents accidental taps on HUD avatar

    cancel:()=>{if(avatarLPTimer.current){clearTimeout(avatarLPTimer.current);avatarLPTimer.current=null;}},
  }),[leaveTeam]);

  // V20 UX P1: beforeunload warning while in active game — prevents accidental tab close

  // teammate's celebratory flow. Stop only once game_ended AND phase beyond ceremony (phase>=6).
  useEffect(()=>{
    if(!myTeam||phase<1||phase>=6)return;

    window.addEventListener('beforeunload',handler);
    return()=>window.removeEventListener('beforeunload',handler);
  },[myTeam,phase]);

  // V21 P1-fix #35: GM heartbeat.
  // Admin writes game_state.gm_heartbeat every 30 s so clients can detect if the
  // Game Master has disconnected. Non-admin clients read gm_heartbeat (via gmLastSeen
  // below) and surface a small warning chip when it goes stale (>2 min).
  const[gmLastSeen,setGmLastSeen]=useState(null); // epoch ms of last admin heartbeat we've seen
  useEffect(()=>{
    if(!isAdmin||OFFLINE||!sb||phase<1||phase>=6)return;
    let cancelled=false;
    const write=()=>{
      if(cancelled)return;
      const ts=new Date().toISOString();
      sb.from('game_state').update({gm_heartbeat:ts}).eq('id',1).then(()=>{},(err)=>{
        // Graceful fallback: column missing on pre-v21 DBs — silently skip
        const msg=String(err?.message||'').toLowerCase();
        if(!(msg.includes('gm_heartbeat')||err?.code==='42703'))console.warn('gm_heartbeat write failed',err);
      });
    };
    write();
    const i=setInterval(write,30000);
    return()=>{cancelled=true;clearInterval(i);};
  },[isAdmin,phase]);


  const startGame=()=>{
    const now=Date.now();
    setGameStart(now);
    setPhase(1);

    addActivity('Het spel is begonnen! 🎮');

    if(!storySeen.has('intro')){

      setStorySeen(prev=>new Set([...prev,'intro']));

    // V12: broadcast start via game_state — every phone snaps out of lobby

    }

  // V10: queue phase stories (don't overwrite intro)
  useEffect(()=>{

  // V10: dispatcher — show queued story once current is closed
  useEffect(()=>{

      setStoryShown(nextStory);

  // Completion counts
  const myScore=scores[myTeam?.id]||0;

  // ═══════════ SPLASH ═══════════

        <div style={{height:'var(--sp-5)'}}/>

        {/* V18 (§1.2.6): accidental join escape hatch — switch team before start */}
        {myTeam&&!myTeam.spectator&&(

        <div style={{height:'var(--sp-7)'}}/>

            <div className="t-caption text-center">Jij bent de Game Master — druk zodra iedereen er is</div>

        ):(
          <div className="panel text-center" style={{background:'linear-gradient(155deg,rgba(110,163,255,0.08),rgba(110,163,255,0.02))',borderColor:'rgba(110,163,255,0.25)'}}>
            <div style={{fontSize:36}}>⏳</div>
            <div className="t-card-label" style={{color:'var(--foto-2)',marginTop:'var(--sp-2)'}}>Wachten op de Game Master</div>
            <div className="t-body" style={{marginTop:'var(--sp-2)'}}>Pak vast een drankje bij het Maritiem Museum.<br/>Het spel start automatisch.</div>

        {OFFLINE&&<div className="text-center" style={{marginTop:'var(--sp-4)'}}><button className="btn btn-ghost btn-sm" onClick={startGame}>Demo: start zelf</button></div>}
      </div>
    );
  }

  // ═══════════ MAIN GAME ═══════════
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      {OFFLINE&&<div className="offline-banner">⚡ Offline Mode — Multiplayer uitgeschakeld</div>}
      {/* V22 audit fix: private-browsing warning. localStorage is unavailable (iOS Private
          mode / locked-down browsers) so progress cannot survive a force-quit. One-shot banner. */}
      {!OFFLINE&&!localStorageWorks()&&<div className="offline-banner" style={{top:OFFLINE?26:0,color:'#e4b25c',background:'rgba(228,178,92,0.12)',borderBottomColor:'rgba(228,178,92,0.25)'}}>⚠︎ Private browsing actief — voortgang wordt niet bewaard bij tab sluiten</div>}
      {toast&&<div className="toast" role="status" aria-live="polite" aria-atomic="true"><div className="toast-inner">{toast}</div></div>}
      {scorePopup&&<div className="score-popup">{scorePopup}</div>}
      {/* V20 P0: GPS denied / unavailable — was silent before; now a full-screen actionable modal */}
      {(gpsStatus==='denied'||gpsStatus==='unavailable')&&(
        <div className="sheet-overlay" style={{zIndex:10000}}>
          <div className="sheet" style={{background:'linear-gradient(180deg,#3a0e0e 0%,var(--bg) 100%)',position:'fixed',left:'50%',top:'50%',transform:'translate(-50%,-50%)',maxWidth:440,width:'92%',maxHeight:'88vh',overflowY:'auto'}} role="alertdialog" aria-live="assertive" aria-labelledby="gps-error-title">
            <div style={{textAlign:'center',marginBottom:'var(--sp-4)'}}>

              <h2 id="gps-error-title" className="t-title" style={{marginTop:'var(--sp-3)',color:'var(--video-2)'}}>
                {gpsStatus==='denied'?'Locatie-toegang geweigerd':'GPS niet beschikbaar'}
              </h2>
              <div className="t-body" style={{marginTop:'var(--sp-2)'}}>
                {gpsStatus==='denied'
                  ?'Het spel heeft je locatie nodig om opdrachten vrij te geven bij POIs. Zonder GPS werkt vrijwel niets.'

              </div>

            {gpsStatus==='denied'&&(
              <div className="panel" style={{marginBottom:'var(--sp-3)'}}>
                <div className="t-label" style={{marginBottom:'var(--sp-2)'}}>Zo zet je het weer aan:</div>

                  <div>📱 <b>iPhone (Safari):</b> Instellingen → Safari → Locatie → <i>Sta toe</i>. Daarna ververs deze pagina.</div>
                  <div>🤖 <b>Android (Chrome):</b> Tik op het 🔒-slotje in de adresbalk → <i>Locatie → Toestaan</i>. Daarna ververs.</div>
                  <div className="t-caption t-muted" style={{marginTop:'var(--sp-2)'}}>

      {/* V17: Hot-target countdown replaces the diner clock */}

        return(
          <div className={`game-clock ${urgent?'urgent':''}`} onClick={()=>setSelLoc(hotTarget.locId)} style={{cursor:'pointer'}}>
            ⏱ {label} <span style={{opacity:0.7,marginLeft:'var(--sp-1)'}}>· {loc?.e||''} {loc?.n||'target'}</span>
          </div>
        );
      })()}

      {/* V15: HUD — consistent padding + type */}
      <div style={{padding:`var(--sp-4) var(--sp-5)`,paddingTop:OFFLINE?'var(--sp-7)':phase>=1&&phase<5?'var(--sp-9)':'var(--sp-4)',background:'linear-gradient(180deg,rgba(10,11,16,0.92) 0%,rgba(10,11,16,0.85) 100%)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'var(--sp-3)',zIndex:100,backdropFilter:'blur(20px) saturate(1.4)',WebkitBackdropFilter:'blur(20px) saturate(1.4)',position:'relative'}}>

          {/* V17: Extra Tijd — tap to add +5 min to hot target */}
          <button onClick={activateExtraTime} disabled={timeCharges<=0||!hotTarget} className="chip"
            style={{border:timeCharges>0?'1px solid rgba(228,178,92,0.35)':'1px solid var(--border)',background:timeCharges>0?'var(--accent-glow)':'var(--surface)',color:timeCharges>0?'var(--accent-2)':'var(--text-tertiary)',cursor:timeCharges>0&&hotTarget?'pointer':'default',opacity:timeCharges<=0?0.5:1,fontWeight:'var(--fw-bold)'}}
            title={hotTarget?'+5 min extra tijd':'Geen actieve opdracht'}>
            ⏳ {timeCharges}/{timeChargeMax}
          </button>
          {/* V18 (§1.5 batch 2): clarify 0/102 ambiguity — show challenges + POIs visited */}
          <div className="t-label-sm" style={{marginTop:'var(--sp-1)'}}>{myChallenges} ch · {visitedLocs.size} POI</div>
        </div>
      </div>

      {/* XP progress bar */}
      {(()=>{
        const lv=levelFor(myScore);const nxt=nextLevel(myScore);
        if(!nxt)return <div style={{height:4,background:'linear-gradient(90deg,var(--accent),var(--video))',boxShadow:'0 0 12px rgba(228,178,92,0.5)'}}/>;
        const pct=((myScore-lv.min)/(nxt.min-lv.min))*100;
        return(
          <div style={{height:4,background:'rgba(255,255,255,0.06)',overflow:'hidden'}}>
            <div style={{height:'100%',width:`${Math.max(2,Math.min(100,pct))}%`,background:'linear-gradient(90deg,var(--foto),var(--accent))',transition:'width .5s var(--ease-out)',boxShadow:'0 0 10px rgba(228,178,92,0.45)'}}/>
          </div>
        );
      })()}

      {/* Phase progress */}
      <div style={{padding:`var(--sp-2) var(--sp-5) var(--sp-3)`}}>
        <div className="phase-bar">
          {[1,2,3,4].map(p=><div key={p} className={`phase-dot ${phase>p?'done':phase===p?'active':''}`}/>)}
        </div>
        <div className="row-between" style={{marginTop:'var(--sp-2)'}}>
          {['Zoektocht','Geruchten','Cirkel','Finale'].map((l,i)=>(
            <span key={l} className="t-label-sm" style={{color:phase>=i+1?'var(--accent-2)':'var(--text-tertiary)',transition:'color .4s',letterSpacing:'var(--ls-wider)'}}>{l}</span>
          ))}
        </div>
      </div>

      {/* V18 (V14 B1): FINALE pulsing banner — highly visible when phase 4 is live */}
      {phase===4&&(
        <div className="finale-pulse-banner" role="status" aria-live="polite">
          <span style={{fontSize:16}}>🏆</span>
          <span className="t-card-label" style={{letterSpacing:'var(--ls-wider)'}}>FINALE LIVE</span>
          <span className="t-caption" style={{opacity:0.85}}>dichtste bij Jorik wint · sprint naar de cirkel</span>
        </div>
      )}

      {/* V21 P1-fix #35: Game-Master offline warning — shows when admin heartbeat is >2 min stale */}
      {!isAdmin&&phase>=1&&phase<6&&gmLastSeen!=null&&(nowTs-gmLastSeen>120000)&&(
        <div role="status" aria-live="polite"
          style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'6px 12px',background:'rgba(255,107,107,0.18)',borderTop:'1px solid rgba(255,107,107,0.35)',borderBottom:'1px solid rgba(255,107,107,0.35)',color:'#fff',fontSize:'var(--fs-12)',letterSpacing:'var(--ls-wider)'}}>
          <span>⚠️</span>
          <span>Game Master offline ({Math.floor((nowTs-gmLastSeen)/60000)} min) · scores blijven lokaal</span>
        </div>
      )}

      {/* Tab content */}
      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {tab==='leaderboard'&&<LeaderboardView teams={teams} scores={scores} myTeam={myTeam} phase={phase} elapsed={elapsed} barBreak={barBreak} jorikInTeam={jorikInTeam} jorikTeamId={jorikTeamId} jorikMovedAt={jorikMovedAt} nowTs={nowTs} weddingDone={weddingDone} onShowWedding={()=>setShowWedding(true)} onShowStory={(k)=>setStoryShown(k)} pendingMine={pendingMine} completed={completed} ghostMax={ghostMax} visitedLocs={visitedLocs} jorikMissionsDone={jorikMissionsDone} onShowJorikMissions={()=>setShowJorikMissions(true)} pos={pos} onSelect={setSelLoc}/>}
        {tab==='map'&&<MapView pos={pos} completed={completed} visitedLocs={visitedLocs} onSelect={setSelLoc} phase={phase} gpsStatus={gpsStatus} gpsSnap={gpsSnap} onWakeGps={wakeGps} hotTarget={hotTarget} nowTs={nowTs}/>}
        {tab==='activity'&&<ActivityView feed={activityFeed} myTeamId={myTeam?.id} onPhoto={setPhotoLightbox} filter={feedFilter} setFilter={setFeedFilter}/>}
        {tab==='review'&&isAdmin&&<AdminReviewView queue={reviewQueue} onApprove={approveReview} onReject={rejectReview} onPhoto={setPhotoLightbox} teams={teams} jorikTeamId={jorikTeamId} onMoveJorik={moveJorik} onTriggerBarBreak={triggerBarBreak} onEndBarBreak={endBarBreak} barBreakActive={barBreakActive} onStartFinalePhase={startFinalePhase} onStartFinale={startFinale} phase={phase} scores={scores} onAdjustScore={adjustScore} onRemoveTeam={removeTeam} reviewUndo={reviewUndo} onUndoReview={undoReview} onBroadcast={broadcastMessage} confirmAsync={confirmAsync}/>}
      </div>

      {/* V5: Narrative story modal */}
      {storyShown&&NARRATIVE[storyShown]&&(
        <StoryModal story={NARRATIVE[storyShown]} onClose={()=>setStoryShown(null)}/>
      )}

      {/* V5: Photo lightbox */}
      {photoLightbox&&<PhotoLightbox media={photoLightbox} onClose={()=>setPhotoLightbox(null)}/>}

      {/* V20 UX P1: app-level dialog — replaces all native confirm()/prompt() calls */}
      {dialog&&<DialogSheet {...dialog} onClose={closeDialog}/>}

      {/* V10/V16/V18: Bar-break overlay — minimizable, persistent chip when hidden */}
      {barBreakActive&&!barBreakHidden&&<BarBreakOverlay info={barBreakActive} onClose={()=>setBarBreakHidden(true)} onComplete={(mini,pts,photo)=>{
        // V21 P1-fix #21: idempotent bar-break mini completion.
        // A stable pseudo challenge_id lets the completed_challenges UNIQUE index (team_id, challenge_id)
        // block duplicate submissions after a reload or network retry. 23505 means "already counted" — no-op.
        const barKey=`bb_${barBreakActive.name||'bar'}_${(mini.title||'mini').replace(/\s+/g,'_')}_${barBreakActive.started||0}`;
        let awarded=false;
        const localAward=()=>{
          if(awarded)return;awarded=true;
          applyScoreDelta(myTeam?.id,pts);
          setScorePopup(`+${pts}`);
          addActivity(`haalde "${mini.title}" bij ${barBreakActive.name} · +${pts} pts`,pts,photo);
        };
        if(!OFFLINE&&sb&&myTeam?.id){
          // Use sentinel location_id=-1 — completed_challenges.location_id is NOT NULL in v14 schema.
          // The rehydrate regex `/^(-?\d+)_(-?\d+)$/` will reject bar-mini challenge_ids (prefix "bb_")
          // so compMap/visited won't be polluted. -1 is also filtered from visitedLocs (locId>0 guard).
          sb.from('completed_challenges').insert({
            team_id:myTeam.id,
            challenge_id:barKey,
            location_id:-1,
            challenge_type:'bar-mini',
            points_earned:pts,
          }).then(({error})=>{
            if(error&&error.code==='23505'){
              // already counted — silent no-op
              return;
            }
            localAward();
          }).catch(()=>{
            // Network hiccup or DB offline — still apply locally so play continues
            localAward();
          });
        }else{
          localAward();
        }
      }}/>}
      {/* V18: persistent bar-break chip — shows at top-left while minimized */}
      {barBreakActive&&barBreakHidden&&(()=>{
        const endsAt=(barBreakActive.started||Date.now())+BAR_BREAK_DURATION_MS;
        const msLeft=Math.max(0,endsAt-nowTs);
        const secLeft=Math.floor(msLeft/1000);
        const urgent=secLeft<=60;
        const label=secLeft>=60?`${Math.floor(secLeft/60)}m ${secLeft%60}s`:`${secLeft}s`;
        return(
          <div onClick={()=>setBarBreakHidden(false)}
            style={{position:'fixed',top:OFFLINE?'calc(var(--sp-3) + 28px)':'var(--sp-3)',left:'50%',transform:'translateX(-50%)',zIndex:9999,padding:`var(--sp-2) var(--sp-4)`,borderRadius:'var(--r-pill)',background:urgent?'rgba(255,107,107,0.95)':'rgba(228,178,92,0.95)',color:'#0a0b10',fontSize:'var(--fs-13)',fontWeight:'var(--fw-bold)',boxShadow:'0 6px 20px rgba(0,0,0,0.5)',cursor:'pointer',display:'flex',alignItems:'center',gap:'var(--sp-2)',animation:urgent?'breathing 1s ease-in-out infinite':'none',maxWidth:'92%'}}>
            🍻 Bar break · {barBreakActive.name} · ⏱ {label}
            <span style={{opacity:0.7,fontSize:'var(--fs-11)'}}>tik om te openen</span>
          </div>
        );
      })()}

      {/* V10: Finale ceremony (phase 5) */}
      {phase===5&&<FinaleScreen teams={teams} scores={scores} myTeam={myTeam} elapsed={elapsed} activityFeed={activityFeed} jorikTeamId={jorikTeamId}/>}

      {/* Bottom sheet for challenges */}
      {selLoc!=null&&<ChallengeSheet loc={L_DATA.find(l=>l.id===selLoc)} pos={pos} completed={completed[selLoc]||{}} completedPts={completedPts[selLoc]||{}} onComplete={completeChallenge} onClose={()=>setSelLoc(null)} jorikInTeam={jorikInTeam} seenQuizzes={seenQuizzes} isAdmin={isAdmin} myTeam={myTeam}/>}

      {/* Wedding video modal — V16 hard-gates when Jorik is in team */}
      {showWedding&&<WeddingMission onClose={()=>setShowWedding(false)} onComplete={()=>{setWeddingDone(true);setShowWedding(false);completeChallenge(-1,0,WEDDING_VIDEO_BONUS);addActivity('Geheime bruiloftsvideo opgenomen! 🎬',WEDDING_VIDEO_BONUS)}} done={weddingDone} jorikInTeam={jorikInTeam} confirmAsync={confirmAsync}/>}

      {/* V19+: Jorik-specific missions — mirror of wedding, visible only when Jorik IS in team */}
      {showJorikMissions&&<JorikMissions onClose={()=>setShowJorikMissions(false)} onComplete={completeJorikMission} done={jorikMissionsDone} jorikInTeam={jorikInTeam}/>}

      {/* Tab bar */}
      <div className="tab-bar">
        {[
          {id:'leaderboard',icon:'🏆',label:'Ranking'},
          {id:'map',icon:'🗺️',label:'Kaart'},
          {id:'activity',icon:'📢',label:'Feed'},
          ...(isAdmin?[{id:'review',icon:'✅',label:'Beoordeel',badge:reviewQueue.length}]:[]),
        ].map(t=>(
          <button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)} style={{position:'relative'}}>
            <span className="tab-icon">{t.icon}</span>{t.label}
            {t.badge>0&&<span style={{position:'absolute',top:2,right:'25%',background:'#ff4444',color:'#fff',fontSize:9,fontWeight:800,padding:'2px 5px',borderRadius:9,minWidth:14,textAlign:'center',
              // V23 (#50): pulse the Beoordeel badge for 3 s after a new photo_review INSERT.
              animation:(t.id==='review'&&(nowTs-reviewFlashTs)<3000&&reviewFlashTs>0)?'reviewPulse 0.8s ease-out 3':'none'
            }}>{t.badge}</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// TEAM SETUP — V5: starter packs + custom
// ═══════════════════════════════════════════
function TeamSetup({teams,setTeams,onJoin,isAdmin,promptAsync}){
  const[mode,setMode]=useState('quick'); // 'quick' | 'custom'
  const[name,setName]=useState('');
  const[emoji,setEmoji]=useState('');
  const[color,setColor]=useState('');
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);
  // V14 (A3): team members — a single textarea, one name per line
  const[membersText,setMembersText]=useState('');
  const parseMembers=()=>membersText.split(/[,\n]/).map(s=>s.trim()).filter(Boolean).slice(0,10);
  // V12/V18: editable name on a starter pack — wired to UI via ✏️ chip on each pack card
  const[packNameOverride,setPackNameOverride]=useState({});
  const renamePack=async(p,e)=>{
    if(e){e.stopPropagation();e.preventDefault();}
    const current=packNameOverride[p.name]||p.name;
    const ask=promptAsync||((msg,def)=>Promise.resolve(window.prompt(msg,def)));
    const input=await ask(`Nieuwe naam voor "${p.name}":`,current);
    if(input===null)return;
    const trimmed=input.trim();
    if(!trimmed){setPackNameOverride(prev=>{const n={...prev};delete n[p.name];return n;});return;}
    // V21 P1-fix #26: re-run the conflict check at rename time so the user sees the
    // "already in use" feedback immediately (case-insensitive via nameConflict) instead of
    // only when they tap the starter-pack card to create.
    if(await nameConflict(trimmed)){
      setErr(`"${trimmed}" is al in gebruik door een ander team`);
      return;
    }
    setErr(''); // clear any stale error
    setPackNameOverride(prev=>({...prev,[p.name]:trimmed}));
  };
  const usedEmojis=teams.map(t=>t.emoji);
  const usedNames=teams.map(t=>t.name.toLowerCase());

  // V12: fresh name check against live Supabase right before insert — belt-and-braces vs stale local state
  const nameConflict=async(finalName)=>{
    if(!finalName)return false;
    if(usedNames.includes(finalName.toLowerCase()))return true;
    if(OFFLINE||!sb)return false;
    try{
      const res=await sb.from('teams').select('id').ilike('name',finalName).limit(1);
      return !!(res.data&&res.data.length);
    }catch(e){return false;}
  };

  // V14: insert a team with graceful fallback if the members column doesn't exist yet
  const insertTeam=async(row,members)=>{
    // Try with members first
    let res=await sb.from('teams').insert({...row,members}).select().single();
    if(res.error&&String(res.error.message||'').includes('members')){
      // Column missing — DB schema not migrated. Retry without it.
      res=await sb.from('teams').insert(row).select().single();
    }
    return res;
  };

  const createFromPack=async(pack)=>{
    if(busy)return;
    const finalName=(packNameOverride[pack.name]||pack.name).trim();
    if(!finalName){setErr('Geef je team een naam');return;}
    if(usedEmojis.includes(pack.emoji)){setErr(`${pack.emoji} is al gekozen door een ander team`);return;}
    setBusy(true);
    if(await nameConflict(finalName)){setErr(`"${finalName}" is al in gebruik door een ander team`);setBusy(false);return;}
    const members=parseMembers();
    if(!OFFLINE&&sb){
      const res=await insertTeam({name:finalName,emoji:pack.emoji,color:pack.color},members);
      if(res.error){
        setErr('Team aanmaken mislukt — probeer een andere naam');setBusy(false);return;
      }
      const team={...res.data};
      if(!team.members||team.members.length===0)team.members=members; // client-side fallback for chip rendering
      setTeams(prev=>prev.some(t=>t.id===team.id)?prev:[...prev,team]);
      onJoin(team);
    }else{
      const team={id:Date.now(),name:finalName,emoji:pack.emoji,color:pack.color,score:0,members};
      setTeams(prev=>[...prev,team]);
      onJoin(team);
    }
    setBusy(false);
  };

  const createCustom=async()=>{
    if(busy)return;
    if(!name||!emoji||!color){setErr('Kies naam, icoon én kleur');return;}
    const finalName=name.trim();
    if(usedEmojis.includes(emoji)){setErr(`${emoji} is al gekozen door een ander team`);return;}
    setBusy(true);
    if(await nameConflict(finalName)){setErr(`"${finalName}" is al in gebruik door een ander team`);setBusy(false);return;}
    const members=parseMembers();
    if(!OFFLINE&&sb){
      const res=await insertTeam({name:finalName,emoji,color},members);
      if(res.error){setErr('Team aanmaken mislukt — probeer een andere naam');setBusy(false);return;}
      const team={...res.data};
      if(!team.members||team.members.length===0)team.members=members;
      setTeams(prev=>prev.some(t=>t.id===team.id)?prev:[...prev,team]);
      onJoin(team);
    }else{
      const team={id:Date.now(),name:finalName,emoji,color,score:0,members};
      setTeams(prev=>[...prev,team]);
      onJoin(team);
    }
    setBusy(false);
  };

  return(
    <div className="screen">
      <div className="text-center">
        <div style={{fontSize:64,filter:'drop-shadow(0 6px 16px rgba(228,178,92,0.35))'}}>💍</div>
        <h1 className="t-title animate-in" style={{marginTop:'var(--sp-3)'}}>Kies je team</h1>
        <p className="t-body animate-in animate-in-1" style={{marginTop:'var(--sp-2)'}}>Tik op een starter pack of maak je eigen</p>
      </div>
      <div style={{height:'var(--sp-6)'}}/>

      {/* Mode toggle — segment */}
      <div style={{display:'flex',gap:'var(--sp-1)',padding:'var(--sp-1)',background:'rgba(255,255,255,0.04)',borderRadius:'var(--r-pill)',border:'1px solid var(--border)'}}>
        {[{k:'quick',l:'⚡ Snel'},{k:'custom',l:'✏️ Eigen'}].map(o=>(
          <button key={o.k} onClick={()=>setMode(o.k)} className="t-card-label" style={{flex:1,padding:'var(--sp-3)',borderRadius:'var(--r-pill)',border:'none',background:mode===o.k?'linear-gradient(135deg,rgba(110,163,255,0.22),rgba(110,163,255,0.1))':'transparent',color:mode===o.k?'var(--foto-2)':'var(--text-secondary)',fontSize:'var(--fs-13)',cursor:'pointer',transition:'all .25s var(--spring)',boxShadow:mode===o.k?'inset 0 0 0 1px rgba(110,163,255,0.35)':'none'}}>{o.l}</button>
        ))}
      </div>
      <div style={{height:'var(--sp-5)'}}/>

      {/* Team members input */}
      <div className="panel">
        <div className="row-between" style={{marginBottom:'var(--sp-3)'}}>
          <div className="t-label">Wie speelt mee?</div>
          <div className="t-caption">optioneel · max 10</div>
        </div>
        <textarea value={membersText} onChange={e=>setMembersText(e.target.value)}
          placeholder={"Jan (captain)\nPiet\nHenk"} rows={3}
          className="t-body-emph" aria-label="Teamleden, één naam per regel"
          style={{width:'100%',padding:'var(--sp-3)',borderRadius:'var(--r-md)',border:'1px solid var(--border)',background:'rgba(255,255,255,0.04)',color:'#fff',outline:'none',fontFamily:'var(--font-body)',resize:'vertical',minHeight:72}}/>
        {parseMembers().length>0&&(
          <>
            <div className="t-caption" style={{marginTop:'var(--sp-2)'}}>👑 Eerste naam wordt captain · tik een chip om te promoveren</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'var(--sp-1)',marginTop:'var(--sp-2)'}}>
              {parseMembers().map((m,i)=>{
                const isCaptain=i===0;
                const promote=()=>{
                  if(isCaptain)return;
                  const all=parseMembers();
                  const reordered=[m,...all.filter((x,j)=>j!==i)];
                  setMembersText(reordered.join('\n'));
                };
                return(
                  <button type="button" key={i} onClick={promote} className="chip"
                    aria-label={isCaptain?`${m} is captain`:`Maak ${m} captain`}
                    style={{cursor:isCaptain?'default':'pointer',border:isCaptain?'1px solid var(--accent)':'1px solid var(--border)',background:isCaptain?'var(--accent-glow)':'rgba(255,255,255,0.04)',color:isCaptain?'var(--accent-2)':'#fff',fontWeight:isCaptain?'var(--fw-bold)':'var(--fw-medium)'}}>
                    {isCaptain&&<span style={{marginRight:4}}>👑</span>}{m}
                  </button>
                );
              })}
            </div>
          </>
        )}
      </div>
      <div style={{height:'var(--sp-5)'}}/>

      {mode==='quick'&&(
        <div>
          <div className="t-label" style={{marginBottom:'var(--sp-3)'}}>Starter packs</div>
          <div className="starter-grid">
            {STARTER_PACKS.map((p,i)=>{
              const taken=usedEmojis.includes(p.emoji)||usedNames.includes(p.name.toLowerCase());
              const shownName=packNameOverride[p.name]||p.name;
              const renamed=!!packNameOverride[p.name];
              const handleKey=(e)=>{if(!taken&&!busy&&(e.key==='Enter'||e.key===' ')){e.preventDefault();createFromPack(p);}};
              return(
                <div key={i} role="button" tabIndex={taken||busy?-1:0} aria-label={`${shownName} · kies dit team`} aria-disabled={taken||busy}
                  className={`starter-card animate-in animate-in-${(i%4)+1} ${taken?'taken':''}`}
                  onClick={()=>!taken&&!busy&&createFromPack(p)} onKeyDown={handleKey}
                  style={{borderColor:taken?'var(--border)':p.color,boxShadow:taken?'none':`0 8px 24px ${p.color}28,${p.color}12 0px 0px 0px 1px inset,var(--sh-ring)`}}>
                  {!taken&&(
                    <button type="button" className="starter-edit-btn" onClick={(e)=>renamePack(p,e)}
                      aria-label={`Naam aanpassen voor ${shownName}`} title="Naam aanpassen">✏️</button>
                  )}
                  <div className="starter-emoji">{p.emoji}</div>
                  <div className="starter-name">{shownName}</div>
                  {renamed&&<div className="t-caption" style={{marginTop:2,color:p.color,fontSize:'var(--fs-10)'}}>({p.name})</div>}
                  <div className="starter-color" style={{background:p.color}}/>
                  {taken&&<div className="t-label-sm" style={{marginTop:'var(--sp-2)'}}>Bezet</div>}
                </div>
              );
            })}
          </div>
          {err&&<div className="panel-sm t-body-emph t-danger text-center" style={{marginTop:'var(--sp-3)',background:'rgba(255,107,107,0.12)',borderColor:'rgba(255,107,107,0.35)'}}>⚠ {err}</div>}
          {busy&&<div className="t-caption text-center" style={{marginTop:'var(--sp-3)'}}>⏳ Team aanmaken…</div>}
        </div>
      )}

      {mode==='custom'&&(
        <div className="stack-3">
          <div className="panel">
            <div className="t-label" style={{marginBottom:'var(--sp-2)'}}>Teamnaam</div>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Bijv. De Maffiosi"
              className="t-body-emph"
              style={{width:'100%',padding:'var(--sp-3)',borderRadius:'var(--r-md)',border:'1px solid var(--border)',background:'rgba(255,255,255,0.04)',color:'#fff',outline:'none'}}/>
          </div>
          <div className="panel">
            <div className="t-label" style={{marginBottom:'var(--sp-2)'}}>Team icoon</div>
            <div className="emoji-grid" style={{margin:0}}>
              {TEAM_EMOJIS.map(e=>(
                <button key={e} className={`emoji-btn ${emoji===e?'selected':''} ${usedEmojis.includes(e)&&emoji!==e?'taken':''}`}
                  onClick={()=>!usedEmojis.includes(e)&&setEmoji(e)} disabled={usedEmojis.includes(e)&&emoji!==e}>{e}</button>
              ))}
            </div>
          </div>
          <div className="panel">
            <div className="t-label" style={{marginBottom:'var(--sp-2)'}}>Team kleur</div>
            <div className="color-grid" style={{margin:0}}>
              {TEAM_COLORS.map(c=>(
                <button key={c.hex} className={`color-btn ${color===c.hex?'selected':''}`}
                  style={{background:c.hex}} onClick={()=>setColor(c.hex)}/>
              ))}
            </div>
          </div>
          <button className="btn btn-cyan btn-lg" onClick={createCustom} disabled={!name||!emoji||!color||busy}
            style={{width:'100%'}}>
            {busy?'⏳ Aanmaken…':'Team aanmaken & joinen'}
          </button>
