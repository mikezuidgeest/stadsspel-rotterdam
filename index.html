// V19+: JORIK MISSIONS OVERLAY
// Only visible to the team currently holding Jorik (inverse of WeddingMission).
// Each mission is one-shot; previous done-list is preserved when Jorik rotates away.
// ═══════════════════════════════════════════
function JorikMissions({onClose,onComplete,done,runningCounts,jorikInTeam,pos,barBreak,holdCount=0,holdCap=3,isJorikDevice=false}){
  const fileRefs=useRef({});
  const totalPts=JORIK_MISSIONS.reduce((s,m)=>s+m.pts,0);
  const doneSet=done instanceof Set?done:new Set(done||[]);
  const runMap=runningCounts&&typeof runningCounts==='object'?runningCounts:{};
  // Earned pts: full pts for fully-done missions + proportional for running-in-progress.
  const earnedPts=JORIK_MISSIONS.reduce((s,m)=>{
    if(doneSet.has(m.id))return s+m.pts;
    if(m.running&&m.tradeTarget>0){
      const c=runMap[m.id]||0;
      return s+Math.round((m.pts/m.tradeTarget)*c);
    }
    return s;
  },0);

  // V21: context match — does this mission render in the "Nu beschikbaar" lane right now?
  // 'any'  → always available
  // 'bar'  → only during an active bar break
  // 'loc:N'→ only when team GPS is in preview band (300m) of POI N
  // V22: defensive shape check (was inBar=!!(barBreak&&barBreak.name) — too loose, an empty
  // object would have evaluated true). Now requires a non-empty string `name`.
  const inBar=!!(barBreak&&typeof barBreak.name==='string'&&barBreak.name.length>0);
  // V22: GPS hysteresis on loc-tagged missions — the matched-state was thrashing as GPS
  // jittered around the 300m PREVIEW_RADIUS boundary (Markthal mission flickering on/off).
  // Use a useRef-backed Map keyed on `loc:N` → last matched bool. Unlock at 280m, re-lock at 320m.
  const ctxMatchedRef=React.useRef(new Map());
  const ctxMatches=(m)=>{
    const c=m.context||'any';
    if(c==='any')return true;
    if(c==='bar')return inBar;
    if(c.startsWith('loc:')){
      const id=parseInt(c.slice(4),10);
      const loc=L_DATA.find(l=>l.id===id);
      if(!loc||!pos)return false;
      const d=haversine(pos.lat,pos.lng,loc.la,loc.lo);
      const wasMatched=ctxMatchedRef.current.get(c)===true;
      // Hysteresis: 280m to enter matched state, 320m to leave it. Sticky in between.
      const matched=wasMatched?d<=320:d<=280;
      ctxMatchedRef.current.set(c,matched);
      return matched;
    }
    // V22: default-deny for unrecognised context formats (was `return true` — silent permissive).
    return false;
  };
  const prio=(m)=>m.priority==='high'?0:m.priority==='low'?2:1;
  // V22: memoize sort to prevent stale-closure capture on every render. Re-derives only when
  // the inputs actually change. JORIK_MISSIONS is module-scope so it's a stable reference.
  const sortedMissions=React.useMemo(()=>{
    return [...JORIK_MISSIONS].sort((a,b)=>{
      const ca=ctxMatches(a)?0:1, cb=ctxMatches(b)?0:1;
      if(ca!==cb)return ca-cb;
      return prio(a)-prio(b);
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  },[inBar,pos&&pos.lat,pos&&pos.lng]);

  // V21 a11y: escape closes + role dialog
  React.useEffect(()=>{
    const onKey=(e)=>{if(e.key==='Escape'){e.stopPropagation();onClose&&onClose();}};
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[onClose]);

  const handleFile=(m,file)=>{
    if(!file)return;
    // V22: running missions can be uploaded to until count reaches target. Block here as a
    // safety net so re-clicks during the FileReader window can't double-fire.
    if(doneSet.has(m.id))return;
    if(m.running&&m.tradeTarget>0&&(runMap[m.id]||0)>=m.tradeTarget)return;
    // V41.5: no size cap. All Jorik-mission media (photo + video) reaches the
    // wedding-edit dataset regardless of file size. Pre-V41.5 the 5MB cap silently
    // dropped iPhone clips. Photos still get compressed via compressPhotoAdaptive
    // (smaller payload, same legibility); videos pass through raw.
    const r=new FileReader();
    r.onload=async(ev)=>{
      const raw=ev.target.result;
      let shareable=raw;
      if(m.media!=='video'){
        // V20: adaptive tiered compression for photos only
        shareable=await compressPhotoAdaptive(raw);
      }
      onComplete&&onComplete(m.id,m.pts,shareable);
    };
    r.readAsDataURL(file);
  };

  return(
    <>
      <div className="sheet-overlay" onClick={onClose}/>
      <div className="sheet" style={{background:'linear-gradient(180deg,#2a1d0a 0%,var(--bg) 100%)'}} role="dialog" aria-modal="true" aria-labelledby="jorik-missions-title">
        <div className="sheet-handle"/>
        {/* V41.4 (Mike feedback): sticky top-right close button. The list of Jorik missions
            is long enough to scroll past several viewport heights, and the only way back was
            the bottom "Sluiten" button or tapping the dim overlay backdrop. Now: a circular ✕
            floats at the top-right and stays put during scroll so "back to game" is one tap
            regardless of scroll position. */}
        <div style={{position:'sticky',top:0,zIndex:5,display:'flex',justifyContent:'flex-end',marginTop:-8,marginBottom:-32,pointerEvents:'none'}}>
          <button onClick={onClose} aria-label="Terug naar spel" style={{pointerEvents:'auto',background:'rgba(20,20,20,0.85)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',border:'1px solid rgba(255,255,255,0.18)',color:'#fff',fontSize:20,cursor:'pointer',width:40,height:40,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1,boxShadow:'0 4px 14px rgba(0,0,0,0.45)'}}>✕</button>
        </div>
        <div style={{textAlign:'center',marginBottom:'var(--sp-4)'}}>
          <div style={{fontSize:56}}>💍🎭</div>
          <h2 id="jorik-missions-title" className="t-title" style={{marginTop:'var(--sp-3)',background:'linear-gradient(135deg,#e4b25c,#ff6b6b)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Jorik-missies</h2>
          <div className="t-body" style={{marginTop:'var(--sp-2)'}}>Alleen mogelijk terwijl Jorik bij jullie team is</div>
          <div className="t-caption t-muted" style={{marginTop:'var(--sp-1)'}}>{doneSet.size}/{JORIK_MISSIONS.length} voltooid · {earnedPts}/{totalPts} pts</div>
          {/* V35 P1 fix (Jorik persona): the cards advertise "+50 pts" but only +25 lands
              because completeJorikMission scales by JORIK_SCORE_MULTIPLIER=0.5. Players
              perceived this as a bug; teammates whispered "are we really getting credit?".
              Disclose the rule explicitly so the math is honest from the first card open. */}
          <div className="t-caption" style={{marginTop:'var(--sp-2)',padding:'var(--sp-2) var(--sp-3)',borderRadius:'var(--r-md)',background:'rgba(228,178,92,0.08)',border:'1px solid rgba(228,178,92,0.25)',color:'var(--accent-2)',lineHeight:'var(--lh-relaxed)'}}>
            ✨ <b>Jorik-missies tellen voor de helft mee</b> — anders ontvoert het Jorik-team de bachelor en wint altijd.
          </div>
          {/* V40 hold-window cap counter — V40.1: vocab "beurt" (rotation-aligned) replaces
              the previously-coined "ronde". 3-state tone ramp:
                0-1 done: neutral status
                2 done : anticipatory ("nog 1 — pace yourself")
                3 done : milestone celebration */}
          {jorikInTeam&&(
            <div className="t-caption" style={{marginTop:'var(--sp-2)',padding:'var(--sp-2) var(--sp-3)',borderRadius:'var(--r-md)',background:holdCount>=holdCap?'rgba(255,235,170,0.12)':holdCount>=holdCap-1?'rgba(228,178,92,0.10)':'rgba(110,163,255,0.10)',border:'1px solid '+(holdCount>=holdCap?'rgba(228,178,92,0.40)':holdCount>=holdCap-1?'rgba(228,178,92,0.28)':'rgba(110,163,255,0.28)'),color:holdCount>=holdCap?'var(--accent-2)':holdCount>=holdCap-1?'var(--accent-2)':'var(--foto-2)',lineHeight:'var(--lh-relaxed)'}}>
              {holdCount>=holdCap?
                <>🌟 <b>{holdCap}/{holdCap} Jorik-missies deze beurt — top!</b> Extra missies blijven mooi voor de bruiloftsedit, maar punten pauzeren tot Jorik rouleert.</>
                :holdCount>=holdCap-1?
                <>⚡ <b>{holdCount}/{holdCap} deze beurt — nog 1!</b> Daarna pauzeren de punten tot de volgende rotatie.</>
                :
                <>💍 <b>{holdCount}/{holdCap} Jorik-missies deze beurt</b> — daarna pauzeren punten tot Jorik rouleert.</>
              }
            </div>
          )}
        </div>

        {!jorikInTeam&&(
          <div className="panel" style={{marginBottom:'var(--sp-4)',background:'linear-gradient(155deg,rgba(255,107,107,0.12),rgba(255,107,107,0.03))',borderColor:'rgba(255,107,107,0.35)'}}>
            <div className="row-3">
              <div style={{fontSize:'var(--icon-sm)'}}>🚫</div>
              <div className="flex-1">
                <div className="t-card-label t-danger">Jorik is nu bij een ander team</div>
                <div className="t-body" style={{marginTop:'var(--sp-1)'}}>Wacht tot hij terug rouleert — reeds gescoorde punten blijven staan.</div>
              </div>
            </div>
          </div>
        )}

        <div className="stack-3" style={{marginBottom:'var(--sp-4)'}}>
          {sortedMissions.map(m=>{
            const isDone=doneSet.has(m.id);
            const matches=ctxMatches(m);
            // V22: running missions stay actionable (re-uploadable) until count==target.
            const runCount=m.running?(runMap[m.id]||0):0;
            const runTarget=m.tradeTarget||0;
            const runComplete=m.running&&runTarget>0&&runCount>=runTarget;
            const locked=!jorikInTeam||isDone||runComplete||!matches;
            // V21: per-mission context label so Jorik's team knows when each mission is intended
            let ctxLabel=null,ctxColor='rgba(255,255,255,0.05)';
            if(m.context==='bar'){
              ctxLabel=matches?'🍻 Bar break — nu actief':'🍻 Pas tijdens een bar break';
              ctxColor=matches?'rgba(228,178,92,0.18)':'rgba(255,255,255,0.04)';
            }else if((m.context||'').startsWith('loc:')){
              const id=parseInt(m.context.slice(4),10);
              const loc=L_DATA.find(l=>l.id===id);
              ctxLabel=matches?`📍 Bij ${loc?.n||'locatie'} — nu`:`📍 Alleen bij ${loc?.n||'locatie'}`;
              ctxColor=matches?'rgba(95,216,165,0.16)':'rgba(255,255,255,0.04)';
            }else if(m.priority==='high'){
              ctxLabel='✨ Hoogste prioriteit';
              ctxColor='rgba(228,178,92,0.14)';
            }else if(m.priority==='low'){
              ctxLabel='💎 Bonus / zeldzaam';
              ctxColor='rgba(255,255,255,0.04)';
            }
            const isRunning=!!m.running;
            return(
              <div key={m.id} className="panel" style={{borderColor:isDone?'rgba(95,216,165,0.35)':matches?'rgba(228,178,92,0.35)':'rgba(255,255,255,0.08)',background:isDone?'rgba(95,216,165,0.08)':matches?'rgba(228,178,92,0.07)':'rgba(255,255,255,0.02)',opacity:matches||isDone?1:0.6}}>
                <div style={{display:'flex',alignItems:'flex-start',gap:'var(--sp-3)'}}>
                  <div style={{fontSize:28,flexShrink:0}}>{m.emoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="t-card-title" style={{display:'flex',alignItems:'center',gap:'var(--sp-2)',flexWrap:'wrap'}}>
                      <span>{m.title}</span>
                      <span className="chip" style={{padding:'1px 6px',fontSize:'var(--fs-10)',background:'rgba(255,255,255,0.05)'}}>{m.cat}</span>
                      {/* V40.1 (UX-review P1b): pre-tap cap warning. When holdCount>=holdCap and
                          this mission ISN'T already-done, show "+0 (cap)" instead of the +pts.
                          No more bait-and-switch where the card advertises +25 but pays 0. */}
                      {(holdCount>=holdCap&&!isDone&&!runComplete)?
                        <span className="chip" title={`Cap bereikt — telt voor de bruiloftsedit, niet voor de score`} style={{padding:'1px 6px',fontSize:'var(--fs-10)',color:'var(--text-tertiary)',borderColor:'rgba(255,255,255,0.18)',background:'rgba(255,255,255,0.04)'}}>+0 (cap)</span>
                        :
                        <span className="chip" title={`Volledige waarde ${m.pts} × 0.5 multiplier = ${Math.round(m.pts*0.5)} pts`} style={{padding:'1px 6px',fontSize:'var(--fs-10)',color:'var(--accent-2)',borderColor:'var(--accent)'}}>+{Math.round(m.pts*0.5)} pts</span>
                      }
                      {/* V40.1 (UX-review P1): hide "📹 bruiloft" chip from Jorik's own device.
                          Pre-V40.1 leak: when Jorik was in his own team, he saw the chip on
                          weddingPipeline-tagged Jorik missions — a direct spoiler that there's
                          a wedding edit being made. Renamed to "📹 lange-vorm" (long-form) for
                          Jorik's device; original "📹 bruiloft" remains for teammates. */}
                      {m.weddingPipeline&&(
                        isJorikDevice?
                          <span className="chip" style={{padding:'1px 6px',fontSize:'var(--fs-10)',color:'#ff6b6b',borderColor:'rgba(255,107,107,0.4)',background:'rgba(255,107,107,0.08)'}}>📹 lange-vorm</span>
                        :
                          <span className="chip" style={{padding:'1px 6px',fontSize:'var(--fs-10)',color:'#ff6b6b',borderColor:'rgba(255,107,107,0.4)',background:'rgba(255,107,107,0.08)'}}>📹 bruiloft</span>
                      )}
                      {isRunning&&runTarget>0&&<span className="chip" style={{padding:'1px 6px',fontSize:'var(--fs-10)',color:'#5fd8a5',borderColor:'rgba(95,216,165,0.4)',background:'rgba(95,216,165,0.08)'}}>🔁 {runCount}/{runTarget} ruils</span>}
                    </div>
                    {ctxLabel&&<div className="t-caption" style={{marginTop:'var(--sp-1)',display:'inline-block',padding:'2px 8px',borderRadius:'12px',background:ctxColor,fontSize:'var(--fs-10)',letterSpacing:'0.3px'}}>{ctxLabel}</div>}
                    <div className="t-body" style={{marginTop:'var(--sp-1)',opacity:0.9}}>{m.desc}</div>
                    <div style={{marginTop:'var(--sp-2)'}}>
                      {isDone||runComplete?(
                        <div className="panel-sm text-center t-success t-body-emph" style={{background:'rgba(95,216,165,0.1)',borderColor:'rgba(95,216,165,0.3)'}}>
                          ✅ Voltooid · +{m.pts} pts{isRunning?` (${runCount}/${runTarget})`:''}
                        </div>
                      ):(
                        <>
                          <input ref={el=>{fileRefs.current[m.id]=el}} type="file" accept={m.media==='video'?'video/*':'image/*'} style={{display:'none'}}
                            onChange={e=>{if(e.target.files[0])handleFile(m,e.target.files[0])}}/>
                          <button className={`btn btn-sm ${m.media==='video'?'btn-cyan':'btn-gold'}`}
                            onClick={()=>{
                              if(locked)return;
                              // V22: bar-set-piece consent gate. Bar-set-piece missions (bar-proposal,
                              // bar-rating, bar-toast) involve recording bar staff or strangers at
                              // their table. Prompt for explicit consent confirmation before opening
                              // the camera. Two-second pause; protects the wedding edit from
                              // featuring a non-consenting subject.
                              if(m.context==='bar'){
                                const ok=window.confirm("Even checken: heb je het personeel/de tafel gebriefd en gaf iedereen die in beeld komt akkoord voor opname?\\n\\nJa = camera opent.\\nNee = brief eerst, en probeer dan opnieuw.");
                                if(!ok)return;
                              }
                              fileRefs.current[m.id]?.click();
                            }}
                            disabled={locked} style={{width:'100%'}}>
                            {!jorikInTeam?'🚫 Wacht tot Jorik terug is':(!matches?(m.context==='bar'?'🍻 Pas tijdens een bar break':'📍 Loop dichter naar de locatie'):(isRunning&&runCount>0?`📸 Volgende ruil (${runCount}/${runTarget})`:(m.media==='video'?`🎬 Video opnemen of kiezen`:`📸 Foto maken of kiezen`)))}
                          </button>
                        </>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* V41.4: relabelled "Sluiten" → "← Terug naar spel" to match Mike's mental model */}
        <button className="btn btn-ghost" onClick={onClose} style={{width:'100%'}}>← Terug naar spel</button>
      </div>
    </>
  );
}

// V10: BAR BREAK OVERLAY
// ═══════════════════════════════════════════
function BarBreakOverlay({info,onClose,onComplete}){
  const[done,setDone]=useState(new Set());
  const[nowTs,setNowTs]=useState(Date.now());
  const fileRefs=useRef({}); // V16: per-mini file input refs for photo upload
  useEffect(()=>{const i=setInterval(()=>setNowTs(Date.now()),1000);return()=>clearInterval(i);},[]);
  // V21 a11y: escape closes overlay (minimizes) + dialog role
  React.useEffect(()=>{
    const onKey=(e)=>{if(e.key==='Escape'){e.stopPropagation();onClose&&onClose();}};
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[onClose]);
  const endsAt=(info.started||Date.now())+BAR_BREAK_DURATION_MS;
  const msLeft=Math.max(0,endsAt-nowTs);
  const secLeft=Math.floor(msLeft/1000);
  const urgent=secLeft<=60;

  // V16: bar-break minis now require a photo/video upload, not honor-system "Klaar"
  const handleUpload=(m,i,file)=>{
    if(done.has(i)||!file)return;
    const r=new FileReader();
    r.onload=async(ev)=>{
      const raw=ev.target.result;
      let shareable=raw;
      // V20: adaptive tiered compression for photos
      // V41.5: no size cap on videos — all bytes stored.
      if(!isVideoData(raw))shareable=await compressPhotoAdaptive(raw);
      setDone(prev=>new Set([...prev,i]));
      onComplete&&onComplete(m,m.pts,shareable);
    };
    r.readAsDataURL(file);
  };

  return(
    /* V34 P0 fix (Sandra/Tom/Bart): backdrop-tap used to silently dismiss the
       overlay (onClick={onClose} on the backdrop). Older guests + drunk users
       lost the moment with one stray tap and the only re-entry was the easy-to-
       miss minimised chip. Backdrop is now non-interactive; explicit "✕ Verberg"
       button at top-right gives a clear, deliberate dismiss action. */
    <div className="barbreak-overlay" role="dialog" aria-modal="true" aria-labelledby="barbreak-title">
      <div className="barbreak-card" style={{maxWidth:460,width:'92%',position:'relative'}} onClick={e=>e.stopPropagation()}>
        <button onClick={onClose} aria-label="Verberg bar-break overlay (chip blijft zichtbaar)"
          style={{position:'absolute',top:'var(--sp-3)',right:'var(--sp-3)',zIndex:1,padding:'var(--sp-2) var(--sp-3)',borderRadius:'var(--r-pill)',border:'1px solid var(--border)',background:'rgba(255,255,255,0.06)',color:'var(--text-secondary)',cursor:'pointer',fontSize:'var(--fs-12)',fontWeight:'var(--fw-medium)',display:'flex',alignItems:'center',gap:'var(--sp-1)'}}>
          ✕ Verberg
        </button>
        <div className="t-label t-accent" style={{textAlign:'center'}}>🍻 Bar break</div>
        <div id="barbreak-title" className="t-title" style={{marginTop:'var(--sp-2)',background:'linear-gradient(135deg,var(--accent-2),var(--video-2))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>{info.name}</div>
        <div className="chip" style={{margin:`var(--sp-4) auto var(--sp-5)`,color:urgent?'var(--danger)':'var(--accent-2)',borderColor:urgent?'rgba(255,107,107,0.4)':'rgba(228,178,92,0.35)',background:urgent?'rgba(255,107,107,0.12)':'var(--accent-glow)',animation:urgent?'breathing 1s ease-in-out infinite':'none'}}>⏱ {secLeft>=60?`${Math.floor(secLeft/60)}m ${secLeft%60}s`:`${secLeft}s`} over</div>
        <div className="t-body" style={{textAlign:'center',fontStyle:'italic',marginBottom:'var(--sp-5)'}}>Één moment · samen toasten · samen op de foto</div>
        <div className="stack-3" style={{textAlign:'left'}}>
          {info.mini.map((m,i)=>{
            const isDone=done.has(i);
            // V30: single group-photo moment — both foto and video accepted
            const accept='image/*,video/*';
            return(
              <div key={i} className="panel" style={{background:isDone?'linear-gradient(155deg,rgba(95,216,165,0.1),rgba(95,216,165,0.02))':undefined,borderColor:isDone?'rgba(95,216,165,0.3)':undefined}}>
                <div className="row-3" style={{marginBottom:'var(--sp-2)'}}>
                  <div style={{fontSize:28}}>{m.emoji}</div>
                  <div className="flex-1">
                    <div className="t-card-label">{m.title}</div>
                    <div className="t-body" style={{marginTop:'var(--sp-1)'}}>{m.desc}</div>
                  </div>
                  <div className="t-num t-accent" style={{fontSize:'var(--fs-17)'}}>+{m.pts}</div>
                </div>
                {/* V30 (Phase 8): scoring clarity on bar-break moment too */}
                <div className="t-label-sm t-muted" style={{marginBottom:'var(--sp-3)',letterSpacing:'0.3px'}}>✅ 1× per team deze break</div>
                {!isDone&&<>
                  {/* V19+: no capture attribute — library uploads allowed */}
                  <input ref={el=>{fileRefs.current[i]=el}} type="file" accept={accept} style={{display:'none'}} onChange={e=>handleUpload(m,i,e.target.files[0])}/>
                  <button className="btn btn-cyan btn-sm" style={{width:'100%'}} onClick={()=>fileRefs.current[i]?.click()}>
                    📸 Foto of video — +{m.pts} pts
                  </button>
                </>}
                {isDone&&<div className="t-body-emph t-success text-center" style={{padding:'var(--sp-2)'}}>✓ Voltooid</div>}
              </div>
            );
          })}
        </div>
        <button className="btn btn-ghost" onClick={onClose} style={{width:'100%',marginTop:'var(--sp-5)'}}>Door met spelen</button>
      </div>
    </div>
  );
}

// V10: FINALE CEREMONY SCREEN
// ═══════════════════════════════════════════
function FinaleScreen({teams,scores,myTeam,elapsed,activityFeed,jorikTeamId}){
  // V23 (#48): use rankTeams() so ties break deterministically (earlier finisher wins,
  // then by challenge count, then by creation order). Single source of truth for winner.
  const sorted=React.useMemo(()=>rankTeams(teams,scores,activityFeed),[teams,scores,activityFeed]);
  const winner=sorted[0];
  // V18: full carousel — top-scoring photos first, expand/collapse.
  // V34 P0 fix (Jorik/Tom personas): exclude wp:1 wedding-pipeline photos from the
  // public photo grid. Jorik will see this screen at the eindceremonie — surfacing
  // wedding-edit footage here would spoil the 14-juni surprise. Match the [WP1]
  // prefix added by completeChallenge for any ch.wp===1 submission.
  const allPhotos=(activityFeed||[]).filter(a=>a.photo&&!String(a.message||'').startsWith('[WP1] ')).slice().sort((a,b)=>(b.points||0)-(a.points||0));
  const[photosExpanded,setPhotosExpanded]=useState(false);
  const initialPhotoCount=12;
  const photos=photosExpanded?allPhotos:allPhotos.slice(0,initialPhotoCount);
  const totalChallenges=(activityFeed||[]).filter(a=>a.points>0).length;

  // V18 (§1.11.4): MVP sub-awards — fun side-prizes from the activity feed
  const awards=React.useMemo(()=>{
    const byTeam={}; // teamId -> {teamRef, photos, videos, locations:Set, bestSingle, quizStreak, totalPoints}
    teams.forEach(t=>{byTeam[t.id]={team:t,photos:0,videos:0,locs:new Set(),best:0,totalPts:0};});
    (activityFeed||[]).forEach(a=>{
      if(!a||a.team_id==null)return;
      const rec=byTeam[a.team_id];if(!rec)return;
      if(a.photo){if(isVideoData(a.photo))rec.videos++;else rec.photos++;}
      if(a.points>0){rec.totalPts+=a.points;if(a.points>rec.best)rec.best=a.points;}
      if(a.loc_id!=null)rec.locs.add(a.loc_id);
    });
    const arr=Object.values(byTeam);
    const pickMax=(fn,label,icon,desc)=>{const r=arr.reduce((m,x)=>fn(x)>fn(m)?x:m,arr[0]);return fn(r)>0?{team:r.team,value:fn(r),label,icon,desc}:null;};
    return[
      pickMax(r=>r.photos,'Foto-koning 📸','📸','meeste foto\'s geüpload'),
      pickMax(r=>r.videos,'Video-regisseur 🎥','🎥','meeste videos geüpload'),
      pickMax(r=>r.locs.size,'Ontdekkingsreiziger 🗺️','🗺️','meeste unieke locaties bezocht'),
      pickMax(r=>r.best,'Grootste schot 💥','💥','hoogste score in één opdracht'),
    ].filter(Boolean);
  },[teams,activityFeed]);

  // V18 (§1.11.3): lightweight share-text helper
  const onShare=async()=>{
    const lines=[`🏆 Jorik's Stadsspel — Eindstand`];
    sorted.slice(0,3).forEach((t,i)=>lines.push(`${['🥇','🥈','🥉'][i]} ${t.emoji} ${t.name} · ${t.score} pts`));
    lines.push(`${fmtHM(elapsed)} gespeeld · ${totalChallenges} uitdagingen voltooid`);
    const text=lines.join('\n');
    try{
      if(navigator.share){await navigator.share({title:'Stadsspel Rotterdam',text});}
      else{await navigator.clipboard.writeText(text);alert('Gekopieerd naar klembord');}
    }catch(e){/* user cancelled or not supported */}
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:10010,overflow:'auto',background:'radial-gradient(circle at 50% 20%,rgba(228,178,92,0.15),transparent 60%),radial-gradient(circle at 30% 80%,rgba(178,155,255,0.12),transparent 50%),var(--bg)'}}>
      <div style={{padding:`var(--sp-8) var(--sp-6) var(--sp-10)`,textAlign:'center',maxWidth:640,margin:'0 auto'}}>
        <div className="t-label t-accent" style={{letterSpacing:'var(--ls-widest)'}}>━━━  De uitslag  ━━━</div>
        <h1 className="t-hero" style={{marginTop:'var(--sp-2)',background:'linear-gradient(135deg,var(--accent-2),var(--video-2),var(--quiz-2))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Eindstand</h1>
        <div className="t-body" style={{marginTop:'var(--sp-3)',marginBottom:'var(--sp-7)'}}>{fmtHM(elapsed)} gespeeld · {teams.length} teams · {totalChallenges} voltooide uitdagingen</div>

        {winner&&(
          <div className="glass-strong animate-in" style={{position:'relative',padding:'var(--sp-7)',marginBottom:'var(--sp-6)',borderColor:winner.color+'88',background:`linear-gradient(135deg,${winner.color}20,rgba(10,14,39,0.9)),rgba(0,0,0,0.45)`,overflow:'hidden'}}>
            {/* V18: dark readability overlay so winner name stays legible on any team color */}
            <div aria-hidden="true" style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at center,rgba(0,0,0,0.35),rgba(0,0,0,0.55))',pointerEvents:'none'}}/>
            <div style={{position:'relative'}}>
              <div className="t-label t-accent">🏆 Winnaar</div>
              <div style={{fontSize:64,marginTop:'var(--sp-2)',animation:'float 3s ease-in-out infinite',filter:'drop-shadow(0 4px 10px rgba(0,0,0,0.6))'}}>{winner.emoji}</div>
              <div className="t-title" style={{color:winner.color,marginTop:'var(--sp-2)',textShadow:'0 2px 8px rgba(0,0,0,0.9),0 0 2px rgba(0,0,0,0.8)'}}>{winner.name}</div>
              <div className="t-body" style={{marginTop:'var(--sp-2)',marginBottom:'var(--sp-3)',textShadow:'0 1px 6px rgba(0,0,0,0.8)'}}>Vriend van de Bruidegom · Eeuwige Roem</div>
              <div className="t-num t-accent" style={{fontSize:'var(--fs-48)',textShadow:'0 2px 10px rgba(0,0,0,0.8)'}}>{winner.score}<span className="t-body" style={{marginLeft:6}}>pts</span></div>
            </div>
          </div>
        )}

        <div className="t-label" style={{marginBottom:'var(--sp-3)'}}>Volledige rangschikking</div>
        {sorted.map((t,i)=>(
          <div key={t.id} className="panel animate-in row-3" style={{marginBottom:'var(--sp-2)',borderLeft:`4px solid ${t.color}`,animationDelay:`${i*0.1}s`,opacity:i>0?0.95:1}}>
            <div className="t-num" style={{minWidth:36,color:i===0?'var(--accent-2)':i===1?'#c0c0c0':i===2?'#cd7f32':'var(--text-tertiary)'}}>#{i+1}</div>
            <div style={{fontSize:28}}>{t.emoji}</div>
            <div className="flex-1" style={{textAlign:'left'}}>
              <div className="t-card-label">{t.name}{t.id===jorikTeamId&&<span className="t-label-sm t-accent" style={{marginLeft:'var(--sp-2)'}}>· met Jorik</span>}</div>
              <div className="t-caption">{t.id===myTeam?.id?'Jouw team':'Team'}</div>
            </div>
            <div className="t-num" style={{fontSize:'var(--fs-20)',color:t.color}}>{t.score}</div>
          </div>
        ))}

        {/* V18 (§1.11.4): MVP sub-awards — highlight side-achievements */}
        {awards.length>0&&(
          <div style={{marginTop:'var(--sp-7)'}}>
            <div className="t-label" style={{marginBottom:'var(--sp-3)'}}>🎖 MVP-prijzen</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:'var(--sp-3)'}}>
              {awards.map((a,i)=>(
                <div key={i} className="panel animate-in" style={{textAlign:'center',padding:'var(--sp-4)',borderColor:a.team.color+'66',background:`linear-gradient(155deg,${a.team.color}18,rgba(255,255,255,0.02))`,animationDelay:`${i*0.08}s`}}>
                  <div style={{fontSize:32}}>{a.icon}</div>
                  <div className="t-card-label" style={{marginTop:'var(--sp-2)'}}>{a.label}</div>
                  <div className="t-caption t-muted" style={{marginTop:2}}>{a.desc}</div>
                  <div className="t-body-emph" style={{marginTop:'var(--sp-2)',color:a.team.color}}>{a.team.emoji} {a.team.name}</div>
                  <div className="t-label-sm t-accent">{a.value}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Sambuca straf — team met laagste score */}
        {sorted.length>1&&(
          <div style={{marginTop:'var(--sp-6)'}}>
            <div className="t-label" style={{marginBottom:'var(--sp-3)'}}>🥃 Sambuca Straf</div>
            <div className="panel animate-in" style={{borderColor:'rgba(255,100,100,0.45)',background:'linear-gradient(155deg,rgba(255,100,100,0.1),rgba(255,100,100,0.02))'}}>
              <div style={{fontSize:40,marginBottom:'var(--sp-2)'}}>😬</div>
              <div className="t-card-label" style={{color:sorted[sorted.length-1].color}}>{sorted[sorted.length-1].emoji} {sorted[sorted.length-1].name}</div>
              <div className="t-body" style={{marginTop:'var(--sp-2)',color:'rgba(255,100,100,0.9)'}}>Laagste score: {sorted[sorted.length-1].score} punten</div>
              <div className="t-caption" style={{marginTop:'var(--sp-1)'}}>Verplicht sambuca-shot voor het hele team. Proost! 🥂</div>
            </div>
          </div>
        )}

        {/* V18 (§1.11.3): share results — uses Web Share API or falls back to clipboard */}
        <div className="row-2" style={{marginTop:'var(--sp-5)',justifyContent:'center'}}>
          <button onClick={onShare} className="btn btn-ghost btn-sm">📤 Deel eindstand</button>
        </div>

        {photos.length>0&&(
          <div style={{marginTop:'var(--sp-7)'}}>
            <div className="row-between" style={{marginBottom:'var(--sp-3)'}}>
              <div className="t-label">📸 Momenten van de dag</div>
              <div className="t-label-sm t-muted">{photosExpanded?allPhotos.length:Math.min(initialPhotoCount,allPhotos.length)} / {allPhotos.length}</div>
            </div>
            <div className="photo-grid">
              {photos.map((p,i)=>(
                <div key={i} className="photo-grid-item" style={{animationDelay:`${Math.min(i,20)*0.05}s`}}>
                  {isVideoData(p.photo)?<video src={p.photo} muted preload="metadata"/>:<img src={p.photo} alt="" loading="lazy" decoding="async"/>}
                  <div className="photo-grid-overlay"><span>{p.team_emoji||'🎮'}</span>{p.points>0&&<span className="t-accent">+{p.points}</span>}</div>
                </div>
              ))}
            </div>
            {allPhotos.length>initialPhotoCount&&(
              <button onClick={()=>setPhotosExpanded(v=>!v)} className="btn btn-ghost" style={{width:'100%',marginTop:'var(--sp-3)'}}>
                {photosExpanded?'Minder tonen ▲':`Toon alle ${allPhotos.length} foto's ▼`}
              </button>
            )}
          </div>
        )}

        <div className="panel" style={{marginTop:'var(--sp-8)',background:'linear-gradient(135deg,rgba(178,155,255,0.1),rgba(255,123,123,0.08))',borderColor:'rgba(178,155,255,0.3)'}}>
          <div className="t-card-title">🥂 Proost op Jorik</div>
          <div className="t-body" style={{marginTop:'var(--sp-2)'}}>De ring is terug. De bruiloft kan door. Al jullie foto's, video's en roasts zijn vastgelegd en worden samengevoegd tot een verrassingsvideo die Jorik pas op 14 juni te zien krijgt. Bedankt voor jullie energie vandaag.</div>
        </div>
      </div>
    </div>
  );
}
