        <div>
          <div className="t-label-sm" style={{marginBottom:'var(--sp-2)'}}>
            Jorik is nu: {jorikTeamId==null?<span className="t-muted">loopt alleen</span>:(()=>{const t=teams.find(x=>x.id===jorikTeamId);return t?<span style={{color:t.color,fontWeight:'var(--fw-bold)'}}>{t.emoji} {t.name}</span>:<span>onbekend</span>;})()}
          </div>
          {/* V25 (#56): chips wrap to a second row instead of horizontal-scrolling,
              so all teams stay visible without the admin needing to swipe sideways
              on mobile. Kept whiteSpace:nowrap per chip so multi-word team names
              stay on one line. */}
          <div className="row-2" style={{flexWrap:'wrap',rowGap:'var(--sp-2)'}}>
            {/* V20: "✅ al bezocht" badge + confirm-dialog when admin clicks a team
                that has already held Jorik (per activity_feed [JORIK] team=X markers).
                Current holder (jorikTeamId===t.id) always rendered in full colour
                regardless of visited status — they're the "holding NOW" visual, not
                the "already had a turn" visual. */}
            {teams.filter(t=>t.id>0).map(t=>{
              const visited=jorikVisitedTeamIds&&jorikVisitedTeamIds.has(t.id);
              const isHolder=jorikTeamId===t.id;
              return (
                <button key={t.id} onClick={async()=>{
                  if(!onMoveJorik)return;
                  if(visited&&!isHolder){
                    const ok=await ask(`${t.emoji} ${t.name} is al aan de beurt geweest met Jorik. Toch terugsturen?`,{confirmLabel:'Ja, stuur terug',danger:true});
                    if(!ok)return;
                  }
                  onMoveJorik(t.id);
                }}
                  className="t-body-emph"
                  style={{padding:`var(--sp-2) var(--sp-3)`,borderRadius:'var(--r-pill)',border:isHolder?`2px solid ${t.color}`:`1px solid ${visited?'rgba(228,178,92,0.4)':'var(--border)'}`,background:isHolder?t.color+'22':visited?'rgba(228,178,92,0.08)':'rgba(255,255,255,0.04)',color:'#fff',cursor:'pointer',whiteSpace:'nowrap',fontSize:'var(--fs-13)',opacity:visited&&!isHolder?0.78:1}}>
                  {t.emoji} {t.name}{visited&&!isHolder?<span style={{marginLeft:6,fontSize:'var(--fs-11)',color:'#e4b25c'}}>✅ al bezocht</span>:null}
                </button>
              );
            })}
            <button onClick={()=>onMoveJorik&&onMoveJorik(null)}
              className="t-body-emph t-muted"
              style={{padding:`var(--sp-2) var(--sp-3)`,borderRadius:'var(--r-pill)',border:'1px dashed rgba(255,255,255,0.3)',background:'transparent',cursor:'pointer',whiteSpace:'nowrap',fontSize:'var(--fs-13)'}}>
              👤 alleen
            </button>
          </div>
        </div>

        {/* Bar break */}
        <div>
          <div className="t-label-sm" style={{marginBottom:'var(--sp-2)'}}>Bar break {barBreakActive?<span className="t-accent">· actief · {barBreakActive.name}</span>:''}</div>
          {barBreakActive?(
            <button onClick={async()=>{if(await ask('Bar break nu beëindigen?',{danger:true}))onEndBarBreak&&onEndBarBreak()}} className="btn btn-danger btn-sm" style={{width:'100%'}}>
              🛑 Bar break beëindigen
            </button>
          ):(
            <div className="stack-2">
              <div className="row-2">
                <select value={barChoice} onChange={e=>setBarChoice(e.target.value)}
                  className="t-body-emph"
                  style={{flex:1,padding:'var(--sp-3)',borderRadius:'var(--r-md)',border:'1px solid var(--border)',background:'rgba(255,255,255,0.04)',color:'#fff',fontSize:'var(--fs-13)',outline:'none'}}>
                  <option value="">— kies een bar —</option>
                  {barOptions.map(b=><option key={b.id} value={b.name}>{b.emoji} {b.name}{b.address?` · ${b.address}`:''}</option>)}
                  <option value="__custom">✏️ Eigen naam typen…</option>
                </select>
                <button disabled={!barChoice||(barChoice==='__custom'&&!barCustom.trim())} onClick={()=>{const n=barChoice==='__custom'?barCustom.trim():barChoice;if(n){onTriggerBarBreak&&onTriggerBarBreak(n);setBarChoice('');setBarCustom('')}}}
                  className="btn btn-gold btn-sm">🍺 Start</button>
              </div>
              {barChoice==='__custom'&&(
                <input value={barCustom} onChange={e=>setBarCustom(e.target.value)} placeholder="Bar naam"
                  className="t-body-emph"
                  style={{width:'100%',padding:'var(--sp-3)',borderRadius:'var(--r-md)',border:'1px solid var(--border)',background:'rgba(255,255,255,0.04)',color:'#fff',outline:'none'}}/>
              )}
            </div>
          )}
        </div>

        {/* V16: broadcast message to players */}
        <div>
          {/* V30 — Setup Checklist (issue #25): surfaces Mike's open inputs that have
              been carried in PROJECT-MEMORY since V21 but were never reflected in the
              live UI. Shows red items that need Mike's attention before gameday + green
              items already complete. Detected by grepping the live L_DATA + game_state
              for placeholder strings. Doesn't block — it's a soft reminder. */}
          {/* V34 P0 fix (Mike persona): the V30 hardcoded ❌ checklist always lied —
              it claimed every item was incomplete on every visit, even after Mike
              had handled them outside the app. Now each item has a per-item dismiss
              toggle (localStorage-backed) so Mike can flip ✅ when he's done. The
              whole panel can be collapsed when all items are dismissed. */}
          {(()=>{
            const SETUP_ITEMS=[
              {k:'bars',l:'3 bar names + GPS-coördinaten',h:"vul in via L_DATA category 'bar' of de bar-break dropdown"},
              {k:'prize',l:'Winnaarsprijs',h:'bewerk de tekst "Mike onthult bij dinner" in LeaderboardView'},
              {k:'wed-frame',l:'Wedding-video framing',h:"Mike's tekst voor de bruiloftsedit (intro/outro)"},
              {k:'trade-obj',l:'Trade-starter object',h:"Mike's voorwerp voor de Jorik-ruil-mission"},
            ];
            const LS_KEY='ssr_v34_setup_checklist';
            const[done,setDone]=React.useState(()=>{try{return JSON.parse(localStorage.getItem(LS_KEY)||'{}');}catch(e){return {};}});
            const toggle=(k)=>{const next={...done,[k]:!done[k]};setDone(next);try{localStorage.setItem(LS_KEY,JSON.stringify(next));}catch(e){}};
            const allDone=SETUP_ITEMS.every(it=>done[it.k]);
            const[collapsed,setCollapsed]=React.useState(allDone);
            if(collapsed){
              return(
                <div onClick={()=>setCollapsed(false)} style={{padding:'var(--sp-2) var(--sp-3)',borderRadius:'var(--r-md)',background:'rgba(95,216,165,0.08)',border:'1px solid rgba(95,216,165,0.25)',marginBottom:'var(--sp-3)',cursor:'pointer',display:'flex',alignItems:'center',gap:'var(--sp-2)'}}>
                  <span>✅</span>
                  <span className="t-caption" style={{flex:1,color:'var(--success)'}}>Setup-checklist afgevinkt — tik om te bekijken</span>
                </div>
              );
            }
            return(
              <div style={{padding:'var(--sp-3)',borderRadius:'var(--r-md)',background:allDone?'rgba(95,216,165,0.06)':'rgba(255,107,107,0.05)',border:`1px solid ${allDone?'rgba(95,216,165,0.25)':'rgba(255,107,107,0.25)'}`,marginBottom:'var(--sp-3)'}}>
                <div className="row-between" style={{marginBottom:'var(--sp-2)'}}>
                  <div className="t-label t-accent">📋 Setup checklist</div>
                  {allDone&&<button onClick={()=>setCollapsed(true)} style={{padding:'2px 8px',borderRadius:'var(--r-sm)',background:'transparent',border:'1px solid var(--border)',color:'var(--text-tertiary)',cursor:'pointer',fontSize:'var(--fs-11)'}}>Verbergen</button>}
                </div>
                <div className="t-caption stack-2" style={{color:'var(--text-secondary)',lineHeight:'var(--lh-relaxed)'}}>
                  {SETUP_ITEMS.map(it=>(
                    <div key={it.k} onClick={()=>toggle(it.k)} style={{cursor:'pointer',display:'flex',alignItems:'flex-start',gap:'var(--sp-2)',padding:'2px 0'}}>
                      <span style={{fontSize:14,opacity:done[it.k]?1:0.85}}>{done[it.k]?'✅':'❌'}</span>
                      <span style={{flex:1,opacity:done[it.k]?0.6:1,textDecoration:done[it.k]?'line-through':'none'}}>
                        <b>{it.l}</b> — {it.h}
                      </span>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:'var(--sp-2)',color:'var(--text-tertiary)',fontSize:'var(--fs-11)'}}>Tik om af te vinken. Alleen voor de Game Master · geen blocker.</div>
              </div>
            );
          })()}

          {/* V30 — Jorik resilience status (issue #16): if a Jorik holder exists,
              show the time since last rotation + countdown to the V27 25-min auto-rotate
              fallback. Reassures the admin that resilience is armed. Disappears when
              jorik_team_id is null. */}
          {jorikTeamId!=null&&jorikMovedAt!=null&&(()=>{
            const elapsedMs=nowTs-jorikMovedAt;
            const remainingMs=Math.max(0,(25*60*1000)-elapsedMs);
            const remainingMin=Math.ceil(remainingMs/60000);
            const holder=teams.find(t=>t.id===jorikTeamId);
            const willFire=remainingMs<=0&&!barBreakActive;
            return(
              <div style={{padding:'var(--sp-2) var(--sp-3)',borderRadius:'var(--r-md)',background:willFire?'rgba(228,178,92,0.12)':'rgba(110,163,255,0.06)',border:`1px solid ${willFire?'rgba(228,178,92,0.4)':'rgba(110,163,255,0.25)'}`,marginBottom:'var(--sp-3)',display:'flex',alignItems:'center',gap:'var(--sp-2)'}}>
                <div style={{fontSize:18}}>⏰</div>
                <div className="t-caption" style={{flex:1,lineHeight:'var(--lh-relaxed)'}}>
                  {/* V35 P1 fix (Mike persona): countdown copy was identical regardless
                      of bar-break state — confusing because resilience is PAUSED during
                      a bar break (Jorik's bar set-piece needs the team to keep him).
                      Now we explicitly say "bar break loopt — auto-rotate gepauzeerd". */}
                  <b>Jorik-resilience</b>: bij {holder?.emoji} {holder?.name||'?'} sinds {Math.floor(elapsedMs/60000)} min · {barBreakActive?<span style={{color:'var(--foto-2)'}}>bar break loopt — auto-rotate gepauzeerd</span>:willFire?<span style={{color:'var(--accent-2)'}}>auto-rotate triggert nu</span>:<span>auto-rotate over {remainingMin} min als geen bar break</span>}
                </div>
              </div>
            );
          })()}

          <div className="t-label-sm" style={{marginBottom:'var(--sp-2)'}}>Bericht naar alle teams</div>
          <div className="row-2">
            <input value={broadcastMsg} onChange={e=>setBroadcastMsg(e.target.value)}
              placeholder="bijv. Iedereen naar Markthal nu!"
              className="t-body-emph"
              style={{flex:1,padding:'var(--sp-3)',borderRadius:'var(--r-md)',border:'1px solid var(--border)',background:'rgba(255,255,255,0.04)',color:'#fff',outline:'none'}}/>
            <button disabled={!broadcastMsg.trim()} onClick={()=>{if(onBroadcast){onBroadcast(broadcastMsg.trim());setBroadcastMsg('')}}}
              className="btn btn-cyan btn-sm">📢 Stuur</button>
          </div>
        </div>

        {/* Team admin */}
        <div>
          <button onClick={()=>setShowTeamAdmin(s=>!s)} className="t-label"
            style={{width:'100%',padding:`var(--sp-2) var(--sp-3)`,borderRadius:'var(--r-md)',background:'rgba(255,255,255,0.04)',border:'1px solid var(--border)',cursor:'pointer',textAlign:'left'}}>
            {showTeamAdmin?'▾':'▸'} Team beheer ({teams.filter(t=>t.id>0).length})
          </button>
          {showTeamAdmin&&(
            <div className="stack-2" style={{marginTop:'var(--sp-2)'}}>
              {teams.filter(t=>t.id>0).map(t=>(
                <div key={t.id} className="row-2" style={{padding:'var(--sp-2)',borderRadius:'var(--r-md)',background:'rgba(255,255,255,0.03)',borderLeft:`3px solid ${t.color}`}}>
                  <div style={{fontSize:18}}>{t.emoji}</div>
                  <div className="flex-1">
                    <div className="t-body-emph truncate">{t.name}</div>
                    {/* V20 (Audit item #1): live headcount chip alongside score — lets the admin
                        see distribution at a glance. "📱" cues "phones", not "humans" — the
                        count reflects browsers-on-the-team, not self-reported members. */}
                    <div className="t-caption">{scores[t.id]||0} pts · 📱 {teamMemberCounts[t.id]||0}</div>
                  </div>
                  <button onClick={()=>onAdjustScore&&onAdjustScore(t.id,-5)} className="t-body-emph" style={{padding:`var(--sp-1) var(--sp-2)`,borderRadius:'var(--r-sm)',background:'rgba(255,107,107,0.15)',border:'1px solid rgba(255,107,107,0.3)',color:'var(--danger)',cursor:'pointer',fontSize:'var(--fs-12)'}} title="−5 pts">−5</button>
                  <button onClick={()=>onAdjustScore&&onAdjustScore(t.id,5)} className="t-body-emph" style={{padding:`var(--sp-1) var(--sp-2)`,borderRadius:'var(--r-sm)',background:'rgba(95,216,165,0.15)',border:'1px solid rgba(95,216,165,0.3)',color:'var(--success)',cursor:'pointer',fontSize:'var(--fs-12)'}} title="+5 pts">+5</button>
                  <button onClick={()=>onAdjustScore&&onAdjustScore(t.id,10)} className="t-body-emph" style={{padding:`var(--sp-1) var(--sp-2)`,borderRadius:'var(--r-sm)',background:'rgba(228,178,92,0.15)',border:'1px solid rgba(228,178,92,0.3)',color:'var(--accent)',cursor:'pointer',fontSize:'var(--fs-12)'}} title="+10 pts">+10</button>
                  {/* V20 (Audit item #4): admin-only rename — triggers promptAsync → uniqueness check → UPDATE. */}
                  <button onClick={()=>onRenameTeam&&onRenameTeam(t.id)} style={{padding:`var(--sp-1) var(--sp-2)`,borderRadius:'var(--r-sm)',background:'transparent',border:'1px dashed rgba(255,255,255,0.2)',color:'var(--text-tertiary)',cursor:'pointer'}} title="Team hernoemen">✏️</button>
                  <button onClick={()=>onRemoveTeam&&onRemoveTeam(t.id)} style={{padding:`var(--sp-1) var(--sp-2)`,borderRadius:'var(--r-sm)',background:'transparent',border:'1px dashed rgba(255,255,255,0.2)',color:'var(--text-tertiary)',cursor:'pointer'}} title="Team verwijderen">🗑</button>
                </div>
              ))}
              {teams.filter(t=>t.id>0).length===0&&<div className="t-caption text-center" style={{padding:'var(--sp-3)'}}>Nog geen teams</div>}
            </div>
          )}
        </div>

        {/* V18: Admin pause — broadcasts a pause message to all teams (not a full time-pause; signals a stop) */}
        <div>
          <div className="t-label-sm" style={{marginBottom:'var(--sp-2)'}}>Pauze</div>
          <div className="row-2">
            <button onClick={()=>onBroadcast&&onBroadcast('⏸️ PAUZE — iedereen stopt even met scores')} className="btn btn-ghost btn-sm flex-1">⏸ Pauze</button>
            <button onClick={()=>onBroadcast&&onBroadcast('▶️ GO — verder spelen!')} className="btn btn-ghost btn-sm flex-1">▶ Hervat</button>
          </div>
        </div>

        {/* Finale */}
        <div>
          <div className="t-label-sm" style={{marginBottom:'var(--sp-2)'}}>Finale & uitslag</div>
          {/* V21 P0-fix: two-step finale — first activate phase 4 (×1.5 multiplier), then the ceremony */}
          <button onClick={async()=>{if(await ask('Start de finale-fase? Alle scoring krijgt ×1.5 voor de laatste 20 minuten.',{confirmLabel:'Start finale-fase'}))onStartFinalePhase&&onStartFinalePhase()}}
            className="btn btn-cyan" disabled={phase>=4} style={{width:'100%',marginBottom:'var(--sp-2)'}}>
            🏁 {phase===4?'Finale-fase loopt · ×1.5':phase>=5?'Spel beëindigd':'Start finale-fase (×1.5)'}
          </button>
          <button onClick={async()=>{if(await ask('Spel beëindigen en naar de eindceremonie? Dit kan niet ongedaan worden gemaakt.',{danger:true,confirmLabel:'Start finale'}))onStartFinale&&onStartFinale()}}
            className="btn btn-gold" disabled={phase>=5} style={{width:'100%'}}>
            🏆 {phase>=5?'Finale loopt':'Start finale & ceremonie'}
          </button>
        </div>

        {/* V28: admin emergency reset — pushes every phone back to the lobby
            without running SQL. Preserves teams + scores + completions in the
            DB (for a full wipe use SUPABASE-GAMEDAY-RESET.sql Block A/B). */}
        <div style={{marginTop:'var(--sp-2)',paddingTop:'var(--sp-3)',borderTop:'1px dashed rgba(255,107,107,0.22)'}}>
          <div className="t-label-sm" style={{marginBottom:'var(--sp-2)',color:'var(--danger)'}}>⚠ Noodstop</div>
          <button onClick={async()=>{if(await ask('Spel resetten naar de lobby? Alle teams keren terug naar het wacht-scherm. Scores, teams en voltooide opdrachten blijven in de database bewaard.',{danger:true,confirmLabel:'Reset naar lobby'}))onResetGame&&onResetGame()}}
            className="btn btn-ghost btn-sm" style={{width:'100%',color:'var(--danger)',borderColor:'rgba(255,107,107,0.3)',background:'rgba(255,107,107,0.06)'}}>
            ↺ Reset spel naar lobby (phase = 0)
          </button>
          <div className="t-caption t-muted" style={{marginTop:'var(--sp-2)',textAlign:'center'}}>
            Voor een volledige DB-wipe: draai <code>SUPABASE-GAMEDAY-RESET.sql</code> Block A/B.
          </div>
        </div>
        </>}
      </div>

      {/* Review queue header */}
      <div className="row-between" style={{marginBottom:'var(--sp-4)'}}>
        <div>
          <div className="t-label">Beoordelen</div>
          <div className="t-section" style={{marginTop:'var(--sp-1)'}}>Wachtrij ({queue.length})</div>
        </div>
        <div className="t-caption" style={{textAlign:'right',lineHeight:'var(--lh-snug)'}}>Goedkeuren = punten blijven<br/>Afkeuren = punten worden ingetrokken</div>
      </div>

      {/* V18 (§1.9.10): filter chips — focus on suspicious first */}
      {queue.length>0&&(
        <div className="row-2" style={{marginBottom:'var(--sp-4)',flexWrap:'wrap'}}>
          {[
            {k:'all',l:`Alles · ${queue.length}`,c:'rgba(255,255,255,0.08)',b:'var(--border)'},
            {k:'green',l:`🟢 Nabij · ${queueCounts.green}`,c:'rgba(95,216,165,0.15)',b:'rgba(95,216,165,0.35)'},
            {k:'yellow',l:`🟡 Rand · ${queueCounts.yellow}`,c:'rgba(228,178,92,0.15)',b:'rgba(228,178,92,0.35)'},
            {k:'red',l:`🔴 Ver · ${queueCounts.red}`,c:'rgba(255,107,107,0.15)',b:'rgba(255,107,107,0.35)'},
          ].map(o=>(
            <button key={o.k} onClick={()=>setReviewFilter(o.k)} className="t-body-emph"
              style={{padding:`var(--sp-2) var(--sp-3)`,borderRadius:'var(--r-pill)',border:`1px solid ${o.b}`,background:reviewFilter===o.k?o.c:'rgba(255,255,255,0.02)',color:'#fff',cursor:'pointer',fontSize:'var(--fs-12)',opacity:reviewFilter===o.k?1:0.7}}>
              {o.l}
            </button>
          ))}
        </div>
      )}

      {queue.length===0&&(
        <div className="panel text-center" style={{padding:'var(--sp-7)'}}>
          <div style={{fontSize:'var(--icon-md)'}}>✅</div>
          <div className="t-card-label" style={{marginTop:'var(--sp-3)'}}>Niets te beoordelen</div>
          <div className="t-body" style={{marginTop:'var(--sp-2)'}}>Foto's verschijnen hier zodra teams ze indienen</div>
        </div>
      )}

      {queue.length>0&&filteredQueue.length===0&&(
        <div className="panel text-center" style={{padding:'var(--sp-5)'}}>
          <div className="t-body">Geen items in dit filter</div>
        </div>
      )}

      {filteredQueue.map(r=>{
        const dist=r.gps_distance;
        const distClass=dist==null?'':dist<=PHOTO_GATE_RADIUS?'review-dist-good':dist<=PHOTO_GATE_RADIUS+PHOTO_GATE_GRACE?'review-dist-warn':'review-dist-bad';
        return(
          <div key={r.id} className="review-card" style={{borderLeft:r.team_color?`3px solid ${r.team_color}`:undefined}}>
            <div className="row-between" style={{alignItems:'flex-start'}}>
              <div className="flex-1">
                <div className="t-card-label">{r.team_emoji||'🎮'} {r.team_name}</div>
                <div className="t-body" style={{marginTop:'var(--sp-1)'}}>📍 {r.location_name}</div>
                <div className="t-body-emph" style={{marginTop:'var(--sp-2)'}}>{r.challenge_title}</div>
                <div className="t-caption" style={{marginTop:'var(--sp-1)'}}>{r.challenge_type} · +{r.points_awarded} pts</div>
              </div>
              <span className="review-badge review-badge-pending">pending</span>
            </div>

            {r.photo_url
              ?(isVideoData(r.photo_url)
                ?<video src={r.photo_url} className="review-photo" controls muted onClick={()=>onPhoto&&onPhoto(r.photo_url)}/>
                :<img src={r.photo_url} className="review-photo" alt="submission" onClick={()=>onPhoto&&onPhoto(r.photo_url)}/>)
              :<div className="panel-sm text-center t-caption" style={{marginTop:'var(--sp-2)',background:'rgba(255,255,255,0.03)'}}>
                  📷 Foto te groot voor cloud-sync · alleen bij team beschikbaar
                </div>}

            <div className="review-meta">
              <span>📡 GPS afstand: <span className={distClass}>{dist!=null?`${dist}m`:'onbekend'}</span></span>
              <span>{new Date(r.created_at).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}</span>
            </div>

            <div className="review-actions">
              {/* V25 (#53): tap "Afkeuren" to expand a reason-chip grid instead of a one-step confirm.
                  Picking a chip commits the rejection with that reason, which persists to
                  photo_reviews.reviewer_notes and shows up in the team's feed entry so they
                  know what to fix next time. 5-min undo window still applies. */}
              {rejectOpenId!==r.id&&(
                <button className="btn btn-danger btn-sm" onClick={()=>{setRejectOpenId(r.id);setRejectCustom('');setRejectCustomOpen(false);}}>✗ Afkeuren</button>
              )}
              {/* V18 (§1.9.4): confirm approve only when submission is suspicious (no photo OR >100m off) */}
              <button className="btn btn-cyan btn-sm" onClick={async()=>{
                const suspicious=!r.photo_url||(typeof r.gps_distance==='number'&&r.gps_distance>100);
                if(suspicious){
                  const reason=!r.photo_url?'er is geen foto bijgevoegd':`de afstand was ${r.gps_distance}m (>100m)`;
                  if(!await ask(`Weet je zeker dat je deze goedkeurt? ${reason}.`,{confirmLabel:'Toch goedkeuren'}))return;
                }
                onApprove(r);
              }}>✓ Goedkeuren</button>
            </div>
            {rejectOpenId===r.id&&(
              <div className="panel-sm" style={{marginTop:'var(--sp-3)',padding:'var(--sp-3)',background:'rgba(255,107,107,0.05)',border:'1px solid rgba(255,107,107,0.25)',borderRadius:'var(--r-md)'}}>
                <div className="t-label-sm t-danger" style={{marginBottom:'var(--sp-2)'}}>Waarom afkeuren? <span className="t-caption t-muted">(tik een reden, komt in team-feed)</span></div>
                <div className="row-2" style={{flexWrap:'wrap',rowGap:'var(--sp-2)',marginBottom:'var(--sp-2)'}}>
                  {REJECT_REASONS.map(o=>(
                    <button key={o.k} onClick={()=>{onReject(r,o.l);setRejectOpenId(null);}}
                      className="t-body-emph"
                      style={{padding:'var(--sp-2) var(--sp-3)',borderRadius:'var(--r-pill)',border:'1px solid rgba(255,107,107,0.35)',background:'rgba(255,107,107,0.1)',color:'#fff',cursor:'pointer',fontSize:'var(--fs-12)',whiteSpace:'nowrap'}}>
                      {o.l}
                    </button>
                  ))}
                  {!rejectCustomOpen&&(
                    <button onClick={()=>setRejectCustomOpen(true)} className="t-body-emph"
                      style={{padding:'var(--sp-2) var(--sp-3)',borderRadius:'var(--r-pill)',border:'1px dashed rgba(255,255,255,0.3)',background:'transparent',color:'#fff',cursor:'pointer',fontSize:'var(--fs-12)',whiteSpace:'nowrap'}}>
                      ✏️ Anders…
                    </button>
                  )}
                  <button onClick={()=>{onReject(r,'');setRejectOpenId(null);}} className="t-body-emph t-muted"
                    style={{padding:'var(--sp-2) var(--sp-3)',borderRadius:'var(--r-pill)',border:'1px solid var(--border)',background:'rgba(255,255,255,0.04)',color:'var(--text-tertiary)',cursor:'pointer',fontSize:'var(--fs-12)',whiteSpace:'nowrap'}}
                    title="Afkeuren zonder reden (niet aanbevolen)">
                    Geen reden
                  </button>
                </div>
                {rejectCustomOpen&&(
                  <div className="row-2" style={{marginBottom:'var(--sp-2)'}}>
                    <input value={rejectCustom} onChange={e=>setRejectCustom(e.target.value)}
                      placeholder="Korte reden (max 200 tekens)" maxLength={200} autoFocus
                      className="t-body-emph"
                      style={{flex:1,padding:'var(--sp-3)',borderRadius:'var(--r-md)',border:'1px solid var(--border)',background:'rgba(255,255,255,0.04)',color:'#fff',outline:'none',fontSize:'var(--fs-13)'}}/>
                    <button disabled={!rejectCustom.trim()} onClick={()=>{onReject(r,rejectCustom.trim());setRejectOpenId(null);setRejectCustom('');setRejectCustomOpen(false);}}
                      className="btn btn-danger btn-sm">✗ Afkeuren</button>
                  </div>
                )}
                <button onClick={()=>{setRejectOpenId(null);setRejectCustom('');setRejectCustomOpen(false);}}
                  className="t-caption t-muted" style={{background:'transparent',border:'none',padding:'var(--sp-1) var(--sp-2)',cursor:'pointer',textDecoration:'underline'}}>
                  Annuleren
                </button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════
// CHALLENGE BOTTOM SHEET — V5: dynamic quiz rotation + photo feed
// ═══════════════════════════════════════════
// ═══════════════════════════════════════════
// V38: FLIPPERCOIN MECHANIC
// ═══════════════════════════════════════════
// The Flippercoin applies ONLY to locations that have BOTH a photo AND a video
// challenge. Quiz/creative challenges are completely unaffected. Teams complete
// exactly one media challenge per location — the coin decides which.
//
// Eligible locations (auto-detected from L_DATA):
//   id:1  Erasmusbrug    — photo(25) vs video(35)
//   id:10 Laurenskerk    — photo(30) vs video(30)
//   id:12 Stadhuis       — photo(30) vs video(30)
//   id:20 Oude Haven     — 2×photo(20,30) vs video(30)
//
// Design: 50/50 by default. Video challenges are worth more points — the risk/
// reward is communicated via UI badges after the reveal.

function isFlippercoinLocation(loc){
  if(!loc||!loc.ch)return false;
  const types=loc.ch.map(c=>c.t);
  return types.includes('photo')&&types.includes('video');
}

// Deterministic per-team per-location so the result survives refresh.
// Uses team id + location id as seed stored in localStorage.
function getFlipResult(locId,teamId){
  const key=`flipcoin_${teamId}_${locId}`;
  try{
    const stored=localStorage.getItem(key);
    if(stored==='photo'||stored==='video')return stored;
  }catch(e){}
  return null; // not yet flipped
}
function storeFlipResult(locId,teamId,result){
  const key=`flipcoin_${teamId}_${locId}`;
  try{localStorage.setItem(key,result);}catch(e){}
}

function FlippercoinGate({loc,teamId,onReveal,children}){
  const[flipState,setFlipState]=useState('idle'); // idle | flipping | landed | revealed
  const[result,setResult]=useState(()=>getFlipResult(loc.id,teamId));
  // pendingOutcome holds the random result during the animation, before reveal
  const[pendingOutcome,setPendingOutcome]=useState(null);

  // If already flipped (from localStorage), skip animation
  useEffect(()=>{
    if(result){setFlipState('revealed');}
  },[result]);

  const doFlip=()=>{
    if(flipState!=='idle')return;
    // Decide: 50/50 photo vs video
    const outcome=Math.random()<0.5?'photo':'video';
    setPendingOutcome(outcome);
    setFlipState('flipping');
    // Haptic burst during flip
    try{if(navigator.vibrate)navigator.vibrate([15,30,15,30,15,30,15,50,20]);}catch(e){}
    // Web Audio coin-flip sound: rising metallic shimmer
    try{
      const playCue=window.__ssrPlayCue;
      if(playCue)playCue('flip'); // V38: ascending shimmer for coin flip
    }catch(e){}
    // V39+: spin animation 2.5s → land + celebrate (1.5s admiring the coin) → reveal challenge.
    // The 'landed' state keeps the coin on-screen with a glow pulse while the user sees the result.
    setTimeout(()=>{
      // Spin finished — store result, transition to 'landed' (coin still visible, glow pulse).
      setFlipState('landed');
      storeFlipResult(loc.id,teamId,outcome);
      // Celebration haptic + landing cue
      try{if(navigator.vibrate)navigator.vibrate([35,30,60,30,20]);}catch(e){}
      try{const c=window.__ssrPlayCue;if(c)c('score');}catch(e){}
      // V39+: generic confetti removed. Celebration now lives inside the coin stage
      // as coin-anchored sparks + radial flash + expanding ring (see .flipcoin-burst,
      // .flipcoin-flash, .flipcoin-ring). Result-coloured, spatially tied to the coin.
    },2500);
    setTimeout(()=>{
      // After the admire-window, transition to revealed (shows challenge details).
      setResult(outcome);
      setFlipState('revealed');
      onReveal&&onReveal(outcome);
    },4000);
  };

  // Find the photo and video challenges for the mystery preview
  const photoIdxs=loc.ch.map((c,i)=>c.t==='photo'?i:-1).filter(i=>i>=0);
  const videoIdxs=loc.ch.map((c,i)=>c.t==='video'?i:-1).filter(i=>i>=0);

  if(flipState==='revealed'&&result){
    // Pass through — the parent ChallengeSheet will filter challenges
    return children(result,photoIdxs,videoIdxs);
  }

  // Pre-flip: mysterious hidden state
  return(
    <div className="flipcoin-stage">
      <div className="t-label" style={{marginBottom:'var(--sp-2)',color:'var(--accent-2)'}}>FLIPPERCOIN</div>
      <div className="t-card-title" style={{marginBottom:'var(--sp-1)'}}>Wat beslist het lot?</div>
      <div className="t-caption" style={{color:'var(--text-secondary)',marginBottom:'var(--sp-2)'}}>
        Deze locatie heeft een foto- én een video-opdracht.<br/>De munt kiest welke jullie team doet.
      </div>

      {/* Mystery cards — V39+: flavor copy only, points hidden until landed coin reveals them.
          Triple-printing points (here + coin face + reveal badge) killed the surprise. */}
      <div className="flipcoin-mystery">
        <div className="flipcoin-mystery-card">
          <div className="flipcoin-mystery-icon">📸</div>
          <div className="flipcoin-mystery-label">Het moment</div>
        </div>
        <div style={{display:'flex',alignItems:'center',fontSize:'var(--fs-14)',color:'var(--text-tertiary)',fontWeight:'var(--fw-bold)'}}>of</div>
        <div className="flipcoin-mystery-card">
          <div className="flipcoin-mystery-icon">🎥</div>
          <div className="flipcoin-mystery-label">Het verhaal</div>
        </div>
      </div>

      {/* V39 premium: extruded 3D coin — 60 stacked slices form a physical rim,
          two SVG-iconed faces cap the cylinder, specular sheen sweeps the surface.
          Rendered for BOTH flipping (mid-air) and landed (admiring the result) states. */}
      {(flipState==='flipping'||flipState==='landed')&&(
        <div className="flipcoin-anim" aria-live="polite" aria-label="Munt wordt gegooid">
          <div className={`flipcoin-coin ${flipState==='landed'?(pendingOutcome==='video'?'settled video':'settled photo'):(pendingOutcome==='video'?'landed-video':'flipping')}`}>
            {/* Edge slices — 60 layers from z=-29.5 to z=+29.5 (60px coin thickness on a 200px
                disc gives a chunky 1:3.3 ratio so depth reads even face-on). Alternating
                bright/dark gradients simulate the milled-reed edge of a real coin. */}
            {Array.from({length:60},(_,i)=>{
              const z=-29.5+i;
              const dark=i%2===1;
              return <div key={`s${i}`} className={dark?'flipcoin-slice dark':'flipcoin-slice'} aria-hidden="true" style={{transform:`translateZ(${z}px)`}}/>;
            })}
            <div className="flipcoin-face flipcoin-face-front">
              <span className="flipcoin-rim-dots" aria-hidden="true"/>
              <div className="flipcoin-disc">
                <svg className="flipcoin-icon" viewBox="0 0 100 100" aria-hidden="true">
                  {/* Embossed camera */}
                  <path d="M38 30 L45 22 L62 22 L69 30 L84 30 Q90 30 90 36 L90 76 Q90 82 84 82 L16 82 Q10 82 10 76 L10 36 Q10 30 16 30 Z" fill="currentColor"/>
                  <circle cx="50" cy="56" r="16" fill="#a07820"/>
                  <circle cx="50" cy="56" r="13" fill="currentColor"/>
                  <circle cx="50" cy="56" r="9" fill="#a07820"/>
                  <circle cx="46" cy="52" r="3" fill="#fbe27a" opacity="0.7"/>
                  <rect x="74" y="36" width="8" height="4" rx="1" fill="#a07820"/>
                </svg>
                <div className="flipcoin-pts">FOTO +{loc.ch[photoIdxs[0]]?.p}</div>
              </div>
            </div>
            <div className="flipcoin-face flipcoin-face-back">
              <span className="flipcoin-rim-dots" aria-hidden="true"/>
              <div className="flipcoin-disc">
                <svg className="flipcoin-icon" viewBox="0 0 100 100" aria-hidden="true">
                  {/* Embossed clapperboard */}
                  <path d="M10 28 L88 32 L86 46 L8 42 Z" fill="currentColor"/>
                  <path d="M22 28 L17 44 M36 29 L31 45 M50 30 L45 46 M64 31 L59 47 M78 32 L73 48" stroke="#a07820" strokeWidth="2.5" strokeLinecap="round"/>
                  <rect x="10" y="48" width="78" height="36" rx="3" fill="currentColor"/>
                  {/* film play triangle in body */}
                  <path d="M40 58 L62 66 L40 74 Z" fill="#a07820"/>
                </svg>
                <div className="flipcoin-pts">VIDEO +{loc.ch[videoIdxs[0]]?.p}</div>
              </div>
            </div>
          </div>
          <div className="flipcoin-shadow" aria-hidden="true"/>
          {/* V39+ celebration layer — flash + ring + 24 sparks emitted FROM the coin
              on landing. Result-coloured. Replaces the generic top-of-viewport confetti
              that read as disconnected score-popup decoration. */}
          {flipState==='landed'&&(
            <>
              <div className={`flipcoin-flash`} aria-hidden="true"/>
              <div className={`flipcoin-ring ${pendingOutcome==='video'?'video':'photo'}`} aria-hidden="true"/>
              <div className="flipcoin-burst" aria-hidden="true">
                {Array.from({length:24},(_,i)=>{
                  // Fan sparks in a 360° pattern with slight randomness, mix gold + outcome colour + streamer shape
                  const angle=(i*15+(i*37)%17)*Math.PI/180;
                  const dist=110+((i*53)%50);
                  const kind=i%3===0?'streamer':'';
                  const colour=i%2===0?'gold':(pendingOutcome==='video'?'video':'photo');
                  const delay=(i%5)*18;
                  return <div key={`spark${i}`} className={`flipcoin-spark ${colour} ${kind}`} style={{['--angle']:angle+'rad',['--dist']:dist+'px',animationDelay:delay+'ms'}}/>;
                })}
              </div>
            </>
          )}
        </div>
      )}

      {/* CTA button */}
      {flipState==='idle'&&(
        <button className="flipcoin-btn" onClick={doFlip}>
          🪙 Munt Gooien
        </button>
      )}

      {/* V40: tagline word-consistency fix — V39 said "Vang een moment" but mystery card
          shows "Het moment" (no "een"). Aligned to "Vang het moment" per v39-sim P3 finding. */}
      <div className="flipcoin-tagline">Vang het moment… of creëer het verhaal.</div>
    </div>
  );
}

function ChallengeSheet({loc,pos,completed,completedPts={},onComplete,onClose,seenQuizzes,isAdmin,myTeam,jorikInTeam,isJorikDevice=false,confirmAsync,gpsGateBypass=false}){
  // V29 (§4): Escape-to-close wasn't wired. Backdrop click was, but the ✕
  // button was a dim 26px text glyph on no background — Mike couldn't find
  // it in his screenshots. Below we (a) listen for Escape globally while this
  // sheet is open, (b) swap the glyph for a high-contrast circular button.
  React.useEffect(()=>{
    if(!loc)return;
    const onKey=(e)=>{if(e.key==='Escape'){e.preventDefault();onClose&&onClose();}};
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[loc,onClose]);
  if(!loc)return null;
  const dist=pos?haversine(pos.lat,pos.lng,loc.la,loc.lo):null;
  // V25 (#71): two-radius band classification for this POI
  const{band}=locBand(pos,loc);
  // V7.1 hotfix: only lock quizzes when the location actually HAS a photo challenge to unlock against.
  // Otherwise quiz-only locations (Spido Kade, BlueCity, Willemswerf) would be permanently unreachable.
  // V38: for Flippercoin locations, only consider the coin-selected media challenge
  // as the gate for quiz unlock — otherwise quizzes stay locked forever if the
  // non-selected media type is the only "photo" type the location has.
  const hasAnyPhoto=loc.ch.some((ch,i)=>{
    const isMedia=ch.t==='photo'||ch.t==='video'||ch.t==='creative';
    if(!isMedia)return false;
    // If flippercoin is active, only count visible challenges
    if(isFlipLoc&&flipVisibleIdx&&!flipVisibleIdx.has(i))return false;
    return true;
  });
  const hasPhotoCompleted=loc.ch.some((ch,i)=>{
    const isMedia=ch.t==='photo'||ch.t==='video'||ch.t==='creative';
    if(!isMedia)return false;
    if(isFlipLoc&&flipVisibleIdx&&!flipVisibleIdx.has(i))return false;
    return completed[i];
  });

  // V5: compute the quiz to show for this visit (rotate through unseen)
  // We render one rotating-quiz slot that replaces all the location's built-in quizzes.
  // Built-in quiz indexes and a virtual index 'rotatedQuiz' for the dynamic slot.
  const locQuizIndexes=loc.ch.map((c,i)=>c.t==='quiz'?i:-1).filter(i=>i>=0);
  const allLocQuizzesDone=locQuizIndexes.length>0&&locQuizIndexes.every(i=>completed[i]);
  // The rotated quiz is only relevant once all built-in quizzes are done; then we draw from the pool
  const rotatedQuiz=allLocQuizzesDone?pickQuiz(loc,seenQuizzes||new Set()):null;

  // V38: Flippercoin mechanic — detect if this location qualifies
  const isFlipLoc=isFlippercoinLocation(loc);
  const[flipResult,setFlipResult]=useState(()=>{
    if(!isFlipLoc||!myTeam)return null;
    return getFlipResult(loc.id,myTeam.id);
  });

  // V38: determine which challenge indexes are visible based on the flip result.
  // Quiz and creative challenges always show. Photo/video: only the coin-selected type.
  // For Oude Haven (2 photos + 1 video): if coin says 'photo', pick the higher-points one.
  const flipVisibleIdx=React.useMemo(()=>{
    if(!isFlipLoc||!flipResult)return null; // all visible (no flip yet or not a flip location)
    const visible=new Set();
    const photoIdxs=[];
    const videoIdxs=[];
    loc.ch.forEach((ch,i)=>{
      if(ch.t==='quiz'||ch.t==='creative'){visible.add(i);return;}
      if(ch.t==='photo')photoIdxs.push(i);
      if(ch.t==='video')videoIdxs.push(i);
    });
    if(flipResult==='photo'){
      // If multiple photos, pick the one with highest points
      if(photoIdxs.length>1){
        photoIdxs.sort((a,b)=>loc.ch[b].p-loc.ch[a].p);
        visible.add(photoIdxs[0]); // highest-points photo
      }else if(photoIdxs.length===1){
        visible.add(photoIdxs[0]);
      }
    }else if(flipResult==='video'){
      videoIdxs.forEach(i=>visible.add(i));
    }
    return visible;
  },[isFlipLoc,flipResult,loc]);

  return(
    <>
      <div className="sheet-overlay" onClick={onClose}/>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div className="row-between" style={{alignItems:'flex-start',marginBottom:'var(--sp-3)'}}>
          <div>
            <div style={{fontSize:'var(--icon-sm)',marginBottom:'var(--sp-2)',filter:'drop-shadow(0 4px 12px rgba(0,0,0,0.35))'}}>{loc.e}</div>
            <h2 className="t-section">{loc.n}</h2>
            <div className="row-2" style={{marginTop:'var(--sp-2)',flexWrap:'wrap'}}>
              <span className="chip chip-blue">{loc.c}</span>
              {isFlipLoc&&<span className="chip" style={{background:'rgba(228,178,92,0.14)',borderColor:'rgba(228,178,92,0.3)',color:'var(--accent-2)'}}>🪙 Flippercoin</span>}
              <a href={`https://www.google.com/maps/dir/?api=1&destination=${loc.la},${loc.lo}&travelmode=walking`} target="_blank" rel="noopener noreferrer"
                className="chip" style={{background:'rgba(95,216,165,0.14)',borderColor:'rgba(95,216,165,0.3)',color:'var(--creatief-2)',textDecoration:'none'}}>🧭 Route</a>
            </div>
          </div>
          {/* V29 (§4): bigger, higher-contrast close button — circular pill
              so it reads as a button, not a dim glyph. Sits flush in corner. */}
          <button onClick={onClose} aria-label="Sluiten" className="btn-close" type="button" style={{marginLeft:'var(--sp-3)'}}>✕</button>
        </div>
        {/* V25 (#71): band-aware proximity panel — mini two-ring map + pill + copy */}
        <div style={{display:'flex',alignItems:'center',gap:'var(--sp-3)',padding:'var(--sp-3)',borderRadius:'var(--r-md)',background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',marginBottom:'var(--sp-5)'}}>
          <TwoRingIndicator dist={dist} pos={pos} loc={loc}/>
          <div style={{flex:1,minWidth:0}}>
            <span className={`band-pill ${band==='unknown'?'far':band}`}>
              {band==='unlock'?'🎯 Nu te doen':band==='preview'?'🔥 In de buurt':band==='far'?'🧭 Verder weg':'📍 GPS onbekend'}
            </span>
            <div style={{marginTop:6,fontSize:13,lineHeight:1.4,color:'var(--text-secondary)'}}>
              {band==='unlock'?'Je bent er — maak je foto of video hier.':
               band==='preview'?`Bijna daar · ${fmtDist(dist)} — blijf lopen richting ${loc.n}.`:
               band==='far'?`Nog ver weg · ${fmtDist(dist)} — loop richting ${loc.n} om te openen.`:
               'Nog geen GPS-fix. Je kunt wel alvast de challenges lezen.'}
            </div>
          </div>
        </div>

        {/* V38: Flippercoin gate — if location has both photo+video, require coin flip first */}
        {isFlipLoc&&!flipResult&&myTeam&&(
          <FlippercoinGate loc={loc} teamId={myTeam.id} onReveal={(r)=>setFlipResult(r)}>
            {()=>null}
          </FlippercoinGate>
        )}
        {/* V38: after flip, show which challenge the coin selected */}
        {isFlipLoc&&flipResult&&(
          <div className="flipcoin-reveal" style={{marginBottom:'var(--sp-4)'}}>
            <div className={`flipcoin-reveal-badge ${flipResult}`}>
              {flipResult==='photo'?'📸 Foto-opdracht':'🎥 Video-opdracht'} ontgrendeld
            </div>
            <div className="t-caption">De Flippercoin heeft gesproken — {flipResult==='video'?'video levert meer punten op!':'maak een epische foto!'}</div>
          </div>
        )}

        {loc.ch.map((ch,idx)=>{
          // V38: Flippercoin visibility filter — hide non-selected media challenges
          if(isFlipLoc&&flipResult&&flipVisibleIdx&&!flipVisibleIdx.has(idx)){
            // Show a greyed-out "hidden by coin" card for the non-selected type
            const isMedia=ch.t==='photo'||ch.t==='video';
            if(isMedia&&!completed[idx]){
              return(
                <div key={idx} className="flipcoin-hidden-card">
                  <span style={{fontSize:'var(--fs-12)'}}>{ch.t==='photo'?'📸':'🎥'} {ch.ti}</span>
                  <div className="t-caption" style={{marginTop:'var(--sp-1)'}}>🪙 Niet geselecteerd door de Flippercoin</div>
                </div>
              );
            }
          }
          // V38: if flippercoin location but not yet flipped, hide media challenges
          if(isFlipLoc&&!flipResult&&(ch.t==='photo'||ch.t==='video')){
            return null; // hidden until coin is flipped
          }
          const done=completed[idx];
          const isQuiz=ch.t==='quiz';
          const locked=isQuiz&&hasAnyPhoto&&!hasPhotoCompleted;
          // V30 — wp:1 secret-mission gate. The wedding-pipeline shots are explicitly
          // for the surprise wedding video that Jorik must NOT see during the game.
          // The LeaderboardView wp:1 progress chip already hides when jorikInTeam,
          // but the L_DATA challenge cards themselves were still tappable on the
          // map / TaskList by the holding team — defeating the secrecy. Now if the
          // holding team opens a wp:1 challenge, the card shows a secrecy lock
          // explaining why and offering no upload action. Non-holders see normal.
          // V37: Jorik's own phone also gets the secrecy lock — without this, when
          // Jorik (the person) is in a team that doesn't currently hold the rotating
          // token, opening any wp:1 card renders the full bruiloft-themed description
          // (V37 P0 #2 sanitises the descriptions but the secrecy lock is the visible-
          // even-if-sanitised guard). The original "team-currently-holds-token" gate
          // stays as the secondary lock for the holding team's mid-rotation safety.
          const isSecretWp=ch.wp===1&&(jorikInTeam||isJorikDevice);
          // V10: distinguish wrong-gegokt (pts=0) from correct completion
          const ptsEarned=completedPts[idx];
          const wasWrong=done && ptsEarned===0;

          // V18 (V14 A5): show the full unlock chain when the quiz is locked
          const photoGate=PHOTO_GATE_RADIUS+PHOTO_GATE_GRACE;
          const farFromPoi=locked&&!isAdmin&&dist!=null&&dist>photoGate;
          const lockMsg=farFromPoi
            ?`🔒 Loop naar ${loc.n} · foto maken · dan opent de quiz`
            :'🔒 Eerst een foto-opdracht — dan opent de quiz';
          // V30 — secrecy lock takes precedence over the quiz-locked overlay.
          // V37 — copy branches on isJorikDevice (Jorik's own phone gets innocuous).
          // V40.1 (security review P0): TWO hardening fixes:
          //   (1) DROP the !done clause. Pre-V40.1 gate was `isSecretWp && !done` so a
          //       wp:1 challenge a team completed BEFORE Jorik rotated to them would re-render
          //       with full title + description when Jorik later landed on their team. Real
          //       6-June scenario: Maffiosi finishes POI 41 wp:1 pre-bar-break #1, Jorik
          //       rotates to Maffiosi at bar break #2, a teammate scrolls back to "show the
          //       cool video," Jorik leans in, leak. Fix: lock RENDERS regardless of done
          //       state when Jorik is in the team or on the device. The completion is still
          //       in the team's score; just not displayed at card-level.
          //   (2) STRIP "bruiloftsvideo van Jorik op 14 juni" from the non-Jorik-device copy.
          //       Pre-V40.1 said the exact words — shoulder-leak if Jorik glanced at a
          //       teammate's screen while they explained why the card is locked. New copy
          //       hints at a secret without naming it.
          if(isSecretWp){
            return(
              <div key={idx} className="ch-card" style={{position:'relative',borderColor:'rgba(228,178,92,0.35)',background:'linear-gradient(155deg,rgba(228,178,92,0.08),rgba(255,107,107,0.04))'}}>
                <div className="row-between" style={{alignItems:'flex-start',marginBottom:'var(--sp-2)'}}>
                  <div className="flex-1">
                    <span className="ch-type" style={{background:'rgba(228,178,92,0.18)',color:'var(--accent-2)'}}>{isJorikDevice?'team-only':'geheim'}</span>
                    {/* V40.1: title is replaced too — wp:1 title may be wedding-themed
                        (e.g. "De Bruiloft-aankondiging"). Show a neutral placeholder. */}
                    <h3 className="t-card-label" style={{marginTop:'var(--sp-2)'}}>{done?'Geheime missie · ✓ voltooid':'Geheime missie'}</h3>
                  </div>
                  <div className="points-badge">+{ch.p}</div>
                </div>
                <div style={{padding:'var(--sp-3)',borderRadius:'var(--r-md)',background:'rgba(0,0,0,0.25)',border:'1px dashed rgba(228,178,92,0.45)'}}>
                  <div style={{fontSize:24,marginBottom:'var(--sp-1)'}}>{isJorikDevice?'🙌':'🤫'}</div>
                  <div className="t-card-label t-accent" style={{marginBottom:'var(--sp-1)'}}>{isJorikDevice?'Niet voor jou vandaag':done?'Geheime missie · al gedaan':'Geheime missie'}</div>
                  <div className="t-caption" style={{lineHeight:'var(--lh-relaxed)',color:'var(--text-secondary)'}}>{isJorikDevice?'Deze opdracht is gereserveerd voor de andere teams. Jij hebt vandaag andere dingen te doen — kijk op de kaart voor opdrachten waar je wél punten kan halen.':done?'Punten staan op jullie totaal. Inhoud blijft geheim zolang Jorik bij jullie team is.':'Bewaar deze voor wanneer Jorik niet bij jullie team is. Wordt weer beschikbaar bij de volgende rotatie.'}</div>
                </div>
              </div>
            );
          }
          return(
            <div key={idx} className={`ch-card ${done&&!wasWrong?'completed':''} ${wasWrong?'wrong-done':''} ${locked?'locked':''}`} style={{position:'relative'}}>
              {locked&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:1,padding:'var(--sp-3)',textAlign:'center'}} className="t-card-label t-accent" title="Unlock volgorde: locatie bereiken → foto maken → quiz wordt open">{lockMsg}</div>}
              <div className="row-between" style={{alignItems:'flex-start',marginBottom:'var(--sp-2)'}}>
                <div className="flex-1">
                  <span className={`ch-type ch-type-${ch.t}`}>{ch.t}</span>
                  <h3 className="t-card-label" style={{marginTop:'var(--sp-2)'}}>{ch.ti}</h3>
                </div>
                <div className="points-badge">+{ch.p}</div>
              </div>
              <p className="t-body" style={{marginBottom:'var(--sp-2)'}}>{ch.d}</p>
              {/* V35 P1 fix (Tom persona): captain-side wp:1 secrecy chip. When the
                  current team does NOT have Jorik AND the challenge is wp:1, render
                  a subtle banner so the captain knows this footage is for the surprise
                  edit and Jorik must not see it. Holding team already gets a hard
                  secrecy lock above; this chip educates non-holders without spoiling. */}
              {/* V36 hot-fix (Lisa P0): also gate the captain-side wp:1 chip on
                  "is real player team" — spectators with myTeam.spectator=true
                  satisfied the !jorikInTeam check and saw the explicit "Voor de
                  bruiloftsedit · Jorik mag dit niet zien" reveal. */}
              {/* V37: also gate captain-side wp:1 chip on !isJorikDevice — without this,
                  Jorik's own phone (in a non-token-holding team) saw the explicit
                  "🎬 Voor de bruiloftsedit · Jorik mag dit niet zien" reveal. The
                  isSecretWp gate above already short-circuits before this renders,
                  but the redundant gate keeps the contract explicit. */}
              {/* V40.1: chip text now reads from ch.wpInstruction (set per-challenge in L_DATA).
                  Falls back to the V35 default for legacy wp:1 challenges (POI 1, POI 16).
                  Gates ensure Jorik never sees this string. */}
              {ch.wp===1&&!jorikInTeam&&!isJorikDevice&&!done&&myTeam?.id>0&&!myTeam?.spectator&&(
                <div className="panel-sm" style={{background:'rgba(228,178,92,0.08)',borderColor:'rgba(228,178,92,0.30)',padding:'var(--sp-2) var(--sp-3)',marginBottom:'var(--sp-2)',display:'flex',alignItems:'center',gap:'var(--sp-2)'}}>
                  <span style={{fontSize:18}}>🎬</span>
                  <div className="t-caption" style={{flex:1,lineHeight:'var(--lh-relaxed)'}}>
                    {ch.wpInstruction?<>
                      <b style={{color:'var(--accent-2)'}}>Voor de bruiloftsedit</b> — {ch.wpInstruction.replace(/^📹\s*Voor de bruiloftsedit\s*[—-]\s*/,'')}
                    </>:<>
                      <b style={{color:'var(--accent-2)'}}>Voor de bruiloftsedit</b> — Jorik mag dit niet zien. Pak iemand om de hoek, film discreet.
                    </>}
                  </div>
                </div>
              )}
              {/* V30 (Phase 8): scoring clarity — explicit one-line rule.
                  Every L_DATA challenge is one-shot per team (the v20 unique
                  constraint on completed_challenges enforces this). Before V30
                  players had to infer from the faded card after submit; now the
                  rule ships with the card so teams don't waste effort hoping a
                  second photo might score again. */}
              <div className="t-label-sm t-muted" style={{marginBottom:'var(--sp-3)',letterSpacing:'0.3px'}}>✅ 1× per team · eerste team +{FIRST_BONUS} bonus</div>
              <div className="row-between">
                <div className="difficulty"><span className="star">{stars(ch.df)}</span> {ch.df}</div>
                {done&&!wasWrong&&<div className="t-body-emph t-success">✓ Voltooid {ptsEarned>0&&`(+${ptsEarned} pts)`}</div>}
                {wasWrong&&<div className="t-body-emph t-danger">✗ Fout gegokt · 0 pts{isQuiz&&ch.a?` · antwoord: ${ch.a}`:''}</div>}
              </div>
              {!done&&!locked&&<ChallengeAction ch={ch} locId={loc.id} chIdx={idx} onComplete={onComplete} dist={dist} isAdmin={isAdmin} loc={loc} myTeam={myTeam} confirmAsync={confirmAsync} gpsGateBypass={gpsGateBypass}/>}
            </div>
          );
        })}

        {/* V5: dynamic rotating-quiz slot once built-in quizzes are exhausted */}
        {rotatedQuiz&&hasPhotoCompleted&&(
          <div className="ch-card" style={{borderColor:'rgba(255,215,0,0.3)',background:'rgba(255,215,0,0.04)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:8}}>
              <div style={{flex:1}}>
                <span className="ch-type ch-type-quiz">🎲 BONUS QUIZ</span>
                <h3 style={{fontSize:15,fontWeight:700,marginTop:6}}>{rotatedQuiz.ti}</h3>
              </div>
              <div className="points-badge">+{rotatedQuiz.p}</div>
            </div>
            <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:10,lineHeight:1.4}}>{rotatedQuiz.d}</p>
            <div style={{fontSize:11,color:'var(--text-secondary)',marginBottom:8,fontStyle:'italic'}}>
              {rotatedQuiz._pool?'🎯 Bonus Rotterdam-vraag':'⭐ Extra vraag voor deze plek'}
            </div>
            {/* V30 (Phase 8): dynamic bonus quizzes rotate — you can keep doing
                them until the pool is dry. Make that obvious next to the card. */}
            <div className="t-label-sm t-muted" style={{marginBottom:'var(--sp-2)',letterSpacing:'0.3px'}}>♻️ Zo vaak je wilt · elke keer +{rotatedQuiz.p} pts</div>
            <ChallengeAction ch={rotatedQuiz} locId={loc.id} chIdx={`dyn_${loc.id}_${Date.now()}`} dist={dist} isAdmin={isAdmin} loc={loc} myTeam={myTeam} confirmAsync={confirmAsync} gpsGateBypass={gpsGateBypass} onComplete={(lid,cidx,pts,photo)=>{
              // Dynamic-quiz rewards: award points, log activity, but do NOT mark built-in challenge
              onComplete(lid,-99,pts,photo);
            }}/>
          </div>
        )}
      </div>
    </>
  );
}

function ChallengeAction({ch,locId,chIdx,onComplete,dist,isAdmin,loc,myTeam,confirmAsync,gpsGateBypass=false}){
  const fileRef=useRef(null);
  const[preview,setPreview]=useState(null);
  const[quizAnswer,setQuizAnswer]=useState(null);
  const[quizFeedback,setQuizFeedback]=useState(null);
  const[processing,setProcessing]=useState(false);
  // V41.6 (F-1 fix, deep-audit 2026-05-16): inline network-failure surfacer.
  // Pre-V41.6 the photo_reviews insert used .then(()=>{},()=>{}) — failures were silent
  // and the UI flipped to "verstuurd" regardless. A player whose 4G dropped mid-upload
  // saw their local score increment without anything landing in the DB. Now we await
  // the insert and store the result; on error we surface an inline retry prompt and
  // DON'T call onComplete (which would corrupt local-only score state).
  const[uploadError,setUploadError]=useState(null);
  // V37 P1 fix (Sandra audit finding): the cyan upload button used to morph
  // straight from "📸 Foto opnemen" → "📸 Opnieuw proberen" after submit, which
  // low-tech users read as "the upload failed, try again". Now we hold an
  // intermediate "✅ Foto verstuurd · wacht op beoordeling" success-green state
  // for ~6 seconds before the "Opnieuw" affordance appears, so the success is
  // legible. Auto-clears so a real "I want to retry with a different photo"
  // flow still works.
  const[justSubmitted,setJustSubmitted]=useState(false);
  const quizLockRef=useRef(false);

  // V16: spectator admin (myTeam.id === -1) can't be credited scoring.
  // V35: also id===-2 (non-admin Toeschouwer added in V34).
  const isSpectator=myTeam?.spectator||myTeam?.id===-1||myTeam?.id===-2;
  const isAdminSpectator=isSpectator&&isAdmin;
  const isMedia=ch.t==='photo'||ch.t==='video'||ch.t==='creative';
  const gateRadius=PHOTO_GATE_RADIUS+PHOTO_GATE_GRACE;
  // V23: GPS_GATE_BYPASS (TEST_MODE) lets every team upload from anywhere —
  // critical for sofa testing the photo flow without walking to Rotterdam.
  // Live behavior restored when TEST_MODE flips to false.
  const tooFar=isMedia&&!isAdmin&&!gpsGateBypass&&dist!=null&&dist>gateRadius;

  // V16: spectator guard — disable challenge completion since the score wouldn't persist.
  // V35 P1 fix (Lisa persona): copy was always "Game Master kan geen punten scoren"
  // regardless of role, and the hint "Join een team" doesn't apply to a Lisa-style
  // observer who actively chose to spectate. Branch on actual role for both copy
  // and tone — admin sees the GM framing, non-admin spectator sees the warm
  // "you're watching, that's the whole point" framing.
  if(isSpectator){
    return(
      <div className="gate-blocked" style={{background:isAdminSpectator?'rgba(228,178,92,0.08)':'rgba(110,163,255,0.08)',borderColor:isAdminSpectator?'rgba(228,178,92,0.25)':'rgba(110,163,255,0.25)'}}>
        <div className="gate-icon">{isAdminSpectator?'👑':'👁'}</div>
        <div className="flex-1">
          <div className="gate-text" style={{color:isAdminSpectator?'var(--accent-2)':'var(--foto-2)'}}>{isAdminSpectator?'Game Master kan geen punten scoren':'Je kijkt mee — alleen het team dat hier nu staat kan deze opdracht doen'}</div>
          <div className="gate-hint">{isAdminSpectator?'Join een team om mee te spelen':'Pak je telefoon en sluit aan bij een team in de lobby als je wel mee wilt scoren'}</div>
        </div>
      </div>
    );
  }

  const handleFile=async(e)=>{
    const f=e.target.files[0];
    if(!f)return;
    setProcessing(true);
    setUploadError(null);  // V41.6: clear stale errors on every new attempt
    // V41.6 (F-1 fix): pre-flight offline check. If the browser already reports offline,
    // skip the upload entirely so we don't pretend it succeeded.
    if(typeof navigator!=='undefined'&&navigator.onLine===false){
      setProcessing(false);
      setUploadError('Geen verbinding — wacht tot je weer online bent en probeer opnieuw.');
      return;
    }
    // V29 — confirm photo capture started with a soft haptic + audio cue.
    try{const c=window.__ssrPlayCue;if(c)c('upload');}catch(e2){}
    try{if(navigator.vibrate)navigator.vibrate(10);}catch(e2){}
    const r=new FileReader();
    r.onload=async(ev)=>{
      const raw=ev.target.result;
      let shareable=raw;
      if(!isVideoData(raw)){
        // V20: adaptive tiered compression (falls back to null only if 3 tiers still fail)
        shareable=await compressPhotoAdaptive(raw);
      }
      // V41.11 — try Storage bucket upload first; on any failure fall back to
      // inline base64 (V41.5 behavior). The `shareable` value gets the URL
      // when Storage works, else stays as the original/compressed data URL.
      // Storage upload skipped when shareable is null (compress failed) — the
      // null is propagated to photo_url and handled downstream.
      if(shareable){
        const blob=dataUrlToBlob(shareable);
        if(blob){
          const ct=blob.type||(isVideoData(raw)?'video/mp4':'image/jpeg');
          const prefix=`t${myTeam?.id||0}_l${locId}_c${typeof chIdx==='number'?chIdx:'x'}`;
          const url=await uploadMediaToStorage(sb,blob,prefix,ct);
          if(url)shareable=url;
        }
      }
      setPreview(raw);
      setProcessing(false);

      // V6: Insert a photo_review row into Supabase for the admin queue
      // V24: auto-approve when GPS distance is within AUTO_APPROVE_RADIUS (200m).
      // Mike's spec: in-range submissions skip the manual queue. Distant or no-GPS
      // submissions still go to 'pending' so the admin (or agent harness mass-approve)
      // can spot-check. The admin queue UI already filters status='pending', so
      // approved rows just don't appear there — points are awarded the same way.
      // V41.6 (F-1 fix): we now AWAIT the insert and react to errors. The two error
      // categories we care about: (1) network failure → show retry prompt + DON'T
      // mark challenge complete locally (which would corrupt score state); (2) any
      // other Supabase error → same fallback. The "table missing" silent path is
      // preserved for legacy environments via the err.code check.
      let insertError=null;
      if(!OFFLINE&&sb&&myTeam&&isMedia){
        const autoApprove=dist!=null&&dist<=AUTO_APPROVE_RADIUS;
        const reviewRow={
          team_id:myTeam.id,
          team_name:myTeam.name,
          team_emoji:myTeam.emoji,
          team_color:myTeam.color,
          location_id:locId,
          location_name:loc?.n||'',
          challenge_idx:typeof chIdx==='number'?chIdx:-99,
          challenge_title:ch.ti,
          challenge_type:ch.t,
          gps_distance:dist!=null?Math.round(dist):null,
          points_awarded:ch.p,
          // V41.5: store ALL bytes, no size cap. See V41.5 comment above.
          photo_url:shareable||null,
          status:autoApprove?'approved':'pending',
        };
        try{
          const{error}=await sb.from('photo_reviews').insert(reviewRow);
          if(error){
            const code=error.code||'';
            // 42P01 = table doesn't exist (pre-V6 schema). Treat as legacy-silent,
            // not a user-visible error — the challenge still completes locally.
            if(code!=='42P01'&&code!=='PGRST205'){
              insertError=error;
            }
          }
        }catch(netErr){
          // TypeError: Failed to fetch / NetworkError → 4G dropped mid-POST
          insertError=netErr;
        }
      }
      if(insertError){
        // V41.6: surface to user inline. DO NOT call onComplete — that would advance
        // the local score state without a matching DB row, causing leaderboard drift.
        const msg=insertError.message||'';
        const friendly=/fetch|network|failed/i.test(msg)
          ?'Geen verbinding — foto niet opgeslagen. Probeer opnieuw als je weer online bent.'
          :'Upload mislukt — probeer opnieuw. ('+(msg||'onbekende fout')+')';
        setUploadError(friendly);
        try{if(navigator.vibrate)navigator.vibrate([60,40,60]);}catch(e2){}
        return;
      }

      onComplete(locId,chIdx,ch.p,shareable);
      // V37 P1: hold the success-confirmation state for ~6s before the upload
      // button reverts to "Opnieuw" affordance. Sandra-grade users no longer
      // misread the morph as failure.
      setJustSubmitted(true);
      setTimeout(()=>setJustSubmitted(false),6000);
    };
    r.onerror=()=>{setProcessing(false);setUploadError('Bestand kon niet gelezen worden. Probeer opnieuw.');};
    r.readAsDataURL(f);
  };

  // V7: one shot. Correct → full points. Wrong → 0 pts, challenge marked done.
  // V7.1: ref-based lock — state is async, so two fast taps could both pass the
  // `if(quizAnswer)` check before React re-renders the disabled buttons.
  // V41.3 (Mike live-test 2026-05-16): replaced V36's broken 600ms tap-to-stage
  // with an explicit confirmation modal. Tap → DialogSheet "Weet je het zeker?
  // Antwoord X: …" with Ja / Annuleer. No timer, no subtle inline hint, no
  // mistap-with-no-undo. Cancel just clears the staged answer; the lock isn't
  // taken until the user confirms.
  const handleQuiz=async opt=>{
    if(quizLockRef.current)return;
    // Optimistic visual: provisionally lock so a second tap during the modal
    // round-trip can't fire a parallel confirmAsync. Released on cancel.
    quizLockRef.current=true;
    const letter=String.fromCharCode(65+ch.o.indexOf(opt));
    const ok=confirmAsync
      ?await confirmAsync(`Antwoord ${letter}: ${opt}\n\nWeet je het zeker? Eén kans — fout = 0 pts.`,{confirmLabel:'Ja, dit is mijn antwoord',cancelLabel:'Annuleer'})
      :true;
    if(!ok){
      quizLockRef.current=false;
      return;
    }
    setQuizAnswer(opt);
    if(opt===ch.a){
      setQuizFeedback('correct');
      // V29 audio + haptic cue. Correct answer = bright two-tone bell + short tap.
      try{const c=window.__ssrPlayCue;if(c)c('correct');}catch(e){}
      try{if(navigator.vibrate)navigator.vibrate([15,40,15]);}catch(e){}
      // V40 P3 (sim suggestion): trigger confetti on quiz-correct. Match the photo/video
      // celebration moment — currently only score-popup fires, but a quiz-right is a tiny
      // dopamine hit worth amplifying. Scales with the quiz pts via existing tiered burst.
      try{const tc=window.__ssrTriggerConfetti;if(tc)tc(ch.p);}catch(e){}
      setTimeout(()=>onComplete(locId,chIdx,ch.p,null),700);
    }else{
      setQuizFeedback('wrong');
      // V29 audio + haptic cue. Wrong = downward sawtooth + longer "buzzer" tap.
      try{const c=window.__ssrPlayCue;if(c)c('wrong');}catch(e){}
      try{if(navigator.vibrate)navigator.vibrate([180]);}catch(e){}
      // Reveal the correct answer during feedback, then mark done with 0 pts
      setTimeout(()=>onComplete(locId,chIdx,0,null),QUIZ_WRONG_FEEDBACK_MS);
    }
  };

  if(ch.t==='quiz'){
    // V12: advertise stakes clearly before the tap.
    // V41.2: removed V36 "tik 2x" copy — stakes is now uniform per difficulty,
    // matches the reverted one-shot behaviour. "Eén kans · fout = 0 pts" makes it
    // clear the tap commits immediately.
    const stakes=ch.df==='hard'?'⚡ Eén kans · hard — 4 opties · fout = 0 pts':ch.df==='medium'?'⚡ Eén kans · medium — fout = 0 pts':'⚡ Eén kans · easy — fout = 0 pts';
    return(
      <div style={{marginTop:'var(--sp-3)'}}>
        <div className="t-body-emph t-danger" style={{padding:`var(--sp-2) var(--sp-3)`,borderRadius:'var(--r-md)',background:'rgba(255,107,107,0.1)',border:'1px solid rgba(255,107,107,0.25)',marginBottom:'var(--sp-3)'}}>
          {stakes}
        </div>
        {ch.o.map((opt,i)=>{
          const isChosen=quizAnswer===opt;
          const isRightAnswer=opt===ch.a;
          // During wrong-feedback, highlight the correct answer in green too
          const revealRight=quizFeedback==='wrong'&&isRightAnswer;
          const letter=String.fromCharCode(65+i); // A / B / C / D
          return(
            <button key={i}
              className={`quiz-option ${isChosen?(quizFeedback==='correct'?'correct':'wrong'):''} ${revealRight?'correct':''}`}
              onClick={()=>handleQuiz(opt)}
              aria-label={`Antwoord ${letter}: ${opt}`}
              disabled={!!quizAnswer}>
              <span aria-hidden="true" style={{display:'inline-block',width:22,height:22,lineHeight:'22px',borderRadius:11,background:'rgba(255,255,255,0.06)',textAlign:'center',fontWeight:800,fontSize:11,marginRight:10,color:'var(--text-secondary)'}}>{letter}</span>
              {opt}
              {revealRight&&<span style={{marginLeft:8,fontSize:11,fontWeight:700}}>← juist</span>}
            </button>
          );
        })}
        {quizFeedback==='wrong'&&(
          <div style={{marginTop:'var(--sp-3)'}}>
            <div className="t-body-emph t-danger">❌ Helaas. Het juiste antwoord was: {ch.a} · 0 pts</div>
            {/* V18 (§1.7.5): "Waarom?" — open a search on the correct answer + context so players can learn it */}
            <a href={`https://www.google.com/search?q=${encodeURIComponent(`${ch.a} ${loc?.n||''} ${ch.ti} Rotterdam`)}`}
              target="_blank" rel="noopener noreferrer"
              className="t-caption" style={{display:'inline-block',marginTop:'var(--sp-2)',color:'var(--foto-2)',textDecoration:'underline',cursor:'pointer'}}>
              ⓘ Waarom? Zoek uitleg op
            </a>
          </div>
        )}
        {quizFeedback==='correct'&&<div className="t-body-emph t-success" style={{marginTop:'var(--sp-3)'}}>✅ Correct! +{ch.p} pts</div>}
      </div>
    );
  }

  // V6/V16: GPS gate UI — single-line distance, no duplication
  // V25 (#55): dropped the "-Nm" negative-prefixed badge; the hint text already
  // communicates the remaining distance positively, and a minus sign here made
  // it look like a countdown going the wrong way.
  if(tooFar){
    const need=Math.round(dist-gateRadius);
    return(
      <div className="gate-blocked">
        <div className="gate-icon">📍</div>
        <div className="flex-1">
          <div className="gate-text">Loop dichterbij om de foto te maken</div>
          <div className="gate-hint">Nog {need}m tot binnen range</div>
        </div>
        <div className="gate-distance">{need}m</div>
      </div>
    );
  }

  const accept=ch.t==='video'?'video/*':ch.t==='creative'?'image/*,video/*':'image/*';
  return(
    <div style={{marginTop:12}}>
      {/* V19+: drop capture="environment" so iOS/Android show the native
          take-photo-or-pick-from-library sheet. Desktop keeps the regular picker. */}
      <input ref={fileRef} type="file" accept={accept} style={{display:'none'}} onChange={handleFile}/>
      {/* V41.6 (F-1 fix): inline upload-error banner. Surfaces network failure or
          Supabase error so the player KNOWS the upload didn't land. Without this
          a spotty-4G upload was silently lost behind a "verstuurd" success state. */}
      {uploadError&&(
        <div className="t-body-emph t-danger" style={{padding:'var(--sp-2) var(--sp-3)',borderRadius:'var(--r-md)',background:'rgba(255,107,107,0.12)',border:'1px solid rgba(255,107,107,0.35)',marginBottom:'var(--sp-2)',display:'flex',alignItems:'flex-start',gap:'var(--sp-2)'}}>
          <span style={{fontSize:18,flexShrink:0}}>📡</span>
          <div className="flex-1">
            <div style={{fontWeight:700,marginBottom:2}}>Upload mislukt</div>
            <div className="t-body" style={{opacity:0.92}}>{uploadError}</div>
          </div>
        </div>
      )}
      <button className={`btn ${justSubmitted?'btn-success':uploadError?'btn-danger':'btn-cyan'}`} onClick={()=>!justSubmitted&&fileRef.current?.click()} disabled={processing||justSubmitted} style={{width:'100%'}}>
        {processing
          ?'⏳ Verwerken...'
          :justSubmitted
            ?'✅ Foto verstuurd · wacht op beoordeling'
            :uploadError
              ?(ch.t==='video'?'🔄 Opnieuw uploaden':'🔄 Opnieuw uploaden')
              :preview
                ?(ch.t==='video'?'🎬 Opnieuw opnemen':'📸 Opnieuw proberen')
                :(ch.t==='video'?'🎬 Video opnemen of kiezen':ch.t==='creative'?'📸 Foto/video opnemen of kiezen':'📸 Foto opnemen of kiezen')
        }
      </button>
      {/* V21 P1-fix #29: hint text explaining the native picker has both camera & library options */}
      {!preview&&!processing&&(

// WEDDING VIDEO MISSION
// ═══════════════════════════════════════════
// V41.10 — WeddingMission is a per-round captain-tracked checklist with
// optional video upload. Mike confirmed Supabase Pro plan has 100 GB Storage
// headroom, so videos CAN upload — but the captain-checklist UX is still the
// right primitive (better than the original upload-with-retake flow):
//
//   - Primary action per round: 📹 Upload (uploads bytes to photo_reviews,
//     auto-marks the round as ticked).
//   - Escape hatch: ✓ Alleen afvinken — for if team recorded on iPhone and
//     prefers to share later via WhatsApp/AirDrop.
//   - Multiple takes per round allowed (no UNIQUE on photo_reviews) — Mike
//     gets a fuller editing pool.
//   - 4/4 ticked → +50 pts bonus (via separate sentinel INSERT, UNIQUE-guarded
//     against cross-device races).
//   - All wedding inserts use location_id=-1, status='approved' (no GPS gate,
//     skips the admin review queue — straight into Mike's collection).
//   - [WP1] prefix on activity_feed entries so they never leak to Jorik.
function RoundRow({r,ticked,jorikInTeam,onUploadTake,onTickRound,ask}){
  const[uploading,setUploading]=useState(false);
  const[uploadError,setUploadError]=useState(null);
  const[uploadCount,setUploadCount]=useState(0);
  const inputRef=useRef(null);
  const handleFile=async(e)=>{
    const f=e.target.files&&e.target.files[0];
    e.target.value='';
    if(!f)return;
    setUploading(true);setUploadError(null);
    try{
      await onUploadTake(r.n,f);
      setUploadCount(c=>c+1);
    }catch(err){
      setUploadError(err&&err.message?err.message:'Upload mislukt — probeer opnieuw.');
    }finally{
      setUploading(false);
    }
  };
  return(
    <div style={{padding:'var(--sp-3)',borderRadius:'var(--r-md)',border:'1px solid',borderColor:ticked?'rgba(95,216,165,0.45)':'var(--border)',background:ticked?'rgba(95,216,165,0.06)':'rgba(255,255,255,0.03)'}}>
      <input ref={inputRef} type="file" accept="video/*" style={{display:'none'}} onChange={handleFile}/>
      <div className="row-between" style={{marginBottom:'var(--sp-2)',gap:'var(--sp-3)'}}>
        <div style={{display:'flex',alignItems:'center',gap:'var(--sp-3)',flex:1,minWidth:0}}>
          <span style={{fontSize:22,width:26,textAlign:'center',flexShrink:0}}>{ticked?'✅':'⬜'}</span>
          <div style={{flex:1,minWidth:0}}>
            <div className="t-body-emph" style={{color:'#fff'}}>{r.label}</div>
            <div className="t-caption t-muted">{r.time}</div>
          </div>
        </div>
        {(ticked||uploadCount>0)&&(
          <span className="t-label-sm" style={{color:'var(--success)',flexShrink:0,whiteSpace:'nowrap'}}>
            {uploadCount>0?`✓ ${uploadCount} take${uploadCount>1?'s':''}`:'Afgevinkt'}
          </span>
        )}
      </div>
      <div style={{display:'flex',gap:'var(--sp-2)'}}>
        <button onClick={()=>{if(jorikInTeam||uploading)return;inputRef.current&&inputRef.current.click();}}
          disabled={jorikInTeam||uploading} type="button"
          className="btn btn-cyan btn-sm" style={{flex:1,minHeight:44}}>
          {uploading?'⏳ Uploaden…':ticked?'📹 Nog een take':'📹 Upload video'}
        </button>
        {!ticked&&!uploading&&(
          <button onClick={async()=>{
            if(jorikInTeam)return;
            if(await ask(`Ronde ${r.n} alleen afvinken (zonder video upload)? Bevestig dat het team de take op telefoon heeft en deze later met Mike deelt via WhatsApp.`,{confirmLabel:'Alleen afvinken'})){
              onTickRound(r.n);
            }
          }}
          disabled={jorikInTeam} type="button"
          className="btn btn-ghost btn-sm" style={{minHeight:44,whiteSpace:'nowrap'}}>
            ✓ Alleen afvinken
          </button>
        )}
      </div>
      {uploadError&&(
        <div role="alert" className="t-caption" style={{color:'var(--video-2)',marginTop:'var(--sp-2)',lineHeight:'var(--lh-relaxed)'}}>
          ❌ {uploadError}
        </div>
      )}
    </div>
  );
}
