  {t:"quiz",ti:"Tunnel Quiz",d:"Wanneer werd de Maastunnel geopend?",a:"1942",o:["1942","1935","1950","1960"],p:20,df:"medium"}]},
{id:52,n:"Het Park",la:51.906157,lo:4.470373,e:"🌿",c:"park",r:20,ch:[{t:"photo",ti:"Euromast Postcard",d:"Maak een epische ansichtkaartfoto van de Euromast vanuit Het Park. Eén teamlid staat op de voorgrond en geeft met één uitgestrekte hand aan hoe hoog de Euromast is — klassiek perspectief-trucje. Euromast groot en scherp op de achtergrond. Zo toeristisch en postcard-waardig mogelijk.",p:20,df:"easy"}]},
{id:53,n:"Veerhaven",la:51.907406,lo:4.478667,e:"⚓",c:"landmark",r:15,ch:[{t:"photo",ti:"Vrouwennamen",d:"Veel boten in de Veerhaven dragen een vrouwennaam. Vind er minstens 3 en fotografeer het team wijzend naar de naam op de romp — bij elke boot een aparte foto. Drie foto's inleveren. Namen duidelijk leesbaar in beeld.",p:30,df:"medium"}]},
{id:54,n:"Maastoren",la:51.908768,lo:4.493358,e:"🏢",c:"architecture",r:20,ch:[{t:"quiz",ti:"Maastoren Quiz",d:"Hoe hoog is de Maastoren?",a:"185 meter",o:["185 meter","150 meter","220 meter","95 meter"],p:15,df:"easy"}]},
{id:55,n:"Rijnhavenbrug",la:51.903332,lo:4.485836,e:"🌁",c:"bridge",r:15,ch:[{t:"video",ti:"Secrid voor Altijd",d:"Eén teamlid doet alsof hij/zij een slotje ophangt aan de liefdesslotjes op de Rijnhavenbrug, gooit de sleutel dramatisch in de Maas — en kijkt dan recht in de camera: 'Jorik, jouw Secrid blijft veilig bewaard.' Slotjes en brug duidelijk zichtbaar. Eén take, geen retakes.",p:30,df:"medium"}]},
{id:57,n:"Floating Office",la:51.90408,lo:4.488447,e:"🏢",c:"architecture",r:15,ch:[{t:"quiz",ti:"Floating Office Quiz",d:"Wat is het Floating Office in de Rijnhaven?",a:"'s Werelds grootste drijvende kantoor",o:["'s Werelds grootste drijvende kantoor","Hoofdkantoor van Shell","Rotterdams gemeentehuis","Museum voor maritieme architectuur"],p:20,df:"medium"}]},
{id:59,n:"DakAkker",la:51.925465,lo:4.476699,e:"🌱",c:"landmark",r:15,ch:[{t:"video",ti:"Trappenrace naar de Top",d:"De DakAkker zit op het dak van het Schieblock — bereikbaar via een lange traphelling. Eén teamlid daagt een ander uit: wie is als eerste boven? Zet de race aan bij de onderkant van de trap en film de volledige race — winnaar steekt triomfantelijk de handen in de lucht bij aankomst op het dak.",p:30,df:"medium"}]},
{id:60,n:"Het Industriegebouw",la:51.923711,lo:4.492121,e:"🏭",c:"landmark",r:15,ch:[{t:"quiz",ti:"Industriegebouw Quiz",d:"Hoeveel bedrijven hebben een kantoor of werkruimte in het Industriegebouw?",a:"Meer dan 200",o:["Meer dan 200","Minder dan 50","Tussen 50 en 100","Precies 150"],p:20,df:"medium"}]},
{id:61,n:"BlueCity",la:51.9198,lo:4.4981,e:"♻️",c:"landmark",r:15,ch:[{t:"quiz",ti:"BlueCity Quiz",d:"BlueCity is een hub voor circulaire bedrijven in het voormalige Tropicana zwembad. Wat is het raarste product dat hier wordt gemaakt?",a:"Paddenstoelen (Rotterzwam)",o:["Paddenstoelen (Rotterzwam)","Bier van oud brood","Zeep van frituurvet","Papier van koffiedik"],p:25,df:"medium"}]},
{id:63,n:"Gebouw Delftse Poort",la:51.9240,lo:4.4716,e:"🏙️",c:"architecture",r:20,ch:[{t:"photo",ti:"Epische Teamfoto",d:"Maak de meest epische teamfoto mogelijk met de twee torens van de Delftse Poort als achtergrond. Breed uitgesteld, iedereen in beeld — groot gebaar, groot gebouw.",p:20,df:"easy"}]},
{id:64,n:"Willemswerf",la:51.916963,lo:4.49011,e:"🏢",c:"architecture",r:15,ch:[{t:"quiz",ti:"Jackie Chan Quiz",d:"Welke acteur glijdt in een film af langs de schuine gevel van dit gebouw?",a:"Jackie Chan",o:["Jackie Chan","Tom Cruise","Bruce Willis","Jason Statham"],p:20,df:"easy"}]},
{id:65,n:"Concertgebouw De Doelen",la:51.9234,lo:4.4740,e:"🎵",c:"culture",r:20,ch:[{t:"video",ti:"Levensdoelen",d:"De Doelen heeft één doel: wereldklasse muziek. Jullie hebben één doel: Jorik klaarstomen voor het huwelijk. Minstens 3 teamleden spreken voor de camera één serieus of hilarisch doel uit voor een succesvol huwelijk van Jorik & Katinka. Minimaal 10 seconden. 'De Doelen' duidelijk op de achtergrond.",p:30,df:"medium"}]},
{id:67,n:"Witte Huis",la:51.9190,lo:4.4915,e:"🏛️",c:"architecture",r:15,ch:[{t:"quiz",ti:"Witte Huis: Waar of Niet Waar?",d:"Waar of niet waar: het Witte Huis in de Oude Haven was ooit het hoogste gebouw van Europa.",a:"Waar",o:["Waar","Niet waar"],p:15,df:"easy"}]},
{id:68,n:"Pauluskerk",la:51.919994,lo:4.472557,e:"⛪",c:"historic",r:15,ch:[{t:"quiz",ti:"Pauluskerk Quiz",d:"Naar wie is de Pauluskerk vernoemd?",a:"De apostel Paulus",o:["De apostel Paulus","Paul Bosvelt","Paus Paulus VI","Paulus de Boskabouter"],p:15,df:"easy"}]},
{id:69,n:"Eendrachtsweg Drollen",la:51.9155,lo:4.4727,e:"💩",c:"landmark",r:15,ch:[{t:"photo",ti:"Rijden op de Drollen",d:"Aan de Eendrachtsweg liggen grote gekleurde opblaasbare... drollen. Iedereen gaat erop zitten — zo uitbundig en lollig mogelijk. Breed lachen, armen in de lucht, niemand mag er serieus op zitten. Heel team in beeld.",p:20,df:"easy"}]},
{id:70,n:"Binnenwegplein",la:51.918234,lo:4.477439,e:"🎡",c:"square",r:20,ch:[{t:"video",ti:"Duivenmeester van het Binnenwegplein",d:"Wie kan de meeste duiven om zich heen verzamelen in 30 seconden? Film het hele experiment vanaf het begin. De winnaar wordt plechtig uitgeroepen tot Duivenmeester van het Binnenwegplein.",p:20,df:"easy"}]},
{id:75,n:"Vessel 11",la:51.9174,lo:4.4891,e:"🚢",c:"landmark",r:15,ch:[{t:"photo",ti:"Vessel 11 Teamfoto",d:"Ga aan de overkant van het water staan en maak een epische teamfoto met de volledige boot van Vessel 11 in beeld. Heel team in één foto, de hele boot op de achtergrond. Breed uitgesteld, iedereen zichtbaar.",p:25,df:"easy"}]},
{id:83,n:"Happy Italy",la:51.923054,lo:4.485392,e:"🍕",c:"restaurant",r:15,ch:[{t:"video",ti:"Molto Italiano",d:"Minstens 2 teamleden doen het meest typisch Italiaanse handgebaar dat ze kennen en zeggen iets dat klinkt als Italiaans — hoe overtuigender, hoe beter. Heel team mag meedoen. Film het.",p:25,df:"easy"}]},
{id:88,n:"Historisch Delfshaven",la:51.9068,lo:4.4496,e:"🏚️",c:"historic",r:15,ch:[{t:"photo",ti:"Hollands Kiekje",d:"Maak een lekker Hollands kiekje met de molen van Delfshaven op de achtergrond. Heel team in beeld — brede glimlach, typisch toeristisch, en een knipoog naar de molen van Wateringen.",p:25,df:"easy"}]},
{id:89,n:"Stadsbrouwerij De Pelgrim",la:51.908763,lo:4.448879,e:"🍺",c:"bar",r:15,ch:[
  {t:"photo",ti:"Verdiend Biertje",d:"Je hebt het gehaald — ver van het centrum, maar je bent er. Trakteer jezelf op een Pelgrim-biertje en maak een teamfoto met glazen omhoog. Proost!",p:20,df:"easy"},

// UTILITY FUNCTIONS
// ═══════════════════════════════════════════
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000,p=Math.PI/180;
  const a=Math.sin((lat2-lat1)*p/2)**2+Math.cos(lat1*p)*Math.cos(lat2*p)*Math.sin((lon2-lon1)*p/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

function fmtDist(m){return m<1000?`${Math.round(m)}m`:`${(m/1000).toFixed(1)}km`}
function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`}
function fmtHM(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?`${h}u ${m}m`:`${m}m`}
function stars(df){return df==='easy'?'★':df==='medium'?'★★':'★★★'}

// V25 (#71): Band classifier for the two-radius task discovery UX.
// Returns one of 'unlock' | 'preview' | 'far' | 'unknown'.
//   unlock  — inside UNLOCK_RADIUS (100m): challenge is actionable here.
//   preview — between UNLOCK and PREVIEW_RADIUS (300m): getting warm.
//   far     — beyond PREVIEW_RADIUS: visible but not yet close.
//   unknown — no GPS fix yet (pos null). Renders as 'far' visually but without distance text.
function locBand(pos,loc){
  if(!pos||!loc)return{band:'unknown',dist:null};
  // pos uses Leaflet naming (lat/lng); L_DATA uses compact (la/lo).
  const d=haversine(pos.lat,pos.lng,loc.la,loc.lo);
  if(d<=UNLOCK_RADIUS)return{band:'unlock',dist:d};
  if(d<=PREVIEW_RADIUS)return{band:'preview',dist:d};
  return{band:'far',dist:d};
}

// V12: relative time (for activity feed)
function fmtRelTime(iso){
  if(!iso)return'';
  const d=new Date(iso).getTime(),now=Date.now(),diff=Math.max(0,(now-d)/1000);
  if(diff<60)return'zojuist';
  if(diff<3600)return`${Math.floor(diff/60)}m`;
  if(diff<86400)return new Date(iso).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
  return new Date(iso).toLocaleDateString('nl-NL');
}

const PHASE_LABELS={1:'Fase 1 · Zoektocht',2:'Fase 2 · Geruchten',3:'Fase 3 · Cirkel',4:'Fase 4 · Finale',5:'Finale · Uitslag'};

function getNearby(pos,completed,n=3,maxR=NEARBY_RADIUS){
  if(!pos)return[];
  // V12: smart ranking — within NEARBY_RADIUS prefer highest points/meter ratio (weighted by difficulty).
  // Outside the radius fall back to pure distance ordering so the panel always shows something.
  const diffMult={easy:1.0,medium:1.15,hard:1.3};
  const locs=L_DATA.filter(l=>!completed[l.id]).map(l=>{
    const dist=haversine(pos.lat,pos.lng,l.la,l.lo);
    const totalPts=l.ch.reduce((s,c)=>s+c.p*(diffMult[c.df]||1),0);
    // ROI: points per 100m (guarded against divide-by-zero)
    const roi=totalPts/Math.max(dist,30)*100;
    return{...l,dist,roi,totalPts};
  });
  const within=locs.filter(l=>l.dist<=maxR).sort((a,b)=>b.roi-a.roi);
  if(within.length>=n)return within.slice(0,n);
  const expanded=locs.filter(l=>l.dist<=maxR*2).sort((a,b)=>a.dist-b.dist);
  if(expanded.length>=n)return expanded.slice(0,n);
  return[...locs].sort((a,b)=>a.dist-b.dist).slice(0,n);
}

// V5 FEATURE 5: GPS DRIFT MITIGATION
// ═══════════════════════════════════════════
function smoothPosition(samples){
  if(!samples||!samples.length)return null;
  // Weighted average — newer samples weigh more
  let sumLat=0,sumLng=0,sumW=0,sumAcc=0;
  samples.forEach((s,i)=>{
    const w=i+1; // newer = higher weight
    sumLat+=s.lat*w; sumLng+=s.lng*w; sumW+=w;
    sumAcc+=(s.acc||0);
  });
  return{lat:sumLat/sumW,lng:sumLng/sumW,acc:sumAcc/samples.length};
}

function snapToPOI(pos,maxDist=GPS_SNAP_RADIUS){
  if(!pos)return pos;
  let best=null,bestDist=Infinity;
  for(const loc of L_DATA){
    const d=haversine(pos.lat,pos.lng,loc.la,loc.lo);
    if(d<bestDist&&d<=maxDist){bestDist=d;best=loc}
  }
  return best?{lat:best.la,lng:best.lo,acc:pos.acc,snapped:best.n}:pos;
}

// V5 FEATURE 2: PHOTO COMPRESSION
// ═══════════════════════════════════════════
// Compress a dataURL to a small thumbnail for storage + live feed
function compressPhoto(dataURL,maxWidth=480,quality=0.55){
  return new Promise((resolve)=>{
    try{
      const img=new Image();
      img.onload=()=>{
        try{
          // V21 P1-fix #31 + audit fix: guard against Safari/iOS 16.7MP canvas ceiling
          // WITHOUT cropping. Old code capped each axis independently at 4096, which
          // cropped a 8000×1200 panorama to 4096×1200 (lost 49% of the frame).
          // Correct approach: compute one proportional downscale factor against the
          // larger dimension so aspect ratio is preserved, then apply maxWidth ratio.
          const SRC_MAX=4096;
          const origW=Math.max(1,img.width||1);
          const origH=Math.max(1,img.height||1);
          const capRatio=Math.min(1,SRC_MAX/Math.max(origW,origH));
          const srcW=Math.max(1,Math.round(origW*capRatio));
          const srcH=Math.max(1,Math.round(origH*capRatio));
          const canvas=document.createElement('canvas');
          const ratio=Math.min(1,maxWidth/srcW);
          canvas.width=Math.max(1,Math.round(srcW*ratio));
          canvas.height=Math.max(1,Math.round(srcH*ratio));
          const ctx=canvas.getContext('2d');
          if(!ctx){resolve(dataURL);return;}
          // draw the full original onto the (already-proportionally-scaled) dest canvas
          ctx.drawImage(img,0,0,origW,origH,0,0,canvas.width,canvas.height);
          try{
            resolve(canvas.toDataURL('image/jpeg',quality));
          }catch(inner){
            // Safari throws on huge canvases — return original untouched so upload still happens
            console.warn('canvas toDataURL failed — returning original',inner?.message||inner);
            resolve(dataURL);
          }
        }catch(e){
          console.warn('canvas draw failed — returning original',e?.message||e);
          resolve(dataURL);
        }
      };
      img.onerror=()=>resolve(dataURL); // fallback
      img.src=dataURL;
    }catch(e){resolve(dataURL)}
  });
}

// V20 P0: adaptive tiered compression. Some phones (especially old iPhones
// shooting HEIC-converted giant JPEGs, or Android panoramas) still exceed
// Supabase row-size limits even after the default 640/0.6 pass. Retry with
// progressively smaller targets before giving up and returning null.
// Target = ~220 kB dataURL, which comfortably fits inside a 500kB row ceiling.
const COMPRESS_TARGET_BYTES=220000;
const COMPRESS_HARD_CAP_BYTES=500000;

// V41.11 — Supabase Storage migration. Uploads media (photos/videos) to a
// public bucket and stores the resulting URL in photo_reviews.photo_url and
// activity_feed.photo instead of inline base64. Requires
// SUPABASE-V41.11-STORAGE-MEDIA.sql to be applied once. If Storage is
// unavailable (bucket missing, RLS denied, network error), uploadMediaToStorage
// returns null and the caller transparently falls back to inline base64
// (V41.5 behavior). To revert globally: flip STORAGE_ENABLED to false.
const STORAGE_BUCKET='media';
const STORAGE_ENABLED=true;

// Convert a data URL ('data:image/jpeg;base64,...') to a Blob for upload.
function dataUrlToBlob(dataUrl){
  if(typeof dataUrl!=='string'||!dataUrl.startsWith('data:'))return null;
  const commaIdx=dataUrl.indexOf(',');
  if(commaIdx<0)return null;
  const meta=dataUrl.slice(5,commaIdx);
  const mime=(meta.split(';')[0])||'application/octet-stream';
  const isB64=meta.includes('base64');
  const payload=dataUrl.slice(commaIdx+1);
  try{
    if(isB64){
      const bin=atob(payload);
      const arr=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
      return new Blob([arr],{type:mime});
    }
    return new Blob([decodeURIComponent(payload)],{type:mime});
  }catch(e){return null;}
}

// Upload a Blob to the media bucket; return public URL or null on failure.
// Filename pattern: {pathPrefix}_{timestamp}_{rand}.{ext} — extension derived
// from contentType so iPhone .mov / .mp4 / .heic / .jpg all sort correctly.
async function uploadMediaToStorage(sb,blob,pathPrefix,contentType){
  if(!STORAGE_ENABLED||!sb||!blob)return null;
  try{
    const mt=String(contentType||blob.type||'application/octet-stream');
    const ext=(mt.split('/')[1]||'bin').replace(/\+.*$/,'').replace(/[^a-z0-9]/gi,'').slice(0,8)||'bin';
    const safePrefix=String(pathPrefix||'media').replace(/[^a-zA-Z0-9_-]/g,'_').slice(0,80);
    const filename=`${safePrefix}_${Date.now()}_${Math.floor(Math.random()*1e6)}.${ext}`;
    const{data,error}=await sb.storage.from(STORAGE_BUCKET).upload(filename,blob,{contentType:mt,upsert:false,cacheControl:'3600'});
    if(error){
      console.warn('[storage] upload failed, falling back to inline base64:',error.message||error);
      return null;
    }
    const{data:pub}=sb.storage.from(STORAGE_BUCKET).getPublicUrl(data.path);
    return(pub&&pub.publicUrl)||null;
  }catch(err){
    console.warn('[storage] upload exception, falling back:',err);
    return null;
  }
}

async function compressPhotoAdaptive(dataURL){
  if(typeof dataURL!=='string')return dataURL;
  // Try 3 tiers before bailing. Each tier halves-ish the budget.
  const tiers=[[640,0.6],[480,0.5],[320,0.4]];
  let out=dataURL;
  for(const [w,q] of tiers){
    out=await compressPhoto(dataURL,w,q);
    if((out?.length||0)<=COMPRESS_TARGET_BYTES)return out;
  }
  // Final safety net: if we're still over the hard cap, drop the thumbnail
  // rather than nuking the whole feed insert. Challenge still completes;
  // photo just won't show in the live feed.
  if((out?.length||0)>COMPRESS_HARD_CAP_BYTES){
    console.warn('photo still too large after 3 compression tiers — dropping thumbnail',out?.length);
    return null;
  }
  return out;
}

// Detect whether dataURL is a video (keep raw; don't try to compress)
function isVideoData(d){return typeof d==='string'&&d.startsWith('data:video')}

// V23 (#48): stable winner ranking with tiebreakers.
// Primary: score (desc). Tie-breakers in order:
//   - earlier last-completion timestamp wins (the team that reached the score first)
//   - more challenges completed (activity entries with points>0) wins
//   - earlier team creation order wins (deterministic last resort)
// Pure function — safe to call from a useEffect, useMemo, or a child component.
function rankTeams(teams,scores,activityFeed){
  const stats={};
  (teams||[]).forEach(t=>{stats[t.id]={last:0,count:0,created:new Date(t.created_at||0).getTime()||t.id||0};});
  (activityFeed||[]).forEach(a=>{
    if(!a||a.team_id==null||!(a.points>0))return;
    const rec=stats[a.team_id];if(!rec)return;
    rec.count++;
    const ts=new Date(a.created_at||0).getTime()||0;
    if(ts>rec.last)rec.last=ts;
  });
  return[...(teams||[])]
    .map(t=>({...t,score:(scores&&scores[t.id])||0,_last:stats[t.id]?.last||0,_count:stats[t.id]?.count||0,_created:stats[t.id]?.created||0}))
    .sort((a,b)=>{
      if(b.score!==a.score)return b.score-a.score;
      const aL=a._last||Number.MAX_SAFE_INTEGER;
      const bL=b._last||Number.MAX_SAFE_INTEGER;
      if(aL!==bL)return aL-bL;
      if(b._count!==a._count)return b._count-a._count;
      return a._created-b._created;
    });
}

// V12: localStorage key for session persistence — single source of truth
const LS_KEY='stadsspel_v12_session';
// V22 audit fix (iOS agent): iOS Safari private browsing throws quota errors on
// localStorage.setItem() even when empty. We preflight once and expose the flag so
// the UI can warn the player that their progress won't survive a force-quit. Cached
// on module scope so we only pay the try/catch cost a single time.
let LS_OK=null;
function localStorageWorks(){
  if(LS_OK!==null)return LS_OK;
  try{const k='__ls_test__';localStorage.setItem(k,'1');localStorage.removeItem(k);LS_OK=true;}
  catch(e){LS_OK=false;}

}
function loadSession(){
  try{const raw=localStorage.getItem(LS_KEY);return raw?JSON.parse(raw):null;}catch(e){return null;}
}
function saveSession(patch){
  try{
    const cur=loadSession()||{};
    const next={...cur,...patch,updated:Date.now()};
    localStorage.setItem(LS_KEY,JSON.stringify(next));
  }catch(e){LS_OK=false;}
}
function clearSession(){try{localStorage.removeItem(LS_KEY);}catch(e){}}
// V37: stable per-device UUID, lifted from ActivityView to module scope so the
// wp:1 wedding-pipeline filter can compare against the game_state.jorik_device_id
// (set by Mike via AdminMenu → "Markeer Jorik's telefoon"). Same key as the V30
// reactions device id — re-used so existing devices keep their identity.
function getDeviceId(){
  try{
    let d=localStorage.getItem('ssr_device_id');
    if(!d){
      d=(typeof crypto!=='undefined'&&crypto.randomUUID)?crypto.randomUUID():(Date.now().toString(36)+Math.random().toString(36).slice(2,10));
      try{localStorage.setItem('ssr_device_id',d);}catch(e){}
    }
    return d;
  }catch(e){
    return Date.now().toString(36)+Math.random().toString(36).slice(2,10);

}
// V20 (Audit item #1): stable per-browser session UUID.
// Backing store for team_members (SUPABASE-CATCHUP-PATCH-V32.sql) so the admin
// can see "Lions: 4 · Tigers: 2 · Bears: 1" headcount without auth/accounts.
// Lives inside the same stadsspel_v12_session blob as myTeam / phase / gameStart
// so it survives the 12h grace window alongside the rest of the session state.
// Freshly-cleared (expired / kicked) sessions mint a new UUID on next read,
// which is exactly right: a kicked phone should count as a new player when it
// re-joins. crypto.randomUUID is iOS Safari 15+ / all modern Chrome — safe for
// the phones-only deployment model (CLAUDE.md). Falls back to a Math.random
// pseudo-UUID if the runtime lacks the API (only private-mode edge cases).
function ensureSessionId(){
  try{
    const cur=loadSession()||{};
    if(cur.sessionId)return cur.sessionId;
    const sid=(typeof crypto!=='undefined'&&crypto.randomUUID)
      ? crypto.randomUUID()
      : 'sid-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,10);
    saveSession({sessionId:sid});
    return sid;
  }catch(e){
    // Private-browsing / quota-exceeded: return an in-memory fallback so the
    // current tab still gets counted (lost on reload, acceptable trade-off).
    return 'sid-fallback-'+Math.random().toString(36).slice(2,10);
  }
}
// V20: one-shot kick-reason flag. The hydration IIFE can't call setToast

// (other kick branches — phantom guard + teams-DELETE realtime — fire inside

function App(){

    const reviewUpdateSub=sb.channel('reviews_update').on('postgres_changes',{event:'UPDATE',schema:'public',table:'photo_reviews'},payload=>{

    }

    // V32: rehydrate pendingMine counter for this player's team on mount.
    // Without this, a refresh wipes the "X foto's in check" banner even though
    // the photo_reviews rows are still present server-side. The realtime INSERT
    // handler at line 1612 keeps the counter accurate going forward; this fetch
    // seeds the initial value from the DB so a reload-mid-wait doesn't hide the
    // signal that a photo is awaiting admin approval.
    if(myTeam?.id&&!myTeam.spectator&&myTeam.id>0){
      sb.from('photo_reviews').select('id').eq('team_id',myTeam.id).eq('status','pending').then(res=>{
        if(res.data)setPendingMine(res.data.length);
      },()=>{/* table missing — silent */});

    return()=>{
      teamSub.unsubscribe();teamInsertSub.unsubscribe();teamDeleteSub.unsubscribe();gsSub.unsubscribe();actSub.unsubscribe();

  },[myTeam,isAdmin]);

  // V22 audit fix (cross-device sweep, iOS+Network agents): when the tab has been
  // backgrounded, Supabase realtime can miss events (iOS Safari discards WebSockets
  // aggressively; Android Chrome deprioritizes them). On visibilitychange→visible we
  // catch up by refetching the four canonical sources of truth. This is additive to the

  // round-trip, best case we prevent a stale leaderboard / missed bar-break / lost

  useEffect(()=>{
    if(OFFLINE||!sb||!myTeam?.id)return;
    const onVisible=()=>{
      if(document.hidden)return;
      // step 1 — game_state: phase, bar-break, jorik, heartbeat

        if(gs.jorik_moved_at){const t=new Date(gs.jorik_moved_at).getTime();if(!isNaN(t))setJorikMovedAt(t);}
        // V37: pick up Jorik device id during catch-up too
        // V37.1: same null-propagation fix as the realtime UPDATE handler — accept null clears
        if('jorik_device_id' in gs){const v=gs.jorik_device_id;setJorikDeviceId(typeof v==='string'&&v.length>0?v:null);}
        if('test_mode_active' in gs){const v=gs.test_mode_active;setTestModeRuntime(typeof v==='boolean'?v:null);}

        if(!res.data||!res.data.length)return;

        sb.from('completed_challenges').select('challenge_id,location_id,points_earned').eq('team_id',myTeam.id).then(res=>{
          if(!res.data||!res.data.length)return;
          const compMap={};const ptsMap={};const visited=new Set();
          res.data.forEach(row=>{
            const m=String(row.challenge_id||'').match(/^(-?\d+)_(-?\d+)$/);
            if(!m)return;
            const locId=parseInt(m[1],10);const chIdx=parseInt(m[2],10);
            if(!Number.isFinite(locId)||!Number.isFinite(chIdx))return;
            compMap[locId]={...(compMap[locId]||{}),[chIdx]:true};
            ptsMap[locId]={...(ptsMap[locId]||{}),[chIdx]:row.points_earned||0};
            if(locId>0)visited.add(locId);
          });
          setCompleted(prev=>{const next={...compMap};Object.keys(prev).forEach(k=>{next[k]={...(next[k]||{}),...prev[k]};});return next;});
          setCompletedPts(prev=>{const next={...ptsMap};Object.keys(prev).forEach(k=>{next[k]={...(next[k]||{}),...prev[k]};});return next;});
          setVisitedLocs(prev=>{const s=new Set(prev);visited.forEach(v=>s.add(v));return s;});
        },()=>{});
      }
      // step 5 — admin-only: refresh pending review queue
      if(isAdmin){
        sb.from('photo_reviews').select('*').eq('status','pending').order('created_at',{ascending:false}).then(res=>{
          if(res.data)setReviewQueue(res.data);
        },()=>{});
      }
      // V32 step 6 — refresh my team's pending-photo counter. A decision that
      // fired while the tab was backgrounded would otherwise leave the banner
      // stuck at the pre-sleep count until the next UPDATE echo. We trust the
      // DB count here since it's the cheapest query on this table.
      if(myTeam.id>0&&!myTeam.spectator){
        sb.from('photo_reviews').select('id').eq('team_id',myTeam.id).eq('status','pending').then(res=>{
          if(res.data)setPendingMine(res.data.length);
        },()=>{});
      }
    };
    document.addEventListener('visibilitychange',onVisible);
    // Also fire on 'pageshow' — iOS Safari bfcache restore doesn't always trigger visibilitychange
    window.addEventListener('pageshow',onVisible);
    return()=>{

    };
  },[myTeam,isAdmin,barBreakActive]);

  // V6/V12: admin actions with undo window
  const[reviewUndo,setReviewUndo]=useState(null); // {row, action, deadline, timer, commit}
  // V18 audit-fix: if another review is pending-undo, immediately fire its commit
  // (we can't wait for a second undo slot — that would hide the first action forever)
  const flushPendingUndo=(prev)=>{
    if(!prev)return;
    clearTimeout(prev.timer);
    try{prev.commit&&prev.commit();}catch(e){/* swallow */}
  };
  // V23 (#49): commit a photo_reviews status update with single auto-retry on failure.
  // V25 (#53): optional `notes` persists to photo_reviews.reviewer_notes (V22 column),
  // capturing the admin's rejection reason for queue-quality trend analysis and so
  // the rejected team sees a more informative feed entry.
  // If the commit fails twice, re-queue the photo and surface a toast so the admin
  // can try again. `sideEffects` runs only on a successful commit (e.g. score delta,
  // activity feed insert for rejections) — this prevents the photo-rejection
  // double-penalty race from recurring when the update itself failed.
  const commitReview=(r,newStatus,sideEffects,notes)=>{
    if(!sb)return;
    const payload={status:newStatus,reviewed_at:new Date().toISOString()};
    if(notes&&typeof notes==='string'&&notes.trim())payload.reviewer_notes=notes.trim().slice(0,240);
    const doUpdate=()=>sb.from('photo_reviews')
      .update(payload)
      .eq('id',r.id);
    const onFail=(err)=>{
      console.error('[photo_reviews]',newStatus,'commit failed:',err);
      // Put the photo back in the queue so the admin can retry.
      setReviewQueue(prev=>prev.some(x=>x.id===r.id)?prev:[r,...prev]);
      setToast(`⚠️ Kon foto niet ${newStatus==='approved'?'goedkeuren':'afkeuren'} — terug in wachtrij. Probeer opnieuw.`);
    };
    doUpdate().then(
      (res)=>{
        if(res&&res.error){
          // one retry with a 600ms delay
          setTimeout(()=>{
            doUpdate().then(
              (r2)=>{if(r2&&r2.error){onFail(r2.error)}else{try{sideEffects&&sideEffects()}catch(e){console.error('[review] side-effects threw:',e)}}},
              (err2)=>onFail(err2)
            );
          },600);
        }else{
          try{sideEffects&&sideEffects()}catch(e){console.error('[review] side-effects threw:',e)}
        }
      },
      (err)=>{
        // Network-level throw — same retry path
        setTimeout(()=>{
          doUpdate().then(
            (r2)=>{if(r2&&r2.error){onFail(r2.error)}else{try{sideEffects&&sideEffects()}catch(e){console.error('[review] side-effects threw:',e)}}},
            (err2)=>onFail(err2)
          );
        },600);
      }
    );
  };
  const approveReview=(r)=>{
    if(!sb)return;
    setReviewQueue(prev=>prev.filter(x=>x.id!==r.id));
    const commit=()=>commitReview(r,'approved',null);
    setReviewUndo(prev=>{flushPendingUndo(prev); const timer=setTimeout(()=>{commit();setReviewUndo(null);},10000); return{row:r,action:'approved',deadline:Date.now()+10000,timer,commit};});
  };
  // V25 (#53): rejectReview now accepts an optional reason string — persisted to
  // photo_reviews.reviewer_notes and embedded in the team's activity-feed entry so
  // they see WHY the photo was rejected, not just that it was.
  const rejectReview=(r,reason)=>{
    if(!sb)return;
    setReviewQueue(prev=>prev.filter(x=>x.id!==r.id));
    // V18 (§1.9.11): extended 5-min undo window for rejections — higher stakes than approvals
    const REJECT_UNDO_MS=300000;
    const trimmedReason=reason&&typeof reason==='string'?reason.trim().slice(0,200):'';
    const commit=()=>commitReview(r,'rejected',()=>{
      if(REVIEW_REJECT_PENALTY){
        // V20: atomic negative delta. Also updates local scores immediately if this is my team.
        applyScoreDelta(r.team_id,-r.points_awarded);
      }
      // V21 P1-fix #19: post a visible reject-activity so the team sees WHY their score dropped.
      // addActivity() uses myTeam (the admin's team), so build the entry manually for the rejected team.
      if(!OFFLINE&&sb){
        const rejectedTeam=teams.find(t=>t.id===r.team_id);
        const penalty=REVIEW_REJECT_PENALTY?r.points_awarded:0;
        const titlePart=r.challenge_title||'uitdaging';
        // V25 (#53): append reason to the feed message so teams learn what to fix next time.
        const baseMsg=penalty>0
          ?`Foto afgekeurd — "${titlePart}" · -${penalty} pts`
          :`Foto afgekeurd — "${titlePart}"`;
        const fullMsg=trimmedReason?`${baseMsg} · ${trimmedReason}`:baseMsg;
        sb.from('activity_feed').insert({
          team_id:r.team_id,
          team_name:rejectedTeam?.name||r.team_name||'Team',
          team_emoji:rejectedTeam?.emoji||r.team_emoji||'❌',
          team_color:rejectedTeam?.color||'#ff6b6b',

  };
  const undoReview=()=>{
    if(!reviewUndo)return;
    clearTimeout(reviewUndo.timer);

  };

  const addActivity=(msg,pts=0,photoData=null,locId=null)=>{
    // V22 audit fix (security agent): cap the message at 500 chars client-side so a
    // crafted broadcast or pack rename can't blow up the feed. Normal activity lines

    const safeMsg=String(msg||'').slice(0,500);

    if(!OFFLINE&&sb){

  // V20 P0: atomic score delta. Replaces 6 client-side R-M-W call sites that
  // lost updates under concurrent teammate completions (two phones same team
  // completing within the same realtime round would clobber each other).
  // - Sets local state optimistically so UI stays snappy
  // - Calls the atomic Postgres RPC (supabase-v20-schema.sql) for the canonical value
  // - Reconciles local state to server return on success
  // - Falls back to legacy direct-update if the RPC isn't deployed yet (graceful)
  const applyScoreDelta=(teamId,delta)=>{
    if(!teamId||!Number.isFinite(delta))return;
    // Optimistic local bump (covers OFFLINE mode too)
    setScores(prev=>({...prev,[teamId]:Math.max(0,(prev[teamId]||0)+delta)}));

      .then(({data,error})=>{

        }
      })
      .catch(e=>console.warn('score delta RPC threw',e));
  };

  // V19+ Jorik-specific missions (only team holding Jorik can do these)
  // V22: (a) read pts from the mission array — defensive against callers passing wrong value;
  //      (b) apply FINALE_MULTIPLIER during phase 4 (parity with completeChallenge so Jorik
  //          missions don't get penalised against regular L_DATA challenges in the final 20 min);
  //      (c) running-mission support — for missions with `running:true` + `tradeTarget:N`,

  //          the counter reaches the target. Per-step points = m.pts / tradeTarget (rounded).
  // V31 — Jorik mission scoring HARD-CAP (synthesizer Fix #2, "compromise" path).
  // The V31 multi-agent audit (DISCUSSION-ROOM.md §6) confirmed that Jorik missions
  // create a structural runaway-leader pattern: holding team can earn 100-200pt
  // bursts while non-holders grind at 25pt photos. With imperfect rotation, this
  // compounds. Visser's preferred fix is full memory-token decoupling (V32);
  // V31 ships the smaller compromise: scale Jorik mission points by JORIK_SCORE_MULTIPLIER
  // so the bracelet still pays but at a rate that doesn't overwhelm POI grinding.
  // Keeps narrative weight; reduces structural unfairness; leaves room for V32 redesign.
  const JORIK_SCORE_MULTIPLIER=0.5;
  // V40 — additional per-hold-window cap. V39 sim showed Haven got 9 Jorik missions in one
  // window → 340 pts → 15× score gap vs the team that lost Jorik first. Even with the V31
  // 0.5× multiplier the structural unfairness remained. V40 caps Jorik missions at 3 per
  // hold-window: missions 1-3 pay full multiplied value, missions 4+ pay 0 pts (still done
  // for the photo/story but no leaderboard impact). Window resets when jorik_moved_at changes.
  const JORIK_HOLD_CAP=3;
  const[jorikMissionsThisHold,setJorikMissionsThisHold]=useState(0);
  // Reset the per-hold counter whenever Jorik rotates (or when we ourselves gain/lose Jorik).
  // Reading jorikMovedAt + jorikTeamId — both shift on rotation.
  React.useEffect(()=>{
    setJorikMissionsThisHold(0);

  const completeJorikMission=(id,_unusedPts,photoData=null)=>{
    if(jorikMissionsDone.has(id))return;
    const m=JORIK_MISSIONS.find(x=>x.id===id);
    if(!m)return;
    const phaseMult=phase===4?FINALE_MULTIPLIER:1;
    const finaleSuffix=phaseMult>1?` (×${FINALE_MULTIPLIER} finale)`:'';
    // V40: hard-cap check. Past 3 missions this hold, points go to 0.
    // Toast is encouraging, not punitive — frames the cap as "you're crushing it, share the love".
    const capped=jorikMissionsThisHold>=JORIK_HOLD_CAP;

    // V22: running-mission branch.
    // V40.1 (code-review P1): cap accounting fix — a tradeTarget=4 trade mission was
    // consuming 4 cap slots per step, locking out other Jorik missions after 3 ruils
    // (75% of one mission). Now we count toward the cap ONLY on the final completion
    // step (newCount>=tradeTarget). Intermediate steps still pay points but don't
    // increment the hold counter.
    if(m.running&&m.tradeTarget>0){
      const prevCount=jorikRunningCounts[id]||0;
      const newCount=Math.min(prevCount+1,m.tradeTarget);
      const isFinalStep=newCount>=m.tradeTarget;
      // Cap only applies when this step would complete the mission.
      const stepCapped=capped&&isFinalStep;
      const stepPts=stepCapped?0:Math.round((m.pts/m.tradeTarget)*phaseMult*JORIK_SCORE_MULTIPLIER);
      setJorikRunningCounts(prev=>({...prev,[id]:newCount}));

      addActivity(`${m.emoji} Jorik ruil ${newCount}/${m.tradeTarget} · ${m.title} · +${stepPts} pts${finaleSuffix}${ptsSuffix}`,stepPts,photoData);

        setJorikMissionsDone(prev=>new Set([...prev,id]));

          try{const setToast=window.__ssrSetToast;if(setToast)setToast(`🌟 Top — ${JORIK_HOLD_CAP} Jorik-missies in deze beurt. Extra missies blijven mooi voor de bruiloftsedit, maar punten pauzeren tot de volgende rotatie.`);}catch(_){}
        }
      }
