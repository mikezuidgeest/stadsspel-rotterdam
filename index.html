            style={{borderLeft:`4px solid ${t.color}`}}>
            <div className={`lb-rank ${i===0?'lb-rank-1':i===1?'lb-rank-2':i===2?'lb-rank-3':'lb-rank-other'}`}>
              {i<3&&<span className="lb-medal">{['🥇','🥈','🥉'][i]}</span>}#{i+1}
            </div>
            <div className="lb-emoji">{t.emoji}</div>
            <div className="lb-info">
              <div className="lb-name" style={{display:'flex',alignItems:'center',flexWrap:'wrap',gap:'var(--sp-2)'}}>
                <span>{t.name}</span>
                {/* V18 (§1.5.6): "JIJ" chip with strong contrast (was dim "(jij)" suffix) */}
                {isMine&&<span className="chip-xs" style={{background:'var(--accent-glow)',borderColor:'var(--accent)',color:'var(--accent-2)',fontWeight:'var(--fw-bold)'}}>JIJ</span>}
                {teamTier&&(
                  <span className="tier-badge" style={{color:teamTier.color,borderColor:teamTier.color+'66'}}>
                    <span className="tier-emoji">{teamTier.badge}</span>{teamTier.name}
                  </span>
                )}
              </div>
              <div className="lb-stats">{teamChallenges} challenges · {t.locations_visited||0} locaties</div>
              {/* Member names on leaderboard row */}
              {Array.isArray(t.members)&&t.members.length>0&&(
                <div className="t-caption truncate" style={{marginTop:2}}>{t.members.slice(0,4).join(' · ')}{t.members.length>4?' · …':''}</div>
              )}
            </div>
            <div className="lb-score" style={{color:t.color}}>{t.score}</div>
          </div>
        );
      })}

      {sorted.length===0&&(
        <div className="panel text-center" style={{padding:'var(--sp-7)',color:'var(--text-tertiary)'}}>
          <div style={{fontSize:'var(--icon-md)',marginBottom:'var(--sp-3)'}}>🏆</div>
          <div className="t-body">Nog geen scores</div>
          <div className="t-caption t-muted" style={{marginTop:'var(--sp-1)'}}>De ranking vult zich vanzelf zodra teams missies voltooien.</div>
        </div>
      )}

      {/* V30 (Phase 5): TaskList moved to MapView — Ranking is now a pure scoreboard. */}

      {/* V18 (Batch 5): Rotterdam Deck — visited-POI sticker collection */}
      {visitedLocs&&visitedLocs.size>0&&(
        <div style={{marginTop:'var(--sp-7)'}}>
          <div className="row-between" style={{marginBottom:'var(--sp-3)'}}>
            <div className="t-label">🗺️ Rotterdam Deck</div>
            <div className="t-caption">{visitedLocs.size} / {L_DATA.length} ontgrendeld</div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(60px,1fr))',gap:6}}>
            {L_DATA.slice(0,24).map(loc=>{
              const unlocked=visitedLocs.has(loc.id);
              return(
                <div key={loc.id} className="animate-in" title={unlocked?loc.n:'nog niet bezocht'}
                  style={{aspectRatio:'1/1',display:'flex',alignItems:'center',justifyContent:'center',background:unlocked?'linear-gradient(155deg,rgba(228,178,92,0.18),rgba(228,178,92,0.04))':'rgba(255,255,255,0.03)',border:`1px solid ${unlocked?'rgba(228,178,92,0.45)':'rgba(255,255,255,0.08)'}`,borderRadius:'var(--r-md)',fontSize:22,filter:unlocked?'none':'grayscale(1) opacity(0.3)',boxShadow:unlocked?'0 2px 10px rgba(228,178,92,0.15)':'none'}}>
                  {unlocked?loc.e:'·'}
                </div>
              );
            })}
          </div>
          {L_DATA.length>24&&<div className="t-caption t-muted text-center" style={{marginTop:'var(--sp-2)'}}>+{L_DATA.length-24} meer te ontdekken</div>}
        </div>
      )}

      {/* Side Quests progress panel */}
      <div style={{marginTop:'var(--sp-6)',borderTop:'1px solid rgba(255,255,255,0.07)',paddingTop:'var(--sp-5)'}}>
        <div className="t-label" style={{marginBottom:'var(--sp-3)'}}>🏅 Side Quests</div>
        {SIDE_QUESTS.map(q=>{
          const alreadyAwarded=completed[q.locKey]&&Object.keys(completed[q.locKey]).length>0;
          const done=q.required.filter(id=>completed[id]&&Object.keys(completed[id]).length>0).length;
          const total=q.required.length;
          const complete=alreadyAwarded||done===total;
          return(
            <div key={q.id} className="panel animate-in" style={{marginBottom:'var(--sp-2)',borderColor:complete?'rgba(95,216,165,0.4)':'rgba(255,255,255,0.1)',background:complete?'linear-gradient(155deg,rgba(95,216,165,0.08),rgba(95,216,165,0.02))':'rgba(255,255,255,0.02)'}}>
              <div className="row-3">
                <div style={{fontSize:24}}>{q.emoji}</div>
                <div style={{flex:1}}>
                  <div className="t-body-emph">{q.label} <span className="t-label-sm t-accent">+{q.bonus} pt</span></div>
                  <div style={{display:'flex',gap:4,marginTop:4,flexWrap:'wrap'}}>
                    {q.required.map(locId=>{
                      const loc=L_DATA.find(l=>l.id===locId);
                      const visited=completed[locId]&&Object.keys(completed[locId]).length>0;
                      return <span key={locId} style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:visited?'rgba(95,216,165,0.2)':'rgba(255,255,255,0.06)',color:visited?'#5fd8a5':'var(--text-tertiary)',border:`1px solid ${visited?'rgba(95,216,165,0.3)':'rgba(255,255,255,0.08)'}`}}>{loc?loc.n:locId}</span>;
                    })}
                  </div>
                  <div className="t-caption" style={{marginTop:4}}>{complete?'Voltooid! Bonus bijgeschreven.':done+'/'+total+' locaties'}</div>
                </div>
                <div style={{fontSize:20}}>{complete?'✅':'🔒'}</div>
              </div>
            </div>
          );
        })}
        <div className="panel animate-in" style={{marginBottom:'var(--sp-2)',borderColor:'rgba(255,215,0,0.2)',background:'rgba(255,215,0,0.03)'}}>
          <div className="row-3">
            <div style={{fontSize:24}}>🏆</div>
            <div style={{flex:1}}>
              <div className="t-body-emph">Meeste Opdrachten <span className="t-label-sm t-accent">+{MOST_MISSIONS_BONUS} pt</span></div>
              <div className="t-caption">Wordt berekend bij einde spel</div>
            </div>
            <div style={{fontSize:20}}>⏳</div>
          </div>
        </div>
        <div className="panel animate-in" style={{borderColor:'rgba(255,100,100,0.2)',background:'rgba(255,100,100,0.03)'}}>
          <div className="row-3">
            <div style={{fontSize:24}}>🥃</div>
            <div style={{flex:1}}>
              <div className="t-body-emph">Sambuca Straf</div>
              <div className="t-caption">Team met minste punten bij einde spel: verplicht sambuca-shot</div>
            </div>
            <div style={{fontSize:20}}>⏳</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// MAP VIEW
// ═══════════════════════════════════════════
function MapView({pos,completed,visitedLocs,onSelect,phase,gpsStatus,gpsSnap,onWakeGps,nowTs,jorikInTeam=false,jorikMissionsDone=null,onShowJorikMissions=null,gpsOptOut=false,gameStart=null}){
  // V41.13 — refs for bar break pulse markers (managed by separate effect)
  const barMarkersRef=useRef([]);
  const mapRef=useRef(null);
  const mapInst=useRef(null);
  const markersRef=useRef([]);
  const userMarkerRef=useRef(null);
  const dinnerCircleRef=useRef(null); // V12: phase-gated dinner zone circle

  // Init map
  useEffect(()=>{
    if(!mapRef.current||mapInst.current)return;
    const m=L.map(mapRef.current).setView([START_POS.lat,START_POS.lng],15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'',maxZoom:19}).addTo(m);

    // V11: Add color-dot markers (category-colored, not emojis)
    const catColor=(loc)=>{
      const types=loc.ch.map(c=>c.t);
      if(types.includes('photo'))return 'var(--foto)';
      if(types.includes('video'))return 'var(--video)';
      if(types.includes('creative'))return 'var(--creatief)';
      if(types.includes('quiz'))return 'var(--quiz)';
      return 'var(--accent)';
    };
    const catColorHex=(loc)=>{
      const types=loc.ch.map(c=>c.t);
      if(types.includes('photo'))return '#5b8dee';
      if(types.includes('video'))return '#e05c5c';
      if(types.includes('creative'))return '#4bbe8a';
      if(types.includes('quiz'))return '#9b7bea';
      return '#d4a054';
    };
    // V18: cluster group — collapses overlapping POIs at low zoom, spiderfies at high zoom
    const cluster=(typeof L.markerClusterGroup==='function')?L.markerClusterGroup({
      maxClusterRadius:45,
      showCoverageOnHover:false,
      spiderfyOnMaxZoom:true,
      disableClusteringAtZoom:17,
      iconCreateFunction:(c)=>{
        const n=c.getChildCount();
        const size=n>=20?44:n>=10?38:32;
        return L.divIcon({html:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:rgba(228,178,92,0.85);border:2px solid rgba(255,255,255,0.85);color:#0a0b10;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:${n>=20?16:14}px;box-shadow:0 4px 14px rgba(0,0,0,0.5)">${n}</div>`,className:'',iconSize:[size,size]});
      }
    }):null;
    L_DATA.forEach(loc=>{
      const col=catColorHex(loc);
      const mk=L.marker([loc.la,loc.lo],{
        icon:L.divIcon({className:'',iconAnchor:[8,8],interactive:true,
          // V12: bigger dot (16px) + 8px invisible padding → 32×32 hit target
          html:`<div style="padding:8px;margin:-8px"><div style="width:16px;height:16px;border-radius:50%;background:${col};border:2px solid rgba(255,255,255,0.35);cursor:pointer;box-shadow:0 0 8px ${col}66;transition:all .2s"></div></div>`
        })
      });
      mk.on('click',()=>onSelect(loc.id));
      mk._locId=loc.id;
      mk._color=col;
      markersRef.current.push(mk);
      if(cluster)cluster.addLayer(mk);else mk.addTo(m);
    });
    if(cluster)cluster.addTo(m);

    // V12: Dinner zone circle — only rendered once phase unlocks it
    // (stored on the ref so the phase-watch effect can show/hide it)
    dinnerCircleRef.current=L.circle([DINNER_ZONE.lat,DINNER_ZONE.lng],{radius:DINNER_ZONE.r,color:'#d4a054',fillColor:'#d4a054',fillOpacity:0.05,weight:2,dashArray:'6 4'});

    mapInst.current=m;
  },[]);

  // Update user position
  useEffect(()=>{
    if(!mapInst.current||!pos)return;
    if(userMarkerRef.current)mapInst.current.removeLayer(userMarkerRef.current);
    userMarkerRef.current=L.marker([pos.lat,pos.lng],{
      icon:L.divIcon({className:'',iconAnchor:[6,6],
        html:'<div style="position:relative"><div style="width:12px;height:12px;border-radius:50%;background:#d4a054;border:2px solid rgba(255,255,255,0.9);box-shadow:0 0 12px rgba(212,160,84,0.5);z-index:5;position:relative"></div><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:32px;height:32px;border-radius:50%;border:1px solid rgba(212,160,84,0.15);animation:pulse 3s ease-in-out infinite"></div></div>'
      })
    }).addTo(mapInst.current);
  },[pos]);

  // V41.13 — bar break pulse markers. Renders a pulsing beer-emoji marker on
  // the map for each bar in BAR_BREAKS during its active window
  // [startMin, endMin). Window opens 30 min BEFORE the break is scheduled so
  // teams have lead time to walk there, stays open through the 30-min break,
  // then disappears. Recomputes every tick of nowTs (1s) — cheap because
  // BAR_BREAKS.length === 3. If gameStart isn't set yet (pre-lobby start),
  // no markers render. Mike (admin) can override timing by manually triggering
  // bar breaks regardless — these markers are pure UX guidance, not gating.
  useEffect(()=>{
    if(!mapInst.current)return;
    barMarkersRef.current.forEach(mk=>{try{mapInst.current.removeLayer(mk);}catch(_){}});
    barMarkersRef.current=[];
    if(!gameStart||!nowTs)return;
    const elapsedMin=(nowTs-gameStart)/60000;
    BAR_BREAKS.forEach(b=>{
      if(elapsedMin<b.startMin||elapsedMin>=b.endMin)return;
      const mk=L.marker([b.la,b.lo],{
        zIndexOffset:1000,
        icon:L.divIcon({className:'',iconAnchor:[24,24],
          html:`<div class="bar-break-marker" title="${b.e} ${b.n}"><div class="bar-break-pulse"></div><div class="bar-break-pulse-2"></div><div class="bar-break-icon">${b.e}</div></div>`
        })
      });
      mk.bindTooltip(`${b.e} <b>${b.n}</b><br/>${b.address}`,{direction:'top',offset:[0,-12],opacity:0.95,className:'bar-tooltip'});
      mk.addTo(mapInst.current);
      barMarkersRef.current.push(mk);
    });
  },[nowTs,gameStart]);

  // V12 + V25 (#71): Combined restyler for visited fade AND proximity-band state.
  // Runs on visitedLocs OR pos changes. Priority: visited wins (muted grayscale),
  // otherwise band (unlock → enlarge + green glow; preview → amber ring; far → slightly muted).
  useEffect(()=>{
    if(!markersRef.current)return;
    markersRef.current.forEach(mk=>{
      const visited=visitedLocs&&visitedLocs.has(mk._locId);
      const el=mk.getElement&&mk.getElement();
      if(!el)return;
      const inner=el.querySelector('div>div');
      if(!inner)return;
      // Reset to defaults first
      inner.style.transform='scale(1)';
      inner.style.filter='none';
      inner.style.opacity='1';
      inner.style.boxShadow=`0 0 8px ${mk._color}66`;
      inner.style.border='2px solid rgba(255,255,255,0.35)';
      if(visited){
        inner.style.opacity='0.25';
        inner.style.filter='grayscale(1)';
        return;
      }
      // Determine band for this POI
      const loc=L_DATA.find(l=>l.id===mk._locId);
      if(!loc||!pos){
        // No GPS yet: leave default styling.
        return;
      }
      const{band}=locBand(pos,loc);
      if(band==='unlock'){
        inner.style.transform='scale(1.25)';
        inner.style.border='2px solid #7ee4b7';
        inner.style.boxShadow=`0 0 14px #7ee4b7cc, 0 0 6px ${mk._color}`;
      }else if(band==='preview'){
        inner.style.border='2px solid #f0c373';
        inner.style.boxShadow=`0 0 10px #f0c37388`;
      }else{
        inner.style.opacity='0.7';
      }
    });
  },[visitedLocs,pos]);

  // V12: show dinner zone only from phase 3 onward; pulse in phase 4+
  useEffect(()=>{
    if(!mapInst.current||!dinnerCircleRef.current)return;
    const has=mapInst.current.hasLayer(dinnerCircleRef.current);
    if(phase>=3&&!has)dinnerCircleRef.current.addTo(mapInst.current);
    if(phase<3&&has)mapInst.current.removeLayer(dinnerCircleRef.current);
    if(phase>=4&&dinnerCircleRef.current){
      dinnerCircleRef.current.setStyle({weight:3,fillOpacity:0.1,dashArray:null});
    }
  },[phase]);

  // V12: center-on-me control
  const centerOnMe=()=>{
    if(mapInst.current&&pos)mapInst.current.setView([pos.lat,pos.lng],16,{animate:true});
  };

  // V17: nearby legacy computation kept for fallback if hotTarget is missing — mostly unused now

  return(
    <div style={{height:'100%',overflowY:'auto',paddingBottom:'var(--sp-10)'}}>
      {/* V30 (Phase 5): map sits at fixed height, TaskList scrolls below it.
          Positioned children use this wrapper as their offset parent. */}
      <div style={{position:'relative',height:'48vh',minHeight:280,flexShrink:0}}>
        <div ref={mapRef} style={{width:'100%',height:'100%'}}/>

        {/* V5.1/V12: GPS status pill — softer copy, tap to force-wake when paused.
            V35 P1 fix (Hassan persona): pill used to say "GPS zoekt…" forever when
            the user had denied permission, with no visual signal that retry is the
            user's responsibility. Now branches on denied/unavailable explicitly.
            V37 P2 fix (smoke-test catch): also branch on gpsOptOut. After Hassan
            tapped "Doorgaan zonder GPS", the V34 fix flipped gpsStatus back to
            'weak' so the pill misleadingly said "GPS zoekt…" — the opt-out state
            wasn't visually represented anywhere. Now the pill explicitly shows
            "GPS uit · tik" with red styling whenever opt-out is active. */}
        {(()=>{
          const isOff=gpsStatus==='denied'||gpsStatus==='unavailable'||gpsOptOut;
          // V40 P2 fix (sim finding #5): if we have a valid pos fix, treat as 'good' regardless
          // of gpsStatus. Old code showed "GPS paust · tik om te activeren" even when pos was
          // set (admin override / programmatic update / late watch callback) and TaskList was
          // correctly rendering distances. Visual contradiction confused users — they'd think
          // GPS was broken while distances flowed correctly. Now the pill follows the data
          // (do we have a fix?) not the watcher state (is the watcher fresh?).
          const hasFix = pos && typeof pos.lat==='number' && typeof pos.lng==='number';
          const effectiveStatus = hasFix && !isOff ? 'good' : gpsStatus;
          return(
            <div className="gps-pill" onClick={()=>onWakeGps&&onWakeGps()} style={{cursor:'pointer',background:isOff?'rgba(255,107,107,0.18)':undefined,borderColor:isOff?'rgba(255,107,107,0.4)':undefined,color:isOff?'#ff8a8a':undefined}} title={gpsOptOut?'GPS staat uit (jij koos zonder GPS te spelen) — tik om opnieuw te proberen':gpsStatus==='denied'?'Tik om opnieuw te proberen — eerst zet je locatie aan in Instellingen':'Tik om GPS te activeren'}>
              <span className={`gps-dot ${isOff?'denied':(effectiveStatus||'weak')}`}/>
              {gpsOptOut?'GPS uit · tik om aan te zetten':gpsStatus==='denied'?'GPS uit · tik':gpsStatus==='unavailable'?'GPS niet bereikbaar':effectiveStatus==='good'?'GPS actief':effectiveStatus==='sleep'?'GPS paust':'GPS zoekt…'}
              {gpsSnap&&<span style={{color:'var(--foto)'}}>· op {gpsSnap}</span>}
              {!hasFix&&gpsStatus==='sleep'&&<span className="snap-btn">tik om te activeren</span>}
            </div>
          );
        })()}

        {/* V12: legend — bottom-left, stacked (V30: offset reduced since map is now fixed-height) */}
        <div style={{position:'absolute',bottom:10,left:10,zIndex:1000,padding:'6px 8px',borderRadius:10,backdropFilter:'blur(12px)',background:'rgba(8,9,13,0.7)',border:'1px solid var(--border)',display:'flex',flexDirection:'column',gap:3,fontSize:9,color:'var(--text-secondary)'}}>
          <div style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:4,background:'var(--foto)'}}/>Foto</div>
          <div style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:4,background:'var(--video)'}}/>Video</div>
          <div style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:4,background:'var(--creatief)'}}/>Creatief</div>
          <div style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:4,background:'var(--quiz)'}}/>Quiz</div>
        </div>

        {/* V12: center-on-me (V30: offset reduced since map is now fixed-height) */}
        {pos&&(
          <button onClick={centerOnMe} style={{position:'absolute',bottom:10,right:12,zIndex:1000,width:38,height:38,borderRadius:19,background:'rgba(8,9,13,0.85)',border:'1px solid var(--border)',backdropFilter:'blur(12px)',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}} title="Centreer op mij">📍</button>
        )}
      </div>

      {/* V30 (Phase 5): missions list lives in the Kaart tab now — map + missions in one place */}
      <div style={{padding:'var(--sp-5)'}}>
        {/* V19: mirror of the Jorik-missies banner from the leaderboard tab, compacted so
            players out hunting don't have to switch tabs to see they hold Jorik. */}
        {jorikInTeam&&(()=>{
          const doneCount=(jorikMissionsDone&&jorikMissionsDone.size)||0;
          const total=JORIK_MISSIONS.length;
          const remaining=total-doneCount;
          const allDone=doneCount>=total;
          return(
            <div className="secret-banner" onClick={onShowJorikMissions} style={{marginBottom:'var(--sp-3)',marginTop:0,background:'linear-gradient(155deg,rgba(228,178,92,0.18),rgba(255,107,107,0.08))',borderColor:'rgba(228,178,92,0.4)',cursor:'pointer'}}>
              <div className="secret-badge" style={{background:'rgba(228,178,92,0.25)',borderColor:'rgba(228,178,92,0.5)'}}>💍 Jorik-missies</div>
              <div className="t-card-label" style={{marginTop:'var(--sp-2)'}}>{allDone?'Alle Jorik-missies voltooid!':'Jorik is NU bij jullie team'}</div>
              <div className="t-body" style={{marginTop:'var(--sp-1)'}}>
                {allDone?'🎉 Chapeau — legendarisch team':`Tik voor ${remaining} openstaande missie${remaining===1?'':'s'} · ${doneCount}/${total} gedaan`}
              </div>
              {!allDone&&(
                <div className="t-caption" style={{marginTop:'var(--sp-2)',color:'rgba(255,255,255,0.75)'}}>
                  🍻 Hij blijft tot de volgende bar break — haast je!
                </div>
              )}
            </div>
          );
        })()}
        <TaskList pos={pos} onSelect={onSelect} completed={completed} visitedLocs={visitedLocs} gpsStatus={gpsStatus} gpsOptOut={gpsOptOut}/>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// ACTIVITY FEED — V5: photo grid + filters
// ═══════════════════════════════════════════
function ActivityView({feed,myTeamId,onPhoto,filter,setFilter,jorikTeamId,jorikInTeam,isJorikDevice=false}){
  // V30 (Phase 7): reactions are now DB-persisted via the feed_reactions table
  // (see SUPABASE-CATCHUP-PATCH-V30.sql). Before V30 reactions lived only in
  // React state so nobody else ever saw your tap — the social signal was
  // missing the "social" bit. Now every tap inserts a row and every untap
  // deletes it; realtime subscription fans it to all other devices.
  const REACTIONS=['🔥','👏','💀','😂','🍻'];
  const[reactions,setReactions]=useState({}); // {feedKey: {emoji: count}}
  const[myReactions,setMyReactions]=useState({}); // {feedKey: Set<emoji>}
  // V41.4 (Mike feedback): the 5 emoji buttons rendered on every row made the feed
  // visually noisy. Now: existing reactions (count > 0) stay inline as compact pills;
  // a single "🙂+" trigger reveals the full picker only when the user wants to add one.
  // Picker auto-collapses after a pick (or when tapping outside / scrolling).
  const[pickerKey,setPickerKey]=useState(null); // feedKey of the row whose picker is currently open
  const deviceIdRef=useRef(null);
  // V30.1: DELETE events from Supabase Realtime arrive with only {id} in the
  // old-row payload regardless of REPLICA IDENTITY FULL (the realtime service
  // caches table metadata at slot-creation time and doesn't refresh). We
  // maintain a local id → {feed_key,emoji,device_id} map so we can still
  // decrement the right counter when someone un-reacts from another device.
  // The map is populated on mount (via the initial select) and on every
  // INSERT realtime event, and drained on DELETE. No cross-device drift.
  const reactionRowsRef=useRef({});

  // V30: composite key — matches the activity_feed realtime dedup key so
  // optimistic-local rows and their echoed server rows collapse to one key.
  // Message is capped at 500 so the 300-char cut-off here is just a safety net.
  const feedKey=(item)=>`${item.created_at||''}|${item.team_id==null?'sys':item.team_id}|${item.message||''}`.slice(0,300);

  // V30: one-time per-device identifier. Multiple players share a team_id, so
  // team_id alone can't distinguish "my reaction" from "my teammate's". A
  // localStorage-backed device uuid gives each phone its own toggle state.
  useEffect(()=>{
    let d=null;
    try{
      d=localStorage.getItem('ssr_device_id');
      if(!d){
        d=(typeof crypto!=='undefined'&&crypto.randomUUID)
          ?crypto.randomUUID()
          :(Date.now().toString(36)+Math.random().toString(36).slice(2,10));
        try{localStorage.setItem('ssr_device_id',d);}catch(e){/* private mode — keep ref-only */}
      }
    }catch(e){
      d=(Date.now().toString(36)+Math.random().toString(36).slice(2,10));
    }
    deviceIdRef.current=d;
  },[]);

  // V30: hydrate reactions from DB + subscribe to realtime changes.
  useEffect(()=>{
    if(OFFLINE||!sb)return;
    let alive=true;

    // Initial fetch — grab all reactions (tiny rows; a 500-row feed × 5 emojis ×
    // ~16 devices = 40k reactions max, well within one select round-trip).
    // V30.1: also pulls id so reactionRowsRef can resolve DELETE events that
    // ship with just {id} on Supabase Realtime.
    sb.from('feed_reactions').select('id,feed_key,device_id,emoji').then(res=>{
      if(!alive||!res?.data)return;
      const rx={}, mine={};
      const myDev=deviceIdRef.current;
      res.data.forEach(r=>{
        if(!rx[r.feed_key])rx[r.feed_key]={};
        rx[r.feed_key][r.emoji]=(rx[r.feed_key][r.emoji]||0)+1;
        if(r.device_id===myDev){
          if(!mine[r.feed_key])mine[r.feed_key]=new Set();
          mine[r.feed_key].add(r.emoji);
        }
        if(r.id!=null){
          reactionRowsRef.current[r.id]={feed_key:r.feed_key,emoji:r.emoji,device_id:r.device_id};
        }
      });
      setReactions(rx);
      setMyReactions(mine);
    },()=>{/* table missing on an old DB — silent; reactions just won't persist */});

    // Realtime — INSERT increments the counter, DELETE decrements.
    // V30.1: Supabase Realtime caches table metadata at slot-attach time and
    // streams DELETE payloads with only {id} in the old-row regardless of
    // REPLICA IDENTITY FULL at the table level. We resolve DELETE events
    // against reactionRowsRef (populated on initial load + every INSERT).
    const sub=sb.channel('feed_reactions').on('postgres_changes',
      {event:'*',schema:'public',table:'feed_reactions'},
      payload=>{
        if(!alive)return;
        const myDev=deviceIdRef.current;
        if(payload.eventType==='INSERT'){
          const r=payload.new; if(!r||!r.feed_key)return;
          if(r.id!=null){
            reactionRowsRef.current[r.id]={feed_key:r.feed_key,emoji:r.emoji,device_id:r.device_id};
          }
          setReactions(prev=>{
            const cur={...(prev[r.feed_key]||{})};
            cur[r.emoji]=(cur[r.emoji]||0)+1;
            return{...prev,[r.feed_key]:cur};
          });
          if(r.device_id===myDev){
            setMyReactions(prev=>{
              const cur=new Set(prev[r.feed_key]||[]);
              cur.add(r.emoji);
              return{...prev,[r.feed_key]:cur};
            });
          }
        }else if(payload.eventType==='DELETE'){
          // V30.1: old payload is often just {id} — look up full row locally.
          const o=payload.old||{};
          const hit=(o.id!=null)?reactionRowsRef.current[o.id]:null;
          const feed_key=o.feed_key||hit?.feed_key;
          const emoji=o.emoji||hit?.emoji;
          const device_id=o.device_id||hit?.device_id;
          if(!feed_key||!emoji)return; // unknown row (tab opened after both INSERT and DELETE in <1ms) — ignore; next mount's select corrects
          if(o.id!=null)delete reactionRowsRef.current[o.id];
          setReactions(prev=>{
            const cur={...(prev[feed_key]||{})};
            const next=Math.max(0,(cur[emoji]||0)-1);
            if(next===0)delete cur[emoji]; else cur[emoji]=next;
            return{...prev,[feed_key]:cur};
          });
          if(device_id===myDev){
            setMyReactions(prev=>{
              const cur=new Set(prev[feed_key]||[]);
              cur.delete(emoji);
              return{...prev,[feed_key]:cur};
            });
          }
        }
      }
    ).subscribe();

    return()=>{alive=false;try{sb.removeChannel(sub);}catch(e){}};
  },[]);

  const toggleReaction=(key,emoji)=>{
    const myDev=deviceIdRef.current;
    // V30: determine current mine-state SYNCHRONOUSLY from latest state so
    // the DB round-trip matches what we optimistically flip in the UI below.
    const mineNow=(myReactions[key]||new Set()).has(emoji);

    // Optimistic UI — realtime echo will no-op because the row is already
    // reflected in state. If the DB round-trip fails, the echo never arrives
    // and the user sees a stale tap; an explicit revert is deliberately NOT
    // added because reactions are low-stakes and a silent error is less
    // disruptive than a flicker.
    setMyReactions(prev=>{
      const cur=new Set(prev[key]||[]);
      if(mineNow)cur.delete(emoji); else cur.add(emoji);
      return{...prev,[key]:cur};
    });
    setReactions(prev=>{
      const cur={...(prev[key]||{})};
      const next=Math.max(0,(cur[emoji]||0)+(mineNow?-1:1));
      if(next===0)delete cur[emoji]; else cur[emoji]=next;
      return{...prev,[key]:cur};
    });

    // Persist — offline/no-sb or missing device id both no-op silently.
    if(OFFLINE||!sb||!myDev)return;
    if(mineNow){
      sb.from('feed_reactions').delete()
        .eq('feed_key',key).eq('device_id',myDev).eq('emoji',emoji)
        .then(()=>{},(err)=>console.warn('reaction delete failed',err?.message||err));
    }else{
      sb.from('feed_reactions').insert({
        feed_key:key,device_id:myDev,
        team_id:(typeof myTeamId==='number'?myTeamId:null),
        emoji,
      }).then(()=>{},(err)=>{
        // 23505 = unique violation → row already exists (double-tap race). Ignore.
        const code=err?.code||'';
        if(code!=='23505')console.warn('reaction insert failed',err?.message||err);
      });
    }
  };
  // V30: 'others' filter removed in Less-is-More pass.
  // V34 P0 fix (Tom/Jorik personas): filter out wp:1 wedding-pipeline entries
  // when the current viewer's team is holding Jorik. The [WP1] prefix is added
  // by completeChallenge for any ch.wp===1 submission. Other teams (and admin)
  // still see the entries with the marker stripped on render.
  // V37 P0 (Jorik audit finding): also filter on Jorik's own device, regardless of
  // which team currently holds the rotating Jorik token. The V34 jorikInTeam-based
  // filter only fires when the team-with-token contains Jorik — wrong, since Jorik
  // (the person) sits in ONE team all day and the token rotates separately.
  const visibleFeed=(jorikInTeam||isJorikDevice)?feed.filter(item=>!String(item.message||'').startsWith('[WP1] ')):feed;
  const filtered=visibleFeed.filter(item=>{
    if(filter==='photos')return !!item.photo;
    if(filter==='mine')return item.team_id===myTeamId;
    return true;
  });
  const photos=visibleFeed.filter(i=>!!i.photo);
  // Strip the [WP1] marker before render so non-Jorik teammates see clean copy.
  const renderMessage=(raw)=>String(raw||'').replace(/^\[WP1\] /,'');

  return(
    <div style={{height:'100%',overflowY:'auto',padding:'var(--sp-5)',paddingBottom:'var(--sp-10)'}}>
      <div className="row-between" style={{marginBottom:'var(--sp-3)'}}>
        <div className="t-label">Live feed</div>
        <div className="t-caption">{feed.length} berichten · {photos.length} foto's</div>
      </div>

      {/* V30: simplified to three filter pills — "Andere teams" removed */}
      <div className="filter-pills">
        <button className={`filter-pill ${filter==='all'?'active':''}`} onClick={()=>setFilter('all')}>Alles</button>
        <button className={`filter-pill ${filter==='photos'?'active':''}`} onClick={()=>setFilter('photos')}>📸 Foto's</button>
        <button className={`filter-pill ${filter==='mine'?'active':''}`} onClick={()=>setFilter('mine')}>Mijn team</button>
      </div>

      {/* V29 (§3): removed "Recente foto's" grid. Photos already render
          inline in the activity feed rows below — showing them twice (once
          in a grid preview, once in the row) gave the duplicate-photo look
          in Mike's screenshot 3. Filter pill "📸 Foto's" still lets the
          user see a photos-only view. */}

      {filtered.length===0&&(
        <div className="panel text-center" style={{padding:'var(--sp-7)'}}>
          <div style={{fontSize:'var(--icon-md)'}}>📢</div>
          <div className="t-card-label" style={{marginTop:'var(--sp-3)'}}>Nog geen activiteit</div>
          {filter!=='all'&&<button className="btn btn-ghost btn-sm" onClick={()=>setFilter('all')} style={{marginTop:'var(--sp-4)'}}>Laat alles zien</button>}
        </div>
      )}

      {filtered.map((item,i)=>{
        const isMe=item.team_id===myTeamId;
        const key=feedKey(item);
        const rx=reactions[key]||{};
        const mine=myReactions[key]||new Set();
        const isSystem=!item.team_id||item.team_name==='Game Master'||item.team_name==='Systeem';
        return(
          <div key={i} className="activity-row animate-in" style={{
            borderLeft:item.team_color?`3px solid ${item.team_color}`:undefined,
            background:isSystem?'rgba(228,178,92,0.04)':undefined,
            borderStyle:isSystem?'solid dashed dashed dashed':'solid'
          }}>
            <div className="row-3">
              <div style={{fontSize:22}}>{item.team_emoji||(isSystem?'👑':'🎮')}</div>
              <div className="flex-1">
                <div className="t-body-emph row-2" style={{flexWrap:'wrap'}}>
                  {item.team_name||'Systeem'}
                  {isSystem&&<span className="chip-xs" style={{background:'var(--accent-glow)',borderColor:'rgba(228,178,92,0.3)',color:'var(--accent)'}}>SYSTEEM</span>}
                  {isMe&&!isSystem&&<span className="chip-xs" style={{background:'rgba(110,163,255,0.12)',borderColor:'rgba(110,163,255,0.3)',color:'var(--foto-2)'}}>JIJ</span>}
                </div>
                {/* V31 — opaque "[Geheime missie]" label for non-holders (synthesizer Fix #3).
                    The Jorik narrative depends on asymmetric info: holders see the missions,
                    non-holders see "something is happening with Jorik". Before V31 the title
                    + points leaked to all teams. Now Jorik-mission rows render as a
                    grey-shrouded "[Geheime missie]" line for any captain whose team isn't
                    the current jorik holder. The holder team sees the full text. System rows
                    + own-team rows fall through unchanged. Heuristic match: message starts
                    with "💍 Jorik-missie:" or "[JORIK-MISSION]" or contains "Jorik ruil". */}
                {(()=>{
                  // V34: strip [WP1] marker before render — entries are pre-filtered for
                  // Jorik's team in `visibleFeed`; non-Jorik teams + admin see clean copy.
                  const msg=renderMessage(item.message);
                  const isJorikMissionRow=/^\s*[^\s]+\s*Jorik(-missie|-MISSION| ruil)/.test(msg)||msg.startsWith('[JORIK-MISSION]');
                  const iAmHolder=jorikTeamId!=null&&item.team_id===jorikTeamId&&myTeamId===jorikTeamId;
                  if(isJorikMissionRow&&!iAmHolder&&!isSystem){
                    return <div className="t-body" style={{marginTop:2,fontStyle:'italic',color:'var(--text-secondary)'}}>🤫 [Geheime missie] — Jorik bezig met {item.team_emoji} {item.team_name}</div>;
                  }
                  return <div className="t-body" style={{marginTop:2}}>{msg}</div>;
                })()}
              </div>
              {item.points>0&&<div className="t-num t-accent" style={{fontSize:'var(--fs-14)'}}>+{item.points}</div>}
              {item.points<0&&<div className="t-num t-danger" style={{fontSize:'var(--fs-14)'}}>{item.points}</div>}
            </div>
            {item.photo&&(
              isVideoData(item.photo)
                ?<video src={item.photo} className="activity-photo" controls muted onClick={()=>onPhoto&&onPhoto(item.photo)}/>
                :<img src={item.photo} className="activity-photo" alt="submission" onClick={()=>onPhoto&&onPhoto(item.photo)}/>
            )}
            {/* V10/V12: reactions — rendered only when the row is team-generated (systeem rows don't need reactions)
                V41.4: collapsed UI. Only emojis that someone HAS used render as inline pills;
                the full 5-emoji picker is hidden behind a single "🙂+" trigger and revealed
                on tap (state in pickerKey). Tap an emoji to add/remove → picker auto-closes. */}
            {!isSystem&&(
              <div className="reactions" title="Alleen jij ziet jouw reacties">
                {REACTIONS.map(e=>{
                  const n=rx[e]||0;
                  // Only render pre-existing reactions inline OR ones the user has added.
                  if(n===0&&!mine.has(e))return null;
                  return(
                    <button key={e} className={`reaction-btn ${mine.has(e)?'my':''}`} onClick={()=>toggleReaction(key,e)}>
                      <span>{e}</span>{n>0&&<span className="reaction-count">{n}</span>}
                    </button>
                  );
                })}
                {/* Picker trigger — always visible unless picker is open for this row */}
                {pickerKey!==key&&(
                  <button className="reaction-btn" aria-label="Reactie toevoegen" onClick={()=>setPickerKey(key)}
                    style={{opacity:0.6}}>
                    <span style={{fontSize:13}}>🙂</span><span style={{fontSize:11,marginLeft:2}}>+</span>
                  </button>
                )}
                {/* Expanded picker — only emojis NOT already shown inline render here.
                    V41.4 buddy review: dedupe so 🔥(2) inline + 🔥 in picker don't show twice.
                    Tap an emoji to add it (inline pill takes over from this point) + close. */}
                {pickerKey===key&&(
                  <>
                    {REACTIONS.filter(e=>(rx[e]||0)===0&&!mine.has(e)).map(e=>(
                      <button key={`pick-${e}`} className="reaction-btn"
                        onClick={()=>{toggleReaction(key,e);setPickerKey(null);}}
                        style={{animation:'slideUp .15s var(--spring)'}}>
                        <span>{e}</span>
                      </button>
                    ))}
                    <button className="reaction-btn" aria-label="Sluit reactie-picker" onClick={()=>setPickerKey(null)}
                      style={{opacity:0.55,padding:'5px 9px'}}>
                      <span style={{fontSize:12}}>✕</span>
                    </button>
                  </>
                )}
                <div className="flex-1"/>
                <div className="t-label-sm">{fmtRelTime(item.created_at)}</div>
              </div>
            )}
            {isSystem&&(
              <div className="row" style={{justifyContent:'flex-end',marginTop:'var(--sp-1)'}}>
                <div className="t-label-sm">{fmtRelTime(item.created_at)}</div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// V5: PHOTO LIGHTBOX
// ═══════════════════════════════════════════
function PhotoLightbox({media,onClose}){
  // V21 a11y: escape closes + role dialog + aria-label on close
  React.useEffect(()=>{
    const onKey=(e)=>{if(e.key==='Escape'){e.stopPropagation();onClose&&onClose();}};
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[onClose]);
  return(
    <div className="photo-lightbox" onClick={onClose} role="dialog" aria-modal="true" aria-label="Vergrote media">
      <button className="photo-lightbox-close" onClick={onClose} aria-label="Sluit foto">✕</button>
      {isVideoData(media)
        ?<video src={media} controls autoPlay style={{maxWidth:'100%',maxHeight:'80vh',borderRadius:12}} aria-label="Video"/>
        :<img src={media} alt="Uitvergrote foto"/>}
    </div>
  );
}

// V20 UX P1: promise-based dialog sheet
// ═══════════════════════════════════════════
// Replaces native confirm()/prompt(). Resolves `true`/`input` on OK, `false`/null on cancel.
function DialogSheet({type,msg,defaultVal,confirmLabel,cancelLabel,danger,onClose}){
  const[val,setVal]=React.useState(defaultVal||'');
  const inputRef=React.useRef(null);
  React.useEffect(()=>{
    if(type==='prompt'){
      const t=setTimeout(()=>inputRef.current?.focus(),30);
      return()=>clearTimeout(t);
    }
  },[type]);
  const onOk=()=>{
    if(type==='prompt')onClose(val);
    else onClose(true);
  };
  const onCancel=()=>{
    if(type==='prompt')onClose(null);
    else onClose(false);
  };
  const onKey=(e)=>{
    if(e.key==='Enter'&&(type==='confirm'||(type==='prompt'&&val.trim()))){
      e.preventDefault();onOk();
    }else if(e.key==='Escape'){
      e.preventDefault();onCancel();
    }
  };
  return(
    <>
      {/* V33: bumped z-index to 12000 / 12050 so confirms originating from
          inside the AdminMenu drawer (z=11500) and broadcast banner (z=11000)
          render above the drawer instead of behind it. Previously 10000/10050
          which was fine until AdminMenu introduced a higher overlay. */}
      <div className="sheet-overlay" onClick={onCancel} role="presentation" style={{zIndex:12000}}/>
      <div role="alertdialog" aria-modal="true" aria-labelledby="dialog-msg"
        style={{position:'fixed',left:'50%',top:'50%',transform:'translate(-50%,-50%)',zIndex:12050,maxWidth:420,width:'92%',padding:'var(--sp-6) var(--sp-6) var(--sp-5)',borderRadius:'var(--r-lg)',background:'var(--bg-elevated,#17181f)',border:'1px solid var(--border)',boxShadow:'0 20px 60px rgba(0,0,0,0.6)',color:'#fff'}}
        onKeyDown={onKey}>
        <div id="dialog-msg" className="t-body" style={{marginBottom:'var(--sp-5)',lineHeight:'var(--lh-relaxed)',whiteSpace:'pre-wrap'}}>{msg}</div>
        {type==='prompt'&&(
          <input ref={inputRef} value={val} onChange={e=>setVal(e.target.value)} autoFocus
            style={{width:'100%',padding:'12px 14px',borderRadius:'var(--r-md)',border:'1px solid var(--border)',background:'rgba(255,255,255,0.04)',color:'#fff',fontFamily:'inherit',fontSize:'var(--fs-15)',marginBottom:'var(--sp-5)'}}/>
        )}
        <div style={{display:'flex',gap:'var(--sp-2)',justifyContent:'flex-end'}}>
          {/* V41.14 — cancelLabel:null = info dialog (no cancel button). Used
              by showInfo() helper for OK-only acknowledgements. */}
          {cancelLabel!==null&&(
            <button type="button" onClick={onCancel} className="btn btn-ghost btn-sm">{cancelLabel||'Annuleer'}</button>
          )}
          <button type="button" onClick={onOk}
            className={`btn btn-sm ${danger?'btn-danger':'btn-gold'}`}
            disabled={type==='prompt'&&!val.trim()}>{confirmLabel||'OK'}</button>
        </div>
      </div>
    </>
  );
}

// V33: ADMIN MENU — discoverable drawer with every game-state action grouped
// in one place. Opened by the floating ⚙ button in the top-right corner of the
// lobby + game screens. Each destructive action confirms before firing. Pause
// and Resume are broadcast-only (signal to teams, no scoring halt). Reset goes
// to the lobby (DB intact). Hernieuw spel runs the full wipe + splash flow.
// ═══════════════════════════════════════════
// V41.7 — AdminLogin modal. Splash-only entry point for Mike (and any future
// co-host added to ADMIN_USERS). On success the caller writes ssr_admin='1' to
// localStorage and flips the App's isAdmin state. Closing without submitting
// is a no-op. Matches DialogSheet visual style (sheet-overlay + centered card).
function AdminLogin({onClose,onSuccess}){
  const[email,setEmail]=useState('');
  const[pw,setPw]=useState('');
  const[err,setErr]=useState('');
  const emailRef=React.useRef(null);
  React.useEffect(()=>{const t=setTimeout(()=>emailRef.current&&emailRef.current.focus(),60);return()=>clearTimeout(t);},[]);
  const tryLogin=()=>{
    const e=(email||'').trim().toLowerCase();
    const match=ADMIN_USERS.find(u=>u.email.toLowerCase()===e&&u.pw===pw);
    if(match){onSuccess&&onSuccess();}
    else{setErr('E-mail of wachtwoord klopt niet.');setPw('');}
  };
  return(
    <>
      <div className="sheet-overlay" onClick={onClose} role="presentation" style={{zIndex:12000}}/>
      <div role="dialog" aria-modal="true" aria-label="Inloggen als Game Master"
        style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',padding:'var(--sp-5)',zIndex:12001,pointerEvents:'none'}}>
        <div onClick={e=>e.stopPropagation()}
          style={{pointerEvents:'auto',width:'min(420px,100%)',background:'linear-gradient(180deg,#161821 0%,var(--bg) 100%)',border:'1px solid rgba(228,178,92,0.35)',borderRadius:'var(--r-lg)',padding:'var(--sp-5)',boxShadow:'0 24px 60px rgba(0,0,0,0.6)',animation:'fadeInUp 0.22s var(--ease-out)'}}>
          <div className="row-between" style={{marginBottom:'var(--sp-4)'}}>
            <div>
              <div className="t-label t-accent">🔐 Game Master</div>
              <div className="t-section" style={{marginTop:'var(--sp-1)'}}>Inloggen</div>
            </div>
            <button onClick={onClose} aria-label="Sluit" className="btn-close" type="button">×</button>
          </div>
          <div className="stack-3">
            <label className="t-label-sm" style={{color:'var(--text-secondary)'}}>E-mail</label>
            <input ref={emailRef} type="email" autoComplete="email" inputMode="email" value={email}
              onChange={e=>{setEmail(e.target.value);if(err)setErr('');}}
              onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();tryLogin();}}}
              placeholder="bijv. m.h.zuidgeest@gmail.com"
              style={{width:'100%',padding:'10px 12px',borderRadius:'var(--r-md)',border:'1px solid var(--border)',background:'rgba(255,255,255,0.04)',color:'#fff',fontSize:'var(--fs-14)'}}/>
            <label className="t-label-sm" style={{color:'var(--text-secondary)',marginTop:'var(--sp-2)'}}>Wachtwoord</label>
            <input type="password" autoComplete="current-password" value={pw}
              onChange={e=>{setPw(e.target.value);if(err)setErr('');}}
              onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();tryLogin();}}}
              placeholder="••••••••"
              style={{width:'100%',padding:'10px 12px',borderRadius:'var(--r-md)',border:'1px solid var(--border)',background:'rgba(255,255,255,0.04)',color:'#fff',fontSize:'var(--fs-14)'}}/>
            {err&&<div role="alert" className="t-caption" style={{color:'var(--video-2)',marginTop:'var(--sp-1)'}}>{err}</div>}
          </div>
          <div className="row-between" style={{marginTop:'var(--sp-5)',gap:'var(--sp-3)'}}>
            <button onClick={onClose} type="button"
              className="btn btn-ghost" style={{flex:1}}>Annuleer</button>
            <button onClick={tryLogin} type="button"
              className="btn btn-gold" style={{flex:1}} disabled={!email||!pw}>Inloggen</button>
          </div>
          <div className="t-caption t-muted" style={{textAlign:'center',marginTop:'var(--sp-3)',lineHeight:'var(--lh-relaxed)'}}>
            Alleen voor de Game Master. Spelers tikken op "Speel mee" hierboven.
          </div>
        </div>
      </div>
    </>
  );
}

            <MenuButton icon="📱" label={isJorikDevice?'Hermarkeer als Jorik':'Markeer als Jorik\'s telefoon'} variant="primary"
              hint="Verberg wedding-pipeline inhoud op dit toestel"
              onClick={async()=>{
                if(jorikDeviceId&&!isJorikDevice){

          {onSetTestMode&&(()=>{

            return(
              <Section title="🧪 Test mode"
                hint={effective?'Drempels UIT — iedereen kan lobby starten + GPS-foto gate is bypassed.':'Productie-modus actief — admin-only lobby + 50m GPS gate.'}>

                  onClick={async()=>{
                    const next=!effective;

                    if(ok)onSetTestMode(next);

                  <MenuButton icon="↩️" label="Herstel naar build-default" variant="default"
                    hint={`Build-default: ${buildTestMode?'AAN':'UIT'}. Wist de runtime override.`}
                    onClick={async()=>{

          {onLogout&&(
            <Section title="Sessie">
              <MenuButton icon="🚪" label="Uitloggen als Game Master"
                hint="Terug naar speler-modus op deze telefoon"
                onClick={async()=>{

        </div>

    </div>
  );

// V35: PACE-GUIDE — extracted from AdminReviewView's IIFE so it can own a real
// useEffect that toasts on threshold crossings (Mike persona was missing the bar
// breaks because the IIFE re-rendered silently). Also handles the stale-hint case
// where "Druk op START in lobby" used to stay for 60 min after game start.
// ═══════════════════════════════════════════
function PaceGuide({phase}){
  const SCHEDULE=[
    {min:0,    label:'14:00 — Start spel',                 hint:'Druk op 🎮 START in lobby.',                                  step:'start'},
    {min:60,   label:'15:00 — Bar 1 (~30 min)',            hint:'🍺 Trigger bar break. Jorik krijgt bar-set-piece.',           step:'bar1'},
    {min:90,   label:'15:30 — Einde bar 1 / Fase 2 erna',  hint:'Bar overlay sluit automatisch. Geen actie.',                   step:'phase2'},
    {min:180,  label:'17:00 — Bar 2 (~30 min)',            hint:'🍺 Trigger bar break #2.',                                    step:'bar2'},
    {min:240,  label:'18:00 — Fase 3 transition',          hint:'Soft moment, geen actie nodig (admin kan phase forward).',     step:'phase3'},
    {min:270,  label:'18:30 — Bar 3 (~30 min)',            hint:'🍺 Laatste bar break.',                                       step:'bar3'},
    {min:300,  label:'19:00 — Markthal moment',            hint:'Jorik solo Hand-in-Hand Kameraden in Markthal — als hij daar kan zijn.',step:'markthal'},
    {min:315,  label:'19:15 — FINALE (×1.5)',              hint:'🏆 Trigger Finale. Punten ×1.5 in laatste 15 min.',           step:'finale'},
    {min:330,  label:'19:30 — Dinner / einde',             hint:'🥂 Start Finale-uitslag. Onthul prijs.',                      step:'end'},
  ];
  // V35: tick every 60s so nowIdx advances honestly (was: only on parent re-render).
  const[tick,setTick]=React.useState(0);
  React.useEffect(()=>{const id=setInterval(()=>setTick(t=>t+1),60000);return()=>clearInterval(id);},[]);
  const dinner=dinerTs();
  const startMs=dinner-(5.5*3600*1000);
  const elapsedMin=Math.floor((Date.now()-startMs)/60000);
  let nowIdx=0;
  for(let i=0;i<SCHEDULE.length;i++){if(SCHEDULE[i].min<=elapsedMin)nowIdx=i;}
  const nextIdx=Math.min(nowIdx+1,SCHEDULE.length-1);
  const minToNext=SCHEDULE[nextIdx].min-elapsedMin;
  // V35 P1 fix (Mike): toast on threshold cross so Mike notices the bar break trigger
  // even when his attention is on a guest. Use a ref so we only toast on advance.
  const lastIdxRef=React.useRef(nowIdx);
  React.useEffect(()=>{
    if(nowIdx!==lastIdxRef.current){
      const moment=SCHEDULE[nowIdx];
      // Only toast for action-worthy moments (skip the soft "Einde bar 1" / "phase3" types).
      if(moment&&['bar1','bar2','bar3','markthal','finale','end'].includes(moment.step)){
        try{
          // Toast goes to the global app via window — AdminReviewView doesn't expose setToast.
          if(window.__ssrSetToast)window.__ssrSetToast(`⏱ ${moment.label} — ${moment.hint}`);
          if(navigator.vibrate)navigator.vibrate([200,80,200]);
        }catch(e){}
      }
      lastIdxRef.current=nowIdx;
    }
  },[nowIdx]);
  // V35 P1 fix (Mike): stale "Druk op START" hint when phase has already advanced.
  const showStaleStartHint=nowIdx===0&&phase>=1&&elapsedMin>5;
  return(
    <div className="panel stack-3" style={{marginBottom:'var(--sp-4)',borderColor:'rgba(95,216,165,0.30)',background:'linear-gradient(155deg,rgba(95,216,165,0.08),rgba(255,255,255,0.015))'}}>
      <div className="t-label t-success">⏱ Pace-guide (advies)</div>
      <div className="row-3" style={{alignItems:'flex-start'}}>
        <div style={{fontSize:24,flexShrink:0}}>📍</div>
        <div className="flex-1">
          <div className="t-card-label">Nu: {showStaleStartHint?'Spel loopt — wachten tot 15:00 voor bar 1':SCHEDULE[nowIdx].label}</div>
          <div className="t-caption t-muted" style={{marginTop:'var(--sp-1)'}}>{showStaleStartHint?'Geen actie nodig. Volgende: 🍺 bar break om 15:00.':SCHEDULE[nowIdx].hint}</div>
        </div>
      </div>
      {nextIdx>nowIdx&&(
        <div className="row-3" style={{alignItems:'flex-start',opacity:0.85}}>
          <div style={{fontSize:24,flexShrink:0}}>⏭</div>
          <div className="flex-1">
            <div className="t-card-label-sm">Volgende ({minToNext>=0?`over ${minToNext} min`:'inhalen'}): {SCHEDULE[nextIdx].label}</div>
            <div className="t-caption t-muted" style={{marginTop:'var(--sp-1)'}}>{SCHEDULE[nextIdx].hint}</div>
          </div>
        </div>
      )}
      <div className="t-caption t-muted" style={{fontStyle:'italic'}}>Schema is suggestie. Niets vuurt automatisch — admin triggert handmatig.</div>
    </div>
  );
}

// V6: ADMIN REVIEW QUEUE

function AdminReviewView({queue,onApprove,onReject,onPhoto,teams=[],jorikTeamId=null,jorikMovedAt=null,onMoveJorik,onTriggerBarBreak,onEndBarBreak,barBreakActive,onStartFinalePhase,onStartFinale,phase=1,scores={},onAdjustScore,onRemoveTeam,onRenameTeam,reviewUndo,onUndoReview,onBroadcast,onResetGame,confirmAsync,jorikVisitedTeamIds,teamMemberCounts={},nowTs=Date.now()}){
  // V20 UX P1: fallback to native confirm if prop missing (for isolated testing)
  const ask=confirmAsync||((msg)=>Promise.resolve(window.confirm(msg)));
  const[barChoice,setBarChoice]=React.useState('');
  const[barCustom,setBarCustom]=React.useState('');
  const[showTeamAdmin,setShowTeamAdmin]=React.useState(false);
  // V37 P1 (Mike audit): GM controls panel auto-collapses when queue is busy
  // (≥6 items) so review cards don't sink below the fold. Initialized lazily so
  // it captures the queue length on first render but doesn't fight the admin's
  // manual toggle thereafter.
  const[gmPanelOpen,setGmPanelOpen]=React.useState(()=>queue.length<6);
  const[undoLeft,setUndoLeft]=React.useState(0);
  const[broadcastMsg,setBroadcastMsg]=React.useState('');
  // V25 (#53): reject-reason picker — tracks which review row has the picker expanded
  // and the custom-reason text. Reset when a reject fires or picker is cancelled.
  const[rejectOpenId,setRejectOpenId]=React.useState(null);
  const[rejectCustom,setRejectCustom]=React.useState('');
  const[rejectCustomOpen,setRejectCustomOpen]=React.useState(false);
  const REJECT_REASONS=[
    {k:'te-ver',l:'📍 Te ver weg'},
    {k:'onherkenbaar',l:'🔍 Onderwerp niet herkenbaar'},
    {k:'onscherp',l:'📸 Onscherp / onduidelijk'},
    {k:'geen-team',l:'👤 Geen teamleden zichtbaar'},
    {k:'verkeerd',l:'🎯 Verkeerde opdracht'},
  ];
  // V18 (§1.9.10): queue filter — 'all' | 'green' | 'yellow' | 'red'
  // V18 audit-fix: unknown distance (gps_distance==null) groups with 'red' — treat-as-suspicious default
  const[reviewFilter,setReviewFilter]=React.useState('all');
  const barOptions=getBarOptions();
  const classifyDist=(d)=>d==null?'red':d<=PHOTO_GATE_RADIUS?'green':d<=PHOTO_GATE_RADIUS+PHOTO_GATE_GRACE?'yellow':'red';
  const filteredQueue=reviewFilter==='all'?queue:queue.filter(r=>classifyDist(r.gps_distance)===reviewFilter);
  const queueCounts={
    green:queue.filter(r=>classifyDist(r.gps_distance)==='green').length,
    yellow:queue.filter(r=>classifyDist(r.gps_distance)==='yellow').length,
    red:queue.filter(r=>classifyDist(r.gps_distance)==='red').length,
  };

  // V12: countdown for the undo banner
  React.useEffect(()=>{
    if(!reviewUndo){setUndoLeft(0);return;}
    const tick=()=>setUndoLeft(Math.max(0,Math.ceil((reviewUndo.deadline-Date.now())/1000)));
    tick();
    const i=setInterval(tick,250);
    return()=>clearInterval(i);
  },[reviewUndo]);

  return(
    <div style={{height:'100%',overflowY:'auto',padding:'var(--sp-5)',paddingBottom:'var(--sp-10)'}}>
      {/* Review undo banner — V25 (#53): also surfaces the reject reason when one was captured */}
      {reviewUndo&&undoLeft>0&&(
        <div className="row-3 panel-sm" style={{position:'sticky',top:0,zIndex:20,marginBottom:'var(--sp-3)',background:reviewUndo.action==='approved'?'rgba(95,216,165,0.15)':'rgba(255,107,107,0.15)',borderColor:reviewUndo.action==='approved'?'rgba(95,216,165,0.35)':'rgba(255,107,107,0.35)'}}>
          <div className="flex-1 t-body-emph" style={{color:reviewUndo.action==='approved'?'var(--success)':'var(--danger)'}}>
            {reviewUndo.action==='approved'?'✓ Goedgekeurd':'✗ Afgekeurd'}: {reviewUndo.row.team_name} · {reviewUndo.row.challenge_title}
            {reviewUndo.reason&&<div className="t-caption t-muted" style={{marginTop:2,fontWeight:'normal'}}>Reden: {reviewUndo.reason}</div>}
          </div>
          <button onClick={onUndoReview} className="btn btn-ghost btn-sm">↶ Ongedaan ({undoLeft>=60?`${Math.floor(undoLeft/60)}m ${undoLeft%60}s`:`${undoLeft}s`})</button>
        </div>
      )}

      {/* V22: Admin pace-guide panel — soft suggestion only, helps Mike not forget to
           trigger bar breaks / phase transitions on time. Computes "where in the day are we"
           from the wall clock + the hardcoded gameday window (14:00 – 19:30).
           V35 P1 fixes (Mike persona): now a real component with a useEffect that
           toasts on threshold cross (was: silent — Mike missed bar-2 trigger if not
           actively watching the tab). Stale "Druk op START in lobby" hint is also
           swapped once phase>=1 (was: stayed for 60 min after game start). */}
      <PaceGuide phase={phase}/>

      {/* Game-master controls.
          V37 P1 fix (Mike audit): when the review queue is busy (≥6 items), the
          GM controls panel + pace-guide pre-roll pushed the first review card
          below the fold. Default state is now collapsed when queue.length>=6;
          admin taps the header to expand. Local state tracks user's manual
          override so the collapse heuristic doesn't fight a deliberate expand. */}
      <div className="panel stack-4" style={{marginBottom:'var(--sp-5)',borderColor:'rgba(228,178,92,0.28)',background:'linear-gradient(155deg,rgba(228,178,92,0.05),rgba(255,255,255,0.015))'}}>
        <div onClick={()=>setGmPanelOpen(v=>!v)} className="row-between" style={{cursor:'pointer',userSelect:'none'}}>
          <div className="t-label t-accent">🎛 Game Master controls</div>
          <div className="t-caption t-muted">{gmPanelOpen?'▼ verberg':`▸ ${queue.length>=6?`${queue.length} in wachtrij — `:''}toon`}</div>

        {gmPanelOpen&&<>
