<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Stadsspel Rotterdam V11 - Jorik's Bachelor Party</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#08090d;--surface:rgba(255,255,255,0.035);--surface-hover:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.06);--text-primary:rgba(255,255,255,0.92);--text-secondary:rgba(255,255,255,0.45);--text-tertiary:rgba(255,255,255,0.25);--accent:#d4a054;--accent-glow:rgba(212,160,84,0.12);--foto:#5b8dee;--quiz:#9b7bea;--creatief:#4bbe8a;--video:#e05c5c;--success:#4bbe8a;--danger:#e05c5c}
    *{margin:0;padding:0;box-sizing:border-box}
    html,body,#root{width:100%;height:100%;overflow:hidden}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text-primary);-webkit-font-smoothing:antialiased}
    .leaflet-div-icon{background:none!important;border:none!important}

    /* Glass morphism */
    .glass{backdrop-filter:blur(14px);background:var(--surface);border:1px solid var(--border);border-radius:14px}
    .glass-strong{backdrop-filter:blur(20px);background:rgba(8,9,13,0.88);border:1px solid rgba(255,255,255,0.08);border-radius:14px}

    /* Buttons */
    .btn{padding:12px 24px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all .15s;font-size:13px;letter-spacing:-0.1px}
    .btn:active{transform:scale(0.97)}
    .btn-cyan{background:linear-gradient(135deg,var(--foto),#4a7bd4);color:#fff}
    .btn-gold{background:linear-gradient(135deg,var(--accent),#b8863a);color:#fff}
    .btn-ghost{background:var(--surface);color:var(--text-secondary);border:1px solid var(--border)}
    .btn-danger{background:linear-gradient(135deg,var(--danger),#b84040);color:#fff}
    .btn:disabled{opacity:0.35;cursor:not-allowed;transform:none}

    /* Animations */
    @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,0.6)}50%{box-shadow:0 0 0 12px rgba(0,212,255,0)}}
    @keyframes glow{0%,100%{filter:drop-shadow(0 0 6px rgba(0,212,255,0.8))}50%{filter:drop-shadow(0 0 16px rgba(0,212,255,0.4))}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
    @keyframes scoreFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .animate-in{animation:fadeInUp .4s ease both}
    .animate-in-1{animation-delay:.05s}.animate-in-2{animation-delay:.1s}.animate-in-3{animation-delay:.15s}.animate-in-4{animation-delay:.2s}

    /* Toast */
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10002;animation:slideDown .3s ease}
    .toast-inner{padding:10px 20px;border-radius:10px;backdrop-filter:blur(16px);background:rgba(212,160,84,0.12);border:1px solid rgba(212,160,84,0.25);font-weight:600;font-size:13px;white-space:nowrap;text-align:center;color:var(--text-primary)}

    /* Score popup */
    .score-popup{position:fixed;top:40%;left:50%;transform:translateX(-50%);z-index:10003;font-size:38px;font-weight:900;color:var(--accent);animation:scoreFloat 1.2s ease forwards;pointer-events:none;text-shadow:0 2px 20px rgba(212,160,84,0.5)}

    /* Offline banner */
    .offline-banner{position:fixed;top:0;left:0;right:0;padding:5px;text-align:center;font-size:10px;font-weight:600;color:var(--danger);background:rgba(224,92,92,0.1);border-bottom:1px solid rgba(224,92,92,0.2);z-index:10001}

    /* Bottom tab bar */
    .tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:10000;backdrop-filter:blur(16px);background:rgba(8,9,13,0.96);border-top:1px solid var(--border);display:flex;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 0;background:none;border:none;color:var(--text-tertiary);font-size:9px;font-weight:500;cursor:pointer;transition:all .15s;opacity:0.4}
    .tab-btn.active{color:var(--accent);opacity:1}
    .tab-btn .tab-icon{font-size:18px;transition:transform .15s}
    .tab-btn.active .tab-icon{transform:scale(1.05)}

    /* Bottom sheet */
    .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:10000;animation:fadeInUp .2s ease}
    .sheet{position:fixed;bottom:0;left:0;right:0;max-height:85vh;overflow-y:auto;z-index:10001;background:var(--bg);border-top:1px solid var(--border);border-radius:16px 16px 0 0;padding:20px 20px 100px;animation:slideUp .3s ease}
    .sheet-handle{width:28px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin:0 auto 16px}

    /* Challenge card */
    .ch-card{padding:14px;margin-bottom:10px;border-radius:12px;background:var(--surface);border:1px solid var(--border);transition:border-color .15s}
    .ch-card.completed{border-color:rgba(75,190,138,0.25);background:rgba(75,190,138,0.04)}
    .ch-card.wrong-done{border-color:rgba(224,92,92,0.2);background:rgba(224,92,92,0.03)}
    .ch-card.locked{opacity:0.4;filter:blur(1px);pointer-events:none;position:relative}
    .ch-type{display:inline-block;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    .ch-type-photo{background:rgba(91,141,238,0.12);color:var(--foto)}
    .ch-type-video{background:rgba(224,92,92,0.12);color:var(--video)}
    .ch-type-creative{background:rgba(75,190,138,0.12);color:var(--creatief)}
    .ch-type-quiz{background:rgba(155,123,234,0.12);color:var(--quiz)}
    .difficulty{color:var(--text-tertiary);font-size:10px}.difficulty .star{color:var(--accent)}
    .points-badge{font-size:12px;font-weight:700;color:var(--accent)}

    /* Quiz */
    .quiz-option:disabled{pointer-events:none;cursor:not-allowed}
    .quiz-option{display:block;width:100%;padding:11px 14px;margin-bottom:6px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text-primary);font-size:13px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit}
    .quiz-option:hover{background:var(--surface-hover);border-color:rgba(155,123,234,0.25)}
    .quiz-option.correct{background:rgba(75,190,138,0.15);border-color:var(--success);color:var(--success)}
    .quiz-option.wrong{background:rgba(224,92,92,0.15);border-color:var(--danger);color:var(--danger)}

    /* Leaderboard */
    .lb-card{padding:14px;margin-bottom:8px;border-radius:12px;display:flex;align-items:center;gap:12px;transition:all .2s;position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--border)}
    .lb-rank{font-size:18px;font-weight:800;min-width:30px;text-align:center;letter-spacing:-0.5px}
    .lb-rank-1{color:var(--accent)}.lb-rank-2{color:#a0a0a0}.lb-rank-3{color:#9b7b5a}.lb-rank-other{color:var(--text-tertiary)}
    .lb-emoji{font-size:26px}
    .lb-info{flex:1}
    .lb-name{font-weight:600;font-size:14px;margin-bottom:2px;letter-spacing:-0.2px}
    .lb-stats{font-size:10px;color:var(--text-secondary)}
    .lb-score{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-0.5px}
    .lb-first{background:var(--accent-glow);border-color:rgba(212,160,84,0.15)}

    /* V11: Compact nearby challenges */
    .nearby-panel{position:absolute;bottom:72px;left:10px;right:10px;z-index:1000;display:flex;flex-direction:column;gap:3px}
    .nearby-card{padding:10px 12px;border-radius:10px;display:flex;align-items:center;gap:10px;cursor:pointer;backdrop-filter:blur(12px);background:rgba(8,9,13,0.88);border:1px solid var(--border);transition:background .15s}
    .nearby-card:active{background:var(--surface-hover)}
    .nearby-card:first-child{border-color:rgba(212,160,84,0.12);background:rgba(212,160,84,0.04)}
    .nearby-indicator{width:3px;height:28px;border-radius:2px;flex-shrink:0}
    .nearby-indicator.foto{background:var(--foto)}.nearby-indicator.quiz{background:var(--quiz)}.nearby-indicator.creatief{background:var(--creatief)}.nearby-indicator.video{background:var(--video)}
    .nearby-info{flex:1;min-width:0}
    .nearby-name{font-size:13px;font-weight:600;letter-spacing:-0.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .nearby-tags{display:flex;gap:4px;margin-top:2px}
    .nearby-tag{font-size:8px;font-weight:500;padding:1px 5px;border-radius:4px;letter-spacing:0.3px;text-transform:uppercase}
    .nearby-tag.t-foto{background:rgba(91,141,238,0.1);color:var(--foto)}.nearby-tag.t-quiz{background:rgba(155,123,234,0.1);color:var(--quiz)}.nearby-tag.t-creatief{background:rgba(75,190,138,0.1);color:var(--creatief)}.nearby-tag.t-video{background:rgba(224,92,92,0.1);color:var(--video)}
    .nearby-end{text-align:right;flex-shrink:0}
    .nearby-dist{font-size:12px;font-weight:600;color:var(--text-secondary);letter-spacing:-0.2px}
    .nearby-pts{font-size:9px;font-weight:500;color:var(--accent);letter-spacing:0.3px}
    .nearby-chevron{font-size:14px;color:var(--text-tertiary);flex-shrink:0;margin-left:2px}

    /* Secret mission */
    .secret-banner{margin:10px 0;padding:14px;border-radius:12px;background:linear-gradient(135deg,rgba(155,123,234,0.08),rgba(224,92,92,0.05));border:1px solid rgba(155,123,234,0.15);cursor:pointer}
    .secret-badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:600;background:rgba(155,123,234,0.2);color:var(--quiz);margin-bottom:8px}

    /* Bar break overlay */
    .barbreak-overlay{position:fixed;inset:0;z-index:10005;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);background:rgba(8,9,13,0.92)}
    .barbreak-card{max-width:360px;padding:28px;text-align:center;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(212,160,84,0.2)}

    /* Team setup */
    .emoji-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
    .emoji-btn{padding:10px;font-size:24px;border-radius:12px;background:rgba(255,255,255,0.06);border:2px solid transparent;cursor:pointer;transition:all .15s}
    .emoji-btn:hover{background:rgba(0,212,255,0.1)}
    .emoji-btn.selected{border-color:#00d4ff;background:rgba(0,212,255,0.15)}
    .emoji-btn.taken{opacity:0.25;cursor:not-allowed}
    .color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
    .color-btn{width:100%;aspect-ratio:1;border-radius:12px;border:3px solid transparent;cursor:pointer;transition:all .15s}
    .color-btn.selected{border-color:#fff;transform:scale(1.1)}

    /* Phase indicator */
    .phase-bar{display:flex;gap:4px;margin:8px 0}
    .phase-dot{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,0.06)}
    .phase-dot.active{background:var(--accent)}
    .phase-dot.done{background:var(--success)}

    /* Photo preview */
    .photo-preview{width:100%;max-height:150px;object-fit:cover;border-radius:10px;margin-top:10px}

    /* === V5 ADDITIONS === */

    /* Narrative modal */
    .story-overlay{position:fixed;inset:0;z-index:10010;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px);background:rgba(8,9,13,0.95);animation:fadeInUp .3s ease;padding:20px}
    .story-card{max-width:420px;width:100%;padding:28px;border-radius:16px;background:linear-gradient(135deg,rgba(155,123,234,0.08),rgba(91,141,238,0.05));border:1px solid rgba(155,123,234,0.2);text-align:center}
    .story-chapter{display:inline-block;padding:4px 12px;border-radius:20px;font-size:9px;font-weight:700;background:rgba(155,123,234,0.2);color:#c4b5fd;letter-spacing:1.5px;margin-bottom:16px}
    .story-title{font-size:20px;font-weight:800;margin-bottom:12px;background:linear-gradient(135deg,var(--foto),var(--quiz));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.3px}
    .story-text{font-size:13px;line-height:1.6;color:var(--text-secondary);margin-bottom:20px;text-align:left}

    /* Photo grid for activity feed */
    .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
    .photo-grid-item{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;cursor:pointer;background:rgba(255,255,255,0.04)}
    .photo-grid-item img,.photo-grid-item video{width:100%;height:100%;object-fit:cover}
    .photo-grid-overlay{position:absolute;bottom:0;left:0;right:0;padding:4px 6px;background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);font-size:9px;font-weight:700;color:#fff;display:flex;justify-content:space-between;align-items:end}
    .photo-lightbox{position:fixed;inset:0;z-index:10020;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    .photo-lightbox img,.photo-lightbox video{max-width:100%;max-height:70vh;border-radius:12px}
    .photo-lightbox-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.15);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer}

    /* Starter packs */
    .starter-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
    .starter-card{padding:14px;border-radius:12px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .15s;text-align:center}
    .starter-card:hover{background:var(--surface-hover);border-color:rgba(212,160,84,0.2)}
    .starter-card.taken{opacity:0.25;pointer-events:none}
    .starter-emoji{font-size:30px;margin-bottom:6px}
    .starter-name{font-size:12px;font-weight:600;color:var(--text-primary);letter-spacing:-0.1px}
    .starter-color{width:16px;height:3px;border-radius:2px;margin:6px auto 0}

    /* GPS status pill */
    .gps-pill{position:absolute;top:12px;left:12px;z-index:1000;padding:4px 10px;border-radius:12px;backdrop-filter:blur(8px);background:rgba(0,0,0,0.5);border:none;font-size:9px;font-weight:500;color:var(--text-secondary);display:flex;align-items:center;gap:5px;letter-spacing:0.3px}
    .gps-dot{width:4px;height:4px;border-radius:50%}
    .gps-dot.good{background:var(--creatief);animation:pulse 2s infinite}
    .gps-dot.weak{background:var(--accent)}
    .gps-dot.sleep{background:var(--text-tertiary)}
    .gps-pill .snap-btn{margin-left:4px;padding:2px 8px;border-radius:8px;background:rgba(91,141,238,0.15);border:1px solid rgba(91,141,238,0.3);color:var(--foto);font-size:8px;font-weight:600;cursor:pointer}

    /* Story progression ticker */
    .story-ticker{padding:10px 14px;margin:0 0 12px 0;border-radius:10px;background:linear-gradient(135deg,rgba(155,123,234,0.06),rgba(91,141,238,0.04));border-left:3px solid var(--quiz);font-size:12px;line-height:1.5;color:var(--text-secondary);font-style:italic}

    /* Activity row with photo */
    .activity-row{padding:12px;margin-bottom:8px;border-radius:10px;background:var(--surface);border:1px solid var(--border)}
    .activity-photo{width:100%;max-height:220px;object-fit:cover;border-radius:10px;margin-top:10px;cursor:pointer}

    /* === V6 ADDITIONS === */

    /* Photo gate (when too far) */
    .gate-blocked{margin-top:12px;padding:12px;border-radius:10px;background:rgba(224,92,92,0.06);border:1px solid rgba(224,92,92,0.15);display:flex;align-items:center;gap:10px}
    .gate-icon{font-size:20px}
    .gate-text{flex:1;font-size:12px;color:var(--danger);font-weight:600}
    .gate-distance{font-size:16px;font-weight:800;color:var(--danger);font-variant-numeric:tabular-nums}
    .gate-hint{font-size:10px;color:var(--text-secondary);font-weight:400;margin-top:2px}

    /* Admin review queue */
    .review-card{padding:14px;margin-bottom:10px;border-radius:12px;background:var(--surface);border:1px solid rgba(212,160,84,0.12)}
    .review-photo{width:100%;max-height:260px;object-fit:cover;border-radius:8px;margin:8px 0}
    .review-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:11px;color:var(--text-secondary)}
    .review-actions{display:flex;gap:6px;margin-top:10px}
    .review-actions .btn{flex:1;padding:10px;font-size:12px}
    .review-dist-good{color:var(--success);font-weight:700}
    .review-dist-warn{color:var(--accent);font-weight:700}
    .review-dist-bad{color:var(--danger);font-weight:700}
    .review-badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    .review-badge-pending{background:rgba(212,160,84,0.15);color:var(--accent)}
    .review-badge-approved{background:rgba(75,190,138,0.15);color:var(--success)}
    .review-badge-rejected{background:rgba(224,92,92,0.15);color:var(--danger)}

    /* Provisional score badge */
    .provisional-badge{display:inline-block;margin-left:6px;padding:2px 6px;border-radius:8px;font-size:9px;font-weight:700;background:rgba(255,215,0,0.2);color:#ffd700}

    /* === V7 ADDITIONS === */

    /* Quiz cooldown overlay */
    .quiz-cooldown{margin-top:10px;padding:14px;border-radius:12px;background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.3);text-align:center}
    .quiz-cooldown-title{font-size:13px;color:#ff4444;font-weight:700;margin-bottom:4px}
    .quiz-cooldown-timer{font-size:28px;font-weight:900;color:#ff4444;font-variant-numeric:tabular-nums;letter-spacing:2px}
    .quiz-cooldown-hint{font-size:11px;color:#888;margin-top:6px}

    /* Wrong-count badge on quiz card */
    .wrong-badge{display:inline-block;margin-left:6px;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:800;background:rgba(255,68,68,0.18);color:#ff7070}
    .quiz-option.cooldown{opacity:0.35;cursor:not-allowed;filter:grayscale(1)}

    /* === V9 ADDITIONS === */

    /* Tier badge on leaderboard cards */
    .tier-badge{display:inline-flex;align-items:center;gap:3px;margin-left:6px;padding:2px 6px;border-radius:8px;background:var(--surface);border:1px solid var(--border);font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
    .tier-badge .tier-emoji{font-size:12px}
    .tier-unlock-popup{position:fixed;top:30%;left:50%;transform:translateX(-50%);z-index:10004;padding:24px 32px;border-radius:16px;backdrop-filter:blur(16px);background:rgba(8,9,13,0.95);border:1px solid rgba(212,160,84,0.3);text-align:center;animation:fadeInUp .4s ease;box-shadow:0 8px 32px rgba(212,160,84,0.2)}
    .tier-unlock-emoji{font-size:56px;margin-bottom:12px;animation:float 2s ease-in-out infinite}
    .tier-unlock-title{font-size:12px;color:var(--accent);font-weight:700;letter-spacing:2px;margin-bottom:4px}
    .tier-unlock-name{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--video));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.3px}

    /* Next-reward mini banner on leaderboard */
    .reward-card{margin:8px 0 12px;padding:10px 12px;border-radius:10px;background:linear-gradient(135deg,rgba(91,141,238,0.05),rgba(155,123,234,0.04));border:1px solid rgba(91,141,238,0.12);display:flex;align-items:center;gap:10px}
    .reward-icon{font-size:20px}
    .reward-info{flex:1;min-width:0}
    .reward-label{font-size:9px;color:var(--text-tertiary);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
    .reward-target{font-size:12px;color:var(--text-primary);font-weight:600;letter-spacing:-0.1px}
    .reward-progress{width:100%;height:3px;background:rgba(255,255,255,0.04);border-radius:2px;margin-top:5px;overflow:hidden}
    .reward-progress-fill{height:100%;background:linear-gradient(90deg,var(--foto),var(--quiz));border-radius:2px;transition:width .4s ease}

    /* V10: emoji reactions bar */
    .reactions{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
    .reaction-btn{padding:2px 7px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text-secondary);font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;transition:all .15s;font-family:inherit}
    .reaction-btn:hover{background:var(--surface-hover);border-color:rgba(212,160,84,0.2)}

// UTILITY FUNCTIONS
// ═══════════════════════════════════════════
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000,p=Math.PI/180;
  const a=Math.sin((lat2-lat1)*p/2)**2+Math.cos(lat1*p)*Math.cos(lat2*p)*Math.sin((lon2-lon1)*p/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

function fmtDist(m){return m<1000?`${Math.round(m)}m`:`${(m/1000).toFixed(1)}km`}
function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`}
function fmtHM(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?`${h}u ${m}m`:`${m}m`}
function stars(df){return df==='easy'?'★':df==='medium'?'★★':'★★★'}

function getNearby(pos,completed,n=3,maxR=NEARBY_RADIUS){
  if(!pos)return[];
  let locs=L_DATA.filter(l=>!completed[l.id]).map(l=>({...l,dist:haversine(pos.lat,pos.lng,l.la,l.lo)}));
  locs.sort((a,b)=>a.dist-b.dist);
  let result=locs.filter(l=>l.dist<=maxR).slice(0,n);
  if(result.length<n)result=locs.filter(l=>l.dist<=maxR*2).slice(0,n);
  if(result.length<n)result=locs.slice(0,n);
  return result;
}

// ═══════════════════════════════════════════
// V5 FEATURE 5: GPS DRIFT MITIGATION
// ═══════════════════════════════════════════
function smoothPosition(samples){
  if(!samples||!samples.length)return null;
  // Weighted average — newer samples weigh more
  let sumLat=0,sumLng=0,sumW=0,sumAcc=0;
  samples.forEach((s,i)=>{
    const w=i+1; // newer = higher weight
    sumLat+=s.lat*w; sumLng+=s.lng*w; sumW+=w;
    sumAcc+=(s.acc||0);
  });
  return{lat:sumLat/sumW,lng:sumLng/sumW,acc:sumAcc/samples.length};
}

function snapToPOI(pos,maxDist=GPS_SNAP_RADIUS){
  if(!pos)return pos;
  let best=null,bestDist=Infinity;
  for(const loc of L_DATA){
    const d=haversine(pos.lat,pos.lng,loc.la,loc.lo);
    if(d<bestDist&&d<=maxDist){bestDist=d;best=loc}
  }
  return best?{lat:best.la,lng:best.lo,acc:pos.acc,snapped:best.n}:pos;
}

function pickQuiz(loc,seen){
  // Return an unseen quiz for this location, or a fallback from pool
  const locQuizzes=loc.ch.filter(c=>c.t==='quiz');
  const unseen=locQuizzes.filter((_,i)=>!seen.has(`${loc.id}_q_${i}`));
  if(unseen.length)return unseen[Math.floor(Math.random()*unseen.length)];
  // Use a Rotterdam pool filler, marked with type 'quiz'
  const unseenPool=ROTTERDAM_QUIZ_POOL.filter(q=>!seen.has(`pool_${q.ti}`));
  if(unseenPool.length){
    const q=unseenPool[Math.floor(Math.random()*unseenPool.length)];
    return{...q,t:'quiz',_pool:true};
  }
  return null;
}

// ═══════════════════════════════════════════
// V5 FEATURE 2: PHOTO COMPRESSION
// ═══════════════════════════════════════════
// Compress a dataURL to a small thumbnail for storage + live feed
function compressPhoto(dataURL,maxWidth=480,quality=0.55){
  return new Promise((resolve)=>{
    try{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const ratio=Math.min(1,maxWidth/img.width);
        canvas.width=Math.round(img.width*ratio);
        canvas.height=Math.round(img.height*ratio);
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror=()=>resolve(dataURL); // fallback
      img.src=dataURL;
    }catch(e){resolve(dataURL)}
  });
}

// Detect whether dataURL is a video (keep raw; don't try to compress)
function isVideoData(d){return typeof d==='string'&&d.startsWith('data:video')}

// ═══════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════
function App(){
  const[screen,setScreen]=useState('splash'); // splash, setup, lobby, game
  const[myTeam,setMyTeam]=useState(null);
  const[teams,setTeams]=useState([]);
  const[scores,setScores]=useState({});
  const[completed,setCompleted]=useState({}); // {locationId: {challengeIdx: true}}
  const[completedPts,setCompletedPts]=useState({}); // V10: {locationId: {challengeIdx: ptsAwarded}} — lets UI distinguish wrong (0) from correct
  const[visitedLocs,setVisitedLocs]=useState(new Set());
  const[pos,setPos]=useState(null);
  const[tab,setTab]=useState('leaderboard');
  const[selLoc,setSelLoc]=useState(null);
  const[toast,setToast]=useState(null);
  const[scorePopup,setScorePopup]=useState(null);
  const[ghost,setGhost]=useState({active:false,timeLeft:0,used:0});
  // V9: dynamic max charges (starts at GHOST_MAX_USES, grows via score milestones)
  const[ghostMax,setGhostMax]=useState(GHOST_MAX_USES);
  const[unlockedMilestones,setUnlockedMilestones]=useState(new Set());
  const[unlockPopup,setUnlockPopup]=useState(null); // {emoji, label, name}
  const[lastTier,setLastTier]=useState(null); // for tier-unlock popup
  const[gameStart,setGameStart]=useState(null);
  const[elapsed,setElapsed]=useState(0);
  const[phase,setPhase]=useState(0); // 0=waiting,1-4=phases
  const[barBreak,setBarBreak]=useState(null); // {name,time}
  const[jorikInTeam,setJorikInTeam]=useState(false);
  // V10: admin tracks which team currently has Jorik (by team id, null = between teams)
  const[jorikTeamId,setJorikTeamId]=useState(null);
  const[weddingDone,setWeddingDone]=useState(false);
  const[showWedding,setShowWedding]=useState(false);
  const[activityFeed,setActivityFeed]=useState([]);
  // V10: admin unlock via ?admin=true (legacy) OR ?admin=vriendvanjorik (hardened token)
  const[isAdmin]=useState(()=>{
    const v=new URLSearchParams(window.location.search).get('admin');
    return v==='true' || v==='vriendvanjorik';
  });
  // V5 FEATURE 1: narrative state
  const[storyShown,setStoryShown]=useState(null); // key of the currently-open story modal
  const[storySeen,setStorySeen]=useState(new Set()); // phases whose story has been shown
  const[nextStory,setNextStory]=useState(null); // V10: queue for sequential story modals
  // V5 FEATURE 3: seen quiz tracking
  const[seenQuizzes,setSeenQuizzes]=useState(new Set());
  // V5 FEATURE 5: GPS smoothing buffer
  const[gpsSamples,setGpsSamples]=useState([]);
  const[gpsStatus,setGpsStatus]=useState('weak'); // good / weak / sleep
  const[gpsSnap,setGpsSnap]=useState(null); // snapped-to POI name
  // V5 FEATURE 6: motion tracking
  const motionRef=useRef({lastMotion:Date.now(),still:false});
  // V5.1 HOTFIX: expose GPS controls so the status pill can force-wake on tap
  const gpsCtrlRef=useRef({start:null,stop:null});
  const[photoLightbox,setPhotoLightbox]=useState(null); // enlarged photo url
  const[feedFilter,setFeedFilter]=useState('all'); // 'all' | 'photos' | 'mine'
  // V6: admin review queue
  const[reviewQueue,setReviewQueue]=useState([]); // pending photo_reviews for admin
  const[pendingMine,setPendingMine]=useState(0); // count of my team's pending reviews

  // Timer
  useEffect(()=>{
    if(!gameStart)return;
    const i=setInterval(()=>setElapsed(Math.floor((Date.now()-gameStart)/1000)),1000);
    return()=>clearInterval(i);
  },[gameStart]);

  // V5 FEATURE 5 + 6: GPS with smoothing, snap-to-POI, battery-aware polling
  // V5.1 HOTFIX: skip sleep logic on iOS / no-motion; expose wake via ref for tap-to-wake pill
  useEffect(()=>{
    let watchId=null;
    let active=true;

    const onPos=(p)=>{
      const sample={lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy||999,ts:Date.now()};
      setGpsSamples(prev=>{
        const next=[...prev,sample].slice(-GPS_SMOOTH_SAMPLES);
        const smoothed=smoothPosition(next);
        if(smoothed){
          // Snap to POI if very close
          const snapped=snapToPOI(smoothed);
          if(snapped.snapped){
            setPos({lat:snapped.lat,lng:snapped.lng});
            setGpsSnap(snapped.snapped);
          }else{
            setPos({lat:smoothed.lat,lng:smoothed.lng});
            setGpsSnap(null);
          }
          // Update signal status
          const avgAcc=smoothed.acc;
          setGpsStatus(avgAcc<GPS_ACCURACY_GOOD?'good':avgAcc<GPS_ACCURACY_WEAK?'weak':'weak');
        }
        return next;
      });
    };

    const startWatch=()=>{
      if(watchId!=null||!active)return;
      watchId=navigator.geolocation.watchPosition(onPos,()=>{},
        {enableHighAccuracy:true,maximumAge:3000,timeout:10000});
      motionRef.current.still=false;
      motionRef.current.lastMotion=Date.now();
      // Reset visual state immediately so the pill returns to 'weak' until first fix
      setGpsStatus('weak');
    };
    const stopWatch=()=>{
      if(watchId!=null){navigator.geolocation.clearWatch(watchId);watchId=null}
    };

    // Expose controls so the status pill can force-wake on tap
    gpsCtrlRef.current={start:startWatch,stop:stopWatch};

    startWatch();

    // Motion-based sleep only runs where DeviceMotion fires without a permission prompt
    let motionCheck=null,onMotion=null;
    if(MOTION_AVAILABLE){
      motionCheck=setInterval(()=>{
        if(!active)return;
        const stillFor=Date.now()-motionRef.current.lastMotion;
        if(stillFor>STILL_TIMEOUT_MS&&watchId!=null){
          stopWatch();
          motionRef.current.still=true;
          setGpsStatus('sleep');
        }
      },10000);

      onMotion=(ev)=>{
        const a=ev.accelerationIncludingGravity||ev.acceleration;
        if(!a)return;
        const mag=Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2);
        if(Math.abs(mag-9.8)>MOTION_THRESHOLD){
          motionRef.current.lastMotion=Date.now();
          if(motionRef.current.still){
            motionRef.current.still=false;
            startWatch();
          }
        }
      };
      try{window.addEventListener('devicemotion',onMotion,{passive:true})}catch(e){}
    }
    // On iOS or browsers without motion: GPS stays always-on (same as V4)

    return()=>{
      active=false;
      stopWatch();
      if(motionCheck)clearInterval(motionCheck);
      if(onMotion){try{window.removeEventListener('devicemotion',onMotion)}catch(e){}}
      gpsCtrlRef.current={start:null,stop:null};
    };
  },[]);

  // V5.1 HOTFIX: force-wake callback for the GPS pill tap
  const wakeGps=useCallback(()=>{
    motionRef.current.lastMotion=Date.now();
    motionRef.current.still=false;
    // Stop first then start — ensures a fresh watchPosition even if stale
    gpsCtrlRef.current.stop&&gpsCtrlRef.current.stop();
    gpsCtrlRef.current.start&&gpsCtrlRef.current.start();
    setToast('📡 GPS wakker geschud');
  },[]);

  // Ghost timer
  useEffect(()=>{
    if(ghost.timeLeft<=0){if(ghost.active)setGhost(g=>({...g,active:false}));return;}
    const t=setTimeout(()=>setGhost(g=>({...g,timeLeft:g.timeLeft-1})),1000);
    return()=>clearTimeout(t);
  },[ghost.timeLeft,ghost.active]);

  // Toast auto-dismiss
  useEffect(()=>{if(toast){const t=setTimeout(()=>setToast(null),4000);return()=>clearTimeout(t)}},[toast]);
  useEffect(()=>{if(scorePopup){const t=setTimeout(()=>setScorePopup(null),1200);return()=>clearTimeout(t)}},[scorePopup]);

  // Supabase real-time subscriptions
  useEffect(()=>{
    if(OFFLINE||!sb)return;
    const teamSub=sb.channel('teams').on('postgres_changes',{event:'UPDATE',schema:'public',table:'teams'},payload=>{
      const t=payload.new;
      setTeams(prev=>prev.map(p=>p.id===t.id?{...p,...t}:p));
      if(t.id!==myTeam?.id){
        setToast(`${t.emoji} ${t.name}: ${t.score} pts`);
      }
    }).subscribe();
    const actSub=sb.channel('activity').on('postgres_changes',{event:'INSERT',schema:'public',table:'activity_feed'},payload=>{
      setActivityFeed(prev=>[payload.new,...prev].slice(0,50));
      // V10: parse Jorik system broadcasts
      const msg=payload.new.message||'';
      const m=msg.match(/^\[JORIK\] team=(\d+|null)/);
      if(m){setJorikTeamId(m[1]==='null'?null:parseInt(m[1],10))}
    }).subscribe();

    // V6: subscribe to photo_reviews — for admin queue + per-team rejection notices
    const reviewInsertSub=sb.channel('reviews_insert').on('postgres_changes',{event:'INSERT',schema:'public',table:'photo_reviews'},payload=>{
      const r=payload.new;
      if(isAdmin&&r.status==='pending'){
        setReviewQueue(prev=>[r,...prev]);
      }
      if(r.team_id===myTeam?.id&&r.status==='pending'){
        setPendingMine(c=>c+1);
      }
    }).subscribe();
    const reviewUpdateSub=sb.channel('reviews_update').on('postgres_changes',{event:'UPDATE',schema:'public',table:'photo_reviews'},payload=>{
      const r=payload.new;
      // Remove from admin queue once decided
      if(isAdmin)setReviewQueue(prev=>prev.filter(x=>x.id!==r.id));
      // Notify the affected team
      if(r.team_id===myTeam?.id){
        setPendingMine(c=>Math.max(0,c-1));
        if(r.status==='rejected'){
          setToast(`❌ Foto "${r.challenge_title}" afgekeurd · -${r.points_awarded} pts`);
          setScores(prev=>({...prev,[myTeam.id]:Math.max(0,(prev[myTeam.id]||0)-r.points_awarded)}));
        }else if(r.status==='approved'){
          setToast(`✅ Foto "${r.challenge_title}" goedgekeurd!`);
        }
      }
    }).subscribe();

    // Initial fetch for admin: pending reviews already in the table
    if(isAdmin){
      sb.from('photo_reviews').select('*').eq('status','pending').order('created_at',{ascending:false}).then(res=>{
        if(res.data)setReviewQueue(res.data);
      },()=>{/* table missing — silent */});
    }
    return()=>{
      teamSub.unsubscribe();actSub.unsubscribe();
      reviewInsertSub.unsubscribe();reviewUpdateSub.unsubscribe();
    };
  },[myTeam,isAdmin]);

  // V6: admin actions
  const approveReview=(r)=>{
    if(!sb)return;
    sb.from('photo_reviews').update({status:'approved',reviewed_at:new Date().toISOString()}).eq('id',r.id);
    setReviewQueue(prev=>prev.filter(x=>x.id!==r.id));
  };
  const rejectReview=(r)=>{
    if(!sb)return;
    sb.from('photo_reviews').update({status:'rejected',reviewed_at:new Date().toISOString()}).eq('id',r.id);
    // Also deduct points from the team in Supabase
    if(REVIEW_REJECT_PENALTY){
      sb.from('teams').select('score').eq('id',r.team_id).single().then(res=>{
        const newScore=Math.max(0,(res.data?.score||0)-r.points_awarded);
        sb.from('teams').update({score:newScore}).eq('id',r.team_id);
      });
    }
    setReviewQueue(prev=>prev.filter(x=>x.id!==r.id));
  };

  const addActivity=(msg,pts=0,photoData=null)=>{
    const entry={
      team_id:myTeam?.id,message:msg,points:pts,
      created_at:new Date().toISOString(),
      team_emoji:myTeam?.emoji,team_name:myTeam?.name,
      team_color:myTeam?.color,
      photo:photoData||null,
    };
    setActivityFeed(prev=>[entry,...prev].slice(0,50));
    // Only send to Supabase if the payload is manageable. Drop raw video blobs
    // (>500KB) to respect row limits; compressed photo thumbnails are fine.
    if(!OFFLINE&&sb){
      const shareable={...entry};
      if(shareable.photo&&shareable.photo.length>600000){delete shareable.photo}
      sb.from('activity_feed').insert(shareable);
    }
  };

  const completeChallenge=(locId,chIdx,pts,photoData=null)=>{
    // chIdx === -99 is the V5 dynamic bonus quiz — award points + log, skip challenge bookkeeping
    const isDynamicBonus=chIdx===-99;
    const key=`${locId}_${chIdx}`;
    if(!isDynamicBonus&&completed[locId]?.[chIdx])return;

    // V7: wrong-quiz → pts=0 path. Mark challenge done, no score change, no first-to-complete bonus.
    const isWrongZero=pts===0;

    let totalPts=pts;
    if(!isDynamicBonus&&!isWrongZero)totalPts+=FIRST_BONUS; // first-to-complete bonus skipped when wrong

    if(!isDynamicBonus){
      setCompleted(prev=>({...prev,[locId]:{...prev[locId],[chIdx]:true}}));
      // V10: remember awarded pts so the card can show wrong-vs-correct
      setCompletedPts(prev=>({...prev,[locId]:{...prev[locId],[chIdx]:totalPts}}));
    }
    if(locId>0)setVisitedLocs(prev=>new Set([...prev,locId]));
    if(totalPts>0){
      setScores(prev=>({...prev,[myTeam?.id]:(prev[myTeam?.id]||0)+totalPts}));
      setScorePopup(`+${totalPts}`);
    }
    const loc=L_DATA.find(l=>l.id===locId);
    if(loc){
      if(isWrongZero){
        setToast(`${loc.e} ❌ Fout · 0 pts`);
      }else{
        setToast(`${loc.e} +${totalPts} pts!`);
      }
    }

    if(loc){
      let label;
      if(isWrongZero){
        label=`zat ernaast bij "${loc.ch[chIdx]?.ti}" (${loc.n}) · 0 pts`;
      }else if(isDynamicBonus){
        label=`🎲 Bonus quiz bij ${loc.n} gehaald!`;
      }else{
        label=`${loc.ch[chIdx]?.ti} bij ${loc.n} voltooid!`;
      }
      addActivity(label,isWrongZero?0:totalPts,photoData);
    }

    // V5: Mark this quiz as seen so the same one doesn't appear again
    // (applies whether they got it right or wrong — they've now seen it)
    if(!isDynamicBonus&&loc&&loc.ch[chIdx]?.t==='quiz'){
      setSeenQuizzes(prev=>new Set([...prev,`${locId}_q_${chIdx}`]));
    }

    // Update Supabase
    if(!OFFLINE&&sb&&myTeam&&loc&&!isDynamicBonus){
      sb.from('completed_challenges').insert({team_id:myTeam.id,challenge_id:key,location_id:locId,challenge_type:loc.ch[chIdx]?.t,points_earned:totalPts});
      if(totalPts>0){
        sb.from('teams').update({score:(scores[myTeam.id]||0)+totalPts}).eq('id',myTeam.id);
      }
    }else if(!OFFLINE&&sb&&myTeam&&isDynamicBonus&&totalPts>0){
      // Still persist the team score update, but don't create a completed_challenges row
      sb.from('teams').update({score:(scores[myTeam.id]||0)+totalPts}).eq('id',myTeam.id);
    }
  };

  const activateGhost=()=>{
    if(ghost.used>=ghostMax)return;
    setGhost({active:true,timeLeft:GHOST_DURATION,used:ghost.used+1});
    addActivity('is als een geest verdwenen! 👻');
  };

  // V10: derive jorikInTeam from jorikTeamId (real cross-team sync via Supabase broadcast)
  useEffect(()=>{
    setJorikInTeam(myTeam?.id!=null && jorikTeamId===myTeam.id);
  },[myTeam,jorikTeamId]);

  // V10: admin moves Jorik to a specific team (or nowhere)
  const moveJorik=useCallback((targetTeamId)=>{
    if(!isAdmin)return;
    setJorikTeamId(targetTeamId);
    if(!OFFLINE&&sb){
      const team=teams.find(t=>t.id===targetTeamId);
      sb.from('activity_feed').insert({
        team_id:null, team_name:'Game Master', team_emoji:'👑', team_color:'#d4a054',
        message:`[JORIK] team=${targetTeamId==null?'null':targetTeamId}`,
        points:0, created_at:new Date().toISOString(),
      });
      // Plus a human-readable announcement
      if(team){
        sb.from('activity_feed').insert({
          team_id:null, team_name:'Game Master', team_emoji:'👑', team_color:'#d4a054',
          message:`Jorik gaat mee met ${team.emoji} ${team.name}!`,
          points:0, created_at:new Date().toISOString(),
        });
      }else{
        sb.from('activity_feed').insert({
          team_id:null, team_name:'Game Master', team_emoji:'👑', team_color:'#d4a054',
          message:'Jorik loopt nu alleen tussen de teams door...',
          points:0, created_at:new Date().toISOString(),
        });
      }
    }
  },[isAdmin,teams]);

  // V10: bar-break trigger — admin signals a break at specific bar name
  const[barBreakActive,setBarBreakActive]=useState(null); // {name, mini}
  const triggerBarBreak=useCallback((barName)=>{
    if(!isAdmin)return;
    const minis=[
      {emoji:'🍺',title:'Proost!',desc:'Groepsfoto met een biertje op tafel',pts:25},
      {emoji:'🥃',title:'Shot roulette',desc:'Willekeurig teamlid neemt een shot (of iets soft). Film het!',pts:35},
      {emoji:'🎤',title:'Bar karaoke',desc:'Eén teamlid zingt 1 minuut lang Nederlandstalige hit. Pub mag meedoen.',pts:40},
    ];
    setBarBreakActive({name:barName,mini:minis,started:Date.now()});
    setBarBreak({name:barName,time:Date.now()});
    if(!OFFLINE&&sb){
      sb.from('activity_feed').insert({
        team_id:null, team_name:'Game Master', team_emoji:'🍻', team_color:'#d4a054',
        message:`🍺 BAR BREAK → ${barName}! Alle teams naar deze locatie.`,
        points:0, created_at:new Date().toISOString(),
      });
    }
  },[isAdmin]);

  // V10: finale — admin advances phase to 5 = ceremony
  const startFinale=useCallback(()=>{
    if(!isAdmin)return;
    setPhase(5);
    if(!OFFLINE&&sb){
      sb.from('activity_feed').insert({
        team_id:null, team_name:'Game Master', team_emoji:'🏆', team_color:'#d4a054',
        message:'🏆 EINDE VAN HET SPEL — naar Markthal/Bokaal voor de uitslag!',
        points:0, created_at:new Date().toISOString(),
      });
    }
  },[isAdmin]);

  // V9: Unlock bonus Ghost charges at score milestones
  useEffect(()=>{
    const myScoreNow=scores[myTeam?.id]||0;
    GHOST_BONUS_THRESHOLDS.forEach(t=>{
      const key='ghost_'+t.score;
      if(myScoreNow>=t.score && !unlockedMilestones.has(key)){
        setGhostMax(prev=>prev+t.charges);
        setUnlockedMilestones(prev=>new Set([...prev,key]));
        setUnlockPopup({
          emoji:'👻',
          label:'GHOST UNLOCK · '+t.score+' PTS',
          name:'+'+t.charges+' lading'+(t.charges>1?'en':''),
        });
        addActivity(`heeft ${t.charges} extra Ghost lading${t.charges>1?'en':''} ontgrendeld op ${t.score} pts!`,0);
      }
    });
  },[scores,myTeam]);

  // V9: Tier badges based on completed challenges (5/10/15/20)
  useEffect(()=>{
    if(!myTeam)return;
    const totalChallenges=Object.values(completed).reduce((s,o)=>s+Object.keys(o).length,0);
    const tier=tierFor(totalChallenges);
    if(tier && (!lastTier || lastTier.min!==tier.min)){
      setLastTier(tier);
      // Only popup if this is a NEW tier (not the initial render)
      if(lastTier!==null){
        setUnlockPopup({
          emoji:tier.badge,
          label:'NIEUWE TIER',
          name:tier.name+' · '+tier.min+' challenges',
        });
        addActivity(`is gepromoveerd naar ${tier.badge} ${tier.name}!`,0);
      }
    }
  },[completed,myTeam]);

  // V9: auto-dismiss unlock popup after 3.5s
  useEffect(()=>{
    if(unlockPopup){
      const t=setTimeout(()=>setUnlockPopup(null),3500);
      return()=>clearTimeout(t);
    }
  },[unlockPopup]);


  const startGame=()=>{
    setGameStart(Date.now());
    setPhase(1);
    setScreen('game');
    addActivity('Het spel is begonnen! 🎮');
    // V5: show intro story on first game start
    if(!storySeen.has('intro')){
      setStoryShown('intro');
      setStorySeen(prev=>new Set([...prev,'intro']));
    }
  };

  // V10: queue phase stories (don't overwrite intro)
  useEffect(()=>{
    if(phase<1||phase>4)return;
    const key='phase'+phase;
    if(storySeen.has(key))return;
    setNextStory(key);
  },[phase]);

  // V10: dispatcher — show queued story once current is closed
  useEffect(()=>{
    if(!nextStory)return;
    if(storyShown!==null)return; // wait for current to close
    if(storySeen.has(nextStory)){setNextStory(null);return;}
    const t=setTimeout(()=>{
      setStoryShown(nextStory);
      setStorySeen(prev=>new Set([...prev,nextStory]));
      setNextStory(null);
    },600);
    return()=>clearTimeout(t);
  },[nextStory,storyShown,storySeen]);

  // Completion counts
  const myScore=scores[myTeam?.id]||0;
  const myChallenges=Object.values(completed).reduce((sum,loc)=>sum+Object.keys(loc).length,0);

  // ═══════════ SPLASH ═══════════
  if(screen==='splash'){
    return(
      <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,background:'radial-gradient(circle at 30% 40%,rgba(212,160,84,0.08),transparent 50%),radial-gradient(circle at 70% 60%,rgba(155,123,234,0.06),transparent 50%),var(--bg)'}}>
        <div style={{fontSize:56,marginBottom:16,animation:'float 3s ease-in-out infinite'}}>🏙️</div>
        <h1 style={{fontSize:28,fontWeight:800,background:'linear-gradient(135deg,var(--accent),var(--foto))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:6,letterSpacing:'-0.5px'}}>STADSSPEL</h1>
        <h2 style={{fontSize:18,fontWeight:300,color:'var(--text-secondary)',marginBottom:4,letterSpacing:'3px'}}>ROTTERDAM</h2>
        <div style={{fontSize:12,color:'var(--text-tertiary)',marginBottom:6}}>Jorik's Bachelor Party · 6 Juni 2026</div>
        <div style={{fontSize:9,color:'var(--quiz)',letterSpacing:2,marginBottom:40,fontWeight:700}}>V11 · DE VERLOREN RING</div>
        <button className="btn btn-gold" onClick={()=>setScreen('setup')} style={{padding:'14px 48px',fontSize:15,borderRadius:12}}>
          START
        </button>
        <div style={{marginTop:40,fontSize:11,color:'var(--text-tertiary)'}}>102 locaties · 4 teams · 1 winnend team</div>
      </div>
    );
  }

  // ═══════════ TEAM SETUP ═══════════
  if(screen==='setup'){
    return <TeamSetup teams={teams} setTeams={setTeams} onJoin={(team)=>{setMyTeam(team);setScreen('lobby')}} isAdmin={isAdmin}/>;
  }

  // ═══════════ LOBBY ═══════════
  if(screen==='lobby'){
    return(
      <div style={{height:'100%',display:'flex',flexDirection:'column',padding:24,paddingTop:48}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:14,color:'var(--foto)',fontWeight:600,marginBottom:4}}>LOBBY</div>
          <h1 style={{fontSize:24,fontWeight:800}}>Wachten op Game Master...</h1>
          <p style={{fontSize:13,color:'var(--text-tertiary)',marginTop:8}}>Startlocatie: Maritiem Museum, Leuvehaven</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:32}}>
          {teams.map((t,i)=>(
            <div key={i} className="glass animate-in" style={{padding:20,textAlign:'center',animationDelay:`${i*0.1}s`,borderLeft:`3px solid ${t.color}`}}>
              <div style={{fontSize:36,marginBottom:8}}>{t.emoji}</div>
              <div style={{fontWeight:700,fontSize:14}}>{t.name}</div>
              {t.id===myTeam?.id&&<div style={{fontSize:10,color:'var(--foto)',marginTop:4}}>Jouw team</div>}
            </div>
          ))}
        </div>
        {isAdmin&&<button className="btn btn-gold" onClick={startGame} style={{padding:16,fontSize:16}}>🎮 START HET SPEL</button>}
        {!isAdmin&&<div style={{textAlign:'center',fontSize:13,color:'var(--text-tertiary)'}}>De game master start het spel...</div>}
        {OFFLINE&&<div style={{textAlign:'center',marginTop:12}}><button className="btn btn-ghost" onClick={startGame} style={{fontSize:12}}>Demo: start zelf</button></div>}
      </div>
    );
  }

  // ═══════════ MAIN GAME ═══════════
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      {OFFLINE&&<div className="offline-banner">⚡ Offline Mode — Multiplayer uitgeschakeld</div>}
      {toast&&<div className="toast"><div className="toast-inner">{toast}</div></div>}
      {scorePopup&&<div className="score-popup">{scorePopup}</div>}
      {/* V9: unlock popup */}
      {unlockPopup&&(
        <div className="tier-unlock-popup">
          <div className="tier-unlock-emoji">{unlockPopup.emoji}</div>
          <div className="tier-unlock-title">{unlockPopup.label}</div>
          <div className="tier-unlock-name">{unlockPopup.name}</div>
        </div>
      )}

      {/* V11: Premium HUD */}
      <div style={{padding:'10px 16px',paddingTop:OFFLINE?26:10,background:'rgba(8,9,13,0.96)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',zIndex:100,backdropFilter:'blur(16px)'}}>
        <div>
          <div style={{fontSize:13,fontWeight:600,letterSpacing:'-0.2px'}}>{myTeam?.emoji} {myTeam?.name}</div>
          <div style={{fontSize:10,color:'var(--text-tertiary)'}}>Fase {phase}/4 · {fmtHM(elapsed)}</div>
        </div>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:20,fontWeight:800,color:'var(--accent)',letterSpacing:'-0.5px'}}>{myScore}</div>
          <div style={{fontSize:9,color:'var(--text-tertiary)'}}>{myChallenges} challenges</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:10,color:'var(--text-tertiary)'}}>{visitedLocs.size}/102</div>
          {ghost.active&&<div style={{fontSize:10,color:'var(--quiz)'}}>👻 {fmtTime(ghost.timeLeft)}</div>}
        </div>
      </div>

      {/* Phase progress */}
      <div className="phase-bar" style={{padding:'0 16px'}}>
        {[1,2,3,4].map(p=><div key={p} className={`phase-dot ${phase>p?'done':phase===p?'active':''}`}/>)}
      </div>

      {/* Tab content */}
      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {tab==='leaderboard'&&<LeaderboardView teams={teams} scores={scores} myTeam={myTeam} phase={phase} elapsed={elapsed} barBreak={barBreak} jorikInTeam={jorikInTeam} weddingDone={weddingDone} onShowWedding={()=>setShowWedding(true)} onShowStory={(k)=>setStoryShown(k)} pendingMine={pendingMine} completed={completed} ghostMax={ghostMax}/>}
        {tab==='map'&&<MapView pos={pos} completed={completed} visitedLocs={visitedLocs} onSelect={setSelLoc} ghost={ghost} onGhost={activateGhost} ghostMax={ghostMax} phase={phase} gpsStatus={gpsStatus} gpsSnap={gpsSnap} onWakeGps={wakeGps}/>}
        {tab==='activity'&&<ActivityView feed={activityFeed} myTeamId={myTeam?.id} onPhoto={setPhotoLightbox} filter={feedFilter} setFilter={setFeedFilter}/>}
        {tab==='review'&&isAdmin&&<AdminReviewView queue={reviewQueue} onApprove={approveReview} onReject={rejectReview} onPhoto={setPhotoLightbox} teams={teams} jorikTeamId={jorikTeamId} onMoveJorik={moveJorik} onTriggerBarBreak={triggerBarBreak} onStartFinale={startFinale} phase={phase}/>}
      </div>

      {/* V5: Narrative story modal */}
      {storyShown&&NARRATIVE[storyShown]&&(
        <StoryModal story={NARRATIVE[storyShown]} onClose={()=>setStoryShown(null)}/>
      )}

      {/* V5: Photo lightbox */}
      {photoLightbox&&<PhotoLightbox media={photoLightbox} onClose={()=>setPhotoLightbox(null)}/>}

      {/* V10: Bar-break overlay */}
      {barBreakActive&&<BarBreakOverlay info={barBreakActive} onClose={()=>setBarBreakActive(null)} onComplete={(mini,pts)=>{
        setScores(prev=>({...prev,[myTeam?.id]:(prev[myTeam?.id]||0)+pts}));
        setScorePopup(`+${pts}`);
        addActivity(`haalde "${mini.title}" bij ${barBreakActive.name} · +${pts} pts`,pts);
        if(!OFFLINE&&sb&&myTeam){
          sb.from('teams').update({score:(scores[myTeam.id]||0)+pts}).eq('id',myTeam.id);
        }
      }}/>}

      {/* V10: Finale ceremony (phase 5) */}
      {phase===5&&<FinaleScreen teams={teams} scores={scores} myTeam={myTeam} elapsed={elapsed} activityFeed={activityFeed} jorikTeamId={jorikTeamId}/>}

      {/* Bottom sheet for challenges */}
      {selLoc!=null&&<ChallengeSheet loc={L_DATA.find(l=>l.id===selLoc)} pos={pos} completed={completed[selLoc]||{}} completedPts={completedPts[selLoc]||{}} onComplete={completeChallenge} onClose={()=>setSelLoc(null)} jorikInTeam={jorikInTeam} seenQuizzes={seenQuizzes} isAdmin={isAdmin} myTeam={myTeam}/>}

      {/* Wedding video modal */}
      {showWedding&&<WeddingMission onClose={()=>setShowWedding(false)} onComplete={()=>{setWeddingDone(true);setShowWedding(false);completeChallenge(-1,0,WEDDING_VIDEO_BONUS);addActivity('Geheime bruiloftsvideo opgenomen! 🎬',WEDDING_VIDEO_BONUS)}} done={weddingDone}/>}

      {/* Tab bar */}
      <div className="tab-bar">
        {[
          {id:'leaderboard',icon:'🏆',label:'Ranking'},
          {id:'map',icon:'🗺️',label:'Kaart'},
          {id:'activity',icon:'📢',label:'Feed'},
          ...(isAdmin?[{id:'review',icon:'✅',label:'Beoordeel',badge:reviewQueue.length}]:[]),
        ].map(t=>(
          <button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)} style={{position:'relative'}}>
            <span className="tab-icon">{t.icon}</span>{t.label}
            {t.badge>0&&<span style={{position:'absolute',top:2,right:'25%',background:'#ff4444',color:'#fff',fontSize:9,fontWeight:800,padding:'2px 5px',borderRadius:9,minWidth:14,textAlign:'center'}}>{t.badge}</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// TEAM SETUP — V5: starter packs + custom
// ═══════════════════════════════════════════
function TeamSetup({teams,setTeams,onJoin,isAdmin}){
  const[mode,setMode]=useState('quick'); // 'quick' | 'custom'
  const[name,setName]=useState('');
  const[emoji,setEmoji]=useState('');
  const[color,setColor]=useState('');
  const usedEmojis=teams.map(t=>t.emoji);
  const usedNames=teams.map(t=>t.name.toLowerCase());

  const createFromPack=(pack)=>{
    if(usedEmojis.includes(pack.emoji)||usedNames.includes(pack.name.toLowerCase()))return;
    const team={id:Date.now(),name:pack.name,emoji:pack.emoji,color:pack.color,score:0};
    setTeams(prev=>[...prev,team]);
    if(!OFFLINE&&sb)sb.from('teams').insert({name:pack.name,emoji:pack.emoji,color:pack.color});
    onJoin(team);
  };

  const createCustom=()=>{
    if(!name||!emoji||!color)return;
    const team={id:Date.now(),name,emoji,color,score:0};
    setTeams(prev=>[...prev,team]);
    if(!OFFLINE&&sb)sb.from('teams').insert({name,emoji,color});
    onJoin(team);
  };

  return(
    <div style={{height:'100%',overflow:'auto',padding:24,paddingTop:48,paddingBottom:40}}>
      <div style={{textAlign:'center',marginBottom:24}}>
        <div style={{fontSize:48,marginBottom:12}}>🎮</div>
        <h1 style={{fontSize:24,fontWeight:800}}>Kies je team</h1>
        <p style={{fontSize:13,color:'var(--text-tertiary)',marginTop:8}}>Tik op een starter pack of maak eigen team</p>
      </div>

      {/* Mode toggle */}
      <div style={{display:'flex',gap:8,marginBottom:16,padding:4,background:'rgba(255,255,255,0.05)',borderRadius:12}}>
        <button onClick={()=>setMode('quick')} style={{flex:1,padding:10,borderRadius:10,border:'none',background:mode==='quick'?'rgba(0,212,255,0.2)':'transparent',color:mode==='quick'?'#00d4ff':'#888',fontWeight:700,fontSize:13,cursor:'pointer'}}>⚡ Snel</button>
        <button onClick={()=>setMode('custom')} style={{flex:1,padding:10,borderRadius:10,border:'none',background:mode==='custom'?'rgba(0,212,255,0.2)':'transparent',color:mode==='custom'?'#00d4ff':'#888',fontWeight:700,fontSize:13,cursor:'pointer'}}>✏️ Eigen</button>
      </div>

      {mode==='quick'&&(
        <div>
          <div style={{fontSize:11,color:'var(--text-secondary)',fontWeight:600,marginBottom:8,letterSpacing:1}}>STARTER PACKS</div>
          <div className="starter-grid">
            {STARTER_PACKS.map((p,i)=>{
              const taken=usedEmojis.includes(p.emoji)||usedNames.includes(p.name.toLowerCase());
              return(
                <button key={i} className={`starter-card animate-in animate-in-${(i%4)+1} ${taken?'taken':''}`}
                  onClick={()=>createFromPack(p)} disabled={taken}
                  style={{border:`2px solid ${taken?'transparent':'rgba(255,255,255,0.08)'}`}}>
                  <div className="starter-emoji">{p.emoji}</div>
                  <div className="starter-name">{p.name}</div>
                  <div className="starter-color" style={{background:p.color}}/>
                  {taken&&<div style={{fontSize:9,color:'var(--text-tertiary)',marginTop:4}}>bezet</div>}
                </button>
              );
            })}
          </div>
          <div style={{textAlign:'center',marginTop:8,fontSize:11,color:'var(--text-tertiary)'}}>of ga naar <a onClick={()=>setMode('custom')} style={{color:'var(--foto)',cursor:'pointer',textDecoration:'underline'}}>eigen team</a></div>
        </div>
      )}

      {mode==='custom'&&(
        <>
          <div className="glass" style={{padding:16,marginBottom:12}}>
            <label style={{fontSize:12,color:'var(--text-secondary)',fontWeight:600,display:'block',marginBottom:8}}>TEAMNAAM</label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Bijv. De Maffiosi"
              style={{width:'100%',padding:12,borderRadius:10,border:'1px solid rgba(255,255,255,0.15)',background:'rgba(255,255,255,0.05)',color:'#fff',fontSize:16,outline:'none'}}/>
          </div>

          <div className="glass" style={{padding:16,marginBottom:12}}>
            <label style={{fontSize:12,color:'var(--text-secondary)',fontWeight:600,display:'block',marginBottom:8}}>TEAM ICOON</label>
            <div className="emoji-grid">
              {TEAM_EMOJIS.map(e=>(
                <button key={e} className={`emoji-btn ${emoji===e?'selected':''} ${usedEmojis.includes(e)&&emoji!==e?'taken':''}`}
                  onClick={()=>!usedEmojis.includes(e)&&setEmoji(e)} disabled={usedEmojis.includes(e)&&emoji!==e}>{e}</button>
              ))}
            </div>
          </div>

          <div className="glass" style={{padding:16,marginBottom:16}}>
            <label style={{fontSize:12,color:'var(--text-secondary)',fontWeight:600,display:'block',marginBottom:8}}>TEAM KLEUR</label>
            <div className="color-grid">
              {TEAM_COLORS.map(c=>(
                <button key={c.hex} className={`color-btn ${color===c.hex?'selected':''}`}
                  style={{background:c.hex}} onClick={()=>setColor(c.hex)}/>
              ))}
            </div>
          </div>

          <button className="btn btn-cyan" onClick={createCustom} disabled={!name||!emoji||!color}
            style={{width:'100%',padding:16,fontSize:16,borderRadius:14}}>
            Team Aanmaken & Joinen
          </button>
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════
// LEADERBOARD VIEW (Primary tab)
// ═══════════════════════════════════════════
function LeaderboardView({teams,scores,myTeam,phase,elapsed,barBreak,jorikInTeam,weddingDone,onShowWedding,onShowStory,pendingMine,completed,ghostMax}){
  const sorted=[...teams].map(t=>({...t,score:scores[t.id]||0})).sort((a,b)=>b.score-a.score);
  // V9: own progress info — challenges done by my team (rough proxy for tier; we only have local 'completed' state)
  const myChallengesDone=completed?Object.values(completed).reduce((s,o)=>s+Object.keys(o).length,0):0;
  const myTier=tierFor(myChallengesDone);
  const myNextTier=nextTier(myChallengesDone);
  const myScore=scores[myTeam?.id]||0;
  // Next ghost-charge milestone we haven't passed yet
  const nextGhost=GHOST_BONUS_THRESHOLDS.find(t=>myScore<t.score);
  // V5: map current phase to the relevant narrative entry
  const phaseKey=phase>=1&&phase<=4?`phase${phase}`:null;
  const phaseStory=phaseKey?NARRATIVE[phaseKey]:null;

  return(
    <div style={{height:'100%',overflowY:'auto',padding:16,paddingBottom:90}}>
      {/* V5: narrative ticker */}
      {phaseStory&&(
        <div className="story-ticker" onClick={()=>onShowStory&&onShowStory(phaseKey)} style={{cursor:'pointer'}}>
          <div style={{fontSize:10,fontWeight:800,color:'var(--quiz)',letterSpacing:1,marginBottom:4}}>{phaseStory.chapter}</div>
          <div style={{fontWeight:700,color:'#fff',marginBottom:3,fontStyle:'normal'}}>{phaseStory.title}</div>
          <div style={{fontSize:11,color:'var(--text-secondary)',fontStyle:'italic'}}>Tik voor verhaal →</div>
        </div>
      )}
      {/* V9: next reward banner — shows whichever milestone is closest */}
      {(myNextTier||nextGhost)&&(
        <div className="reward-card">
          <div className="reward-icon">{myNextTier?myNextTier.badge:'👻'}</div>
          <div className="reward-info">
            <div className="reward-label">VOLGENDE BELONING</div>
            <div className="reward-target">
              {myNextTier?
                `${myNextTier.name} bij ${myNextTier.min} challenges (${myChallengesDone}/${myNextTier.min})`
                :
                `${nextGhost.label} (${myScore}/${nextGhost.score} pts)`
              }
            </div>
            <div className="reward-progress">
              <div className="reward-progress-fill" style={{
                width: myNextTier?
                  `${Math.min(100, (myChallengesDone/myNextTier.min)*100)}%`
                  :
                  `${Math.min(100, (myScore/nextGhost.score)*100)}%`
              }}/>
            </div>
          </div>
        </div>
      )}

      {/* V9: own current tier banner (if you have one) */}
      {myTier&&!myNextTier&&(
        <div className="reward-card" style={{borderColor:'rgba(255,215,0,0.4)'}}>
          <div className="reward-icon">{myTier.badge}</div>
          <div className="reward-info">
            <div className="reward-label">MAX TIER BEHAALD</div>
            <div className="reward-target">{myTier.name} · jullie zijn legendes</div>
          </div>
        </div>
      )}

      {/* V6: pending review badge for own team */}
      {pendingMine>0&&(
        <div className="glass" style={{padding:10,marginBottom:10,borderColor:'rgba(255,215,0,0.3)',display:'flex',alignItems:'center',gap:10}}>
          <div style={{fontSize:18}}>⏳</div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:'var(--accent)',fontWeight:700}}>{pendingMine} foto{pendingMine===1?'':"'s"} in beoordeling</div>
            <div style={{fontSize:10,color:'var(--text-secondary)',marginTop:2}}>Punten zijn voorlopig toegekend · game master kan ze afkeuren</div>
          </div>
        </div>
      )}

      {/* Bar break countdown */}
      {barBreak&&(
        <div className="glass" style={{padding:14,marginBottom:14,textAlign:'center',borderColor:'rgba(255,215,0,0.3)'}}>
          <div style={{fontSize:11,color:'var(--accent)',fontWeight:700}}>🍺 VOLGENDE BAR BREAK</div>
          <div style={{fontSize:16,fontWeight:700,marginTop:4}}>{barBreak.name}</div>
        </div>
      )}

      {/* Wedding video mission - only when Jorik is NOT in team */}
      {!jorikInTeam&&!weddingDone&&(
        <div className="secret-banner" onClick={onShowWedding}>
          <div className="secret-badge">🤫 GEHEIME MISSIE</div>
          <div style={{fontWeight:700,fontSize:14}}>Bruiloftsvideo opnemen</div>
          <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:4}}>Tik hier voor instructies · +{WEDDING_VIDEO_BONUS} pts</div>
        </div>
      )}
      {weddingDone&&(
        <div className="glass" style={{padding:14,marginBottom:14,borderColor:'rgba(0,255,136,0.3)'}}>
          <div style={{fontSize:12,color:'var(--success)',fontWeight:700}}>✅ Geheime missie voltooid!</div>
        </div>
      )}

      {/* Leaderboard cards */}
      {sorted.map((t,i)=>{
        // V9: only my team has accurate local 'completed' data; show tier on own card.
        // Other teams' tier could be sourced from Supabase 'challenges_completed' field if present.
        const isMine=t.id===myTeam?.id;
        const teamChallenges=isMine?myChallengesDone:(t.challenges_completed||0);
        const teamTier=tierFor(teamChallenges);
        return(
          <div key={t.id} className={`lb-card glass animate-in animate-in-${i+1} ${i===0?'lb-first':''}`}
            style={{borderLeft:`4px solid ${t.color}`}}>
            <div className={`lb-rank ${i===0?'lb-rank-1':i===1?'lb-rank-2':i===2?'lb-rank-3':'lb-rank-other'}`}>#{i+1}</div>
            <div className="lb-emoji">{t.emoji}</div>
            <div className="lb-info">
              <div className="lb-name" style={{display:'flex',alignItems:'center',flexWrap:'wrap'}}>
                {t.name} {isMine?'(jij)':''}
                {teamTier&&(
                  <span className="tier-badge" style={{color:teamTier.color,borderColor:teamTier.color+'66'}}>
                    <span className="tier-emoji">{teamTier.badge}</span>{teamTier.name}
                  </span>
                )}
              </div>
              <div className="lb-stats">{teamChallenges} challenges · {t.locations_visited||0} locaties{isMine&&ghostMax>GHOST_MAX_USES?` · 👻×${ghostMax}`:''}</div>
            </div>
            <div className="lb-score" style={{color:t.color}}>{t.score}</div>
          </div>
        );
      })}

      {sorted.length===0&&(
        <div style={{textAlign:'center',padding:40,color:'var(--text-tertiary)'}}>
          <div style={{fontSize:48,marginBottom:16}}>🏆</div>
          <div>Nog geen scores</div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════
// MAP VIEW
// ═══════════════════════════════════════════
function MapView({pos,completed,visitedLocs,onSelect,ghost,onGhost,ghostMax=GHOST_MAX_USES,phase,gpsStatus,gpsSnap,onWakeGps}){
  const mapRef=useRef(null);
  const mapInst=useRef(null);
  const markersRef=useRef([]);
  const userMarkerRef=useRef(null);

  // Init map
  useEffect(()=>{
    if(!mapRef.current||mapInst.current)return;
    const m=L.map(mapRef.current).setView([START_POS.lat,START_POS.lng],15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'',maxZoom:19}).addTo(m);

    // V11: Add color-dot markers (category-colored, not emojis)
    const catColor=(loc)=>{
      const types=loc.ch.map(c=>c.t);
      if(types.includes('photo'))return 'var(--foto)';
      if(types.includes('video'))return 'var(--video)';
      if(types.includes('creative'))return 'var(--creatief)';
      if(types.includes('quiz'))return 'var(--quiz)';
      return 'var(--accent)';
    };
    const catColorHex=(loc)=>{
      const types=loc.ch.map(c=>c.t);
      if(types.includes('photo'))return '#5b8dee';
      if(types.includes('video'))return '#e05c5c';
      if(types.includes('creative'))return '#4bbe8a';
      if(types.includes('quiz'))return '#9b7bea';
      return '#d4a054';
    };
    L_DATA.forEach(loc=>{
      const col=catColorHex(loc);
      const mk=L.marker([loc.la,loc.lo],{
        icon:L.divIcon({className:'',iconAnchor:[5,5],interactive:true,
          html:`<div style="width:10px;height:10px;border-radius:50%;background:${col};border:1.5px solid rgba(255,255,255,0.25);cursor:pointer;box-shadow:0 0 6px ${col}44;transition:all .2s"></div>`
        })
      }).addTo(m);
      mk.on('click',()=>onSelect(loc.id));
      mk._locId=loc.id;
      mk._color=col;
      markersRef.current.push(mk);
    });

    // Dinner zone circle (phase 4)
    L.circle([DINNER_ZONE.lat,DINNER_ZONE.lng],{radius:DINNER_ZONE.r,color:'#d4a054',fillColor:'#d4a054',fillOpacity:0.03,weight:1.5,dashArray:'6 4'}).addTo(m);

    mapInst.current=m;
  },[]);

  // Update user position
  useEffect(()=>{
    if(!mapInst.current||!pos)return;
    if(userMarkerRef.current)mapInst.current.removeLayer(userMarkerRef.current);
    userMarkerRef.current=L.marker([pos.lat,pos.lng],{
      icon:L.divIcon({className:'',iconAnchor:[6,6],
        html:'<div style="position:relative"><div style="width:12px;height:12px;border-radius:50%;background:#d4a054;border:2px solid rgba(255,255,255,0.9);box-shadow:0 0 12px rgba(212,160,84,0.5);z-index:5;position:relative"></div><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:32px;height:32px;border-radius:50%;border:1px solid rgba(212,160,84,0.15);animation:pulse 3s ease-in-out infinite"></div></div>'
      })
    }).addTo(mapInst.current);
  },[pos]);

  // Get nearby challenges
  const nearby=getNearby(pos,completed);

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',position:'relative'}}>
      <div ref={mapRef} style={{flex:1}}/>

      {/* V5.1: GPS status pill — tap to force-wake when sleeping */}
      <div className="gps-pill" onClick={()=>onWakeGps&&onWakeGps()} style={{cursor:'pointer'}} title="Tik om GPS te wekken">
        <span className={`gps-dot ${gpsStatus||'weak'}`}/>
        {gpsStatus==='good'?'GPS goed':gpsStatus==='sleep'?'GPS rust':'GPS zwak'}
        {gpsSnap&&<span style={{color:'var(--foto)'}}>· op {gpsSnap}</span>}
        {gpsStatus==='sleep'&&<span className="snap-btn">tik om te wekken</span>}
      </div>

      {/* Ghost mode button */}
      <div style={{position:'absolute',top:12,right:12,zIndex:1000}}>
        <button className={`btn ${ghost.active?'btn-danger':'btn-ghost'}`} onClick={onGhost} disabled={ghost.used>=ghostMax&&!ghost.active}
          style={{fontSize:10,padding:'6px 12px',borderRadius:8,backdropFilter:'blur(8px)'}}>
          {ghost.active?`👻 ${fmtTime(ghost.timeLeft)}`:`👻 Ghost (${ghostMax-ghost.used})`}
        </button>
      </div>

      {/* V11: Compact nearby panel — max 3 cards */}
      <div className="nearby-panel">
        {nearby.slice(0,3).map(loc=>{
          const primaryType=loc.ch[0]?.t||'photo';
          const typeClass=primaryType==='photo'?'foto':primaryType==='creative'?'creatief':primaryType;
          const types=[...new Set(loc.ch.map(c=>c.t))];
          return(
            <div key={loc.id} className="nearby-card" onClick={()=>onSelect(loc.id)}>
              <div className={`nearby-indicator ${typeClass}`}/>
              <div className="nearby-info">
                <div className="nearby-name">{loc.n}</div>
                <div className="nearby-tags">
                  {types.map(t=>{
                    const tc=t==='photo'?'t-foto':t==='creative'?'t-creatief':t==='quiz'?'t-quiz':'t-video';
                    const label=t==='photo'?'Foto':t==='creative'?'Creatief':t==='quiz'?'Quiz':'Video';
                    return <span key={t} className={`nearby-tag ${tc}`}>{label}</span>;
                  })}
                </div>
              </div>
              <div className="nearby-end">
                <div className="nearby-dist">{fmtDist(loc.dist)}</div>
                <div className="nearby-pts">+{loc.ch.reduce((s,c)=>s+c.p,0)}</div>
              </div>
              <div className="nearby-chevron">›</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ACTIVITY FEED — V5: photo grid + filters
// ═══════════════════════════════════════════
function ActivityView({feed,myTeamId,onPhoto,filter,setFilter}){
  // V10: local-only emoji reactions (not persisted; just social texture in-session)
  const REACTIONS=['🔥','👏','💀','😂','🍻'];
  const[reactions,setReactions]=useState({}); // {entryKey: {emoji: count}}
  const[myReactions,setMyReactions]=useState({}); // {entryKey: Set<emoji>}
  const entryKey=(item,i)=>`${item.created_at||i}_${item.team_id||'sys'}`;
  const toggleReaction=(key,emoji)=>{
    setMyReactions(prev=>{
      const cur=new Set(prev[key]||[]);
      if(cur.has(emoji))cur.delete(emoji); else cur.add(emoji);
      return{...prev,[key]:cur};
    });
    setReactions(prev=>{
      const cur=prev[key]||{};
      const mine=(myReactions[key]||new Set()).has(emoji);
      return{...prev,[key]:{...cur,[emoji]:(cur[emoji]||0)+(mine?-1:1)}};
    });
  };
  // Apply filter
  const filtered=feed.filter(item=>{
    if(filter==='photos')return !!item.photo;
    if(filter==='mine')return item.team_id===myTeamId;
    return true;
  });
  const photos=feed.filter(i=>!!i.photo);

  return(
    <div style={{height:'100%',overflowY:'auto',padding:16,paddingBottom:90}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:11,color:'var(--text-secondary)',fontWeight:600,letterSpacing:1}}>LIVE FEED</div>
        <div style={{fontSize:10,color:'var(--text-tertiary)'}}>{feed.length} berichten · {photos.length} foto's</div>
      </div>

      {/* V5: filter pills */}
      <div className="filter-pills">
        <button className={`filter-pill ${filter==='all'?'active':''}`} onClick={()=>setFilter('all')}>Alles</button>
        <button className={`filter-pill ${filter==='photos'?'active':''}`} onClick={()=>setFilter('photos')}>📸 Foto's</button>
        <button className={`filter-pill ${filter==='mine'?'active':''}`} onClick={()=>setFilter('mine')}>Mijn team</button>
      </div>

      {/* V5: photo grid preview (top 9 most recent photos) */}
      {filter==='all'&&photos.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:'var(--text-tertiary)',fontWeight:600,marginBottom:6,letterSpacing:1}}>RECENTE FOTO'S</div>
          <div className="photo-grid">
            {photos.slice(0,9).map((item,i)=>(
              <div key={i} className="photo-grid-item animate-in" onClick={()=>onPhoto&&onPhoto(item.photo)}>
                {isVideoData(item.photo)
                  ?<video src={item.photo} muted/>
                  :<img src={item.photo} alt="submission"/>}
                <div className="photo-grid-overlay">
                  <span>{item.team_emoji||'🎮'}</span>
                  {item.points>0&&<span style={{color:'var(--accent)'}}>+{item.points}</span>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {filtered.length===0&&(
        <div style={{textAlign:'center',padding:40,color:'var(--text-tertiary)'}}>
          <div style={{fontSize:40,marginBottom:12}}>📢</div>
          <div>Nog geen activiteit</div>
          {filter!=='all'&&<button className="btn btn-ghost" onClick={()=>setFilter('all')} style={{marginTop:14,fontSize:12}}>Laat alles zien</button>}
        </div>
      )}

      {filtered.map((item,i)=>{
        const isMe=item.team_id===myTeamId;
        const key=entryKey(item,i);
        const rx=reactions[key]||{};
        const mine=myReactions[key]||new Set();
        return(
          <div key={i} className="activity-row animate-in" style={{borderLeft:item.team_color?`3px solid ${item.team_color}`:undefined}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{fontSize:20}}>{item.team_emoji||'🎮'}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600}}>
                  {item.team_name||'Systeem'}
                  {isMe&&<span style={{fontSize:9,color:'var(--foto)',marginLeft:6,background:'rgba(0,212,255,0.15)',padding:'2px 6px',borderRadius:8}}>jij</span>}
                </div>
                <div style={{fontSize:12,color:'var(--text-secondary)'}}>{item.message}</div>
              </div>
              {item.points>0&&<div style={{fontSize:13,fontWeight:800,color:'var(--accent)'}}>+{item.points}</div>}
              {item.points<0&&<div style={{fontSize:13,fontWeight:800,color:'#ff6b6b'}}>{item.points}</div>}
            </div>
            {item.photo&&(
              isVideoData(item.photo)
                ?<video src={item.photo} className="activity-photo" controls muted onClick={()=>onPhoto&&onPhoto(item.photo)}/>
                :<img src={item.photo} className="activity-photo" alt="submission" onClick={()=>onPhoto&&onPhoto(item.photo)}/>
            )}
            {/* V10: emoji reactions */}
            <div className="reactions">
              {REACTIONS.map(e=>{
                const n=rx[e]||0;
                return(
                  <button key={e} className={`reaction-btn ${mine.has(e)?'my':''}`} onClick={()=>toggleReaction(key,e)}>
                    <span>{e}</span>{n>0&&<span className="reaction-count">{n}</span>}
                  </button>
                );
              })}
              <div style={{flex:1}}/>
              <div style={{fontSize:10,color:'var(--text-tertiary)',marginTop:3}}>{new Date(item.created_at).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}
